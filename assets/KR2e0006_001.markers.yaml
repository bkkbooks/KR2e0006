  - {type: variant, offset: 11558, length: 0, content: '', WYG: 美質為公所切磋七多切詩曰如切如磋如琢如磨言其治之有緒而益致其精也勞公約朕以仁義𢎞朕以道徳使朕功業至此公亦足為良工爾按史傳曰帝納其言不疑於是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺戸闔不閉行旅不賫糧取給於道帝謂羣臣曰此徵勸我行仁義既效矣惜不令封徳彛見之孫氏甫曰帝王興治道在觀時而為之觀時在至明至明在至公至明則理無不通至公則事無不正通於理故能變天下之弊正其事故能立天下之教弊變教立其治不勞而成矣孔子曰如有用我者期月而已可也三年有成則聖人之意可見矣但後之為天下者雖欲興起治道多非聖哲之才不能通究時弊以道變之務速其功以行一時之事故所為駁雜莫復前古之治也觀魏公之論誠得聖人之意文皇能納其言而不惑姦人之論力變時弊以行王道嗚呼明哉大亂之後興立教法不急其功致時太平徳流於後嗚呼公哉范氏祖禹曰太宗可謂能審取捨矣魏徵仁義之}
