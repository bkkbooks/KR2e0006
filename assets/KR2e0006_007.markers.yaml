  - {type: variant, offset: 786, length: 0, content: '', WYG: 皆置博士國子掌教三品以上及國公子孫從二品以上曾孫為生者太學掌教五品以上及郡縣公子孫從三品曾孫為生者廣文館掌領國子學生業進士者四門館掌教七品以上侯伯子男為生及庶人子為俊士生者律學書學算學掌教八品以下及庶人子為俊士生者又有五經博士掌以其經教國子太宗又數幸國學數音朔令祭酒司業凡會同饗醼必尊長先以酒祭先故曰祭酒長者之稱也唐制國子監祭酒掌邦國儒學訓導之政兼領諸學凡釋奠則為初獻司業其貳職也博士講論畢各賜以束帛四方儒士負書而至者蓋以千數俄而吐蕃及髙昌髙麗新羅等諸夷酋長音掌亦遣子弟請入于學於是國學之内皷篋升講筵者篋方竹器所以盛書籍者幾至萬人幾平聲儒學之興古昔未有也按儒學𫝊貞觀十四年召天下惇師老徳以為學官數臨幸觀釋菜廣學舍千二百區益生員}
