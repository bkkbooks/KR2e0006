  - {type: variant, offset: 13316, length: 0, content: '', WYG: 仁杲代立秦王率諸将討之以仁杲及其黨歸京師斬之竇建徳王世充等臣願圖其形狀以寫戰勝攻取之容太宗曰朕當四方未定因為天下為去聲後我為同救焚拯溺故不獲已乃行戰伐之事戰一作攻所以人間遂有此舞國家因兹亦制其曲然雅樂之容止得陳其梗概若委曲寫之則其狀易識易以豉切朕以見在将相見音現将相並去聲多有曾經受彼驅使者曾音層既經為一日君臣今若重見其被擒獲之勢重平聲必當有所不忍我為此等所以不為也蕭瑀謝曰此事非臣思慮所及按史志太宗令魏徵與李百藥等更製破陣樂名曰七徳舞舞初成觀者皆踊躍諸将上夀羣臣皆稱萬嵗蠻夷在庭者請相率以舞自是朝會慶賀與}
