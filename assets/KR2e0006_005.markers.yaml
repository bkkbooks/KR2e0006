  - {type: variant, offset: 1339, length: 0, content: '', WYG: 皆披靡太宗聞而嘉歎之時有齊王元吉府左車騎謝叔方萬年人率府兵與立合軍拒戰及殺敬君𢎞中郎將吕衡將去聲史作吕世衡此避太宗諱除世字王師不振秦府䕶軍尉唐制掌宿衛之職尉遲敬徳尉音蔚尉遲複姓名恭以字行朔州人為劉武周將武徳初舉地降為右府統軍後從討隐巢有功封鄂國公卒贈徐州都督乃持元吉首以示之叔方下馬號泣號平聲拜辭而遁明日出首去聲太宗曰義士也命釋之授右翊衛郎將唐制掌供奉侍衛之職按通鑑武徳九年六月馮立聞建成死乃與副䕶軍薛萬徹屈咥直府左車騎謝叔方帥東宫齊府精兵二千馳赴𤣥武門張公謹多力獨閉闗以拒之不得入敬君𢎞掌宿衛兵屯𤣥武門挺身出戰與吕世衡大呼而進皆死之守門兵與萬徹等力戰良久萬徹欲攻秦府尉遲敬徳持建成元吉首示之宫府兵遂潰萬徹亡入終南山馮立遂解兵逃於野髙祖既赦天下馮立}
