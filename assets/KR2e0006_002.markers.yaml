  - {type: variant, offset: 4788, length: 0, content: '', WYG: 不阿權倖内不侈親族外不為朋黨不以逢時改節不以圖位賣忠前代爭臣一人而已宋氏祁曰君臣之際顧不難哉以徵之忠而太宗之睿身沒未㡬猜譛遽行始徵之諌至君子小人未嘗不反覆言之以邪佞之亂忠也乆猶不免故曰皓皓者易汙嶢嶢者難全自古所歎云曽氏鞏曰太宗屈己以從羣臣之議而魏公之徒喜遭其時感知己之遇事之大小無不諌諍雖其忠直所自至亦得君以然也吕氏祖謙曰或謂三代遺直者言其以至公為心而不以事形迹為美以後言為戒而不以即應為嫌任强直之責而不顧擅權之議為忠讜之論而不畏誹謗之譏此太宗貞觀之治獨歸於徵勸行仁義之效者其以此歟唐氏仲友曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊此孟子之諫爭徵有之矣真氏徳秀曰魏公始終以規諌為己任唐史以為前代争臣一人而己豈不信哉然攷其學問淵源殆不可見文中子世家謂魏徵嘗從其學受王佐}
