  - {type: variant, offset: 2, length: 0, content: '', WYG: 貞觀政要序夫三代以上君明臣良天下雍熙世登上理自東遷以降風俗日薄天下無復熙皥之美雖有質美之主望治甚切而所以屈已從諫力行善政者終不能有以震古而鑠今及唐貞觀太宗以英武之資能用賢良之士時若房元齡杜如晦魏徴王珪諸人布列左右相得益彰蓋自三代以下能用賢納諫而治天下者未有如此之盛焉史臣呉兢纂輯其書名之曰貞觀政要後之求治者或列之屏風或取以進講元至順間戈直又刋其書以行于世余嘗讀其書想其時未嘗不三復而歎曰貞觀之治盛矣然其所以致治則又在於用此數賢而數賢之中又推魏徴禆益為多然魏徴不能自必信用於太宗以見其功業則又知太宗所以獨信魏徴言聴計從而見效若彼者固人君所當服膺書紳而勿失也書中分目目中有條條之末引先儒之言而論斷之其有望於後王也深矣人君當上法堯舜逺接湯武固不當以三代以下自畫然觀爾曰君臣之所以持盈保泰行仁義薄法術太宗之虚已受言諸臣之論思啟沃亦庶幾乎都俞吁咈之風矣樂善右謹依定本恭錄堂全集御製讀貞觀政要薰風何習習朱明屆長候北忩髙卧起洛誦勤時懋貞觀政要編覽罷再三復文皇治世功在漢文景右斗米值三錢太倉粟腐臭闗東暨嶺南開門夜無寇論古緬遐思治功非倖覯文貞立朝端彌縫而匡救九重亦虛已勤政夜繼晝勵精圖至治俗用臻富厚二十餘年間中外稱明后徴没明鑑昏志滿漸差謬東征無成功幸能自引咎復碑念前規厚賜撫其後猶不負初心終身無罅漏信順立丕基尚賢天所祐先哲留嘉謨後人當勉就樂善右謹依定本恭録堂全集懿徳嘉言在簡編憂勤想見廿三年燭情已自同懸鏡從諫端知勝轉圜房杜有容能讓直魏王無事不繩愆髙山景仰心何限字字香生翰墨筵乾隆丙辰君子慎言行其發乃樞機出身發乎邇千里應在兹所以古聖王左右史有司匪惟記善惡亦以謹起居叶遙遙三代下不乏為君師漢文唐太宗髙山予仰跂叶漢帝質無忝唐皇文有餘叶至今政要書炳然法則垂求賢與納諫簡編多令儀獨於觀史事不能我無疑文皇信英辟易理豈不知九皋鶴聞野榮辱應不遲詎藉金匱蔵却觀知所為遂良執簡記𫝊信恒於斯秘之不與觀固也非達宜禮云記動言非禮戒宴私不觀史何據或者其未思善哉劉洎言人君日月齊設遂良不記天下皆記之復如封宇文至唐皆進規使其記隋事筆應多詭辭豈能掩煬惡煬惡誰直書叶乾隆乙丑仲夏御製右二首謹依詩初集恭録御製題金版貞觀政要好名曽昔議文皇三代下名好亦臧言不以人廢如是書原同帝範之蘉呉兢采輯質文備梁肅鋟行勸戒詳幾度披芸欽古鑒寧徒玩紙墨精良御製右一首謹依詩二集恭錄御製題貞觀政要魏徴王珪請送葬二王事上表明陳送寢園豈非不忘舊君恩舊君若問辰嬴事死後將何對九原徴珪平日皆自命敢言者也雖太宗欲立楊氏為后徴進言乃止然此事豈待立后始為失徳哉既為太宗之累亦無以對海陵則上表欲送息隠海陵之葬不過為名之舉耳故詩以刺之御製右一首謹依詩三集恭錄欽定四庫全書史部五貞觀政要雜史類提要臣等謹按貞觀政要十卷唐吳兢撰兢汴州浚儀人以魏元忠薦直史館累官太子左庶子貶荆州司馬厯洪舒二州刺史入為恒王傅天寳初年八十卒事蹟具唐書本傳宋中興書目稱兢于太宗實録外采其與羣臣問答之語作為此書用偹觀戒總四十篇新唐書著録十卷均與今本合考舊唐書曹確傳載確奏臣覽貞觀故事太宗初定官品云云其文與此書擇官篇第一條相同而唐志所録别無貞觀故事豈即此書之别名歟其書在當時嘗經表進而不著年月惟兢自序所稱侍中安陽公者乃源乾曜中書令河東公者乃張嘉貞考元宗本紀乾曜為侍中嘉貞為中書令皆在開元八年則兢成此書又在八年以後矣書中所記太宗事蹟以唐書通鑑參考亦頗見牴牾如新舊唐書載太宗作威鳯賦賜長孫無忌而此作賜房元齡通鑑載張藴古以救李好徳被誅而此謂其與囚戲博漏洩帝㫖事状迴異又通鑑載皇甫徳參上書賜絹二十四匹拜監察御史而此但作賜帛二十段又通鑑載宗室諸王降封由封徳彛之奏貞觀初放宫人由李百藥之奏而此則謂出于太宗獨斷俱小有異同史稱兢叙事簡核號良史而晚節稍疎牾此書盖出其耄年之筆故不能盡免滲漏然太宗為一代令辟其良法善政嘉言􅍇行臚具是編洵足以資法鑒前代經筵進講每多及之故中興書目稱厯代寳傳至今無闕伏讀皇上御製樂善堂集開卷首篇即邀褒詠千年舊籍榮荷表章則是書之有裨治道亦概可見矣書中之註為元至順四年臨川戈直所作又採唐栁芳晉劉昫宋宋祁孫甫歐陽脩曽鞏司馬光孫洙范祖禹馬存朱黼張九成胡寅吕祖謙唐仲友葉適林之竒真徳秀陳惇修尹起莘程竒及吕氏通鑑精義二十二家之説附之名曰集論吳澄郭思貞皆為之序直字伯敬即澄之門人也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀明憲宗}
