  text: 貞觀政要卷第二戈直集論
  hash: sha256:f8efa35c7ade694e379c63c00f9a04d05c7d3bc909f6ee6c410a3de91f82cd9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_002-1a}
body:
  text: 論任賢三論求諌四論納諌五任賢第三章凡八房玄齡杜如晦魏徴王圭李靖虞世南李績馬周房玄齡敏通經史善屬文開皇中隋方盛密白父曰名喬以字顯父彥謙仕隋歷剌史玄齡少警滅亡父驚曰無妄言年十八舉進士授羽騎尉校讎上無功德徒以周近親妄誅殺亂嫡庶競僣侈終當昻霄耳中原方亂慨然有憂天下之志既事秦王王祕省侍郎髙孝基曰此郎當為國器恨不見其聳壑玄齡猶禹也餘見下文曰漢光武得鄧禹今我得齊州臨淄人也南路隸山齊州今濟今屬益都路東臨淄縣名初仕隋為隰城尉隸河東唐制縣置尉隰音習隰城今隰州追催收率課調令之佐也掌親理庶務分判衆曹割斷坐事除名徙上郡太宗徇地渭北陜西之地渭水之北今玄齡杖䇿謁於軍門太宗一見便如舊識署渭北道行軍記室參軍表啓書疏之唐制掌軍府職玄齡既遇知已遂罄竭心力是時賊冦每平衆人競求金寶玄齡獨先收人物致之幕府及有謀臣猛將與之潜相申結各致死力纍授秦王府記室兼陜東道等處今河南大行臺考功郎中過善惡之職唐制掌百官功玄齡在秦府十餘年恆典管記隱太子巢剌王以玄齡及杜如晦下章詳見為太宗所親禮甚惡之去聲惡烏譛之髙祖淵諱德字叔由是與如晦並遭驅斥及隱太子將有變也太宗召玄齡如晦令衣道士服衣去聲令平聲潜引入閣謀議及事平太宗入春宫月太宗初為皇太子東宫也武德九年六擢拜太子左庶子從贊相禮儀駮正啓奏之職唐制東宫左春坊左庶子掌侍貞觀元年遷中書令執大政而總判省事宰相也唐制中書省之長掌佐天子三年拜尚書左㒒射監修國史國史皆宰相兼領唐制史館有監修封梁國公實封一千三百戶邑五千户三曰國公食邑三千户四曰開唐爵九等一曰王食邑萬户二曰郡王食六曰開國縣侯食邑千户七曰開國縣伯食七百户國郡公食邑二千户五曰開國縣公食邑千五百户三百户此言千三百户者實封數也後倣此八曰開國縣子食五百户九曰開國縣男食既總任百司䖍恭夙夜盡心竭節不欲一物失所聞人有善若已有之明逹吏事飾以文學審定法令意在寬平不以求備取人不以已長格物隨能收叙無隔踈賤論者稱為良相焉後同相去聲十三年加太子少師聲唐少去德行以諭皇太子奉觀三師之德制太子少師少傅少保掌曉三師玄齡自以一居端揆端揆者相位也舜使禹宅百揆十有五年頻抗表辭位優詔不許十六年進拜司空天子理隂陽平邦國無所不統唐制太尉司徒司空為三公佐仍總朝政依舊監修國史玄齡復以年老請致仕太宗遣使聲去謂曰國家久相任使字相如一朝忽無良相音朝昭如失兩手公若筋力不衰無煩此讓自知衰謝當更奏聞玄齡遂止謂之曰昔留侯讓位竇融辭榮自按史傳玄齡抗表陳辭太宗遣使往哲實可嘉尚然國家久相任使一朝忽無良相如懼盈滿知進能退善自止足前代美之公亦欲齊蹤齡遂止失兩手玄太宗又嘗追思王業之艱難佐命之匡弼乃作威鳯賦以自喻因賜玄齡其見稱類如此舊唐按新賜無忌俱載長孫無忌傳參之通鑑亦然政要作賜書皆曰太宗追思王業艱難佐命之力作威鳯賦以命功臣之意則一也今録其賦于此以備觀覽焉其玄齡未詳孰是愚謂其所紀姓名雖不同而太宗眷風以舉翰戾天衢而逺翔西翥則烟氛閉色東飛則辭曰有一威鳯憩翮朝陽晨逰𬗋霧夕飲玄霜資長方降應明時而自彰俯翼雲路歸功本樹仰喬枝而日月騰光化垂鵬于北裔訓群鳥于南荒珍亂世而無桓山之義情有炎洲之凶度若巢葦而居安獨懷見猜俯修條而抱蠧同林之侣俱嫉共幹之儔並忤至鄙害它賢之獨竒或聚味而交擊乍分羅而見羈危而履懼鴟梟嘯乎側葉燕雀喧乎下枝慙已陋之晨暉霜殘綺翼露點紅衣嗟憂患之易結嘆矰繳之戢凌雲之逸羽韜偉世之清儀遂乃蓄情宵影結志以恃引此風雲濯斯塵滓披䝉翳于葉下發光彩于難違期畢命于一死本無情于再飛幸賴君子以依臨九天而髙恃庶廣德于衆禽非崇利于一已是以枝裏仙翰屈而還舒靈音摧而復起職八極以遐翥答惠之情彌結報功之志方宣非知難而行易思今徘徊感德顧慕懷賢慿明哲而禍散託英才而福全流慶畢萬葉而芳傳後而終前俾賢德之宅百揆舜所以命禹也旁招俊乂列于庶位傅說朱氏黼曰人主以任相為職宰相以任人為職使授任可謂知任相矣玄齡聞人有善若已有之不所以相髙宗也太宗嘗謂玄齡當廣求賢人隨材居端揆十五年有司庶府皆稱其職也竊嘗論之以求備取人不以已長格物可謂知相職矣是以之盛群材蟻附一財計之任雖賤有司且能之玄宰相非量材受任為難而為國用人之不易貞觀寧任于己而不庀凡士蓋以民力所繫不當委裒齡特以度支關天下利害寧虛其位而不以與人之嘆而不容茍且以具貟寧受吝權之譏而不忍刻之吏國計所本不可付聚斂之臣故寧抱乏材所以號稱名相歟冒昧以與下此其直英衛以善兵而立功玄齡乃斷斷于上而為一吕氏祖謙曰房玄齡之相太宗王魏以善諌而為事矣觀其以度支係天下利害嘗有缺求其人未時之名相可謂無它枝而能有容足以任天下之用也由是言之無它技而有容固足為貴至於材得乃自領之其材固足以辦天下之事而能不自齡之賢所以為不可及也不自用而能用人之材則玄凡三十三年其持身也敬其謀國也忠蓋庶乎古真氏德秀曰梁文昭公佐太宗定天下及終相位於英衛使衆善畢集於君退然若無能為者此一大臣之風矣至於用人則委諌爭於王魏付征伐君子其用梁公之用心當端拜師之節蓋秦漢以來未有能及之者後之之府而蕭何獨收相府律令圖書竟為開基之愚按昔漢高祖初入關也諸將爭走金帛財物興王名相豈偶然之故哉房玄齡杖策謁軍門根本夫蕭何起秦刀筆吏而高見逺識如此為經營四方非此人莫可太宗自此彌加禮重寄以心腹遂奏為府屬嘗參謀帷幄時軍國多事剖斷如流深為時輩所服纍除天策府從事中郎祖以秦王功武德四年髙王公上開府置官屬從事中郎其屬職也髙古官號不足以稱乃加號天䇿上將位在兼文學館學士文學館收聘賢才詢訪討論學士其職也太宗為天䇿上將亂稍平乃嚮儒宫城西作隱太子之敗如晦與玄齡功第一遷拜太子右庶子左右獻納啓奏宣傳令㫖之政唐制東宫右春坊右庶子掌侍從俄遷兵部尚書制唐甲械之政尚書其長也兵部掌武選地圖車馬進封蔡國公實封一千三百户貞觀二年以本官檢校侍中皆詔除而非正命唐制檢校某官者三年拜尚書右㒒射兼知吏部選事勳封考課之政知唐制吏部掌文選也猶主仍與房玄齡共掌朝政至於臺閣規模典章文物皆二人所定甚獲當時之譽時稱房杜焉如晦進按史傳為碑文言痛悼意它日食瓜美輟其半奠焉後夢如㒒射久之以疾辭職薨贈司空諡曰成手詔虞世南無少衰後詔功臣世襲贈密州剌史徙國萊晦若平生明日敕所御饌往祭勞問妻子恩禮尋德亦至矣故太宗定禍亂而房杜不言功王魏柳氏芳曰房杜佐太宗天下號為賢相然無迹可行其道理致太平善歸人主為唐宗臣宜哉善諌諍而房杜讓其賢英衛善將兵而房杜協以致升平議者以比漢之蕭曹信矣然杜之見劉氏煦曰房杜皆以命世之才遭逄明主謀猷允莫能籌之及如晦至竟如玄齡之䇿蓋房知杜之用房之所舉也太宗嘗與玄齡圖事則曰非如晦色相須而成俾無悔事賢逹用心良有以也若以能斷大事杜知房之善建嘉謀禆諶草創東里潤産杜則鮑叔罕虎矣往哲方之房則管仲子輔政大亂之餘紀綱雕弛而能興仆植僵使號令宋氏祁曰太宗取孤隋攘群盜天下已平用房杜迹殆不可見何哉雖然宰相代天者也輔贊彌縫典刑粲然罔不完可謂名宰相然求所以致之之取名暸然使户曉者殆房杜之細耶而藏諸用使斯人由而不知彼揚已皆以功為尚而房杜隱然為國名臣自後世觀之張氏九成曰太宗身屬櫜鞬以基帝業閫外之臣機獨斷吐胸中之竒若如晦者誰人也任公竭節身處要地如玄齡者誰人也臨觀之無迹可尋此則近于無聲無臭之至矣是故吕氏祖謙曰房杜輔相太宗成貞觀之治而後世唐之房杜傳無可載之功而為貞觀之賢相漢之文景紀無可書之事而為西都之仁君良相遇可矣而古之王者必有師臣湯之于伊尹唐氏仲友曰太宗與房杜君臣之契深矣謂之明以登堯舜之盛故曰成王畏相房杜之于太宗可武王之于尚父是也是故能以道正君格其非心可以為畏相也以為名相矣未今以史傳考之則禇遂良嘗謂玄齡自義旗之愚按蘇文忠公有言唐之房杜傳無可載之功賢立政人臣之勤玄齡為最髙祖謂玄齡論事始翼贊聖功武德之季冒死决䇿貞觀之初選宣泄是玄齡之功猶可得而知也至于如晦之千里外猶對靣長孫后謂玄齡竒謀祕計未嘗齡輒曰非如晦不能斷及如晦至卒用玄齡之為人則世稱玄齡善謀如晦善斷每有大事玄晦之功不可得而知也然世豈以如晦為不及䇿是如晦之斷初不能出于玄齡之謀也故如巳之短而求加于人者真如晦之罪人也哉玄齡哉嗚呼後之大臣幸而與賢者同列耻魏徴士好讀書尤屬意縱橫之說大業未李密見徴字玄成孤貧落拓有大志不事生業出家為道攻陷黎陽獲徴署為起居舍人及竇建德就擒與裴所為文召之徴進十䇿密竒之而不能用後竇建德直洗馬甚禮之餘見下文矩西入關隱太子聞其名引巨鹿人也順德路巨鹿巨鹿郡名今河東縣􅊢近徙家相州之內黃腹裏內黃縣名今屬滑州相去聲相州今彰德路􅊢武德末為太子洗馬則當直者前驅清道唐制東宫洗音跣洗馬漢有是職太子出緝之事凡天下之圖書上東宫者皆受而藏之左春坊司經局置洗馬掌經史子集四庫圖籍刋見太宗與隱太子隂相傾奪每勸建成早為之謀太宗既誅隱太子召徴責之曰汝離間我兄弟何也聲間去衆皆為之危懼徴慷慨自若從容對曰容切從即皇太子若從臣言必無今日之禍太宗為之斂容厚加禮異擢拜諌議大夫數引之卧內朔數音訪以政術徴雅有經國之才性又抗直無所屈撓太宗每與之言未嘗不恱徴亦喜逢知己之主竭其力用又勞之曰聲慰勞去也喻卿所諌前後二百餘事皆稱朕意聲稱去非卿忠誠奉國何能若是三年纍遷祕書監參預朝政深謀逺算多所弘益太宗嘗謂曰卿罪重於中鉤我任卿逾於管仲議立君髙國先隂告公子小白于莒魯亦發中去聲管仲名夷吾齊卿也初齊襄公被弒鉤紏至齊小白已立是為桓公管仲請囚鮑叔牙請兵送公子紏而使管仲别將兵遮魯道射中小白帶後為相遂霸天下公用之公以為大夫近代君臣相得寧有似我於卿者乎六年太宗幸九成宫宫也隋仁夀宴近臣長孫無忌曰輔機文德皇后之兄從太宗征討有功纍擢比部長音掌凡言長孫並同長孫復姓無忌其名也字太子太傅髙宗時以沮立武后削官爵置黔州卒郎中貞觀初遷吏部尚書封齊國公復進䇿司空為王圭魏徴往事息隱臣見之若讎不謂今者又同此宴太宗曰魏徴往者實我所讎但其盡心所事有足嘉者朕能擢而用之何慙古烈徴每犯顔切諌不許我為非我所以重之也徴再拜曰陛下導臣使言臣所以敢言若陛下不受臣言臣亦何敢犯龍鱗觸忌諱也狎而馴也然喉下有逆鱗徑寸嬰之必殺人人史記韓非傳曰諌說之士不可不察夫龍可擾無嬰人主逆鱗則幾矣主亦有逆鱗說之者能太宗大恱各賜錢十五萬七年代王圭為侍中纍封鄭國公尋以疾乞辭所職請為散官太宗曰朕拔卿於讎虜之中任卿以樞要之職見朕之非未嘗不諌公獨不見金之在礦金璞也古猛切何足貴哉良冶煆而為器匠也冶陶鑄便為人所寶朕方自比於金以卿為良工雖有疾未為衰老豈得便爾耶徴乃止後復固辭聽解侍中授以特進仍知門下省事十二年太宗以誕皇孫詔宴公卿帝極歡謂侍臣曰貞觀以前從我平定天下周旋艱險玄齡之功無所與讓貞觀之後盡心於我獻納忠讜安國利人成我今日功業為天下所稱者惟魏徴而已古之名臣何以加也於是親解佩刀以賜二人庶人承乾宗太子後以罪廢為庶人𥘉立長子承乾為太在春宫不修德業魏王泰褒太字惠屬文後貶王濮諡曰恭宗第四子封魏王好士善寵愛日隆內外庶寮咸有疑議太宗聞而惡之聲烏去謂侍臣曰當今朝臣忠謇無如魏徴我遣傅皇太子用絶天下之望十七年遂授太子太師三師掌以道德輔導皇太子唐制太子太師太傅太保為知門下事如故徴自陳有疾太宗謂曰太子宗社之本須有師傅故選中正以為輔弼知公疹病可卧護之徴乃就職尋遇疾徴宅內先無正堂太宗時欲營小殿乃輟其材為造聲為去五日而就遣中使聲去賜以布被素褥遂其所尚後數日薨太宗親臨慟哭聲臨去贈司空諡曰文貞太宗親為製碑文復自書於石特賜其家食實封九百户太宗後嘗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今魏徴殂逝遂亡一鏡矣因泣下久之乃詔曰昔惟魏徴每顯豫過自其逝也雖過莫彰朕豈獨有非於往時而皆是於兹日故亦庶僚苟順難觸龍鱗者歟所以虛已外求披迷內省切悉井言而不用朕所甘心用而不言誰之責也自斯已後各悉乃誠若有是非直言無隱甚藥膳賜遺按史傳徴疾帶上悲悶拊之將以衡山公主降其子叔玉時公主無算上親問疾語終日後復與太子至徴加朝服拖五日太子舉哀西華堂詔內外百官朝集皆赴喪晋從上曰公强視新婦徴不能謝及旦薨帝臨哭罷朝上登苑西樓望哭盡哀王奉詔致祭陪葬昭陵十萬言其匡過弼違能近取譬博約逹類皆前代劉氏煦曰魏公與文皇討論政術往復應對凡數不阿權幸內不侈親族外不為朋黨不以逄時攺爭臣所不至者其實身正而心徑上不負時主中之道先儒疑之觀其勸太宗行仁義則必有所本殆不可見文中子世家謂魏徴嘗從其學受王佐身而逹之于國家天下無往而非仁義此二帝三然嘗論之有仁義之體有仁義之用正其心修其假仁義以行之而不免于利欲之雜然其愛人利王之所行兼體用之全者也心未必正身未必修文之所行依倣于仁義之用而體則未純故其用物之功禁暴止亂之政亦有𥙷于世教此齊桓晉由心而身由身而家皆有慚德觀魏公之所論諌亦未盡也太宗除隋之難身致升平可謂偉矣然而變化于未形者少君臣之間相與䇿勳者黽勉即事而言者多即心而論者少正救于已形者多未能大異于五伯魏公正君之功雖秦漢以下所于仁義之用而已故貞觀之治雖有志于三王迄縱橫之學則又有未然者蓋戰國䇿士多邪諂之難及而揆之伊傅周召則猶可憾焉或以為出于叔玠以王魏並稱考觀本末蓋亦其流亞云言而魏公所陳皆正大之論是豈可同日語哉為三代遺直豈不信哉然嘗聞之孟子曰人不愚按魏鄭公之諌自兩漢以來一人而已史稱之非蓋更一弊政是一弊政而巳去一小人是足與適也政不足與間也惟大人為能格君心更也今觀魏公之諌疏大槩能禆益于政事而一小人而已非心存焉吾恐不勝其去不勝其于平昔律以孟子之言殆所謂過謫用人之非不能匡正于本原能規諌于臨時而不能涵養未至乎故程子謂其能正君而不能養德真氏非間行政之失而已無乃于格心之道猶有所于已形者多變化于未形者少其知言哉謂其即事而言者多即心而論者少正救王圭末為奉禮郎季叔頗坐事被誅圭當從坐遂亡字叔玠志量隱正能安于貧賤交不苟合開皇器識引為世子府咨議參軍及東宫建除中舍人尋匿積十餘歲髙祖入關相府司録李綱薦圭貞諒有見下文轉中允餘太原祁縣人也􅊢河東祁縣今仍舊太原郡名今翼寧路武德中為隱太子中允駮正啓奏總司經典膳藥唐制東宫官屬掌侍從贊相甚為建成所禮後以連其隂謀事流于嶲州末髙祖以太嶲音髓武德貶嶲州屬羅羅斯地今為建昌路隸雲南子與秦王有隙責圭等不能輔導皆𬒳流建成誅後太宗即位召拜諌議大夫每推誠盡節多所獻納圭嘗上封事切諌言事也封事實封太宗謂曰卿所論皆中朕之失聲中去自古人君莫不欲社稷永安然而不得者秪為不聞己過聲為去或聞而不能改故也今朕有所失卿能直言朕復聞過能改何慮社稷之不安乎太宗又嘗謂圭曰卿若常居諌官朕必永無過失顧待益厚貞觀元年遷黃門侍郎參預政事兼太子右庶子二年進拜侍中時房玄齡魏徴李靖下章詳見溫彥博降彥博預謀召入為郎戰突厥被執貞觀始始得還字大臨并州人警悟而辨隋末幽州總管羅藝以州尚書右㒒射卒追贈特進諡曰恭尋檢校吏部侍郎時譏其煩碎後遷戴胄州人性明字玄㣧相士曹參軍貞觀初遷大理少卿又遷尚書左丞號稱正善簿最王世充謀篡胄以大義說之秦王引為府舉委胄遂檢校吏部尚書卒諡曰忠職拜諫議大夫杜如晦遺言請以選與圭同知國政嘗因侍宴太宗謂圭曰卿識鑒精通尤善談論自玄齡等咸宜品藻文質也定其差品又可自量孰與諸子賢平量聲對曰孜孜奉國知無不為臣不如玄齡每以諌諍為心耻君不及堯舜臣不如魏徴才兼文武出將入相臣不如李靖去聲將相並敷奏詳明出納惟允臣不如溫彥博處繁理劇衆務必舉臣不如戴胄聲處上至如激濁揚清嫉惡好善聲好去臣于數子亦有一日之長太宗深然其言群公亦各以為盡已所懷謂之確論定五禮兼魏王師十三年卒上素服舉哀詔魏王泰按史傳圭後進爵郡公八年拜禮部尚書十一年正部尚書諡曰懿率百官臨哭贈吏㑹于兹易曰自天祐之吉無不利叔玠有之矣劉氏煦曰王圭履正不回忠讜無比君臣時命胥一已而復使王圭商確人物圭亦盍因是而進戒陳氏惇修曰太宗嘗歷數諸臣之得失以夸大于貢方人夫子謂不暇臣亦不敢以知人自負昔臯曰知人之道堯以為難陛下不當以知人為能子之意也今陛下安可輕問而臣亦安可輕對惜乎陶陳謨分為九德亦欲多方而參考之以示所難之知人如此其易而圭之品藻如此其當天下之圭不知此且復一二而為之商確遂使太宗謂吾也然則太宗之為君固有愧于帝堯而王圭之徒賢否善惡皆不足辨而邪侫之言所以乘間而入臯陶者矣蓋亦有愧于圭為諫議大夫是圭為諌官在徴之先也是時愚按太宗既正位東宫首以魏徴為詹事主簿懷待之以示無間是圭之論諫在徴之先也厥前宫齊府之黨多懷反側不安圭首請太宗坦嘗觀宋末真氏論後世賢臣悉以四事律之一後與徴上下其論卒得與徴齊名豈偶然哉然諸賢臣觀之則論謀國用人王魏不如房杜論曰正已二曰正君三曰謀國四曰用人以唐初肱相資為用其致貞觀之治不亦宜乎正已正君房杜不如王魏四賢如耳目股李靖遇主逢時必當立事立功以取富貴其舅韓擒字藥師姿貌魁竒少有文武材每曰大丈夫若安縣功曹歷駕部貟外郎楊素牛弘皆器之餘見下虎號名將每與論兵必曰可與言孫吳者仕隋為長文京兆三原人也今屬輝州路隸陕西京兆見前注三原縣名大業末為馬邑郡丞朔州路隸河東丞守之二也大業隋煬帝年號馬邑郡今㑹髙祖為太原留守靖觀察髙祖知有四方之志因自鎖上變詣江都都縣隸淮東今揚州路江至長安中即關道塞不通而止髙祖克京城執靖將斬之靖大呼曰聲呼去公起義兵除暴亂不欲就大事而以私怨斬壯士乎太宗亦加救靖髙祖遂捨之武德中以平蕭銑輔公祏功石蕭姓銑名銑音跣祏音䇿髙祖命副趙郡王孝恭討之遂降輔姓公祏名為後梁宣帝曽孫也隋末起兵巴陵自稱梁王靖陳卞叛又詔靖副孝恭討之擒獲遂平淮南道行臺㒒射武德中據丹陽反歷遷揚州大都督府長史州者為大都督長史其上佐也長音掌揚州見上注唐制總十太宗嗣位召拜刑部尚書隸按覆讞禁尚書其長也唐制刑部掌律令刑法徒貞觀二年以本官檢校中書令三年轉兵部尚書為代州行軍總管德初置行軍總管以統軍代州今仍舊隸腹裏唐制武進擊突厥定襄城破之欣州隸腹裏定襄郡名今突厥諸部落俱走磧北土日磧地走音奏沙北在塞北擒隋齊王暕之子限切暕古楊道政及煬帝蕭后送于長安突利可汗來降江切後同可汗蕃王之稱汗音韓凡言可汗並同降下之子名什鉢苾嘗自結于太宗請入朝太宗禮見良猶漢時稱單于中國稱天子也突利可汗始畢可汗衛將軍厚拜右頡利可汗五原北太宗因其地置伊西州處羅可汗之第名莫賀咄設牙直僅以身遁太宗謂曰昔李陵提步卒五千不免身降胸奴兵伐胸奴無救而敗遂降胸奴李陵字少卿漢武帝時為侍中將尚得名書竹帛卿以三千輕騎深入虜庭尅復定襄威振北狄實古今未有足報往年渭水之役矣以功進封代國公此後頡利可汗大懼四年退保鐡山之地西北遣使入朝謝罪後同使去聲請舉國內附又以靖為定襄道行軍總管往迎頡利頡利雖外請降而心懷疑二詔遣鴻臚卿九賔鴻聲臚傳之也唐制掌賔客及凶儀之事秦官典客漢武時更名大鴻臚郊廟行禮讃道唐儉說秦王建大計為天策長史字茂系并州人聞隋政日亂攝户部尚書部掌天唐制户書其長也詔除而非正命謂之攝下土地人民錢穀之政貢賦之差尚將軍安修仁姓安名修仁慰諭之靖謂副將聲去張公謹王世充為洧州長字弘慎魏州人仕入府貞觀初為代州都督謀破頡利有功封鄒國公史挈城歸髙祖授撿校鄒州别駕李績等啓秦王引惠政聞七年卒攺封州都督以曰詔使到彼虜必自寬乃選精騎賫二十日糧引兵自白道襲之公謹曰既許其降詔使在彼未宜討擊靖曰此兵機也時不可失遂督軍疾進行至隂山綿亘數百里在西北之極遇其斥候千餘帳皆俘以隨軍頡利見使者甚恱不虞官兵至也靖前鋒乘霧而行去其牙帳七里頡利始覺列兵未及成陳單馬輕走虜衆因而潰散斬萬餘級殺其妻隋義成公主俘男女十餘萬斥土界自隂山至于大漠漠之地北邉廣遂滅其國尋獲頡利可汗於别部落餘衆悉降太宗大恱顧謂侍臣曰朕聞主憂臣辱主辱臣死往者國家草創突厥強梁太上皇以百姓之故稱臣於頡利朕未嘗不痛心疾首志滅胸奴坐不安席食不甘味今者暫動偏師無往不捷單于稽顙之號猶可汗也單音蟬漢時蕃王耻其雪乎群臣皆稱萬歲官在山下聞若有言萬歲漢武帝禮祭中嶽太室從稱萬歲者本此者三後世臣下尋拜靖光祿大夫尚書右㒒射賜實封五百户又為西海道行軍大總管征吐谷渾切吐胡昆長子之名其孫葉延遂以其名為氏谷渾西域國名本遼東鮮卑徒河涉歸大破其國改封衛國公及靖身亡有詔許墳塋制度依漢衛霍故事功去病尚公主及亡詔與主合葬起冡象盧山衛青霍去病皆漢武時為大將軍討胸奴有大築闕象突厥內燕然山聲燕平吐谷渾內磧石二山以旌殊績亡四字疑誤十八年上幸其第問疾上將伐遼按史傳十四年靖妻卒故有墳塋之詔及靖身容惟東有髙麗未服公意如何對曰臣往者慿藉天東靖入閣賜坐謂曰公南平吳㑹北清沙漠西定慕臣病其瘳矣上愍其羸老不許二十三年薨贈司徒威薄展微效今殘年朽骨唯擬此行陛下若不棄老景武諡曰而能依乘風雲勒功帝籍者豈有它哉特以根于張氏九成曰當隋氏喪鹿之際承唐祖騰龍之時于應機故所嚮有功南平吳北破突厥西走吐谷忠智故功名若是其顯也觀其用兵善于料敵速全矣始能免俘戮終能保厥躬勝于韓信逺矣渾功大寵盛乃能闔户自守以謝過從可謂能自足以仰望清光帝之所推服而師問者獨李靖愚按太宗天資英武善戰無敵一時群臣皆不諸葛武侯與靖耳今世傳武經雖未必出靖之一人而已蓋自孫武以來能將法度之師者獨為竒兵太宗旁擊為正兵大意謂唐之戰勝特手要必有近似者其論霍邑之戰謂建成幾敗也異時太宗伐遼無功而歸謂靖曰吾以天下暗合兵法耳亦猶韓信謂漢髙天授非人力是宗知之蓋指駐蹕之戰請分兵襲平瓖之事也之力屈于小夷何也靖不答所問顧曰兹事道以英衛並稱要之李績非靖之匹彚倫伍也嗚呼即其所至而論靖可謂知兵之聖者歟世虞世南隋俱有重名時人方晉二陸纍遷至祕書郎字伯施性沈靜寡欲篤意學問與兄世基仕黃門侍郎太宗後滅建德引為秦府參軍餘見下文起居舍人從宇文化及至聊城又陷于竇建德僞授㑹稽餘姚人也路餘姚縣名今升為州隸浙東㑹音檜稽音基㑹稽郡名今紹興貞觀初太宗引為上客因開文館館中號為多士咸推世南為文學之宗授以記室與房玄齡對掌文翰嘗命寫列女傳聲去以裝屏風于時無本世南暗書之一無遺失貞觀七年纍遷祕書監太宗每機務之隙引之談論共觀經史世南雖容貌懦弱如不勝衣亂切懦乃字平聲一音儒勝而志性抗烈每論及古先帝王為政得失必存規諷多所𥙷益及髙祖晏駕注謂天子當晨起漢書曰宫車晏駕宫車晚出也按髙祖以貞觀九年五月崩早作而方崩殞故稱晏駕者臣子之心猶謂太宗執喪過禮後同喪平聲哀容毁悴久替萬機文武百寮計無所出世南每入進諌太宗甚嘉納之益所親禮嘗謂侍臣曰朕因暇日每與虞世南商榷古今朕有一言之善世南未嘗不恱有一言之失未嘗不悵恨其懇誠若此朕用嘉焉群臣皆若世南天下何憂不理太宗嘗稱世南有五絶一曰德行聲去二曰忠直三曰博學四曰詞藻五曰書翰及卒切子聿太宗舉哀於别次哭之甚慟喪事官給仍賜以東園祕器也葬具贈禮部尚書書其長也凡既沒而加之以官曰贈唐制禮部掌禮儀祭享貢舉之政尚諡曰文懿太宗手敕魏王泰曰虞世南於我猶一體也拾遺𥙷闕無日暫忘實當代名臣人倫凖的吾有小善必將順而成之吾有小失必犯顔而諌之今其云亡石渠東觀之中無復人矣觀皆藏圖籍祕書之所觀去聲漢置石渠閣東痛惜豈可言耶未幾聲平太宗為詩一篇追思往古理亂之道既而嘆曰鍾子期死伯牙不復鼓琴與伯牙為友伯列子曰鍾子期伯牙絶絃以世無知音者牙鼓琴子期善聽子期死朕之此篇將所示因令後同平聲起居居舍人掌録天子之動作法度以修記事官名唐制門下省置起居郎中書省置起之于國史焉之史書以授褚遂良隸纍遷起居郎十五年拜諌議字登善杭州人博涉經史工楷時拜僕射因沮立武后后立被貶卒大夫兼起居事後授太子賔客髙宗詣其靈帳讀訖焚之其悲悼也若此又令與房玄齡長孫無忌杜如晦李靖等二十四人圖形於凌煙閣詔趙國公長孫按史傳十七年魏徴梁國公房玄齡鄂國公尉遲敬德衛國公李靖無忌河間元王孝恭萊國成公杜如晦鄭國文貞公公屈突通鄖節公殷開山譙襄公柴紹邳襄公長孫宋國公蕭瑀褒忠壯公假志玄䕫國公劉弘基蔣忠國公程知節永興文懿公虞世南渝襄公劉政㑹莒順德鄖國公張亮陳國公侯君集郯襄公張公謹盧寶二十四人可並圖畫於凌煙閣國公唐儉英國公李績胡壯公秦叔安方之二陸在唐以五絶見稱而論議規諷固多張氏九成曰世南始以文翰馳譽陳隋間兄弟長民之利宜其眷眷勤密而見於夢想君臣之情何忠稱𥙷過弼違有犯無隱上贊明聖之德下植生哉其厚臣也終身以正事君將順匡救其弘多矣雖君愚按世南信為德行忠直文章之士唐興之儒以石渠東觀之中無復人亦可惜也矣臣相得之深而未臻大用太宗止嘆息李績太宗諱單名績焉餘見下文本名世績字茂功永徽中以犯曹州離狐人也狐縣名後改南華今廢曹州今仍舊隸腹裏離本姓徐初仕李密為左武候大將軍讓聚衆為盜績往從之密𥘉從楊玄感起兵李密字元邃其先遼東人大業末韋城人翟密後殺讓而人心始離武德初入關見髙祖拜光祿謀事及玄感敗亡命雍丘績說讓奉密為主號魏公反誅卿復以密後為王世充所破人姓支幼從母嫁王氏王世充字行滿本西域隋主侗䇿禪位殺侗自立武德初破李密髙祖詔秦因冒其姓仕隋為民部侍郎隂結豪傑自為太尉矯安族徙于蜀王攻之擒歸長擁衆歸國績猶據密舊境十郡之地州北至魏郡時未有所附績並據之密舊境東至于海南至于江西至汝武德二年謂長史郭孝恪曰後謁秦王上䇿擒竇建德拜上柱國後長音掌郭孝恪許州人初附密為長史為流矢所中而卒遷大總管破龜兹國魏公既歸大唐今此人衆土地魏公所有也吾若上表獻之則是利主之敗自為己功以邀富貴是吾所耻今宜具録州縣及軍人户口總啓魏公聽公自獻此則魏公之功也不亦可乎乃遣使啓密後同使去聲使人初至髙祖聞無表惟有啓與密甚怪之使者以績意聞奏髙祖方大喜曰徐績感德推功實純臣也拜黎州總管州隸腹裏黎州今濬賜姓李氏附屬籍于宗正以别昭穆宗室居之唐制宗正府掌親屬封其父蓋為濟隂王瀆名濟上聲固辭王爵乃封舒國公授散騎常侍制唐從顧問之職掌規諷過失侍尋加績右武候大將軍衛之職唐制武及李密反叛伏誅績發喪行服聲喪平備君臣之禮表請收葬髙祖遂歸其尸於是大具威儀三軍縞素軍中軍三軍上也下軍葬於黎陽山濬州在今禮成釋服而散朝野義之尋為竇建德所攻陷於建德又自拔歸京師州人世為竇建德貝立為夏王建元置官屬武德初擒化及於魏縣進兵農材力絶人大業中募兵伐遼𥙷隊長後據渤海自自拔歸京師四年從太宗平建德於是獲而斬之政績力屈降之收績父為質令績復守黎陽三年績從太宗征王世充竇建德平之貞觀元年拜并州都督改總管曰都督立府置佐并州即太原唐制武德七年令行禁止號為稱職聲稱去突厥甚加畏憚太宗謂侍臣曰隋煬帝不解精選賢良懈解音鎮撫邊境惟逺築長城廣屯將士聲將去以備突厥城西距榆林東至𬗋河旬而畢工隋大業三年詔彂丁男百餘萬築長而情識之惑一至於此朕今委任李績於并州遂得突厥畏威逺遁塞垣安靜豈不勝數千里長城耶其後并州改置大都督府又以績為長史掌長音纍封英國公在并州凡十六年召拜兵部尚書兼知政事績時遇暴疾驗方云鬚灰可以療之太宗自剪鬚為其和藥聲後同為和並去績頓首見血泣以陳謝太宗曰吾為社稷計耳不煩深謝十七年髙宗居春宫轉太子詹事制唐寺十率府之政東宫官掌統三加特進仍知政事太宗又嘗宴顧績曰朕將屬以孤幼囑屬音思之無越卿者公往不遺於李密今豈負於朕哉績雪涕致辭因噬指流血俄沉醉御服覆之副覆音其見委信如此績每行軍用師籌算臨敵應變動合事機自貞觀以來討擊突厥頡利及薛延陀陀貞觀中拔灼立績滅其國置為州縣北狄國名本延陀部與薛種雜居號薛延髙麗等並大破之太宗嘗曰李靖李績二人古之韓白將白起也漢將韓信秦衛霍注見前豈能及也年帝疾謂太子按史傳二十三黜之若其即行俟我死汝用為㒒射親任之若徘徊曰李績才智有餘然汝與之無恩恐不能懷服我今立召進㒒射後欲立武昭儀為后畏大臣異議未决顧望當殺之乃授疊州都督受詔不至家而去髙宗詔績率冊立武氏總章二年卒贈太尉諡曰貞武帝密訪績績曰此陛下家事無須問外人帝意遂定不可託幼孤而寄天下矣以為賢也當任而弗疑范氏祖禹曰太宗以績為何如人哉以為愚也則犬馬畜之也豈堯舜親賢之道乎利祿之士可得何乃憂後嗣之不能懷服先黜之而後用之是以也而使之一言績若以為不可則武氏必不立矣績非惟又曰髙宗欲廢立而猶難于顧命大臣取决于績絶皆績之由其禍豈不博哉太宗以績為忠故託不諌又勸成之孽后之立無忌遂良之死唐室中知人帝其難之信矣以幼孤而其大節如此命而信喻矣逮德下衰疑阻猜二至于刑牲㰱血胡氏寅曰古者不盟結言而退蓋人不愛其情相而善胥命取荀息欲人之惇信而不食言也若李曽未旋踵又已背之是故孔子于春秋不貴盟誓王武廢興之際以一言喪邦則不必待如里克然績齧指出血以受太宗之託若不為負義者而于受託而無一言徒齧指出血而已使當堯舜之智後為隳大節也夫以言許人者猶恐非其本心績遁乎豈得任以託孤之寄則非其所能也按吳起與田文論吕氏祖謙曰太宗以績守邊可謂善用人矣至其起文曰不如治百官親萬民實府庫子孰與起文功起曰將三軍使士卒樂死敵國不敢謀子孰與主少國疑大臣未附百姓不信方是之時屬之子曰不如此三者皆出吾下而位加吾上何也文曰于長城是亦吳起之所長而太宗以之處田文之乎屬之我乎起默然良久曰屬之子矣蓋績之賢敗也任宜其固可任以事至于關朝廷之重則非不負者能之葉氏適曰績本無甚所長只是不負人夫不負人所在彼其不學誠不識此噫以周勃之少文幾陷如立武氏之說彼豈有意于負太宗者奈何利害無術所以致也况績以一言之失豈知他日之禍吕氏之禍以霍子孟之重厚猶有所不免皆不學哉如此不及漢髙逺矣其間章章較著者李績之事是愚按太宗英武將略優于漢髙至于知人料事特太宗不能知至今人不能知何也績始事翟也自今觀之績之為人外若純慤內任術數非屈伏請降復不能死績始與單雄信誓同死生讓讓為李密所誅績不能死後為竇建德所敗生則推功死則收葬太宗信其區區之小節遂雄信誅又不能死其名節如此獨于李密之敗都督謂太子曰績若即行汝用為相若不即行謂可以託孤過矣太宗之將終也黜績為疊州可謂精矣孰知績之術數又髙出于其上哉厥汝必殺之績聞命不辭家而去夫太宗之術數盡於武氏之手蓋太宗以術數待績故績亦以後武氏之立竟以績一言而定而唐之子孫幾其弟曰我見房杜辛勤起家皆為不肖子所敗術數報之固不暇為唐社稷計也績之將死告舉兵覆宗至毁冡而暴骨嗚呼績所任之術數吾後子孫有交遊非類者汝必殺之異時敬業君子惡任智而大居正也至是而無所施其巧矣是以馬周不治事而去密州趙仁本髙其才厚贈使入關字賔王家貧嗜學資志曠逺武德中𥙷州助教主人不之顧周命酒一斗八升悠然獨酌衆異之餘留汴為浚儀令崔賢所辱遂感激而西舍新豐逆旅文見下博州茌平人也茌平縣名今仍舊隸山東茌士疑切博州今東昌路貞觀五年至京師舍於中郎將屬掌校尉旅帥及親勳翊去聲唐制中郎將太子府屬衛之常何之家史無傳常姓何名時太宗令百官上書言得失後同令平聲周為何陳便宜二十餘事聲為去令奏之事皆合㫖太宗怪其能問何何對曰此非臣所發意乃臣家客馬周也太宗即日召之未至間凡四度遣使催促聲使去及謁見與語其恱令直門下省授監察御史軍戎祭祀營作太府出納皆隸焉唐制掌分察百寮巡按州郡獄訟纍除中書舍人奏參議表章唐制掌侍進周有機辨能敷奏深識事端故動無不中聲去太宗嘗曰我於馬周暫時不見則便思之十八年歷遷中書令字如兼太子左庶子周既職兼兩宫處事平允聲處上甚獲當時之譽又以本官攝吏部尚書太宗嘗謂侍臣曰周見事敏速性甚慎至貞正一作至於論量人物聲量平直道而言朕比任使之鼻比音多稱朕意聲稱去既寫忠誠親附於朕實藉此人共康時政也股肱之寄要在忠力周疾甚詔使視護躬為調藥周按史傳帝嘗以飛白書賜周曰鸞鳯冲霄必假羽翼不為也二十一年卒按此章曰貞觀五年周為何陳以所上章奏悉焚之曰管晏暴君之過取身後名吾上封事唐曆曰三年六月詔文武官言得失馬周代便宜與舊史同通鑑考異曰五年周見有詔令百官政要而吳氏所紀是也常何陳事舊史或本于天下事若素䆠于朝明習憲章者其自視與築巖宋氏祁曰周之遇太宗顧不異哉由一介草茅言一時君宰間不膠漆而固恨相得晚宜矣然周才釣渭亦何以異迹夫帝鋭于立事而周所建皆切世未有述焉惜哉不逮傅說吕望使後四使催趣飛白之賜皆異寵也惜周不及四子功唐氏仲友曰觀太宗待遇馬周過于房杜王魏如矣然周之才豈獨不及說望而已哉業止此史氏謂君宰不膠漆而固信技業初無太過于人而無知以舉陳平而獲賞常林氏之竒曰魏無知之在漢常何之在唐其才能之名託于馬周以為萬世不朽之傳由此觀之人何以舉馬周而受賜故無知之名託于陳平常何盡出于己哉之有善豈必君臣相得建事立功者不多見于後世矣太宗愚按自耕莘飯牛築巖釣渭由匹夫而升朝著遂以布衣起新豐逆旅濟濟清要卒如覽奏之覽常何之奏而知其非何所為何又能以實告乎周固未可以並驅先哲而太宗則可謂有古所見若馬周固偉矣太宗之知人得不尤偉矣遺風焉先哲王之求諌第四一章凡十太宗威容儼肅百僚進見者現見音皆失其舉措太宗知其若此每見人奏事必假顔色兾聞諌諍知政教得失貞觀初嘗謂公卿曰人欲自照必須明鏡主欲知過必藉忠臣主若自賢臣不匡正欲不危敗豈可得乎故君失其國臣亦不能獨全其家至於隋煬帝暴虐臣下鉗口淹切鉗巨卒令不聞其過令平聲卒子聿切遂至滅亡虞世基等尋亦誅死前事不逺公等每看事有不利於人必須極言規諌為難矣非惟能容人之諌又導人而使之諌非愚按太宗之求諌可謂切矣而其納諌亦可以非特大臣能諌小臣如皇甫德參無不諌也非惟不怒人之諌又賞人而使之諌故一時之臣臣能諌武臣如尉遲敬德亦無不諌也非特廷特內臣能諌外臣如李大亮無不諌也非特文能諌固也侫臣如裴矩亦諌焉中國之臣能諌臣能諌宫妾如充容徐惠亦無不諌也賢臣而而下求諌之誠納諌之美未能或之先也觀其固也夷狄之臣如契苾何力亦諌焉蓋自三代鑒煬帝滅亡故嘗求人使諌諍夫能鑒隋之亡貞觀之初自以威容儼肅故嘗假人以顔色深故能化及一時大小咸諌雖古昔謗木諌旌之則內有樂諌之實假人以色則外無拒諌之容之也史臣置此于求諌之首其有深意哉盛無以加焉蓋由初年二者實有以感召貞觀元年太宗謂侍臣曰正主任邪臣不能致理正臣事邪主亦不能致理惟君臣相遇有同魚水則海內可安朕雖不明幸諸公數相匡救朔數音兾憑直言鯁議在喉也鯁音梗刺致天下太平諌議大夫王圭對曰臣聞木從繩則正后從諌則聖辭明諌之不可不受商書傅說告髙宗之是故古者聖主必有爭臣七人言而不用則相繼以死臣七人雖無道不失其天下爭讀曰諍孝經曰天子有爭陛下開聖慮納芻蕘愚臣處不諱之朝聲處上實願罄其狂瞽太宗稱善詔令自是宰相入內相去聲令平聲平章國計必使諌官官左右唐制諌夫八人掌諌論得失侍從贊相左右𥙷闕十二人掌散騎常侍四人常規諷過失侍從顧問左右諌議大事左右拾遺十二人掌同𥙷闕供奉諷諌大事廷議小事則上封隨入預聞政事有所開說必虛已納之書門下同三品官入閣按通鑑曰詔諌官隨中至廣也軍國之機至要也雖明主聽斷賢相謀議孔氏甫曰太宗之任諌官真得其道夫天下之務聞得以關說或有缺失從而正之豈不美乎然大思慮之失亦不能免當君相論事之際使諌官預馭大臣使之無過之術耳若以諌官小臣不可預臣論事規正于人君之前安有不從之議兹亦制救過或已彰而不可言故剛直之臣有激許不顧聞國謀必衆知缺失方許諌正事或已行而不可大臣之罪愈大矣太宗任諌官可謂真得其道以爭之者君從之猶掩其過或不從則君之過有天下者皆可行是為王者師也雖然諌官盡如胡氏寅曰有失輒許諌官諌止貞觀致治之本凡承大臣風㫖而言可聽矣苟徒有聽諌之名而不魏徴禇遂良王圭之徒則上不懾人君威嚴下不不之覺其弊有甚于不置諌官者故耳目之任以擇忠直識治之士則或訐或比隂行其私而人主要也得人為相制天下事豈必盡能無失誠使諌官得隨事言尹氏起莘曰夫官以諌為名所言必本于公而宰宫入閣或非大臣之所樂也必有英明之君體而之則不待命令已行而後救之于末流矣雖然諌治可復見矣行之則貞觀之𬗋宸殿復移仗御便殿百官隨入曰入閣太宗愚按唐制入閣儀最為後世美稱蓋天子既御君相一體固也而宰相入內必使諌官隨之則用王圭言詔諌官隨中書門下同三品入閣夫之美歟愚有望後世之君人也君臣舉無過矣兹太宗所以致治貞觀二年太宗謂侍臣曰明主思短而益善暗主護短而永愚隋煬帝好自矜誇聲好去護短拒諌誠亦實難犯忤虞世基不敢直言或恐未為深罪昔箕子佯狂自全孔子亦稱其仁紂無道諌之紂囚之為奴箕箕國名子爵也紂之諸父見微子去之箕子為之奴比干諌而死也子因徉狂而受孔子曰殷有三仁焉謂及煬帝被殺世基合同死否杜如晦對曰天子有諍臣雖無道不失其天下仲尼稱直哉史魚邦有道如矢邦無道如矢史魚自以不能進賢退不肖既死猶以尸諌事見仲尼孔子字史官名魚衛大夫名鰌如矢言直也語家世基豈得以煬帝無道不納諌諍遂杜口無言偷安重位又不能辭職請退則與箕子徉狂而去事理不同昔晉惠帝子也西晉昏庸之主姓司馬名衷武帝次賈后後為趙王惠帝之后詔賜死倫所廢矯將廢愍懷太子殺趙王倫後諡曰愍懷名遹惠帝太子為賈后所司空張華范陽人也惠帝時為丞相司空三公之官張華字茂先竟不能苦爭阿意茍免及趙王倫子後以篡逆誅死字子彛晉宣帝第九舉兵廢后遣使收華後同使去聲華曰將廢太子日非是無言當不𬒳納用後同當去聲其使曰公為三公太子無罪𬒳廢言既不從何不引身而退華無辭以答遂斬之夷其三族古人有云危而不持顛而不扶則將焉用彼相于焉去聲䖍切相故君子臨大節而不可奪也之辭皆論語張華既抗直不能成節遜言不足全身王臣之節固已墜矣虞世基位居宰輔在得言之地竟無一言諌諍誠亦合死太宗曰公言是也人君必須忠良輔弼乃得身安國寧煬帝豈不以下無忠臣身不聞過惡積禍盈滅亡斯及若人主所行不當臣下又無匡諌苟在阿順事皆稱美則君為暗主臣為諛臣君暗臣諛危亡不逺朕今志在君臣上下各盡至公共相切磋以成理道公等各宜務盡忠讜匡救朕惡終不以直言忤意輒相責怒可謂兩得其道矣蓋君知所以歸咎于君則為愚按太宗之問歸咎于君如晦之對歸罪于臣臣也必能盡臣之道矣太宗君臣辭令之間豈君也必能盡君之道臣知所以歸咎于臣則為不以直言忤意輒相責怒可謂尤賢也已况斯非兩得其道哉然太宗因是而求言于臣謂終熙太宗方以行帝王道有既效之語固宜望侍時也正年榖豐熟百姓樂生邇安內肅上恬下此古先哲王處治安之大猷也太宗有焉臣以匡救之益也制治于未亂保邦于未危貞觀三年太宗謂司空裴寂晉陽宫副監秦王方建字玄真蒲州人仕隋為人私侍髙祖脅從之武德初拜㒒射呼裴監不名貞大計未敢白髙祖以寂最善遂以情告之寂乃以宫既而寂率家僮破羌帝念寂詔入朝㑹卒封河東公觀初進拜司空後坐罪放靜州㑹羌反或言寂為主曰比有鼻比音上書奏事條數甚多朕總黏之屋壁出入觀省切悉井所以孜孜不倦者欲盡臣下之情每一思政理或三更方寢聲更平亦望公輩用心不倦以副朕懷也思兼三王夜以繼日經綸萬化皆是心也聖哲愚按成湯之聖昧爽丕顯坐以待旦周公之聖群臣同心不倦是心也坐以待旦之心乎夜以猶爾况賢王乎太宗每思政理或至三更猶望心乎􅊨繼日之貞觀五年太宗謂房玄齡等曰自古帝王多任情喜怒喜則濫賞無功怒則濫殺無罪是以天下喪亂莫不由此朕今夙夜未嘗不以此為心恆欲公等盡情極諌公等亦須受人諌語豈得以人言不同已意便即護短不納若不能受諌安能諌人受欲之難違以明已之不易然其言則善矣非惟胡氏寅曰太宗俾大臣受諌蓋欲大臣知諌之難代人君必有師友後世師難其人得端良正直之責其臣以諫君又訓其臣以正已切磋之義也三成德而寡過太宗勉此不怠其致升平之治宜哉士使􅊰論經訓規針闕失如三益之友則亦可以能納諌可以為賢矣而又勸其臣使受人之諌愚按太宗之納諌真三代以下之所無有也巳人至哉言乎蓋必已能遷善而後能告其君以可不謂尤賢乎哉且其言曰不能受諌安能諌清靜之治資蓋公之一言仁傑成中興之功賴善已能改過而後能正其君之過是故曹參成受人之直言而望其直言于主不亦難乎行冲之藥石傳曰惟善人能受直言已不能貞觀六年太宗以御史大夫正百官之罪惡御史臺唐制以掌刑法典章紏也之長韋挺德七年或言太子與宫臣謀逆帝專責宫京兆人少與隱太子善後為大子宫臣武魏王府事復攺太常卿帝討遼東命挺主餉料運渠臣遂流巂州貞觀初王圭數薦之拜御史大夫俄兼泮帝怒廢為民塞不通挺以待凍中書侍郎大政參議焉臨軒冊命唐制二令之職也朝廷疏而奏之獻贄幣則受以付有司則為使以授之四夷來朝則受其表杜正倫隋世舉相州人纍進中書侍郎後行左庶子漏泄帝怒太子廢坐流秀才貞觀初魏徴薦之擢兵部員外郎遷知起居注令出為橫州刺史卒歡州顯慶初遷中書祕書少監書監之二職也少去聲唐制祕虞世南著作郎志祝文祭文與佐郎分判局事唐制祕書省屬官也掌修撰碑姚思廉簡名祖定京師府僚皆奔獨思廉侍王帝義之授秦王府以字行京兆人仕隋為河間郡司法遷代王侍郎髙館學士遷著作郎文學王即位攺弘文等上封事稱旨聲稱去召而謂曰朕歷觀自古人臣立忠之事若值明主便宜盡誠規諌至如龍逄比干之賢臣皆以忠諌見殺龍逢桀之賢臣比干紂不免孥􅓍也謂併妻子而戮之也一作仇戮孥子也戮殺為君不易切以豉為臣極難朕又聞龍可擾而馴循音然喉下有逆鱗卿等遂不避犯觸各進封事常能如此朕豈慮宗社之傾敗每思卿等此意不能暫忘故設宴為樂洛音仍賜絹有差有功見知猶恱况諌諍而見知乎設宴賜帛謂思唐氏仲友曰此太宗見諌者恱而從之之一事也嘉賔之意亦太宗行王道之一端也至意故舉酒相樂具有鹿鳴燕忠臣奬進激勸之道可謂至矣而且以觸鱗為喻使愚按太宗以廷臣上封事稱㫖設宴賜帛所以龍逢比干之誅事無道之君而然也以太宗之臣下知觸忤之必無罪則將犯顔而進諌也且君戮諫臣以為戒亦聖王兢懼之意歟聰明英睿夫豈有是哉而能以無道之太常卿廟社稷之事唐制掌禮樂郊韋挺嘗上疏陳得失太宗賜書曰所上意見極是讜言辭理可觀甚以為慰昔齊境之難聲去夷吾有射鉤之罪蒲城之役勃鞮為斬𬒮之仇而小白不以為疑重耳待之若舊射鉤事見任重平聲夷吾勃鞮殺重耳重耳踰垣勃鞮逐斬其衣祛重耳奔狄賢篇注勃鞮晉寺人披也重耳晉文公名晉獻公使以告求見解前罪文公使人讓之勃鞮曰臣不敢以後重耳歸晉即位為晉君懷公之黨欲弒之勃鞮欲國其無蒲狄乎於是見之一心事君故得罪君已反豈非各吠非主吠堯堯非漢書桀犬非其主耳不仁特吠志在無二卿之深誠見於斯矣若能克全此節則永保令名如其怠之可不惜也勉勵終始垂範將來當使後之視今亦猶今之視古不亦美乎朕比不聞其過鼻比音未覩其闕賴竭忠懇數進嘉言音數朔用沃朕懷一何可道章今按不同分為二章舊本此與上章通為一之管仲晉之勃鞮為喻夫齊晉二伯主置射鉤愚按太宗賜書韋挺示至公用人之道而舉齊觀之懷公入國狐突之子毛及偃從重耳懷公斬袂而用二子二子亦能盡忠于其君矣然嘗委質二乃辟也狐突寧死而毛偃事文公不二命突召其子狐突曰子之能仕父教之忠䇿名仲勃鞮又若之何而可哉若以狐突之言律之則管貞觀八年太宗謂侍臣曰朕每閒居靜坐則自內省切悉井恆恐上不稱天心聲稱去下為百姓所怨但思正人匡諌欲令聲平耳目外通下無怨滯又比見鼻比音人來奏事者多有怖懾懼也音輒言語致失次第尋常奏事情猶如此况欲諌諍必當畏犯逆鱗所以每有諌者縱不合朕心朕亦不以為忤若即嗔責深恐人懷戰懼豈肯更言非特萬鈞也開導而求諌和顔色而受之人猶愚按昔漢賈山曰人主之威非特雷霆也勢重不厭天心下為百姓所怨以自省固宜開導人恐懼不敢自盡况震之以威怒乎太宗每以上充太宗之量何慮人臣之不忠諌哉言和顔聽納也為人君者思賈山之言貞觀十五年太宗問魏徴曰比來鼻比音朝臣都不論事何也徴對曰陛下虛心採納誠宜有言者然古人云未信而諌則以為謗己信而不諌則謂之尸祿語論謗己也尸祿謂尸位而竊祿子夏曰信而後諌未信則以為但人之才器各有不同懦弱之人懷忠直而不能言踈逺之人恐不信而不得言懷祿之人慮不便身而不敢言所以相與緘默俯仰過日太宗曰誠如卿言朕每思之人臣欲諌輒懼死亡之禍與夫扶音赴鼎鑊霍音冒白刃亦何異哉故忠貞之臣非不欲竭誠竭誠者乃是極難所以禹拜昌言益稷謨語見虞書豈不為此也聲為去朕今開懷抱納諌諍卿等無勞怖懼遂不極言之多寡固可自察其身之得失也諌者多必吾之朱氏黼曰言路通塞關君德之盛衰人主因言者人之色苦口而無隱必吾無好侫之心一或反是能聽諌者直必吾之能容犯顔而不憚必吾無拒樂諛而畏忠也大宗即位之初虛心訪納故論諌則是吾德之不進吾心之不大吾之好侫而惡直猶昔而論事之誠頓爾銷减帝而內省當必有以者步隨袂接表疏之進笥溢几盈一日萬機在今問徵以愛身畏罪為告蓋欲使帝自悟耳帝以赴致此者始導諌中恱從終勉强徴屢論矣今猶此能深自克責復為敷求也鼎冒刃為開說之比終不于昔時聞過必攺少虧于曩日十三年又謂陛愚按貞觀十五魏徴謂陛下欲善之志不及亦少貶矣尚幸勉強欲善之意猶能自克故能下志業比貞觀初漸不克終者凡十事則君德徴警戒不克終之後得無或如徴之言乎後之開導聽納至謂群臣近來都不論事則又在魏始而敬終也人君所宜慎貞觀十六年太宗謂房玄齡等曰自知者明信為難矣如屬文之士囑屬音伎巧之徒皆自謂已長他人不及若名工文匠商略詆訶蕪詞拙跡於是乃見由是言之人君須得匡諌之臣舉其愆過愆同愆與一日萬機一人聽斷雖復憂勞安能盡善常念魏徴隨事諌正多中朕失聲中去如明鏡鑒形美惡必見因舉觴賜玄齡等數人勗之切勉也勗吁玉齡嘗念魏徴隨事諌正如鏡照形美惡必見舉愚按魏徴以貞觀十七年春正月卒太宗謂玄極言無隱也然此言恐在徴卒之後未必在十觴賜玄齡等數人以朂之蓋欲群臣亦如徴之也六年貞觀十七年太宗問諌議大夫禇遂良曰昔舜造漆器傳造漆器自舜始漆木名可以髹物世禹雕其爼雕鏤飾也爼薦肉之器當時諌者十有餘人食器之間何須苦諌遂良對曰雕琢害農事纂組傷女工繡作也組音祖首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諌其漸及其滿盈無所復諌缶復音太宗曰卿言是矣朕所為事若有不當聲去或在其漸或已將終皆宜進諌比見前史鼻比音或有人臣諌事遂答云業已為之或道業已許之竟不為停改聲為去此則危亡之禍可反手而待也為二章仍按通鑑標年于此章之首舊本此與前章通為一章今按不同分邪于未形也若其已然則衆人之所能知也何賴范氏祖禹曰所貴乎賢者為其能止亂于未然間古無事之時常患乎諌之難入也故聖主能從諌于賢乎危亡之言惟明主能信暗主忽焉是以自忠臣之事上君也亦諌其未然事中君也多諌其于未然賢主能攺過于巳然諌而不聽斯為下矣虞之時群聖聚于朝無過舉矣憂其所當憂戒其已然事暗君也救其橫流故有以諌殺身者矣唐世令王其賢臣多諌其已然而防其未然太宗求所當戒故常有警懼之言其慮患豫防也至于後於防未然者乎諌于群臣其有意纎過必針與太保旅􅋙同意荀卿謂事聖君有聽唐氏仲友曰遂良之對是矣抑猶有說舜禹大聖豈知言哉從無諌爭不盛以土簋將為犀玉之杯玉杯象箸必不羮愚按昔商紂始為象箸箕子嘆曰彼為象箸必臺廣室稱此以求天下不足矣逺方珍怪之物菽藿衣短褐而舍于茅茨之下則錦衣九重髙之言其意蓋亦若此也然所謂滿盈無所復諌輿馬宫室之漸自此而始故吾畏其卒也遂良之言有足以救斯言之失也則似非忠臣愛君之語幸太宗納諌第五一類附此篇之後凡十章直諌另為貞觀𥘉太宗與黃門侍郎王圭宴語年十二月以黃通鑑作貞觀二中上嘗閒居與圭語門侍郎王圭為守侍時有美人侍側充世婦之數美人女官九員本廬江王瑗之姬也哲生瑗武德末為幽州都督右廬江王名瑗太祖生蔚蔚生哲後瑗傳首至京師領軍王君廓誘瑗反瑗敗籍沒入宫太宗指示圭曰廬江不道賊殺其夫而納其室暴虐之甚何有不亡者乎圭避席曰陛下以廬江取之為是邪為非邪太宗曰安有殺人而取其妻卿乃問朕是非何也圭對曰臣聞於管子曰八篇曰管子管仲著書十齊桓公之郭國白郭小國齊齊桓公名小猶往也滅之之問其父老曰郭何故亡父老曰以其善善而惡惡也下如字後同惡惡上烏去聲桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也管子之言以為喻也去上聲後同已上王圭述今此婦人尚在左右臣竊以為聖心是之陛下若以為非所謂知惡而不去也太宗大恱稱為至善遽令以美人還其親族而甚重其言與此異通鑑考異曰太宗賢令平聲按新舊史皆云帝雖不出此美人又非嬖寵著名之人太宗何愛而留之此章為是也主既重圭言何得反棄而不用乎且美人泛侍左右之際人所難言可謂無慙于魏徴矣唐氏仲友曰王圭納諌皆人主情欲王圭之直言無諱言人之所難言太宗之攺過愚按春秋傳曰人誰無過過而能改善莫大焉太宗納諌之美方之古昔何以尚兹不吝攺人之所難改王圭進諌之誠貞觀四年詔發卒修洛陽之乾元殿地今河南路乾洛陽古成周之所建元殿隋以備巡狩巡狩巡狩者巡所守也孟子曰天子適諸侯曰給事中制唐寫校讎之課大事覆奏小事署而行之掌侍左右分判省事之官察弘文館繕張玄素人仕蒲州曰此清吏殺之是無天也遂釋之貞觀𥘉召問以政隋為景城縣户曹竇建德陷景城將殺之邑人號泣罪為民頃之召授剌史麟德初卒道歷太子詹事遷左庶子㑹東宫廢坐上書諌曰陛下智周萬物囊括四海令之所行何往不應志之所欲何事不從微臣竊思秦始皇之為君也藉周室之餘因六國之盛將貽之萬葉及其子而亡下大亂秦并周之季世天世以數計二世三世至于萬世傳之無窮始皇歿二吞之六國齊椘燕韓趙魏也始皇曰朕為始皇帝後嬰立而遂降于漢世立而趙髙弒之子諒由逞嗜奔欲逆天害人者也是知天下不可以力勝神祇不可以親恃惟當弘儉約薄賦斂聲去慎終始可以永固方今承百王之末屬凋弊之餘必欲節之以禮制陛下宜以身為先東都未有幸期即令𥙷葺聲令平諸王今並出藩又須營構興發數多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毁天下翕然同心傾仰豈有初則惡其侈靡去聲惡烏今乃襲其雕麗其不可二也每承音㫖未即巡幸此乃事不急之務成虛費之勞國無兼年之積何用兩都之好西都長安也兩都東都洛陽勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立聲粗平飢寒猶切生計未安三五年間未能復舊奈何營未幸之都而奪疲人之力其不可四也昔漢髙祖將都洛陽婁敬一言即日西駕敬齊人髙祖在洛陽敬說曰陛下取天下與周漢髙祖姓劉名邦沛人伐秦得天下國號漢婁關便即日駕西都長安賜敬姓劉氏拜郎中異宜入關而都按秦之故上未决張良言入豈不知地惟土中貢賦所均但以形勝不如關內也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣嘗見隋室𥘉造此殿楹棟宏壯大木非近道所有多自豫章採來郡名豫章隸江西今龍興路二千人拽一柱其下施轂皆以生鐡為之中間若用木輪動即火出略計一柱已用數十萬則餘費又過倍於此臣聞阿房成秦人散政體篇注房音旁見章華就楚衆離臺納亡人以實之椘靈王為章華之乾元畢工隋人解體且以陛下今時功力何如隋日承凋殘之後役瘡痍之人費億萬之功襲百王之弊以此言之恐甚於煬帝逺矣深願陛下思之無為由余所笑戎王使由余由余西戎人人為之亦苦民矣公怪之問曰中國以詩書禮樂法觀秦繆公示以宫室積聚由余曰鬼為之則勞神矣余笑曰此乃中國所以亂也云云出史記度為政然尚時亂今戎夷無此何以為治由則天下幸甚矣太宗謂玄素曰卿以我不如煬帝何如桀紂對曰若此殿卒興聿切卒子所謂同歸於亂太宗嘆曰我不思量聲平遂至於此顧謂房玄齡曰今玄素上表洛陽實亦未宜修造後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古來不易切以豉非其忠直安能如此且衆人之唯唯葦並音不如一士之諤諤可賜絹五百匹魏徴嘆曰張公遂有回天之力可謂仁人之言其利博哉始平太上皇詔宫室過度者按史傳此疏有曰臣聞東都為盛德今復度而營之是隋役又興不五六年間一焚之陛下謂瓦木可用請賜貧人事雖不從天下稱朕營之意欲便四方百姓今玄素言如此使後必往捨一取天下將謂何帝顧玄齡曰洛陽朝貢天下中苦即詔罷役雖露坐庸何以來直言故羣臣爭救其失惟恐其言之不切太范氏祖禹曰上之所好者下之所競也太宗虛已之所難能也夫如是何患于有過乎宗不惟恱而從之又賞以勸之此人君非至誠切直豈足以遇合始玄素以小吏在擾攘張氏九成曰古人以片言干知已以疏賤投至貴役懇切疏諌遂有回天之力惜乎匪人淫慢厭疾間蒙天子訪問隋唐興替之由遂獲寵遇洛陽之此忠良所以于悒而痛哭也忠誨功無成而遷播之禍至為之桀紂天下之至惡也故人情莫不耻言之世吕氏曰堯舜天下之至善也故人情莫不欲為亦未嘗不非桀紂而未必不為桀紂之所為如之為人君者未嘗不是堯舜而未必為堯舜之所惟聖明之君知所以為堯舜者在於力行而不在是則雖知以堯舜自名而未必不為桀紂之歸也怒夫然後可以進于堯舜則漢髙祖唐太宗其人於空言苟其行之未善人雖𬒳以桀紂之名而不謂玄素曰我何如桀紂對曰此役不息同歸于亂也髙祖問周昌曰我何如主對曰桀紂之主太宗二君受之雖不能盡如堯舜而亦堯舜之徒耳此夫二君三代而下之英主也雖其臣比之桀紂而不敢為桀紂之歸也無他知以桀紂自警故都鎬京也洛為東都于此而朝諸侯焉漢之都愚按洛邑為土中以四方貢賦道里均也周之洛陽與周漢同天下既平修治洛邑若未甚害長安也洛有南宫于此而臨幸焉唐都長安視納玄素之諌遽令罷役善矣它日飛山翠微玉也然洛陽多隋宫室制度過侈非所宜修太宗能追思玄素之言則尤善矣華之役又非洛陽陪京之事勢太宗有一駿馬特愛之恆於宫中養飼無病而暴死太宗怒養馬宫人將殺之皇后氏長孫諌曰昔齊景公以馬死殺人名杵臼齊景公晏子請數其罪云名嬰字平仲數上聲晏子夫齊大爾養馬而死爾罪一也使公以馬殺人百姓聞之必怨吾君爾罪二也諸侯聞之必輕吾國爾罪三也公乃釋罪陛下嘗讀書見此事豈忘之邪太宗意乃解又謂房玄齡曰皇后庶事相啓沃極有利益爾觀太宗欲殺宫人之事蓋亦有三失焉何也不愚按晏子諌齊景公有三罪之說其意美矣今宫人則任非其任矣以馬死而欲殺人則刑非寶賢而寶駿馬則寶非其寶矣不任牧人而牧乎史稱太宗有壯馬不能御則天時為宫人進其刑矣向非文德皇后之諌豈不為盛德之纍曰鐵檛檛其首三曰匕首斷其喉太宗壯之夫而言曰妾有三物能御之一曰鐵鞭鞭其背二知宫人之中有善御馬如則天者已潜擬于其太宗使宫人養馬不過一時溺于嗜好而巳孰可畏哉後乎吁貞觀七年太宗將幸九成宫宫也隋仁夀散騎常侍姚思廉進諌曰陛下髙居𬗋極寧濟蒼生應須以欲從人聲應平不可以人從欲然則離宫遊幸此秦皇漢武之事武帝姓劉名徹國號漢始皇姓嬴名政國號秦故非堯舜禹湯之所為也言甚切至太宗諭之曰朕有氣疾熱便頓劇故非情好遊幸聲好去甚嘉卿意因賜帛五十假欲觀舍利以狄仁傑之言而止夫漢元庸君則愚按漢元欲乘樓船以薛廣德之言而止則天者乎思廉九成之諫非不切也太宗氣疾之喻天女主尚能攺過不吝况如太宗之素號納諌人君之過可以賄賂而免人臣之直諌可以賄亦近于飾非矣且既不從其言復多賜之帛是思廉之受胥失之矣賂而移也太宗之賜貞觀三年李大亮授土門令擊盜皆降擢金州司馬京兆人有文武才髙祖入關自歸撫大使以綏諸部降者八年討吐谷渾有功進爵為貞觀初授太府卿復出為凉州都督俄為西北道安終表請罷遼東役公拜右衛將軍臨為凉州都督州隸甘肅凉州今西凉嘗有臺使至州境後同使去聲見有名鷹諷大亮獻之大亮密表曰陛下久絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自擅便是使非其人太宗下書曰以卿兼資文武志懷貞確故委藩牧守也藩屏牧當兹重寄比在州鎮鼻比音聲績逺彰念此忠勤豈忘窹寐使遣獻鷹遂不曲順論今引古逺獻直言披露腹心非常懇到覽用嘉歎不能已已有臣若此朕復何憂宜守此誠終始若一詩云靖恭爾位好是正直神之聽之介爾景福小旻篇之辭好去聲詩小雅古人稱一言之重侔於千金卿之所言深足貴矣今賜卿金壺瓶金碗各一枚雖無千鎰之重十四兩為鎰鎰音益重二是朕自用之物卿立志方直竭節至公處職當官聲處上每副所委方大任使字如以申重寄公事之間宜觀典籍兼賜卿荀恱漢紀一部為祕書監撰漢紀三十卷荀恱字仲豫頴川人後漢時此書叙致簡要論議深博極為政之體盡君臣之義今以賜卿宜加尋閲本舊初今按通鑑標年此章之首曰貞觀誠三者全備可謂賢矣大亮文武才幹而諌獻鷹張氏九成曰事君必以忠立忠必以才行已必以以忠誠耳房喬稱有陵勃之節詎不信夫近于忠太宗親任之篤蓋才兼文武而濟之諭亹亹不啻如飢渴之于飲食是宜列在外服愚按太宗之朝臺閣侍從之臣獻可替否必開亮求鷹之諌太宗非惟恱從之又賞賚之盛哉之臣亦不肯順㫖曲從敢踰位而言也若李大月獻納也逺方藩臣不在君側寧咈㫖而不顧太宗之納諫也然廷臣進諌猶曰朝夕論思日此尤藩臣之所當則效也身若大亮者可謂忠臣也已貞觀八年陜縣丞陜州隸河南陜縣今仍舊屬皇甫德參姓德參皇甫復也名上書忤㫖太宗以為訕謗諫切訕所侍中魏徴進言曰昔賈誼當漢文帝上書云云可為痛哭者一可為長歎息者六帝召為博士後為梁懷王傅上書陳事多漢文帝名恆髙祖次子也賈誼洛陽人文者一可為流涕者二可為長太息者六所匡建其略曰臣竊為事藝可為痛哭自古上書率多激切若不激切則不能起人主之心激切即似訕謗惟陛下詳其可否太宗曰非公無能道此者令賜德參帛二十假言修洛陽宫勞人收地租厚斂俗好令平聲按通鑑中牟丞皇甫德參上不役一人不收斗租宫人皆無髮乃可其意耶欲治髙髻蓋宫中所化上怒謂房玄齡等曰德參欲國家乃賜絹二十四匹它日徴奏言陛下近日不好直言訕謗之罪魏徴諌曰云云上曰朕罪斯人則誰敢言拜監察御史與此章雖小異而詳故附見焉雖勉強含容非曩時之豁如上乃更加優賜宫室惡其侈也即欲修建雖為諌少輟然意終不胡氏寅曰無常者惟人心乎太宗初下洛陽毁隋之難回也太宗克己從諌終自勉焉其心術有蔽已竟使成之最後并怒諌者欲加之罪何其一念何則亦觸情縱欲猶蒹葭萑葦寧有既耶不能自祛猶如此况不能克己從諌者宜如之始怒皇甫德參而欲罪之復從徴言德參遂愚按為人上者甚矣虛心聽納之難也以太宗不貴無過而貴改過太宗之謂矣然忤㫖之怒擢髙官膺厚賞始也怒人之言終也從人之諌之忠鯁其為君德之纍豈少哉德參區區一縣其中心之發見耶抑一時磯激而然耶向非徴尤可為微臣之則效也丞耳乃能奮不自顧如此貞觀十五年遣使詣西域域西夷之國也使去聲後同西立葉護可汗未還葉護嗣其兄射匱可汗乃號葉護可汗是年葉音攝葉護突厥大臣之號也本曰葉護統大師持節即其所號立為可汗賜以鼓纛葉護數遣使入貢秋七月左領軍將軍張又令人多賫金帛後同令平聲歷諸國市馬魏徴諌曰今發使以立可汗為名可汗未定立即詣諸國市馬彼必以為意在市馬不為専立可汗為去聲不為之可汗得立則不甚懷恩不得立則生深怨諸蕃聞之且不重中國但使彼國安寧字使如則諸國之馬不求自至昔漢文帝有獻千里馬者曰吾吉行日三十幸祭祀也吉行謂巡凶行日五十謂出兵行師也凶漢書作師凶行鸞輿在前作旗輿漢書屬車在後囑漢屬音十一乘相屬也因秦制大車八吾獨乘千里馬將安之乎猶往也乘平聲之乃償其道里所費而返之又光武興之君名秀漢中有獻千里馬及寶劔者馬以駕鼓車劒以賜騎士今陛下凡所施為聲施平皆邈過三王之上莫邈音奈何至此欲為孝文光武之下乎又魏文帝也受漢禪國號魏姓曹名丕操之子求市西域大珠蘇則曰風人仕魏為侍中蘇姓則名字文師扶若陛下惠及四海則不求自至求而得之不足貴也陛下縱不能慕漢文之髙行聲去可不畏蘇則之正言耶太宗遽令止之觀中今按通鑑標年舊本此章之首曰貞內中夏而外四夷其待之固有其道矣後世不為唐氏仲友曰魏徴之諌不使蠻夷窺中國也先王猶不免此徴之所言切中其病而終唐之世困于所亂則為所窺皆起於喜功貪利之故太宗聖明不戒哉亂華可其織皮之貢而即叙之此大禹之撫四夷也漢愚按禹貢曰織皮崑崙析支渠搜西戎即叙因閉玉關而絶西域之使二君之得失蓋可覩矣武因名馬通大宛而致連年之師光武卻名馬幸太宗克從之也是宜魏徴之進諌貞觀十七年太子右庶子髙季輔人以孝聞貞觀初名馮以字行德州五事後除是職遷吏部侍郎及卒諡曰憲拜監察御史不避權要纍轉中書舍人列上上疏陳得失特賜鍾乳一劑使人通氣生胃鍾乳産于石食之謂曰卿進藥石之言藥石有益於病也謂其言有益于國猶故以藥石相報季輔後按史傳賜金背鏡一以况其清鑒焉為吏部侍郎善銓叙人物帝臣下之功德欲其不怠如此太宗兩賜季輔得懋唐氏仲友曰書曰德懋懋官功懋懋賞人主勉進不至宰輔未為盡其才也賞之意然以季輔文武正直之形太宗嘉人臣之進言比之為藥石望人臣愚按藥石所以愈膏肓之疾金鏡可以别媸妍為君臣相與之盛事也之清鑒比之於金鏡可貞觀十八年太宗謂長孫無忌等曰夫人臣之對帝王扶夫音多順從而不逆甘言以取容朕今發問不得有隱宜以次言朕過失長孫無忌唐儉等皆曰陛下聖化道致太平以臣觀之不見其失黃門侍郎劉洎稱職十七年遞日直東宫遷侍中太宗征遼東詔輔字思道荆州人貞觀七年為治書侍御史遷右丞號按法誅之帝怪其言及還遂賜死太子監國洎曰願無憂大臣有罪當對曰陛下撥亂創業實功髙萬古誠如無忌等言然頃有人上書辭理不稱者聲稱去或對面窮詰無不慚退恐非奬進言者太宗曰此言是也當為卿改之年夏四月上至太為去聲按通鑑是罰微以喜怒有所髙下此外不見其失上皆納之平宫因有是問無唐儉名又載馬周曰陛下比來賞危敗禍亂之言未嘗一日而忘于口者蓋不如是林氏之竒曰仁人君子之事君當夫治安之世而位行堯之道可謂治世矣然益曰罔失法度禹曰不足以維持其治安而保養其聰明也舜襲堯之而禹益臯陶則不可以無是言也太宗之德固未無若丹朱傲臯陶曰元首叢脞哉夫舜豈有是哉欲自聞其過則其心猶足為堯舜之心也惜夫太能盡如堯舜貞觀之治固未能盡如唐虞之時而徒無禹益臯陶針規之戒可勝嘆哉宗有堯舜好問之心而長孫無忌之之風其間諛說之特甚者長孫無忌是也太宗愚按貞觀未年魏徴既死在廷群臣類多諛說過無忌則曰陛下武功文德臣等將順之不暇欲群臣直言無忌則曰陛下無失太宗欲知其而已嗚呼孔子所謂言而莫豫違者其無忌之太宗欲聞破髙麗之計無忌則曰諸將奉成算徴之風則貞觀之政難乎令終矣謂乎向非劉洎輩面折廷爭庶幾魏太宗嘗怒苑西監之官掌宫苑穆𥙿𥙿名穆姓命於朝堂斬之時髙宗為皇太子十七年立為皇太子髙宗名治初封晉王遽犯顔進諌太宗意乃解司徒長孫無忌曰自古太子之諌或乘間從容而言聲從即容切乘平聲間去今陛下發天威之怒太子申犯顔之諌誠古今未有太宗曰夫人久相與處音夫上聲扶處自然染習自朕御天下虛心正直即有魏徴朝夕進諌自徴云亡劉洎岑文本初除祕書郎奏籍田字景仁鄧州人貞觀兼東宫官乃詔五日一參東宫後遷中書令卒頌擢中書舍人號善職遷侍郎十七年文本不欲馬周禇遂良等繼之皇太子幼在朕膝前每見朕心說諌者因染以成性故有今日之諌通為一章今按不舊本此章與前章二章同分為于其父何其賢哉及其在位既久艷后擅權諌愚按髙宗之處東宫也不惟已能納諌又能諌納諌可知矣夫以一人之身始則能諌終則拒臣結舌李善感一言至比之鳯鳴朝陽其不能諌問于李績績對曰陛下所為盡善無事可諌諌其故何哉蓋嘗以唐史觀之髙宗以久不聞之終之拒諌豈非李績輩實逢君之惡哉嗚呼髙宗始之能諌蓋由太宗之德有以化直諌十章附凡貞觀二年隋通事舍人納通奏隋制掌引鄭仁基女年十六七容色絶姝當時莫及文德皇后禮法性約素嘗著長孫氏喜圗傳尚事乃戒其車馬之侈此謂開本源恤末事臨終請帝女則十篇又為論斥漢馬后不能撿抑外家使與政省遊畋作役納忠諌勿受讒訪求得之請備嬪御太宗乃聘為充華九嬪之一唐制女官號詔書已出䇿使未發後同使去聲魏徴聞其已許嫁陸氏方遽進而言曰陛下為人父母元后書曰父母作民撫愛百姓當憂其所憂樂其所樂音洛樂並自古有道之主以百姓之心為心故君處臺榭後同處上聲則欲民有棟宇之安食膏梁則欲民無飢寒之患顧嬪御則欲民有室家之歡此人主之常道也今鄭氏之女久已許人陛下取之不疑無所顧問播之四海豈為民父母之道乎作義道一臣傳聞雖或未的然恐虧損聖德情不敢隱君舉必書所願特留神慮太宗聞之大驚手詔答之深自克責遂停策使乃令女還舊夫平令同聲後左僕射房玄齡中書令溫彥博禮部尚書王圭御史大夫韋挺等云女適陸氏無顯然之狀大禮既行不可中止又陸氏抗表云某父康在日與鄭家往還時相贈遺資財初無婚姻交涉親戚並云外人不知妄有此說大臣又勸進太宗於是頗以為疑問徵曰群臣或順㫖陸氏何為過爾分踈徵曰以臣度之洛切度待其意可識將以陛下同於太上皇太宗曰何也徴曰太上皇初平京城得辛處儉婦稍蒙寵遇處儉時為太子舍人舍人掌行令書表啓唐制東宫右春坊置太上皇聞之不恱遂令出東宫為萬年縣篇注見任賢每懷戰懼常恐不全首領陸爽名陸氏以為陛下今雖容之恐後隂加譴謫責也音摘所以反覆自陳意在於此不足為怪太宗笑曰外人意見或當如此然朕之所言未能使人必信乃出敕曰今聞鄭氏之女先已受人禮聘前出文書之日事不詳審此乃朕之不是亦為有司之過授充華者宜停時莫不稱歎人臣以格非為職而以順非逢惡為罪太宗嘗曰朱氏黼曰人主以攺過為德而以耻過作非為戒許之終不為改如此欲無危亡得乎是以終身導前世帝王拒諫者多矣或曰業已為之又曰業已之女是誠不知而作也聞魏徵一言遂罪已停册人使諌從善如流未嘗少有斳吝也聘陸氏已聘將順其美正救其惡有以格君心之非可也乃曰可謂更也人皆仰之矣玄齡輩一時名臣宜有以况大臣乎太宗有改過之德而玄齡輩不免有逢大禮既行不可中止雖妾婦所以愛主不當如是徴其賢矣哉惡之罪若魏八十一御妻蓋天子所娶之國嫡為正后庶為愚按古者天子一后三夫人九嬪二十七世婦諸侯不再娶大抵六宫之職一定則不可攺移娣媵正后既終則其娣媵攝行后職故曰天子多以色而舉况妃嬪乎故姝麗之所在不逺千不可增益也後世正家之道不明正后之立亦文德之為后亦不能免魏徴之諌勉強從之而里求之雖有夫之婦有不暇恤以太宗之為君兆於此乎益之戒舜曰罔淫于樂仲虺之稱湯已厥後士彠之女亦以色選孰知牝晨之禍已君亦法乎此而巳矣曰不邇聲色後之人貞觀三年詔關中免二年租稅關東給復一年潼關關東也以東尋有敕已役已納並遣輸納明年總為凖折去為同聲後給事中魏徴上書曰伏見八月九日詔書率土皆給復一年老幼相歡或歌且舞又聞有敕丁已配役即令役滿折造餘物亦遣輸了待明年總為凖折道路之人咸失所望此誠平分百姓均同七子但下民難與圖始日用不足皆以國家追悔前言二三其德臣竊聞之天之所輔者仁人之所助者信今陛下初膺大寶之大寶曰位易大傳曰聖人億兆觀德始發大號便有二言生八表之疑心失四時之大信縱國家有倒懸之急猶必不可况以泰山之安而輒行此事為陛下為此計者為如字為此之於財利小益於德義大損臣誠智識淺短竊為陛下惜之伏願少覽臣言詳擇利益冒昧之罪臣所甘心簡㸃使後同去聲右僕射封德彛等並欲中男十八已上簡㸃入軍敕三四出徴執奏以為不可德彛重奏聲重平今見簡㸃者云次男內大有壯者太宗怒乃出敕中男已上雖未十八身形壯大亦取徴又不從不肯署敕太宗召徴及王圭作色而待之曰中男若實小自不點入軍若實大亦可簡取於君何嫌過作如此固執朕不解公意懈解音徴正色曰臣聞竭澤取魚非不得魚明年無魚焚林而畋非不獲獸明年無獸若次男已上盡點入軍租賦雜徭將何取給且比年鼻比音國家衛士不堪攻戰豈為其少但為禮遇失所遂使後同如字人無鬪心若多點取人還充雜使其數雖衆終是無用若精簡壯健遇之以禮人百其勇當百夫也謂一人可何必在多陛下每云我之為君以誠信待物欲使官人百姓並無矯僞之心自登極已來大事三數件皆是不信復何以取信於人太宗愕然曰所云不信是何等也徴曰陛下初即位詔書曰逋私宿債缺負官物並悉原免即令聲平所司列為事條秦府國司亦非官物陛下自秦王為天子國司不為官物其餘物復何所有又關中免二年租調聲去關外給復一年百姓蒙恩無不歡恱更有敕㫖今年白丁多已役訖若從此放免並是虛荷國恩聲荷去若已折巳輸令總納取了所免者皆以來年為始散還之後方更徴收後同徴平聲百姓之心不能無怪已徴得物便點入軍來年為始何以取信又共理所寄在於剌史制唐德化嵗巡屬縣觀風俗録囚恤鰥寡武德𥘉罷郡為州改太守曰剌史掌宣縣令置令掌唐制縣利養鰥寡恤孤貧審冤屈親獄訟導揚風化撫字黎氓敦民業崇地常年貌稅並悉委之至於簡點即疑其詐僞望下誠信不亦難乎太宗曰我見君固執不已疑君蔽此事今論國家不信乃人情不通我不尋思過亦深矣行事往往如此錯失若為致理乃停中男賜金罋一口賜圭絹五十匹也首曰彰信兆民武王之有天下也首曰惇信愚按孔子曰去食去兵無信不立湯之有天下宗即位之初首欲以誠信待物可謂能以湯武明義三代之得天下未有不以信為先者也太徴歷陳其目謂原免逋債而秦府不與一不信為法者矣然徒知其為信不知其所以信故魏任守令三不信也太宗欣然從徴之言君臣魚也給散租調已散復徴二不信也簡點丁男不觀之盛有以也哉水實始于此終致貞貞觀五年持書侍御史書避髙宗諱故改曰持唐制舉劾官品本作治權萬紀侍御史魏徴奏黜之後數年復是官權姓萬紀名京兆人性悻直為治書侍御史掌紏唐制承詔推彈雜事舉百寮及入閣李仁發俱以告訐譛毁謁切訐居數蒙引見見音現數音朔任心彈射後同彈平聲肆其欺罔令在上震怒聲令平臣下無以自安內外知其不可而莫能論諍給事中魏徴正色而奏之曰權萬紀李仁發並是小人不識大體以譛毁為是告訐為直凡所彈射皆非有罪陛下掩其所短收其一切乃騁其姦計附下罔上多行無禮以取強直之名誣房玄齡官考萬紀劾其玄齡嘗掌內外平不斥退張亮騎將軍詳見公平篇注鄭州人初玄齡薦為車無所肅厲徒損聖明道路之人皆興謗議臣伏度聖心洛切度待必不以為謀慮深長可委以棟梁之任將以其無所避忌欲以警厲群臣若信狎回邪猶不可以小謀大群臣素無矯僞空使臣下離心以玄齡亮之徒猶不可得伸其枉直其餘踈賤孰能免其欺罔伏願陛下留意再思自驅使二人以來有一弘益臣即甘心斧鉞受不忠之罪陛下縱未能舉善以崇德豈可進姦而自損乎太宗欣然納之賜徴絹五百匹其萬紀又姦狀漸露仁發亦解黜萬紀貶連州司馬東司馬州僚佐也連州今仍舊隸廣朝廷咸相慶賀焉小臣不得以間之故臨事而不眩也自古英明愚按中庸曰敬大臣則不眩先儒曰信任専而大臣而復信小臣之言其意蓋慮大臣之専權之君若漢之武宣隋之髙祖宋之孝宗既任委若是而已矣雖玄齡之親密猶得而間之况其而恃小臣之察以防之也太宗之于萬紀輩亦以致亂移于小臣尤非所以為治也唯持敬則餘乎夫天下之權初無定在專在于大臣固足正人君亦勉于此而巳徒恃小臣之察欲廣已足以增一已之聰明窮理則足以察他人之邪其惑之甚哉之耳目者何貞觀六年有人告尚書右丞魏徴言其阿黨親戚太宗使御史大夫溫彥博案驗其事乃言者不直彥博奏稱徴既為人所道雖在無私亦有可責遂令彥博謂徴曰後同令平聲爾諌正我數百條豈以此小事便損衆美自今已後不得不存形迹居數日太宗問徴曰昨來在外聞有何不是事徴曰前日令彥博宣敕語臣云因何不存形迹此言大不是臣聞君臣同氣義均一體未聞不存公道惟事形迹若君臣上下同遵此路則邦國之興喪或未可知太宗矍然改容曰厥矍悟貌縛切驚前發此語尋己悔之實大不是公亦不得遂懷隱避徴乃拜而言曰臣以身許國直道而行必不敢有所欺負但願陛下使臣為良臣勿使臣為忠臣太宗曰忠良有異乎徴曰良臣使身獲美名君受顯號子孫傳世福祿無疆忠臣身受誅夷君陷大惡家國並喪獨有其名以此而言相去逺矣太宗曰君但莫違此言我必不忘社稷之計乃賜絹二百匹鑑徴按通也龍逄比干忠臣也又曰稷契臯陶良臣亦未有偏于良而短于忠者魏公之言過為分别胡氏寅曰忠良一道也未有優于忠而劣于良者比干身誅國亡如此自足以警帝意也夫稷契比不若曰臣願為稷契臯陶諌行言聽不願如龍逄敢強諌曰吾效稷契臯陶苟有犯顔苦口靣折廷干所謂易地則皆然也後世事君者柔和獻納不而欲為忠臣乎則魏公之說啓之矣爭者則或非之曰爾何以桀紂事吾君歡然無間而后朝廷之政無不舉豈拘拘形迹之林氏之竒曰自古君明臣良猶腹心手足之一體必從而責之以宜存形迹則仆碑之兆已見于此末以自為疑外者太宗之于魏公雖曰言必聽諌何則臣諌而君從之則可以為稷契臯陶之良不吕氏曰魏公之對誠足以警動太宗之心矣固未甚相逺也若乃君之聽諌從之則為堯舜不從則亦不失其為龍逄比干之忠則是忠之與良壤則太宗于此安得而不警乎從之則為桀紂其相去不啻霄然者何也文武之臣身獲美名君受顯號專謂愚按魏徴忠良之論美矣然考之文義則有不身受誅夷君陷大惡專謂之忠臣可也而武王之良臣可也而囧命則曰咸懷忠良商紂之臣尹身得令終可以為良臣矣夫子則稱之為忠則曰焚炙忠良此猶渾而言之也子文仕為令則稱之為良然則徴之言豈得為定論哉先儒奄息殺身殉葬以從其君可以為忠臣矣詩人亦未有偏于良而短于忠者斯言不可易矣有言忠良一道也未有優于忠而劣于良者貞觀六年胸奴克平逺夷入貢符瑞日至年榖頻登嶽牧等屢請封禪于山禪祭于地也去聲封襌者封土群臣等又稱述功德以為時不可失天不可違今行之臣等猶謂其晚惟魏徴以為不可太宗曰朕欲得卿直言之勿有所隱朕功不髙耶曰髙矣德未厚耶曰厚矣華夏未安耶曰安矣逺夷未慕耶曰慕矣符瑞未至耶曰至矣年榖未登耶曰登矣然則何為不可對曰陛下功髙矣民未懷惠德厚矣澤未旁流華夏安矣未足以供事後同供平聲逺夷慕矣無以供其求符瑞雖臻而罻羅猶密蔚罻音積嵗豐稔而倉廪尚虛此臣所以切謂未可臣未能逺譬且借近喻於人有人長患疼痛不能任持療理且愈皮骨僅存便欲負一石米日行百里必不可得隋氏之亂非止十年陛下為之良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封在今泰安州謂東封泰山也萬國咸萃要荒之外聲要要平夷之地也服荒服蠻莫不奔馳今自伊洛之東暨乎海岱山也岱泰雈莾巨澤茫茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻寧可引彼戎狄示以虛弱竭財以賞未厭逺人之望足也厭音淹加年給復不償百姓之勞或遇水旱之災風雨之變庸夫邪議悔不可追豈獨臣之誠懇亦有輿人之論太宗稱善於是乃止正月文武官按通鑑是年若天下乂安家給人足雖不封禪庸何傷乎昔秦始請封禪上曰卿輩皆以封禪為帝王盛事朕意不然皇耶且事天掃地而祭何必登泰山之類封數尺之皇封禪漢文帝不封禪後世豈以文帝之賢不及始從之魏徴獨以為不可云云㑹河南北數州大水事土然後可以展其誠敬乎群臣猶請之不已上亦欲寢遂管仲說以為帝王盛德之事無大此禮故秦皇漢孫氏甫曰封禪之文不著于經典秦漢諸儒用異數至天下多事蓋繁費生靈干動和氣所致則武行之儀物侈大自謂光輝無窮然封禪之後災也司馬遷作封禪書引經典之文但巡守之禮耳崇尚此禮惡足以當天意哉况此禮不著於經典于天也帝王治天下能以功德濟生民致時太平帝王巡守每至方嶽必燔柴以告至非謂自陳功待自告其功也太宗嘗謂事天至敬掃地而祭何則天必佑之以永久之福郊祀之禮足伸其報何此實至論必登山封土望所以尊天而懷柔百神也後世學禮者失其傳范氏祖禹曰古者天子巡守至于方嶽必告祭柴無有也且三代不封禪而王秦封禪而亡不法三而諂諛者為說以希世主謂之封禪實自秦始古多賢而侫者猶倡其議獨魏徴以為時未可而亦代而法秦以為太平盛事亦已謬矣太宗方明朝定之徴亦與焉貞觀之未欲東封以事而止髙宗不以其事為非也其後使顔師古議其禮玄齡裁愈之賢猶勸憲宗則其餘無足怪者嗚呼禮之失明皇遂踵行之終唐之世惟柳宗元以為非以韓惑可勝救哉也久矣世俗之致不能監觀休咎之符凡天事尚象往往以道逺胡氏寅曰自孟子沒聖學不傳學者以天人為二明房杜王魏並侍左右正旦日食天變為大不聞難知置于冥漢而不省昧者無足怪矣以太宗之侈蕩上心請登太山明示德意太宗口雖不允實其胥訓告胥教誨以消隂沴復陽德而群臣獻諂費為言若非數州大水亦未必為止也夫大水者欲從之至稱功髙德厚偃然自足徴雖以空虛勞而不知戒焉豈非以天人為二致不學不知道之隂氣沴也日食者陽氣微也二者君象尤當警懼歟過起不易斯言矣虞舜之制五載一巡守成周之愚按文中子曰封禪其秦漢之侈心乎聖人復蓋所以盡報本之誠明命討之公也豈泥金刻盛六年一時巡肆覲群后大明黜陟望秩山川封禪漢文帝不封禪後世豈以文帝不及始皇玉升中告成之謂哉善乎太宗之言曰秦始皇援古据經正名定論于以復先王之常禮于以耶厥後惑于諂侫自背其言為魏徴計者惟當尚虛執為未可夫以為未可行則必有可行之掃秦漢之謬說不亦偉歟顧以罻羅猶密倉廪為臣者惑于下不有聖人出焉孰能祛其謬而時也嗚呼大道不明禮學無据為君者昧于上正乎反諸貞觀七年蜀王第六子也名愔太宗妃父楊譽在省競婢都官郎中藥料以理訴競雪免凡公私良賤必周知之凡唐制刑部官掌配役徒隸簿録俘囚以給衣糧家為官奴婢反逆相坐沒其薛仁方留身勘問未及豫奪與豫音其子為千牛職本掌御刀蓋取莊子庖丁為惠文君解後魏官名隋有千牛刀人主防身刀也其刀可以備身因以名官唐制左右千牛衛將軍掌宫牛十九年所割者數千牛而刀刃若新發硎石言此左右執弓箭宿衛殿侍衛及供御儀仗於殿庭陳訴云五品以上非反逆不合留身以是國親故生節目不肯决斷淹留嵗月太宗聞之怒曰知是我親戚故作如此艱難即令後同平聲杖仁方一百解所任官魏徴進曰城狐社鼠皆微物為其有所慿恃故除之猶不易以豉切古語城為去聲後同易也故議者率謂人君左右近習為城狐社鼠狐不灌社鼠不燻謂其所棲穴者得所慿恃况世家貴戚舊號難理漢晉以來不能禁禦武德之中以多驕縱陛下登極方始蕭條仁方既是職司能為國家守法豈可枉加刑罰以成外戚之私乎此源一開萬端爭起後必悔之將無所及自古能禁斷此事惟陛下一人備豫不虞為國常道字為如豈可以水未橫流聲橫去便欲自毁隄防臣竊思度切待洛未見其可太宗曰誠如公言嚮者不思然仁方輒禁不言頗是専權雖不合重罪宜少加懲肅乃令杖二十而赦之抗湖陽不是過也太宗不惟不能賞之又欲加愚按仁方之問楊譽雖申屠之屈鄧通董宣之諌免仁方之罪可也顧猶杖二十而後赦之是刑焉其視孝文光武何其逺哉且既從魏徴之年以五十步笑百步而巳從諌之道豈如是乎猶紾兄臂而曰姑徐云爾攘鄰雞而曰請俟來貞觀八年左僕射房玄齡右僕射髙士亷河王嶽之名儉齊清及居東宫授右庶子遷益州都督長史勵風俗有聲孫𥘉隱居終南山武德初秦王嶺雍州牧舉為治中僕射卒贈司徒入為吏部尚書拜於路逢少府監百工繕侔之政少去聲唐制掌竇德素問北門近來更何營造德素以聞太宗乃謂玄齡曰君但知南衙事我北門少有營造何預君事玄齡等拜謝魏徴進曰臣不解陛下責後同解音懈亦不解玄齡士廉拜謝玄齡既任大臣即陛下股肱耳目有所營造何容不知責其訪問官司臣所不解且有利害役工多少陛下所為善當助陛下成之所為不是雖營造當奏陛下罷之此乃君使臣臣事君之道語論臣以禮臣事君以忠孔子對魯定公曰君使玄齡等問既無罪而陛下責之臣所不解玄齡等不識所守但知拜謝臣亦不解太宗深愧之財用固于朝廷庶務無不當預也作洛之役周召朱氏黼曰宰相之職無所不統冡宰以九式均節不知乎以將軍為內廷以宰相為外廷正漢人體經營未央之成蕭何綜理烏有營繕之小而宰臣專立南牙政事不預北門營繕是分朝廷為二岐統之紊太宗方鼎新三省復修六典獨欲使宰相魏徴盡言則唐之相職豈正哉內外為兩以一司而處相臣也微也故天下之事天子無不當與宰相亦無不當愚按王者以天下為一家其大臣宗子之家相責玄齡等謝非其所當謝微魏徴之言君臣蓋與者豈有南衙北門之分乎太宗責非其所當以樞密中尉為北司軍機之密䇿立之重宰相莫知其失也唐中葉以後以中書門下為南衙之失言實啓之矣遂不得與聞太宗貞觀十年越王第八子也名貞太宗長孫皇后所生太子介弟聰敏絶倫太宗特所寵異或言三品以上皆輕蔑王者意在譛侍中魏徴等以激上怒上御齊政殿引三品已上入坐定大怒作色而言曰我有一言向公等道往前天子即是天子今時天子非天子耶往年天子兒是天子兒今日天子兒非天子兒耶我見隋家諸王逹官已下皆不免被其躓頓我之兒子自不許其縱橫聲縱平公等所容易過得相共輕蔑後同易以豉切我若縱之豈不能躓頓公等玄齡等戰栗皆拜謝徴正色而諌曰當今群臣必無輕蔑越王者然在禮臣子一例傳稱聲傳去王人雖微列於諸侯之上諸侯用之為公即是公用之為卿即是卿若不為公卿即下士於諸侯也今三品已上列為公卿並天子大臣陛下所加敬異縱其小有不是越王何得輒加折辱若國家紀綱廢壞臣所不知以當今聖明之時越王豈得如此且隋髙祖不知禮義寵樹諸王使行無禮尋以罪黜不可為法亦何足道太宗聞其言喜形於色謂群臣曰凡人言語理到不可不伏朕之所言當身私愛聲當去魏徴所論國家大法朕嚮者忿怒自謂理在不疑及見魏徴所論始覺大非道理為人君言何可容易召玄齡等而切責之賜徴絹一千匹釋之曰自天王而言欲屈逺其子使次乎其下愚按齊桓殊會王世子于首止春秋大之胡氏其上正分義也然則由胡氏分義之說觀之魏示謙德也自臣下而言欲尊敬王世子則序乎也魏徴之言謂在內公卿也胡氏之言謂世子徴之言非耶曰皆是也胡氏之言謂在外諸侯輕重隨時以取中又豈足與論春秋之義哉也魏徴之言謂諸王也為大臣者苟不能權其貞觀十一年所司奏凌敬乞貧之狀名初仕竇建德凌平聲凌姓敬酒為祭太宗責侍中魏徴等濫進人徴曰臣等每蒙顧問常具言其長短有學識強諌諍是其所長愛生活好經營是其所短聲好去今凌敬為人作碑文聲為去教人讀漢書因兹附托回易求利與臣等所說不同陛下未用其長惟見其短以為臣等欺罔實不敢心伏太宗納之薛大夫夫寸有所長尺有所短人君用其所長愚按夫子曰孟公綽為趙魏老則優不可為滕諍凌敬之所長也愛生活好經營凌敬之所短棄其所短可也善乎魏徵之言曰有學識強諌舉者豈用人之道乎向非鄭公之諌太宗好賢也太宗既不能用其所長顧欲因其所短責及荒矣之意貞觀十二年太宗謂魏徴曰比來所行得失政化音比鼻何如往前對曰若恩威所加逺夷朝貢比於貞觀之始不可等級而言若德義潜通民心恱服比於貞觀之初相去又甚逺太宗曰逺夷來服應由德義所加聲應平往前功業何因益大徴曰昔者四方未定常以德義為心旋以海內無虞聲旋平漸加驕奢自溢所以功業雖盛終不如往初太宗又曰所行比往前何為異徴曰貞觀之初恐人不言導之使諌三年已後見人諌恱而從之一二年來不恱人諌雖黽強聽受而意終不平諒有難也太宗曰於何事如此對曰即位之初處元律師死罪元姓律師名處上聲後同孫伏伽武德中貝州人貞觀中拜御史遷大理卿上言三事帝稱之曰誼臣諌曰法不至死無容濫加酷罰遂賜以蘭陵公主園直錢百萬人或曰所言乃常事而所賞太厚答曰我即位來未有諌者所以賞之此導之使言也徐州司户栁雄南司户州屬户曹徐州今仍舊隸河雄名栁姓於隋資妄加階級人有告之者陛下令其自首去聲後同令平聲首不首與罪遂固言是實竟不肯首大理推得其僞將處雄死罪少卿戴胄奏法止合徒唐制徒少去聲至于三年刑五一年陛下曰我已與其斷當訖聲當去但當與死罪胄曰陛下既不然即付臣法司罪不合死不可酷濫陛下作色遣殺胄執之不已至於四五然後赦之乃謂法司曰但能為我如此守法聲為去豈畏濫有誅夷此則恱以從諌也往年陕縣丞皇甫德參上書大忤聖㫖陛下以為訕謗臣奏稱上書不激切不能起人主意激切即似訕謗于時雖從臣言賞物二十假意甚不平難於受諌也太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論說過失堪驚公但存此心朕終不違公語日月四時之運與萬物之盈虛消長觀焉則見矣胡氏寅曰天下之理不進則退不退則進以天地年也是則不逮往年也譬之日焉雖在吳哺未嘗人之德慧智術何獨不然太宗自謂今所為猶往之象曰君子以自強不息湯之盤銘曰茍日新日不明若語其嚮於熙盛豈若未中之時乎是故乾為法豈不可及勉焉日有孜孜斃而後已是則湯日新又日新知從事於此者惟持志存誠以堯舜殊惜乎太宗之未學也所以入聖域而成功不唐太宗得天下之道不一而莫大於納諌夫太愚按隋煬帝失天下之道不一而莫大於拒諌之亡矯揉強勉而行之也故貞觀之初天下未宗之納諌豈其天性之本然哉良由目覩煬帝諌末年天下已安則勉強從人之諫矣昔者舜安則能道人使諌中年天下漸安尚能恱人之其身於一日果何道哉蓋聖人之納諌由於志之舍己從人禹之聞善則拜湯之從諌弗咈終氣之矯揉故少而鋭老而衰也然則人君欲盡氣之自然故無始終之異太宗之納諌由於血孳而務聖人之學哉納諌之道者可不孳貞觀政要卷第二
