body:
  text: 議征伐三十五議安邊三十六征伐第三十五凡十三章武徳九年冬突厥頡利突利二可汗音韓凡言可汗並同以其衆二十萬至渭水便橋之北漢武帝𥘉作便門橋長安城北面西頭門即平門也古者平便字同於此道作橋跨渡渭水以趨茂陵此便橋是也遣酋帥執矢思力酋帥長帥也執矢虜姓思力其名入朝為覘自張聲勢云二可汗緫兵百萬今已至矣乃請返命太宗謂曰我與突厥面自和親汝則背之背音倍我無所愧何輒将兵将去聲入我畿縣自夸彊盛我當先戮爾矣思力懼而請命蕭瑀封徳彛等請禮而遣之太宗曰不然今若放還必謂我懼乃遣囚之太宗曰頡利聞我國家新有内難去聲又聞朕初即位所以率其兵衆直至於此謂我不敢拒之朕若閉門自守虜必縱兵大掠彊弱之勢在今一策朕将獨出以示輕之且耀軍容使知必戰事出不意乖其本圖制服匈奴在茲舉矣遂單馬而進隔津與語頡利莫能測俄而六軍繼至頡利見軍容大盛又知思力就拘由是大懼請盟而退按通鑑載此事甚詳辭多不録愚按蠻夷猾夏帝者嚴明刑之訓蠻夷率服帝者謹惇徳之心故弼成五服之制扵要服則近而撥文教逺而奮武衛至於荒服則流蔡而巳内外之限截乎其不可紊也降及後世徳不足以懐柔而藉乎威威不足以讋服而至于亂太宗内定中國外綏四夷以漢武窮征逺討而不能服者咸歸版圖若突厥為患乆矣唐有天下之初已慿陵上國至于斯時率騎二十萬直至渭水亦云肆矣太宗一時輕騎示威其氣㮣直可以寒氊裘之瞻而奪之氣不以一矢相加遺而中國尊安裔夷退抑雖不可與帝者明刑惇徳並論其不戰屈人亦足偉也謂之英武不亦宜乎貞觀初嶺南諸州今廣海之地奏言髙州今仍舊隷海北酋帥馮盎談殿盎字明逹髙州人隋亡㨿嶺表唐興以其地䧏髙祖封為越國公談殿入姓名亦㨿嶺表阻兵反叛詔將軍藺謩藺音吝姓也名謩發江嶺數十州兵討之發江南道嶺南道諸州兵也秘書監魏徴諌曰中國初定瘡痍未復嶺南瘴癘山川阻深兵逺難繼疾疫或起若不如意悔不可追且馮盎若反即須及中國未寧交結逺人分兵㫁險破掠州縣署置官司何因告來數年兵不出境此則反形未成無容動衆陛下旣未遣使人使去聲後同就彼觀察即來朝謁恐不見明今若遣使分明曉諭必不勞師旅自致闕庭太宗從之嶺表悉定侍臣奏言馮盎談殿徃年恒相征伐陛下發一單使嶺外恬然太宗曰初嶺南諸州盛言盎反朕必欲討之魏徴頻諌以為但懐之以徳必不討自來旣從其計遂得嶺表無事不勞而定勝於十萬之師乃賜徴絹五百匹按通鑑貞觀元年九月馮盎談殿等迭相攻撃乆未入朝諸奏盎反者以十數上命将討之魏徴諌曰云云上乃罷兵十月遣貟外散騎侍郎李公掩持節慰諭之盎遣其子智戴随使者入朝上曰魏徵令我發一介之使而嶺表遂安勝十萬之師不可不賞賜絹五百叚唐氏仲友曰甚哉䜛人之可畏也盎不為南越王於武德之初而肯反於貞觀耶譛言無端㡬害忠良非魏徴何以明之以蕭銑輔公祏不足勞偏師剪除盎之區區何足當唐之興運然直壮曲老藺謩可擊之状未可必也太宗罷之明哉以尉佗之驕倨文帝猶以徳懐而况盎乎全知命之臣止無名之師江淮以南所全活者不勝數矣仁人之言其利傅哉賢於十萬衆特以兵勢較之耳兵隙一開尺有所短寸有所長于戈轉餉瘴癘之鬼可以十萬筭哉愚按昔漢文之時人有上書告周勃欲反下廷尉捕治之薄太后曰絳侯始誅諸吕綰皇帝璽将兵於北軍不以此時反今居一小縣頋欲反耶帝乃赦之復爵邑此與魏徴論馮盎談殿之事頗同盖周勃異於馮盎談殿之事勢而薄太后之言誠類於魏徴之諌也其察人之情亦明矣哉貞觀四年有司上言林邑蠻國林邑南蠻國名漢南象郡之地在交州南千餘里表䟽不順請發兵討擊之太宗曰兵者㐫器不得已而用之故漢光武云毎一發兵不覺頭鬚為白自古以來窮兵極武未有不亡者也符堅自恃兵彊欲必吞晉室興兵百萬一舉而亡符堅畧陽氐人晉時符健㨿長安是為前秦健死子立符堅弑生自立伐晉大敗後為姚萇所殺隋主亦必欲取髙麗平聲頻年勞役人不勝怨勝平聲遂死於匹夫之手至如頡利徃歲數來數音朔侵我國家部落疲於征役遂至滅亡朕今見此豈得輙即發兵但經歷山險土多瘴癘若我兵士疾疫雖尅翦此蠻亦何所補言語之間何足介意竟不討之按通鑑林邑獻大珠有可以其表辭不順請討之上曰好戦者亡如煬帝頡利皆所親見也小國勝之不武况未可必乎胡氏曰太宗不以夷狄一言之慢遽興兵革㡬於能忍然林邑表辭敢為不順者以獻大珠嘗試朝廷也還其獻則善矣今不聞還其獻則是太宗貪其寳而甘其慢也明年鸚鵡繼來則納侮多矣雖詔使者歸之而珠竟爾不還夫豈格逺人之道愚按是年方擒突厥北土以寧有司請討林邑而太宗不欲再勞師以黷武也然自古窮兵極武未有不亡又取譬於符堅之伐晉隋主之取遼與夫頡利之侵彊皆致於滅亡之地可謂知所鑒矣夫是三者皆太宗耳目之所聞而知見而知者也以此為鑒宜終其身而不忘夫何晩年興忿兵於遼水之上而不知止邪書曰終始慎厥與惟明明后後之人主式監在兹貞觀五年康國即漢康居國一曰薩未鞬亦曰颯秣建元魏所謂悉萬斤者在那宻水南君姓温本月氏爲突厥所破稍南依葱嶺其王屈木支請歸附時太宗謂侍臣曰前代帝王大有務廣土地以求身後之虚名無益於身其人甚困假令平聲於身有益於百姓有損朕必不爲况求虚名而損百姓乎康國旣來歸朝有急難不得不救難去聲兵行萬里豈得無勞於人若勞人求名非朕所欲所請歸附不須納也范氏祖禹曰太宗知招來絶域之弊有所不爲然以兵克者則以爲已有而郡縣置之其爲疲勞百姓一也豈先行其言而後從之者歟然其不受康國足以爲後世法矣使其行事毎如此其盛徳可少貶哉唐氏仲友曰古之待荒服之外正女此耳太宗推所以待康國而推之它夷不求臣服不亦善乎惜哉其未盡如此也愚按闢四夷之境欵殊俗之附三代未之聞也盖遐荒逺夷不足關中國之重輕得之適足以勞民而不為益棄之斯足以安民而不為損其利害豈不甚明哉漢建武中西域求内屬光武以天下初定未遑外事而竟不許唐貞觀初康國請歸附太宗謂求虚名損百姓而竟不納二君柔逺之道可謂無愧於古宜乎為開基之明主也詩云惠此中國以綏四方二君之謂矣貞觀十四年兵部尚書侯君集幽州人以雄才稱少事秦王從征伐有功王即位進吏部尚書後從承乾謀計事覺𬒳誅伐髙昌及師次柳谷西域地名候騎言髙昌王麴文泰死文㤗聞唐兵臨磧口憂懼不知所為發疾卒尅日将葬國人咸集以二千輕騎襲之可盡得也副将去聲薛萬均燩煌人萬徹之兄髙祖以其材武授上柱國以計勝竇建徳撃突厥有功拜将軍姜行本名確以字行以幹力稱為宣威将軍太宗毎出幸即以從平髙昌有功封金城郡公皆以為然君集曰天子以髙昌驕慢使吾恭行天誅乃於墟墓間以襲其葬不足稱武此非問罪之師也遂按兵以待葬畢然後進軍遂平其國按通鑑於是皷行而進至田城諭之不下詰朝攻之及午而克虜男女計七千餘口遂降唐氏仲友曰髙昌地不千里勝兵䜛萬人恃逺不賔太宗討之以其地控西域之中故也愚按師平髙昌所以闢西陲也髙昌去唐七千餘里當是時可謂逺討矣然幸功臣夙將智勇足以制勝是以克成厥功自髙昌既平之後唐之封域東西九千五百餘里南北一萬九百餘里爲唐之極盛故嘗謂太宗之世於帝王懐柔之道雖不足而方之漢武致逺之功則有餘也貞觀十六年太宗謂侍臣曰北狄代爲宼亂今延陁倔彊倔渠勿切延陀鐵勒諸部之姓倔彊不柔服也須早爲之所朕熟思之惟有二䇿選徒十萬撃而虜之滌除兇醜百年無患此一䇿也若遂其來請與之爲婚媾朕爲蒼生父母苟可利之豈惜一女北狄風俗多由内政亦旣生子則我外孫不侵中國㫁可知矣以此而言邉境足得三十年來無事舉此二䇿何者爲先司空房玄齡對曰遭隋室大亂之後户口太半未復兵凶戰危聖人所慎和親之䇿實天下幸甚按通鑑即命兵部侍郎崔敦禮持節使薛延陀以新興公主妻之胡氏寅曰人各有偶天子之女非外夷所當偶昏世愚主則何較焉漢髙祖唐太宗不世出之英主而皆以外夷為子壻人君見有不及則藉群臣而正之房公狃於漢故不知逺稽先王豈非可歎之甚邪夫薛延陀之未服也無乃吾徳猶有所闕增修仁義而明其政刑來則接之不至不強也何必於服已乎此上䇿也舎而不用乃嫁女以結其心是為非䇿而太宗君臣正爾都俞不亦鄙歟愚按上古帝王之御四夷也服則懐之以徳叛則震之以威未聞與為婚姻也漢髙帝時冐頓數苦北邉髙帝從劉敬之請而結親唐武徳中突厥遣使請昏髙祖從裴矩之議而許昏然則和親之䇿漢髙帝啓之於漢唐髙祖啓之於唐皆非所以示子孫也劉敬固不必議裴矩亦母足責房玄齡太宗之良相也乃曰兵戰聖人所慎和親實天下幸甚何不思之甚邪惟當勉其君曰兵戰則勞和親則辱皆不足以安百姓威四夷也君能行帝王之道以修其徳教明其政刑則中國安而邉圉固來賔率服自有不期然而然者矣鳴呼君行之而不以為耻臣亦不以為非惜哉貞觀十七年太宗謂侍臣曰盖蘇文弑其主而奪其國政誠不可忍今日國家兵力取之不難朕未能即動兵衆且令契丹靺鞨攪擾之何如令平聲契音乞靺音末鞨音曷契丹東胡種元魏時號契丹靺鞨居肅慎地凡數部有黒水部獨彊房玄齡對曰臣觀古之列國無不彊陵弱衆暴寡今陛下撫養蒼生将士勇銳将去聲力有餘而不取之所謂止戈為武者也昔漢武帝屢伐匈奴隋主三征遼左人貧國敗實此之由惟陛下詳察太宗曰善按通鑑不載玄齡之辭止載長孫無忌曰盖蘇文自知罪大畏大國之討必嚴設守備陛下姑為之隱忍彼得以自安必更驕惰愈肆其惡然後討之未晩也上曰善貞觀十八年太宗以髙麗莫離支賊殺其主殘虐其下議将討之諌議大夫禇遂良進曰陛下兵機神筭人莫能知昔隋末亂離克平宼難去聲及北狄侵邉西蕃失禮陛下欲命将撃之将去聲群臣莫不苦諌唯陛下明略獨㫁卒並誅夷卒子聿切今聞陛下将伐髙麗意皆熒惑然陛下神武英聲不比周隋之主兵若渡遼事須尅㨗萬一不獲無以威示逺方必更發怒再動兵衆若至於此安危難測太宗然之按通鑑李勣又曰間者薛延陀入宼陛下欲發兵窮討魏徴諌而止使至今為患曏用陛下之䇿北鄙安矣上曰然此誠徵之失朕尋悔之而不欲言恐塞良謀故也上欲自征髙麗禇遂良上䟽以為但命二三猛将四五萬衆仗陛下威靈取之如反掌耳今太子新立年尚㓜穉自餘藩屏陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆愚臣之所甚憂也時羣臣多諌者上皆不聽范氏祖禹曰髙麗臣属於唐而其主為賊臣所弑為大國者不可不討然髙麗之大未如突厥其險逺不過於髙昌吐谷渾此三國者皆命将帥以偏師取之遂墟其國何獨至於髙麗而欲自征之乎太宗若從遂良之言雖伐而不克亦未失也朱氏黼曰自昔人主親睹亂敗者不勸而自懲深知禍咎者不戒而自戢煬帝伐遼之禍至於家夷國破身死而宗族屠盖太宗目睹曽莫之懲而反疾趍以襲其蹟何㢤盖其心自謂吾之戰勝攻取國富民衆非隋敢望也乗平定四夷之餘力用諸将蕩平之餘威臨城一鼓可以勦除意定志决雖傾朝盡諌不可復止矣唐氏仲友日至魏旣殁諌臣惟遂良爾而其識量不及魏徵李勣一折而遂良之諌不行勣武臣爾所見惟邉功奈天下計何魏徵在勣此言必不發就使有此言徵肯但已邪遂良以克為善則其言已不能無過矣胡不明夷夏之分申知足之戒以告帝曰髙麗小醜不犯邊吏今而討之勝之不武不勝為笑不亦善乎勣之指魏徴乃以杜遂良之再諌惜乎不抗䟽而力陳之太宗之欲用兵也指魏徵之失其悔用師也興魏徴之思諌臣繫國之輕重如此論諌必若魏徵可也愚按貞觀十七年廷臣請増戍兵以逼髙麗太宗曰逺人不服則修文德以來之未聞戍兵能威絶域者也斯言也帝王柔逺之道何以尚兹不數月而有討遼之議越明年而有親征之行不過為遼主雪怨為新羅報仇乃欲襲漢武隋煬之所為所存者小而所棄者大何言行之相反邪豈言之非艱而行之惟艱哉當時諫者多矣若玄齡之言以漢武隋煬為鍳戒誠保國之深規也無忌之言欲待其縦肆而後討亦保國之長䇿也遂良於下議之初固阻其意而親征之際復尼其行亦足少儆矣惜乎太宗意定志決而皆莫之從也若李勣沮遂良之諌以魏徴為非明致其君於不善之地此孟子所謂逢君之惡者其罪不亦大乎貞觀十九年太宗将親征髙麗開府儀同三司尉遲敬徳奏言車駕若自徃遼左皇太子又監國監平聲定州東西二京府庫所在雖有鎮守終是空虚遼東路遥恐有玄感之變隋煬帝親征髙麗楊玄感遂起兵圍東都且邉隅小國不足親勞萬乘若克勝不足為武儻不勝翻為所笑伏請委之良将去聲自可應時摧滅太宗雖不從其諌而識者是之按通鑑上不從以敬徳為左一馬軍總營使從行愚按陳恒弑其君孔子沐浴請討古者臣弑其君子弑其父人皆得而誅之髙麗爲唐之藩臣其君爲莫離支所弑大宗舉兵討之其亦異乎煬帝無名之師矣但不當蠻輿自行耳尉遲敬徳請委之良将自可摧滅其說是已然嘗論之髙麗以蕞爾小國四拒隋師五拒唐師非有謀臣良将能如是乎當時李靖嘗言莫離支自謂知兵故輕中國太宗亦嘗諷靖使伐髙麗靖欣然請行太宗不能從也異時無功而歸問於靖曰吾以天下之力屈於小夷何也靖曰兹事道宗知之盖指駐蹕之戰請分軍襲平壌之事也由此論之太宗若用李靖爲帥其平髙麗必矣太宗不能用靖而用李勣爲将勣違惠真延夀之言舎烏骨而不攻昧城有不攻之計守安市而不置卒之師老糧少無功而返由不用靖而用勣也禮部尚書江夏王道宗從太宗征髙麗詔道宗與李勣爲前鋒及濟遼水尅盖牟城蓋音盍今爲盖州隷鎮東逢賊兵大至軍中僉欲深溝保險待太宗至徐進道宗議曰不可賊赴急逺來兵實疲頓恃衆輕我一戰可摧昔耿弇不以賊遺君父弇音揜耿弇漢光武将我旣職在前軍當須清道以待輿駕李勣大然其議乃率驍勇數百騎直衝賊陣左右出入勣因合擊大破之太宗至深加賞勞去聲道宗在陣損足帝親為針灸音救賜以御膳按通鑑載此事甚詳辭多不録范氏祖禹曰太宗之伐髙麗非獨恃其四海之富兵力之彊也本其少時奮於布衣志氣英果百戰百勝以取天下治安旣乆不能深思髙拱猶思所以逞志扼腕踴躍喜於用兵如馮婦搏虎不能自止非有禮義以養其心中和以養其氣始於勇敢終於勇敢而巳矣記曰貴於勇敢彊有力者貴其敢行禮義也天下無事則用之於禮義天下有事則用之戰勝用之戰勝勝則無敵用之於禮義則順治太宗於天下無事不知用之禮義而惟以戰勝為美也是故以天子之尊而較勝於逺夷一戰而克自以為功其器不亦小哉愚按漢耿弇之討張歩也弇為飛矢所中光武時在魯知弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以待上來弇曰乘輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出戰而破之此與道宗敗髙麗兵事正同盖臣子之義職當如是也若道宗者可謂能盡臣子之義而弇不得專美於漢矣太宗帝範曰貞觀二十二年正月太宗作帝範十二篇以賜太子曰君體建親求賢審官納諌去䜛戒盈崇儉賞罰務農閱武崇文夫兵甲者夫音扶國家㓙器也土地雖廣好戰則人凋好去聲中國雖安忘戰則人殆凋非保全之術殆非擬宼之方不可以全除不可以常用故農隙講武習威儀也三年治兵辨等列也是以勾踐軾蛙卒成覇業勾踐越王名越王旣爲呉所敗脩徳治兵謀雪吳耻見蛙下車拜之左右怪問越王曰彼亦有氣者徐偃棄武終以喪邦徐夷國子爵僣稱偃王周穆王聞之令楚伐徐徐子曰吾頼於文徳而不明武俻故至於此何也越習其威徐忘其備也孔子曰以不教人戰是謂棄之論語之辭故知弧矢之威以利天下易大傳曰弧矢之利以威天下此用兵之職也愚按書稱放牛歸馬詩言戢戈櫜弓甚矣兵非聖人之所尚也然嘗觀周公作周禮極言師帥旅帥卒長伍長之制詳陳振旅茇舎治兵大閱之儀至於斬牲徇陳凛乎如大敵之臨焉是兵亦非聖人之所廢也善乎太宗之言曰凋非保全之術殆非擬宼之方兵不可以全除亦不可以常用聖人復起不易斯言矣貞觀二十二年太宗将重討髙麗重平聲是時房玄齡寝疾増劇頋謂諸子曰當今天下清謐咸得其宜唯欲東討髙麗方為國害吾知而不言可謂衘恨入地遂上表諌曰臣聞兵惡不戢惡烏去聲後同武貴止戈當今聖化所覃無逺不曁上古所不臣者陛下皆能臣之所不制者皆能制之詳觀古今為中國患害無過突厥遂能坐運神策不下殿堂大小可汗相次束手分典禁衛執㦸行間行音杭後同其後延陀鴟張鴟惡鳥也尋就夷滅鐵勒慕義請置州縣沙漠已北萬里無塵至如髙昌叛渙於流沙吐渾首䑕於積石偏師薄伐俱從平蕩髙麗歷代逋誅莫能討擊陛下責其逆亂殺主虐人親緫六軍問罪遼碣未經旬日即㧞遼東前後虜獲數十萬計分配諸州無處不滿雪徃代之宿耻隋文帝十八年髙麗宼遼西遣楊諒討之無功煬帝六年徴其王元入朝不至八年徵天下兵擊之帝親攻諸城不下來護児宇文述等大敗九年復親征不㧞十年復討之徵其王入朝竟不至掩崤陵之枯骨左傳僖公三十三年晉人及姜戎敗秦師于殽文公二年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還比功校德萬倍前王此聖主所自知㣲臣安敢備說且陛下仁風被于率土孝徳彰於配天覩夷狄之将亡則指期數歳授将帥之節度将帥之将去聲後同則決機萬里屈指而候驛視景而望書符應若神筭無遺策擢将於行伍之中取士於凡庸之末逺夷單使去聲一見不忘小臣之名未嘗再問箭穿七札札甲也養由基射穿七札弓貫六鈞左傳定公八年魯伐齊士皆列顔髙之弓六鈞加以留情墳典屬意篇什屬音囑筆邁鍾張見師傳篇注詞窮賈馬漢賈誼司馬相如皆文人文鋒旣振則宫徵自諧徴音止輕翰暫飛則花葩競發撫萬姓以慈遇群臣以禮褒秋毫之善解吞舟之網逆耳之諌必聽膚受之愬斯絶論語曰膚受之愬不行焉可謂明也已矣好生之徳好去聲禁障塞於江湖惡殺之仁息鼓刀於屠肆鳬鶴荷稻梁之恵荷去聲犬馬蒙帷盖之恩降尊吮思摩之瘡貞觀十九年太宗征遼攻白巖城右衛大将軍李思摩為流矢所中太宗親為之吮血登堂臨魏徴之柩臨去聲十七年正月魏徵卒太宗臨哭之慟哭戰亡之卒則哀動六軍十九年太宗征髙麗至營州詔遼東戰亡士卒骸骨並集栁城東南命有司設太牢上自作文祭之臨哭盡哀負填道之薪則情感天地十九年太宗渡遼遼澤泥潦車馬不通命長孫無忌将萬人剪草填道水深處以車為梁上自繫薪於馬鞘以助役重黔黎之大命特盡心於庶獄臣心識昏憒豈足論聖功之深逺談天徳之髙大哉陛下兼衆美而有之靡不備具㣲臣深為陛下惜之重之愛之寳之周易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡而不失其正者其惟聖人乎易文言傳釋乾卦之辭由此言之進有退之義存有亡之機得有喪之理老臣所以為陛下惜之者盖謂此也老子曰知足不辱知恥不殆臣謂陛下威名功徳亦可足矣拓地開疆亦可止矣彼髙麗者邉夷賤類不足侍以仁義不可責以常理古来以魚鱉畜之冝從闊略必欲絶其種類深恐獸窮則搏且陛下毎決死囚必令平聲三覆五奏進素食停音樂者盖以人命所重感動聖慈也況今兵士之徒無一罪戾無故驅之於戰陣之間委之於鋒刃之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望轊車而掩泣抱枯骨而摧心足變動隂陽感傷和氣實天下之冤痛也且兵凶器戰危事不得已而用之向使髙麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也乆長能爲中國患而陛下除之可也有一於此雖日殺萬夫不足爲媿今無此三條坐煩中國内爲舊主雪怨爲去聲後外爲同十七年髙麗臣莫離支弑其君髙武而獨專國政太宗於是有征遼之議外爲新羅報讎十七年新羅遣使言百濟攻取其國四十餘城復與髙麗連兵謀絶新羅入朝之路乞兵救援上命司農丞相里玄奬齎璽書賜髙麗使勿攻新羅莫離支竟不從玄奬還具言其状上於是欲征之豈非所存者小所損者大願陛下遵皇祖老子止足之誡以保萬代巍巍之名發霈然之恩降寛大之詔順陽春以布澤許髙麗以自新焚凌波之船罷應募之衆十八年太宗欲征遼東長安洛陽募士三千戰艦五百艘自然華夷慶頼逺肅邇安臣老病三公朝夕入地所恨竟無塵露微増海岳謹罄殘魂餘息豫代結草之誠左傳宣公十五年秦伐晉次于輔氏魏顆敗秦師獲杜囘初魏武子有嬖妾无子武子疾命顆曰必嫁是疾甚則曰必殉及卒顆見老人結草以亢杜囘杜囬躓而顛故獲之夜夣之曰余而所嫁之婦人父也爾用爾先人之治命余是以報儻蒙録此哀鳴即臣死骨不朽太宗見表歎曰此人危篤如此尚能憂我國家雖諌不從終爲善策唐氏仲友曰易旣濟六三與未濟九三均是伐鬼方均是三年之伐在旣濟則戒之在未濟則勉之武功之未成聖人必勉之於始武功之旣成聖人必戒之於終玄齡之書得旣濟之象太宗莫之聽者無畏相之心耳朱氏黼曰玄齡於太宗左右未甞有所可否每逢帝怒惟震懼遜謝非不能諌也史稱王魏善諌諍房杜譲其直是以太宗初舉伐遼遂良再言之不聽至是再舉外庭無敢一言雖玄齡任用之乆相信之深亦不敢面陳於在廷之日獨表諌於屬纊僅存之際理切詞盡太宗嘉納不之從也至身没而後罷之以此觀太宗晚節大畧可攷矣愚按玄齡此䟽乃太宗征遼無功之後思謀再舉之時而玄齡行将屬纊之日也此䟽辭意懇切何乃不見於初親征之際耶豈太宗忿心難懲縦忠言苦口不足以尼其行耶母乃俟其大舉無成夫然後諌耶然玄齡此䟽切矣太宗止曰此人危篤尚能憂我國家亦未有樂從之意越明年則以疾而命皇儲聽政矣否則忿兵再舉事未可知也書曰無怠無荒四夷來王又曰明王慎徳四夷咸賔帝王保治厥有㫖㦲以太宗之賢猶爾況其次者乎貞觀二十二年軍旅亟動宫室互興百姓頗有勞弊充容唐制女官號九嬪之一也徐氏名恵長城人生五月能言四歲通經八歲屬文父孝徳嘗試使擬離騷為小山篇曰仰幽巖而流盻撫桂枝以凝想将千齡子此遇全何為子獨往太宗聞之召為才人手不釋卷文辭敏贍帝益禮顧永徽初卒贈賢妃上䟽諌曰貞觀已來二十有餘載風調雨順年登歲稔人無水旱之弊國無饑饉之災昔漢武帝守文之常主猶登刻玉之符漢武帝封泰山下東方如郊祠太一之禮封廣丈二尺高九尺其下則有玉牒書書秘禮畢禪肅然山齊桓公小國之庸君尚塗塗圖古通用泥金之望齊桓公旣覇㑹諸侯於葵丘欲行封禪後漢制封禪用玉牒玉檢以水銀和金為泥望者望而祭也陛下推功損已讓徳不居億兆傾心猶闕告成之禮通典古者帝王之興每易姓而起以致太平必封乎泰山所以告成功也云亭佇謁未展升中之儀黄帝禪亭亭五帝禪云云皆山名禮云升中于天此之功徳足以呾嚼百王網羅千代者矣然古人有云雖休勿休良有以也守保未備聖哲罕兼是知業大者易驕易以䜴切後同願陛下難之善始者難終願陛下易之竊見頃年以來力役兼緫東有遼海之軍西有崑丘之役士馬疲於甲胄舟車倦於轉輸轉去聲且召募投戎去留懐死之痛因風阻浪人有漂溺之危一夫力耕年無數十之獲一船致損則傾覆數百之粮是猶運有盡之農功填無窮之巨浪圖未獲之他衆喪巳成之我軍雖除兇伐暴有國常規然黷武習兵先哲所戒昔秦皇併吞六國反速危禍之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄徳輕邦圖利忘害肆情縦欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流仁此下疑闕四字減行役之煩増雨露之恵妾又聞爲政之本貴在無爲竊見土木之功不可遂兼北闕初建南營翠微曽未踰時玉華創制曾音層翠微玉華並宫名非惟構架之勞頗有工力之費雖復茅茨示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宫菲室聖王之所安金屋瑶臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身樂並音洛願陛下使之以時則力不竭矣用而息之則心斯恱矣夫珍玩技巧為喪國之斧斤夫音扶後同珠玉錦繡實迷心之酖毒竊見服玩鮮靡如變化於自然職貢竒珍若神仙之所製雖馳華於季俗實敗素於淳風是知漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡紂始為象箸箕子曰彼為象箸必将為犀玉之杯方驗侈麗之源不可不遏夫作法於儉猶恐其奢作法於奢何以制後伏惟陛下明照未形智周無際窮奥秘於麟閣漢宣帝圖功臣於麒麟閣盡探賾於儒林探平聲賾土革切千王理亂之蹤百代安危之迹興亡衰亂之數得失成敗之機固亦包吞心府之中循環目圍之内乃宸衷乆察無假一二言焉惟知之非難行之不易志驕於業著體逸於時安伏願抑志摧心慎終成始削輕過以添重徳擇今是以替前非則鴻名與日月無窮盛業與乾坤永泰太宗甚善其言特加優賜甚厚愚按人臣進諌於君古人擬之批鱗雖士夫猶以為難況婦人女子乎其見之史傳則鄧㬅論莫敖之敗成風請須句之封班姬辭共輦之載劉氏救元逹之刑寥寥千載不多見也太宗納諌之徳冠絶古今外之房杜王魏内之文徳皇后亦足以交修而夾輔之矣宫妾之中復有如徐氏者焉觀其諌䟽有老師宿儒不能逺過者鳴呼賢㢤安邉第三十六凡二章貞觀四年李靖擊突厥頡利敗之其部落多來歸䧏者降下江切後同詔議安邉之策中書令温彦愽議請於河南處之處上聲後同準漢建武時置降匈奴於五原塞下塞音賽後同五原塞今為豊州隷河東全其部落得為捍蔽又不離其土俗因而撫之一則實空虚之地二則示無猜之心是含育之道也太宗從之秘書監魏徴曰匈奴自古至今未有如斯之破敗此是上天勦絶宗廟神武且其世㓂中國萬姓冤讎陛下以其為降不能誅滅即宜遣發河北今山東道居其舊土匈奴人面獸心非我族類强必㓂盜弱則卑伏不顧恩義其天性也秦漢患之者若是故時發猛将以撃之将去聲收其河南以為郡縣陛下以内地居之且今䧏者幾至十萬數年之後滋息過倍居我肘腋甫邇王畿心腹之疾将為後患尤不可處以河南也温彦博曰天子之於萬物也天覆地載有歸我者則必養之今突厥破除餘落歸附陛下不加憐愍棄而不納非天地之道阻四夷之意臣愚甚謂不可宜處之河南所謂死而生之亡而存之懐我厚恩終無叛逆魏徴曰晉代有魏時胡部落分居近郡江統勸逐出塞外武帝不用其言數年之後遂傾瀍洛江統字應元陳留人晉武帝時為山隂令時關隴為氐羌所擾統深推四夷亂華宜杜其萌乃作徙戎論帝不能用未及十年而夷狄亂華時人服其深識前代覆車殷鑒不逺陛下必用彦博言遣居河南所謂養獸自遺患也彦博又曰臣聞聖人之道無所不通突厥餘魂以命歸我收居内地教以禮法選其酋首酋慈由切後同遣居宿衛畏威懐徳何患之有且光武居河南單于於内郡單音蟬以為漢藩翰終于一代不有叛逆又曰隋文帝勞兵馬費倉庫樹立可汗令復其國令平聲後同後孤恩失信圍煬帝於鴈門隋開皇二十年文帝以突厥突利為啓民可汗妻以義成公主大業十一年煬帝廵北邉始畢可汗帥騎數十萬謀襲帝義成公主遣使告變帝馳入鴈門突厥圍鴈門急攻之帝泣目盡腫後公主以計解圍今陛下仁厚從其所欲河南河北任情居住各有酋長音掌不相統屬力散勢分安能為害給事中杜楚客如晦弟也少尚竒節𥘉建成難作遁舎嵩山貞觀曰年召為給事中太宗曰人不恤無官患才不副而兄與我共支一心者尓當如兄事吾進蒲州刺史有能名遷工部尚書攝府事以威肅聞進曰北狄人面獸心難以徳懐易以威服易以豉切今令其部落散處河南逼近中華乆必為患至如鴈門之役雖是突厥背恩背音倍自由隋主無道中國以之喪亂豈得云興復亡國以致此禍夷不亂華前哲明訓存亡繼絶列聖通規臣恐事不師古難以長乆太宗嘉其言方務懐柔未之從也卒用彦博策卒子聿切自幽州至靈州東至幽州西至靈州也置順祐化長四州都督府以處之其人居長安者近且萬家自突厥頡利破後諸部落首領來降者皆拜将軍中郎将布列朝廷郎将之将去聲五品巳上百餘人殆與朝士相半唯拓㧞不至拓他各切㧞蒲末切夷複姓又遣招慰之使者相望於道使去聲涼州都督李大亮以為於事無益徒費中國上䟽曰臣聞欲綏逺者必先安近中國百姓天下根本四夷之人猶於枝葉擾其根本以厚枝葉而求乆安未之有也自古明王化中國以信馭夷狄以權故春秋云戎狄豺狼不可厭也諸夏親昵不可棄也左傳閔公元年管仲告齊侯之辭自陛下君臨區宇深根固本人逸兵強九州殷富四夷自服今者招致突厥雖入提封臣愚稍覺勞費未悟其有益也然河西民庶鎮禦藩夷州縣蕭條戸口鮮少鮮上聲加因隋亂減耗尤多突厥未平之前尚不安業匈奴微弱以來始就農畒若即勞役恐致妨損以臣愚惑請停招慰且謂之荒服者故臣而不納是以周室愛民攘狄竟延八百之齡秦王輕戰事胡故四十載而絶滅漢文養兵静守天下安豐孝武揚威逺略海内虚耗雖悔輪臺追巳不及漢武帝旣悔逺征伐而搜粟都尉桑弘羊與丞相御史奏言故輪臺以東有漑田五千頃以上請置校尉分護歲收其利以威西國上不從乃下詔深陳旣往之悔至于隋室早得伊吾兼綂鄯善伊吾鄯善並西域國名伊吾在大磧外南至玉門關八百里漢宜禾都尉所治且旣得之後勞費日甚虚内致外竟損無益逺尋秦漢近觀隋室動静安危昭然備矣伊吾雖已臣附逺在藩磧民非夏人地多沙鹵其自竪立稱藩附庸者請覉縻受之使居塞外必畏威懐徳永爲藩臣盖行虚恵而收實福矣近日突厥傾國入朝旣不能俘之江淮以變其俗乃置於内地去京不逺雖則寛仁之義亦非乆安之計也每見一人初降賜物五匹袍一領酋長悉授大官禄厚位尊理多糜費以中國之租賦供積惡之㐫虜其衆益多非中國之利也太宗不納十三年太宗幸九成宫突厥可汗弟中郎将阿史那結社率隂結所部将去聲阿史那突厥姓名結社率突利可汗之弟時為中郎将并擁突利子賀羅鶻夜犯御營事敗皆捕斬之太宗自是不直突厥悔處其部衆於中國還其舊部於河北建牙於故定襄城立李思摩為乙彌泥熟俟利苾可汗以主之因謂侍臣曰中國百姓實天下之根本四夷之人乃同枝葉擾其根本以厚枝葉而求又安未之有也初不納魏徴言遂覺勞費日甚幾失乆安之道㡬平聲舊本李大亮䟽以下至太宗不納另為一章十三年以下接前叚為一章今按其是一事因次第其辭合為一章又按通鑑載此事衆議甚詳辭多不錄胡氏寅曰獻言之道惟理是慿則言必忠聴言之道勿以同於已言為是則聽必審太宗處降突厥徧詢在廷未若魏徴之言畫善也而太宗不從顧用温彦博之䇿何也彦博之䇿太宗之所欲為者其偶同歟未可知也其先意承志歟未可知也如所見偶同則不應言之再三如先意承志則不得為忠矣太宗用其言未㡬有矢及帳殿之變如此而欲功加外荒冠帶百蠻者非聖主之盛節也又曰魏公嘗勸用侯君集為宰相君集反太宗疑徴黨之絶昏仆碑温彦愽勸居突厥塞内突厥反太宗不怒彦愽而追思魏徴之言事同而處之異何也以見留突厥塞内使充宿衛如一家者本太宗雄夸之心彦博探其微賛之故不以歸咎歟雖然行宫入幕之變亦已危矣太宗慕冠帶百蠻之名推心不疑㡬至危殆豈非後世之永戒㢤唐氏仲友曰荀卿言以徳兼人者王以富兼人者貧突厥旣破頡利旣擒若用魏公之言使處河北於邉無擾於國無費不亦善乎乃卒用彦愽之䇿若不因結社之亂悉徙故地假之世數蕃孳為唐之費不亦重乎大抵處置䧏人最難内之中國亂華俗置諸塞内生後患惟反之故地為立君長從其故俗服則為藩國去不為叛臣此長䇿也愚按昔成周盛時四夷來朝坐之國門之外盖亦如九服之制蠻夷鎮藩在所外也春秋之世秦晉遷陸渾之戎于伊川其後掦拒泉臯伊雒之戎入王城伐京師雖子帶之所召亦始遷之失也晉江統之論可以為鑑矣唐興太宗以武定天下天下旣平窮荒悉服突厥之委命闕庭尤漢以下之所無者固宜置之中夏夸示逺近也當是時魏徴以忠直得上心屢有囬天之力而竟莫之囬温彦愽以儒臣遇合處置部落之議胡為乎獨異衆正之見邪遂使蕃酋列在禁衛有因而入居長安者近萬家此與陸渾之居伊雒何以異㢤彼為成周之衰時此為有唐之盛際太宗樂於從魏徴之言者胡獨於此而不從之乎他日禄山之亂宫闈豈非太宗詒謀有以啓之貞觀十四年侯君集平髙昌之後太宗欲以其地為州縣魏徵曰陛下初臨天下髙昌王先來朝謁自後數有商胡數音朔稱其遏絶貢獻加之不禮大國詔使去聲遂使王誅載加若罪止文泰髙昌王姓麴名文泰斯亦可矣未若因撫其民而立其子所謂伐罪弔民威徳𬒳於遐外為國之善者也今若利其土壤以為州縣常須千餘人鎮守數年一易每來往交替死者十有三四遣辦衣資離别親戚十年之後隴右空虚陛下終不得髙昌撮糓尺布以助中國所謂散有用而事無用臣未見其可太宗不從竟以其地置西州仍以西州為安西都護府每嵗調發千餘人調去聲防遏其地黄門侍郎楮遂良亦以為不可上䟽曰臣聞古者哲后臨朝明王創業必先華夏而後夷狄廣諸徳化不事遐荒是以周宣薄伐至境而反周宣王名靖詩曰薄伐獫狁至于太原言逐出之而不窮追也始皇逺塞中國分離秦始皇使蒙恬發兵三十萬人收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里陛下誅滅髙昌威加西域收其鯨鯢以為州縣然則王師初發之歲河西供役之年供平聲飛蒭輓粟十室九空數郡蕭然五年不復陛下每嵗遣千餘人而逺事屯戍終年離别萬里思歸去者資装自須營辦旣賣菽粟傾其機杼經途死亡復在方外兼遣罪人増其防遏所遣之内復有迯亡官司捕捉為國生事為去聲髙昌塗路沙磧千里冬風氷冽夏風如焚行人遇之多死易云安不忘危理不忘亂設令平聲張掖塵飛酒泉烽舉張掖今為甘州路酒泉今為肅州路隷甘肅陛下豈能得髙昌一人菽粟而及事乎終須發隴右諸州星馳電擊由斯而言此河西者方於心腹彼髙昌者他人手足豈得糜費中華以事無用陛下平頡利於沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺萌更樹君長音掌復立髙昌非無前例此所謂有罪而誅之旣服而存之冝擇髙昌可立者徵給首領遣還本國負戴洪恩長為藩翰中國不擾旣富且寜傳之子孫以貽後代䟽奏不納至十六年西突厥遣兵㓂西州太宗謂侍臣曰朕聞西州有警急雖不足為害然豈能無憂乎往者初平髙昌魏徴褚遂良勸朕立麴文泰子弟依舊為國朕竟不用其計今日方自悔責昔漢髙祖遭平城之圍而賞婁敬漢髙帝欲擊匈奴使婁敬使匈奴還報曰匈奴伏竒兵以争利不可擊也上怒曰齊虜以口舌得官廼今妄言沮吾軍械繫敬至廣武遂至平城匈奴果出竒兵圍帝白登七日然後得觧還至廣武赦敬曰吾不用公言以困平城廼封敬千戸為関内侯袁紹敗於官渡而誅田豐漢獻帝時曹操兵大破袁紹於官渡紹與八百騎渡河走至黎陽衆稍復歸或謂田豐曰君必見重豐曰公今戰敗而歸内恚将發吾不望生紹謂逄紀曰田别駕前諌止吾吾慙之紀曰豐聞将軍之退拊手大笑喜其言之中也袁紹遂殺豐朕恒以此二事為誡寜得忘所言者乎范氏祖禹曰魏徵之言其利害非不明也以太宗之智豈不足知之惟其好大而喜逺矜功而徇名不能以義制心故忠言有所不從而欲前世帝王皆莫我若也又曰有國者䘮師之禍小而或以覇秦穆公勾踐是也得地之禍大而或以亡楚靈王齊湣王是也是故廣地不若廣徳疆兵不若疆民先王患徳之不足而不患地之不廣患民之不安不患兵之不疆封域之外聲教所不及者不以煩中國也太宗不從忠諌卒自咎悔況不若太宗之疆而可為手胡氏寅曰中國禮義之地四夷所爲視効而賔服者也髙昌有罪王師討之旣聞其䘮是罪人已死則宜按兵遣使立其嗣子懐以恩信乃不攻而自服之道也今乃伐其憂荒無禮無義夫豈天子之兵乎是故以利言之乘人之隙迫以強暴坐收數百里之地斥廣輿圖信足以夸耀一時以義言之則窮兵逺討以髙昌王一人桀驁之故而係累其孤郡縣其土仁者不爲也真氏徳秀曰是時禇遂良亦諌不從十七年西突厥人㓂帝悔之曰魏徴禇遂良勸我復立髙昌吾不用其言今方自咎耳𥘉議處突厥於河南徴争之而帝不從後以結社率之變而悔後議以髙昌爲郡縣徴争之而帝復不從又以西突厥入㓂而悔使早從忠言安有是㢤然知過而能悔此其所以興也愚按自夏禹西戎即叙之後成周西旅底貢之餘通西域而開玉関極城郭諸國悉服實始於漢武然中國勞弊亦巳甚矣閉玉関謝西域此光武所以爲盛徳也太宗滅髙昌置都護由是為開通西域之計而燕支踈勒丘慈于闐四鎮遂為遐陬重地至于開元自玉門以西烟火萬里為唐極盛曽幾何時天寳以後事勢日非前日之輿圖舉為戎馬之郊矣周公有言曰徳不加焉則君子不饗其質政不施焉則君子不臣其人況奪其土地而置以郡縣乎務廣地不如務廣德古訓豈虚語哉貞觀政要卷第九
