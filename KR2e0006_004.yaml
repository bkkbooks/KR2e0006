body:
  text: 論太子諸王定分九論尊敬師傅十論教戒太子諸王十一論規諌太子十二太子諸王定分第九章凡四貞觀七年授吳王恪齊州都督太宗謂侍臣曰父子之情豈不欲常相見耶但家國事殊須出作藩屏且令其早有定分凢言定分並同令平聲分去聲絶覬覦之心我百年後使其兄弟無危亡之患也觀十年始改王吳授安按史傳恪初王欝林貞制事以禮制心外為之君臣内為之父子今當去膝州都督帝賜書曰汝惟茂親勉思所以藩王室以義太子又欲立恪長孫無忌固争帝曰公豈以非已甥下不遺汝珍而遺汝以言其念之哉帝後以晉王為良主且舉棊不定則敗況儲位乎帝乃止邪且恪英果類我無忌曰晉王仁厚守文之王使居藩屏欲其早有定分可謂䖏之盡其道愚按是時承乾方䖏東宮凶德未著太宗出吳始終之矛盾邪竊嘗論之漢高祖之欲易惠帝矣其後既立晉王又欲立恪卒陷恪扵死地何不可以尋常嫡庶之禮槩論之也合二君之事唐太宗之欲易高宗皆為宗廟社稷之逺圖初太子是也其欲立趙王則出扵溺愛之私矣子而觀之則太宗之事近正何也漢高祖之欲易以成呂氏之禍杜牧所謂四老安劉反為滅劉房之不立如意是也然遂引致四皓擁䕶太子大計為心則蚤與張陳陵勃謀之以恒易盈可者其可不寒心哉故朱子謂高祖若能以天下愛之私外不聞恪有魏王奪嫡之計太宗深知也若吳王恪之在當時内不聞其母有戚姬嬖計問之無忌無忌外雖為正大之論内實懷外高宗之懦弱不足以承宗廟之重故以社稷大通於天矣夫以恪之英才幸而嗣聖之際尚存家之私其後卒以無辜陷恪死地無忌之罪上不悲哉然則太宗之事賢於高祖無忌之心則庶幾匡正唐室不致牝晨之禍如此其烈也豈罪人矣真子房之貞觀十一年侍御史馬周上䟽曰漢晉以來諸王皆為樹置失宜声為去不預立定分以至於滅亡人主熟知其然但溺於私愛故前車既覆而後車不改轍也今諸王承寵遇之恩有過厚者臣之愚慮不惟慮其恃恩驕矜也昔魏武帝寵樹陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王從而畏之也陳思王也植多藝能操愛之文帝既立植寵日衰魏武帝曹操也操生四子丕彰植熊丕文帝也植侯後進王東阿後以悖慢貶安鄉此則武帝之寵陳思適所以苦之也且帝子何患不富貴身食大國封戸不少好衣美食之外更何所須而毎年别加優賜曾無紀極層曾音俚語曰猶云俗諺也俚音里俚語貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已聲見䖏上現音當須制長乆之法使萬代遵行䟽奏太宗甚嘉之賜物百叚而獨牽於私欲不能自克扵嫡庶之際不為逺處唐氏仲友曰太宗制古之所不制臣古之所不臣有先見之明惜哉言之不力竟使賢才宗支連頸就戮周言焉夫先王愛子之心豈不欲其周徧哉盖所以愚按周官有王世子不會之文王之衆子不與勇為太子又使晉漢秦蜀四王各據方面恩寵别嫌疑明嫡庶絶覬覦息禍亂也隋文帝既立之分也今吾五子同母何憂禍亂哉其後五子相埒且誇示於人曰前代兄弟相爭者由嫡庶宗目覩隋室之禍宜知所鑒矣既立承乾為太互相攘奪無一人得令終者至今為天下笑太亟以為言太宗雖能嘉賞迄不能改愚觀太宗子復寵待諸王無所高下馬周窺見禍亂之端而忘之豈所謂溺愛者不明邪毎事以隋為鑒獨於諸王定分貞觀十三年諌議大夫褚遂良以毎日月一作特給魏王泰府料物有逾於皇太子上䟽諫曰昔聖人制禮尊嫡卑庶謂之儲君之副故謂之儲君儲音除副也太子君道亞霄極甚為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本於人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正禮特須尊崇如不能明立定分遂使當親者踈當尊者卑則佞巧之徒乗機而動私恩害公或至亂國伏惟陛下功超萬古道冠百王声冠去發施號令声施平為世作法声為去一日萬幾或未盡美臣職諫諍無容靜黙伏見儲君料物翻少魏王朝野見聞不以為是臣聞傳曰声傳去愛子敎以義方忠孝恭儉義方之謂昔漢竇太后及景帝並不識義方之理遂驕恣梁孝王封四十餘城苑方三百里大營宫室複道彌望積財鏹巨萬計出警入蹕小不得意發病而死警入稱蹕竇太后漢文帝之后生景帝鏹舉兩切貫錢索也蹕音畢天子出稱曰孝事見本傳及梁王王名武謚宣帝亦驕恣淮陽王㡬至於敗頼其輔以退讓之臣僅乃獲免宣帝庶子也謚曰憲事㡬平聲淮陽王名欽漢傳見本且魏王既新出閤伏願恒存禮訓妙擇師傅示其成敗既敦之以節儉又勸之以文學惟忠惟孝因而奨之道徳齊禮之以禮有耻且格論語曰道之以徳齊乃為良器此所謂聖人之敎不肅而成者也太宗深納其言之邪心者太宗也非泰之罪也太宗既立承乾為陳氏惇脩曰甚㢤太宗之不善為父也所以啓泰承乾其理何邪是時雖未嘗許泰為太子而禮數太子而所以眷眷於泰而寵錫之者其禮乃過扵免泰之無覬覦而不以計傾承乾者乎及其邪心優異則立㤗之意固已見於不言之間矣然則寜是何異誘其入而復閉其門不亦惑乎既啓然後從而裁抑之既幽之復降之雖愛不得而並焉所以明尊卑之䓁杜僭忒之愚按古者不以私恩害公義故嫡長之重衆子不能定其分異其禮雖深納遂良之言而私愛源也太宗以聪明之君而於太子魏王之事獨兩廢焉其亦可監也夫之心終不能自克卒至於貞觀十六年太宗謂侍臣曰當今國家何事最急各為我言之為朕同為去聲後尚書右㒒射高士廉行初秦王名儉以字書封許國公後遷僕射攝太傅掌機務二十一年卒薦為治中王為皇太子授右庶子既即位為吏部尚曰養百姓最急黄門侍郎劉洎曰撫四夷急中書侍郎岑文本曰傳稱道之以徳齊之以禮義為急声傳去諌議大夫褚遂良曰即日四方仰徳不敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫声遺去此最當今日之急太宗曰此言是也朕年將五十已覺衰怠既以長子守器東宫掌長音諸弟及庶子數將四十心常憂慮在此耳但自古嫡庶無良何嘗不傾敗家國公等為朕捜訪賢德以輔儲宫爰及諸王咸求正士且官人事王不宜歲乆歲乆則分義情深非意闚𨵦𨵦音俞窺伺貌分去聲闚音窺多由此作其王府官寮勿令過四考声令平傅王者又令王府官不得過四考何也彼誠賢者唐氏仲友曰太宗不知溺愛之在已獨欲責之保一日猶不可况四考乎雖終身而未足誠不賢也若高士廉劉洎岑文本之言皆急務也而褚愚按國家急務養百姓也撫四夷也道徳齊禮其時承乾之惡已著魏王泰窺伺之情頗露漢遂良則以太子諸王須有定分為當今之急考也非以養百姓撫四夷道徳齊禮為不急也太王元昌同惡之迹益彰遂良之言宜其為急務年而有東宫之變矣方且曰公䓁為朕捜訪賢宗不思所以正定分而責備扵人抑末矣且踰何益之有哉徳以輔儲宫又尊敬師傅第十章凡六貞觀三年太子少師声少去李綱瑗慕張綱為人改焉字文紀觀州人始名為長史高祖平京師綱上謁既受禪拜禮部尚書太仕隋為太子洗馬擢尚書右丞隋末賊帥何潘仁刼貞觀初拜是職五年卒謚曰貞子詹事諫建成不聽遂乞骸骨有脚疾不堪踐履太宗賜步輿令三衛舉入東宫府分為上中下三䓁掌令平聲唐制東宫六率是為三衛宿衛之事詔皇太子引上殿親拜之大見崇重綱為太子聲為去陳君臣父子之道問寝侍膳之方篇註見封建理順辭直聽者忘倦太子嘗商略古來君臣名教竭忠盡節之事綱懔然曰嚴毅貌懍音凜託六尺之孤寄百里之命輔幼君攝國政也論語曽子之言謂古人以為難綱以為易切以豉毎吐論發言皆辭色慷慨有不可奪之志太子未嘗不聳然禮敬後蚤建太子以固天下之本而嚴太子尊敬師愚按世子為王之貳天下之本也太宗即位之節故其發言吐論辭色毅然宜皇儲之所禮敬傅之禮稽之古典允合其宜李綱少慷慨有風事百君者綱之謂歟也古人謂一心可以貞觀六年詔曰朕比尋討經史鼻比音明王聖帝曷嘗無師傅哉前所進令遂不覩三師之位意將未可何以然黄帝學大顚顓頊學録圖堯學尹壽君疇一作舜學務成昭禹學西王國湯學威子伯文王學子期武王學虢叔向新序已上出劉前代聖王未遭此師則功業不著乎天下名譽不傳乎載籍況朕接百王之末智不同聖人其無師傅安可以臨兆民者哉詩不云乎不愆不忘率由舊章樂篇之辭詩大雅嘉夫不學則不明古道扶夫音而能政致太平者未之有也可即著令置三師之位年復置與三公皆不設官属按史志隋廢三師貞觀十一邦爕理隂陽官不必備惟其人少師少傅少保愚按周書曰立太師太傅太保曰三公論道經其極必臯䕫稷契伊傳周召而後可世變無窮曰三孤貳公弘化寅亮天地豈易其人哉若論子所師法無所緫職太尉司徒司空為三公佐隨世升降可也唐以太師太傅太保為三師天以太宗之時固皆元勲碩徳居之制雖殊古而天子理隂陽平邦國無所不統此則非古制也其人哉人君欲稽古以正名茍捨周官愚未見名意則同降此則為加官視品秩崇髙耳豈皆也其可貞觀八年太宗謂侍臣曰上智之人自無所染但中智之人無恒從教而變況太子師保古難其選成王㓜小周召為保傅為太傅周公為太保保保其身體賈誼曰成王㓜在襁抱之中召公徳義傳傅之左右皆賢日聞雅訓足以長仁益徳掌長音使為聖君秦之胡亥用趙髙作傅教以刑法及其嗣位誅功臣殺親族酷暴不巳旋踵而亡初始皇使趙高胡亥秦二世名刻刑令有罪者相坐誅滅大臣宗室盡除先帝之故教胡亥决獄胡亥幸之及嗣位髙說曰陛下嚴法而大臣公子有罪輙誅二世卒為髙所弑臣更置陛下之所親信二世乃更為法律故知人之善惡誠由近習朕今為太子諸王聲為去精選師傅令其式瞻禮度聲令平有所禆益公等可訪正直忠信者各舉三兩人根本安固枝葉茂盛永孚于休則開導而訓告愚按太子國家之根本也諸王公族之枝葉也不切切扵嚴師傅也而諸王之賢求如河間東之豈不在師傅乎然三代尚矣自漢以来未嘗實悖天道况崇髙之上者乎為君父者尚慎于平何不多見夫世祿之家鮮克由禮以蕩陵徳兹貞觀十一年以禮部尚書王珪兼為魏王師制皇叔唐因隋掌傅相訓導匡其過失昆弟皇子為親王者置師太宗謂尚書左僕射房玄齡曰古來帝子生於深宫及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲皆得安全王珪我乆驅使甚知剛直志存忠孝選為子師卿宜語泰毎對王珪如見我面宜加尊敬不得懈怠珪亦以師道自處聲上時議善之也授人而道以人倫為至魏王泰是時承寵偏厚於胡氏寅曰為人師者豈徒禮貌云乎哉必有道以望而王珪告戒之方教訓之道未之聞也魏王卒兄弟間漸生異慮防其㣲而革其心不於師而誰獨泰之罪哉珪亦與有責矣以窺伺儲位廢斥而死夫豈之意可謂得人矣然嘗觀太宗愛泰之心甚至愚按太宗以王珪為魏王師且諭玄齡以嚴教蘇勗勸泰延賔客著書如古賢王奏撰括地志固父子之情也乃詔即府置文舘得自引慱士泰之月禀又過太子逺甚褚遂良亦以為言其於是士有文學者多與而貴游因藉其門如市必如河間東平而後可也且漢武帝為戾太子後卒有奪嫡之罪竟罹幽貶夫傚古賢王著書之置舘引賓客私權勢其毋乃與所謂嚴教之立愽望苑使通賓客識者非之今泰諸王也使歟意異貞觀十七年太宗謂司徒長孫無忌司空房玄齡曰三師以徳道人者也若師體卑太子無所取則於是詔令聲平撰太子接三師儀注太子出殿門迎先拜三師三師荅拜毎門讓三師三師坐太子乃坐與三師書前名惶恐後名惶恐再拜至矣師嚴然後道尊况元良而屈體盡敬於師愚按太宗制太子接三師儀注委曲尊隆意亦之言於政事書曰師道之教訓保保其身體傅傅其闗繫豈不尤重也然嘗觀賈誼引大戴記少固明孝仁禮義以道習之入學則承師問道傳之徳義於是為置三少皆上大夫也三公三此古昔太子親師傅之實也又不止於儀注之退習而考扵太傅太傅罰其不則而匡其不及可不考於賈誼之書文而已為君父者不貞觀十八年髙宗初立為皇太子立晉王治為皇太貞觀十七年四月髙宗子是為尚未尊賢重道太宗又嘗令太子後同令平聲居寝殿之側絶不徃東宫散騎常侍劉洎上書曰臣聞郊迎四方孟矦所以成徳郊立夏迎夏於南郊立秋月令天子立春迎春於東或曰周制東西南北之學在於四郊孟長也孟矦謂迎秋於西郊立冬迎冬於北郊按此非王世子之事徳為切迎字疑誤世子也此説於成齒學三讓元良由是作貞子行一文王世國人觀之曰將君我而與我齒讓曰有父在則禮然物而三善皆得者其齒於學之謂也故世子齒於學君臣之義矣三曰長長也然而衆知長幼之節矣故然而衆知父子之道矣二曰君在則禮然而衆著於治禮曰一有元良萬邦作貞父子君臣長幼之道得而國斯皆屈主祀之尊一作主祀主嗣申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由兹道永固鴻基者焉至若生乎深宫之中長乎婦人之手掌長音未曾識憂懼層曾音無由曉風雅雖復神機不測天縱生知而開物成務終由外奬匪夫崇彼干籥之楯也籥樂管以竹為之三孔長夫音扶後同籥音約于舞者所執衆聲者也三尺以和聽兹謡頌何以辨章庶類甄覈彛倫珍甄音歴考聖賢咸資琢玉器人不學不知道學記玉不琢不成是故周儲上哲師望奭而加裕召公名成王以二公為師保周儲謂成王也望太公號奭漢嗣深仁引園綺而昭徳子盈張良教太子迎四皓髙祖漢嗣謂惠帝盈也高祖欲廢太䕶太子既去上目送之曰彼四人為之輔羽翼已成置酒太子侍四皓從皆年八十餘上曰煩公幸卒調綺里季夏黄公甪里先生也難動矣卒不廢四皓東園公原夫太子宗祧是繫善惡之際興亡斯在不勤于始將悔于終是以鼂錯上書令通政術舍人遷博士上書曰人主所以尊顯功鼂音潮錯音措漢文帝時鼂錯為太子下而治其衆則群臣畏服矣知所以聽言受事則不名揚於萬世者以知術數也故人主知所以臨制臣孝事上則臣子之行備矣此四者臣竊為皇太子急欺蔽矣知所以安利萬民則海内必從矣知所以忠之賈誼獻䇿務知禮教懷王傳丄書曰古之王者太賈誼雒陽人漢文帝時為梁郊見于天也過闕則下過廟則趨孝子之道也故自子迺生固舉以禮使士負之有司齊肅端冕見之南教已行矣為赤子而竊惟皇太子玉𥙿挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天姿非勞審諭固以華夷仰徳翔泳希風矣然則寝門視膳已表於三朝封建篇註音潮事見藝宫論道宜弘於四術立四教順先王詩王制樂正崇四術以造士書禮樂雖富於春秋飭躬有漸實恐歲月易徃豉切易以墮業興譏取適晏安言從此始臣以愚短幸叅侍從聲去思廣儲明暫願聞徹不敢曲陳故事切請以聖徳言之伏惟陛下誕叡膺圖登庸歴試多才多藝道著於匡時允文允武功成於纂祀萬方即叙九圍清晏尚且雖休勿休日慎一日求異聞於振古勞叡思於當年後同思去聲乙夜觀書事髙漢帝經理夜分乃寐漢紀光武講論馬上披卷勤過魏王軍旅手不釋卷魏紀文帝雖在陛下自勵如此而令太子優游棄日不習圖書臣所未諭一也加以暫屏機務棄也屏音餅即寓雕蟲賦曰童子雕蟲箓刻壯夫揚子曰或問吾子少而好也不為紆寶思於天文則長河韜映摛玉華於仙札音摛癡則流霞成彩固以錙銖萬代為絫十絫為銖十銖錙音淄銖音殊十黍錙為冠冕百王屈宋不足以升堂為大夫作離騷經為屈原名平楚懐王時子楚大夫以詞賦名詞賦之祖宋玉屈原弟鍾張何階於入室常魏太尉鍾繇字元臨池學書池水盡黒時稱草聖善草書張芝字伯英後漢太尉陛下自好如此聲好去而太子悠然静處聲上不尋篇翰臣所未諭二也陛下備該衆妙獨秀寰中猶晦天聦俯詢凡識聴朝之隟同與隙引見群官降以温顔訪以今古故得朝廷是非閭里好惡凡有巨細必關聞聴陛下自行如此而令太子乆趨入侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥厥孫謀詩曰貽蔑而不急未見其可伏願俯推叡範訓及儲君授以良書娱之嘉客朝披經史觀成敗於前蹤晩接賔遊訪得失於當代間以書札聲間去繼以篇章則日聞所未聞日見所未見副徳愈光群生之福也竊以良娣之選徧於中國仰惟聖㫖本求典内冀防㣲慎逺慮臣下所知暨乎徴簡人物聲徴平則與聘納相違監撫二周監國撫軍也監平聲監撫謂未近一士愚謂内既如彼外亦宜然者恐招物議謂陛下重内而輕外也古之太子問安而退所以廣敬於君父異宮而處聲上所以分别扵嫌疑列切别彼今太子一侍天闈動移旬朔師傅已下無由接見假令供奉有隟聲供平暫還東朝拜謁既踈且事俯仰規諫之道固所未暇陛下不可以親教宫寀無因以進言寮属也寀音采雖有具寮竟將何補伏願俯循人矣夫脩身正家之道敬大臣體群臣親君子令洎與岑文本馬周逓日徃東宮談論可謂得旋踵而背之卒基唐家之禍於不忍言其氣化逺小人之要未必不見扵談論也出震繼明不以輔翼之具未至耶人事之相符乎抑所教戒太子諸王第十一章凡七貞觀七年太宗謂太子左庶子于志寧人貞觀三年字仲謐京兆詹事晉王為皇太子復拜左庶子為中書侍郎遷左庶子上諫苑俄兼杜正倫曰卿等輔導太子常須為説為説同為去聲後百姓間利害事朕年十八猶在人間百姓艱難無不諳練及居帝位毎商量處置䖏上聲量平聲或時有乖踈得人諌諍方始覺悟若無忠諌者為説何由行得好事況太子生長深宮音長掌百姓艱難都不聞見乎且人主安危所繫不可輙為驕縱但出敕云有諌者即斬必知天下士庶無敢更發直言故克已勵精容納諌諍卿等常須以此意共其談説毎見有不是事宜極言切諌令有所禆益也聲令平矣此數語者即周公無逸之書也至謂若詔天下唐氏仲友曰太宗誠有知子之明其教之亦云篤柰何承乾方欲以殺止諌雖百正倫何益哉敢諫者死將無復發言此則煬帝有前鑒矣人使諌蚤建太子命東宮輔臣極言規正令有愚按太宗君臨天下方勵精之初容受直言導亦深切哉惜乎承乾不足以副君父之意所禆益盖望太子亦如已之從諌其意不貞觀十八年太宗謂侍臣曰古有胎教世子母大任文王之耳不聽淫聲口不出傲言生文王而明聖大任教之為人端一誠莊惟徳之行及其娠文王目不視惡色君子謂大任為能胎教以一識百卒為周宗而朕則不暇但近自建立太子遇物必有誨諭見其臨食將飯謂曰汝知飯乎對曰不知曰凡稼穡艱難皆出人力不奪其時常有此飯見其乗馬後同乗平聲又謂曰汝知馬乎對曰不知曰能代人勞苦者也以時消息不盡其力則可以常有馬也見其乗舟又謂曰汝知舟乎對曰不知曰舟所以比人君水所以比黎庶水能載舟亦能覆舟爾方為人主可不畏懼見其休於曲木之下又謂曰汝知此樹乎對曰不知曰此木雖曲得繩則正為人君雖無道受諌則聖此傅説所言曰惟木從繩則正后從諌説音悦商書傅説告髙宗聖則可以自鑒遇事必誨其愛儲君者所以愛百姓也將飯而愚按太宗懲承乾之失徳望儲君之近徳於是困乏矣乗舟而戒則知民心之無恒矣休曲木戒則知民生之艱難矣乗馬而戒則知民力之之辭未有切於此者稽之古禮經教世子之道而戒則知立身之必從正矣觀前代教誡太子知所以保養之意惟踈逺老臣失徳宫閫竟忘亦不過如是也迨夫高宗臨御其於子庶民猶誨諄諄而聽藐藐乎王業之艱難毋乃雖貞觀七年太宗謂侍中魏徴曰自古矦王能自保全者甚少皆由生長富貴後同長音掌好尚驕逸聲好去多不解懈音親君子逺小人故爾後同逺去聲朕所有子弟欲使見前言徃行聲去冀其以為規範因命徴錄古來帝王子弟成敗事名為自古諸矦王善惡録以賜諸王其序曰觀夫後同音扶膺期受命握圖御㝢咸建懿親藩屏王室布在方䇿可得而言自軒分二十五子帝之子國語黄而異姓者十四人别為十二姓姬酉祁已滕箴任荀二十五子其同姓者二人青陽與夷皷是也其同生依是也僖姞儇舜舉一十六族見擇官篇註即八元八凱爰歴周漢以逮陳隋分裂山河大啓磐石者衆矣或保乂王家與時升降或失其土宇不祀忽諸然考其隆替察其興滅功成名立咸資始封之君國喪身亡多因繼體之后其故何哉始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴以求賢酒元王毎置酒嘗為穆生設醴漢楚元王敬禮申公等穆生不嗜或吐飱而接士公周飯三吐哺猶恐失天下之賢人子之魯慎無以國驕戒伯禽曰我於天下亦不賤矣然我一沐三握髪一人故甘忠言之逆耳逆耳利於行家語曰忠言得百姓之懽心經孝寡故得百姓之懽心曰治國者不敢侮於鰥樹至徳於生前流遺愛於身後暨夫子孫繼體多属隆平生自深宫之中長居婦人之手不以高危為憂懼豈知稼穡之艱難相小人周書曰子乃不知稼穡之艱難厥父母勤勞于稼穡厥昵近小人暱同昵與踈逺君子綢繆哲婦傲狠明徳犯義悖禮淫荒無度不遵典憲僭差越等恃一顧之權寵便懷匹嫡之心矜一事之微勞遂有無厭之望聲厭平棄忠貞之正路蹈姦宄之迷塗注在外曰姦在内曰宄宄音鬼書曰寇賊姦宄愎諌違卜僻愎音徃而不返雖梁孝齊囧之勲庸七國反先擊梁殺虜有功謚曰梁孝名武漢文帝子也封梁王為大司馬封齊王以功遷㳺擊将軍孝齊囧姓司馬名囧晋齊王攸子也淮南東阿之才俊賔客喜文辭後坐反謀自殺謚曰厲東阿見定分淮南名安漢武帝諸父也封淮南王好書鼓瑟招注篇摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功桓齊伯有尊王室匡天下之功公晋文公皆春秋諸矦之就梁董之顯戮帝時為大梁冀漢桓帝時自為太尉相國作亂被誅夷三族將軍後為反謀冀與妻皆自殺董卓漢獻垂為烱戒可不惜乎皇帝以聖哲之資拯傾危之運耀七徳以清六合和衆豊財者也使子孫無忘其章注云此武左傳楚子曰夫武禁暴戢兵保大定功定民之義王七徳緫萬國而朝百靈懷柔四荒親睦九族高祖九族親也玄曾之念華萼於棠棣燕兄弟之樂歌也棠棣詩小雅篇名寄維城於宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑑鏡貽厥孫謀臣輙竭愚誠稽諸前訓凡為藩為翰有國有家者其興也必由於積善其亡也皆在於積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已惟人所召豈徒言哉今錄自古諸王行事得失分其善惡各為一篇名曰諸王善惡錄欲使見善思齊足以揚名不朽聞惡能改作知能一庶得免乎大過從善則有譽改過則無咎興亡是繫可不勉歟太宗覽而稱善謂諸王曰此宜置于座右用為立身之本則善習於惡則惡耳况太子諸王乎嘗觀漢諸愚按人性皆善也而惡則豈人之性哉習於善今太宗命集徃古之事為諸矦王善惡録使知矦王恪謹以守國者何少放逸以失國者何多唐室興王之初其諸王如道宗道玄孝恭道彦善之足以成名惡之足以滅身昭然可鑒矣然者也暨有天下之後諸王皆身享富貴福澤順皆相與艱難共成大勲賢徳著聞此善之可稱義訓教之言雖切佩服之心盖寡毋乃居移氣境而䘮徳者何多耶盖太宗家廷之内恩常揜之善乎豈人性之惡哉養移體有以汨其本然貞觀十年太宗謂荆王元景漢王元昌吳王恪魏王泰等曰自漢已來帝弟帝子受茅土居榮貴者甚衆惟東平及河間王有智思文稱典雅明帝問䖏家何東平王名蒼漢光武子也好經書子也博學有徳武帝時奏對推道術而言得事之中事最樂王曰為善最樂謚曰憲河間王名徳漢景帝獻謚曰最有令名得保其祿位如楚王瑋之徒楚王瑋瑋音􅓗殺太宰汝南王亮太保衛瓘賈后遂執瑋下廷尉斬晉武帝第五子也元康中掌兵權剛狠好殺因矯詔曰隱之謚覆亡非一並為生長富貴後同為去聲好自驕逸所致聲好去汝等鑒誡宜熟思之揀擇賢才為汝師友須受其諫諍勿得自專我聞以徳服物信非虛説比嘗鼻比音夢中見一人云虞舜我不覺竦然敬異豈不為仰其徳也向若夢見桀紂必應斫之聲應平桀紂雖是天子今若相喚作桀紂人必大怒顔囬閔子騫字子顔回子弟子以徳行稱淵閔損字子騫皆孔郭林宗黄叔度高尚之士郭林二人皆後漢時天子不得臣諸侯不得友黄叔度名憲汝南人也郭宗名太太原人也范滂稱之曰隱不違親身不絶俗之不清淆之不濁不可量也林宗稱之曰汪汪若千頃陂澄雖是布衣今若相稱賛道類此四賢必當大喜故知人之立身所貴者惟在徳行徳行同去聲後何必要論榮貴汝等位列藩王家食實封更能克修徳行豈不具美也且君子小人本無常行善事則為君子行惡事則為小人當須自剋勵使善事日聞勿縱欲肆情自䧟刑􅓍貞觀十年太宗謂房玄齡曰朕歴觀前代撥亂創業之主生長人間掌長音皆識達情偽罕至於敗亡逮乎繼世守文之君生而富貴不知疾苦動至夷滅朕少小以來聲少去經營多難備知天下之事猶恐有所不逮至於荆王諸弟生自深宫識不及逺安能念此哉朕毎一食便念稼穡之艱難毎一衣則思紡績之辛苦諸弟何能學朕乎選良佐以為藩弼庶其習近善人得免於愆過爾貞觀十一年太宗謂吳王恪曰父之愛子人之常情非待教訓而知也子能忠孝則善矣若不遵誨誘忘棄禮法必自致刑􅓍父雖愛之將如之何昔漢武帝既崩昭帝嗣立燕王旦素驕縱譸張不服張狂貌譸音舟譸霍光遣一折簡誅之則身死國除少子弗陵立是為漢武帝名徹既崩帝燕王與上官桀等濳謀不軌事敗桀等伏誅乃賜昭帝燕王名旦武帝第三子也霍光為大將軍輔昭綬自絞賜謚曰刺燕壐書責之因以夫為臣子扶夫音不得不慎漢河間東平之善楚王瑋之惡以曉之復以虞愚按太宗之教戒諸王也其辭㫖諄諄矣既以以曉之又謂玄齡選良佐以為藩弼使其能佩舜之聖桀紂之惡與夫漢霍光誅燕王旦之事諄毋乃以言教乎所與言者荆王元景漢王元服斯訓何以尚兹然愚觀太宗教戒之辭誠諄漢王與承乾同反魏王以謀奪嫡而廢吳王亦昌吳王恪魏王泰也其後荆王與房遺愛同反驕奢有以移其本性邪抑太宗敎敕之言雖切以嫌疑為高宗所殺四人無得令終者豈富貴道未至邪而表率之貞觀中皇子年小者多授以都督刺史諌議大夫褚遂良上䟽諌曰昔兩漢以郡國理人除郡以外分立諸子割土封疆雜用周制皇唐郡縣粗依秦法聲粗去皇子㓜年或授剌史陛下豈不以王之骨肉聲王去鎮扞四方聖人造制道髙前古臣愚見有小未盡何者剌史師帥人仰以安得一善人部内蘇息遇一不善人闔州勞弊是以人君愛恤百姓常為擇賢後為立為去聲同或稱河潤九里京師蒙福拜漁陽太守郭伋為頴漢光武時頴川盗起徴九里冀京師并蒙福也伋到郡招懐群盗皆降川太守召見帝勞曰賢䏻太守去帝城不逺河潤或與人興詠生為立祠西羗為寇堂討平之巴庸清静漢明帝時王堂拜巴州太守時立祠生為漢宣帝衛太子之孫也名詢武帝曽孫云與我共理者惟良二千石乎如臣愚見陛下子内年齒尚幼未堪臨人者請且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三帝章帝名炟和帝後漢明帝名莊肇名能友愛子弟自兹以降以為準的封立諸王雖各有土年尚幼小者各留京師訓以禮法垂以恩惠訖三帝世諸王數十百人惟二王稍惡廣陵思王荆也二王謂楚王英逆自殺皆以謀自餘皆沖和深粹惟陛下詳察太宗嘉納其言舉義兵以已揆人不間幼小曾不知人才不同未唐氏仲友曰遂良之諫切中太宗之病太宗十八割也况膏梁之性難正古人病之而况扵帝子乎知稼穡之艱難乃使之臨民何止未能操刀而使然帝子之重土地不足藩維磐石之宗使臨一州遂良欲養成徳器審堪臨州然後除遣真良䇿也之而已惜哉唐之君臣其見之未及此也亦何益哉賢乎適足以勞之不賢適足以累國而有卿大夫士上焉者命於天子下焉者命愚按昔封建之世固有年幼而祚土者何則一王封小弱弟於唐其後卒開大國之迹此封建於其國國君之齒少則正卿當國法制秩然成事體不同非如建國之有卿大夫士以相參佐之世之事也唐都督刺史古方伯諸矦之職而則驕泰以取敗耳非司牧之道也遂良之䟽誠也而使皇子之年小者居之非懦弱不自樹立鑑為龜規諌太子第十二章凡四貞觀五年李百藥為太子右庶子時太子承乾明太字髙甫八歲特敏惠及長過惡浸聞十七年廢為庶人十宗長子也生承乾殿即以命之貞觀初立為皇太子山王謚曰愍八年卒封常頗留意典墳之書謂之三墳言大道也孔安國曰伏羲神農黄帝書謂之五典言常道也少昊顓頊髙辛唐虞之然閑讌之後嬉戯過度百藥作賛道賦以諷焉其詞曰下臣側聞先聖之格言嘗覽載籍之遺則伊天地之玄造洎皇王之建國曰人紀與人綱資立言與立徳履之則率性成道違之則㒺念作忒望興廢如從鈞視吉凶如糾纆墨音至乃受圖膺籙握鏡君臨因萬物之思化以百姓而為心體大儀之潛運閲徃古於來今盡為善於乙夜惜勤勞於寸隂重寸之隂時難得而易失也淮南子曰聖人不貴尺璧而故能釋層冰於瀚海變塞谷於蹛林置蹛林州漢書注云蹛林匈奴蹛都賴都例二切唐之思結地祭也繞林而緫人靈以胥悦極穹壤而懐音赫矣聖唐大哉靈命時維大始曰泰大讀運鍾上聖天縱皇儲固本居正機悟宏逺神姿凝映顧三善而必弘篇注見教誡祗四徳而為行此四徳者故曰元亨利貞去聲易文言傳曰君子行毎趨庭而聞禮學禮乎曰未也鯉退而學禮論語伯魚曰鯉趨而過庭曰常問寝而資敬奉聖訓以周旋誕天文之明命邁觀喬而望梓父道也梓俯商子曰喬仰也子道即元龜與明鏡自大道云革禮教斯起以正君臣以篤父子君臣之禮父子之親盡情義以兼極諒弘道之在人能弘道論語曰人豈夏啓與周誦亦丹朱與商均既雕且琢温故知新惟忠與敬曰孝與仁則可以下光四海上燭三辰星也日月昔三王之教子兼四時以齒學將交發於中外乃先之以禮樂樂以移風易俗禮以安上化人非有悦於鍾皷將宣志以和神寧有懐於玉帛將克已而庇身生於深宫之中處於群后之上后諸矦也處上聲群未深思於王業不自珍於匙鬯比下上音香酒灌地以求神者也音唱匙所以載鼎實鬯謂富貴之自然恃崇髙以矜尚心恣驕狠動愆禮讓輕師傅而慢禮儀狎姦諂而縱淫放前星之耀遽隱為太子後為少子心三星中為君前少陽之道斯諒子之道也震為少陽長雖天下之為家蹈夷儉之非一或以才而見升或見讒而受黜足可以自省厥休咎悉省切井觀其得失請粗略而陳之聲粗去覬披文而相質去相聲在宗周之積徳乃執契而膺期賴昌發而作貳文昌武王名王名發啓七百之鴻基逮扶蘇之副秦非有虧於聞望聲聞去以長嫡之隆重掌長音監偏師於亭障扶蘇秦監平聲監䝉恬上郡始皇崩公子胡亥詐受遺詔自立賜扶始皇長子也始皇欲坑諸生扶蘇切諌始皇怒使北死蘇始禍則金以寒離生伐東山臯落氏衣之偏衣佩左傳閔公二年晉侯使太子申其衷也龍涼冬殺金寒玦離胡可恃也金玦金環也之金玦狐突歎曰衣之龍服逺其躬也佩以金玦弃厥妖則火不炎上以妾為妻則火不炎上言火失其五行傳曰棄法律逐功臣殺太子災也性而為既樹置之違道見宗祀之遄喪伊漢氏之長世固明兩之遞作以繼明照于四方易曰明兩作離大人髙惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓見並篇註教戒景有慙於鄧子成從理之淫虐終生患於强呉由發怒於争慱文帝佞幸臣也强呉髙祖兄仲之子漢景帝名啓文帝太子也鄧子名通誰最愛我通曰宜莫如太子太子入問病帝使吮癰呉王濞也文帝嘗病癰鄧通常為帝吮之帝曰天下即位鄧通免太子又嘗與吳太子飲愽呉太子素驕吮而色難之己而聞通嘗為帝吮心慙由此怨通及殺之呉王由是怨望稍失藩臣禮博争不恭太子引博局提呉太子徹居儲兩時猶㓜沖防衰年之絶議識亞夫之矜功故能恢弘祖業紹三代之遺風勃之子仕至丞相景帝甚重之帝欲廢徹漢武帝名儲兩為太子時也亞夫周嘗目之曰此鞅鞅非少主臣也戾太子亞夫不可帝由是䟽之帝據開愽望其名未融哀時命之奇舛遇䜛賊於江充雖備兵以誅亂竟背義而㐫終太子立博望苑使通賔客趙人江充與背音倍據戾太子名漢武帝子也帝為巫蠱帝乃使充入宫治之充云太子宫木人尤多又太子有隙見帝年老恐它日為所誅因言帝疾祟在安軍亂因言太子反上怒太子自經有帛書所言不道太子遂捕充斬之長宣嗣好儒大猷行闡嗟被尤於徳教美發言於忠謇始聞道於匡韋終獲戾於恭顯術文辭用韋玄成匡衡相繼為丞好去聲宣嗣漢元帝也名奭好儒蕭望之京房賈捐之等皆以言顯短而死相多所嚮納復以弘恭石顯相繼擅權用事太孫雜藝雖異定陶馳道不絶抑惟小善猶見重於通人當傳芳於前典共王元帝庶子也成帝博好經書為太漢成帝名驁字太孫元帝太子也定陶城門得絶乃度還入作室門上遲之問其故以狀對子時帝急召之太子出龍樓門不敢絶馳道西至直材藝欲立為嗣賴侍中史丹輔助太子得無廢帝悦乃詔太子得絶馳道其後帝以定陶王有中興上嗣明章濟濟俱達時政咸通經禮極至情於敬愛惇友于於兄弟是以固東海之遺堂因西周之繼體太子烜是為章帝號肅宗東海王明帝之兄極相友光武為漢中興之君太子莊是為明帝號顯宗明帝勝肅宗濟濟天性豈弟於穆后徳諒惟淵體愛史賛顯宗丕丞業業兢兢危心恭徳政察姦五官在魏無聞徳音或受譏於妲己且自悦於從禽雖才高而學富竟取累於荒淫初為五官中郎將見袁熈累去聲魏文帝姓曹名丕雉謂羣臣曰射雉樂哉辛毗對曰於陛下甚樂於羣妻甄氏美而悦之太祖為之聘焉及受漢禪嘗出射苦臣甚暨貽厥於明皇搆崇基於三世得秦帝之奢侈亞漢武之才藝遂驅役於羣臣亦無救於凋弊名叡明皇孝武之儔才具㣲不及耳景初元年起土山於芳林魏文帝太子也嗣帝位侍中劉曄稱之曰秦始皇漢其中群臣皆面目垢黒由是百姓凋弊四海分崩園使公卿群僚皆負土栽木於其上捕禽驅獸於中撫寛愛相表多奇重桃符而致惑納鉅鹿之明規竟能掃江表之氛穢舉要荒而見覊武帝姓司馬名炎相去聲要音腰晉之小名也初晉王欲以攸為世子何曾裴秀曰中撫晉王昭之子也仕魏為中撫軍桃符武帝弟齊王攸晉王由是意定立炎為世子嗣晉王位受魏禪國號軍聦明神武人望既茂天表如此固非人臣之相也晉惠處東朝察其遺跡在聖徳其如初實御床之可惜也是時朝野咸知太子昏愚不堪為嗣尚書今衛處上聲晉惠帝名衷武帝第三子東朝為太子時帝前欲言而止者三因以手撫床曰此座可惜瓘欲陳啓而未敢發會侍宴凌雲臺瓘陽醉跪悼愍懐之云廢遇烈風之吹沙盡性靈之狎藝亦自敗於凶邪安能奉其粢盛承此邦家懐太子名遹惠帝長粢音咨盛音成晉愍是慢㢮益彰賈后遂設計讒譛於帝廢為庶人子也有令譽賈后忌之使閹官軰媚之為非扵惟聖上之慈愛訓義方於至道同論政於漢幄脩致戒於京鄗地名音鎬鄙韓子之所賜以韓非子賜太子晉元帝好任刑法重經術以為寶咨政理之美惡亦文身之黼藻庶有擇於愚夫慙乞言於遺老致庶績於咸寧先得人而為盛帝堯以則哲垂謨則哲能官人虞書曰知人文王以多士興詠濟濟詩曰王以寧多士文取之於正人鑑之於靈鏡量其器能聲量平審其檢行聲去必宜度機而分職洛切度待不可違方以從政若其惑於聽受暗於知人則有道者咸屈無用者必伸䜛䛕競進以求媚玩好不召而自臻聲好去直言正諌以忠信而獲罪賣官鬻獄以貨賄而見親育鬻音於是虧我王度斁我彛倫亂也斁音妬九鼎遇姦回而逺逝水中始皇求之不能出九鼎周之寶器周沈泗萬姓望撫我而歸仁述任用此一節戒之盖造化之至育惟人靈之為貴獄訟不理有生死之異塗冤結不伸乖隂陽之和氣士之通塞屬之以深文命之脩短懸之於酷吏是故帝堯畫像陳恤隱之言畫像而民不犯注畫像者畫衣冠異章服象五虞書曰象以典刑又曰惟刑之恤哉漢書唐虞其屨大辟之罪誅殛之刑布其衣裾無領緣刑也犯黥者皂其中犯劓者丹其服犯宫者雜夏禹泣辜盡哀矜之志節述刑罰之戒見封建篇注此一因取象於大壯以宫室上棟下宇以待風雨盖取諸大壯易大傳曰上古穴居而野䖏後世聖人易之乃峻宇而雕墻將瑶臺以瓊室紂作瓊室桀作瑶臺豈畫棟以虹梁或凌雲以遐觀巧隨風摇動終無崩隕世説魏作凌雲臺極精或通天而納凉臺扵林光明髙三十丈漢武帝作神明通天之極醉飽而形人力命痿蹷而受身殃蹷音鱖痿音逶是以言惜十家之産漢帝以昭儉而垂裕中人十家之産也吾奉先帝宫室常恐羞之何漢文帝欲作露臺召匠計之直百金帝曰百金為以臺雖成百里之囿周文以子來而克昌王之囿方孟子曰文所詩曰經始勿亟庶民子來經之營之不日成之七十里此言百里者舉成數言也囿者蕃育鳥獸之營繕之戒此一節述彼嘉會而禮通重㫖酒之為徳禹飲而甘儀狄作酒䟽儀狄而絶㫖酒出戰國䇿之曰後世必有以酒亡國者遂至忘歸而受祉在齊聖而温克若其酗醟以致昏詠酣怒也酗音昫醟音酖湎而成忒沔嗜飲也酖音眈湎音痛殷受與灌夫亦亡身而喪國名受殷紂夫醉酒罵坐遂誅其身以酒為池竟亡其國漢灌是以伊尹以酣歌而作戒于宫酣歌于室時謂巫風商書伊尹作訓曰敢有恒舞周公以亂邦而貽則書周罔非酒此一節述甘酒之戒周公作誥曰越小大邦用喪亦咨幽閑之令淑實好逑於君子窈窕淑女君子好逑好上聲逑匹也詩曰辭玉輦而割愛固班姬之所耻曰觀古圗畫聖賢之君皆有名臣在側三漢成帝逰於後庭嘗欲與班倢妤同輦辭近似之乎帝善納其言而後止代未主乃有嬖女今欲同輦得無脱簮珥而思愆亦宣姜之為美珥待罪於永巷使傅毋通言於王曰王宣姜周宣王后也王嘗晏起后乃脱纓王曰寡人不徳實自生過非夫人之罪也自是勤於樂色而忘徳失禮而晏起亂之興自婢子始敢請罪卒成中興之主政事早朝晏罷乃有禍晉之驪姬驪姬愛之生奚齊晋獻公伐驪戎獲子而隂令人譛之欲立其子太子自殺又譛二公子公有子八人惟太子申生重耳夷吾賢驪姬佯譽太吾走屈竟以亂晋於是重耳走蒲夷喪周之褒姒子伯服王竟廢申后周幽王嬖愛褒姒生笑失信於諸侯西夷犬戎殺王驪山下虜褒姒盡取及太子宜􅍫以褒姒為后伯服為太子後因取褒姒而去周賂盡妖妍扵圖畫極凶悖扵人理傾城傾國思昭示扵後王麗質冶容宜永鑒扵前史色荒之戒此一節述復有蒐狩之禮蒐田冬曰狩田蒐音搜禮春曰馳射之塲不節之以正義必自致扵禽荒匪外形之疲極亦中心而發狂曰馳老子人心發狂騁田獵令夫髙深不懼扶夫音胥靡之徒韝緤為娛小竪之事音懾所以繫犬者韝音鈎鷹㡌也緤以宗社之崇重持先王之名器與鷹犬而並驅凌艱險而逸轡馬有衘橛之理書時有衘橜之變橛音厥相如諫獵獸駭不存之地猶有靦扵獲多音靦也腆慙獨無情而内愧禽荒之戒此一節述以小臣之愚鄙忝不貲之恩榮擢無庸扵草澤齒陋質扵簮纓遇大道行而兩儀泰喜元良㑹而萬國貞以監府之多暇毎講論而肅成仰惟神之敏速歎将聖之聦明自禮賢於秋實足歸道扵春卿芳年淑景時和氣清華殿䆳兮簾幃静灌木森兮風雲輕花飄香兮動笑日嬌鸎囀兮相哀鳴以物華之䌓靡尚絶思扵将迎聲思去猶允蹈而不倦極躭翫以研精命庸才以載筆謝摛藻扵天庭異洞簫之娛侍度聲被歌調王褒上洞簫賦乃漢元帝為太子時好吹洞簫自皆誦讀之令後宫貴人殊飛盖之緣情賦詩曰清夜逰西園飛魏文帝為世子時曹植追随盖相闕雅言以賛徳思報恩以輕生敢下拜而稽首願永樹扵風聲奉皇靈之遐壽冠振古之鴻名聲冠去太宗見而遣使聲去謂百藥曰朕於皇太子䖏見卿所作賦述古來儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事聲為去大稱所委聲稱去但須善始令終耳因賜廐馬一匹綵物三百叚留意典墳然燕間之後嬉戯無度昔賈誼言輔愚按此東宫毓徳之初群工賛善之始承乾頗教之以義方亦孰不欲教之扵其初其後乃爾翼太子有曰少成若天性習慣如自然盖愛子之具有未至乎然肅觀李百藥賛道賦一篇歴相逺耶夫子所謂下愚不移者乎抑所以輔翼之道明刑愼罰之方峻宇雕墻甘酒嗜音内作述秦漢魏晉以來儲貳之善惡與夫任賢去邪當文辭流麗光輔前星者足為典訓也色荒外作禽荒之戒莫不畢具事實切貞觀中太子承乾數虧禮度朔數音侈縱日甚太子左庶子于志寜撰諫苑二十卷諷之是時太子右庶子孔頴達舉明經髙第貞觀初數進忠言為右庶子嘗字仲達兾州人八歲就學日記千餘言隋世號為詳博撰五經義䟽毎犯顔進諌承乾乳母遂安夫人謂頴達曰太子長成掌長音何宜屢得面折對曰䝉國厚恩死無所恨諫諍愈切承乾令撰聲令平孝經義䟽頴達又因文見意愈廣規諌之道太宗並嘉納之二人各及禽獸湯徳至矣今苑内娛獵雖名異遊畋若行之無恒終虧雅度且傳説曰學不師古匪説攸聞傅説告髙宗説音悦商書辭之然則弘道在於學古學古必資師訓既奉恩詔令孔頴達侍講後同令平聲望數存顧問後同數音朔以補萬一仍博選有名行學士聲行去兼朝夕侍奉覽聖人之遺敎察既徃之行事日知其所不足月無忘其所能此則盡善盡美夏啓周誦焉足言哉䖍切焉於夫爲人上者扶夫音未有不求其善但以性不勝情後同勝平聲耽惑成亂耽惑既甚忠言盡塞所以臣下茍順君道漸虧古人有言勿以小惡而不去聲上小善而不爲故知禍福之來皆起於漸殿下地居儲貳當須廣樹嘉猷既有好畋之淫後同好去聲何以主斯匙鬯慎終如始猶恐漸衰始尚不慎終將安保承乾不納玄素又上書諫曰臣聞稱皇子入學而齒胄者欲令太子知君臣父子尊卑長㓜之道見教誡篇註長音掌後同然君臣之義父子之親尊卑之序長㓜之節用之方寸之内弘之四海之外者皆因行以逺聞假言以光被伏惟殿下睿質已隆尚湏學文以餙其表竊見孔頴達趙弘智等非惟宿徳鴻儒亦兼達政要望令數得侍講開釋物理覽古論今増輝睿徳至如騎射畋逰酣歌妓翫茍悦耳目終穢心神漸染既乆尖漸音必移情性古人有言心為萬事主動而無節即亂恐殿下敗徳之源在於此矣承乾覧書愈怒謂玄素曰庶子患風狂耶十四年太宗知玄素在東宫頻有進諌擢授銀青榮祿大夫行太子左庶子時承乾嘗於宫中擊皷聲聞于外聲聞去玄素叩閤請見現音極言切諌乃出宫内皷對玄素毁之遣戸奴伺玄素早朝潮音隂以馬檛擊之查檛音殆至於死是時承乾好營造亭觀聲去窮極奢侈費用日廣玄素上書諌曰臣以愚蔽竊位兩宫在臣有江海之潤於國無秋毫之益是用必竭愚誠思盡臣節者也伏惟儲君之寄荷戴殊重聲荷上如其積徳不弘何以嗣守成業聖上以殿下親則父子事兼家國所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下惟聚工匠望苑之内不覩賢良今言孝敬則闕侍膳問竪之禮語恭順則違君父慈訓之方求風聲則無學古好道之實觀舉措則有因緣誅戮之罪宫臣正士未嘗在側群邪淫巧昵近深宫愛好者皆遊伎雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱宻寧可勝計哉聲勝平宣猷禁門不異闤闠下音㑹上音環朝入暮出惡聲漸逺右庶子趙弘智經明行修聲行去當今善士臣毎請望數召進與之談論庶廣徽猷令㫖反有猜嫌謂臣妄相推引徔善如流尚恐不逮飾非拒諫必是招損古人云苦藥利病苦口利行伏願居安思危日慎一日書入承乾大怒遣刺客將加屠害俄屬宫廢十三年詔自今皇按後一書通鑑係發取無度故玄素上䟽十七年承乾廢太子出用庫物所司勿為限制扵是太子之莫尊扵王次曰后次曰世子用物不㑹是尊貴胡氏寅曰周官有王及后世子不會之文以愚度正使周官饍夫酒正内府有此文然冡宰之職量之故得肆為費侈豈節以制度自家刑國之道哉其中特不使有司以法沮止若自下而制上耳太入為出得以九式均節財用則雖曰不會而會在獨張玄素止扵未流幾扵被害豈非君臣之交失宗之詔太子扵是大失諸賢在朝不聞以為不可乎太子至于一再至于三四承乾諱其切至遣户奴唐氏仲友曰太宗於玄素可謂不察矣玄素力諌坐至除名為民起為刺史訖不復親近太宗扵此檛擊遣刺客伺之其脱死者幸矣乃扵他宫僚同寧同而賞罰異太宗何所見而然耶刑濫害及善人矣可不悲哉事與于志不肖有以自取亦文帝太宗所以䖏之失其道愚按隋太子勇唐太子承乾皆以罪廢雖二人宗既立承乾為太子而復寵待魏王煬帝攘奪也何也文帝既立勇為太子而復寵待煬帝太禍故為是不得已之邪謀向使太宗扵太子諸扵其初魏王効尤扵其後承乾目覩庶人勇之甚也今既不能消其不平之忿乃賞擢張玄素王之間早有定分則承乾雖不肖不至如是之章䟽之末果何益之有哉􅊨于志寧之流使救正扵言語貞觀十四年太子詹事統三寺十率府之政唐制東宫置詹事府掌于志寧以太子承乾廣造宫室奢侈過度躭好聲樂聲好去上書諫曰臣聞克儉節用實弘道之源崇侈恣情乃敗徳之本是以凌雲槩日戎人於是致譏示宫室之秦繆公夸笑詳見納諌篇註盛為西戎由余所峻宇雕墻夏書以之作誡歌曰甘五子之一扵此未或不亡酒嗜音峻宇雕墻有昔趙盾匡晉即趙宣子也盾晉靈公大夫呂望師周為周太師望太公也或勸之以節財或諫之以厚歛聲去莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聽咸著簡䇿用為美談且今所居東宫隋日營建覩之者尚譏甚侈見之者猶歎甚華何容於此中更有修造財帛日費土木不停窮斤斧之工極磨礱之妙且丁匠官奴入内比者鼻比音曾無復監層曾音此等或兄犯國章或弟罹王法徃來御苑出入禁闈鉗鑿緣其身槌杵在其手監門本防非慮聲監平宿衛以備不虞直長既自不知長宫名長音掌直千牛又復不見納諫篇注千牛官名見爪牙在外厮役在内所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲名樂記曰鄭衛二國國之音也其政散其民流誣上行私而不可止也鄭衛之音亂世之音也比扵慢矣桒間濮上之音亡昔朝歌之郷迴車者墨翟邑名漢書鄒陽書曰邑號朝音昭翟音狄朝歌殷之子回車朝歌墨夾谷之會揮劔者孔丘定公與齊侯會于夾夾谷魯地名家語曰進以公退曰裔不謀夏夷不亂華俘不干盟兵不偪谷孔子攝相事齊使萊人以兵刼定公孔子歴階而子曰匹夫熒惑侮諸侯者罪應誅扵是斬侏儒齊侯好齊矦心怍麾而避之齊奏樂俳優侏儒戲扵前孔慙色懼有先聖既以爲非通賢將以爲失頃聞宫内屢有皷聲大樂伎兒入便不出聞之者股栗言之者心戰徃年口敕伏請重尋聲重去聖㫖殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宫闕已積歲時犬馬尚解識恩懈解音木石猶能知感臣所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤㫖則臣是罪人但悦意取容臧孫方以疾疢犯顔逆耳春秋比之藥石左傳襄公三十三年臧孫曰季臧孫魯大夫名紇即臧武仲也不如惡石夫石猶生我疢之美其毒滋多孫之愛我疾疢也孟孫之惡我藥石也美疢伏願停工巧之作罷乆役之人絶鄭衛之音斥群小之軰則三善允備萬國作貞矣承乾覽書不悅十五年承乾以務農之時召駕士等役不許分畨人懷怨苦又私引突厥群竪入宫志寧上書諌曰臣聞上天盖髙日月光其徳明君至聖輔佐賛其功是以周誦升儲見匡毛畢周之輔臣毛叔鄭畢公漢盈居震取資黄綺篇注見定分姬旦抗法於伯禽也禮曰成王幼不能涖祚周公相踐姬周之姓旦周公之名伯禽周公子則撻伯禽所以示成王世子之道也祚而治抗世子法扵伯禽成王有過賈生陳事於文帝見納諫篇注賈生即賈誼也咸殷勤於端士皆懇切於正人厯代賢君莫不丁寧於太子者良以地膺上嗣位䖏儲君後同䖏上聲善則率土霑其恩惡則海内罹其禍近聞僕寺司馭駕士獸醫始自春初迄兹夏晚常居内役不放分畨或家有尊親闕於溫凊母冬溫而夏凊禮記曰子之事父或室有幼弱絶於撫養春既廢其耕墾夏又妨其播殖事乖存育恐致怨嗟儻聞天聽後悔何及又突厥達哥支等咸是人面獸心豈得以禮義期不可以仁信待心則未識於忠孝言則莫辯其是非近之有損於英聲昵之無益於盛徳引之入閤人皆驚駭豈臣庸識獨用不安殿下必須上副至尊聖情下允黎元本望不可輕微惡而不避無容略小善而不為理敦杜漸之方須有防萌之術屏退不肖狎近賢良如此則善道日隆徳音自逺承乾大怒遣刺客張師政紇干承基干虜複姓紇音鶻紇就舍殺之是時丁母憂起復為詹事二人潛入其第見志寧寢䖏苫廬者寢苫枕塊禮居父母之喪竟不忍而止及承乾敗太宗知其事深勉勞之聲按勞去其事太宗謂志寜曰知公數有規諫事無所隱深加前一書通鑑係十四年舊史曰承乾敗後推鞫具得等以無諫書皆從貶責勉勞右庶子令狐徳棻子焉學為君臣焉于志寧不當起復太宗不當奪胡氏寅曰詹事東宫官之尊也太子於之學為父儲君以忠以孝乃從金革之例冐哀居官則何以其喪也人臣有奪喪者惟金革之事耳詹事輔導欲肆情又將殺諫臣是兩刺客之不如其不能終訓太子宜太子之不納諫也雖然自太子言之從哉宜發人之善心也嘗觀春秋傳晉靈公不君趙宣愚按自古臣子之事君親能盡其道者可以感服將朝麑退曰不忘恭敬民之主也賊民之主子驟諫公患之使鉏麑賊之晨徃寢門闢矣盛無道于志寧上書諌之承乾怒遣刺客張師政不忠是宣子以敬扵君而免扵難也今觀承乾第見寢䖏苫廬不忍而止是志寧以孝扵親而紇于承基殺之時志寧母憂起復二人潛入其之為曾不如刺客之有人心也然亦未聞有寢脫扵禍也之二人者庶幾無愧扵鉏麑矣承乾子之任者太宗志寧胥失之矣苫枕塊而任扵人之國當輔翼太貞觀政要卷第四
