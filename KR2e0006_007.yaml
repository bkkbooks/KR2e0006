front:
  text: 貞觀政要卷第七戈直集論
  hash: sha256:8d002c982ae96a223e85ce67ea22306ff51a1f7e2e62d689303383dedf0612f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_007-1a}
body:
  text: 崇儒學二十七論文史二十八論禮樂二十九崇儒學第二十七凡六章太宗初踐祚即於正殿之左置弘文館精選天下文儒令以本官令平聲兼署學士給以五品珍膳更日宿直更平聲以聽朝之隙引入內殿討論墳典論平聲商略政事或至夜分乃罷又詔勳賢三品已上子孫為弘文學生舊本此與後三章通為一章今按崇儒雖同典故則異分為三章又按通鑑武德九年九月上於弘文殿聚四部書二十餘萬卷置弘文館於殿側精選天下文學之士虞世南褚亮姚思廉歐陽詢蔡允恭蕭德言等並以本官兼學士云云又取三品已上子孫充弘文館學生真氏德秀曰後世人主之好學者莫如唐太宗當戰攻未息之餘已留情於經術召名儒學士以講磨之此三代以下之無有也既即位置弘文館於殿之側引內學士畨宿更休聽朝之暇與討古今論成敗或日􅉴夜艾未嘗少怠此三代以下之所又無也故陸贄舉之以告德宗謂言及稼穡艱難則務遵節儉言及閭閻疾苦則議息征徭此所以致貞觀之治也後之人君有志於帝王之事業則貞觀之規模不可以不復愚按太宗之好學可謂至矣其未即位也廣招瀛洲之賢其既即位也大啓弘文之館討論墳典商略政事蓋自三代以下人君講學之勤未能或之先也然嘗論之太宗之所講學豈真堯舜禹湯文武孔顔之學也夫允執厥中堯之學也危微精一舜禹之學也建中建極湯武之學也忠恕一貫孔門師友之學也瀛洲諸賢之所講亦嘗及於此乎愚不得而知也弘文諸儒之所講亦嘗及於此乎愚不得而知也愚獨怪夫君臣問答之際詔令章疏之間一事之微無不講也一物之細無不講也獨於統宗會元之地乃無一語及之是則太宗之學學其所學非堯舜禹湯文武孔顔之學也嗚呼周公沒而百世無善治孟軻死而千載無真儒詎不信哉貞觀二年詔停周公為先聖始立孔子廟堂於國學稽式舊典以仲尼為先聖顔子為先師兩邉爼豆干戚之容始備于兹矣是歲大收天下儒士賜帛給傳去聲驛傳也令詣京師令平聲後同擢以不次布在廊廟者甚衆學生通一大經已上咸得署吏署吏職入仕也國學增築學舍四百餘間國子太學四門廣文亦增置生員其書算各置博士學生以備衆藝唐制國子太學廣文四門律書算凡七學至三千二百自屯營飛騎皆給慱士受經能通經者聽入貢限四方秀艾坌集京師于是新羅髙昌百濟吐蕃髙麗等群酋長並遣子弟入學鼓笥踵堂者凡八千餘人雖三代之盛所未聞也范氏祖禹曰吉之教者家有墊黨有庠遂有序國有學士修之于家而後升于鄉升于鄉而後升于國升于國而後逹于天子其教之有素其養之有漸故成人有德小子有造賢才不可勝用由此道也後世鄉里之學廢人君能教者不過聚天下之士而烏合于京師學者衆多眩耀于一時而已非有教養之實也唐之儒學惟貞觀開元為盛其人才之所成就者亦可睹矣孟子曰學所以明人倫也無學則人倫不明故有國者以為先如不復三代之制未知其可也愚按昌黎韓子原道曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公孔于然周公而上得位與時者也孔子不得位與時者也得位與時者其道見之于事不得位與時者其道託之于言而宰我曰以豫觀于夫子賢于堯舜逺矣夫堯舜而至周公去夫子之時邈矣正道日以榛蕪非得夫子則堯舜之道何由而明于後世哉六經之訓如日行天夫子之功也先儒周子謂宜乎後世無窮王祀夫子報德報功之無盡焉夫周公固為先聖而立孔子廟堂于國學以夫子為先聖實始于太宗遂為萬代之定制廟祀遍天下人知尊夫子之道即知尊堯舜禹湯文武周公之道矣太宗聰明英睿之君真特見也王封起于開元亦太宗有以致之貞觀十四年詔曰梁皇侃苦旦切皇姓侃名明三禮為散騎侍郎一作皇甫侃者非褚仲都明周易周熊安生字植之長樂人為國子博士沈重字子厚通春秋群書為五經博士陳沈文阿字國衛通三禮春秋為五經博士周弘正字思行晉周覬之後為國子博士張譏字直言武城人為國子博士隋何妥字栖鳯西城人為國子祭酒劉炫字光明河間人為太學慱士並前代名儒經術可紀加以所在學徒多行其講疏宜加優賞以勸後生可訪其子孫見在者見音現録姓名奏聞二十一年詔曰左丘明左丘明見于論語程子謂古之聞人唐啖趙氏謂孔子所言左丘明在孔子前則左氏傳非丘明所為亦有姓左而不得其名者為此傳也或問朱子朱子曰未可知也先友鄧著作考姓氏書曰蓋左丘姓而名明傳春秋者乃左氏耳然則太宗詔從祀諸儒以左丘明為首而置于公榖之列者蓋漢晉以來相傳誤以左氏為左丘明也卜子夏名商孔子弟子以文學稱序詩傳易禮春秋公羊髙公羊姓髙名子夏弟子傳春秋榖梁赤榖梁姓赤名子夏弟子傳春秋伏勝濟南人為秦博士漢文時求治尚書者聞伏生能沿之欲召時年九十餘詔使往受之秦時焚書伏生藏于屋壁兵起流亡獨得二十九篇教于齊魯之間髙堂生魯人前漢為博士得儀禮十七篇傳于世為漢言禮宗戴聖前漢為九江太守得禮記三十六篇傳于世號小戴記毛萇趙人為漢河間獻王博士治詩孔安國孔子之後漢武帝時為慱士至臨淮太守為古文尚書之宗劉向字子政漢楚元王之後成帝時為光祿大夫校五經鄭衆後漢為大司農卿杜子春後漢河南人馬融字季長扶風人漢桓帝時為南郡太守著春秋三傳異同説盧植字子幹後漢為北中郎將鄭玄字康成北海人後漢為大司農卿著易書詩禮論語孝經國語乾象曆天文等書服虔字子慎後漢為九江太守何休字邵公後漢為諌議大夫解春秋公羊傳孝經論語等書王肅字子雍三國時為魏太常蘭亭矦注孔子家語王弼字輔嗣三國時為魏尚書郎注易杜預字元凱晉惠帝時為鎮南大將軍當陽侯注春秋左氏傳范寧西晉時為豫章太守注春秋榖梁傳等二十有一人並用其書垂於國胄既行其道理合褒崇自今有事於太學可並配享尼父廟堂父音甫魯哀公誄孔子之稱其尊儒重道如此唐氏仲友曰梁周陳隋之際吾道窮矣儒于此時猶守先王之經有如劉炫之徒至于流離飢餓而不悔其所發明有以資後學之講習太宗能引擢其子孫以報之至于左丘明等二十一人用其書行其道者則又配享于夫子以褒大之先儒子孫蒙引擢之恩又有得配夫子之祀者則今之諸儒能不加勉又足為後世故實太宗二舉豈不美哉愚按太宗既以夫子為先聖立廟堂于國學後數年復優異梁周陳隋名儒之子孫雖其經術學行未探聖賢之閫奧然亦可以風厲天下矣又後數年復詔以左丘明等二十一人配享孔廟左氏諸儒注釋經義考論制度使後世有所依據誠足以當此秩祀遂為不刋之典太宗是舉亦前帝王所未及行也夫儒之近者恩沾于子孫儒之逺者禮秩于配享太宗之崇儒重道顧不美歟貞觀二年太宗謂侍臣曰為政之要惟在得人用非其才必難致治今所任用必須以德行去聲後同學識為本諌議大夫王圭曰人臣若無學業不能識前言往行豈堪大任漢昭帝時昭帝名弗陵武帝幼子有人詐稱衛太子名據武帝太子衛皇后所生聚觀者數萬人衆皆致惑雋不疑雋音吮姓也不疑其名字曼倩渤海人時為京兆尹斷以蒯聵之事蒯古買切蒯聵春秋時衛靈公世子也出奔于宋靈公卒孫出公輒立晉又納蒯聵于戚父子爭國後十五年蒯聵入是為莊公輒乃出奔昭帝曰公卿大臣當用經術明於古義者昭帝始元五年有男子乘黃犢車詣北闕自謂衛太子詔公卿識視皆不敢言雋不疑後到叱從吏收縳曰昔蒯聵出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自請此罪人也遂詔送獄帝嘉之廷尉驗治竟得姦詐此則固非刀筆俗吏所可比擬上曰信如卿言愚按賈子有言移風易俗使天下回心而鄉道類非俗吏之所能為也昔漢霍光因夏侯勝之言而重經術之士昭帝因雋不疑之事謂公卿大臣當用明于古義者夫漢之諸儒要非真儒也而明效大驗如此况真知道者哉太宗謂任人須用德行學識為本王圭謂人臣若無學業豈堪大任其説美矣此貞觀之治所由致也然太宗王圭之所稱道者又果真儒也哉貞觀四年太宗以經籍去聖久逺文字訛謬詔前中書侍郎顔師古名籕其先琅琊人博學善屬文隋世李綱薦之授安養尉髙祖入關謁見授朝散大夫遷中書舍人詔令一出其手貞觀中釐正五經拜祕書少監後撰五禮成進爵為子於祕書省考定五經及功畢復詔尚書左僕射房玄齡集諸儒重加詳議重平聲時諸儒傳習師説舛謬已久皆共非之異端􅑣起而師古輒引晉宋已來古本隨方曉答援據詳明皆出其意表諸儒莫不歎服太宗稱善者久之賜帛五百匹加授通直散騎常侍晉以員外常侍與散騎常通直故號通直後世因之頒其所定書於天下令學者習焉令平聲太宗又以文學多門章句繁雜詔師古與國子祭酒孔頴逹等諸儒撰定五經疏義凡一百八十卷名曰五經正義付國學施行舊本五經疏義另為一章今合為一章唐氏仲友曰五經出於煨燼之餘諸儒習傳不勝異説當其並行之初是非當否之説特未定也世傳既久其迂怪淺陋之學稍稍堙滅其能盛行於世者如王弼之易孔安國之書毛鄭之詩鄭氏之三禮杜預之左氏何休之公羊范寧之榖梁皆卓然顯行於世而其他不勝異説之數十百家為之盡廢然為數子之學者又各持異見太宗始命名儒為義疏以統一之豈可謂無益于經哉然亦崇其教而已道未也天曰自漢以來經學分折傳習不同重以南北之分漫益訛舛師古家世齊周乃能通晉宋舊文故能釐正南北之謬其有益於學者多矣愚按自經籍僅遺於秦火之餘漢儒修補掇拾而專門名家之學紛紜轇轕學者不勝考也太宗興起斯文命顔師古考定五經孔穎逹撰定疏義易主於王弼書主於安國詩主於毛鄭三禮主於康成杜預之左傳何休之公羊范寧之榖梁皆卓然顯行於世而其他數十百家盡廢唐之疏義可謂有功於經矣然嘗論之古者易有田氏焦氏費氏數家自唐以王弼為正而秦漢象數之學晦矣古者書有歐陽氏大小夏侯氏數家自唐以安國為正而古文今文之本亂矣古者詩書之序不附於正經易之十翼不附於爻彖自唐之疏義既出而經傳殽亂不可復考矣由此論之則明六經之道者疏義也晦六經之道者亦疏義也雖然名物度數之詳字義音釋之備毫分縷析使後世有考焉此則其功之不可誣者也太宗嘗謂中書令岑文本曰夫人雖稟定性夫音扶必須博學以成其道亦猶蜃性含水待月光而水垂蜃音腎大蛤也海上月明蜃吐氣如樓閣之狀木性懷火待燧動而熖發燧取火之木也春取榆桞之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火人性含靈待學成而為美是以蘇秦刺股刺音漆蘇秦字季子雒陽人師鬼谷子得太公隂符伏而誦之讀書𣣔睡引錐自刺其股血流至踵簡練揣摩至期年而成後遊説佩六國相印董生垂帷董生名仲舒廣川人漢景帝時為慱士治春秋下帷講誦弟子以次相授或莫見其面三年不窺園其精如此學者皆師尊之武帝即位舉賢良對䇿三篇擢為江都王相不勤道藝則其名不立文本對曰夫音扶人性相近情則遷移必須以學飾情以成其性禮云玉不琢不成器人不學不知道禮學記之辭所以古人勤於學問謂之懿德愚按學之為言效也人性皆善覺有先後後覺者必效先覺之所為而後可以明善而復其初也由此論之善者吾性之所本有非學則無以復之也猶水者蜃性之所本有非月則無以成之也火者木性之所本有非燧則無以發之也太宗此論雖後世醇儒不能逺過文本斯時政當告之曰陛下既知性善之具於已則性無內外之分不當慎於外而怠於內也性無始終之異不當謹於始而怠於終也于以攻其邪心格其非心庶乎疾之有瘳矣顧乃泛引學記之言無所匡救道之不明有君無臣豈不可歎之甚哉文史第二十八凡四章貞觀初太宗謂監修國史房玄齡曰比見比音鼻前後漢史載録楊雄甘泉羽獵楊雄字子雲成都人漢成帝時有薦雄文似相如者上方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭從上甘泉還奏甘泉賦以風後上羽獵雄從以為非堯舜成湯文王三驅之意故作羽獵賦以風司馬相如子虛上林司馬復姓相如名成都人著子虛賦漢武帝讀而善之乃召問相如相如曰此乃諸侯之事未足觀請為天子遊獵之賦相如以子虛虛言也欲明天子之義故虛藉為辭以推天子諸侯之苑囿為子虛上林賦其卒章歸之於節儉因以諷諌班固兩都等賦班固字孟堅彪之子也漢明帝時為校書郎繼父業著西漢書後遷玄武司馬作西都東都賦此既文體浮華無益勸誡何假書之史䇿其有上書論事詞理切直可禆於政理者朕從與不從皆須備載胡氏寅曰凡人之心已以為是則欲天下皆是已以為非則欲天下皆非太宗於此其心廣矣不敢自以為是而沒人之善使後有考焉雖然切直之言猶瞑眩之藥將以已疾也如其可服舍而不服而姑存其方豈若尅勉而從之以收益身之用乎愚按春秋者諸史之本也褒善貶惡進君子退小人進中國退夷狄一言一字皆足為後世法後世之史表年紀事而已固難律之以春秋之法要使其善足為勸惡足為戒可也無益之文何必厠於其間哉太宗謂漢史載甘泉等賦文體浮華無益勸戒其説是也近時司馬氏作通鑑於韓文載文暢序於柳文載梓人傳取其有益於世教也較之舊史載進學解等文相去逺矣司馬氏之書真太宗之遺意哉貞觀十一年著作佐郎鄧隆通鑑作鄧世隆避太宗諱除世字表請編次太宗文章為集太宗謂曰朕若制事出令有益於人者史則書之足為不朽若事不師古亂政害物雖有詞藻終貽後代笑非所須也秪如梁武帝父子武帝及昭明太子統也及陳後主名叔寶字元秀髙宗長子也國號陳多與狎客賦詩後為隋所滅封長城公隋煬帝亦大有文集如玉樹後庭花曲清夜遊西園曲之類而所為多不法宗社皆須臾傾覆凡人主惟在德行去聲何必要事文章耶竟不許按通鑑係十二年愚按昔史臣贊堯曰欽明文思贊舜曰濬哲文明未嘗不言文也夫子之言堯曰煥乎其有文章朱子謂文者德之著乎外者也其經緯天地者乎後世帝王於是乎有文集矣若梁武帝父子陳後主隋煬帝之所謂文文與行乖何足云也太宗謂人主惟在德行何必事文章此言固為要論然藴之為德行發之為文辭昭回天章光𬒳萬物如帝堯之文章尚何厭於文哉貞觀十三年褚遂良為諌議大夫兼知起居注太宗問曰卿比知起居比音鼻書何等事大抵於人君得觀見否朕欲見此注記者將却觀所為得失以自警戒耳遂良曰今之起居古之左右史禮天子言則左史書之動則右史書之以記人君言行去聲善惡畢書庶幾人主不為非法幾平聲不聞帝王躬自觀史太宗曰朕有不善卿必記耶遂良曰臣聞守道不如守官臣職當載筆何不書之黃門侍郎劉洎進曰人君有過失如日月之蝕人皆見之設令平聲遂良不記天下之人皆記之矣范氏祖禹曰人君言行𬒳於天下炳若日月衆皆睹之其得失何可私也欲其可傳於後世莫若自修而已矣何畏乎史官之記必自觀之邪劉洎謂天下亦皆記之斯言足以警其君心全其臣職矣愚按古者天子動則左史書之言則右史書之所以約飾人君之身心使之無言動之失而已唐制雖不盡古而意則猶古必得其人以舉厥職則庶乎其有警也若遂良之言可謂能守其職矣劉洎之言則兩針之也賢矣哉貞觀十四年太宗謂房玄齡曰朕每觀前代史書彰善疸惡疸音亶病也足為將來規誡不知自古當代國史何因不令平聲帝王親見之對曰國史既善惡必書庶幾平聲人主不為非法止應平聲畏有忤旨故不得見也太宗曰朕意殊不同古人今欲自看國史者蓋有善事固不須論若有不善亦欲以為鑒誡使得自修改耳卿可撰録進來玄齡等遂刪略國史為編年體撰髙祖太宗實録各二十卷表上之太宗見六月四日事武德九年六月丁巳秦王殺太子建成齊王元吉語多微文乃謂玄齡曰昔周公誅管蔡而周室安見公平篇注季友鴆叔牙而魯國寧鴆直禁切毒鳥也以羽歷飲食即殺人春秋時魯莊公有三弟長慶父次叔牙次季友莊公娶孟任生子班欲立之及病問嗣於叔牙叔牙曰慶父可為嗣公患之問季友季友請立班季友以公命使人飲叔牙以鴆朕之所為義同此類蓋所以安社稷利萬人耳史官執筆何煩有隱宜即改削浮詞直書其事侍中魏徴奏曰臣聞人主位居尊極無所忌憚惟有國史用為懲惡勸善書不以實後嗣何觀陛下今遣史官正其辭雅合至公之道范氏祖禹曰古者官守其職史書善惡君相不與焉故齊太史兄弟三人死於崔杼而卒不沒其罪此姦臣賊子所以懼也後世人君得以觀史而宰相監修欲其直筆不亦難乎司馬遷有言文史星歷近乎卜祝蓋止於執簡記事直書其實而已非如春秋有褒貶賞罰之文也後之為史者務褒貶而忘事實失其職矣人君任臣以職而宰相不與史事則善惡庶乎其可信也又曰昔者象日以殺舜為事舜為天子也則封之管蔡啓商以叛周周公為相也則誅之其迹不同而其道一也舜知象之將殺已也故象憂亦憂象喜亦喜盡其誠以親愛之而已矣象得罪於舜故封之管蔡流言於國將危周公以間王室得罪於天下故誅之非周公誅之天下之所當誅也周公豈得而私之哉後世如有王者不幸而有害兄之弟如象則當如舜封之是也不幸而有亂天下之兄如管蔡則當如周公誅之是也舜處其常周公處其變此則聖人所以同歸于道也若夫建成元吉豈得罪於天下者乎苟非得罪於天下則殺之者已之私也豈周公之心乎愚按唐世臨湖之事先儒論之詳矣太宗至是乃自比於周公誅管蔡為同類尤不能逃儒者之議焉文公朱子謂只消以公私斷之周公全以周家天下為心太宗則假仁義以濟私欲斯言盡之矣愚謂使建成有泰伯固讓之心而太宗得如王季因心之友則至德在建成聖德在太宗可以掩絶千古矣是可為嘆息也禮樂第二十九凡十二章太宗初即位謂侍臣曰準禮名終將諱之前古帝王亦不生諱其名故周文王名昌周詩云克昌厥後春秋時魯莊公名同十六年經書齊侯宋公同盟于幽唯近代諸帝妄為節制特令生避其諱令平聲理非通允宜有改張因詔曰依禮二名義不偏諱尼父逹聖非無前指近世以來曲為節制兩字兼避廢闕已多率意而行有違經語今宜依據禮典務從簡約仰效先哲垂法將來其官號人名及公私文籍有世及民兩字不連讀並不須避愚按春秋傳曰周人以諱事神名終將諱之禮曰不諱嫌名二名不偏諱著在禮經昭然可法諱名所以示尊事之意也降及後世諱益繁而愈重有偏有旁有嫌甚至改易聖經之字遂失其義甚非古也太宗灼見近代之失去其繁文二名不偏諱允合古義貞觀二年中書舍人髙季輔上疏曰竊見密王元曉等髙祖第二十一子也俱是懿親陛下友愛之懷義髙古昔分以車服委以藩維須依禮儀以副瞻望比見比音鼻帝子拜諸叔諸叔亦即答拜王爵既同家人有禮豈合知此顛倒昭穆昭如字古者宗廟之次左為昭右為穆而子孫亦以為序説見朱子中庸或問伏碩一垂訓誡永循彛則太宗乃詔元曉等不得答吳王恪魏王泰兄弟拜唐氏仲友曰詩書所載必起宗族家之未正其如邦何正帝子諸叔之昭穆豈惟得敘族之禮亦以明本支見尊無二上之義愚按禮曰天子之元子士也天下無生而貴者入學齒胄所以尚敬也矧以帝諸子而受諸叔之答拜殊失親親之殺豈禮也哉季輔之言太宗之詔誠為彛則貞觀四年太宗謂侍臣曰比聞比音鼻京城士庶居父母喪者喪平聲乃有信巫書之言辰日不哭以此辭於吊問拘忌輟哀敗俗傷風極乖人理宜令平聲州縣教導齊之以禮典愚按太史公謂隂陽家使人拘而多畏降及後世其説愈長其術愈衍而拘畏愈甚令人欲逺絶而不能然嘗觀傳曰長在子卯謂之疾日君徹宴樂從古以來有是説此又何也以子卯而不樂亦猶辰日而不哭也太宗嘗以辰日哭張公謹矣此固足以破時俗之惑而天下至有辰日而不哭父母者夫父天母地之傾摧號天叩地之不及乃以辰日而不哭此情果何為哉太宗令州縣教導齊之以禮典善矣然隂陽之説流弊于今豈惟辰日不哭而已哉傷風敗俗乖亂人理者尤多上之人道之以德齊之以禮庶幾其少改乎貞觀五年太宗謂侍臣曰佛道設教本行善事豈遣僧尼道士等妄自尊崇坐受父母之拜損害風俗悖亂禮經宜即禁斷仍令平聲致拜於父母愚按張子西銘曰乾稱父坤稱母人藐焉而中處則天地其大父母也書曰天子作民父母以為天下王則天子者天下之父母也詩曰父兮鞠我母兮育我則育我鞠我者一家之父母也僧道二字三代無是名也後世而有其名有其人矣獨非上乾下坤而處於中者乎獨非為天下父母者之民乎獨非一家父母之子乎而曰出世間矣上而不拜君王下而不拜父母其不在君臨之內歟不出鞠育之中歟吾不知其何心也若唐世至於坐受父母之拜尤為不經之甚太宗敕之禁斷仍令致拜父母允合民彛誠可為後世之法也貞觀六年太宗謂尚書左僕射房玄齡曰比有比音鼻山東崔盧李鄭四姓雖纍葉陵遲猶恃其舊地好自矜大好去聲稱為士大夫每嫁女他族必廣索聘財以多為貴論數定約同於市賈音古甚損風俗有紊禮經既輕重失宜理須改革乃詔吏部尚書髙士廉御史大夫韋挺中書侍郎岑文本禮部侍郎令狐德棻等棻音汾令狐復姓德棻名也宜州人博貫文史武德𥘉起居舍人嘗建言論次隋周正史貞觀三年詔德棻等撰周齊梁陳隋史書成遷禮部侍郎刋正姓氐普責天下譜諜兼據慿史傳去聲剪其浮華定其真偽忠賢者褒進悖逆者貶黜撰為氏族志士廉等及進定氏族等第遂以崔幹為第一等太宗謂曰我與山東崔盧李鄭舊既無嫌為其世代衰微為去聲全無官宦猶自云士大夫婚姻之際則多索財物或才識庸下而偃仰自髙販鬻松檟音賈依託冨貴我不解音懈人間何為重之且士大夫有能立功爵位崇重善事君父忠孝可稱或道義清素學藝通博此亦足為門户可謂天下士大夫今崔盧之屬唯矜逺葉衣冠寧比當朝之貴公卿已下何暇多輸錢物兼與他氣勢向聲背實背音倍以得為榮我今定氏族者誠欲崇樹今朝冠冕何因崔幹通鑑作崔民幹避太宗諱除民字猶為第一等秪看卿等不貴我官爵耶不論數代已前秪取今日官品人才作等級宜一量定用為永則遂以崔幹為第三等至十二年書成凡百卷頒天下又詔曰氏族之美實繁於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗陵替燕趙古姓多失衣冠之緒齊韓舊族或乖禮義之風名不著於州閭身未免於貧賤自號髙門之胄不敦匹嫡之儀問名唯在於竊資結䄜必歸於富室乃有新官之輩豐財之家慕其祖宗競結婚姻多納貨賄有如販鬻或自貶家門受辱於姻婭或矜其舊望行無禮於舅姑積習成俗迄今未已既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸已懲革唯此弊風未能盡變自今已後明加告示使識嫁娶之序務合禮典稱朕意焉稱去聲按通鑑凡二百九十三姓千六百五十一家唐氏仲友曰古者重氏姓故有同姓異姓庶姓之别以天揖時揖士揖為之禮奠繫世辨昭穆史氏掌之豈容少有混淆自秦罷侯封而命氏别族之禮廢自魏有中原而華夷之姓雜然無辨唐承南北之弊氏族之書安得不作又出英斷以定髙下不幸遭許李挾艷后以焚信書至見自為勳格而又納幣踰制禁昏成敝使太宗之美意不得一傳可勝嘆哉林氏之竒曰善惡貴賤之在天下猶白黑之不相掩初不可以一時之私見而決之也班孟堅作古今人物表止曰羲皇至于西漢凡善惡之目别為九等而錙銖之遂使後世之議紛然而起此無他善惡之在天下自有公論而非一時私見所得而決之故也太宗之論可謂一當世之失以合夫天下之公論矣然猶以一時品秩之髙下而為後世門户之貴賤則太宗所見猶未免於徇流俗之情也孰若付之公論使貴者自貴賤者自賤乎愚按人之賢否不同善惡萬狀初不可以家世而求之也以堯舜為父而有朱均以瞽鯀為父而有舜禹伊尹自耕稼而佐成湯傅説自版築而相武丁太公自漁釣而為周太師此豈以家世而求之邪况自魏有中原華夷之姓雜然無辨赫連托始於夏后拓跋推本於軒轅李氏以玄元為祖崇韜認汾陽為宗書史失傳譜諜無據至若唐之崔盧李鄭矜其門地販鬻婚姻無所不至太宗深疾斯弊思欲革而正之是矣然猶以一時品級之髙下而為後世門户之貴賤則滋惑也姑以當時言之當時名臣無過房杜厥後遺愛與公主為非杜荷與承乾造逆將以其父祖之賢德而取之乎抑以其子孫之叛逆而黜之乎然此猶在易世之後也若侯君集與凌煙之圖而身為叛逆許敬宗與登瀛之選而心極奷邪又將何以處之乎夫物之不齊物之情也奈何欲定以一時之私見哉宜其紛紛而卒無輔於事也禮部尚書王圭子敬直尚太宗女南平公主圭曰禮有婦見舅姑之儀自近代風俗弊薄公主出降此禮皆廢主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執巾行盥饋之道令平聲盥音管饋音匱盥以盤水沃手也左傳奉匜沃盥饋以食為餉也易家人主中饋言婦人職乎中饋巽順而巳禮成而退太宗聞而稱善是後公主下降有舅姑者皆遣備行此禮唐氏仲友曰有父子則有舅姑漢以來尚主者以貴降其父可謂逆人倫滅天理矣唐興猶不行婦禮王圭正之不亦宜乎愚按古者王姫下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德降及後世而此禮失矣夫人主以一身為人倫之主居億兆之上斯則尊無二上也帝女下降則婦道也豈宜以天子之女而壞五常之大倫乎太宗能善王圭言使公主行婦禮可謂庶幾乎人倫之主也貞觀十二年太宗謂侍臣曰古者諸侯入朝有湯沐之邑古者諸侯京師有朝宿之邑泰山有湯沐之邑蓋朝宿亦名湯沐諸侯來京師主為朝王故名朝宿從王巡狩主為助祭祭必沐浴故名湯浴隨事立名爾芻禾百車芻茭也禾稈也所以供軍馬待以客禮晝坐正殿夜設庭燎音療大燭也諸侯將朝則司烜以物百枚并而京之設於門內也思與相見問其勞苦又漢家京城亦為去聲後同諸郡立邸舍頃聞考使去聲後同即朝集使也至京者皆賃房以坐與商人雜居才得容身而已既待禮之不足必是人多怨歎豈肯竭情於共理哉乃令平聲就京城間坊為諸州考使各造邸第及成太宗親幸觀焉愚按漢世於京師置諸侯王邸第諸侯王朝會寓焉上計吏到京寓焉太宗為諸州考使各造邸第允合古制及其成親幸臨觀尤見優異之意孰不竭情於共理哉貞觀十三年禮部尚書王圭奏言凖令三品已上遇親王於路不合下馬今皆違法申敬有乖朝典太宗曰卿輩欲自崇貴卑我兒子耶魏徴對曰漢魏已來親王班皆次三公下今三品並天子六尚書九卿為王下馬為去聲王所不宜當也求諸故事則無可慿行之於今又乖國憲理誠不可帝曰國家立太子者擬以為君人之修短不在老幼設無太子則母弟次立母弟同母之弟也以此而言安得輕我子耶徴又曰殷人尚質有兄終弟及之義自周已降立嫡必長音掌所以絶庶孽之窺窬塞禍亂之源本為國家者所宜深慎太宗遂可王圭之奏愚按昔漢賈誼治安之書曰禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乘車則下又曰王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也然則臣之所以致敬於其君君之所以禮貌於其臣各盡其道而已王圭之奏固然而未免啓太宗輕我子之疑而太宗之言亦豈貴貴尊賢之道哉且當是時儲位之定久矣太宗至是而有設無太子則母弟次立之語固一時逺慮之言也如魏王泰輩之妄想寧不兆於此言邪可不慎哉貞觀十四年太宗謂禮官曰同㸑尚有緦麻之恩而嫂叔無服又舅之與姨親踈相似而服之有殊未為得禮宜集學者詳議餘有親重而服輕者亦附奏聞是月尚書八座與禮官定議曰臣竊聞之禮所以決嫌疑定猶豫别同異别披列切明是非者也非從天下非從地出人情而已矣人道所先在乎敦睦九族九族者髙祖至玄孫之親舉近者以該逺五服異姓之親亦在其中九族敦睦由乎親親以近及逺親屬有等差故喪紀有隆殺喪平聲殺音賽隨恩之薄厚皆稱情以立文稱去聲後同原夫音扶舅之與姨雖為同氣推之於母輕重相懸何則舅為母之本宗姨乃外戚他姓求之母族姨不與焉與音預考之經史舅誠為重故周王念齊是稱舅甥之國左傳成公二年晉侯使鞏朔獻齊捷于周王弗見使單襄公辭曰夫齊甥舅之國也寧不亦淫從其欲抑豈不可諌秦伯懷晉實切渭陽之詩詩秦渭陽篇曰我送舅氏曰至渭陽朱子注舅氏秦穆公之舅晉公子重耳也出亡在外穆公召而納之時康公為太子送之渭陽而作此詩渭水名秦時都雍至渭陽者蓋東行送之於咸陽之地也今在舅服止一時之情為姨居喪五月為去聲後同喪平聲後喪紀同五月小功之服徇名喪實逐末棄本此古人之情或有未逹所宜損益實在兹乎禮記曰兄弟之子猶子也蓋引而進之也嫂叔之無服蓋推而逺之也推他回切逺去聲並後同禮喪記篇之辭禮繼父同居則為之期未嘗同居則不為服從母之夫從去聲後同舅之妻二人相為服或曰同㸑緦麻然則繼父且非骨肉服重由乎同㸑恩輕在乎異居固知制服雖係於名文蓋亦緣恩之厚薄者也或有長年之嫂長音掌遇孩童之叔劬勞鞠養情若所生分飢共寒契闊偕老契音挈譬同居之繼父方他人之同㸑情義之深淺寧可同日而言哉在其生也乃愛同骨肉於其死也則推而逺之求之本源深所未喻若推而逺之為是為如字後同則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱如字載籍非一鄭仲虞則恩禮甚篤名均後漢時人好義篤實養寡嫂孤兒恩禮敦至兄子長令别居並門盡推財與之使得一尊其母顔弘都則竭誠致感名含晉時人嫂樊氏因疾失明含盡心奉養醫須蚺蛇膽含憂歎纍時有童子持囊授含開視乃瞻也藥成嫂病愈馬援則見之必冠馬援字文淵扶風人後漢伏波將軍奉嫂致恭不冠不敢入廬見孔伋則哭之為位孔伋孔子之孫字子思禮記檀弓篇曽子曰子思之哭嫂也為位此蓋並躬踐教義仁深孝友察其所行之旨豈非先覺者歟但于時上無哲王禮非下之所議遂使深情鬱於千載至理藏於萬古其來久矣豈不惜哉今陛下以為尊卑之敘雖煥乎已備喪紀之制喪平聲或情理未安爰命秩宗詳議損益臣等奉遵明旨觸類傍求採托群經討論傳記論平聲傳去聲或抑或引兼名兼實損其有餘益其不足使無文之禮咸秩敦睦之情畢舉變薄俗於既往垂篤義於將來信六籍所不能談超百王而獨得者也謹按曽祖父母舊服齊衰三月齊讀曰咨衰七雷切齊衰五服之第二等衣長六尺慱四寸裳下緝曰齊衰請加為齊衰五月嫡子婦舊服大功服九月請加為期衆子婦舊服小功今請與兄弟同為大功九月嫂叔舊無服今請服小功五月其弟妻及夫兄亦小功五月舅舊服緦麻請加與從母同服小功五月詔從其議詔從如字此並魏徴之詞也范氏祖禹曰人莫不有本自髙祖以上推而至於無窮苟或知之何可忘其所從來也既逺矣則服有時而絶先王之意豈以服盡而親絶乎而後世不逹於禮者或益之或損之出於私意不足為法也嫂叔之無服古之人豈於其嫂獨無恩乎傳曰其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也至於嫂不可以為母無屬乎妻道者也故推而遠之以明人倫加之而無義不若不加之為愈凡喪服從先王之禮則正矣愚按古之制禮尚矣嘗聞之師曰凡喪禮制為斬衰功緦之法者其文也不飲酒不食肉不處內者其實也中有其實而外飾以文是為情文之稱徒服其服而無其實則與不服等爾雖不服其服而有其實者謂之心喪心喪有隆而無殺服制之文有殺而有隆古之道也蓋服制一以周公之禮為正後世有所增改者皆溺乎其文昧乎其實而不究古制禮之意者也如從父之妻名以母之黨而服從子之妻名以婦之黨而服兄弟之妻不可名以妻之黨其無服者推而逺之也然兄弟有妻之服已之妻有娣姒之服已雖無服必不華靡於其躬宴樂於其室如無服之人也同㸑且服緦麻朋友尚加麻鄰喪里殯猶無相杵巷歌之聲奚獨於兄嫂弟婦之喪而恝然待之如行路人乎古人制禮之意必有在而未易以淺識窺也夫實之無所不隆者仁之至文之有所或殺者義之精古人制禮之意蓋如此後世意欲加厚於古而不知古者之制未嘗薄也大抵古人所勉者喪之實也自盡于己者也後世所加者喪之文也可號於人者也誠偽之相去為何如嗚呼安得起唐之君臣而與語斯義哉貞觀十七年十二月癸丑太宗謂侍臣曰今日是朕生日俗間以生日可為喜樂音洛後同在朕情翻成感思君臨天下富有四海而追求侍養去聲永不可得仲由懷負米之恨家語子路曰昔者由也事二親之時常食藜藿之食為親負米於外親沒之後南逰於楚從車百乘積米萬鍾願欲食藜藿為親負米不可復得也良有以也況詩云哀哀父母生我劬勞上音渠病苦也詩蓼莪篇之辭奈何以劬勞之辰遂為宴樂之事甚是乖於禮度因而泣下久之通鑑係二十年十二月癸未胡氏寅曰劬勞之日父母存置酒為壽因以自慶可也父母既亡於是焉大為宴樂有人心者宜乎此焉變矣天子者天下之表儀也太宗念親不宴而泣去之數百歲讀其言猶使人惻然有感而後世流弊之逺取於百姓而為人臣報上之忠必如太宗一掃除之則人主孝慕之志彰而臣子諂謏之習革矣愚按以巳之生日而念劬勞君上之至情也以君之生日而上朝賀臣子之至情也君上教天下以孝臣子訓天下以忠兩盡其情可也太常少卿少去聲祖孝孫祖姓也孝孫名奏所定新樂𥘉隋用黃鍾一官惟擊七鍾其五鍾設而不擊謂之啞鍾至是叶律郎張文收乃依古斷竹為十二律命與孝孫吹調五鍾叩之而應由是十二律皆用而孝孫又以二十二用旋相為六十聲八十四調雅樂成調無出七聲七聲一宫二商三角四變徴五正徴六羽七變宫本宫近相用唯樂章則隨律定均合以笙磬節以鍾鼓太宗曰禮樂之作是聖人緣物設教以為撙節撙祖本切治政善惡豈此之由御史大夫杜淹對曰前代興亡實由於樂陳將亡也為玉樹後庭花陳後主奢淫日甚每飲酒使妃嬪與狎客共賦詩采其艷麗者被以新聲選宫女千餘人習而歌之分部迭進其曲有玉樹後庭花臨春樂大略皆美諸妃嬪之容色君臣相酣歌自夕逹旦以此為常由是覆滅齊將亡也而為伴侣曲齊東昏侯時作伴侣曲後為蕭衍所滅行路聞之莫不悲泣所謂亡國之音以是觀之實由於樂太宗曰不然夫音聲豈能感人夫音扶歡者聞之則悅哀者聽之則悲悲恱在於人心非由樂也將亡之政其人心苦然苦心相感故聞而則悲耳何樂聲哀怨能使悅者悲乎今玉樹伴侣之曲其聲具存朕能為公奏之為去聲知公必不悲耳尚書右丞魏徴進曰古人稱禮云禮云玉帛云乎哉唐史無此九字樂云樂云鍾鼓云乎哉論語孔子之辭樂在人和不由音調去聲太宗然之按通鑑係貞觀二年祖孝孫以為梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲作唐雅樂凡八十四調二十一曲十二和詔協律郎張文收與孝孫同修定六月乙酉孝孫等奏新樂上曰云云司馬氏光曰禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平又思與四海共之百世傳之於是作禮樂焉夫禮樂有本有文中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去其心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷𬒳於鄉遂比鄰逹於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數千百年然後治化周浹鳯凰來儀也苟無其本徒有其末一日行之而百日舍之則雖韶夏濩武之音亦不能有以化一夫矣况齊陳淫昏之主亡國之音暫奏於庭烏能變一世之哀樂乎而太宗遽云治之隆替不由於樂何其發言之易而果於非聖人也朱氏黼曰樂生於人心未嘗不與政通也發於外者雖本於人心之喜怒哀樂而作於外者亦足以感其心之逆順邪正世有治亂故其音有安樂怨怒之别而其音噍殺嘽緩粗厲徑直亦足為其民之思憂康樂剛毅肅敬之殊聞韶護之音不覺和易聽鄭衛之曲不期流靡事有固然是豈經傳謾云哉如太宗所言則聖人移風易俗之具防情教和之理皆妄誕也聖人曰鍾鼓云蓋傷後世徇器而忘情知末而喪本耳魏徵知太宗之非不諫而反執是以順其旨不惟不知樂固亦不知經義也愚按古者聖人之作樂也功成治定德洽仁浹衆賢和於上萬民和於下然後定律本制器物立曲調習舞節作為一代之樂以養情性育人才事神祇和上下其體用功效廣大深切如此是故黎民時雍韶樂之本也然非后夔制樂何以致鳯凰來儀之盛綏萬邦屢豐年武樂之本也然非周公制樂何以致清廟肅雍之盛蓋樂本於聖人之德而樂之成也又有以輔聖人之德樂本於天地之和而樂之成也又有以召天地之和先王重其本而未嘗遺其末也盡其實而未嘗舍其文也徒有其樂而無其德固無以為美教化成風俗之本徒有其德而無其樂則亦何以為感神人和上下之具哉唐之君臣謂樂在人和亦可謂知樂之本矣然遽謂治政善惡豈此之由則是先王制作皆為具文矣豈不悖哉嗚呼自秦滅典籍樂經最為殘缺今其可知者百不存一後之人君汲汲而求之猶懼其漫滅難考而况訾為無用之具乎司馬氏譏其發言之易而果於非聖人詎不信哉貞觀七年太常卿蕭瑀奏言今破陳樂舞陳音陳破陳樂即七德舞也太宗為秦王時破劉武周軍中相與作破陳樂用樂工百二十八人𬒳銀甲執戟而舞凡三變每變為四陳象刺左圓右方先偏後伍交錯曲伸以象魚麗鵝鸛觀者莫不扼腕踊躍元日冬至朝會慶賀常奏後舞人改用進賢冠虎文袴騰蛇帶烏皮靴二人執旌居前更號神功破陳樂七德者取左傳武有七德名之也所以示其發掦蹈厲之容也天下之所共傳然美盛德之形容尚有所未盡前後之所破劉武周馬邑人隋世為鷹揚校尉義寧𥘉據馬邑郡起兵附于突厥突厥立武周為定揚可汗稱帝改元後太宗敗之于并州奔突厥為突厥所斬薛舉蘭州人隋未起兵自號西秦霸王建元後僣帝號于蘭州太宗降舉于髙墌城未幾死子九功舞同奏愚按古之樂莫善於韶舞韶舞尚矣今不可得而知矣夫子之論武舞有曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇其發揚蹈厲之容進退擊刺之節不過以象其克殷紂服荊蠻之事而已周未聞圖畫亡國之君而陳之也唐七德之舞銀甲執戟先偏後伍交錯屈伸以象魚麗鵝鸛之陳雖不能上法三代蓋亦庶幾武舞之遺意矣蕭瑀以為未盡請圖畫劉武周等形狀以識之夫君子於所不知蓋闕如也瑀何所據而云耶太宗謂今日將相有嘗為其臣者觀之有所不忍此特言當時之情耳要之瑀之論非特不便於當時蓋亦無稽於往古也貞觀政要卷第七
