  text: 貞觀政要卷第五戈直集論
  hash: sha256:7d5682458d5193bcb46d1ed524966164f747e7eee8748207e81556c0e2904849
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_005-1a}
body:
  text: 論仁義十三論忠義十四論孝友十五論公平十六論誠信十七仁義第十三凡四章貞觀元年太宗曰朕看古來帝王以仁義為治者國祚延長任法御人者雖救弊於一時敗亡亦促既見前王成事足是元龜今欲專以仁義誠信為治望革近代之澆薄也黃門侍郎王圭對曰天下雕喪日久陛下承其餘弊弘道移風萬代之福但非賢不理惟在得人太宗曰朕思賢之情豈捨夢寐給事中杜正倫進曰世必有才隨時所用豈待夢傅説悅音逄吕尚然後為治乎太宗深納其言以誠信行之此其所以致貞觀之盛也然嘗聞愚按太宗即位之初知古帝王以仁義為治欲三王仁義之事也心未必正身未必修而其愛之正其心修其身而達之于家國天下此二帝齊桓晉文假仁義之事也太宗芟除禍亂身致人利物之功禁暴止亂之效亦有補于當世此德凡魏徴之所諫太宗之所行不過黽勉於仁升平可謂偉矣然由心而身由身而家皆有慚五伯也王圭謂非賢不理惟在得人斯言是已義之功而已故雖有志于三王迄未能大異于夫茍得周召孔孟而用之則能施其致君澤民然所謂得人者必得周召孔孟其人而後可也備于君身仁義之大用周于天下後世矣之術盡其格心養德之方而仁義之全體貞觀二年太宗謂侍臣曰朕謂亂離之後風俗難移比觀鼻比音百姓漸知亷恥官人奉法盜賊日稀故知人無常俗但政有治亂耳是以為國之道必須撫之以仁義示之以威信因人之心去其苛刻不作異端自然安靜公等宜共行斯事也以風俗之不如古也然欲美風俗者則在于正愚按風俗有古今人心無古今人心之不如古知亷耻故知人無常俗但政有治亂耳斯言也人心人心正而風俗美矣太宗謂比觀百姓漸不過仁義之似而已其明效大驗如此况於真其魏徵勸行仁義略效之時乎夫太宗之所行正人心者乎知實踐正已以貞觀四年房玄齡奏言今閲武庫甲仗勝隋日逺矣太宗曰飭兵備寇雖是要事然朕唯欲卿等存心理道務盡忠貞使百姓安樂洛音便是朕之甲仗隋煬帝豈為甲仗不足聲為去以至滅亡正由仁義不修而羣下怨叛故也宜識此心求懿德肆于時夏允王保之下武右文信矣武愚按周頌之美武王曰載戢干戈載櫜弓矢我之四年謂不以甲仗之備為美戒廷臣以德義王能保天下也太宗身履行陳芟除群雄即位保天下之道歟相輔亦信矣其能貞觀十三年太宗謂侍臣曰林深則鳥棲水廣則魚遊仁義積則物自歸之人皆知畏避災害不知行仁義則災害不生夫仁義之道扶夫音當思之在心常令相繼後同令平聲若斯須懈怠去之已逺字去如猶如飲食資身恆令腹飽乃可存其性命王圭頓首曰陛下能知此言天下幸甚與大學自誠意逹之明明德於天下方為醇粹太唐氏仲友曰仁義是帝王之道然必如中庸九經謂仁義乃在制度紀綱而已宗言仁義本乎魏徵之勸然所義積則物自歸之此言真善喻也謂仁義之道愚按太宗之言曰林深則鳥棲水廣則魚逰仁忘乎仁義者然不知仁義乃吾心固有之理孟當思之在心如飲食資身恆令腹飽此固欲不又何待思之在心哉子所謂根於心者也論忠義第十四五章凡十馮立人馮翊武德中為東宫率率府掌兵仗宿衛之政音律唐制東宫置左右曹之事令總諸甚被隱太子親遇太子之死也左右多逃散立歎曰豈有生受其恩而死逃其難聲去於是率兵犯玄武門苦戰殺屯營將軍敬君弘人絳州謂其徒曰微以報太子矣遂解兵遁於野俄而來請罪太宗數之曰聲數上汝昨者出兵來戰大殺傷吾兵將何以逃死立飲泣而對曰聲飲去立出身事主期之效命當戰之日無所顧憚因歔欷希悲歎貌上音虛下音悲不自勝聲平太宗慰勉之授左屯衛中郎將掌宿衛之屬去聲後同唐制立謂所親曰逄莫大之恩幸而獲免終當以此奉答未幾聲平突厥至便橋率數百騎與虜戰於咸陽殺獲甚衆所向謝叔方皆自出萬徹亡匿屢使諭之乃出秦王曰皆入終南山馮立遂解兵逃于野髙祖既赦天下馮立敬君弘後贈左屯衛大將軍吕衡贈右驍衛將軍忠于所事義士也釋之馮立後授廣州都督卒于官敢兼有之觀其于隱太子之死能不避難然君弘唐氏仲友曰若立者所謂一心可事百君忠義勇蓋可知也然立之與叔方俱可謂見危致命者矣世衡既死則解兵而去不為已甚則異乎徒勇者其立之亞歟較其人品叔方此子路所謂食焉而不避其難者也謝叔方亦愚按馮立之言曰豈有生受其恩而死逃其難亦可謂忠義也已太宗旌之此正興王之所宜有慷慨殺身從容受死之意二人雖皆受爵然無異也然知進而不知退終以邪謀就誅寧不然也若薛萬徹亦可謂忠于所事始焉與馮謝之首萬徹乃削而不書厥有旨哉有愧乎史臣是編書馮謝于忠義貞觀元年太宗嘗從容容切從即言及隋亡之事慨然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也思廉時在洛陽因寄物三百假并遺其書曰聲遺去想卿忠節之風故有斯贈初大業末思廉為隋代王侑侍讀巡以侑留守長安髙祖克長安立侑為帝代王侑隋元德太子之子煬帝十三年南及義旗尅京城時代王府僚多駭散惟思廉侍王不離其側聲離去兵士將升殿思廉厲聲謂曰唐公初封髙祖公唐舉義兵本匡王室卿等不宜無禮於王衆服其言於是稍却布列階下須臾髙祖至聞而義之許其扶代王侑至順陽閣下思亷泣拜而去見者咸歎曰忠烈之士仁者有勇此之謂乎不能懼凶暴之氣不能攝蓋不在力之武由忠義張氏九成曰君子以仁存誠以義為勇白刃在前軀奮不顧以全君親之生即甲兵之衆顧輕于一之壯也觀隋之亡亂兵入京侍臣駭潰思亷以微大厦傾而一木不支矣凛凛風義激懦夫之志爾言哉誠以仁在其中也易曰能止健大壯也惜乎寡欲雖有不存焉者寡矣思廉之謂歟學問惟寡唐氏仲友曰姚思廉莭義學問之士孟子論為人惟寡欲能立欲能精莭義説見第四章貞觀二年將葬故息隱王建成海陵王元吉尚書右丞魏徵與黃門侍郎王圭請預陪送上表曰臣等昔受命太上委質東宫出入龍樓垂將一紀前宫結釁宗社得罪人神臣等不能死亡甘徔夷戮負其罪戾置録周行杭音徒竭生涯牙音將何上報陛下德光四海道冠前王聲冠去陟岡有感追懷棠棣明社稷之大義申骨肉之深恩卜葬二王逺期有日臣等永惟疇昔忝曰舊臣喪君有君雖展事居之禮宿草將列未申送往之哀瞻望九原義深凡百望於葬日送至墓所太宗義而許之於是宫府舊僚吏盡令送葬聲令平許之二子可謂篤于義矣孟子曰生亦我所欲愚按王圭魏徴請送息隱海陵之喪太宗義而者也圭徴名臣也詎容輕議哉自有文公朱子也義亦我所欲也二者不可得兼捨生而取義貢子路以問夫子夫子稱其功論語集注引程之論斷在焉昔管仲不死于子紏而相桓公子謂管仲有功而無罪故聖人獨稱其功王魏先子之言因論管仲而及于王圭魏徴之事朱子相掩可也斯言盡之矣有罪而後有功則不以貞觀五年太宗謂侍臣曰忠臣烈士何代無之公等知隋朝誰為忠貞王圭曰臣聞太常丞佐也卿之元善逹在京留守見群賊縱橫聲縱平遂轉騎逺詣江都諫煬帝令還京師聲令平既不受其言後更涕泣極諫煬帝怒乃逺使追兵身死瘴癘之地有虎賁郎中奔賁音獨孤盛盛名也獨孤復姓在江都宿衛宇文化及起逆盛惟一身抗拒而死太宗曰屈突通為隋將聲後同屈突虜屈區勿切將去祖兵圍之通守節不降後被擒帝勞之泣曰臣不能復姓通名仕隋為虎賁郎將初代王遣通守河東髙尚書從討王世充時通二子在洛帝曰以東略屬公盡人臣之節故至此為本朝羞帝曰忠臣也授兵部義帝曰烈士徇節吾今見之貞觀初卒如何通曰二兒死自其分終不以私害共國家戰於潼關縣隸陜西省在今華州華陽聞京城陷乃引兵東走聲去義兵追及於桃林縣隸河南今陜州桃林朕遣其家人往招慰遽殺其奴又遣其子往乃云我蒙隋家驅使己事兩帝今者吾死節之秋汝舊於我家為父子今則於我家為仇讎因射之其子避走所領士卒多潰散通惟一身向東南慟哭盡哀曰臣荷國恩聲荷去任當將帥智力俱盡致此敗亡非臣不竭誠于國言盡追兵擒之太上皇授其官每託疾固辭此之忠節足可嘉尚因敕所司採訪大業中直諫被誅者子孫聞奏得為節義乎曰隋運已亡河東之守力戰不屈天唐氏仲友曰屈突通不死于稠桑更盡力于唐尚擒亦足以報隋矣商之亡也雖如箕子猶陳洪範命有歸通如之何斬家奴射其子兵敗力屈而後通之竭力于所事亦足以為節義矣封朝鮮而欲責人以必死不亦難乎若廉于武臣則屈突通也或曰二子隋臣而仕于愚按太宗稱奬隋世忠義之臣于文臣則姚思不同也思廉仕隋不過諸王講讀之官耳于軍唐國亡皆不能死可以為忠臣乎愚應之曰否皆去思廉獨不去呵叱亂兵辭嚴義正又能扶國之重事社稷之大計固不與聞也國亡諸人讀調護之職可謂無負矣曷為而死哉至于通掖舊君泣拜而别其後代王竟得善終思廉講隆楊諒玄感之亂嘗立大功名聞天下煬帝南則不然通仕隋文已躋貴顯逮乎煬帝尊寵加敗通安所辭其死哉並二子之事觀之庸夫能行付以關中之任身受重寄手握疆兵國亡師義其得于思廉而失于屈突乎斷其是非矣然則太宗之奬忠貞觀六年授左光祿大夫陳叔達武德初判納言始建字子聰陳宣帝子也髙祖謂裴寂等曰不圗今日乃見此事當如之何蕭成兄弟閲間太宗帝惑之叔達極意救辨及建成誅疾秦王功髙望重共為姦謀今秦王已討而誅之秦瑀陳叔逹曰建成元吉本不預義謀又無功於天下之國務無復事矣上曰善此吾之夙心也王功蓋宇宙率土歸心陛下若處以元良委禮部尚書因謂曰武德中公曾進直言於太上皇層曾音明朕有克定大功不可黜退云朕本性剛烈若有抑挫恐不勝憂憤聲勝平以致疾斃之危今賞公忠謇有此遷授叔逹對曰臣以隋氏父子自相誅戮以至滅亡豈容目覩覆車不改前轍臣所以竭誠進諫太宗曰朕知公非獨為朕一人後同為去聲實為社稷之計隙之時乎言所左右疑所集也而陳叔達無是心胡氏寅曰人臣之義無私交而况藩王與太子有論亦初無贊髙祖廢立之意于秦王非私交也以特以秦王有功不可黜恐生後悔是皆天下之公而太宗乃舉武德中直言是以危疑向背誘臣下叔達端良自宜在親近之地茍欲敘遷何患無名豈君道哉為後日計直言意固有在矣誠公論非私計也太宗于是愚按時平先長嫡世亂先有功陳叔達當時之其人而心若私也言者心之聲可不慎哉臨御已六年矣楊其忠謇而遷秩之雖用得貞觀八年先是桂州隸廣西今仍舊都督李弘節以清慎聞及身殁後其家賣珠太宗聞之乃宣於朝曰此人生平宰相皆言其清聲相去今日既然所舉者豈得無罪必當深理之不可捨也侍中魏徴承間言曰聲間去陛下生平言此人濁未見受財之所今聞其賣珠將罪舉者臣不知所謂自聖朝以來為國盡忠後同為去聲清貞慎守終始不渝屈突通張道源而已人初守并州張道源并州曰禍福無常安可利人之亡取其子女自奉仁者不賊平拜大理卿時何稠得罪籍家屬以賜群臣道源無資産比亡餘粟二斛為也更資以衣食遣之家通子三人來選聲去有一匹羸馬道源兒子不能存立未見一言及之今弘節為國立功前後大蒙賞賚居官殁後不言貪殘妻子賣珠未為有罪如字未為審其清者無所存問疑其濁者旁責舉人雖云疾惡不疑是亦好善不篤聲好去臣竊思度切待洛未見其可恐有識聞之必生枉議太宗撫掌曰造次不思到切造七遂聞此語方知談不容易切以豉並勿問之其屈突通張道源兒子宜各與一官章附直舊本此附入此諫類今蓋善善之意長惡惡之心短也太宗知屈突道愚按臯陶之稱堯舜有曰罰弗及嗣賞延于世遽欲罪及舉官此豈唐虞賞罰之道乎向非魏源之善而不能録其子弟聞弘節曖昧之過則宗君德之纍矣徴之言亦足為太貞觀七年太宗將發諸道內二曰河南三曰河東四唐分天下為十道一曰關九曰劒南十曰嶺南皆因山川形便而併省之也曰河北五曰山南六曰隴右七曰淮南八曰江南黜陟使黜陟臧否故曰黜陟使去聲後同將命而出掌畿內道即關內道也唐建都之地未有其人太宗親定問於房玄齡等曰此道事最重誰可充使右僕射李靖曰畿內事大非魏徵莫可太宗作色曰朕今欲向九成宫亦非小寧可遣魏徵出使朕每行不欲與其相離者適為其見朕是非得失去為聲公等能正朕不可因輒有所言大非道理乃即令李靖充使臣為諸道黜陟使未得其人李靖薦魏徴令平聲按通鑑貞觀八年太宗欲分遣大等凡十三人分行天下察長吏賢不肖問民疾苦禮上曰徴針規朕失不可一日離左右乃命靖與蕭瑀者所至如朕親睹與此小異高年振窮乏褒善起淹滯俾使本對曰亮才兼將相非徴所及斯言是已然嘗愚按太宗嘗問群臣魏徴與諸葛亮孰賢岑文不能不為當時能攻其所短救其所偏惟徴一論之太宗有餘于才而不足于德勇于敢為而任然使武侯生於太宗之時不過為徴之所為人而已使徴生于三國之時未必能勝武侯之李靖之才兼資文武非徵所能及也然貞觀之耳故以唐之時勢觀之則二子政未易優劣也過增太宗之所有餘徵之諫爭乃能補太宗之時可以無靖不可以無徵何也蓋靖之才能不使靖而不使徴豈非自知之明哉所不足也是以畿內之使太宗寧貞觀九年蕭瑀為尚書左僕射嘗因宴集太宗謂房玄齡曰武德六年已後太上皇有廢立之心我當此日不為兄弟所容實有功髙不賞之懼蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也乃賜詩曰疾風知徑草板蕩識誠臣瑀拜謝曰臣特蒙誡訓許臣以忠諒雖死之日猶生之年中與第五章合為一舊本此章首曰貞觀逆衆持法主恕之以公孤特守節主恕之以介昔聞章今按通鑑標年附入于此又按史傳魏徵曰臣有不遇陛下庸自保邪其言乃今見之使瑀謂能知臣矣且太子在而私于藩王者明君之所范氏祖禹曰太宗以蕭瑀無二心于己而嘉之可惟瑀介然自立有隕無二太宗所以知其臨大節甚惡也或誘以利或脅以死而從之者不亦多乎人豈不得忠正之士乎而不可奪也人君以此取可以為社稷臣矣然太宗此言蓋亦有為瑀初以唐氏仲友曰若以隱巢之事不可以利怵死懼亦太宗賜詩欲群臣知委任之意也魏徴之言亦以切詆房杜廢又以痛劾房杜罷至此復參知政事近世社稷臣之論則猶有愧云發明太宗之意若以瑀較楊子雲瑀之一言瑀以躁狹之量剛徑之氣罷黜者三愚按武德季年髙祖立秦王為皇太子竟決于瑀嘗劾奏魏徵之過矣今觀徴所言若未嘗有而卒預大政太宗實能容之者豈非念夫此耶胸中徵之謂矣然可不謂尤賢乎隙者所謂以義相與不以少嫌置貞觀十一年太宗行至漢太尉楊震墓弘農人也好楊震字伯起白吏後徴為太常遷太尉為內戚讒譛遣歸震曰死學明經諸儒稱為關西夫子漢安帝時為刺史號清嬖女傾亂而不能禁何面目復見日月飲鴆而卒者人之常分吾蒙恩居上司姦臣狡猾而不能誅傷其以忠非命親為文以祭之房玄齡進曰楊震雖當年夭枉數百年後方遇聖明停輿駐蹕親降神作作一趾玊可謂雖死猶生沒而不朽不覺助伯起幸賴欣躍於九泉之下矣伏讀天文且感且慰凡百君子焉敢不朂勵名節虔切焉於知為善之有效可以見其惓惓于忠貞之臣矣異世相望且企愚按太宗經異代名臣之墓親為文以祭之是子列子庶位者乎敬如此况凡百君貞觀十一年太宗謂侍臣曰狄人殺衛懿公赤名盡食其肉獨留其肝懿公之臣弘演呼天大哭自出其肝而內懿公之肝於其腹中曰納內讀今覔此人恐不可得特進魏徴對曰昔豫讓為智伯報讎讓智伯之臣智為去聲後同豫子之後為韓趙魏所滅伯名瑶號襄子晉智宣欲剌趙襄子簡子之後名無恤晉趙襄子執而獲之謂之曰子昔事范中行氏乎晉有范氏春秋之世公室卑六卿強名據采地更相攻伐貞定王十一年中行氏與智氏韓氏魏氏趙氏為六卿春秋之末晉氏中行氏滅之而分其地智氏魏氏趙氏韓氏共伐范智伯盡滅之子乃委質智伯不為報讎今即為智伯報讎何也讓答曰臣昔事范中行范中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之趙世家事見史記在君禮之而已亦何謂無人焉君之視臣如手足則臣視君如腹心夫子之言愚按夫子曰君使臣以禮臣事君以忠孟子曰在上之人有以感召之則在下之人興起矣太涵容孟子之言激切大概忠臣義士何代無之固所以激勸天下忠義之士而謂世無其人則宗嘉古之忠臣以為今覔此人恐不可得斯言為人臣者之分君之待我者或有未至而我之不可冝魏徴引智伯豫讓之事以為譬也雖然可不盡心乎所以事君者其貞觀十二年太宗幸蒲州隸河東今為解州因詔曰隋故鷹擊郎將楊郎將後改副郎將為鷹擊郎將將去聲隋制親侍置鷹揚府有鷹堯君素郡魏郎將及天下大亂君素所部獨全後從屈突通守河人煬帝為晉王時君素以左右從及嗣位纍遷鷹擊
