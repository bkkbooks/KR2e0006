  text: 貞觀政要卷第十戈直集論
  hash: sha256:44274d5ec20a77ed7679dc879dfa6ba46ee56de2af8769ee3ae97ded7e307a18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_010-1a}
body:
  text: 論行幸三十七論畋獵三十八論灾祥三十九論慎終四十行幸第三十七凡四章貞觀初太宗謂侍臣曰隋煬帝廣造宫室以肆行幸自西京至東都離宫别館相望道次乃至并州涿郡今涿州路隸腹裏無不悉然馳道皆廣數百步種樹以飾其傍人力不堪相聚為賊逮至末年尺土一人非復已有以此觀之廣宫室好行幸好去聲竟有何益此皆朕耳所聞目所見深以自誡故不敢輕用人力惟令平聲百姓安靜不有怨叛而已貞觀十一年太宗幸洛陽宫泛舟于積翠池顧謂侍臣曰此宫觀臺沼觀去聲並煬帝所為所謂驅役生人窮此雕麗復不能守此一都以萬人為慮好行幸不息好去聲人所不堪昔詩人云何草不黃何日不行詩大雅何草不黃篇之辭大東小東杼軸其空詩小雅大東篇之辭正謂此也遂使天下怨叛身死國滅今其宫苑盡為我有隋氏傾覆者豈惟其君無道亦由股肱無良如宇文述虞世基裴藴之徒皆隋之臣居髙官食厚祿受人委任惟行諂佞蔽塞聰明欲令其國無危令平聲不可得也司空長孫無忌奏言隋氏之亡其君則杜塞忠讜之言臣則苟欲自全左右有過初不糾舉寇盜滋蔓亦不實陳據此即不惟天道實由君臣不相匡弼太宗曰朕與卿等承其餘弊惟須弘道移風使萬世永賴矣貞觀十三年太宗謂魏徵等曰隋煬帝承文帝餘業海內殷阜若能常處關中處上聲豈有傾敗遂不顧百姓行幸無期徑往江都不納董純崔象皆隋之臣等諌諍身戮國滅為天下笑雖復帝祚長短委以玄天而福善禍淫亦由人事朕每思之若欲君臣長久國無危敗君有違失臣須極言朕聞卿等規諌縱不能當時即從再三思審必擇善而用之貞觀十二年太宗東巡狩將入洛次於顯仁宫宫苑官司多被責罰侍中魏徴進言曰陛下今幸洛州為是舊征行處為去聲後為其同庶其安定故欲加恩故老城郭之民未蒙德惠官司苑監多及罪辜或以供奉之物不精供平聲又以不為獻食此則不思止足志在奢靡既乖行幸本心何以副百姓所望隋主先命在下多作獻食獻食不多則有威罰上之所好去聲下必有甚競為無限遂至滅亡此非載籍所聞陛下目所親見為其無道故天命陛下代之當戰戰栗栗每事省納參蹤前列昭訓子孫奈何今日欲在人之下陛下若以為足今日不啻足矣啻音翅若以為不足萬倍於此亦不足也太宗大驚曰非公朕不聞此言自今已後庶幾無如此事幾平聲按通鑑係十一年上至顯仁宫宫吏以闕諸待有𬒳譴責魏徵諌曰云云上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎范氐祖禹曰富而不忘貧則能保其富矣貴而不忘賤則能保其貴矣夫以萬乘之貴四海之富而猶以為不足何哉忘其始之賤貧而欲大無窮也是以髙宗舊勞于外爰暨小人及其即位卒為賢君文王卑服即康功田功周公作書以戒成王恐其不知稼穡之艱難而驕逸也漢文有曰朕能任衣冠念不至此是以恭儉愛民惟恐煩之鳴呼其可謂有德者矣若太宗聞諌而能自省不亦賢乎又曰太宗可謂不忘戒矣覩隋之宫室而以諂謏掩蔽戒羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王之所由興也愚按有虞之制五載一巡守成周之盛六年一時巡肆覲群后大明黜陟協時月正日同律度量衡無非事也其車從至為簡省其供給至為儉約故民以其所行為幸所不行為不幸所謂吾王不遊吾何以休是也後世楊廣朱溫巡遊不息始務豐侈其飲食美麗其行宫以供給過制為賢能以置頓不備為罷軟州縣承風競為勞費於是百姓聞車馬之音見羽旄之美舉疾首蹙額而相告矣太宗親睹煬帝之禍猶以供奉不精多所責罰况其餘者乎夫古之巡幸所以徇民後之巡幸所以徇己人君欲復虞周巡守之制苟不先省其車從之數約其供給之儀未有不蹈隋梁之失者也畋獵第三十八凡五章祕書監虞世南以太宗頗好畋獵好去聲上疏諌曰臣聞秋獮冬狩蓋惟恆典獮音蘚周禮大司馬仲秋教治兵以獮田致禽以祀祊仲冬教大閲以狩田致禽以烹蒸射隼從禽備乎前誥射食亦切隼荀尹切禽也伏惟陛下因聽覽之餘辰順天道以殺伐將欲摧班碎掌親御皮軒田獵之車也窮猛獸之窟穴盡逸材之林藪夷凶翦暴以衛黎元收革擢羽用充軍器舉旗效獲式遵前古然黃屋之尊金輿之貴八方之所仰德萬國之所繫心清道而行猶戒銜橛斯蓋重慎防微為社稷也為去聲是以馬卿直諌於前司馬相如字長卿漢武帝時為郎嘗從帝獵長楊帝好自擊熊豕馳逐野獸相如上疏諌帝從之張昭變色於後張昭字子布彭城人為吳主孫權軍師權嘗乘馬射虎昭變色而諌之臣誠細微敢忘斯義且天弧星罼音畢網也所殪巳多殪音翳殺死也頒禽賜獲皇恩亦溥伏願時息獵車且韜長㦸不拒芻蕘之請降納㳙澮之流袒禓徒搏任之群下則貽範百王永光萬代太宗深嘉其言愚按傳曰春搜夏苗秋獮冬狩皆於農隙以講武也王制天子無事則嵗三田周禮大閲之制獨為詳備則畋獵固古禮也何外作禽荒見於大禹之訓而不敢盤于遊田乃為文王之德正以畋獵雖古制有因是而勞師耀武妨農害民者矣况後世萬乘之動供給之繁徴求之夥乎太宗身親行陳尅捷奏功其於遊獵固其好尚必有不遵制而病民者宜世南懇切之諌有以動上之廳矣谷那律魏州昌樂人貞觀中纍遷國子博士後遷課議大夫淹識群書禇遂良稱為九經庫為諌議大夫嘗從太宗出獵在途遇雨太宗問曰油衣若為得不漏對曰能以瓦為之必不漏矣意欲太宗弗數遊獵數音朔大被嘉納賜帛五十假加以金帶按通鑑此事係在髙宗永徽元年九月癸􅕀與此異而新舊唐書則同唐氏仲友曰谷那律淹識羣書禇遂良嘗稱為九經庫油衣瓦為不漏之對可見質直蓋淹識之士難乎質直故三益之友得一巳善而況兼之者乎愚按家語記孔子之言曰忠臣之諌君有五義焉其五曰諷諌惟度主以行之吾從其諷諌乎夫所以諷諌者假他事引援而諌者也谷那律以儒學之臣居諌議之職以瓦為衣之對雖過於質直其諷諌之謂乎太宗悅其直而賞賚之是亦從諫之美也貞觀十一年太宗謂侍臣曰朕昨往懷州今懷慶路隸腹裏有上封事者云何為恆差山東衆丁於苑內營造即日徭役似不下隋時懷洛以東殘人不堪其命而田獵猶數音朔驕逸之主也今者復來懷州田獵忠諌不復至洛陽矣復音缶四時搜田搜音搜春曰搜夏曰苗秋日獮冬曰狩既是帝王常禮今日懷州秋毫不干於百姓凡上書諌正自有常準臣貴有詞主貴能改如斯詆毁有似呪詛侍中魏徴奏稱國家開直言之路所以上封事者尤多陛下親自披閲或冀臣言可取所以僥幸之士得肆其醜臣諌其君甚須折衷從容諷諌從即容切漢元帝名奭嘗以酎祭宗廟酎音紂三重釀酒也味厚故以薦宗廟出便門御樓船御史大夫薛廣德字長卿沛郡人當乘輿免冠曰宜從橋陛下不聽臣言臣自刎以頸血汙車輪汙去聲陛下不入廟矣元帝不恱光祿卿張猛進曰臣聞主聖臣直乘船危乘平聲後同就橋安聖主不乘危廣德言可聽元帝曰曉人不當如是耶乃從橋以此而言張猛可謂直臣諌君也太宗大悅愚按魏徴不取廣德之直言而取張猛之直諌不過順太宗之意而言耳蓋嘗聞先儒之言曰諌者之委曲君德未信於人也諌者之剴切君德巳信於人也其遜其忤言者之得失則二在人主為進德之驗則一而已由此觀之諌書詆毁有似詛呪此正太宗君德信於人之驗也若以張猛之諷諌為是則是以漢元之昏庸期太宗耳豈責難之道乎貞觀十四年太宗幸同州今仍舊隸陜西沙苑親格猛獸復晨出夜還音旋後同特進魏徴奏言臣聞書美文王不敢盤于遊田周書曰文王不敢􅐻于遊田以庶邦惟正之供傳述虞針稱夷羿以為戒傳去聲左傳魏綘告晉矦曰昔虞人之針曰在帝夷羿冒于原獸虞針如是可不懲乎昔漢文臨峻坂欲馳下袁盎楚人漢文帝時為中郎將攬㘘曰聖主不乘危乘平聲不徼幸今陛下騁六飛馬名馳不測之山如有馬驚車敗陛下縱欲自輕奈髙廟何文帝從霸陵上欲西馳下峻坂袁盎諌帝曰將軍怯邪盎曰臣聞千金之子不垂堂百金之子不倚衡云云帝乃止孝武好格猛獸好去聲後同相如進諌力稱烏獲秦武王力士舉龍文鼎者捷言慶忌吳王僚之子射能捷矢人誠有之獸亦宜然猝遇逸材之獸駭不存之地雖烏獲逄蒙之伎逄音龐逄蒙古之善射者不得用而枯木朽株盡為難矣雖萬全而無患然而本非天子所宜事見首章注孝元帝郊泰畤郊祀之壇曰畤因留射獵薛廣德字長卿沛郡人時為長信少府御史大大稱竊見關東困極百姓離災今日撞亡秦之鍾歌鄭衛之樂士卒暴露從官勞倦從去聲欲安宗廟社稷何慿河暴虎未之戒也臣竊思此數帝心豈木石獨不好馳騁之樂音洛後同而割情屈巳從臣下之言者志存為國為去聲後同不為身也臣伏聞車駕近出親格猛獸晨往夜還以萬乘之尊暗行荒野踐深林􅍱豐草甚非萬全之計願陛下割私情之娛罷格獸之樂上為宗廟社稷下慰群寮兆庶太宗曰昨日之事偶屬塵昏非故然也自今深用為誡愚按魏徵諌獵之辭援古監今惓惓忠篤比虞世南奏疏尤為墾至切到足以警動其君之聽塵皆之語太宗烏得不為之感悟哉若魏徴者可謂能引君於道矣貞觀十四年冬十月太宗將幸櫟陽櫟音藥櫟陽今為咸寧縣屬奉元路遊畋縣丞劉仁軌字正則汴州人初為陳倉尉部人魯寧為折衝都尉豪縱犯法縣莫敢屈仁軌榜殺之太宗召詰責仁軌曰寧辱臣臣故殺之帝以為剛直擢咸陽丞纍遷給事中武后時拜僕射以收穫未畢非人君順動之時詣行所上表切諫太宗遂罷獵擢拜仁軌新安令新安縣名今仍舊隸河南府路按史傳太宗校獵同州仁軌諌曰今兹澍澤霑足百穀熾茂收才十二常日贅調巳有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使埸圃畢勞陛下六飛徐驅公私交泰上璽書褒納拜新安令愚按劉仁軌一縣丞耳而能效一言之忠動萬乘之聽其忠君愛民之心有侍從之臣所未能者可不謂難乎哉蓋仁軌嘗為陳倉尉太宗以其剛直擢咸陽丞則其受知於太宗有由來矣然非太宗有從諌之美樂善之誠則仁軌雖有剛直之操將安所施哉適足以獲罪而已矣仁軌官由州縣而致宰相善致聲譽得吏民歡心為史傳所稱美出宰百里者可不知所效法邪災祥第三十九凡四章貞觀六年太宗謂侍臣曰朕比見衆議比音鼻以祥瑞為美事頻有表賀慶如朕本心但使天下太平家給人足雖無祥瑞亦可比德於堯舜若百姓不足夷狄內侵縱有芝草遍街衢鳯凰巢苑囿亦何異於桀紂嘗聞石勒時石勒上黨胸奴人晉元帝時據襄國稱帝是為後趙有郡吏燃連理木煮白雉肉喫豈得稱為明主耶又隋文帝深愛祥瑞遣祕書監王劭著衣冠在朝堂對考使去聲焚香讀皇隋感瑞經隋文帝好機祥小數王劭言上受命符瑞甚衆又採歌謡圖䜟佛經文字曲加誣飾撰皇隋靈感志三十卷上令宣示天下劭集諸州朝集使盥手焚香閉目讀之曲折有聲如歌詠經旬朔始遍上益喜賞賜優洽舊嘗見傳說此事實以為可笑夫為人君夫音扶當須至公理天下以得萬姓之歡心若堯舜在上百姓敬之如天地愛之如父母動作興事人皆樂之樂音洛發號施令施平聲人皆恱之此是大祥瑞也自此後諸州所有祥瑞並不用申奏按通鑑係貞觀二年又曰嘗有白鵲搆巢於寢殿槐上合歡如腰鼓左右稱賀上曰我嘗笑隋煬帝好祥瑞瑞在得賢此何足賀命毁其巢於野外愚按聖人之作春秋也祥瑞不書惟災異書豈無意哉夫春秋二百四十二年之間豈無祥瑞而不書而有年大有年之書兩見於經蓋聖人特筆也太宗以聰明之資克勤于政不以祥瑞為祥瑞而以堯舜之政化為大祥瑞豈無見而然哉嘗觀文公朱子通鑑綱目貞觀一代皆不見祥瑞之書惟貞觀四年以大有年書録其外户不閉家給人足斗米三錢之美斯祥瑞之大者歟然則太宗之為此言也非苟言之實允蹈之矣貞觀八年隴右山崩大蛇屢見音現後同山東及江淮多大水太宗以問侍臣祕書監虞世南對曰春秋時梁山崩梁山晉地晉矦召伯宗而問焉晉侯景公名孺伯宗晉大夫對曰國主山川故山崩川竭君為之不舉樂降服乘縵乘平聲縵音漫謂乘車之無飾文者祝幣以禮焉梁山晉所主也晉侯從之故得無害事見左傳成公五年漢文帝元年齊楚地二十九山同日崩水大出令郡國無來獻令平聲施惠於天下施平聲逺近歡洽亦不為灾後漢靈帝時青蛇見御座晉惠帝時大蛇長三百步見齊地經市入朝按蛇宜在草野而入市朝所以為怪耳今蛇見山澤蓋深山大澤必有龍蛇亦不足怪又山東之雨雖則其常然隂潜過久恐有冤獄宜斷省繫囚庶或當天意且妖不勝德修德可以銷變太宗以為然因遣使者使去聲賑恤飢餒申理冤訟多所原宥貞觀八年有彗星見于南方彗徐醉切見音現後同彗星妖星也其狀如帚長六丈一作六尺經百餘日乃滅太宗謂侍臣曰天見彗星由朕之不德政有虧失是何妖也虞世南對曰昔齊景公名杵臼時彗星見公問晏子晏嬰也晏子對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星為公戒耳景公懼而修德後十六日而星沒十六一作十三陛下若德政不修雖麟鳯數見數音朔終是無益但使朝無闕政百姓安樂音洛雖有災變何損於德願陛下勿以功髙古人而自矜大勿以太平漸久而自驕逸若能終始如一彗見未足為憂太宗曰吾之理國良無景公之過但朕年十八便為經綸王業便為之為去聲後同北剪劉武周西平薛舉東擒竇建德王世充二十四而天下定二十九而居大位四夷降伏降音杭海內乂安自謂古來英雄撥亂之主無見及者頗有自矜之意此吾之過也上天見變良為是乎秦始皇平六國隋煬帝富有四海既驕且逸一朝而敗吾亦何得自驕也言念於此不覺惕焉震懼魏徴進曰臣聞自古帝王未有無災變者但能修德災變自銷陛下因有天變遂能戒懼反覆思量平聲深自尅責雖有此變必不為災也唐氏仲友曰世南對山壞蛇見大水恐有冤獄枉繫亦未足以應天變矣詩曰維虺維蛇女子之祥唐之女禍其兆先見於此世南名博學非不知此顧太宗無女寵之溺無迹可言然獨不能援詩以為說取證於漢靈晉惠乎乃曰蛇見山澤適其所居以世南之忠直無以發太宗警懼之意惜哉又曰世南論彗星戒驕矜此最中太宗之病較諸省録纍囚之論大小殊矣愚按昔劉向五行傅某事失則某咎徵應說者以為鑿春秋所書災異傅者亦推迹未來之事應之說者以為拘且妖由人興天事恆象人君惟當恐懼修省以銷其變固難盡信淫巫瞽史之所推測也夫蛇虺固女子之祥也春秋之世晉有蛇自泉宫出鄭則內蛇與外蛇鬪於門之外固不見為女禍也唐髙宗昏惑溺愛遂啓女后專政卒應大蛇之妖彗所以除舊布新也春秋之世魯有星孛齊有彗星固不見有所除布也唐武后肆其凶毒幾易唐祚卒應彗星之異茲二者皆見於貞觀之八年極盛之時也天心仁愛警戒之意早已見矣天人之際良可畏哉貞觀十一年大雨榖水溢衝洛城門入洛陽宫平地五尺毁宫寺十九所漂七百餘家太宗謂侍臣曰朕之不德皇天降災將由視聽弗明刑罰失度遂使隂陽舛謬雨水乖常矜物罪已載懷憂惕朕又何情獨甘滋味可令尚食令平聲尚食掌御膳之官斷肉料進𬞞食文武百官各上封事極言得失中書侍郎岑文本上封事曰臣聞開撥亂之業其功既難守已成之基其道不易以鼓切故居安思危所以定其業也有始有卒子聿勿所以崇其基也今雖億兆乂安方隅寧謐音密既承喪亂之後又接凋弊之餘户口减損尚多田疇墾闢猶少覆燾之恩著矣而瘡痍未復德教之風被矣而資産屢空去聲是以古人譬之種樹年祀綿逺則枝葉扶踈若種之日淺根本未固雖壅之以黑墳上聲暖之以春日一人搖之必致枯槁今之百姓頗類於此常加含養則日就滋息暫有征役則隨日凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道人叛之故可畏孔安國釋虞書之辭仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日慎一日者良為此也為去聲伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆在念明選舉慎賞罰進賢才退不肖聞過即改從諌如流為善在於不疑出令期於必信頥神養性省遊畋之娛去奢從儉去上聲減工役之費務靜方內而不求闢土載櫜弓矢而不忘武備櫜音臯藏也凡此數者雖為國之恆道陛下之所常行臣之愚昧惟願陛下思而不怠則至道之美與三五比隆三五三皇五帝也億載之祚與天地長久雖使桑榖為妖史記商亳為祥桑榖共生於朝一暮大拱帝大戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其修德大戊從之祥桑枯死而去龍蛇作孽五行傳曰皇之不極是為不建厥咎眊厥極弱時則有龍蛇之孽雉雊於鼎耳史記商紀武丁祭成湯明日有飛雉登鼎耳而詬武丁懼祖已曰王勿憂先修政事武丁從之殷道復興石言於晉地左傳昭公八年春石言於晉猶當轉禍為福變災為祥況雨水之患雨水一作水旱隂陽恆理豈可謂天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輒陳狂瞽伏待斧鉞太宗深納其言養當作食出文子愚按降水警豫帝舜所以畏天省已也六事自責成湯所以反躬致戒也太宗之言雖未能一出於誠亦庶幾乎舜湯之遺意矣惜乎岑文本之論皆非所以戒其畏天憂民之心而勉其側身修行之實也其曰隂陽恆理豈繫聖心不幾於傲忽天戒乎豈君臣相警之道哉慎終第四十凡七章貞觀五年太宗謂侍臣曰自古帝王亦不能常化假令內安令平聲必有外擾當今逺夷率服百穀豐稔盜賊不作內外寧靜此非朕一人之力實由公等共相匡輔然安不忘危理不忘亂雖知今日無事亦須思其終始常得如此始是可貴也魏徴對曰自古已來元首股肱不能備具或時君稱聖臣即不賢或遇賢臣即無聖主今陛下明所以致理向若直有賢臣而君不思化亦無所益天下今雖太平臣等猶未以為喜惟願陛下居安思危孜孜不怠耳愚按昔帝舜之作歌曰股肱喜哉元首起哉百工熙哉臯陶乃𢋫載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事隳哉釋者謂舜之意以人臣樂於趍事赴功則人君之治為之興起而百官之功皆廣也臯陶之意以為君明則臣良而衆事皆安所以勸之也君行臣職則臣下懈怠而萬事廢所以戒之也虞廷君臣之相與責難者如此雍熙之治所以為不可及也太宗之告侍臣謂當今太平非朕一人之力皆由公等共輔須思終始如一斯言也其帝舜作歌之意乎魏徵之對則曰陛下聖明所以致理若有賢臣而君不思化亦為無益是猶臯陶勸舜之意也又曰今雖太平臣未以為喜惟願陛下居安思危孜孜不怠亦猶臯陶戒舜之意也太宗能責難於其臣魏徵亦能責難於其君君臣之相責難者如此有唐虞之遺風焉是故有唐之治雖未能上躋時雍之美而貞觀之盛可謂三代而下之所罕見者矣貞觀六年太宗謂侍臣曰自古人君為善者多不能堅守其事漢髙祖泗上一亭長耳長音掌初能拯危誅暴以成帝業然更延十數年縱逸之敗亦不可保何以知之孝惠為嫡嗣之重溫恭仁孝而髙帝惑於愛姬之子欲行廢立見師傳篇注蕭何韓信功業既髙蕭既妄繫蕭何沛人漢丞相封鄼侯嘗為民請曰長安地狹上林中多空地願令民得入田髙祖怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫數日因王衛尉之言赦出之韓亦濫黜黜當作誅韓信淮隂人佐漢髙祖取天下封楚王有告信欲反髙祖乃詐遊雲夢縳信至洛陽赦為淮隂侯由此怨望後復有言信反於吕后者后令蕭何紿信入后使武士縳信斬之夷信三族自餘功臣黥布之輩懼而不安至於反逆黥布姓英名布嘗坐法黥漢髙祖封淮南王及韓信彭越之誅隂聚兵候伺警急中大夫賁赫詣長安告布反髙祖自將兵擊之遂殺布滅之君臣父子之間悖謬若此豈非難保之明驗也朕所以不敢恃天下之安每思危亡以自戒懼用保其終愚按太宗言漢祖創業之君而廢嫡立庶濫誅功臣斯言誠是也太宗能保全功臣無濫誅之失過漢髙逺矣然不能正承乾之惡而於諸子之定分亦牽於愛而有不能自克者豈知人之明而自知之蔽耶貞觀九年太宗謂公卿曰朕端拱無為四夷咸服豈朕一人之所致實賴諸公之力耳當思善始令終永固鴻業子子孫孫遞相輔翼使豐功厚利施於來葉施平聲令數百年後令平聲讀我國史鴻勳茂業粲然可觀豈惟稱隆周炎漢及建武光武年號永乎明帝年號故事而已哉房玄齡因進曰陛下撝挹之志推功群下致理升平本關聖德臣下何力之有惟願陛下有始有卒子聿切則天下永賴太宗又曰朕觀古先撥亂之主皆年踰四十惟光武年三十三但朕年十八便舉兵年二十四定天下年二十九升為天子此則武勝於古也少從戎旅少去聲不暇讀書貞觀以來手不釋卷知風化之本見政理之源行之數年天下大理而風移俗變子孝臣忠此又文過於古也昔周秦已降戎狄內侵今戎狄稽顙皆為臣妾此又懷逺勝古也此三者朕何德以堪之既有此功業何得不善始慎終耶愚按詩書所載聖君賢相之所以保治於雍熙泰和之時者固幸功業之克成未嘗以功業而自足也太宗謂欲使豐功厚利施於永久鴻勳盛業粲然可觀不使後世惟稱隆周炎漢志則髙矣然炎漢可企而及也隆周豈止於若是哉倬彼雲漢為章於天制之為禮樂布之為法度此文王之文也不知太宗之所謂文果能勝乎無競維烈撫弱耆昧功成而載戢于戈載櫜弓矢此武王之武也不知太宗之所謂武果能勝乎大邦畏其力小邦懷其德華夏蠻貊罔不率俾由是而惠此中國以綏四方此文武之懷逺也不知太宗之所謂懷逺又果能勝乎愚然後知太宗矜功伐善意出於中心而善始慎終之語不過虛言也玄齡於此能奬其所巳至而不能勉其所未至惜哉若後章魏徵之對則善矣貞觀十二年太宗謂侍臣曰朕讀書見前王善事皆力行而不倦其所任用公輩數人誠以為賢然致理比於三五之代猶為不逮何也魏徴對曰今四夷賔服天下無事誠曠古所未有然自古帝王初即位者皆欲勵精為政比迹於堯舜及其安樂也樂音洛則驕奢放逸莫能終其善人臣初見任用者皆欲匡主濟時追縱於稷契音泄及其富貴也則思苟全官爵莫能盡其忠節若使君臣常無懈怠各保其終則天下無憂不理自可超邁前古也太宗曰誠如卿言愚按太宗致理不逮三五之言所以責難於其臣也魏徴之對曲盡人君放逸之端人臣懷祿之弊誠可為上下之針蓋人君固在於慎終如始而人臣尤當始終如一也嘗觀貞觀諸名臣久於其位者雖於大節無所虧然於格非之道無聞焉母乃以成功難居至理無盡姑保其福祿榮名歟耻君不及堯舜者何如人哉魏徴之言厥有㫖矣貞觀十三年魏徵恐太宗不能克終儉約近嵗頗好奢縱好去聲後同上疏諌曰臣觀自古帝王受圖定鼎皆欲傳之萬代貽厥孫謀故其垂拱巖廊布政天下其語道也必先淳朴而抑浮華其論人也必貴忠良而鄙邪佞言制度也則絶奢靡而崇儉約談物産也則重榖帛而賤珍竒然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乘之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於嗜欲故也語曰非知之難行之惟難非行之難終之斯難所言信矣伏惟陛下年甫弱冠去聲大拯橫流橫去聲削平區宇肇開帝業貞觀之初時方克壯抑損嗜欲躬行節儉內外康寧遂臻至治論功則湯武不足方語德則堯舜未為逺臣自擢居左右十有餘年每侍帷幄屢奉明㫖常許仁義之道守之而不失儉約之志終始而不渝一言興邦斯之謂也德音在耳敢忘之乎而頃年已來稍乖曩志敦朴之理漸不克終謹以所聞列之如左陛下貞觀之初無為無欲清靜之化逺被遐荒考之於今其風漸墜聽言則逺超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬漢文帝時有獻千里馬者詔還其馬與道里費晉武焚雉頭之裘晉武帝時太醫司馬程據獻雉頭裘帝以竒技異服典禮所禁焚之于殿前今則求駿馬於萬里市珍竒於域外取怪於道路見輕於戎狄此其漸不克終一也昔子貢問理人於孔子孔子曰凛乎若朽索之馭六馬子貢曰何其畏哉子曰不以道遵之則吾讎也若何其無畏家語之辭故書曰民惟邦本本固邦寧為人上者奈何不敬書五子之歌陛下貞觀之始視人如傷恤其勤勞愛民猶子每存簡約無所營為頃年已來意在奢縱忽忘卑儉輕用人力乃云百姓無事則驕逸勞役則易使易以豉切後同自古以來未有由百姓逸樂音洛後同而致傾敗者也何有逆畏其驕逸而故欲勞役者哉恐非興邦之至言豈安人之長算此其漸不克終二也陛下貞觀之初損已以利物至於今日縱欲以勞人卑儉之迹嵗改驕侈之情日異雖憂人之言不絶於口而樂身之事實切於心或時欲有所營慮人致諌乃云若不為此不便我身人臣之情何可復爭讀曰諍此直意在杜諌者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚家語之辭與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子踈斥小人今則不然輕䙝小人䙝音泄禮重君子重君子也敬而逺之逺音援後同輕小人也狎而近之近之則不見其非逺之則莫知其是莫知其是則不間而自踈間去聲後同不見其非則有時而自昵昵近小人非致理之道踈逺君子豈興邦之義此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物人乃足犬馬非其土性不畜許六切珍禽竒獸弗育於國周書旅獒之辭陛下貞觀之初動遵堯舜捐金抵璧反朴還淳頃年以來好尚竒異好去聲後同難得之貨無逺不臻珍玩之作無時能止上好奢靡而望下敦朴未之有也末作滋興而求豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渴善人所舉信而任之取其所長恆恐不及近嵗已來由心好惡烏去聲或衆善舉而用之或一人毁而棄之或積年任而用之或一朝疑而逺之夫行有素履夫音扶行去聲後同事有成跡所毀之人未必可信於所舉積年之行不應頓失於一朝應平聲朝音昭君子之懷蹈仁義而弘大德小人之性好讒佞以為身謀陛下不審察其根源而輕為之臧否部鄙切是使守道者日踈干求者日進所以人思苟免莫能盡力此其漸不克終六也陛下初登大位髙居深視事惟清靜心無嗜欲內除畢弋之物畢網也弋以生絲繫矢而射也外絶畋獵之源數載之後不能固志雖無十旬之逸夏書太康盤逰無度畋于有洛之表十旬弗反或過三驅之禮遂使盤逰之娛見譏於百姓鷹犬之貢逺及於四夷或時教習之處道路遙逺侵晨而出入夜方還以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠孔子對魯定公之辭然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上逹咸思竭力心無所隱頃年已來多所忽略或外官充使去聲奏事入朝思覩闕庭將陳所見欲言則顔色不接欲請又恩禮不加間因所短詰其細過雖有聰辨之略莫能申其忠欵而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縱長音掌後同樂不可極志不可滿禮曲禮篇之辭四者前王所以致福通賢以為深誡陛下貞觀之初孜孜不怠屈已從人恆若不足頃年已來微有矜放恃功業之大意蔑前王負聖智之明心輕當代此傲之長也欲有所為皆取遂意縱或抑情從諌終是不能忘懷此欲之縱也志在嬉逰情無厭倦雖未全妨政事不復專心治道此樂將極也率土乂安四夷欵服仍逺勞士馬問罪遐裔此志將滿也親狎者阿㫖而不肯言踈逺者畏威而莫敢諌積而不已將虧聖德此其漸不克終九也昔陶唐成湯之時非無災患而稱其聖德者以其有始有終無為無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿內户口並就關外携負老幼來往數千曽無一戶逃亡一人怨苦此誠由識陛下矝育之懷所以至死無攜二頃年已來疲於徭役關中之人勞弊尤甚雜匠之徒下日悉留和雇正兵之輩上畨多别驅使和市之物不絶於鄉閭遞送之夫相繼於道路既有所弊易為驚擾脫因水旱榖麥不收恐百姓之心不能如前日之寧帖此其漸不克終十也臣聞禍福無門唯人所召人無釁焉妖不妄作伏惟陛下統天御寓十有三年道洽寰中威加海外年榖豐稔禮教聿興比屋踰於可封比音鼻菽粟同於水火暨乎今嵗天災流行炎氣致旱乃逺被於郡國凶醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下驚懼之辰憂勤之日也若見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗德者思而改之與物更新更平聲易人視聽則寶祚無疆普天幸甚何禍敗之有乎然則社稷安危國家理亂在於一人而已當今太平之基既崇極天之峻九仭之積猶虧一簣之功書曰為山九仞功虧一簣言中道而止則前功盡棄也千載休期時難再得明主可為而不為微臣所以鬱結而長歎者也臣誠愚鄙不逹事機略舉所見十條輒以上聞聖聽伏願陛下採臣狂瞽之言參以芻蕘之議兾千慮一得衮職有𥙷詩大雅蒸民之篇曰衮職有闕維仲山甫𥙷之則死日生年甘從斧鉞疏奏太宗謂徵曰人臣事主順㫖甚易忤情尤難公作朕耳目股肱常論思獻納朕今聞過能改庶幾克終善事幾平聲若違此言更何顔與公相見復欲何方以理天下自得公疏反覆研尋深覺詞強理直遂列為屏障朝夕瞻仰又録付史司兾千載之下識君臣之義乃賜徵黃金十斤廄馬二匹按史傳十三年阿史那結社率作亂雲陽石然自冬至五月不雨故徵上此疏唐氏仲友曰人君善否之分其始毫釐其未千里論太宗貞觀初之所為皆可以為三代之令主至漸不克終則凡三代之辟王其極至於亂者不過乎此可不畏哉徵有憂之極言至論數其十漸有伊傅周召戒其君大禹訓其後世之意非慮之至忠之盡安能及此使太宗聞過願改以終善道以保貞觀之隆卒髣佛乎三代之令主皆徴力也史以三代遺直許徴於十漸見之葉氏適曰太宗聞十漸之戒令録付史官使萬世知有君臣之義至徴録前後諌爭語於史官帝都不說夫十漸之戒徵之所録多不過此而太宗不說何也蓋録在徵則天下惟知徴之能諌若録在太宗則天下將不止知太宗之能聽諌且知太宗眷眷不忘之意凡此皆太宗好名處愚按魏徴十不克終之疏正貞觀之中年其間所云貞觀之𥘉如此其善近嵗以來如此其未善其善也可以為三代之令主其未善也無異於後世之辟王何太宗一人之身始終之相逺如此哉蓋其始之善者天資之過人也終之未善者學力之不繼也昔者周之成王即位之初惑於二叔之言不能明周公之德其天資之美有不能如太宗者矣及其終也敬迓天威無敢昏逾至於死生之際炯然不亂此豈太宗之所及哉愚然後知周公輔導之功為不可及而魏徵格君之道猶有所不足也嗚呼以太宗之聰明猶不能保其終而况天資之未逮者其可不孶孶而務學也哉貞觀十四年太宗謂侍臣曰平足天下朕雖有其事守之失圖功業亦復難保秦始皇初亦平六國據有四海及末年不能善守實可為誡公等宜念公忘私則榮名髙位可以克終其美魏徴對曰臣聞之戰勝易以䜴切守勝難陛下深思逺慮安不忘危功業既彰德教復洽恆以此為政宗社無由傾敗矣范氏祖禹曰書曰后克艱厥后臣克艱厥臣又曰無輕民事惟難孔子曰為君難夫知所難而後可以有為也傳曰君以為易則其難也將至矣君以為難則其易也將至矣太宗知守之之難所以能有終也愚按魏徵之於太宗凡三告以守天下之難矣居安忘危之言始終弗渝其憂治危明之心為何如哉孟子曰責難於君謂之恭徵之謂也貞觀十六年太宗問魏徴曰觀近古帝王有傅位十代者有一代兩代者亦有身得身失者朕所以常懷憂懼或恐撫養生民不得其所或恐心生驕逸喜怒過度然不自知卿可為朕言之為去聲當以為楷則徴對曰嗜欲喜怒之情賢愚皆同賢者能節之不使過度愚者縱之多至失所陛下聖德玄逺居安思危伏願陛下常能自制以保克終之美則萬代永賴愚按太宗問運祚長短之殊魏徴對以自制克終之美其論可謂的矣然嘗論之古昔聖賢著書立言其托始終之際皆有深意吳氏之著是編也始之以太宗問魏徴正身之道終之以魏徵對太宗克終之言其意之所存雖不可知以事實考之則二者皆太宗之所不足也何也太宗削除禍亂身致升平屈已而納諌任賢而使能恭儉節用寬仁而愛人三代而下之君絶無而僅有者也然於君臣父子兄弟夫婦之間皆有慚德豈非正身之道有所不足歟太宗能納諌矣而晚年有仆碑之失能慎刑矣而晚年有君羡之誅能息兵矣復有髙麗西域之師能莭用矣復有飛山翠微之作豈非克終之道有所不足歟合二者而論之則太宗所以不能克終者由其不能正身也然則吳氏之書豈非始言其本而終言其效歟貞觀政要卷第十
