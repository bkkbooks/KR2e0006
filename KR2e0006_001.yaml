  text: 貞觀政要卷第一
  hash: sha256:41e0644ba19b1b15a88d13aed2efaef43d9c756dcd4c4548cd914a42fe55874c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_001-1a}
body:
  text: 論君道一論政體二君道第一章凡五貞觀初太宗謂侍臣曰為君之道必須先存百姓若損百姓以奉其身猶割股以啖腹音淡食也股一作脛啖腹飽而身斃若安天下必須先正其身未有身正而影曲上理而下亂者朕每思傷其身者不在外物皆由嗜欲以成其禍若耽嗜滋味玩恱聲色所欲既多所損亦大既妨政事又擾生人作損擾亦且復出一非理之言萬姓為之解體怨讟既作痛怨也讟音瀆離叛亦興朕每思此不敢縱逸諌議大夫侍從贊相之職唐制掌諌諭得失魏徴任賢詳見篇對曰古者聖哲之主皆亦近取諸身故能逺體諸物昔楚聘詹何之後隱于釣楚莊王聞而異之召而楚春秋時國名僣稱王詹何楚詹尹列子問焉出問其理國之要詹何對以修身之術楚王又問理國何如詹何曰未聞身理而國亂者陛下所明實同古義國國依于民刻民以奉君猶割肉以充腹按通鑑武德九年太宗謂侍臣曰君依于由身出夫欲盛則費廣費廣則賦重賦重則民愁民腹飽而身斃君富而國亡故人君之患不自外來常敢縱欲也與此章辭異而旨同故附見于此愁則國危國危則君喪矣朕嘗以此思之故不古者二帝三王之治未有不先正其身而能正愚按中庸九經修身為先大學八目修身為本舜必帝德罔愆而後能萬邦咸寧禹必祗台德天下者也故堯必克明峻德而後能黎民時雍表正萬邦武王必建其有極而後能作民父母先而後能朔南暨聲教湯必懋昭大德而後能也身者源也天下者流也未有源清而流濁者蓋身者表也天下者景也未有表正而景曲者刑措宣帝之綜核名實光武之恭勤儉約明帝也後之人君若漢髙之約法除苛文景之幾致民之具蓋亦有合乎先王者矣特其本原之地之明察善斷孝章之寬厚長者其愛民之心治一者三代以上之治也身心與家國天下為二有未純焉者爾由此觀之身心與家國天下為亂之後芟除群雄拓定四海一旦君臨南靣首者三代以下之治也唐太宗以英武之姿當大而影曲者斯言也非三代以下之言也魏徴斯告其群臣曰安天下必須先正其身未有身正闡揚聖學之奧于以發明心術之微可也顧乃時正當告之以中庸之九經大學之八目于以得聞一帝三王之學必將終始如一而無晚年以楚王詹何之言言之何其逺哉使太宗斯時治而已邪惜乎太宗能言之而不能行之魏徴之悔內外如一而無宫闈之愧矣豈特貞觀之于開卷之首其有所取也夫抑有所感也夫能贊美之而不能發明之也吳氏編是書置此貞觀二年太宗問魏徴曰何謂為明君暗君徴曰君之所以明者兼聽也其所以暗者偏信也詩云先人有言詢于芻蕘雖賤而不棄也人詩作民蓋避太宗詩大雅板篇之辭芻蕘採薪之人言民他皆類此諱故以人代昔唐虞之理理本作治蓋避髙宗諱故堯曰陶唐氏舜曰有虞氏他皆類此以理代治闢四門明四目逹四聰謂開四方之門以虞書史贊舜之辭視聽以決天下之壅蔽也來天下之賢俊廣四方之是以聖無不照故共鯀之徒不能塞也族官也鯀崇伯名夏禹父也共工淫辟共音恭鯀音衮共工唐虞官名古之世洲殛鯀于羽山塞猶蔽也鯀治水無功舜流共工于幽靖言庸回不能惑也書虞也謂靜則能言用之則不然也曰靜言庸違靖與靜同回亦違秦二世則隱藏其身捐隔踈賤而偏信趙髙及天下潰叛不得聞也貟棄捐音秦宦者二世用之為相二世常居禁中公卿希得朝也秦二世始皇少子名胡亥嗣位號二世皇帝趙髙世後為髙所弒見盜賊益多二梁武帝偏信朱異而侯景舉兵向闕竟不得知也王受齊禪國號梁朱異仕梁為散騎常異羊吏切梁武帝姓蕭名衍仕齊封梁納景為大將軍及景反叛朝野共怨異武帝後為景侍矦景東魏臣叛歸魏復請歸梁武帝從朱異之議而死所逼餓隋煬帝偏信虞世基而諸賊攻城剽邑亦不得知也虞世基仕隋為內史侍郎世基以帝惡聞盜剽音漂劫也隋煬帝姓楊名廣文帝次子也縣皆弗之知煬帝後為宇文化及等所弒賊告者皆不以實聞由是盜賊競起陷沒郡是故人君兼聽納下則貴臣不得壅蔽而下情必得上通也太宗甚善其言其要矣夫聖人以天下為耳目故聰明庸君以近范氏祖禹曰善哉太宗之問魏徴之對也可謂得惟在于逺近大小而已矣習為耳目故暗蔽明暗之分浸潤膚受行此魏徴論聽納任用之本唐氏仲友曰兼聽則公正忠讜進偏信則者時兹言固簡而當矣然兼聽偏信此自外至愚按太宗問明君暗君魏徴謂兼聽者明偏信之聰明乃其中扄澄徹如鑑之空如衡之平妍者也明之與暗又有存于中者焉堯之欽明舜明暗之所分蓋偏信固易于蔽而兼聽亦有所媸輕重隨物而見者也彼昧者昏者反是此又者欲進于堯舜之明當自格物致知之學始當擇惟明足以燭理何施而不可哉君天下貞觀十年太宗謂侍臣曰帝王之業草創與守成孰難守文後同守成亦作尚書左僕射僕射並同僕射秦官古者尚音常射音夜凡言尚書省置左右僕射掌統理六官為令之二令闕則總省重武官有主射以督課取其領事之號也唐制尚書職也事宰相房玄齡賢篇詳見任對曰天地草昧曰天造草昧昜屯卦彖傅冥晦也草雜亂昧群雄競起攻破乃降切下江戰勝乃尅由此言之草創為難魏徴對曰帝王之起必承衰亂覆彼昏狡百姓樂推洛樂音四海歸命天授人與乃不為難然既得之後志趣驕逸百姓欲靜而徭役不休百姓凋殘而侈務不息國之衰弊恆由此起切常也恆胡登以斯而言守成則難太宗曰玄齡昔從我定天下備嘗艱苦出萬死而遇一生所以見草創之難也魏徴與我安天下慮生驕逸之端必踐危亡之地所以見守成之難也今草創之難既已往矣守成之難者當思與公等慎之拜曰陛下及此言四海之福也按通鑑係十二年又云玄齡等者多周公曰相小人厥父母勤勞稼穡厥子乃不范氏祖禹曰自古創業而失之者寡守成而失之非特創業之君守成為難其後嗣守成尤難也知稼穡之艱難故禍亂未嘗不生于安逸也然難雖明者亦有所忽周宣王六月出師不以為難林氏之竒曰創業之難雖庸人亦知其然守成之聽從諌若轉圜之易而末年欲易太子以聽言為而末年庭燎鄉晨以視朝為不易漢髙帝好謀能之言太宗之世魏徴有失于安逸之戒甚難是以文帝之世賈生有厝火積薪本末若言創業易太宗身更其難此不可罔若言唐氏仲友曰太宗之問禍福之機房魏之對更為矣太宗悟二臣之意加謹于守成之難明哉守成易太宗必謂難者吾猶身濟之怠忽生漢髙創業者也而不及守成成康文景守成者愚按自古人君創業守成鮮有身兼之者周武位十三年兼創業守成之事者也然以書傳考也而不及創業惟神禹在帝位十年成湯在帝湯不以升陑伐桀為難而以時忱克終為難豈之禹不以治水敷土為難而以本固邦寧為難進德守成順境也易以喪德太宗身兼創業守創業果易而守成果難乎蓋創業逆境也可以未能者為懼其致貞觀之治也宜哉成之事不以其已能者自滿而以其貞觀十一年特進者賜位特進位三公下唐制因之漢世諸矦功德優盛朝廷所敬異魏徴上疏曰臣觀自古受圖膺運繼體守文控御英雄傑一作南面臨下而聽天下嚮明而治易説卦傳曰聖人南面皆欲配厚德于天地齊髙明于日月本支百世傳祚無窮位也祚祿然而克終者鮮也後同上聲少敗亡相繼其故何哉所以求之失其道也殷鑒不逺所當鑒者近在夏桀之世也詩大雅蕩篇之辭言啇紂之可得而言昔在有隋統一寰宇甲兵強鋭盛一作三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安去聲惡烏不欲社稷之長久故行桀虐以就滅亡哉之君湯伐之而死桀名履癸夏末淫暴恃其富強不虞後患驅天下以徔欲罄萬物而自奉採域中之子女求逺方之竒異宫苑是飾臺榭是崇徭役無時干戈不戢外示嚴重內多險忌讒邪者必受其福切譛也讒鉏咸忠正者莫保其生上下相蒙也掩蔽君臣道隔民不堪命率土分崩遂以四海之尊殞于匹夫之手切歿也殞羽敏子孫殄絶盡也殄音腆為天下笑可不痛哉聖哲乘機拯其危溺切救也拯之慶八柱傾而復正地有九州淮南子曰地下有八柱牽制名山大川孔穴相通八柱括地象曰崑崙山為柱地之中也四維弛而更張耻是謂四維四維不張國乃滅亡弛音矢廢也更平聲管子曰禮義亷逺肅邇安不踰于期月曰苟有用我者期月而已可也期與期同謂周一嵗之月也論語勝殘去殺無待于百年邦百年亦可以勝殘去殺矣勝平聲去上聲論語曰善人為今宫觀臺榭盡居之矣聲觀去竒珍異物盡收之矣姬薑淑媛盡侍于側矣也音援媛美女四海九州盡為臣妾矣若能鑒彼之所以失亡一作念我之所以得日慎一日雖休勿休焚鹿臺之寶衣衣其珠玉自燔于火而死武王武王克商紂走反入登鹿臺蒙鹿臺之財命南宫括散毁阿房之廣殿始皇作前殿阿房東西阿于何切房讀曰旁秦旗自殿下直抵南山表閣道絶漢後為楚所焚五百步南北五十丈上可坐萬人下可建五文懼危亡于峻宇宇雕墻有一于此未或不亡夏書五子之歌曰甘酒嗜音峻思安處于卑宫禹吾無間然矣謂禹薄于已而勤于民也處上聲後同論語曰卑宫室而盡力乎溝洫則神化潛通無為而治德之上也若成功不毁即仍其舊除其不急損之又損雜茅茨于桂棟參玉砌以土階三等茅茨不剪堯舜之朝土階恱以使人不竭其力常念居之者逸作之者勞億兆恱以子來群生仰而遂性德之次也若惟聖罔念一念之差雖聖亦為狂矣周書曰惟聖罔念作狂言不慎厥終忘締搆之艱難搆音姤成也締音帝結也謂天命之可恃忽采椽之恭儉榱桷也椽音傳追雕墻之靡麗因其基以廣之增其舊而飾之觸類而長掌音不知止足人不見德而勞役是聞斯為下矣譬之負薪救火揚湯止沸以暴易亂與亂同道莫可測也作則測一後嗣何觀夫事無可觀則人怨後同夫音扶人怨則神怒神怒則災害必生災害既生則禍亂必作禍亂既作而能以身名全者鮮矣順天革命之后將隆七百之祚定鼎于郟鄏卜世三十隆一作基左傳曰成王天所命也卜年七百貽厥子孫傳之萬葉難得易失切後同易以豉可不念哉作飛山宫故魏徴上此疏按通鑑係十一年正月上是月徴又上疏曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其德義源不深而望流之逺根不固而求木之長德不厚而思國之理臣雖下愚知其不可而况于明哲乎人君當神器之重位也神器帝居域中之大大天大地大王亦大老子曰域中有四大道將崇極天之峻永保無疆之休不念居安思危戒奢以儉德不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首哉所以喻君也虞書曰元首明承天景命莫不殷憂而道著之甚也殷憂憂功成而德衰有善始者實繁能克終者蓋寡豈取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體間言至異可同也胡越者極南北之傲物則骨肉為行路反疏也言至親雖董之以嚴刑虞書曰董督也用威董之震之以威怒終茍免而不懷仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎者舟也庶家語曰君舟亦所以覆舟也人者水也水所以載奔車朽索其可忽乎索蘇各切朽許九切喻危懼可畏之甚奔車朽索亦此意也夏書曰豫臨兆民凛乎若朽索之御六馬君人者誠能見可欲則思知足以自戒將有作則思知止以安人念髙危則思謙沖而自牧懼滿溢則思江海下百川樂盤逰則思三驅以為度也夏書曰不敢盤于逰樂音洛後同盤逰畋獵物好生之仁也易比卦六五王用三驅失前禽蓋猶田三驅者圍合其三面前開一路使之可去不忍盡網之義成湯祝憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思弘兹九德而恭亂而敬擾而毅直而溫簡而廉剛而塞虞書臯陶曰亦行有九德寬而栗柔而立願者凡九蓋知人之事也強而義言人之德見于行簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武爭馳君臣無事可以盡豫逰之樂逰一豫為孟子曰一惠及民而諸侯所取法不敢慢逰以病民也諸侯度豫樂逰巡也言王者一逰一豫皆有可以養松喬之夀仙人之有夀者赤松王喬皆古鳴琴垂拱不言而化曰舜家語拱者垂衣拱手無為而治也彈五絃之琴造南風之詩垂何必勞神苦思代下司職役聰明之耳目虧無為之大道哉年四月魏徴上按通鑑係十一疏此太宗手詔答曰省頻抗表切視也省悉井誠極忠欵切誠苦管也言窮切至披覽忘倦每逹宵分也夜半非公體國情深啓沃義重命傅説曰啓乃心沃朕心啓開也沃灌溉也商書髙宗豈能示以良圖匡其不及朕聞晉武帝自平吳已後姓司馬名晉武帝復吳國名三國孫權之後晉武滅之炎家世仕魏封晉王受魏禪國號晉務在驕奢不復留心治政何曽晉受禪以曽為太傅字頴考仕魏為司徒退朝謂其子劭也仕晉為司徒字敬祖曽之子曰吾每見主上不論經國遠圗但説平生常語此非貽厥子孫者爾身猶可以免指諸孫曰此等必遇亂死及孫綏果為淫刑所戮曽之孫也綏字伯蔚東海王越所殺仕晉為尚書後為前史美之以為明于先見朕意不然謂曽之不忠其罪大矣夫為人臣當進思盡忠退思輔過將順其美匡救其惡述孔子之辭孝經傳曽子所以共為理也曽位極台司司者三公之位也三公上應三台台名器崇重當直辭正諌論道佐時今乃退有後言進無廷諍以為明智不亦謬乎危而不持焉用彼相語孔子告冉求曰去聲焉于虔切論則將焉用彼相矣危而不持顛而不扶公之所陳朕聞過矣當置之几案事等弦韋佩韋以自緩董安于性緩佩弦以自急弦弓弦韋柔皮也韓子曰西門豹性急必望收彼桑榆期之嵗暮不使康哉良哉獨美于往日之辭曰股肱良哉庶事康哉美亦作盛虞書舜臯陶𢋫歌若魚若水遂爽于當今明猶魚之得水也蜀先主曰孤之有孔遲復嘉謀犯而無隱事君有犯遲去聲禮隱而無朕將虛襟靜志敬佇德音在十一年七月魏徴按太宗此詔通鑑係之後纍上疏翺論修史之法則曰假如傳魏徴則記其諌諍之孫氏甫曰魏公以忠直稱厯數百年而名愈髙李信于後也此二疏乃諌諍之著者魏公事英主力詞足以見正直是魏公得諌諍之道其言足以傳防其甚如事中常之主天下未治其君或有大過贊治道已成太平之治見其小失尚孜孜諌諍以之道不至此不足以為忠後之為相者宜詳之諌必危切至安危大計必忘身以爭也蓋輔相思而充之則當時之治不惟貞觀而已雖並隆于吕氏祖謙曰魏徴教太宗十思使太宗能以是十孔子之九思同垂訓于萬世矣堯舜可也然魏公之十思可以與雖小事未嘗舍也不惟初年能諌雖末年未嘗愚按魏徴之于諌也可謂難矣不惟大事能諌之中見于諌疏者凡二焉見于書者如此則其輟也史稱其平生諌疏二百餘篇而是年一月世者亦可知矣臣不以數諌為嫌君不以數諌見于言者可知矣傳于世者如此則其不傳于一以為當監隋之所以失念唐之所以得一以為忤其致貞觀之治有以也夫今以二疏觀之而後能慎終始能慎終始則有得而無失矣二為有善始者實繁能克終者實寡夫能懼得失合二疏為一章厥有旨哉疏之言相為表裏者也吳氏貞觀十五年太宗謂侍臣曰守天下難易切以豉侍中之務與中書令參總而顓判國事宰相職也唐制門下省侍中掌出納帝命相國儀凡國家魏徴對曰甚難太宗曰任賢能受諌諍即可作則即一何謂為難徴曰觀自古帝王在于憂危之間則任賢受諌及至安樂洛音必懷寬怠言事者惟令兢懼聲令平日陵月替以至危亡聖人所以居安思危正為此也聲為去安而能懼豈不為難視取天下有不足為者况于守天下乎故魏徴愚按太宗以間世之才內芟群雄外清四夷其蓋自古人主在憂危則思敬畏思敬畏則亂者因其問而對以甚難魏徴豈欲難人之所易哉宣能謹于北伐之日而不能謹于庭燎鄉晨之治矣居安樂則懷寬怠懷寬怠則治者亂矣周統之後明皇首誅諸韋安居而祿山之亂生憲時晉武知謹于平吳之先而不能謹于天下一兢業業于一日萬機者豈徒然哉昔定公問一宗平蕩淮蔡休兵而弘志之禍作唐虞盛治兢則魏徴之言其一言興邦者乎言興邦孔子對以為君之難然政體第二三章凡十貞觀初太宗謂蕭瑀關招之授光祿大夫武德初遷字時文後梁明帝子也髙祖入參預朝政後拜太子少傅卒諡曰恭帝以性忌攺諡內史令貞觀初拜太子少師遷㒒射又遷御史大夫𥚹貞曰朕少好弓矢去聲少好並自謂能盡其妙近得良弓十數以示弓工乃曰皆非良材也朕問其故工曰木心不正則脈理皆邪作多皆一弓雖剛徑而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓多矣而猶不得其理况朕有天下之日淺得為理之意固未及于弓弓猶失之而况于理乎自是詔京官五品以上品以上皆以名聽制授京官謂京都官唐制五更宿中書內省中書內省在更平聲唐制中禁每召見皆賜坐與語詢訪外事務知百姓利害政教得失焉其亡也若有餘太宗因識弓之未精而知天下之范氏祖禹曰傳曰國之將興也君子自以為不足不自用此其所以興也理已不能盡詢謀于衆而良發矢不直則當危幾交急之時所欲斃者不能胡氏寅曰太宗射藝絶世矢無虛發若使弓材不蓋見太宗之微故借弓為喻所以規之也猶曰君應弦而倒而濵于殆也久矣工人之意則不為是執藝之言所謂伯牙之彈而太宗聞之異乎子期心不正則言行皆邪勢雖尊嚴而出政不善云爾以望清光而造弓者乃自外而窺其內衆不可掩之聽邪太宗英才蓋世群臣亦一時豪傑多不足太宗雖愧于聽德之聰然能因是召見京官問民蓋如此人君可不慎哉凡人能反求諸已者實難亦為君之道也疾苦政事得失是之弓工能見太宗之微而有木心不正表裏皆愚按古者工執藝事以諌固時見于傳不謂唐為人君者正心以正朝廷正朝廷以正百官正邪之語斯言也孟子曰一正君而國定董子曰宗果能因工人之言而觸類于經傳之言乎百官以正萬民而逺近莫不一于正不知太貞觀元年太宗謂黃門侍郎人主之故曰黃門唐制漢世禁門曰黃闥以中祀贊獻奏天下祥瑞之官黃門侍郎二侍中職掌祭王圭賢篇詳見任曰中書所出詔敕中書掌軍國政令凡制册詔牒皆宣署而施行中書省名武德三年改內書省曰中書省唐制人令之二也其屬則有舍人六人右散騎常侍二人焉置令二人侍郎二人右諌議大夫四人右輔闕六中書門下與尚書號曰三省右拾遺六人起居舍人二人時頗有意見不同或兼錯失而相正以否元置中書門下掌出納詔令國務省名唐制門下省之二也其屬則有左散騎常侍二人左諌議大夫四則與中書參總焉置侍中二人黃門侍郎二人侍中二人左拾遺二人弘文館亦隸焉人給事中四人起居郎二人輔闕本擬相防過誤人之意見每或不同有所是非本為公事聲為去或有護已之短忌聞其失有是有非銜以為怨切含也銜戶監或有苟避私隙相惜顔面知非政事遂即施行聲施平難違一官之小情頓為萬人之大弊此實亡國之政卿輩特須在意防也隋日內外庶官政以依違而致禍亂人多不能深思此理當時皆謂禍不及身面從背言面諛以為是背毁以為非也虞書曰汝無面從退有後言謂不以為患後至大亂一起家國俱喪雖有脫身之人縱不遭刑戮皆辛苦僅免甚為時論所貶黜卿等特須滅私徇公堅守直道庶事相啓沃勿上下雷同也同時應者故曰雷雷之發聲物無不同冡宰然亦與召公同相為左右何者周公不敢自胡氏寅曰古者論一相而止至成王雖以周公位則參錯並行相輔相正歸于無失而已自漢以來聖獨専相事又將訓後世為人心不同大賢難得而法意猶密既有左右㒒射又有侍中中書尚書或置左右丞相或並置三公不拘一相之文至唐而其大綱則俾中書出令門下審駮而尚書受成兩令左右丞又以官未及而人可用者參預朝政坐致太平其集材並用之效如此諸葛武侯曰參頒之有司當貞觀時君明臣忠朝希粃政不數年覆而得中猶棄弊屩而獲珠玉也嗚呼為君如太署者集衆思廣忠益也若難相違覆曠闕損矣違望治可為後世法也宗為臣如武侯公心以書傳考之殆不然也何則虞廷之使宅百揆愚按胡氏謂古者論一相而止至周召始並相司之職也若契之敷教龍之納言則不可以有宰相之職也后稷臯陶垂益伯夷后夔皆群有尹仲虺並為宰相紂以鄂矦西伯並為三公豈司言也豈非輔正宰相參預朝政者乎湯以伊門下審駮尚書受成蓋所以集衆人之善而防待周召而後有並相之事哉唐制俾中書出令圭之辭首言護短避隙之私次言隋朝依違之一巳之私真唐虞三代之遺意也觀太宗戒王飾于法外者豈不尤深切矣哉禍是不惟法度之善其申警戒貞觀二年太宗問黃門侍郎王圭曰近代君臣理國多劣于前古何也對曰古之帝王為政皆志尚清靜以百姓之心為心近代則唯損百姓以適其欲所任用大臣復非經術之士漢家宰相無不精通一經漢如禮魏相學易之類宣帝時丞相韋賢通朝廷若有疑事皆引經決定由是人識禮教理致太平近代重武輕儒或參以法律儒行既虧聲行去淳風大壞太宗深然其言自此百官中有學業優長兼識政體者多進其階品纍加遷擢焉益矣前古凡幾古近世凡幾世圭宜復帝曰不知胡氏寅曰上既泛問圭亦泛對如是則無切磋之之功矣若魏晉而下則無足言若自兩漢則西京陛下所指為何代請得論之如是則有因事獻替淳漓無不本于人君者忠臣事君必勉其所未能文學之美不如東漢名節之卲而風俗厚薄治化也禹湯文武之業豈不在所希慕乎而奬其所未至兩漢盛時太宗所可及善哉問也王圭首以漢為對而謂近代重武輕愚按太宗近代劣于前古之問自三代以下之所謂儒也以明體適用之學躋斯世于極治者儒果何所指也夫古者臯夔稷契伊傅周召此政體者進其階品不知學業優長者果真儒乎也豈特漢之經術比哉太宗以學業優長兼識貞觀三年太宗謂侍臣曰中書門下機要之司擢才而居委任實重詔敕如有不穩便皆須執論比來音比鼻惟覺阿旨順情唯唯茍過音葦唯唯並遂無一言諌諍者豈是道理若惟署詔敕行文書而已人誰不堪何煩簡擇以相委付自今詔敕疑有不穩便必須執言無得妄有畏懼知而寢默太極殿謂侍臣曰云云房按通鑑是年四月上始御執所見雜署其名謂之五花判事中書侍郎中書令玄齡等皆頓首謝故事凡軍國大事則中書舍人各上始申明舊制由是鮮有敗事省審之給事中黃門侍郎駁正之交修其所不逮也故書曰百官修職苟取充位而范氏祖禹曰朝廷設官分職非徒使上下相從欲人之言是以政亂而上不聞太宗敕責而使之言奉行上令則是胥史而已不明之君自以無過惡不可得也雖欲不治廷之上和而不同論難往來務求至當此諤諤之吕氏曰武王諤諤而昌商紂唯唯而亡蓋朝而不昌乎其或君臣上下有非不諌務相順從以風也朝廷以諤諤為風則正人進而侫人退安得進而君子退安得而不亡乎是道也豈武王與紂為雷同此唯唯之風也朝廷以唯唯為風則侫人亡唐家諤諤而昌未有唯唯而不亡亦未有諤諤為然秦人唯唯而亡漢家諤諤而昌隋人唯唯而者也而不昌者謂後世中書門下之職即納言也夫出者受愚按舜命龍作納言曰夙夜出納朕命惟允説當于理之謂也下情上逹上情下孚一切以帝上言以宣于下納者聽下言以聞于上而允者彼阿旨順情唯唯茍免者豈惟允之義乎命之公而無讒説之私此非擇才不能也貞觀四年太宗問蕭瑀曰隋文帝何如主也姓楊名隋文帝位相國封隋王受周禪國號隋堅弘農人後周朝以元舅輔政對曰克已復禮孔子論語去已私復還天理也答顔淵問仁之辭言克勤勞思政每一坐朝潮音或至日昃五品已上引坐論事宿衛之士傳飱而食孫熟飱音也食雖性非仁明亦是勵精之主太宗曰公知其一未知其二此人性至察而心不明夫扶音心暗則照有不通至察則多疑于物又欺孤兒寡婦以得天下帝受隋文靜帝幼沖之日也禪之時周宣帝既喪恆恐群臣內懷不服不肯信任百司每事皆自決斷雖則勞神苦形未能盡合於理朝臣既知其意亦不敢直言宰相以下後同相去聲惟即承順而已朕意則不然以天下之廣四海之衆千端萬緒須合變通皆委百司商量聲平宰相籌畫於事穩便方可奏行豈得以一日萬幾機機與幾同言日之虞書曰一日二日萬之至多也至淺而事獨斷一人之慮也且日斷十事五條不中中于理也去聲後同謂中者信善其如不中者何以日繼月乃至纍年乖謬既多不亡何待豈如廣任賢良髙居深視法令嚴肅誰敢為非因令諸司令平聲因令之若詔敕頒下有未穩便者必須執奏不得順旨便即施行務盡臣下之意人則賢者得行其所學臣任職則不賢者不得茍范氏祖禹曰君以知人為明臣以任職為良君知矣臣不任君之事則惰此萬事所以墮也當舜之容于朝此庶事所以康也若夫君行臣職則叢脞者如天運于上而四時寒暑各司其序則不勞而時禹為一相總百官自稷以下分職以聽焉君人臣不可以不勞所治者寡所職者詳也不明之君萬物生矣君不可以不逸所治者大所司者要也之所為則雖聖智亦日力不足矣故其臣下事無不能知人故務察而多疑欲以一人之身代百官其志而持祿之士得以保其位此天下所以不治大小皆歸之君政有得失不任其患賢者不得行成彼不得其道而此得其道故也也是以隋文勤而無功太宗逸而有身代群臣之事而自以為勵精者也隋文帝天愚按古之君天下者勞于求賢逸於得人未有下之務以一人之手足而悉代百司之勞不及資苛察多疑自任欲以一身之耳目而周知天勵精之事蕭瑀亦稱之為勵精之主夫堯之兢再傳天下大亂後世道學不明故隋文自以為得舜為已憂舜以不得禹臯陶為已憂堯舜之兢堯之勵精也舜之孶孶舜之勵精也堯以不瑀又謂其能克已復禮斯顔子之所勉行也豈勵精勞于求賢而已豈以其身代群臣之事哉非惟欲廣任賢良髙居深視但令百司不得順隋文之所能乎失之逺矣太宗深悟隋文之非之開皇相去懸絶者有以也夫旨務盡臣下之意故貞觀之治較貞觀五年太宗謂侍臣曰治國與養病無異也病人覺愈彌須將護若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便驕逸必至喪敗今天下安危繫之于朕故日慎一日雖休勿休然耳目股肱寄于卿輩既義均一體宜協力同心事有不安可極言無隱儻君臣相疑不能偹盡肝膈實為國之大害也鑑是按通治安臣不以為喜惟喜陛下居安思危耳年康國求內附太宗因有是言魏徴曰內外不將順其美焉故其言曰內外治安臣不以為喜吕氏祖謙曰魏徴之於太宗救其惡多矣而未嘗俾其居安思危之心永永不忘則其將順正救之惟喜陛下居安思危耳夫既將其居安思危之美兩盡乎道豈不推之天下猶一身也人君為元首大臣為心腹愚按太宗謂治國與養病無異竊嘗因其言而下之疲癃殘疾則癢痾疾痛舉切吾身者也唐其涎為股肱又其次為耳目又其次為􅏨牙天之時也三國南北朝病􅏓盩痱辟者也隋亡唐虞三代康強無事之時也春秋戰國病困危篤兢焉保護之可也一有觸犯不惟病之復作且興其病愈新起之時乎慎其起居節其飲食兢為一體認得為已何所不至若不屬已如手足不可復愈矣雖然先儒嘗言仁者以天地萬物知此義又豈特貞觀之治而已痿痺氣已不貫烏乎使太宗而貞觀六年太宗謂侍臣曰看古之帝王有興有衰猶朝之有暮皆為蔽其耳目不知時政得失忠正者不言邪諂者日進既不見過所以至于滅亡朕既在九重門九重平聲君不能盡見天下事故布之卿等以為朕之耳目莫以天下無事四海安寧便不存意可愛非君可畏非民君可愛而民可畏也虞書舜告禹之辭言天子者有道則人推而為主無道則人棄而不用誠可畏也魏徴對曰自古失國之主皆為居安忘危處理忘亂聲處上所以不能長久今陛下富有四海內外清晏能留心理道常臨深履薄薄氷喻可畏之甚也詩曰如臨深淵如履國家曆數王相繼之曆數者帝莭之先後也次苐猶嵗月氣自然靈長臣又聞古語云君舟也人水也水能載舟亦能覆舟陛下以為可畏誠如聖旨以通下情而防壅蔽也太宗以廷臣為耳目有愚按書曰詢于四嶽闢四門明四目逹四聰所愚婦一能勝豫所以畏民心而保君位也魏徴合于此歟又曰民惟邦本本固邦寧天下愚夫之相警戒如此誠有天下者之鑑也以水能載舟覆舟有得于此歟君臣貞觀六年太宗謂侍臣曰古人云危而不持顛而不扶焉用彼相聲見君道篇注焉于虔切相去君臣之義得不盡忠匡救乎朕嘗讀書見桀殺關龍逄篇注關龍逢夏之賢音旁桀夏桀見君道桀𬒳殺大夫諌漢誅鼂錯帝時為御史大夫請諸侯之罪過上音潮下音措鼂錯潁川人漢景盎請帝斬錯遂斬于東市削其地吳楚七國遂反爰未嘗不廢書歎息公等但能正詞直諌禆益政教終不以犯顔忤旨逆也忤音午妄有誅責朕比來鼻比音臨朝斷決亦有乖于律令者公等以為小事遂不執言凡大事皆起于小事小事不論大事又將不可救社稷傾危莫不由此隋主殘暴身死匹夫之手率土蒼生罕聞嗟痛公等為朕思隋氏滅亡之事後同為去聲朕為公等思龍逄鼂錯之誅君臣保全豈不美哉不相與共之也夏桀為一已之欲故不恤關龍逄林氏之竒曰君臣之間其安危禍福之所在未嘗之計故不諌煬帝之過煬帝既亡而世基亦不免之死龍逄既誅而桀亦不免于亡虞世基為一已己之意為自得哉及其危禍之至而俱以不免此于禍夫夏桀之殺龍逢世基之媚煬帝豈不以在之念龍逄之死也由是言之君之納諌臣之進諌太宗所以戒其臣使之為巳思煬帝之亡也亦為後能相保乎豈非相為謀而泰之時也君臣二心則君不恤其臣臣不恤其愚按君臣一心則君體其臣臣體其君上下交鼂錯之誅是君能以臣之心為心也又使群臣君上下不交否之時也太宗欲為群臣思龍逢也君以臣之心為心臣以君之心為心其上下為已思隋氏滅亡之事是臣能以君之心為心致貞觀之治也之交泰乎宜其貞觀七年太宗與祕書監邦國經籍圖書之事有二唐制祕書省置監一人掌屬而修其職少監為之二局曰著作曰大史皆率其魏徴從容論自古理政得失容和緩貌從即容切從因曰當今大亂之後造次不可致理七造次急遽也到切後同造徴曰不然凡人在危困則憂死亡憂死亡則思理思理則易教切後同易以豉然則亂後易教猶飢人易食也太宗曰善人為邦百年然後勝殘去殺平勝述論語之辭聲去上聲此大亂之後將求致理寧可造次而望乎徴曰此據常人不在聖哲若聖哲施化聲施平上下同心人應如響不疾而速期月而可信不為難三年成功猶謂其晚月而已可也三年有成論語曰茍有用我者期太宗以為然封德彛世基以諂承主意後與宇文士及降唐以祕䇿名倫以字行觀州人初仕隋為起居舍人佐虞右㒒射卒諡曰明後以邪侫攺諡繆干髙祖為秦王參謀軍事貞觀初拜等對曰無等字按通鑑之曰作非三代以後作之以一人漸澆訛下五禾切謬也上古聊切薄也故秦任法律法律令言尚酷也謂秦之治専用刑漢雜霸道道霸道雜施之謂漢之治以王純也言不皆欲理而不能豈能理而不欲若信魏徴所説論一作恐敗亂國家徴曰五帝唐堯虞舜為五帝孔安史記謂黃帝顓頊帝嚳唐虞為五帝未詳孰是國書序以少昊顓頊髙辛三王禹湯武王是也夏殷周創業之主不易人而理字易如行帝道則帝行王道則王在于當時所理化之而已考之載籍可得而知昔黃帝與蚩尤七十餘戰其亂甚矣既勝之後便致太平孫名軒轅黃帝姓公徴師諸侯與戰于涿鹿之野遂禽殺之而萬國和號有熊氏蚩尤古諸侯之無道者蚩尤作亂黃帝九黎亂德顓頊征之既克之後不失其理屬也顓頊號九黎蚩尤之也九黎亂德人神雜糅不可方物顓帝承之乃命南髙陽氏黃帝之孫也國語楚觀射父曰少皥氏之衰正黎司地以屬人正重司天以屬神火桀為亂虐而湯放之在湯之代即致太平賊傷百姓湯遂率兵伐之桀走鳴條遂放桀夏王名履癸湯殷主名履桀不務德而位平定四海而死湯乃踐紂為無道武王伐之成王之代亦致太平百姓怨望武王遂率諸侯伐之紂死于鹿臺武王紂殷王名受武王周文王之子名發紂淫亂日甚誦立是為成王克殷二年太子若言人漸澆訛不及純檏至今應悉為鬼魅當也應平聲寧可復得而教化耶德彛等無以難之駁也難去聲然咸以為不可鑑係在四年以上文按通太宗每力行不倦數年間海內康寧突厥破滅切突厥阿史那氏突陀沒切厥九勿曰獫狁其别部凡二十八等皆世其官與中國抗衡古胸奴北部也居金山之陽夏曰獫狁商曰鬼方周臣服于唐歷代為患悉因謂群臣曰貞觀初人皆異論云當今必不可行帝道王道惟魏徴勸我既從其言不過數載遂得華夏安寧逺戎賔服突厥自古以來常為中國勍敵強也勍音檠今酋長掌畨國之長也酋慈由切長音並帶刀宿衛部落皆襲衣冠使我遂至于此皆魏徴之力也顧謂徴曰玉雖有美質在于石間不值良工琢磨與瓦礫不别也别彼列切礫音的小石若遇良工即為萬代之寶朕雖無言也欲順天下之理而治之封德彛刑罰之言也范氏祖禹曰太宗可謂能審取捨矣魏徴仁義之勞而欲息以仁義治之則順以刑罰治之則咈矣欲咈天下之性而治之夫民莫不惡危而欲安惡太宗從魏徴而不從德彛行之數年遂致太平仁欲治天下則順之而已咈之而能治之未之聞也不可為太宗乎及其成功復歸于下此前世帝王義之效如此其速也故治道在人主所力行耳孰及也之所不魏徴言若果澆訛當為鬼魅則非也以書契以來胡氏寅曰德彛言三代以還人漸澆訛未為甚失若虞夏之質兩漢風俗豈敢望周而唐室風俗又觀之三代之時固不若唐虞之世周之文勝又不治可以易約劑土鼓之樂可以變絲竹矣要之一安能及漢耶若謂民常淳朴無有澆訛是結繩之治極人多則氣漓而人澆淳漓一變而天地之氣治一亂天地之大數也亂極人少則氣厚而人淳人出于本心不可泯滅者則古猶今耳是故可以盈虛消息後世誠不及古逺矣若夫人之所以為魏徴有見于飢渴者易為飲食而無見于人心之懷之以仁理之以義先之以敬讓示之以好惡也無以進矣固不能使人人有士君子之器也未亡者故其放止于斗米數錢外户不閉則之宜二者皆出于天理之本然人心之固有也愚按仁者心之德而愛之理義者心之制而事下操存于未發之時持守于隱微之地終始如古之聖人體之于心行之于身措之于家國天能使天地自位萬物自育氣無不和四靈畢至一無須臾之離也表裏如一無毫髮之間也故學榛塞孟子于戰國之時汲汲然以仁義説齊此豈可以偽而為之襲而取之哉周道既衰聖自謂馬上得之安事詩書者有之矣崇尚黃老梁之君則見謂迂闊而莫之行也自時厥後則者有之矣其視仁義不過尊之以美名待之以不信儒術者有之矣自謂本雜霸道不喜書生當撥亂反正之運獨能黜抑封倫之言力行魏虛器而巳寥寥千載唐太宗以英武間世之姿幾于刑措亦可謂仁義之效矣然太宗之于仁徴之請故能致斗米三錢外戶不閉行旅野宿知求之于紀綱政事而不知反之于吾身方寸義也慕其名而不得其實喜其文而不究其本隱微之際故始以從諌為美而終不免仆碑之之間知求之于外廷朝著而不知行之于宫闈扞格終始衡決其于聖人之仁義蓋外似而內失外以出宫女為名而內不免懷嬴之纍內外漢漢八百餘年而後有太宗天之生賢君如此違名同而實乖也夫自成康八百餘年而後有聖人之道則又若碔砆之于美玉稊稗之于美其不數數也幸而有力行仁義之君而較之于無臣之所致乎烏乎惜哉稼焉豈非聖道不明有君貞觀八年太宗謂侍臣曰隋時百姓縱有財物豈得保此自朕有天下已來存心撫養無有所科差人人皆得營生守其資財即朕所賜向使朕科唤不已雖數資賞賜朔數音亦不如不得魏徴對曰堯舜在上百姓亦云耕田而食鑿井而飲含哺鼓腹而云帝何力于其間矣入而息鑿井而飲耕田而食帝何力于我堯時有老人擊壤于路曰吾日出而作日哉今陛下如此含養百姓可謂日用而不知又奏稱晉文公公晉君名重耳晉春秋時國名文出田逐獸于碭切徒浪入大澤迷不知所出其中有漁者文公謂曰我若君也道將安出我且厚賜若漁者曰臣願有獻文公出澤而受之于是送出澤文公曰今子之所欲教寡人者何也願受之漁者曰鴻鵠保河海厭而徙之小澤則有矰丸之憂矢也矰音曽黿鼉保深淵厭而出之淺渚必有釣射之憂石射音今君出獸碭入至此何行之太逺也文公曰善哉謂從者記漁者名聲從去漁者曰君何以名君尊天事地敬社稷保四國慈愛萬人薄賦斂聲去輕租稅臣亦與焉聲與去君不尊天不事地不敬社稷不固四海外失禮于諸侯內逆人心一國流亡漁者雖有厚賜不得保也遂辭不受太宗曰卿言是也本舊于政體尤切故附于此此章附忠義篇今按其言溱洧孟子譏其不知為政夫使梁國有九年之愚按惠王移民移粟孟子不許其仁子産濟人太宗曰人得營生即朕所賜若科差不已雖賞儲子産有輿梁之政安用區區之小惠哉善乎之君有賜民今年田租者有賜民爵賜民帛者賜不如不得此可謂知為政之本矣愚觀後世彼有限之賜何足以周無窮之民乎夫耕田鑿井之民尚不知帝力之何有貞觀九年太宗謂侍臣曰往昔𥘉平京師都鎬京後師衆也周師此指長安隋之都而言也世因以天子建都之地曰京宫中美女珍玩無院不滿煬帝意猶不足徴求無已召也徴平聲兼東西征討窮兵黷武瀆黷音百姓不堪遂致亡滅此皆朕所目見故夙夜孜孜篤意也並音兹惟欲清淨使天下無事遂得徭役不興年榖豐稔百姓安樂後同音洛夫治國猶如栽樹音夫扶本根不搖則枝葉茂榮盛一作君能清淨百姓何得不安樂乎人莫不然而君夫下者尤甚焉夫峻宇雕墻本愚按孟子曰其為人也多欲雖有存焉者寡矣罰窮兵黷武本于征伐自古亡國喪家之君未于宫室酒池肉林本于飲食淫虐嚴酷本于刑興紂以多欲而亡武王反之而興煬帝多欲而有不由多欲者也桀以多欲而亡成湯反之而也不過勉強行之耳猶能身致盛治歷年數百亡太宗反之而興夫太宗之寡欲非能如湯武實踐者乎况于真知貞觀十六年太宗謂侍臣曰或君亂于上臣理于下或臣亂于下君理于上二者苟逢何者為甚特進魏徴對曰君心理則照見下非誅一勸百誰敢不畏威盡力若昏暴于上忠諌不從雖百里奚伍子胥之在虞吳不救其禍敗亡亦繼奚虞之賢臣晉假道于虞一作促虞吳二國名百里秦後果為晉所滅伍子胥名貟楚人吳之賢臣吳王以伐虢欲并取虞百里奚知虞公之不可諌而去之齊子胥以為不可吳王又不聽太宰嚭譛子胥于王夫差伐越越請和子胥諌吳王不聽與越平復欲伐為越王勾踐所滅王賜劒使自死後吳太宗曰必如此齊文宣昏暴楊遵彥以正道扶之得理何也臣襲其父歡位封齊王齊文宣姓髙名洋東魏功業自矜遂嗜酒淫泆肆行強暴而能委政楊愔總受魏禪國號齊楊遵彥名愔仕齊為尚書令文宣以言主昏于上政清于下攝機衡百度修飾時人皆徴曰遵彥彌縫暴主救理蒼生才得免亂亦甚危苦與人主嚴明臣下畏法直言正諌皆見信用不可同年而語也不正而能使其目之正者然則君茍自亂安能使林氏之竒曰君者臣之綱君正則臣正未有綱之宗乃以齊文宣得楊遵彥為君亂臣治之比殊不其臣之治也鄭公之言可謂得夫正綱之道而太言衛靈公之無道康子曰夫如是奚而不喪孔子知彼之所為才能救其亡耳烏足以為治哉孔子如是奚其喪是亦君亂而臣治然止于不喪而巳曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫興邦乎安能以民敏德君臣相須以成至治此元首股肱所由愚按書曰后克艱厥后臣克艱厥臣政乃乂黎季世之所見也求之古先盛時太甲欲敗度縱以取喻也太宗之言未為知要夫君亂臣理此遂終為賢君降此則魏徴所謂才得免亂爾若敗禮可以言亂必有元聖大臣如伊尹之匡救刑臣何自亂臣之亂政由君之未理也夫君理臣亂尤無是理君能理矣明其政貞觀十九年太宗謂侍臣曰朕觀古來帝王驕矜而取敗者不可勝數下上聲上平聲不能逺述古昔至如晉武平吳篇注見君道隋文伐陳世亡滅之陳後主之已後心逾驕奢自矜諸已臣下不復敢言政道因兹弛紊汶散亂也上音矢下音朕自平定突厥破髙麗已後髙麗東夷國名本扶餘麗平聲凡言髙麗並同之國也今為鎮東省别種居遼東周封箕子兼并鐡勒席卷沙漠以為州縣也太宗既平其國即其部落列置州縣號為羈縻鐡勒胸奴苖裔其種類多居西海之北突厥北部世襲凡四夷內屬者皆然也以其首領為都督剌史皆得夷狄逺服聲教益廣朕恐懷驕矜恆自抑折舌音日旰而食晚也旰音幹坐以待晨每思臣下有讜言直諌亦直也讜音黨可以施於政教者平施聲當拭目以師友待之友字一無如此庶幾于時康道泰爾聲幾平忿兵之興未已既破鐡勒自謂雪耻酬百王除愚按是時魏徴既死諌諍之臣漸少髙麗雖破猶能日旰而食坐以待晨俾群臣讜言直諫欲凶報千古其驕矜滿溢之意固形于歌咏矣然名有晉武隋文之功而無晉武隋文之禍歟以師友待之嗚呼此所以克終盛治不失令太宗自即位之始霜旱為災米榖踴貴突厥侵擾州縣騷然帝志在憂人鋭精為政崇尚節儉大布恩德是時自京師及河東今河東道古冀州之域河南今河南等處古兖州之域隴右今陕西等處古梁州之域飢饉尤甚熟曰飢菜不熟曰饉飢音飢饉音僅榖不一匹絹才得一斗米百姓雖東西逐食未嘗嗟怨莫不自安至貞觀三年關中豐熟蜀太宗分天下為十道漢書關中左殽函右隴之地也今陕西省此為關西唐建都咸自歸鄉竟無一人逃散其得人心如此加以從諌如流雅好儒術好去聲一作學孜孜求士務在擇官攺革舊弊興復制度每因一事觸類為善初息隱海陵之黨皇太子海陵髙祖第四子也名元息隱髙祖長子也名建成初立為與元吉謀害秦王秦王知之遂殺二人既即帝位乃吉初封齊王建成荒色嗜酒畋逰無度見秦王功髙元吉為海陵王諡曰剌封建成為息王諡曰隱同謀害太宗者數百千人事寧復引居左右近侍心術豁然不有疑阻時論以為能斷決大事得帝王之體深惡官吏貪濁去聲惡烏有枉法受財者必無赦免在京流外有犯贓者皆遣執奏隨其所犯置以重法由是官吏多自清謹制馭王公妃主之家大姓豪猾之伍皆畏威屏迹餅屏音無敢侵欺細人商旅野次無復盜賊囹圄常空語周獄名也囹音零圄音馬牛布野外户不閉又頻致豐稔米斗三四錢行旅自京師至于嶺表二廣之地五嶺之外今自山東至于滄海冀州之山東古海東海之名也域今濟南等路滄皆不賫糧取給于路入山東村落行客經過者聲過平必厚加供待聲供平或發時有贈遺送也去聲饋此皆古昔未有也湯武致治之美庶幾成康自古功德兼隆由漢以歐陽氏修曰盛哉太宗之烈也其除隋之亂比迹勤兵于逺此中材庸主之所常為然春秋之法責來未之有也至其牽于多愛復立浮屠好大喜功人之美者莫不嘆息于斯焉備賢者是以後世君子欲成謂有天下之志以租庸任民以府衛任兵以職事曽氏鞏曰太宗之為君也屈已從諌仁心愛人可有定制兵農有定業官無虛名職無廢事人習于任官以才能任職以興義任俗以尊本任衆賦役者寡而易供民有農之實而兵之傋存有兵之名善行離于末作使之操于上者要而不煩取于下不遺而治之體相承其亷恥日以篤田野日以闢而農之利在事之分有歸而祿之出不浮材之品材行之數嵗粟米之賤斗至數錢居者有餘蓄行以其法修則安且治廢則危且亂可謂有天下之效有是三者而不得與先王並者法度之行禮樂者有餘資人人自厚幾于刑措可謂有治天下之行陳之間戰必勝攻必取天下莫不以為武而非之具田疇之制庠序之教擬之先王未備也躬親從天下莫不以為盛而非先王之所務也太宗之先王之所尚也四夷萬古所未及以政者莫不服此其得失可睹矣為政于天下者如網羅俊乂好用善謀樂聞直諌拯民于水火之中司馬氏光曰太宗文武之才髙出前古驅䇿英雄歌衣食有餘刑措不用突厥之渠繫頸闕庭北海而措之袵席之上使盜賊化為君子吟呻轉為謳還中國之盛未之有也之濱悉為州縣蓋三代以于漢髙而規摹不及也恭儉不若孝文而功烈過范氏祖禹曰太宗以武撥亂以仁勝殘其材略優諌刻厲矯揉力于為善此所以致貞觀之治也夫之矣迹其性本強悍而能畏義而好賢屈已以從辨也老子曰善人者不善人之師不善人者善人人主之所行其善惡是非在後世當其時不可得得師其不善而戒之足以為資矣之資人君擇其善者而從之足以富庶之域者亦以天下之才為天下之務而已觀程氏祁曰太宗舉兵五年定海內率天下于仁夀劉洎馬周于踈逺起張玄素孫伏伽于耆舊委之其任王圭魏徴于仇讎任禇亮李百藥于降虜起固非天下之所能及然而不以此驕天下之士惴以政責之以功諌無不從謀無不獲且太宗之才所以能為三百年之基也惴然常若有于不逮此其為盛矣今即其行事觀之內除群雄外定四夷愚按太宗之為君可以為賢矣貞觀之治可以者也其君人之大德有三一曰謙虛納諌二曰身經百戰未嘗負比後世人君之功未有髙焉過焉者也定租庸調以為取民之制定府兵十知人善任三曰恭儉愛民後世人君之德未有用刑則有笞杖徒流之制後世制度之美奠能六衛以為養兵之制任官則有職爵勳階之制褒鄂之驍勇虞禇之詞翰下至孫思邈之醫藥加也命房杜以為相英衛以為將王魏之諌爭度越千古後世人才之盛莫能及也夫功也德李淳風之曆數袁天綱之相法莫不至精至妙帝三王之盛者何哉蓋嘗觀之古先帝王雖其也制度也人才也其盛如此而卒不得與于二之事尚矣其所從學猶班班可考若髙宗之學天資之美未有不由學問而成者也二帝三王盛治冠冕百王有以也夫太宗外親瀛洲之賢于古訓而有獲成王之學有緝熙而光明泰和學耳使其能從事于二帝三王之學又豈特貞內立弘文之館未嘗不學也特非二帝三王之而已哉觀之治貞觀政要卷第一
