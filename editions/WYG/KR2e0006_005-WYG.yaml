body:
  text: 貞觀政要卷五唐吳兢撰元戈直集論仁義第十三凡四章貞觀元年太宗曰朕看古来帝王以仁義為治者國祚延長任法御人者雖救弊於一時敗亡亦促既見前王成事足是元龜今欲專以仁義誠信為治望革近代之澆薄也黄門侍郎王珪對曰天下彫䘮日久陛下承其餘弊𢎞道移風萬代之福但非賢不理惟在得人太宗曰朕思賢之情豈捨夢寐給事中杜正倫進曰世必有才隨時所用豈待夢傅説音悦逢吕尚然後為治乎太宗深納其言愚按太宗即位之初知古帝王以仁義為治欲以誠信行之此其所以致貞觀之盛也然嘗聞之正其心修其身而達之於家國天下此二帝三王仁義之事也心未必正身未必修而其愛人利物之功禁暴止亂之效亦有補於當世此齊桓晉文假仁義之事也太宗芟除禍亂身致昇平可謂偉矣然由心而身由身而家皆有慚徳凡魏徴之所諫太宗之所行不過黽勉於仁義之功而已故雖有志於三王迄未能大異於五霸也王珪謂非賢不理惟在得人斯言是已然所謂得人者必得周召孔孟其人而後可也夫茍得周召孔孟而用之則能施其致君澤民之術盡其格心養徳之方而仁義之全體備於君身仁義之大用周於天下後世矣貞觀二年太宗謂侍臣曰朕謂亂離之後風俗難移比觀比音鼻百姓漸知亷恥官人奉法盜賊日稀故知人無常俗但政有治亂耳是以為國之道必須撫之以仁義示之以威信因人之心去其苛刻不作異端自然安靜公等宜共行斯事也愚按風俗有古今人心無古今人心之不如古以風俗之不如古也然而羙風俗者則在於正人心人心正而風俗美矣太宗云比觀百姓漸知亷恥故知人無常俗但政有治亂耳斯言也其魏徵勸行仁義畧效之時乎夫太宗之所行不過仁義之似而已其眀效大驗如此况於真知實踐正已以正人心者乎貞觀四年房𤣥齡奏言今閲武庫甲仗勝隋日逺矣太宗曰飭兵備寇雖是要事然朕惟欲卿等存心理道務盡忠貞使百姓安樂音洛便是朕之甲仗隋煬帝豈為甲仗不足為去聲以至滅亡正由仁義不修而羣下怨叛故也宜識此心愚按周頌之美武王曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之下武右文信矣武王能保天下也太宗身履行陣芟除羣雄即位之四年謂不以甲仗之備為美戒廷臣以徳義相輔亦信矣其能保天下之道歟貞觀十三年太宗謂侍臣曰林深則鳥棲水廣則魚㳺仁義積則物自歸之人皆知畏避災害不知行仁義則災害不生夫仁義之道夫音扶當思之在心常令相繼令平聲後同若斯須懈怠去之已逺去如字猶如飲食資身恒令腹飽乃可存其性命王珪頓首曰陛下能知此言天下幸甚唐氏仲友曰仁義是帝王之道然必如中府九經與大學自誠意逹之眀眀徳於天下方為醇粹太宗言仁義本乎魏徵之勸然所謂仁義乃在制度紀綱而已愚按太宗之言曰林深則鳥棲水廣則魚㳺仁義積則物自歸之此言真善喻也謂仁義之道當思之在心如飲食資身恒令腹飽此固欲不忘乎仁義者然不知仁義乃吾心固有之理孟子所謂根於心者也又何待思之在心哉論忠義第十四凡十五章馮立馮翊人武徳中為東宫率音律唐制東宫置左右率府掌兵仗宿衛之政令總諸曹之事甚被隐太子親遇太子之死也左右多逃散立歎曰豈有生受其恩而死逃其難去聲於是率兵犯𤣥武門苦戰殺屯營將軍敬君𢎞絳州人謂其徒曰㣲以報太子矣遂解兵遁於野俄而来請罪太宗數之曰數上聲汝昨者出兵来戰大殺傷吾兵將何以逃死立飲泣而對曰飲去聲立出身事主期之効命當戰之日無所顧憚因歔欷上音虚下音希悲歎貌悲不自勝平聲太宗慰勉之授左屯衛中郎將去聲後同唐制掌宿衛之屬立謂所親曰逢莫大之恩幸而獲免終當以此奉答未幾平聲突厥至便橋率數百騎與虜戰於咸陽殺獲甚衆所向皆披靡太宗聞而嘉歎之時有齊王元吉府左車騎謝叔方萬年人率府兵與立合軍拒戰及殺敬君𢎞中郎將吕衡將去聲史作吕世衡此避太宗諱除世字王師不振秦府䕶軍尉唐制掌宿衛之職尉遲敬徳尉音蔚尉遲複姓名恭以字行朔州人為劉武周將武徳初舉地降為右府統軍後從討隐巢有功封鄂國公卒贈徐州都督乃持元吉首以示之叔方下馬號泣號平聲拜辭而遁明日出首去聲太宗曰義士也命釋之授右翊衛郎將唐制掌供奉侍衛之職按通鑑武徳九年六月馮立聞建成死乃與副䕶軍薛萬徹屈咥直府左車騎謝叔方帥東宫齊府精兵二千馳赴𤣥武門張公謹多力獨閉闗以拒之不得入敬君𢎞掌宿衛兵屯𤣥武門挺身出戰與吕世衡大呼而進皆死之守門兵與萬徹等力戰良久萬徹欲攻秦府尉遲敬徳持建成元吉首示之宫府兵遂潰萬徹亡入終南山馮立遂解兵逃於野髙祖既赦天下馮立謝叔方皆自出萬徹亡匿屢使諭之乃出秦王曰皆忠於所事義士也釋之馮立後授廣州都督卒于官敬君𢎞後贈左屯衛大將軍吕衡贈右驍衛將軍唐氏仲友曰若立者所謂一心可事百君忠義勇敢兼有之觀其於隐太子之死能不避難然君𢎞世衡既死則解兵而去不為已甚則異乎徒勇者盖可知也然立之與叔方俱可謂見危致命者矣較其人品叔方其立之亞歟愚按馮立之言曰豈有生受其恩而死逃其難此子路所謂食焉而不避其難者也謝叔方亦有慷慨殺身從容受死之意二人雖皆受爵然亦可謂忠義也已太宗旌之此正興王之所宜然也若薛萬徹亦可謂忠於所事始焉與馮謝無異也然知進而不知退終以邪謀就誅寧不有愧乎史臣是編書馮謝於忠義之首萬徹乃削而不書厥有㫖哉貞觀元年太宗嘗從容從即容刀言及隋亡之事慨然歎曰姚思亷不懼兵刃以明大節求諸古人亦何以加也思亷時在洛陽因寄物三百叚并遺其書曰遺去聲想卿忠節之風故有斯贈初大業末思亷為隋代王侑侍讀代王侑隋元徳太子之子煬帝十三年南巡以侑留守長安髙祖克長安立侑為帝及義旗尅京城時代王府僚多駭散惟思亷侍王不離其側離去聲兵士將昇殿思亷厲聲謂曰唐公髙祖初封唐公舉義兵本匡王室卿等不宜無禮於王衆服其言於是稍却布列階下須臾髙祖至聞而義之許其扶代王侑至順陽閤下思亷泣拜而去見者咸歎曰忠烈之士仁者有勇此之謂乎張氏九成曰君子以仁存誠以義為勇白刃在前不能懼凶暴之氣不能懾盖不在力之武由忠義之壯也觀隋之亡亂兵入京侍臣駭潰思亷以微軀奮不顧以全君親之生即甲兵之衆顧輕於一言哉誠以仁在其中也易曰能止健大正也惜乎大厦傾而一木不支矣懔懔風義激懦夫之志爾唐氏仲友曰姚思亷節義學問之士孟子論為人寡欲雖有不存焉者寡矣思㢘之謂歟學問惟寡欲能精節義惟寡欲能立説見第四章貞觀二年將𦵏故息隐王建成海陵王元吉尚書右丞魏徵與黄門侍郎王珪請預陪送上表曰臣等昔受命太上委質東宫出入龍樓垂將一紀前宫結釁宗社得罪人神臣等不能死亡甘從夷戮負其罪戾寘錄周行音杭徒竭生涯音牙將何上報陛下徳光四海道冠前王冠去聲陟岡有感追懐棠棣明社稷之大義申骨肉之深恩卜𦵏二王逺期有日臣等永惟疇昔忝曰舊臣䘮君有君雖展事居之禮宿草將列未申送往之哀瞻望九原義深凡百望於𦵏日送至墓所太宗義而許之於是宫府舊僚吏盡令送𦵏令平聲愚按王珪魏徵請送息隐海陵之䘮太宗義而許之二子可謂篤於義矣孟子曰生亦我所欲也義亦我所欲也二者不可得兼捨生而取義者也珪徵名臣也詎容輕議哉自有文公朱子之論斷在焉昔管仲不死於子糾而相桓公子貢子路以問夫子夫子稱其功論語集註引程子之言因論管仲而及於王珪魏徵之事朱子謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也斯言盡之矣貞觀五年太宗謂侍臣曰忠臣烈士何代無之公等知隋朝誰為忠貞王珪曰臣聞太常丞卿之佐也元善逹在京留守見羣賊縱横縱平聲遂轉騎逺詣江都諫煬帝令還京師令平聲既不受其言後更涕泣極諫煬帝怒乃逺使追兵身死瘴癘之地有虎賁郎中賁音奔獨孤盛獨孤複姓盛名也在江都宿衛宇文化及起逆盛惟一身抗拒而死太宗曰屈突通為隋將屈區勿切將去聲後同屈突虜複姓通名仕隋為虎賁郎將初代王遣通守河東髙祖兵圍之通守節不降後被擒帝勞之泣曰臣不能盡人臣之節故至此為本朝羞帝曰忠臣也授兵部尚書從討王世充時通二子在洛帝曰以東畧屬公如何通曰二兒死自其分終不以私害義帝曰烈士徇節吾今見之貞觀初卒共國家戰於潼闗在今華州華隂縣𨽻陕西省聞京城䧟乃引兵東走去聲義兵追及於桃林今陕州桃林縣𨽻河南朕遣其家人往招慰遽殺其奴又遣其子往乃云我䝉隋家驅使己事兩帝今者吾死節之秋汝舊於我家為父子今則於我家為仇讎因射之其子避走所領士卒多潰散通惟一身向東南慟哭盡哀曰臣荷國恩荷去聲任當將帥智力俱盡致此敗亡非臣不竭誠於國言盡追兵擒之太上皇授其官每託疾固辭此之忠節足可嘉尚因敕所司採訪大業中直諫被誅者子孫聞奏唐氏仲友曰屈突通不死於稠桑更盡力於唐尚得為節義乎曰隋運已亡河東之守力戰不屈天命有歸通如之何斬家奴射其子兵敗力屈而後擒亦足以報隋矣商之亡也雖如箕子猶陳洪範封朝鮮而欲責人以必死不亦難乎若通之竭力於所事亦足以為節義矣愚按太宗稱奬隋世忠義之臣於文臣則姚思亷於武臣則屈突通也或曰二子隋臣而仕扵唐國亡皆不能死可以為忠臣乎愚應之曰否不同也思亷仕隋不過諸王講讀之官耳於軍國之重事社稷之大計固不與聞也國亡諸人皆去思亷獨不去呵叱亂兵辭嚴義正又能扶掖舊君泣拜而别其後代王竟得善終思亷講讀調䕶之職可謂無負矣曷為而死哉至於通則不然通仕隋文已躋貴顯迨乎煬帝尊寵加隆楊諒𤣥感之亂嘗立大功名聞天下煬帝南行付以闗中之任身受重寄手握彊兵國亡師敗通安所辭其死哉並二子之事觀之庸夫能斷其是非矣然則太宗之奬忠義其得於思亷而失扵屈突乎貞觀六年授左光祿大夫陳叔達字子聰陳宣帝子也武徳初判納言始建成兄弟閲間太宗帝惑之叔達極意救辨及建成誅髙祖謂裴寂等曰不圗今日乃見此事當如之何蕭瑀陳叔逹曰建成元吉本不預義謀又無功於天下疾秦王功髙望重共為姦謀今秦王已討而誅之秦王功盖宇宙率土歸心陛下若處以元良委之國務無復事矣上曰善此吾之夙心也禮部尚書因謂曰武徳中公曾進直言於太上皇曾音層眀朕有克定大功不可黜退云朕本性剛烈若有抑挫恐不勝憂憤勝平聲以致疾斃之危今賞公忠謇有此遷授叔逹對曰臣以隋氏父子自相誅戮以至滅亡豈容目覩覆車不改前轍臣所以竭誠進諫太宗曰朕知公非獨為朕一人為去聲後同實為社稷之計胡氏寅曰人臣之義無私交而况藩王與太子有隙之時乎言所左右疑所集也而陳叔達無是心特以秦王有功不可黜恐生後悔是皆天下之公論亦初無贊髙祖廢立之意於秦王非私交也以叔達端良自宜在親近之地茍欲叙遷何患無名而太宗乃舉武徳中直言是以危疑向背誘臣下為後日計豈君道哉愚按時平先長嫡世亂先有功陳叔達當時之直言意固有在矣誠公論非私計也太宗於是臨御已六年矣揚其忠謇而遷秩之雖用得其人而心若私也言者心之聲可不慎哉貞觀八年先是桂州今仍舊𨽻廣西都督李𢎞節以清慎聞及身殁後其家賣珠太宗聞之乃宣於朝曰此人生平宰相皆言其清相去聲今日既然所舉者豈得無罪必當深理之不可捨也侍中魏徵承間言曰間去聲陛下生平言此人濁未見受財之所今聞其賣珠將罪舉者臣不知所謂自聖朝以来為國盡忠為去聲後同清貞慎守終始不渝屈突通張道源而已張道源并州人初守并州賊平拜大理卿時何稠得罪籍家屬以賜羣臣道源曰禍福無常安可利人之亡取其子女自奉仁者不為也更資以衣食遣之家無貲産比亡餘粟二斛通子三人来選去聲有一匹羸馬道源兒子不能存立未見一言及之今𢎞節為國立功前後大䝉賞賚居官殁後不言貪殘妻子賣珠未為有罪未為如字審其清者無所存問疑其濁者旁責舉人雖云疾惡不疑是亦好善不篤好去聲臣竊思度後洛切未見其可恐有識聞之必生枉議太宗撫掌曰造次不思造七到切遂聞此語方知談不容易以豉切並勿問之其屈突通張道源兒子宜各與一官舊本此章附直諫𩔖今附入此愚按皋陶之稱堯舜有曰罰弗及嗣賞延扵世盖善善之意長惡惡之心短也太宗知屈突道源之善而不能錄其子弟聞𢎞節曖昧之過則遽欲罪及舉官此豈唐虞賞罰之道乎向非魏徵之言亦足為太宗君徳之累矣貞觀七年太宗將發諸道唐分天下為十道一曰闗内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劍南十曰嶺南皆因山川形便而併省之也黜陟使去聲後同將命而出掌黜陟臧否故曰黜陟使畿内道唐建都之地即闗内道也未有其人太宗親定問於房𤣥齡等曰此道事最重誰可充使右僕射李靖曰畿内事大非魏徵莫可太宗作色曰朕今欲向九成宫亦非小寧可遣魏徵出使朕每行不欲與其相離者適為其見朕是非得失為去聲公等能正朕不可因輒有所言大非道理乃即令李靖充使令平聲按通鑑貞觀八年太宗欲分遣大臣為諸道黜陟使未得其人李靖薦魏徵上曰徵箴規朕失不可一日離左右乃命靖與蕭瑀等凡十三人分行天下察長吏賢不肖問民疾苦禮髙年振窮乏褒善起淹滯俾使者所至如朕親睹與此小異愚按太宗嘗問羣臣魏徵與諸葛亮孰賢岑文本對曰亮才兼將相非徵所及斯言是已然嘗論之太宗有餘於才而不足於徳勇於敢為而不能不為當時能攻其所短救其所偏惟徵一人而已使徵生於三國之時未必能勝武侯之任然使武侯生扵太宗之時不過為徵之所為耳故以唐之時勢觀之則二子政未易優劣也李靖之才兼資文武非徵所能及也然貞觀之時可以無靖不可以無徵何也盖靖之才能不過增太宗之所有餘徵之諫爭乃能補太宗之所不足也是以畿内之使太宗寧使靖而不使徵豈非自知之眀哉貞觀九年蕭瑀為尚書左僕射嘗因宴集太宗謂房𤣥齡曰武徳六年已後太上皇有廢立之心我當此日不為兄弟所容實有功髙不賞之懼蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也乃賜詩曰疾風知勁草板蕩識誠臣瑀拜謝曰臣特䝉誡訓許臣以忠諒雖死之日猶生之年舊本此章首曰貞觀中與第五章合為一章今按通鑑標年附入于此又按史傳魏徵曰臣有逆衆持法主恕之以公孤特守節主恕之以介昔聞其言乃今見之使瑀不遇陛下庸自保邪范氏祖禹曰太宗以蕭瑀無二心於己而嘉之可謂能知臣矣且太子在而私於藩王者眀君之所甚惡也或誘以利或脅以死而從之者不亦多乎惟瑀介然自立有隕無二太宗所以知其臨大節而不可奪也人君以此取人豈不得忠正之士乎唐氏仲友曰若以隐巢之事不可以利怵死懼亦可以為社稷臣矣然太宗此言盖亦有為瑀初以切詆房杜廢又以痛劾房杜罷至此復參知政事太宗賜詩欲羣臣知委任之意也魏徵之言亦以發眀太宗之意若以瑀較揚子雲近世社稷臣之論則猶有愧云愚按武徳季年髙祖立秦王為皇太子竟决扵瑀之一言瑀以躁狭之量剛勁之氣罷黜者三而卒預大政太宗實能容之者豈非念夫此耶瑀嘗劾奏魏徵之過矣今觀徵所言若未嘗有隙者所謂以義相與不以少嫌置胸中徵之謂矣然可不謂尤賢乎貞觀十一年太宗行至漢太尉楊震墓楊震字伯起𢎞農人也好學眀經諸儒稱為闗西夫子漢安帝時為刺史號清白吏後徵為太常遷太尉為内戚讒譛遣歸震曰死者人之常分吾䝉恩居上司姦臣狡猾而不能誅嬖女傾亂而不能禁何靣目復見日月飲酖而卒傷其以忠非命親為文以祭之房𤣥齡進曰楊震雖當年夭枉數百年後方遇聖眀停輿駐蹕親降神作一作玊趾可謂雖死猶生没而不朽不覺助伯起幸頼欣躍於九泉之下矣伏讀天文且感且慰凡百君子焉敢不朂勵名節焉於䖍切知為善之有效愚按太宗經異代名臣之墓親為文以祭之是可以見其惓惓於忠貞之臣矣異世相望且企敬如此况凡百君子列于庶位者乎貞觀十一年太宗謂侍臣曰狄人殺衛懿公名赤盡食其肉獨留其肝懿公之臣𢎞演呼天大哭自出其肝而内懿公之肝於其腹中内讀曰納今覓此人恐不可得特進魏徵對曰昔豫讓為智伯報讎為去聲後同豫讓智伯之臣智伯名瑶號襄子晉智宣子之後為韓趙魏所滅欲刺趙襄子名無恤晉趙簡子之後襄子執而獲之謂之曰子昔事范中行氏乎春秋之世晉有范氏中行氏與智氏韓氏魏氏趙氏為六卿春秋之末晉公室卑六卿強各據采地更相攻伐貞定王十一年智氏魏氏趙氏韓氏共伐范氏中行氏滅之而分其地智伯盡滅之子乃委質智伯不為報讎今即為智伯報讎何也讓答曰臣昔事范中行范中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之事見史記趙世家在君禮之而已亦何謂無人焉愚按夫子曰君使臣以禮臣事君以忠孟子曰君之視臣如手足則臣視君如腹心夫子之言涵容孟子之言激切大概忠臣義士何代無之在上之人有以感召之則在下之人興起矣太宗嘉古之忠臣以為今覓此人恐不可得斯言固所以激勸天下忠義之士而謂世無其人則不可宜魏徵引智伯豫讓之事以為譬也雖然為人臣者之分君之待我者或有未至而我之所以事君者其可不盡心乎貞觀十二年太宗幸蒲州今為解州𨽻河東因詔曰隋故鷹擊郎將將去聲隋制親侍置鷹揚府有鷹揚郎將後改副郎將為鷹擊郎將堯君素魏郡人煬帝為晉王時君素以左右從及嗣位累遷鷹擊郎將及天下大亂君素所部獨全後從屈突通守河東通敗通誘之降君素責通不義卒無降心其妻誘
