body:
  text: 貞觀政要卷八唐吳兢撰元戈直集論務農第三十凡四章貞觀二年太宗謂侍臣曰凡事皆須務本國以人為本人以衣食為本凡營衣食以不失時為本夫不失時者夫音扶後同在人君簡静乃可致耳若兵戈屢動土木不息而欲不奪農時其可得乎王珪曰昔秦皇漢武外則窮極兵戈内則崇侈宫室人力既竭禍難遂興難去聲彼豈不欲安人乎失所以安人之道也亡隋之轍殷鑒不逺陛下親承其弊知所以易之易如字然在初則易以豉切終之實難伏願慎終如始方盡其美太宗曰公言是也夫安人寧國惟在於君君無為則人樂音洛君多欲則人苦朕所以抑情損欲尅已自勵耳愚按太宗之言曰國以人為本人以衣食為本營衣食以不失時為本人不失時以人君簡静為本竊嘗因其言而推之舜之罔遊于逸萬邦咸寧之本也禹之克儉於家朔南暨聲教之本也湯之不邇聲色表正萬邦之本也文王之不敢盤於遊田懷保小民之本也自古興王之君未有不簡静寡欲者也自古亡國之君未有不淫侈多欲者也至哉太宗之言乎其可謂知本者矣雖然言之非艱行之為難太宗既以隋之崇侈宫室為鑒矣而復有飛仙翠㣲之作既以隋之窮兵黷武為鑒矣而復有髙麗西域之師魏徴曰善始者實繁克終者蓋寡王珪曰在初則易終之實難然則向非二臣之言又豈能始終踐言也哉貞觀二年京師旱蝗蟲大起太宗入苑視禾見蝗蟲掇數枚而呪曰人以榖為命而汝食之是害於百姓百姓有過在予一人爾其有靈但當蝕我心無害百姓將吞之左右遽諫曰恐成疾不可太宗曰所冀移灾朕躬何疾之避遂吞之自是蝗不復為灾林氏之奇曰夫天灾可以至誠感不可以人力勝太宗掇蝗而吞之不忍民受其灾其害自息明皇遣使捕之欲以人力勝天而其灾愈甚天人之際豈不甚明矣哉愚按昔成湯禱旱於桑林以六事自責身代犧牲是不自有其身矣夫千金之子猶知愛其身人君以一身履九五之尊位崇髙莫大焉此身為何如也惟能知吾之一身億萬蒼生之身也則凡吾赤子之癢疴疾痛舉切其身矣太宗念蝗之為民害取而吞之曰寧食吾肺腸與湯之身代犧牲皆不自有其身者也其感天心也宜哉漢王嘉曰應天以實不以文此之謂也貞觀五年有司上書言皇太子將行冠禮冠去聲宜用二月為吉請追兵以備儀注太宗曰今東作方興恐妨農事令改用十月令平聲太子少保蕭瑀奏言凖隂陽家用二月為勝太宗曰隂陽拘忌朕所不行若動静必依隂陽不顧理義欲求福祐其可得乎若所行皆遵正道自然常與吉會且吉凶在人豈假隂陽拘忌農時甚要不可蹔失愚按夫子曰使民以時釋者曰時謂農隙無事之時使之不以其時則力本者不獲自盡雖有愛民之心而民不被其澤矣夫朝廷之上宫廷之間行儲君首服之禮固未至於使民而奪其時也而以追兵備儀妨農而止此太宗之心一念在民而不敢少弛也推是心於天下天下其有不務本者乎貞觀十六年太宗以天下粟價率計斗直五錢其尤賤處計斗直三錢因謂侍臣曰國以民為本人以食為命若禾黍不登則兆庶非國家所有既屬豐稔若斯朕為億兆人父母唯欲躬務儉約必不輒為奢侈朕常欲賜天下之人皆使富貴今省徭賦不奪其時使比屋之人比音鼻恣其耕稼此則富矣敦行禮讓使鄉閭之間少敬長少去聲長音掌妻敬夫此則貴矣但令天下皆然令平聲朕不聴管絃不從畋獵樂在其中矣樂音洛愚按論語曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之釋者曰庶而不富則民生不遂故制田里薄賦歛以富之富而不教則近於禽獸故必立學校明禮義以教之而孟子之告梁惠王亦曰王如施仁政於民省刑罰薄税歛深耕易耨壯者以暇日修其孝悌忠信此皆三代盛時所以王天下之要道也太宗謂朕欲賜天下人皆富貴省徭薄賦不奪其時恣其耕稼此則富矣敦行禮讓使鄉閭之間咸知敬順此則貴矣斯言也與孔孟之言同一揆也雖三代之治何以越此然貞觀之時亦云庶且富矣固嘗大召名儒增廣生員教亦云至矣朱子則謂其未知所以教也三代之教天子公卿躬行於上言行政事皆可師法太宗其能然乎愚謂太宗之言仁言也貞觀之政善政也孟子曰仁言不如仁聲之入人深善政不如善教之得民使太宗知此而力行之則所謂樂在其中者又當何如哉刑法第三十一凡九章貞觀元年太宗謂侍臣曰死者不可再生用法務在寛簡古人云鬻棺者欲嵗之疫非疾於人利於棺售故耳售音受賣也今法司覈理一獄必求深刻欲成其考課今作何法得使平允諫議大夫王珪進曰但選公直良善人斷獄允當者當去聲增秩賜金即姦偽自息詔從之太宗又曰古者斷獄必訊於三槐九棘之官周禮秋官左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位馬羣吏在其後面三槐三公位焉州長衆庶在其後今三公九卿三公見任賢篇註唐制九卿太常寺卿掌禮樂郊廟社稷之事光禄寺卿掌酒醴膳羞之政衛尉寺卿掌器械文物宗正寺卿掌天子族親屬籍以别昭穆太僕寺卿掌廏牧輦輿之政大理寺卿掌折獄詳刑鴻臚寺卿掌賓客凶儀之事司農寺卿掌倉儲委積之事太府寺卿掌財貨廩藏貿易皆有少卿以為之貳即其職也自今以後大辟罪辟音闢死刑也皆令平聲中書門下四品已上及尚書九卿議之如此庶免寃濫由是至四年斷死刑天下二十九人㡬致刑措㡬平聲舊本自太宗又曰以下另為一章今合為一章愚按昔舜命曰汝作士明於五刑以弼五教又曰刑期於無刑蓋帝王之治以教為先刑者不得已而行之以弼教而其心則期於無刑也然明用刑之要則曰惟明克允蓋明者所以得其情允者有以當於心理官之所重者在此而穆王訓刑尤切切於其審克之一語正奏讞詳審之謂也王珪謂必選公良直善之人斷獄允當者增秩賜金而太宗又使宰相及尚書九卿議之固宜致刑措之盛也夫唐虞之世期於無刑成周之隆至於刑措無刑尚矣刑措亦王者之極功也若漢之文景唐之太宗史臣皆以㡬致刑措美之自漢唐而論可謂仁君矣貞觀二年太宗謂侍臣曰比有比音鼻奴告主謀逆此極弊法特須禁斷假令平聲後同有謀反者必不獨成終將與人計之衆計之事必有他人論之豈藉奴告也自今奴告主者不須受盡令斬决愚按人臣謀逆此以下而叛上也奴告其主是亦以下而叛上也已惡人之叛上廼使叛上者得逞其志是以亂易亂相去㡬何太宗詔自今告主者勿受盡令斬决斯言一出固足以感格天下使無叛上之事矣貞觀五年張藴古為大理丞相州人李好徳相好並去聲後同素有風疾言涉妖妄詔令鞫其獄令平聲藴古言好徳癲病有徴法不當坐太宗許將寛宥藴古密報其㫖仍引與博戲治書侍御史權萬紀劾奏之太宗大怒令斬於東市既而悔之謂房𤣥齡曰公等食人之禄須憂人之憂事無巨細咸當留意今不問則不言見事都不諫諍何所輔弼如藴古身為法官與囚博戲漏洩朕言此亦罪狀甚重若據常律未至極刑朕當時盛怒即令處置處上聲後同公等竟無一言所司又不覆奏遂即决之豈是道理因詔曰凡有死刑雖令即決皆須五覆奏五覆奏自藴古始也又曰守文定罪或恐有寃自今以後門下省覆有據法令合死而情可矜者宜録奏聞藴古初以貞觀二年自幽州今大興路總管府記室兼直中書省表上大寳箴易大傳曰聖人之大寳曰位蓋取此義箴誡也文義甚美可為規誡其詞曰今來古往俯察仰觀惟辟作福辟音璧君也周書箕子陳洪範之辭為君實難孔子告魯定公曰為君難宅普天之下處王公之上任土貢其所有禹貢曰任土作貢具僚和其所唱和去聲是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯拯音軫屯諸倫切歸罪於己因心於人大明無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事見文史篇註出警而入蹕天子出稱警入稱蹕警者戒肅蹕者止行也四時調其慘舒三光同其得失故身為之度而聲為之律史記禹聲為律身為度注禹聲音應鍾律以身為法度勿謂無知居髙聴卑勿謂何害積小成大樂不可極樂音洛後同極樂成哀欲不可縱縱欲成災曲禮曰欲不可從樂不可極壯九重於内重平聲楚辭曰君門九重所居不過容膝彼昏不知瑤其臺而瓊其室桀作瑤臺紂作瓊室羅八珍於前周禮膳夫珍用八物謂淳熬淳母炮豚炮䍧𢷬珍漬熬肝膋所食不過適口惟狂罔念周書曰惟聖罔念作狂丘其糟而池其酒桀紂酒池可以運船糟隄可以望十里勿内荒於色勿外荒於禽夏書五子之歌其二曰訓有之内作色荒外作禽荒有一於此未或不亡色荒寵嬖女也禽荒耽遊畋也荒者迷荒之謂勿貴難得之貨老子曰不貴難得之貨使民不為盜勿聴亡國之音詩序曰亡國之音哀以思其民困内荒伐人性外荒蕩人心難得之物侈亡國之聲淫勿謂我尊而傲賢侮士勿謂我智而拒諫矜已聞之夏后據饋頻起史記夏后一饋而十起以勞天下之民亦有魏帝牽裾不止魏文帝欲徙冀州十萬户實河南辛毗諫帝不答起入内毗隨而引其裾帝怒良乆曰卿持我何太急耶於是從其半安彼反側如春陽秋露巍巍蕩蕩推漢髙大度漢紀髙祖寛仁有大度撫兹庶事如履薄臨深戰戰慄慄用周文小心詩小旻篇曰戰戰兢兢如臨深淵如履薄氷大明篇曰維此文王小心翼翼詩云不識不知詩皇矣篇曰不識不知順帝之則書曰無偏無黨周書曰無偏無黨王道蕩蕩一彼此於胷臆捐好惡於心想好惡並去聲衆棄而後加刑衆恱而後命賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自見音現如水如鏡不示物以形物之鑒者妍蚩自生勿渾渾而濁渾音溷勿皎皎而清勿汶汶而闇勿察察而明雖冕旒蔽目而視於未形冕十有二旒天子冠用五采藻為旒以藻貫五采王垂于綖之前後各十二取目不須視惡色之義雖黈纊塞耳而聴於無聲黈他口切纊音曠黈纊黄色綿也以黄綿為圓用組垂之于冕當兩耳旁示不聴讒邪也縱心乎湛然之域遊神於至道之精扣之者應洪纎而効響酌之者隨淺深而皆盈故曰天之清地之寧王之貞老子曰天得一以清地得一以寧王侯得一以為天下貞四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力戡音堪勝也人懼其威未懷其徳我皇撫運扇以淳風民懷其始未保其終爰􅄒金鏡窮神盡性使人以心應言以行去聲苞括理體抑揚辭令如字天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之争臣司直争讀曰諍敢告前疑太宗嘉之賜帛三百叚仍授以大理寺丞按通鑑無與囚博戲之説唐史張藴古無傳事見刑法志唐氏仲友曰張藴古文章鯁直之士太宗以一時誤見濫誅最為可惜大寳箴諷帝以民畏而未懷切中帝之病藴古敏書傳曉世務文擅當時加以切直太宗濫殺而悔則何益矣朱氏黼曰詩三百十一篇而疾讒者六君子有七惡而以訐為直居其一自昔賢智之棄逐政治之隳圯國家之昏亂未有不自讒訐也太宗方蒐積羣才共興治功乃復容萬紀輩玷汚朝列何哉房𤣥齡一代名相而萬紀以考選不公誣之張藴古平反妖言而萬紀以按事不實劾之𤣥齡以魏徴免按而藴古竟罹非命挾恩依勢逞其姦謀其為太宗盛徳累豈少乎詩曰讒人罔極交亂四國其萬紀也夫愚按自古王霸之辨治亂之分曰徳刑曰義利而已太宗知尚徳而不尚刑故能拒絶封徳彛法律之言知尚義而不知尚利故能斥權萬紀採銀之奏此其天資聰明最為合於帝王之道者也夫既知其言之非矣則廢逐其人可也封徳彛則任股肱之寄萬紀則居耳目之官徳彛論無忌佩刀之罪置校尉於死地萬紀論好徳妖言之罪陷藴古於非辜小人深文如出一律何太宗明於先而暗於後得於彼而失於此乎校尉以戴胄而免藴古則遂罹極刑愚觀藴古之箴曰衆棄而後加刑嗚呼藴古之罪豈所謂衆棄者邪亦可哀也已貞觀五年詔曰在京諸司比來比音鼻後同奏决死囚雖云五覆一日即了都未暇審思五奏何益縱有追悔又無所及自今後在京諸司奏决死囚宜三日中五覆奏天下諸州三覆奏又手詔勑曰比來有司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有寃自今門下省復有據法合死而情在可矜者宜録狀奏聞范氏祖禹曰易中孚之象曰君子以議獄緩死中孚者信發於中也議獄緩死者出於至誠也古者大司冦以獄之成告於王王命三公參聴之三公以獄之成告於王王三宥然後制刑先王重慎如此故刑清而民服若太宗之恤刑也可謂至誠而近於古矣㡬致刑措宜哉愚按易之象言刑獄者五而議獄緩死必見於中孚者蓋以君子者每於事於物無不用其中於人命所繫尤見中孚之至也獄者不得已而設議謂必究其情也死者不可以復生緩謂求所以生之也吕刑曰罔非在中又曰獄成而孚則中孚者誠議獄緩死之本也太宗恤刑之詔其出於中心之誠者歟亦近乎周官五聴三訊之遺意矣貞觀九年鹽澤道行軍總管􅡠州􅡠州今為西和州𨽻陜西都督髙甑生史無傳坐違李靖節度又誣告靖謀逆減死徙邊時有上言者曰甑生舊秦府功臣請寛其過太宗曰雖是藩邸舊勞誠不可忘然理國守法事須畫一今若赦之使開僥倖之路且國家建義太原元從及征戰有功者甚衆從去聲若甑生獲免誰不覬覦有功之人皆須犯法我所以必不赦者正為此也愚按諸葛武侯之治蜀也開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰堂堂三代之佐此後世之所不能也太宗以王魏為相以薛萬徹為將非所謂雖讐必賞歟至若髙甑生以秦府舊臣身從百戰一旦犯法黜之不疑非所謂雖親必罰歟嗚呼太宗之布公道其庶㡬武侯之治者乎貞觀十一年特進魏徴上疏曰臣聞書曰明徳慎罰周書康誥之辭惟刑恤哉虞書舜典之辭禮云為上易事易以豉切後同為下易知則刑不煩矣上人疑則百姓惑下難知則君長勞矣長音掌後同禮緇衣篇之辭夫音扶後同上易事則下易知君長不勞百姓不惑故君有一徳臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯起虞書臯陶賡歌曰庶事康哉當今道被華戎功髙宇宙無思不服無逺不臻然言尚於簡文志在於明察刑賞之用有所未盡夫刑賞之本在乎勸善而懲惡帝王之所以與天下為畫一不以貴賤親疎而輕重者也疎與疏同今之刑賞未必盡然或屈伸在乎好惡並去聲後同或輕重由乎喜怒遇喜則矜其情於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢音盤瘢痕可求則刑斯濫矣毛羽可出則賞因謬矣刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老孔子老聃也威怒所至則取法於申韓申不害韓非皆戰國刑名之學直道而行非無三黜三去聲論語曰栁下惠直道而事人焉徃而不三黜危人自安蓋亦多矣故道徳之㫖未𢎞刻薄之風已扇夫刻薄既扇則下生百端人競趍時則憲章不一稽之王度稽音覊實虧君道昔州犂上下其手楚國之法遂差左傳襄公二十六年楚與秦侵鄭楚穿封戍囚鄭皇頡公子圍與之争正於伯州犂州犂乃立囚曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍抽戈逐王子圍弗及楚人以皇頡歸張湯輕重其心漢朝之刑以弊漢張湯為廷尉鄉上意所便其所治即上意所欲辠子監史深刻者即上意所欲釋予監史輕平者所治即豪必舞文巧詆即下戸羸弱時口言雖文致法上裁察帝於是往往釋湯所言出本傳以人臣之頗僻頗平聲猶莫能申其欺罔况人君之髙下將何以措其手足乎以睿聖之聰明無幽㣲而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂音洛上同遂忘先笑之變禍福相倚吉凶同域惟人所召安可不思頃者責罰稍多威怒㣲厲或以供帳不贍或以營作差違或以物不稱心稱去聲或以人不從命皆非致治之所急實恐驕奢之攸漸是知貴不與驕期而驕自至富不與侈期而侈自來非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府藏去聲譬今日之資儲以隋氏之甲兵况當今之士馬以隋氏之户口校今時之百姓度長比大度待洛切曾何等級曾音層然隋氏以富强而喪敗動之也我以貧窮而安寧静之也静之則安動之則亂人皆知之非隱而難見也非㣲而難察也然鮮蹈平易之塗鮮上聲易以豉切後同多遵覆車之轍何哉在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至於將受戮辱竟未悟其滅亡之所由也可不哀哉夫鑒形之美惡必就於止水鑒國之安危必取於亡國故詩曰殷鑒不逺在夏后之世詩大雅蕩篇之辭又曰伐柯伐柯其則不逺詩豳風伐柯篇之辭臣願當今之動静必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜欲以從人省遊畋之娯息靡麗之作罷不急之務慎偏聴之怒近忠厚逺便佞逺去聲便平聲杜悦耳之邪説甘苦口之忠言去易進之人賤難得之貨採堯舜之誹謗堯舜設誹謗之木於五達之衢以書政治之愆失追禹湯之罪已左傳禹湯罪已其興也勃焉惜十家之産見納諫篇注順百姓之心近取諸身恕以待物思勞謙以受益易謙卦九三勞謙君子有終吉不自滿以招損虞書曰滿招損謙受益有動則庶𩔖以和出言而千里斯應易大傳曰君子居其室出其言善則千里之外應之超上徳於前載樹風聲於後昆此聖哲之宏規而帝王之大業能事斯畢在乎慎守而已夫守之則易取之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢淫泆動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保也易文言傳釋否九五爻義誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若以當今之無事行疇昔之恭儉則盡善盡美矣固無得而稱焉太宗深嘉而納用按史傳上幸洛陽次昭仁宫多所譴責徴諫曰隋惟責不獻食或供奉不精為此無限而至於亡故天命陛下代之正當兢懼戒約奈何令人悔為不奢若以為足今不啻足矣以為不足萬此寧有足邪上驚曰非公不聞此言退又上疏云云唐氏仲友曰徴言刑賞之本在乎勸善而懲惡今之刑賞或由喜怒此即皇極所謂王道書曰無有作好無有作惡惟辟作福惟辟作威二説並行而不相悖無作好惡道也惟作威福權也徳大而常禮不足以賞於是乎有作福罪大而常法不足以誅於是乎有作威此非有司之法守而出乎人君之權者雖作福而徳稱乎賞豈作好哉雖作威而罪宜乎誅豈作惡哉然則賞刑非不由喜怒也不由乎一人之私喜怒也愚按漢世賢良之策曰上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵賞而民不勸重刑罰而姦不止其上不正遇民不信也夫子曰其身正不令而行其身不正雖令不從又曰人而無信不知其可也其是之謂歟夫以太宗之世嘉善賞功之制明罰恤民之詔屢形於言亦可謂兢兢於君道者然而刑賞之失猶有如魏徵之言者豈正身之道未有以盡於己乎抑信未足以孚於民乎觀徴所謂欲善之志不減而改過之心少虧其未能正於己而信於民者可想見已雖然徴之疏必諄諄以隋為戒若致儆於庸君常主之前者亦猶賈山於漢而借秦為喻之意憂治危明之心也若徴者可謂忠愛其君者矣貞觀十四年戴州濟北地今廢刺史賈崇以所部有犯十惡者被刺史劾奏太宗謂侍臣曰昔陶唐大聖栁下惠大賢其子丹朱甚不肖其弟盜跖為巨惡盜跖莊子雜篇以為栁下惠之弟名跖而為大盜夫以夫音扶聖賢之訓父子兄弟之親尚不能使陶染變革去惡從善去上聲今遣刺史化被下人咸歸善道豈可得也若令平聲後同縁此皆被貶降或恐遞相掩蔽罪人斯失諸州有犯十惡者刺史不須從坐但令明加糾訪科罪庶可肅清姦惡愚按夫子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格謂政刑之不如徳禮也蓋政者為治之具刑者輔治之法徳禮者出治之本而徳又禮之本也後世之為治者徳禮有愧教化不先非惟徳禮不能使民有耻且格而政刑亦不能使民免而無耻矣甚而至於罪麗於十惡尚忍言之哉然究厥本原則承流宣化坐罪宜也而遂至於遞相掩蔽罪人斯失反以長姦容慝遂使麗於十惡者乃得全身於覆載之間而可乎哉太宗不坐刺史但令明加糾察以正其罪蓋深有以知其弊而不得不然也司牧民者其亦於徳禮政刑而知本末先後哉貞觀十六年太宗謂大理卿孫伏伽貝州人武徳初上言三事帝曰可謂誼臣矣貞觀中拜御史累遷大理卿曰夫作甲者夫音扶欲其堅恐人之傷作箭者欲其鋭恐人不傷何則各有司存利在稱職故也稱去聲朕常問法官刑罰輕重每稱法網寛於往代仍恐主獄之司利在殺人危人自達以釣聲價今之所憂正在此耳深宜禁止務在寛平唐氏仲友曰太宗留心聴斷天下刑㡬措固嘗拒封徳彛刑法伯道之説從魏公仁義之言雖道徳齊禮未純三代而欽恤之意形矣惜哉後世之不能守也愚按漢景帝之詔有曰欲令理獄者務先寛又曰獄者人之大命死者不可復生吏或不奉法以貨賂為市朋黨比周以苛為察以刻為明罪者不服姦法為暴甚無謂也諸獄雖疑若文致於法而罪人心不厭者則讞之誠後王之所當知也太宗謂恐主獄之司利在殺人危人自達深宜禁止務在寛平斯言也與景帝之詔同一仁心也史臣俱以刑措美之宜哉蓋寛則矜恕可得其情急則殘忍有失其情者矣然寛非縱弛之謂也寛而流於縱弛則幸免者有焉今曰務在寛平則平若持衡輕重不失矣罪在於輕而從輕罪在於重而從重此平也實寛之所致也則寛平者實明刑之典要歟赦令第三十二凡四章貞觀七年太宗謂侍臣曰天下愚人者多智人者少智者不肯為惡愚人好犯憲章好去聲凡赦宥之恩惟及不軌之輩古語云小人之幸君子之不幸一嵗再赦善人喑啞凡養稂莠者傷禾稼稂莠音郎酉革之害稼者惠姦宄者賊良人宄音詭昔文王作罰刑兹無赦周書康誥武王之辭又蜀先主姓劉名備字𤣥徳漢中山靖王之後三國時繼漢統都蜀嘗謂諸葛亮曰吾周旋陳元方鄭康成之間元方名紀康成名𤣥並後漢人每見啟告理亂之道備矣曾不語赦曾音層故諸葛亮理蜀十年不赦而蜀大化梁武帝每年數赦數音朔後同卒至傾敗卒子聿切夫謀小仁者夫音扶大仁之賊故我有天下已來絶不放赦今四海安寧禮義興行非常之恩彌不可數將恐愚人常冀僥倖惟欲犯法不能改過范氏祖禹曰數赦之害前世論之詳矣夫良民不被澤而罪人獲宥政之偏黨莫甚於此欲以致和而措刑不亦疎乎而人君每以赦為推恩或祈隂徳之報太宗懲之可謂善治矣馬氏存曰先王以教而化民以刑而禁民不幸或陷於憲網者聖人則原其情而省其過之大小而肆赦之蓋赦者聖人以之宥過也可以行而不行則傷乎仁不可以行而行之則失乎義故世之議者或以宜疎而不宜數或以宜數而不宜疎是疎者太簡數者太繁蓋惟當語其當否而不論其疎數也故周官三宥三赦之法曰不識曰過失曰遺忘以為宥之可用止於如此曰幼弱曰老耄曰惷愚則以為赦之可行止於如此由是觀之赦宥之法當其時而用之則為天下之利不當其時而用之則為天下之害故魯肆大眚春秋譏之管仲亦曰赦者小利而大害久而不勝其禍無赦宥者小害而大利久而不勝其福以為天下之民知赦之福而不知無赦之為福是亦議其赦之大者乎愚按書曰𤯝災肆赦怙終賊刑𤯝過誤也災不幸也故肆赦之怙有恃也終再犯也故賊刑之此聖人用法之權衡而忠厚之意寓於其間未聞不擇罪之輕重而悉赦之也易曰雷雨作解君子以赦過宥罪雷動而雨作天澤所施溥矣而曰赦過宥罪過之小者赦釋之罪之大者寛宥之而已亦非謂不擇罪之大小而悉赦之也故春秋莊公之世肆大眚聖人以為非常之事書之於經正以其非古也自是而赦令數矣然或者因天下有非常之事與夫凶荒流離之後盗賊垢汙之餘於是有以沛然洗濯於天下不得已而用之猶云可也否則雖足以見仁惠而未免所謂小人之幸而君子之不幸矣為人上者操刑賞之柄以勸善懲惡酌古之道揆今之宜必赦過宥罪而不可數要為得中也太宗謂絶不放赦而四海安寧非常之恩彌不可數其深有見於治道者哉貞觀十年太宗謂侍臣曰國家法令惟須簡約不可一罪作數種條格式既多官人不能盡記更生姦詐若欲出罪即引輕條若欲入罪即引重條數變法者數音朔實不益道理宜令審細令平聲毋使互文毋無通貞觀十一年太宗謂侍臣曰詔令格式若不常定則人心多惑姦詐益生周易稱渙汗其大號易渙卦九五爻辭言發號施令施平聲若汗出於體一出而不復也書曰慎乃出令令出惟行弗惟反周書周官之辭且漢祖日不暇給蕭何起於小吏制法之後猶稱畫一今宜詳思此義不可輕出詔令必須審定以為永式愚按唐之刑書有四曰律令格式令者尊卑貴賤之等殺國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於三者其有所違及人之為惡而入於罪戾者一斷之以律律之書凡十二篇所以使民遷善逺罪而無犯也皆太宗詔房𤣥齡等與法司因隋之舊而更定增損多降重為輕迄貞觀用之無所變改夫律令格式皆所以用法也太宗謂貴簡約貴常定此最為知法意者夫不簡約則出入輕重吏因之而作弊不常定則朝行夕改民莫知所信從太宗取則於蕭何畫一之法而不輕於數變法必須審定以為永式能致刑措實由此也長孫皇后遇疾漸危篤皇太子承乾也啟后曰醫藥備盡今尊體不瘳音抽愈也請奏赦囚徒并度人入道冀䝉福祐后曰死生有命非人力所加若修福可延吾素非為惡者若行善無效何福可求赦者國之大事佛道者上每示存異方之教耳常恐為理體之弊豈以吾一婦人而亂天下法不能依汝言按通鑑貞觀九年長孫皇后素有氣疾前年從上幸九成宫柴紹等中夕告變上擐甲出閤問狀后扶疾以從左右止之后曰上既震驚吾何心自安由是疾甚太子曰云云后曰云云必行汝言吾不如速死太子私以語房𤣥齡𤣥齡白上上哀之欲為之赦后固止之唐氏仲友曰天啟興運亦不偶然助興運必有賢妃以漢唐論長孫賢於隂馬有古后妃之美無後世后妃之失太宗謂内良佐信夫愚按三代興王之主無不内有賢助以協成至治任姒邑姜其表表於經傳者為天下母儀之所取則焉若長孫皇后之賢自三代而下之絶無僅有者也馬鄧不足以儕之矣遇危疾而不以肆赦徼福非卓然有見何以能兹不幸而弗登耆艾宜太宗有失内良佐之歎也天假之年使之擁佑於髙宗之世則庶㡬其遏禍亂之萌乎此可為深悲也貢賦第三十三凡五章貞觀二年太宗謂朝集使曰使去聲唐制諸州奉貢物入京者謂之朝集使任土作貢布在前典當州所産則充庭實當去聲比聞都督刺史比音鼻邀射聲名厥土所賦或嫌其不善踰境外求更相倣傚更平聲遂以成俗極為勞擾宜改此弊不得更然愚按夏書載禹平水土之績而以貢名篇貢者下獻上之名水土未平何由定貢書以貢名見地平天成之功也然曰任土作貢者亦非以其土之所有而悉貢也禹貢一書其所貢者皆服食器用之常宗廟朝廷之不可闕者非徒奉一人耳目心志之所欲也而唐之刺史至于越境求物更相倣傚亦由國無定制使踰越于常度之外太宗深懲而力革其弊誠王者之先務也貞觀中林邑國貢白鸚鵡性辨慧尤善應答屢有苦寒之言太宗愍之付其使令還於林邑使去聲令平聲按通鑑貞觀五年十一月林邑獻五色鸚鵡魏徵以為不宜受上喜而歸之愚按周書載召公戒武王之言曰犬馬非其土性不畜珍禽異獸不育于國其後穆王得白狼白鹿而荒服因以不至其得失可睹也太宗却林邑白鸚鵡之獻可謂能遵古先哲之訓而鑒後世之失矣貞觀十二年疎勒朱俱波甘棠皆西域國名疎勒距長安九千里餘王姓裴氏朱俱波在葱嶺之西甘棠在大海南遣使貢方物使去聲後同太宗謂羣臣曰向使中國不安日南南蠻國在安南之外西域朝貢使亦何緣而至朕何徳以堪之覩此翻懷危懼近代平一天下拓定邊方者拓音托惟秦皇漢武始皇暴虐至子而亡漢武驕奢國祚幾絶幾平聲朕提三尺劒以定四海逺夷率服億兆乂安自謂不減二主也然二主末途皆不能自保由是每自懼危亡必不敢懈怠惟藉公等直言正諫以相匡弼若惟揚美隐惡共進䛕言則國之危亡可立而待也按通鑑係貞觀九年十二月唐氏仲友曰太宗因四夷之賓而以秦皇漢武自儆求輔弼之言此忠言可進之機惜哉𤣥齡無杜漸之言俾進乎帝王保治之道也愚按昔武王克商西旅底貢厥獒大保作旅獒用訓于王而致慎徳之戒夫以武王之聖而召公所以警戒之者如此後之人主可不深思而加念之哉太宗因四夷之賓以秦皇漢武自儆以求言而當時大臣雖不聞有如太保作書之訓然自懷危亡不敢懈怠有合于夙夜罔或不勤之言庶幾乎帝王保治之道矣貞觀十八年太宗將伐髙麗其莫離支髙麗官名其職如中國吏部兼兵部尚書也貞觀十六年髙麗東部大人泉蓋蘇文弑其王武立王弟子藏為王自為莫離支官遣使去聲貢白金黄門侍郎褚遂良諫曰莫離支虐殺其主九夷所不容東方之夷有九種曰畎夷于夷方夷黄夷白夷赤夷𤣥夷風夷陽夷又一曰𤣥莬二曰樂浪三曰髙儷四曰滿飭五曰鳬㬰六曰索家七曰東屠八曰倭人九曰天都陛下以之興兵將事弔伐為遼東之人為去聲報主辱之恥古者討弑君之賊不受其賂昔宋督宋春秋時國名字華父宋戴公孫也遺魯君以郜鼎遺去聲魯君桓公名軌郜鼎郜國所造器故繫名於郜桓公受之於大廟大音泰後同大廟周公之廟也臧哀伯魯大夫臧孫達也諫曰君人者將昭徳塞違今滅徳立違而寘其賂器於大廟百官象之又何誅焉武王克商遷九鼎于雒邑九鼎殷所受夏鼎也武王克商乃營雒邑而後去之又遷九鼎焉義士猶或非之蓋伯夷之屬而况將昭違亂之賂器寘諸大廟其若之何事見左傳桓公二年宋督弑其君殤公與夷以郜鼎賂公故遂相宋公四月取郜鼎于宋納于大廟臧哀伯諫曰云云公不聴夫音扶春秋之書百王取則若受不臣之筐篚納弑逆之朝貢不以為愆將何致伐臣謂莫離支所獻自不合受太宗從之按通鑑太宗又謂髙麗使者曰汝曹皆事髙武有官爵莫離支弑逆汝曹不能復讐今更為之遊説以欺大國罪孰大焉悉以屬大理唐氏仲友曰名其為賊乃可服之此兵法也太宗固深忿莫離支必欲討之其貢使之來欲治之而未有辭遂良之諫與太宗意會宜其從之之速也愚按褚遂良援古證今諫太宗卻莫離支之獻則善矣而不能因以消其忿兵黷武之心而其諫辭與太宗意會卒成遼水之征惜哉貞觀十九年髙麗王髙藏藏去聲髙麗王名及莫離支蓋蘇文蓋音盍髙麗臣名金蓋蘇文既弑其王武於是專擅國事其狀貌雄偉意氣豪逸身佩五刀左右莫敢仰視常令貴人武將伏地而履之上馬出行必整隊伍導者長呼則人皆奔迸不避坑谷路絶行者國人甚苦之遣使去聲獻二美女太宗謂其使曰朕憫此女離其父母兄弟於本國若愛其色而傷其心我不取也並却還之本國按通鑑係貞觀二十年愚按周書曰明王慎徳四夷咸賓無有逺邇畢獻方物惟服食器用未聞以美女為貢者也適足以亂人之國而已矣昔紂受閎夭美女之獻而西伯興魯受齊人女樂之歸而孔子行蓋自古臣下之詭計列國之隂謀未有不以女子為間使之先有以惑其耳目移其心志或乘隙以沮敗其所為或遂中以不測之禍可不慎哉髙麗美女之貢夫豈不為是邪况當興師致討之時乎太宗還之謂不欲傷其心固仁惻之意亦豈非有見於此邪若太宗其可謂賢君也已辨興亡第三十四凡四章貞觀初太宗從容從即容切謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右僕射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而會武王伐紂諸侯會孟津者八百餘國周室㣲六國無罪秦氏專任智力吞食諸侯平定雖同人情則異太宗曰不然周既克殷務𢎞仁義秦既得志專行詐力非但取之有異抑亦守之不同祚之修短意在兹乎愚按太宗君臣嘗論創業守成孰難𤣥齡以創業為難魏徴以守成為難夫創業者既往之事守成者方來之事也與其追論於既往曷若致力於方來者為有益乎他日與羣臣論周秦運祚長短之由蕭瑀之言即創業之事太宗之言即守成之事也夫所貴乎君臣之間講論古今者欲其反之於己而推之於治也取天下之事太宗既已身親之矣方當即位之初所宜監秦之所以失效周之所以得庶乎如周祚之長不至如秦祚之短也嗚呼太宗之言可謂能切已近思者矣貞觀二年太宗謂黄門侍郎王珪曰隋開皇十四年大旱人多饑乏是時倉庫盈溢竟不許賑給乃令平聲百姓逐糧隋文不憐百姓而惜倉庫比至末年比音鼻計天下儲積得供五六十年供平聲煬帝恃此富饒所以奢華無道遂致滅亡煬帝失國亦此之由凡理國者務積於人不在盈其倉庫古人云百姓不足君孰與足論語有若對魯哀公之辭但使倉庫可備凶年此外何煩儲蓄後嗣若賢自能保其天下如其不肖多積倉庫徒益其奢侈危亡之本也舊本此章重出奢縱篇今去彼存此愚按古者三年耕必有一年之食以三十年之通制國用雖有凶旱水溢民無菜色此蓄積者所以為民非為君也百姓足孰與不足聖經所以垂訓而公私之積猶可哀痛賈誼所以言於漢文帝之時也蓋蓄積固有國之先務也至於蓄積豐富侈心一生貫朽粟陳不足以供排山倒海之欲非惟無可以養民且至於厲民矣太宗謂但使倉廩可備凶年此外何煩儲蓄此得古人制國用之意良足取也貞觀五年太宗謂侍臣曰天道福善禍淫事猶影響昔啟人本突厥啟民可汗避太宗諱改曰人亡國來奔隋文帝不恡粟帛大興士衆營衛安置乃得存立既而彊富子孫不思念報徳纔至失脱即起兵圍煬帝於鴈門郡名今為代州𨽻腹裏及隋國亂又恃彊深入遂使昔安立其國家者身及子孫並為頡利破亡豈非背恩忘義所至也羣臣咸曰誠如聖㫖愚按三代之待夷狄也來者不拒去者不追蓋不以中國之治治之也文王之伐玁狁止於城彼朔方而已宣王之伐淮夷止於徐方來庭而已曷嘗盡欲郡縣其地而臣妾其人哉後世不明華夷之辨務為懷逺之圗適以自遺患而已矣故漢宣扶立呼韓而建武多北邊之擾隋文撫存啟民而煬帝有鴈門之圍由不能以三代為法故也可不戒哉貞觀九年北蕃北突厥之國歸朝人奏突厥内大雪人饑羊馬並死中國人在彼者皆入山作賊人情大惡太宗謂侍臣曰觀古人君行仁義任賢良則理行暴亂任小人則敗突厥所信任者並共公等見之畧無忠正可取者頡利復不憂百姓恣情所為朕以人事觀之亦何可久矣魏徴進曰昔魏文侯名斯晉卿桓子之子為諸侯問李克戰國時人諸侯誰先亡克曰呉先亡文侯曰何故克曰數戰數勝數並音朔後同數勝則主驕數戰則民疲不亡何待頡利逢隋末中國喪亂遂恃衆内侵今尚不息此其必亡之道太宗深然之愚按大雪人饑羊馬並死突厥將亡之徴也太宗不以此論其必亡而以不任忠良不憂百姓知其必亡可謂善觀人之國矣然魏徴論呉亡之事則又有深意焉蓋頡利固數戰數勝者也太宗自起兵已來亦豈非數戰數勝者乎觀頡利之亡亦可惕然而懼矣厥後太宗既老而復興髙麗之師殆近於李克之所論者太宗固曰魏徴若在不使我有是行豈不信㢤貞觀九年太宗謂魏徴曰頃讀周齊史末代亡國之主為惡多相𩔖也齊主齊後主也名緯世祖之子深好奢侈好去聲所有府庫用之畧盡乃至關市無不税歛去聲朕常謂此猶如饞人自食其肉肉盡必死人君賦歛不已百姓既弊其君亦亡齊主即是也然天元後周宣帝名贇自稱天元皇帝齊主若為優劣徴對曰二主亡國雖同其行則别行去聲齊主愞弱愞與懦同政出多門國無綱紀遂至亡滅天元性兇而强威福在已亡國之事皆在其身以此論之齊主為劣舊本此章重出奢縱篇今去彼存此愚按詩曰殷鑒不逺在夏后之世又曰宜鑒於殷峻命不易夫殷之鑒以夏周之鑒以殷太宗以開基之明君而能以亡國之庸君為鑒可謂知所鑒矣其得為寡過也宜哉至論周齊之治孰優魏徴以齊主為劣愚觀周子之書有剛惡柔惡之説然則天元其剛惡齊主其柔惡歟剛柔雖異亡國則一政未易以優劣論也貞觀政要卷八
