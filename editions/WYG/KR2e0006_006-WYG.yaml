canonical_identifier: bkk:krp/KR2e0006/WYG/v1/juan/6
seq: 6
front:
  text: 之降乃引弓射殺之嘗曰大義不得不死後為左右所害往在大業受任河東固守忠義克終臣節雖桀犬吠堯漢書曰桀犬吠堯堯非不仁特吠非其主耳有乖倒戈之志周書曰前徒倒戈言衆服周仁政無有戰心前徒倒戈自攻于後也疾風勁草實表嵗寒之心爰踐兹境追懐往事宜錫寵命以申勸奬可追贈蒲州刺史仍訪其子孫以聞
  hash: sha256:6dc7e1938ac4eb67adea16aae35cff4a38be7242381f64ebc6247b9083f93d3c
body:
  text: 愚按漢髙祖赦季布唐太宗褒堯君素皆帝王盛徳事也然合二子而論之則君素為賢何也季布身為楚將數窘沛公此人臣之常事國亡不能死而逃何足深取哉唐室方興兵精將勇戰無不勝攻無不破君素以區區一城之衆外無彊援徒以忠義激勵士卒自義寧元年至武徳三年始終四載唐朝凡易數將僅能克之此不唯忠義可嘉其知勇才能亦古今所罕有也嗚呼難哉太宗不惟褒贈又訪錄其子孫忠義之士其有不興起者乎貞觀十二年太宗謂中書侍郎岑文本曰梁陳梁姓蕭氏受齊禪陳姓陳氏受梁禪名臣有誰可稱復有子弟堪招引否文本奏言隋師入陳百司奔散莫有留者惟尚書僕射袁憲獨在其主之傍王世充將受隋禪羣僚表請勸進憲子國子司業承家託疾獨不署名此之父子足稱忠烈承家弟承序今為建昌令建昌縣名今陞州屬南康路𨽻江西清貞雅操實繼先風由是召拜晉王友兼令侍讀令平聲唐制諸王友掌陪侍逰居規諷道義侍讀掌講道經學尋授𢎞文館學士唐氏仲友曰古人云一心可以事百君其袁氏子弟之謂歟忠謹風操不忍負主誰不欲之為人臣乎為之者勉之而已愚按梁陳於唐相距頗逺猶有招引名臣子孫之言太宗之意深逺矣岑文本謂隋師入陳袁憲有獨侍其主之忠王世充受禪憲之子獨不署名其弟又清貞雅操一門父子兄弟忠義傳家而不著聞向非太宗心存忠義之臣而興言及此非文本之公忠不揜人善如此則袁氏之忠節何由著聞哉貞觀十五年詔曰朕聴朝之暇觀前史每覽前賢佐時忠臣狥國何嘗不想見其人廢書欽歎至於近代以来年嵗非逺然其𦙍緒或當見存見音現縱未能顯加旌表無容棄之遐裔其周隋二代名臣及忠節子孫有貞觀已来犯罪配流者宜令平聲所司具錄奏聞於是多從矜宥舊本此章在刑法篇今附入于此愚按太宗好賢可以為至矣不唯尊榮其朝臣又能上及扵前朝焉不唯登崇其一身又能下及扵後裔焉是故祭比干之靈封楊震之墓褒贈君素之官爵錄用諸儒之子孫今也又詔周隋名臣之後配流者悉從矜宥則凡列在庶位者孰不知所勸乎宜其忠良之士彬彬輩出有以開三百年之休運也嗚呼盛哉貞觀十九年太宗攻遼東安市城今為安市州𨽻鎮東髙麗人衆皆死戰詔令耨薩延夀惠真等降音杭耨薩髙延夀北部耨薩髙惠真南部衆止其城下以招之城中堅守不動每見帝幡旗必乗城皷譟乗平聲帝怒甚詔江夏王道宗髙祖從兄弟字承範年十七從秦王討賊有功初封任城後封江夏郡道宗好學接士不倨于貴為宗室最賢築土山以攻其城竟不能尅太宗將旋師嘉安市城主堅守臣節賜絹三百匹以勸勵事君者舊本此章與第十二章合為一章今按通鑑標年附入于此又按通鑑太宗親征遼東令李勣攻安市安市人望見旗盖輒乗城鼓譟上怒勣請克城之日男子皆阬之安市人聞之益堅守久不下江夏王道宗築土山於城東浸逼其城城中亦增髙其城以拒之又衝車礮石壊其城堞城中隨立木柵以塞之築山晝夜不息凡六旬用功五十萬山頽壓城崩城中數百人出戰遂奪據土山而守之諸將攻二日不克上以天寒糧盡先㧞遼盖二州户口渡遼乃耀兵城下而旋城中皆屏跡不出城主登城拜辭上嘉其固守賜縑百匹愚按遼東之役與前日義師有間矣夫以太宗之英武戡定禍亂於羣雄競起之日天戈所指夷貊不能嬰其鋒而晚年悉乃心力不能制服一逺國何哉退而嘉安市城主堅守之節賞賜以旌之以勵事君者斯意固羙矣然不若不黷武之尤全羙也孝友第十五凡五章司空房𤣥齡事繼母能以色養去聲恭謹過人其母病請醫人至門必迎拜垂泣及居䘮平聲尤甚柴毁言毁瘠如柴也太宗命散騎常侍劉洎就加寛譬遺寢床粥食鹽菜遺去聲愚按孝經傳曰事親孝故忠可移于君盖天理根於人心其發見於事親者此理也發見于事君者此理也忠孝豈二道哉故求忠臣于孝子之門未有事親孝而事君不忠者思修身不可以不事親未有身不修而可以治國平天下者房𤣥齡唐之名相而孝之至固宜忠之盡也且昔之以孝聞者如閔損王祥之𩔖皆繼母也夫是之謂孝𤣥齡其知此矣虞世南初仕隋歴起居舍人隋制掌書王言動作之事以為國志宇文化及殺逆之際殺讀曰弑其兄世基時為内史侍郎隋改中書為内史將被誅世南抱持號泣號平聲請以身代死化及竟不納世南自此哀毁骨立者數載時人稱重焉愚按虞世基兄弟出于吳中嘗從顧野王學一時文學才譽人比之晉二陸入隋而俱登班列世基與宇文化及之難世南不愛其身求代其兄其孝友可尚已世南歸唐為唐名卿盖其温恭豈弟出於天性云韓王元嘉髙祖第十一子也少好學藏書至萬卷皆以古文參定同異當世稱之貞觀初史作六年為潞州刺史潞州今仍舊𨽻河東時年十五在州聞太妃有疾太妃韓王之母隋大將軍宇文述之女也為昭儀有寵髙祖即位欲立為后固辭不受韓王以母有寵而為帝所愛便涕泣不食及至京師發䘮平聲哀毁過禮太宗嘉其至性屢慰勉之元嘉閨門修整有𩔖寒素士大夫與其弟魯哀王靈䕫髙祖第十九子韓王同母弟也好學善音律後以謀欲起兵應接越王貞父子事洩自縊謚曰哀甚相友愛兄弟集見如布衣之禮其修身潔已内外如一當代諸王莫能及者霍王元軌髙祖第十四子也多才藝出為刺史所至閉閤讀書與處士劉𤣥平為布衣交或問王所長𤣥平曰王無不備吾何以稱之武徳中初封為吳王武徳六年封蜀王八年徙封吳王貞觀七年為夀州刺史夀州今為安豐路𨽻淮西屬髙祖崩去職毁瘠過禮自後常衣布服衣去聲示有終身之戚太宗嘗問侍臣曰朕子弟孰賢侍中魏徵對曰臣愚暗不盡知其能惟吳王數與臣言數音朔臣未嘗不自失太宗曰卿以為前代誰比徵曰經學文雅亦漢之間平漢河間獻王徳東平憲王蒼也至如孝行去聲乃古之曾閔也曾參閔損也由是寵遇彌厚因令妻徵女焉令平聲妻去聲愚按孟子言性善堯舜至于塗人一也王孫公子之貴其性豈與人異哉孟子所謂其居使之然也觀太宗諸弟若韓王元嘉霍王元軌天性之孝友居處之儉約操履之修潔有一介之士所難能者可謂賢也已矣是尤見人性之初無爾殊也彼昏不知者乃自絶其天理耳貞觀中有突厥史行昌突厥阿史那氏此因以史為姓行昌其名也直𤣥武門𤣥武北方宿名取以名門也食而捨肉人問其故曰歸以奉母太宗聞而歎曰仁孝之性豈隔華夷賜尚乗馬一疋乗去聲尚乗主車乗之官詔令給其母肉料令平聲愚按一直門之士夷貊之人也而有孝于其母之心事聞於萬乗獲仁孝之褒優賜之厚則有人心者孰不感發於孝乎公平第十六凡八章太宗初即位中書令房𤣥齡奏言秦府舊左右未得官者並怨前宫及齊府左右處分之先已處上聲分先並去聲太宗曰古稱至公者盖謂平恕無私丹朱商均子也而堯舜廢之堯知子丹朱之不肖不足授天下卒授舜舜之子商均亦不肖乃以天下授禹管叔蔡叔兄弟也而周公誅之管叔名鮮蔡叔名度皆文王之子也武王既克殷封鮮于管封度于蔡相紂子武庚祿父治殷遺民武王崩成王少周公旦專王室叔疑之乃挟武庚作亂周公承王命遂誅武庚殺管叔流蔡叔故知君人者以天下為公無私於物昔諸葛孔眀小國之相去聲諸葛複姓字孔眀名亮琅琊人為蜀丞相猶曰吾心如稱與秤同不能為人作輕重為去聲後同况我今理大國乎朕與公等衣食出于百姓此則人力己奉於上而上恩未被於下今所以擇賢才者盖為求安百姓也用人但問堪否豈以新故異情凡一靣尚且相親况舊人而頓忘也才若不堪亦豈以舊人而先用今不論其能不能而直言其嗟怨豈是至公之道耶貞觀元年有上封事者請秦府舊兵並授以武職追入宿衛太宗謂曰朕以天下為家不能私於一物惟有才行是任行去聲豈以新舊為差况古人云兵猶火也弗戢將自焚汝之此意非益政理愚按書曰天視自我民視天聴自我民聴天無視聴以民為視聴一至公而已太宗踐祚之初首發至公無私之論古帝王憲天聰眀用是道也房𤣥齡言秦府未得官者共怨前宫齊府左右之先已則曰用人惟才不論舊故不如是則私故府之士矣有請秦府舊兵授以武職追入宿衛則曰唯有才行是任豈以新舊為差不如是則私故府之兵矣君天下者毎以至公存心何往而不當于人心乎貞觀元年吏部尚書長孫無忌嘗被召不解佩刀入東上閣門出閣門後監門校尉始覺尚書右僕射封徳彛議以監門校尉不覺罪當死無忌誤帶刀入徒二年罰銅二十斤太宗從之大理少卿少去聲卿之貳也戴胄駁曰校尉不覺無忌帶刀入内同為誤耳夫臣子之於尊極夫音扶不得稱誤准律云供御湯藥飲食舟船誤不如法者皆死陛下若錄其功非憲司所决若當據法罰銅未為得理太宗曰法者非朕一人之法乃天下之法何得以無忌國之親戚便欲撓法耶更令定議令平聲後同徳彛執議如初太宗將從其議胄又駮奏曰校尉緣無忌以致罪於法當輕若論其過誤則為情一也為情如字而生死頓殊敢以固請太宗乃免校尉之死是時朝廷大開選舉或有詐偽階資者太宗令其自首首去聲後同不首罪至於死俄有詐偽者事洩胄據法斷流以奏之太宗曰朕初下敕不首者死今斷從流是示天下以不信矣胄曰陛下當即殺之非臣所及既付所司臣不敢虧法太宗曰卿自守法而令朕失信耶胄曰法者國家所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿朝音昭而許殺之既知不可而寘之以法此乃忍小忿而存大信臣竊為陛下惜之為去聲太宗曰朕法有所失卿能正之朕復何憂也張氏九成曰法者天下公共雖天子喜怒不得輕重胄為大理之議可謂用法平允矣守所司之法不顧天子之詔救上之失逹君之聴使四海取信民不寃濫為吏若此國家何所患哉唐氏仲友曰書曰無虐㷀獨而畏髙眀盖小人之情必虐㷀獨而畏髙眀君子反是向無胄之言則太宗為失刑背皇極之訓矣其為利害豈淺哉愚按封徳彛隋之佞人也及唐之興以秘䇿而見用遂移其所以事隋者事唐勸用法律之説若行則仁義之效民生不覩於貞觀之世矣今觀徳彛與戴胄論無忌校尉之罪用捨之間其得失視仁義法律之説未相輕重也為國在于用人用人豈容輕哉非戴胄執法之公太宗從善之速其不寃人者幾希矣貞觀二年太宗謂房𤣥齡等曰朕比見比音鼻隋代遺老咸稱髙熲善為相者相去聲後同髙熲字昭𤣥隋之賢相煬帝以其忠諫為謗訕誅之遂觀其本傳去聲可謂公平正直尤識治體隋室安危繫其存沒煬帝無道枉見誅夷何嘗不想見此人廢書欽歎又漢魏以来諸葛亮為丞相亦甚平直嘗表廢廖立字公淵武陵人仕蜀為長水使者李嚴字正方南陽人仕蜀為中都説於南中立聞亮卒泣曰吾其左袵矣嚴聞亮卒發病而死故陳夀晉人撰三國志稱亮之為政開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者若如是則榮名髙位可以長守𤣥齡對曰臣聞理國要道在於公平正直故尚書云尚如字無偏無黨王道蕩蕩無黨無偏王道平平周書洪範篇之辭又孔子稱舉直錯諸枉則民服錯讀曰措孔子對魯哀公之辭今聖慮所尚誠足以極政教之源盡至公之要囊括區宇化成天下太宗曰此直朕之所懷豈有與卿等言之而不行也愚按昔傅説告髙宗曰事不師古以克永世匪説攸聞太宗謂朕每慕前代帝王之善者卿等可慕宰相之賢者其有合於師古者乎前代帝王之善者若堯舜禹湯文武成康降是則漢七制之主是已前代宰相之賢者若皋夔稷契伊傅周召降是則蕭曹丙魏是已髙熲之公平正直亦可謂賢相矣惜昧于不可則止之義諸葛亮王佐才也誠有古良相之遺風三代而下所不常見太宗令相臣企慕之亦知人哉嗚呼二帝三王之相不得而見之矣得見如武侯者斯可矣長樂公主樂音洛公主太宗第五女封長樂郡下嫁長孫沖文徳皇后所生也貞觀六年將出降謂下嫁也敕所司資送倍於長公主長音掌後同通鑑作永嘉長公主乃髙祖之女也魏徵奏言昔漢眀帝欲封其子帝曰朕子豈得同於先帝子乎可半楚淮陽王楚王英淮陽王昞皆光武子前史以為羙談天子姊妹為長公主天子之女為公主既加長字良以尊於公主也情雖有殊義無等别彼列切若令公主之禮令平聲有過長公主理恐不可實願陛下思之太宗稱善乃以其言告后后歎曰嘗聞陛下敬重魏徵殊未知其故而今聞其諫乃能以義制人王之情真社稷臣矣妾與陛下結髪為夫妻曲䝉禮敬情義深重每將有言必候顔色尚不敢輕犯威嚴况在臣下情踈禮隔故韓非謂之說難韓非戰國時刑名之學者東方朔稱其不易以䜴切東方朔字曼倩平原人漢武帝時為大夫良有以也忠言逆耳而利於行有國有家者深所要急納之則世治杜之則政亂誠願陛下詳之則天下幸甚因請遣中使去聲賫帛五百匹詣徵宅以賜之愚按易之歸妺曰帝乙歸妺其君之袂不如其娣之袂良盖謂王姬下嫁位雖至貴不事容餙也娣媵以容餙為事而衣袂所以為容餙者也尚禮而不尚餙故其袂不及其娣之袂良以儉徳也太宗于公主之降敕所司資送倍長公主雖以后之所生毋乃牽于愛而不節以制度乎是道之以踰禮越法矣幸魏徵之忠諫太宗之聴從而文徳皇后又從而褒賞之也若后之徳雖漢之隂馬亦不能及可謂無愧周之任姒邑姜者矣正家而天下定后之謂歟刑部尚書張亮坐謀反下獄亮為相州刺史假子公孫節以䜟有弓長之主當别都亮自以相舊都弓長其姓陰有怪謀陕人常徳告發其謀并言亮養假子五百太宗曰正欲反耳遣房𤣥齡謂曰法者天下平與公共為之公不自修乃至此將奈何于是斬之籍其家詔令百官議之令平聲後同多言亮當誅惟殿中少監少去聲唐制殿中監掌天下服御之事少監其貳也李道裕奏亮反形未具眀其無罪太宗既盛怒竟殺之俄而刑部侍郎有闕侍郎尚書之貳令宰相妙擇其人相去聲累奏不可太宗曰吾己得其人矣往者李道裕議張亮云反形未具可謂公平矣當時雖不用其言至今追悔遂授道裕刑部侍郎唐氏仲友曰道裕議張亮反形未具太宗不暇省嵗餘乃以刑部命道裕太宗可謂能改過道裕可謂善議刑矣愚按因李道裕議張亮之獄遂有刑部侍郎之除不唯見太宗悔過之心亦足見太宗擇人之術又所以示天下以明慎用刑之意開人臣以有過必諫之路也唐之刑部周官司寇掌邦禁之職妙擇其人而不輕授帝舜之命皋陶由此其選也太宗是舉衆善集焉貞觀初太宗謂侍臣曰朕今孜孜求士欲專心政道聞有好人則抽擢驅使而議者多稱彼者皆宰臣親故但公等至公行事勿避此言便為形迹古人内舉不避親外舉不避讎而為舉得其真賢故也但能舉用得才雖是子弟及有讐嫌不得不舉愚按祁奚舉賢不避祁午謝安舉將不避謝𤣥大臣之用人唯其公而已矣茍得其人雖子弟可也况親戚乎太宗謂侍臣但能舉用得才勿避形迹斯言當矣異時或告魏徵阿黨親戚太宗命案驗無狀乃使謂徵曰自今宜存形迹則又與斯言相戾矣使非鄭公直言不撓果得以踐斯言否乎貞觀十一年時屢有閹宦充外使閹音淹使去聲後同妄有奏事發太宗怒魏徵進曰閹竪雖微狎近左右時有言語輕而易信易以䜴切浸潤之譛為患特深今日之眀必無此慮為子孫教不可不杜絶其源太宗曰非卿朕安得聞此語自今已後充使宜停魏徵因上疏曰臣聞為人君者在乎善善而惡惡上烏去聲下如字後同近君子而逺小人逺去聲後同善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政逺小人則聴不私邪小人非無小善君子非無小過君子小過盖白玊之微瑕小人小善乃鈆刀之一割鈆刀一割良工之所不重小善不足以掩衆惡也白玊微瑕善賈之所不棄賈音古小疵不足以妨大美也善小人之小善謂之善善惡君子之小過惡烏去聲謂之惡惡此則蒿蘭同嗅玊石不分屈原所以沉江屈原名平楚懐王大夫王信讒而不見用乃自沉汨羅江而死卞和所以泣血者也卞和楚人得玊璞獻厲王王以為偽刖其足和抱璞而泣繼之以血既識玊石之分又辨蒿蘭之臭善善而不能進惡惡而不能去上聲此郭氏所以為墟事見納諫篇史魚所以遺恨也家語曰史魚病將卒命其子曰吾不能進蘧伯玊退彌子瑕是吾為臣不能正其君也生不能正其君則死無以成禮我死汝置屍牖下其子從之靈公弔其子以告公公曰寡人之過也命殯之客位進蘧伯玉而用退彌子瑕而逺之孔子曰古之諫者死則已矣未有如史魚死而屍諫忠感其君者也可不謂直乎陛下聰眀神武天姿英叡志存泛愛引納多塗好善而不甚擇人好去聲後同疾惡而未能逺佞又出言無隐疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之眀猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣長音掌後同聞善或疑則君子之道消矣為國家者急於進君子而退小人乃使君子道消小人道長則君臣失序上下否隔否音枇亂亡不䘏將何以理乎且世俗常人心無逺慮情在告訐好言朋黨夫以善相成夫音扶後同謂之同徳以惡相濟謂之朋黨今則清濁共流善惡無别彼列切以告訐為誠直以同徳為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不結於下臣忠所以不達於上大臣不能辯正小臣莫之敢論逺近承風混然成俗非國家之福非為理之道適足以長姦邪亂視聴使人君不知所信臣下不得相安若不逺慮深絶其源則後患未之息也今之幸而未敗者由乎君有逺慮雖失之於始必得之於終故也若時逢少隳往而不返雖欲悔之必無所及既不可以傳諸後嗣復何以垂法將来且夫進善黜惡施於人者也施平聲後同以古作鑒施於己者也鑒貌在乎止水鑒已在乎哲人能以古之哲王鑒於己之行事則貌之妍醜宛然在目事之善惡自得於心無勞司過之史不假芻蕘之議巍巍之功日著赫赫之名彌逺為人君者可不務乎臣聞道徳之厚莫尚於軒唐仁義之隆莫彰於舜禹欲繼軒唐之風將追舜禹之跡必鎮之以道徳𢎞之以仁義舉善而任之擇善而從之不擇善任能而委之俗吏既無逺度必失大體惟奉三尺之律以繩四海之人欲求垂拱無為不可得也故聖哲君臨移風易俗不資嚴刑峻法在仁義而已故非仁無以廣施如字非義無以正身惠下以仁正身以義則其政不嚴而理其教不肅而成矣然則仁義理之本也刑罰理之末也為理之有刑罰猶執御之有鞭䇿也人皆從化而刑罰無所施馬盡其力則有鞭䇿無所用由此言之刑罰不可致理亦己眀矣故潛夫論夫如字後漢王符字節信著書號潛夫論曰人君之理莫大於道徳教化也民有性有情有化有俗情性者心也本也俗化者行也末也行去聲後同是以上君撫世先其本而後其末順其心而履其行心情苟正則姦慝無所生邪意無所載矣是故上聖無不務理民心故曰聴訟吾猶人也必也使無訟乎孔子之辭道之以禮務厚其性而眀其情民相愛則無相傷害之意動思義則無畜姦邪之心若此非律令之所理也此乃教化之所致也聖人甚尊徳禮而卑刑罰故舜先敕契以敬敷五教契音泄舜臣名五教謂父子有親君臣有義夫婦有别長㓜有序朋友有信而後任咎繇以五刑也咎繇與皋陶同五刑謂墨劓剕宫大辟也凡立法者非以司民短而誅過誤也乃以防姦惡而救禍患檢淫邪而内正道内讀曰納民䝉善化則人有士君子之心被惡政則人有懐姦亂之慮故善化之養民猶工之為麯豉也六合之民猶一廕也黔首之屬秦稱民曰黔首猶荳麥也變化云為在將者耳遭良吏則懐忠信而履仁厚遇惡吏則懐姦邪而行淺薄忠厚積則致太平淺薄積則致危亡是以聖帝眀王皆敦徳化而薄威刑也徳者所以循已也威者所以理人也民之生也猶鑠金在爐方圎薄厚隨鎔制耳是故世之善惡俗之薄厚皆在於君世之主誠能使六合之内舉世之人感忠厚之情而無淺薄之惡各奉公正之心而無姦險之慮則醇釅之俗醇音淳釅音驗言俗如酒味之和也復見於兹矣後王雖未能遵專尚仁義當慎刑䘏典哀敬無私故管子曰聖君任法不任智任公不任私故王天下王去聲理國家貞觀之初志存公道人有所犯一一於法縱臨時處斷上上聲下去聲或有輕重但見臣下執論無不忻然受納民知罪之無私故甘心而不怨臣下見言無忤故盡力以効忠頃年以来意漸深刻雖開三靣之網見規諫篇注而察見川中之魚取捨在於愛憎輕重由乎喜怒愛之者罪雖重而強為之辭强上聲惡之者過雖小而深探其意惡烏去聲後同探平聲法無定科任情以輕重人有執論疑之以阿偽故受罰者無所控告當官者莫敢正言不服其心但窮其口欲加之罪其無辭乎又五品已上有犯悉令平聲曹司聞奏本欲察其情狀有所哀矜今乃曲求小節或重其罪使人攻擊惟恨不深事無重條求之法外所加十有六七故頃年犯者懼上聞得付法司以為多幸告訐無已窮理不息君私於上吏姦於下求細過而忘大體行一罰而起衆姦此乃背公平之道背音倍乖泣辜之意見封建篇注欲其人和訟息不可得也故體論云夫淫佚盜竊百姓之所惡也我從而刑罰之雖過乎當去聲百姓不以我為暴者公也怨曠饑寒亦百姓之所惡也遁而䧟之法我從而寛宥之百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞輕而勸善刑省而禁姦由此言之公之於法無不可也過輕亦可私之於法無可也過輕則縱姦過重則傷善聖人之於法也公矣然猶懼其未也而救之以化此上古所務也後之理獄者則不然未訊罪人則先為之意及其訊之則驅而致之意謂之能不探獄之所由生為之分探平聲而上求人主之微㫖以為制謂之忠其當官也能其事上也忠則名利隨而與之驅而䧟之欲望道化之隆亦難矣凡聴訟吏獄必原父子之親立君臣之義權輕重之序測淺深之量悉其聰眀致其忠愛疑則與衆共之疑則從輕者所以重之也故舜命咎繇曰汝作士惟刑之恤出虞書又復加之以三訊周禮以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民衆所善然後斷之是以為法叅之人情故傳曰傳去聲小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨者也立愛憎者也右親戚者也䧟怨讐者也怨平聲何世俗小吏之情與夫古人之懸逺乎有司以此情疑之羣吏人主以此情疑之有司是君臣上下通相疑也欲其盡忠立節難矣凡理獄之情必本所犯之事以主不敢訊不旁求不貴多端以見聰眀故律正其舉劾之法叅伍其辭所以求實也非所以飾實也但當叅伍眀聴之耳不使獄吏鍛鍊飾理成辭於手孔子曰古之聴獄求所以生之也今之聴獄求所以殺之也故析言以破律任案以成法執左道以必加也又淮南子漢淮南王安著書曰淮南子曰豐水之深十仞金鐵在焉則形見於外見音現非不深且清而魚鱉莫之歸也故為者以苛為察以功為眀以刻下為忠以訐多為功譬猶廣革大則大矣裂之道也夫賞宜從重罰宜從輕君居其厚百王通制刑之輕重恩之厚薄見思與見疾其可同日言哉且法國之權衡也時之凖繩也權衡所以定輕重凖繩所以正曲直今作法貴其寛平罪人欲其嚴酷喜怒肆志髙下在心是則捨凖繩以正曲直棄權衡而定輕重者也不亦惑哉諸葛孔眀小國之相去聲猶曰吾心如秤不能為人作輕重為去聲况萬乗之主天子畿内之地方千里出車萬乗故曰萬乗之主當可封之日唐虞之世比屋可封而任心棄法取怨於人乎又時有小事不欲人聞則暴作威怒以弭謗議若所為是也聞於外其何傷若所為非也雖掩之何益故諺曰欲人不知莫若不為欲人不聞莫若勿言為之而欲人不知言之而欲人不聞此猶捕雀而掩目盜鐘而掩耳者秪以取誚將何益乎臣又聞之無常亂之國無不可理之民者夫民之善惡由乎化之厚薄故禹湯以之理桀紂以之亂文武以之安幽厲以之危是以古之哲王盡已而不以尤人求身而不以責下故曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉左傳臧文仲告魯君之辭為之無己深乖惻隐之情實啟姦邪之路温舒恨於曩日温舒前漢人嘗上書言獄吏之害臣亦欲惜不用非所不聞也臣聞堯有敢諫之鼓通厯曰堯定四岳置諫鼓舜有誹謗之木淮南子曰舜立誹謗之木湯有司過之史淮南子曰湯有司直之人武有戒慎之銘太公述丹書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶武王聞之退而為戒乃書於几鑑盂槃為銘出大戴禮此則聴之於無形求之於未有虚心以待下庶下情之逹上上下無私君臣合徳者也魏武帝云有徳之君樂聞逆耳之言犯顔之諍樂音洛親忠臣厚諫士斥讒慝逺佞人者逺去聲後同誠欲全身保國逺避滅亡者也凡百君子膺期統運縱未能上下無私君臣合徳可不全身保國逺避滅亡乎然自古聖哲之君功成事立未有不資同心予違汝弼者也昔在貞觀之初側身勵行謙以受物盖聞善必改時有小過引納忠規每聴直言喜形顔色故凡在忠烈咸竭其辭自頃年海内無虞逺夷懾服志意盈滿事異厥初髙談疾邪而喜聞順㫖之説空論忠讜而不悦逆耳之言私嬖之徑漸開至公之道日塞往来行路咸知之矣邦之興衰實由斯道為人上者可不勉乎臣數年以来每奉眀㫖深懼羣臣莫肯盡言臣竊思之自比来比音鼻人或上書事有得失惟見述其所短未有稱其所長又天居自髙龍鱗難犯在於造次造七到切不敢盡言時有所陳不能盡意更思重竭重平聲其道無因且所言當理當去聲未必加於寵秩意或乖忤將有恥辱隨之莫能盡節實由於此雖左右近侍朝夕堦墀事或犯顔咸懐顧望况疎逺不接將何以極其忠欵哉又時或宣言云臣下見事秪可来道何因所言即望我用此乃拒諫之辭誠非納忠之意何以言之犯主嚴顔獻可替否所以成主之羙匡主之過若主聴則惑事有不行使其盡忠讜之言竭股肱之力猶恐臨時恐懼莫肯效其誠欵若如眀詔所道便是許其靣從而又責其盡言進退將何所據欲必使乎致諫在乎好之而已好去聲後同故齊桓好服紫而合境無異色楚王好細腰而後宫多餓死言上有好者下必有甚之意夫以耳目之玩人猶死而不違况聖眀之君求忠正之士千里斯應信不為難若徒有其言而内無其實欲其必至不可得也太宗手詔曰省前後諷諭省悉井切皆切至之意固所望於卿也朕昔在衡門尚惟童㓜未漸師保之訓漸音尖罕聞先達之言值隋主分崩萬邦塗炭惵惵黔黎惵音蝶庇身無所朕自二九之年有懐拯溺發憤投袂便提干戈䝉犯霜露東西征伐日不暇給居無寧嵗降蒼昊之靈禀廟堂之畧義旗所指觸向平夷弱水流沙今屬甘肅並通輶軒之使去聲輶輕車也被髪左袵四夷之人也皆為衣冠之域正朔所班無逺不届及恭承寶歴寅奉帝圖垂拱無為氛埃靖息於兹十有餘年斯盖股肱罄帷幄之籌爪牙竭熊羆之力協徳同心以致於此自惟寡薄厚享斯休毎以撫大神器憂深責重常懼萬幾多曠四聰不達戰戰兢兢坐以待旦詢於公卿以至𨽻皂推以赤心庶幾眀頼一動以鍾石淳風至徳永傳於竹帛克播鴻名常為稱首朕以虚薄多慙往代若不任舟楫豈得濟彼巨川不藉鹽梅安得調夫五味商書髙宗命傅説曰若濟巨川用汝作舟楫又曰若作和羮爾唯鹽梅賜絹三百匹愚按春秋之世衛至弱也季子知其後亡齊至强也周公知其後多簒弑夫所貴乎聖賢者以其見禮知政而前知于未然之先也善乎魏徵之言曰閹宦雖㣲為患特深今日之眀必無此慮為子孫計不可不杜絶其源厥後唐之中葉竟以宦者而亂及其末世遂以宦者而亡徵之眀見雖周公季子何逺之有哉太宗斯時正當著之為令俾後之子孫世世無得使宦者與政可也乃不過停其充使是特一時之計耳豈貽厥孫謀者耶徵既言閹宦之禍復上疏數千言極陳當時之失史稱徵諫疏二百餘篇其見於世者則此其最詳者也太宗答詔丁寧寵賜優渥君臣相與之際何其盛哉誠信第十七凡四章貞觀初有上書請去佞臣者去上聲太宗謂曰朕之所任皆以為賢卿知佞者誰耶對曰臣居草澤不的知佞者請陛下佯怒以試羣臣若能不畏雷霆直言進諫則是正人順情阿㫖則是佞人太宗謂封徳彛曰流水清濁在其源也君者政源人庶猶水君自為詐欲臣下行直是猶源濁而望水清理不可得朕常以魏武帝多詭詐深鄙其為人如此豈可堪為教令謂上書人曰朕欲使大信行於天下不欲以詐道訓俗卿言雖善朕所不取也范氏祖禹曰太宗可謂知君道矣夫君以一人之身御四海之廣應萬務之衆苟不以至誠與賢而役其獨智以先天下則耳目心智之所及者其能幾何是故人君必清心以涖之虛已以待之如鑑之眀如水之止則物至而不能罔矣夫權衡設而不可欺以輕重者唯其平也繩墨設而不可欺以曲直者唯其正也我以其正彼以其頗我以其真彼以其偽何患乎邪之不察佞之不辨而必行詐以試之哉一為不誠則心且蔽矣邪正何能辨乎是故鑑垢則物不能察也水動則形不能見也已不眀故也且待物以誠猶恐其不動也况不誠而能動物乎夫為君而使左右前後之人皆莫測其所為雖欲不欺不可得也唯能御以至誠則忠直者進而憸邪者無自入矣愚按昔夫子答顔淵為邦之問終之曰逺佞人佞人殆甚矣佞人之足以䘮家國也禹之答皋陶曰知人則哲何畏乎巧言令色孔壬盖人主一心攻之者衆一有所偏則讒邪靣䛕之人乗隙而進儻君心虛眀旁燭無疆則正邪自不能逃吾水鑑矣太宗謂君自為詐欲臣下直是猶源濁而望水清欲使大信行於天下不欲以詐真王言哉貞觀十年魏徵上疏曰臣聞為國之基必資於徳禮君之所保惟在於誠信誠信立則下無二心徳禮形則逺人斯格然則徳禮誠信國之大綱在於君臣父子不可斯須而廢也故孔子曰君使臣以禮臣事君以忠孔子對魯定公之辭又曰自古皆有死民無信不立孔子答子貢之辭文子姓辛名鈃一名計然濮上人師事老子著書十二篇名之曰通𤣥真經曰同言而信信在言前同令而行誠在令外然則言而不行言無信也令而不從令無誠也不信之言無誠之令為上則敗徳為下則危身雖在顛沛之中君子之所不為也自王道休眀十有餘載威加海外萬國来庭倉廪日積土地日廣然而道徳未益厚仁義未益博者何哉由乎待下之情未盡於誠信雖有善始之勤未覩克終之美故也昔貞觀之始乃聞善驚歎暨八九年間猶悦以從諫自兹厥後漸惡直言惡烏去聲後惡利同雖或勉强有所容強上聲非復曩時之豁如謇諤之輩稍避龍鱗便佞之徒肆其巧辯便平聲謂同心者為擅權謂忠讜者為誹謗謂之為朋黨雖忠信而可疑謂之為至公雖矯偽而無咎彊直者畏擅權之議忠讜者慮誹謗之尤正臣不得盡其言大臣莫能與之爭讀曰諍熒惑視聴鬱於大道妨政損徳其在此乎故孔子曰惡利口之覆邦家者盖為此也為去聲且君子小人貌同心異君子掩人之惡揚人之善臨難無茍免難去聲殺身以成仁小人不恥不仁不畏不義唯利之所在危人自安夫茍在危人則何所不至夫音扶後同今欲將求致理必委之於君子事有得失或訪之於小人其待君子也則敬而疎遇小人也必輕而狎狎則言無不盡踈則情不上通是則毁譽在於小人譽平聲刑罰加於君子實興䘮之所在可不慎哉此乃孫卿所謂使智者謀之與愚者論之使修潔之士行之與汙鄙之人疑之欲其成功可得乎哉夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免於傾敗况内懐奸利承顔順㫖其為禍患不亦深乎夫立直木而疑影之不直雖竭精神勞思慮其不得亦已眀矣夫君能盡禮臣得竭忠必在於内外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣昔齊桓公問於管仲曰吾欲使酒腐於爵肉腐於俎得無害霸乎管仲曰此極非其善者然亦無害於霸也桓公曰如何而害霸乎管仲曰不能知人害霸也知而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也晉中行穆伯中行氏穆伯晉卿也攻鼓城名經年而弗能下餽間倫間去聲後同曰鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一㦸折音舌不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若使間倫下之吾可以不賞之乎若賞之是賞佞人也佞人得志是使晉國之士捨仁而為佞雖得鼔將何用之夫穆伯列國之大夫管仲霸者之良佐猶能慎於信任逺避佞人也如此逺去聲况乎為四海之大君應千齡之上聖而可使巍巍至徳之盛將有所間乎若欲令平聲君子小人是非不雜必懐之以徳待之以信厲之以義節之以禮然後善善而惡惡上烏去聲下如字後同審罰而眀賞則小人絶其私佞君子自強不息無為之治何逺之有善善而不能進惡惡而不能去上聲罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚𦙍將何望哉太宗覽疏歎曰若不遇公何由得聞此語按史傳係十一年是嵗大雨穀洛溢毁官寺十九漂居人六百家故徵上疏陳事帝手詔嘉答於是廢眀徳宫𤣥圃院賜遭水者疏文比此章尤多唐氏仲友曰徵論基於徳禮保于誠信然而道徳未益厚仁義未益愽由待下之情未盡誠信最中太宗之病道徳仁義禮倘皆以誠信行之則終始唯一時乃日新豈至有善始之勤無克終之羙哉愚按天下之理一而已矣徳者得此理者也禮者履此理者也而誠信者實此理者也魏徵之諫疏並舉徳禮誠信而言之其要主於誠信其間如文子管仲中行穆伯之言皆出于誠信而言之也夫誠信者實心也有徳有禮而以實心行之則固善始而善終矣何憂于危亡哉徵之言於是乎知本矣太宗嘗謂長孫無忌等曰朕即位之初有上書者非一或言人主必須威權獨任不得委任羣下或欲耀兵振武懾服四夷惟有魏徵勸朕偃革興文布徳施惠施平聲中國既安逺人自服朕從此語天下大寧絶域君長皆來朝貢長音掌九夷重譯相望於道重平聲凡此等事皆魏徵之力也朕任用豈不得人徵拜謝曰陛下聖徳自天留心政術實以庸短承受不暇豈有益於聖明愚按先儒論學問以變化氣質為先論克己以性偏難克為始夫豈徒學者之事為然哉大臣正君之道亦如是而已矣愚觀太宗天資英武明敏不患其不能為而患其過于為不患其不能斷但患其過于斷當貞觀即位之初或勸其獨運威權或勸其懾服四夷此皆太宗之所已能所謂以水濟水以火濟火者也魏徵獨勸以偃武興文布徳施惠損其有餘益其不及兹非變其氣質而克其偏者歟甚矣徵之能正君也不然貞觀之治太宗何以獨歸功于徵哉貞觀十七年太宗謂侍臣曰傳稱去食存信傳去聲去上聲孔子曰人無信不立並孔子答子貢之辭昔項羽既入咸陽已制天下向能力行仁信誰奪耶項羽引兵屠咸陽殺秦降王子嬰燒秦宫室収其貨寳婦女而東秦民大失望房𤣥齡對曰仁義禮智信謂之五常廢一不可能勤行之甚有禆益殷紂狎侮五常武王奪之周書武王誓師之言曰今商王受狎侮五常項氏以無信為漢髙祖所奪誠如聖㫖愚按蕫子曰仁義禮智信五常之道王者所宜修飾也先儒謂此因武帝何修何飾之問而言其意雖甚正惜其剖析未明使武帝知若何而為仁若何而為義其修飾之方又孰先孰後也可為仲舒惜今觀太宗猶能以去食存信語羣臣而𤣥齡之對謂五常廢一不可誠是已儻能一一而明辨之使太宗知人之性情心之體用本然全具而各有條理必當反求黙識而擴充之不亦善乎愚于是復為𤣥齡惜貞觀政要卷五欽定四庫全書貞觀政要卷六唐吳兢撰元戈直集論儉約第十八凡八章貞觀元年太宗謂侍臣曰自古帝王凡有興造必須貴順物情昔大禹鑿九山禹貢曰九山刋旅蔡氏注九州之山也如冀州則梁岐之𩔖通九江禹貢曰九江孔殷蔡氏注即今之洞庭也今沅水漸水元水辰水敘水酉水澧水資水湘水皆合於洞庭故曰九江漢志所謂九江非是用人力極廣而無怨讟者物情所欲而衆所共有故也秦始皇營建宫室而人多謗議者為徇其私欲為去聲不與衆共故也朕今欲造一殿材木已具逺想秦皇之事遂不復作也復音缶古人云不作無益害有益周書旅獒之辭不見可欲使民心不亂老子之辭固知見可欲其心必亂矣至如雕鏤器物鏤音陋珠玉服玩若恣其驕奢則危亡之期可立待也自王公己下第宅車服婚嫁喪𦵏喪平聲準品秩不合服用者宜一切禁斷由是二十年間風俗簡樸衣無錦繡財帛富饒無饑寒之弊貞觀二年公卿奏曰依禮季夏之月可以居臺榭禮記仲夏之月毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭今夏暑未退秋霖方始宫中卑濕請營一閣以居之太宗曰朕有氣疾豈宜下濕若遂來請糜費良多昔漢文将起露臺而惜十家之産見教戒篇注朕徳不逮于漢帝而所費過之豈為人父母之道也固請至于再三竟不許朱氏黼曰財用之贏縮關於侈儉風俗好尚本之人主以儉約為先則公卿大夫不敢踰制朝廷以儉約為先則士庶人不敢越分尊卑上下事事物物皆尚質崇樸自然家給人足貨財不可勝用矣茍或反是則朝廷百官誇多鬬靡四方士民歆羨倣傚天地之生物有限上下之財力有涯烏能周贍而普足哉漢文帝惜十家之産基址既成而一臺不築於是成富庶之功唐太宗監秦人之敝材用既具而一殿不為於是成貞觀之治撙節於一身者甚微而功利之及一世者甚大窒遏一時之欲者甚微而培養數百年之基本者甚著人主其可不察哉愚按太宗可謂知化民之本矣一殿之建材木已具監秦皇之侈而亟已之一閣之營公卿所請慕漢帝之儉而竟不許其所以致貞觀之富庶也宜哉貞觀四年太宗謂侍臣曰崇飾宫宇遊賞池臺帝王之所欲百姓之所不欲帝王所欲者放逸百姓所不欲者勞弊孔子云有一言可以終身行之者其恕乎已所不欲勿施於人施平聲後同論語之辭勞弊之事誠不可施於百姓朕尊為帝王富有四海每事由已誠能自節若百姓不欲必能順其情也魏徵曰陛下本憐百姓每節已以順人臣聞以欲從人者昌以人樂已者亡樂音洛隋煬帝志在無厭平聲惟好奢侈好去聲後同所司每有供奉營造供平聲小不稱意稱去聲則有峻罰嚴刑上之所好下必有甚競為無限遂至滅亡此非書籍所𫝊亦陛下目所親見為其無道為去聲故天命陛下代之陛下若以為足今日不啻足矣啻音翅若以為不足更萬倍過此亦不足太宗曰公所奏對甚善非公朕安得聞此言貞觀十六年太宗謂侍臣曰朕近讀劉聰傳去聲劉聰字𤣥明元海第四子本新興匈奴以漢髙祖嘗以宗女妻冒頓故子孫冒劉姓元海於晉永興中立國是為前趙聰殺兄自立聰将為劉后為去聲后太保劉殷之女為左貴嬪後立為后起䳨儀殿廷尉陳元達廷尉獄官也元達字長宏後部人本姓髙以生月妨父改姓陳切諫聰大怒命斬之劉后手疏啓請辭情甚切聰怒乃解而甚愧之晉載記劉聰将起殿於後庭陳元達切諫聰大怒曰吾為萬幾主豈問汝鼠子乎将出斬之時在逍遥園李中堂劉后聞之密勅停刑上手疏曰今宫室已備宜愛民力廷尉之言四海之福也陛下宜加封賞而更誅之四海謂陛下如何哉陛下今興工費廣為妾營殿而殺諫臣使天下罪妾妾何以當之願賜死以塞陛下之過聰覽之命引元達謝之曰外輔如公内輔如后朕復何憂更命園曰納賢園堂曰愧賢堂人之讀書欲廣聞見以自益耳朕見此事可以為深誡比者比音鼻欲造一殿仍構重閣重平聲今於藍田縣名今仍舊屬奉元路採木並已備具逺想聰事斯作遂止愚按隋煬帝窮土木之工極宫室之麗迨有甚扵紂之傾宫鹿臺卒致家國不保然亦隋文帝有以啟之也文帝興王之君也天下既平而仁夀之役民不勝困是以後嗣傚之殆有甚焉太宗取孤隋殘弊之天下所宜休息幸而營造之事或納人言而止或監前古而止其過隋文逺矣觀其言曰帝王所欲者放逸百姓所不欲者勞弊以聖人之所謂恕而推已所不欲勿施於人之心君人者而味斯言也豈惟崇飾宫宇池臺為然哉樂聲色也求神仙也闢土地也事畋獵也肆遊觀也凡非百姓之所欲者一以恕之一言行之祈天永命之道也魏徵之復其君曰陛下若以為足今日不啻足矣若以為不足更萬倍過此亦不足此言尤為君人之格言也或曰太宗之言固善矣飛仙翠微玉華之作何居蓋飛仙之作既有魏徵之諫而翠微玉華以有疾避暑而即其舊以修之未可以是而求其備也貞觀十一年詔曰朕聞死者終也欲物之反真也𦵏者藏也欲令人之不得見也令平聲上古垂風未聞於封樹後世貽則乃備於棺槨易大傳曰古之𦵏者厚衣之以薪𦵏之中野不封不樹喪期無數後世聖人易之以棺槨譏僭侈者非愛其厚費美儉薄者實貴其無危是以唐堯聖帝也穀林有通樹之説吕氏春秋堯𦵏穀林通樹之秦穆明君也槖泉無丘隴之處秦穆公名任好史記注穆公𦵏雍州槖泉宫祈年觀下仲尼孝子也防墓不墳孔子合𦵏親於防曰吾聞古也墓而不墳延陵慈父也嬴博可隠吳延陵季子名札適齊而返其子死𦵏扵嬴博之間不歸鄉里斯皆懐無窮之慮成獨決之明乃便體於九泉非徇名於百代也洎乎闔閭違禮珠玉為鳬鴈闔閭吳王名𦵏虎丘山下發士十萬人治𦵏穿土為川積壤為丘銅棺三重澒池六尺以黄金珠玉為鳬鴈始皇無度水銀為江海秦始皇𦵏於驪山吏徒數十萬曠日十年合采金石被以珠玉水銀為江海人膏為燈燭季孫擅魯斂以璵璠斂去聲璵音與璠音煩季孫魯大夫季平子也左傳定公五年季平子行東野還未至卒于房陽虎将以璵璠斂仲梁懐弗與曰改步改玉陽虎欲逐之􅁻公山不狃不狃曰彼為君也子何怨焉桓魋専宋𦵏以石槨魋音頽桓魋宋向戍之孫為司馬禮記子游曰昔者夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也莫不因多藏以速禍由有利而招辱𤣥廬既發致焚如於夜臺𤣥廬夜臺墓之别名也黄腸再開同㬥骸於中野漢梁商薨賜以東國朱夀之器銀鏤黄腸注云器棺也以朱飾之以銀鏤之以柏木黄心為槨曰黄腸也詳思曩事豈不悲哉由此觀之奢侈者可以為戒節儉者可以為師矣朕居四海之尊承百王之弊未明思化中宵戰惕雖送往之典詳諸儀制失禮之禁著在刑書而勲戚之家多流通於習俗閭閻之内或侈靡而傷風以厚𦵏為奉終以髙墳為行孝遂使衣衾棺槨極雕刻之華靈輀冥器窮金玉之飾富者越法度以相尚貧者破資産而不逮徒傷教義無益泉壤為害既深宜為懲革宜為之為去聲其王公已下爰及黎庶自今已後送𦵏之具有不依令式者仰州府縣官明加檢察隨狀科罪在京五品已上及勲戚家仍録奏聞舊本此章在慎終篇今附入此愚按漢文帝嘗曰以北山為槨用紵絮斮陳漆其間豈可動哉張釋之對曰使其中有可欲者雖錮南山猶有隙也異時文帝之遺詔曰厚𦵏以破業吾甚不取霸陵山川因其故毋有所改斯言也其有感於釋之之言乎唐太宗初作獻陵務存隆厚猶文帝初年之意也虞世南諫而不能止十一年之詔豈非世南之言啟之歟愚嘗合二君之詔觀之則文帝之詔専為己之一身而已太宗之意則欲使天下之人同為儉約之歸以免於暴骸之禍此又文帝之所未及也岑文本為中書令宅卑濕無帷帳之飾有勸其營産業者文本歎曰吾本漢南一布衣耳竟無汗馬之勞徒以文墨致位中書令斯亦極矣荷俸禄之重荷去聲為懼已多更得言産業乎言者歎息而退舊本自此下四章並在貪鄙篇今附入于此愚按儉約者人之所難能也何曾之先見而日食萬錢謝安之相業而不忘聲色儉約豈可易能哉雖然有其道矣孟子曰志士不忘在溝壑勇士不忘喪其元士之仕於人之國者唯不忘其貧賤之時則自無侈靡之失矣岑文本身為中書令而能不忘其為漢南布衣時兹所以能不營産業而為唐名相歟户部尚書戴冑卒子聿反太宗以其居宅弊陋祭享無所令有司特為之造廟令平聲為去聲温彦博為尚書右僕射家貧無正寢及薨公侯死曰薨殯於旁室太宗聞而嗟歎遽命所司為造為去聲當厚加賻贈魏徵宅内先無正堂及遇疾太宗時欲造小殿而輟其材為徵營構五日而就遣中使去聲齎素褥布被而賜之以遂其所尚此章重出任賢篇愚按奢侈者常情之所同樂儉約者中人之所不堪自非為人君者於奢儉之際有以抑此揚彼則為人臣者何憚而去其所同樂趨其所不堪乎戴胄居宅卑濕太宗為之造廟温彦博死殯旁室太宗為之造正寢魏徵宅無正堂太宗輟其材而營之三臣之儉徳行於下太宗之褒賞加於上天下之士其有不聞風興起者哉謙讓第十九凡三章貞觀二年太宗謂侍臣曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懐畏懼昔舜誠禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功虞書大禹謨之辭又易曰人道惡盈而好謙惡好並去聲易謙卦彖辭凡為天子若惟自尊崇不守謙恭者在身儻有不是之事誰肯犯顔諫奏朕每思出一言行一事必上畏皇天下懼羣臣天髙聴卑何得不畏羣公卿士皆見瞻仰何得不懼以此思之但知常謙常懼猶恐不稱天心及百姓意也稱去聲魏徵曰古人云靡不有初鮮克有終鮮上聲詩大雅蕩篇之辭願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣唐虞所以太平實用此法吕氏祖謙曰無逸之書稱商三宗之享國而周公蔽之以一言曰畏而已蓋惟天子之尊茍以無所畏之心而自恃則治易忘亂安易忘危危亂而不自知矣惟能以有畏為心則上焉天心享之下焉臣民歸之如是而不安者未之有也太宗貞觀之治所以致之者固有其道而大要莫先於此愚按昔史臣贊堯曰允恭克讓光被四表贊舜曰濬哲文明温恭允塞夫堯舜五帝之盛帝也聖徳輝光在謙讓而已易之謙曰天道下濟而光明天道而非下濟則亢矣何自而見其光明哉太宗謂天子不當自尊崇正合謙恭此帝王之盛徳也魏徵於此時不将順其美而舉詩之靡不有初鮮克有終望其君謂常謙常懼日慎一日唐虞所以太平實用此法是固有以知太宗之心矣蓋以堯舜之所以謙讓終始如一非一時之言也後之人君志於帝王之道者勉之哉貞觀三年太宗問給事中孔穎達曰論語云以能問於不能以多問於寡有若無實若虚何謂也論語曾子之言穎達對曰聖人設教欲人謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶病以為少仍就寡少之人更求所益已之雖有其狀若無已之雖實其容若虚非惟匹庶帝王之徳亦當如此夫音扶帝王内蘊神明外須𤣥黙使深不可知故易稱以䝉養正易䝉卦彖辭曰䝉以養正以明夷莅衆莅音隸易象傳曰明入地中明夷君子以莅衆用晦而明若其位居尊極炫耀聰明以才陵人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗曰易云勞謙君子有終吉易謙卦九三爻辭誠如卿言詔賜物二百段胡氏寅曰太宗之問疑其不必如是蓋其為人已有善惟恐人之不知故於不矜不伐未能有行焉孔穎達所對亦足以箴之矣雖然吾友從事於斯之意則未易曉也夫既能矣不自以為能可也而又問於不能既多矣不自以為多可也而又問於少彼不能與少者将何益我不幾於偽以下人者乎是不然惟善學者志不倦心不盈一善之不聞一義之不知歉然如飲食之不飽也此何所為而然哉故曰學然後知不足夫聖如孔子猶曰我好古敏以求之我學不厭誠以道無量理無極而事無方太宗知之庶乎少進矣唐氏仲友曰太宗之夫正在矜伐穎達之對箴其膏肓太宗儻得此道雖帝王可及也惜其資矯拂勉强之力故時有用賢納諫之益亦蹈飾非拒諫之悔也愚按論語載曾子之言曰以能問於不能以多問於寡有若無實若虚蓋惟知義理之無窮不見物我之有間學者之所難能也故朱子集註以為吾友謂顔淵也太宗以天下之君舉此為問而孔穎達因而發明之以聖門為學之方勉進於帝王之徳蓋以太宗英明之資雄傑之才易致炫耀凌慢之失聞穎達之言有勞謙有終之語穎達其善於格君心歟河間王孝恭太祖之子也佐髙祖多進圖策獨存方面功寛恕退讓太宗親重之宗室莫比武徳初封為趙郡王累授東南道行臺尚書左僕射孝恭既討平蕭銑輔公祏遂領江淮及嶺南北皆統攝之専制一方威名甚著累遷禮部尚書孝恭性惟退讓無驕矜自伐之色時有特進江夏王道宗尤以将略馳名兼好學将好並去聲敬慕賢士動修禮讓太宗並加親待諸宗室中惟孝恭道宗莫與為比一代宗英云愚按自古國家之将興也天必生英傑竒偉之才於其子弟族屬之間所以昌大其門户而光啓其運祚也周之興也有周公康叔漢之興也有朱虚東牟降及魏晉六朝蓋莫不然唐起晉陽本支尤盛孝恭之威名與李靖相亞道宗之将略與李勣齊肩又能好學習禮退讓不伐求之布素之士有不可多得者雖未可方之周公之才之美其亦康叔朱虚之流輩歟嗚呼盛哉仁惻第二十凡四章貞觀初太宗謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求採無已至於離宫别館非幸御之所多聚宫人此皆竭人財力朕所不取且灑掃之餘更何所用今将出之任求伉儷上音抗敵也下音麗耦也非獨以省費兼以息人亦各得遂其情性於是後宫及掖庭前後所出三千餘人按通鑑貞觀二年九月天少雨中書舍人李百藥上言往年雖出宫人竊聞太上皇宫及掖庭宫人無用者尚多豈惟虚費衣食且隂氣鬱積亦足致旱上曰云云於是遣尚書左丞戴胄給事中杜正倫於掖庭西門簡出之前後所出三千餘人孫氏甫曰隋煬荒虐自古無比强取良家女置後宫者固無其數髙祖初入關放離宫之人還親屬此特美事之一節及受禪安然有其後宫欲不荒恣得乎賴聖子承之立矯其過計出三千之衆使天下聳動歌詠唐之盛徳也尹氏起莘曰按禮天子立后固有六宫三夫人九嬪二十七世婦八十一御妻矣然未聞千百其數也昔晉武平吳之後掖庭殆将萬人遂殞其軀而亡其國今太宗即位首放宫女三千餘人可謂盛徳之事遂使後人流之歌詠不一而足也愚按仁哉太宗之心也兹亊不見於武徳之初而見於貞觀之初論者謂聖子承統行父之所未能行誠可謂仁也然司晉陽之管鑰遂犯分於宫闈此謀臣因以迫之以興師也有天下之後安其後宫猶晉陽之心也昔漢祖入秦宫室能無所幸識者知其智不在小奄奠區宇規模宏逺矣非唐祖所及也太宗其殆庶幾乎貞觀二年關中旱大饑太宗謂侍臣曰水旱不調皆為人君失徳為去聲朕徳之不修天當責朕百姓何罪而多遭困窮聞有鬻男女者鬻音育賣也朕甚愍焉乃遣御史大夫杜淹字執禮如晦叔也材辯多聞秦王引為文學館學士及即位召為御史大夫俄檢校吏部尚書所薦引贏四十人後皆知名巡檢出御府金寶贖之還其父母愚按齊宣不忍牛之觳觫而就死地孟子曰是心足以王矣然惜其愛物之心重愛民之心輕欲其舉斯心加諸彼也太宗處九重之崇髙撫四海之廣大而能軫念饑人之子女出御府金寶以贖之其愛民之心重矣夫萬姓至繁也博施濟衆聖人猶病饑人子女豈能人人獲所哉然是心也足以王矣貞觀之盛孰謂非此心所致乎貞觀七年襄州都督襄州今為襄陽隸河南張公謹卒太宗聞而嗟悼出次發哀有司奏言準隂陽書云日在辰不可哭泣此亦流俗所忌太宗曰君臣之義同於父子情發於中安避辰日遂哭之按通鑑係六年夏四月辛夘襄州都督鄒襄公張公謹卒明日上出次發哀云云唐氏仲友曰太宗辰日哭張公謹謂君臣猶父子義感人心駕馭之畧髙矣愚按君於卿大夫比𦵏不食肉比卒哭不舉樂非私恩也蓋公義也是故衛之栁莊既死而獻公祭弔論者是之晉之荀盈未𦵏而晉侯飲樂膳宰譏之太宗於張公謹之卒雖辰日不為之輟哭可不謂賢君乎貞觀十九年太宗征髙麗次定州今中山府隸腹裏有兵士到者帝御州城北門樓撫慰之有從卒一人從去聲後同病不能進詔至床前問其所苦仍勅州縣醫療之是以将士将去聲後同莫不欣然願從及大軍回次栁城屬營州今廢詔集前後戰亡人骸骨設太牢致祭牛羊豕曰太牢親臨哭之盡哀臨去聲軍人無不灑泣兵士觀祭者歸家以言其父母曰吾兒之喪天子哭之死無所恨太宗征遼東攻白巖城唐置巖州今廢右衛大将軍李思摩頡利族人諸部納欵思摩獨留髙祖封和順郡王與秦王結為兄弟賜姓李為化州都督統頡利故部為可汗思摩遣使謝曰望世世為國一犬守天子北門如延陀侵逼願入保長城太宗詔許之居三年不得其衆入朝從伐遼為流矢所中去聲帝親為吮血為去聲吮粗兖切将士莫不感勵愚按太宗親征𦵏戰亡之骨吮思摩之瘡可謂仁恕也已然逺國强臣雖不義而未至於䖍劉邊鄙也若以偏方不霑王化自有大司馬九伐之制在何至躬率六師乎思遼水之無極慮扈從之匪輕仁恕一念油然發生於中則可以已矣惻隠之心何待形於遂事之後乎慎所好第二十一凡四章貞觀二年太宗謂侍臣曰古人云君猶器也人猶水也方圓在於器不在於水故堯舜率天下以仁而人從之桀紂率天下以暴而人從之下之所行皆從上之所好去聲後同至如梁武帝父子志尚浮華惟好釋氏老氏之教武帝末年頻幸同泰寺親講佛經百寮皆大冠髙履乗車扈從終日乗平聲後同從去聲談論苦空佛教也未嘗以軍國典章為意及侯景率兵向闕見君道篇尚書郎已下多不解乗馬解音懈狼狽步走狼似犬鋭首白頰髙前廣後狽狼屬生子或欠一足二足相附而行離則顛故猝遽謂之狼狽死者相繼於道路武帝及簡文簡文名綱武帝第三子侯景廢之卒被侯景幽逼而死卒被聿切孝元帝名繹武帝第七子起兵討侯景即帝位在于江陵郡名今中興路隸荆湖為萬紐于謹所圍梁承聖三年元魏遣萬紐于謹将兵五萬入冦攻江陵帝猶講老子不輟元帝好𤣥談嘗於龍光殿講老子聞魏師至停講聞報帖然復開講百寮皆戎衣以聴俄而城陷君臣俱被囚縶音贄庾信為梁将軍留於西魏亦歎其如此及作哀江南賦乃云宰衡以干戈為兒戲縉紳以清談為廟略此事亦足為鑒戒朕今所好者惟在堯舜之道周孔之教以為如鳥有翼如魚依水失之必死不可暫無耳胡氏寅曰太宗不好釋氏而好堯舜周孔之道可謂知所去取矣而以為如魚有水鳥有翼失之必死不可暫無者則未知其誠能然乎抑徒意之云爾也夫允執厥中者堯舜之盛也而始於道心欲不踰矩者孔子之盛也而始於志學志者非讀書記誦之謂道心之微又與老釋𤣥妙之言何以别乎自此而入庶乎其知道矣孔子曰知之者不如好之者知之如是則能好之矣未嘗知之而以為我好堯舜周孔之道云者妄也夫道非有一物可把玩而好之也百姓日用而不能離亦猶鳥之有翼魚之依水顧不自知耳真氏徳秀曰太宗之言可謂知所擇矣然終身所行未能無愧者以其嗜學雖篤所講者不過前代之得失而於三聖授受之微㫖六經致治之成法未之有聞其所親者雖或一時名儒而姦諛小人亦厠其列安得有佛時仔肩之益故名為希慕前聖而於道實無得焉其亦可憾也夫愚按太宗知老釋之虚無空寂不適於用知堯舜之道周孔之教不可暫無斯言也三代而下君人者所罕聞也中庸曰率性之謂道修道之謂教道者率性而已聖人以此道垂訓於天下後世則謂之教堯舜之道此道也周公孔子之教以堯舜之道為教也又曰道也者不可須臾離也可離非道也不可暫無其不可須臾離者乎太宗未足以進此也而言則然也貞觀二年太宗謂侍臣曰神仙事本是虚妄空有其名秦始皇非分愛好分好並去聲為方士所詐乃遣童男童女數千人隨其入海求神仙方士避秦苛虐因留不歸始皇猶海側踟蹰以待之踟音遲蹰音厨遲回貌還至沙丘而死始皇東遊海上方士徐市等上書請得與童男女入海求三神山不死藥始皇從之明年復遊海上後三年遊碣石考入海方士從上郡歸後五年復至海上冀遇仙藥不得還到沙丘崩沙丘在今順徳路鉅鹿縣漢武帝為求神仙為去聲乃将女嫁道術之人事既無驗便行誅戮漢武帝元鼎四年樂成侯登薦方士欒大上見之大悦大言曰黄金可成河決可塞不死之藥可得神仙可致時上方憂河決而黄金不就迺拜大為五利将軍賜列侯甲第童千人又以衛長公主妻之後竟坐誣罔遂腰斬據此二事神仙不煩妄求也愚按漢儒有言明於天地之性者不可惑以神怪通於萬物之情者不可罔以非𩔖太宗深懲秦皇漢武之失謂神仙虚妄空有其名可謂不惑於神怪不罔於非𩔖者矣然晚年深信婆羅門娑婆寐之説使之合長生之藥則又何所見而然耶貞觀四年太宗曰隋煬帝性好猜防好去聲専信邪道大忌胡人乃至謂胡牀為交牀胡𤓰為黄𤓰築長城以避胡終被宇文化及使令狐行達殺之令去聲令狐虜複姓行達其名時為校尉又誅戮李金才名渾為将軍有方士言曉圗䜟謂帝曰當有李氏為天子渾與宇文述有隙述因誣搆之於是盡誅渾族及諸李殆盡卒何所益卒子聿切且君天下者惟須正身修徳而已此外虚事不足在懐愚按桑穀生於朝而大戊以興雉升鼎而雊而殷道復盛䜟緯之書雖有定數然人君能至誠修徳未有不轉禍為福改妖為祥者也太宗謂君天下者惟須正身修徳譏煬帝枉殺李金才等其説是也然晩年竟以女主武王之䜟淫刑及於功臣則又何邪貞觀七年工部尚書唐制工部掌山澤屯田工匠之事尚書其長也段綸段姓綸名奏進巧人楊思齊至太宗令試令平聲綸遣造傀儡戲具傀古委切儡魯猥切木偶戲也世傳運機子起漢祖平城之圍其城一面即冐頓妻閼氏兵强於三面陳平訪之閼氏妬忌造木偶人運機關舞埤間閼氏望見謂是生人慮下城冒頓必納遂退軍後翻為戲具太宗謂綸曰所進巧匠将供國事供平聲卿令先造此物是豈百工相戒無作奇巧之意耶乃詔削綸階級並禁斷此戲舊本此章在儉約篇今附于此愚按中庸曰日省月試既廩稱事所以勸百工也朱子釋之曰日省月試以程其能既廩稱事以饋其勞則不信度作淫巧者無所容矣段綸奏進工人首令試造傀儡非所謂作奇技淫巧者乎太宗既削綸階級且令禁斷此戲可謂知所先矣慎言語第二十二凡三章貞觀二年太宗謂侍臣曰朕每日坐朝欲出一言即思此一言於百姓有利益否所以不敢多言給事中兼知起居事唐制起居郎及舍人掌天子起居法度貞觀初以給事中諫議大夫兼之執事紀録杜正倫進曰君舉必書言存左史春秋左氏傳也臣職當兼修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖徳累音𩔖非止當今損於百姓願陛下慎之太宗大悦賜綵百段唐氏仲友曰太宗言不敢多言意在史筆正倫之一言兩得将順正救之美宜乎太宗悦而賜之也愚按易大傳曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之況其邇者乎甚矣人君之言尤不可不慎也一言之善行之當世不惟天下䝉其利後世亦以為訓一言之不善行之當世不惟天下受其害後世亦以為戒人君之言可不慎哉太宗之言雖意在史筆其關於君道則甚重也貞觀八年太宗謂侍臣曰言語者君子之樞機談何容易以豉切凡在衆庶一言不善則人記之成其恥累音𩔖況是萬乗之主不可出言有所乖失其所虧損至大豈同匹夫我常以此為戒隋煬帝初幸甘泉宫泉石稱意稱去聲而怪無螢火敕云捉取多少於宫中照夜所司遽遣數千人採拾送五百轝於宫側小事尚爾況其大乎魏徵對曰人君居四海之尊若有虧失古人以為如日月之蝕人皆見之實如陛下所戒慎愚按易大傳曰言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也可不慎乎蓋能知所以慎言則知所以慎行矣行之不慎尚何望其慎言太宗謂言語者君子之樞機衆庶猶爾況於萬乗可謂知所慎言矣魏徵謂人君有失如日月之蝕人皆見之實如陛下所戒慎則足以兼慎言慎行之意也貞觀十六年太宗每與公卿言及古道必詰難往復難去聲散騎常侍劉洎上書諫曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聴其言虛襟以納其説猶恐羣下未敢對揚況動神機縱天辯飾辭以折其理援古以排其議欲令凡蔽令平聲何階應答臣聞皇天以無言為貴聖人以不言為徳老子稱大辯若訥莊子稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊議桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上曰君之所讀者古人之糟魄已夫以臣之事觀之斵輪徐則甘而不固疾則苦而不入不疾不徐得之扵手應之於心口不能言有數存焉古之人與不可傳也出莊子漢皇慕古張孺陳譏漢張良嘗匿下邳見老父授之以書曰孺子可教故稱良曰張孺項羽圍漢王於滎陽王與酈食其謀撓楚食其曰昔湯武伐桀紂皆封其後請立六國後王曰善具以告張良良曰誰為陛下畫此計陛下事去矣為陳八不可之説見史此亦不欲勞也且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必為累音𩔖後同須為社稷自愛為去聲後同豈為性好自傷乎好去聲竊以今日升平皆陛下力行所至欲其長久匪由辯博但當忘彼愛憎慎兹取捨每事敦朴無非至公若貞觀之初則可矣至如秦政强辯失人心於自矜魏文宏材虧衆望於虛説此才辯之累皎然可知累音𩔖伏願畧兹雄辯浩然養氣孟子曰我善養吾浩然之氣簡彼緗圖緗淺黄色圖書也澹焉怡悦固萬夀於南岳詩云如南山之夀不騫不崩齊百姓於東户則天下幸甚皇恩斯畢太宗手詔答曰非慮無以臨下非言無以述慮比有談論比音鼻遂至煩多輕物驕人恐由兹道形神心氣非此為勞今聞讜言虚懐以改按通鑑係十八年上好文學而辯敏羣臣言事者多引古今以折之多不能對洎上書云云上飛白答之張氏九成曰君子以謹密成徳而疎直致患而況處重之地可不戒哉洎每剛直敢言始以受知終以速禍蓋太宗英明剛武以取天下挾振矜之態雖議論及於羣臣而是正之語或不容下或往復詰難或面折其短才辯自逞氣驕於人夫以咫尺之威生殺在手非剛直之徒孰與抗哉而洎逺引聖人不言大辯若訥深為勸戒所以恢寛厚之徳廣進言之路觀其所陳若有優柔樂易之性矣及其發言處身或不自慮夫以太宗之明竟不深察何知之不審始卒有異乎抑疑似之詰有以啟之也唐氏仲友曰上執其謙下輸其直此議論之體也以鯀之不才堯獨知之然從試可乃已之論則人君之言豈務求勝太宗以智辯自居往復窮詰此最足以害從諫之美洎兩言之切中其病孟子所謂拒人於千里外者也答詔猶有反覆是非之言則太宗自聖之病頗亦難瘳賴洎言之不已使太宗許以能改不然其去徳豈逺乎哉一鑑既往獨洎能出此言不亦賢乎愚按劉洎諫䟽想見太宗以英雄之姿逞神機縱天辯未免有輕物驕人之失儻非能尅已自勵勉强從諫則所謂智足以拒諫辯足以飾非由此乎生矣今聞讜言虚懐以改其得為賢君也宜哉杜讒邪第二十三凡七章貞觀初太宗謂侍臣曰朕觀前代讒佞之徒皆國之蟊賊也蟊音矛蟲之害稼者或巧言令色朋黨比周比音鼻若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃故叢蘭欲茂秋風敗之王者欲明讒人蔽之此事著於史籍不能具道至如齊隋間讒譖事耳目所接者畧與公等言之斛律明月斛律複姓明月其字名光後齊朝兼行将相有名譽鄰敵所憚齊朝良将去聲威震敵國周家每嵗斵汾河氷慮齊兵之西渡及明月被祖孝徵名珽密為謡言讒斛律光殺之讒搆伏誅周人始有吞齊之意髙熲隋之賢相有經國大才為隋文帝贊成霸業為去聲後蓋為同知國政者二十餘載天下賴以安寧文帝惟婦言是聴特令擯斥令平聲及為煬帝所殺刑政由是衰壊又隋太子勇文帝太子名勇後廢為庶人撫軍監國監平聲凡二十年間固亦早有定分去聲楊素𤣥感之父為隋相欺主罔上賊害良善使父子之道一朝滅於天性朝音昭楊素揣知獨孤后意盛言太子不才文帝於是禁太子勇部分收其黨與楊素舞文巧詆以成其獄廢勇立晉王廣為皇太子是為煬帝逆亂之源自此開矣隋文既混淆嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防微杜漸用絶讒搆之端猶恐心力所不至或不能覺悟前史云猛獸處山林處上聲藜藿為之不採直臣立朝廷姦邪為之寢謀此實朕所望於羣公也魏徵曰禮云戒慎乎其所不睹恐懼乎其所不聞中庸首篇之辭詩云愷悌君子無信讒言讒人罔極交亂四國詩小雅青蠅篇之辭又孔子曰惡利口之覆邦家惡烏去聲蓋為此也臣嘗觀自古有國有家者若曲受讒譖妄害忠良必宗廟丘墟市朝霜露矣願陛下深慎之愚按自古讒邪之為惑人主非有知人之明不能辨也太宗援據古今以貴望於其臣魏徵敷述經訓以致戒於其君可謂極君臣之契讒邪無得而間矣厥後有毁徴阿黨者使温彦博按之雖足以直徵之枉而左右之為讒者竟不聞顯正其罪固非止讒之道及徵之卒乃因杜正倫之黜復以阿黨疑之疑情一萌讒言遽入謂徵録諫辭示史官有賣已直彰君過之意者遂有停婚仆碑之令何不察之甚邪使太宗它日無征遼東之悔尚得為明主乎信夫知人之難也貞觀七年太宗幸蒲州刺史趙元楷課父老服黄紗單衣迎謁路左盛飾廨宇修營樓雉以求媚又潛飼羊百餘口魚數千頭将饋貴戚太宗知召而數之曰數上聲朕巡省河洛省上聲經厯數州凡有所須皆資官物卿為飼羊養魚為去聲雕飾院宇此乃亡隋弊俗今不可復行復音缶當識朕心改舊態也以元楷在隋邪佞故太宗發此言以戒之元楷慙懼數日不食而卒子聿反舊本此章在貪鄙篇今附入此愚按元楷仕隋為厯陽郡丞以獻異味超遷江都郡丞迹其邪佞蓋與髙徳儒之指野鳥為鸞無異太宗縱不能誅之豈可復使為民之父母乎異時潛飼羊魚盛飾廨宇蓋猶以事隋者而事唐也太宗數而責之是矣然使能黜其官致其罪布告天下咸以為戒豈不尤偉矣乎貞觀十年太宗謂侍臣曰太子保傅古難其選成王幼小以周召為保傅左右皆賢足以長仁長音掌致理太平稱為聖主及秦之胡亥始皇所愛趙髙作傅教以刑法及其簒也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠去聲交遊惟柴紹字嗣昌臨汾人以任俠聞髙祖妻以平陽公主武徳初拜左翊衛大将軍累從戰伐而有功竇誕等外戚也貞觀為宗正卿太宗與語昏謬失對以光禄大夫罷為人既非三益論語曰益者三友友直友諒友多聞及朕居兹寶位經理天下雖不及堯舜之明庶免乎孫皓髙緯之暴孫皓三國吳主是為烏程侯降于晉髙緯北齊後主為周所虜以此而言復不由染何也魏徵曰中人可與為善可與為惡然上智之人自無所染陛下受命自天平定冦亂救萬民之命理致升平豈紹誕之徒能累聖徳累音𩔖但經云放鄭聲逺佞人逺去聲論語孔子答顔淵問為邦之辭近習之間尤宜深慎太宗曰善按自誠由近習已上文重出師傅篇舊本此章在直諫篇今附入于此愚按帝堯與共驩同處而不為共驩之所化周公與管蔡同處而不為管蔡之所化夫上智不移唯堯與周公為能耳然堯猶畏孔壬周公猶懼流言豈恃其資質之美而謂惡人不能染哉下此則善人之芝蘭惡人之鮑魚未有不與之俱化者也唐太宗少與柴竇為友而不能昏太宗之徳世莫不疑焉以愚觀之太宗之所以為太宗以其資質之過人也其不能進於三代之君者以柴竇輩為之累也雖然太宗少年之事爾及其君臨天下雖房杜王魏並居輔相而封權宇文之流亦得厠乎其間此貞觀之治所以止於如是也然則太宗所謂不由漸染者其然豈其然乎尚書左僕射杜如晦奏言監察御史陳師合史無傳上拔士論兼人之思慮有限一人不可總知數職以論臣等太宗謂戴冑曰朕以至公理天下今任𤣥齡如晦非為勲舊以其有才行也為行並去聲此人妄事毁謗正欲離間我君臣間去聲昔蜀後主昏弱名禪先主之子齊文宣狂悖然國稱理者以任諸葛亮楊遵彦並見前注不猜之故也朕今任如晦等亦復如法於是流陳師合于嶺外舊本自此已下三章在貪鄙篇今附入此孫氏甫曰人主之任大臣不可不専亦不可専若深知其人可付國事不専任之何以責成功蓋専任則責重責重則人必盡其才力也若知人未至而専任之茍無成功則有敗事又或竊擅威福有難制之患二者惟在人主審之不可一失失則事機難追矣太宗可謂能審知人之術者也知房杜之賢而付以國事房杜方盡心職事已著功效陳師合以平常之見欲移主意如晦奏其事意似不廣然慮小臣間言漸害於事公言之爾太宗不惑師合之言房杜荷信任如是敢不盡其才力乎此所以成太平之治也然有太宗之明房杜之賢則可専任而不容人言人主知人未至當審其付任不可執此為法説見後章貞觀中太宗謂房𤣥齡杜如晦曰朕聞自古帝王上合天心以致太平者皆股肱之力朕比開直言之路者比音鼻庶知寃屈欲聞諫諍所有上封事人多告訐百官訐音結細無可採朕厯選前王但有君疑於臣則下不能上達欲求盡忠極慮何可得哉而無識之人務行讒毁交亂君臣殊非益國自今已後有上書訐人小惡者當以讒人之罪罪之魏徵為祕書監有告徴謀反者太宗曰魏徵昔吾之讐祇以忠於所事吾遂拔而用之何乃妄生讒搆竟不問徵遽斬所告者范氏祖禹曰太宗欲聞直言而惡告訐不惟聖譖讒而又罪之可謂至明且逺矣此為君為長之道愚按上封事者訐人小惡而太宗罪之讒人告魏徵謀反而太宗誅之此可謂明也已陳師合上拔士論謂一人不可總知數職斯乃天下之確論也如晦遽以為譏論臣等太宗遽以為毁謗離間至流師合於嶺外亦可謂寃也已然則合三事而觀之太宗得其二而失其一乎貞觀十六年太宗謂諫議大夫禇遂良曰卿知起居比來比音鼻記我行事善惡遂良曰史官之設君舉必書善既必書過亦無隠太宗曰朕今勤行三事亦望史官不書吾惡一則鑒前代成敗事以為元龜二則進用善人共成政道三則斥棄羣小不聴讒言吾能守之終不轉也唐氏仲友曰太宗所言皆君道然謂守而不失亦望史官不書吾惡則有䕶過之意矣伐遼之監不逺而窮兵用魏徴而仆碑於身後知宇文士及佞而游言自解謂守而不失未免自矜也愚按善惡直書而義自見此史臣之職也揜其不善而著其善此人情之常也為人上者其於言行之際知善而力行之知惡而力改之在我而已史臣直筆吾不知也太宗嘗欲觀史矣而復問起居所記之行事是欲史臣每有以彰其善而有不善者則削而不書也所行果出於善始終如一史臣豈得而揜其善乎勤行三事之言雖為君道之善而表襮於起居注之臣則似有矜善之意矣悔過第二十四凡四章貞觀二年太宗謂房𤣥齡曰為人大須學問朕往為去聲羣兇未定東西征討躬親戎事不暇讀書比來比音鼻四海安静身處殿堂處上聲不能自執書卷使人讀而聴之君臣父子政教之道共在書内古人云不學牆面莅事惟煩周書周官之辭不徒言也却思少小時行事少去聲大覺非也愚按夫子於易之益曰君子以見善則遷有過則改釋者謂見善能遷則可以盡天下之善有過能改則無過矣益於人者無大於是夫遷善改過學者之所難而太宗定天下之亂處帝王之尊乃能知讀書之善而能遷之知少時之過而能改之可謂知為益之道矣充是心也為益之道豈有窮際乎貞觀中太子承乾多不修法度魏王泰尤以才能為太宗所重特詔泰移居武徳殿魏徵上疏諫曰魏王既是陛下愛子須使知定分去聲常保安全每事抑其驕奢不處嫌疑之地也今移居此殿使在東宫之西海陵昔居時人以為不可雖時移事異猶恐人之多言又王之本心亦不寧息既能以寵為懼伏願成人之美太宗曰我幾不思量甚大錯誤幾量並平聲遂遣泰歸於本第愚按古者世嫡之位既定而衆子各有定分觀於周官之衣服膳羞之不會者必曰惟王及后世子王及后固也而世子與焉者所以示尊隆絶覬覦也太宗之時既知承乾不修法度矣乃重魏王泰之才固以踰分越制矣又使居武徳殿他日兩廢之事寧非太宗有以啟之也雖以魏徵之言覺大錯誤終非宜為矣重天下之本者慎之哉貞觀十七年太宗謂侍臣曰人情之至痛者莫過乎喪親也故孔子云三年之喪平聲後同天下之通喪孔子答宰我之辭自天子達於庶人也又曰何必髙宗商君武丁也古之人皆然孔子答子張之辭近代帝王遂行不逮漢文以日易月之制漢文帝行短喪以日易月甚乖於禮典朕昨見徐幹中論後漢徐幹撰中論二十篇復三年喪篇義理甚深恨不早見此書所行大疏畧疏平聲但知自咎自責追悔何及因悲泣久之愚按孟子曰三年之喪齊疏之服飦粥之食自天子達於庶人三代共之夫三年之喪者子生三年然後免於父母之懐故父母之喪必以三年古今貴賤通行之禮也然自漢文短喪以日易月厯代因之恬不知改天子遂無三年之喪人紀廢壊綱常不明莫甚於此太宗雖不能蚤遵經訓躬行其禮而能引咎自責追悔悲泣抑亦可以為孝矣後之人君所宜遵復古制以詔後世俾子孫守之永永無斁罔使蹈漢文之失貽太宗之悔豈不卓冠千古哉貞觀十八年太宗謂侍臣曰夫音扶人臣之對帝王多承意順㫖甘言取容朕今欲聞已過卿等皆可直言散騎常侍劉洎對曰陛下每與公卿論事及有上書者以其不稱㫖稱去聲或面加詰難去聲無不慙退恐非誘進直言之道太宗曰朕亦悔有此問難當即改之此章重出納諫篇直諫𩔖比此為詳奢縱第二十五一章貞觀十一年侍御史馬周上疏陳時政曰臣厯覩前代自夏殷周及漢氏之有天下𫝊祚相繼多者八百餘年史記注周凡三十七主八百六十七年少者猶四五百年史記注從禹至桀十七君十四世有王與無王凡嵗四百七十一年殷凡三十一世六百二十九年東西兩漢共二十四帝凡四百二十四年見漢書皆為去聲後同積徳累業恩結於人心豈無僻王賴前哲以免爾自魏晉已還降及周隋多者不過五六十年少者纔二三十年而亡三國蜀二主四十五年魏五主四十五年吳四主五十九年西晉四主五十三年南齊七主二十二年蕭梁四主五十六年陳五主二十三年東晉十一主一百三年劉宋八主六十年元魏十二主一百一十九年東魏一主十七年西魏三主二十二年北齊五主二十八年後周五主二十五年隋三主三十七年良由創業之君不務廣恩化當時僅能自守後無遺徳可思故𫝊嗣之主政教少衰一夫大呼去聲而天下土崩矣今陛下雖以大功定天下而積徳日淺固當崇禹湯文武之道廣施徳化施平聲使恩有餘地為子孫立萬代之基豈欲但令政教無失令平聲後同以持當年而已且自古明王聖主雖因人設教寛猛隨時而大要以節儉於身恩加於人二者是務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶逺者往來至五六千里春秋冬夏畧無休時陛下每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有怨嗟之言以陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不復可行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸夫人慎夫人也衣不曳地至景帝以錦繡纂組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈而承文景遺徳故人心不動向使髙祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處益州今仍舊隸四川營造供奉器物供平聲并諸王妃主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理其弊猶亂陛下少處人間少去聲處上聲知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宫不更外事長音掌更平聲即萬嵗之後固聖慮所當憂也臣竊尋往代以來成敗之事但有黎庶怨叛聚為盜賊其國無不即滅人主雖欲改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之有失是以殷紂笑夏桀之亡而幽厲亦笑殷紂之滅周幽王名宫湼厲王名胡皆無道之主隋帝大業之初又笑周齊之失國然今之視煬帝亦猶煬帝之視周齊也故京房京姓房名字君明漢東郡人治易謂漢元帝云臣恐後之視今亦猶今之視古此言不可不戒也往者貞觀之初率土荒儉一匹絹纔得粟一斗而天下帖然百姓知陛下甚憂憐之故人人自安曾無謗讟自五六年來頻嵗豐稔一匹絹得十餘石粟而百姓皆以陛下不憂憐之咸有怨言以今所營為者頗多不急之務故也自古以來國之興亡不由蓄積多少唯在百姓苦樂音洛且以近事驗之隋家貯洛口倉而李密因之東都積布帛王世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛即世充李密未必能聚大衆但貯積者固是國之常事要當人有餘力而後收之若人勞而彊斂之斂去聲竟以資冦積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息儻中國被水旱之灾邊方有風塵之警狂狡因之竊發則有不可測之事非徒聖躬旰食晏寢而已旰居案切日晚也若以陛下之聖明誠欲勵精為政不煩逺求上古之術但及貞觀之初則天下幸甚太宗曰近令造小隨身器物不意百姓遂有嗟怨此則朕之過誤乃命停之按史傳通鑑此與論諸王定分刺史縣令同一疏范氏祖禹曰紂積鉅橋之粟武王發之人主不務徳而務聚斂者民散而國亡太宗在位寖久将外事四夷内治宫室聚財積穀欲以有為馬周先事而諫欲如初年之節儉可謂順其美而救其惡矣胡氏寅曰馬周所言四五事太宗從其一而已其要曰陛下當隆禹湯文武之業豈得但持當年而已此最太宗之病也豈特太宗凡三代已後得天下者皆然皆不知治蠱先甲後甲之義前弊未盡革而後患已生矣汲黯謂武帝内多欲而外施仁義太宗嬪御不為稀營造不為少窮兵黷武以收逺畧在位十餘年矣年豐食足而百姓怨咨馬周言之帝未改也豈非經濟之術已殫無所可為乎愚按馬周此疏以三代帝王取天下保天下之道望之太宗可謂能責難於其君矣夫禹湯文武之道修之於身推之於家國天下而後道洽政治澤潤生民非可以勉强而為之也太宗為唐賢君謂其行事有合於禹湯文武則可槩以禹湯文武之道則未之盡也孟子曰王者之民皞皞如也營造器物而百姓怨嗟與皞皞之氣象有間矣幸而因周之言即命停罷其足以保貞觀之盛也以此若夫廣施徳化為子孫立萬代之基此王者必世後仁之事未能進於是矣三代之所以長治久安者其必有道也夫貪鄙第二十六凡六章貞觀初太宗謂侍臣曰人有明珠莫不貴重若以彈雀豈非可惜況人之性命甚於明珠見金錢財帛不懼刑網徑即受納乃是不惜性命明珠是身外之物尚不可彈雀何況性命之重乃以博財物耶羣臣若能備盡忠直益國利人則官爵立至皆不能以此道求榮遂妄受財物贓賄既露其身亦殞實可為笑帝王亦然恣情放逸勞役無度信任羣小疎逺忠正逺去聲有一於此豈不滅亡隋煬帝奢侈自賢身死匹夫之手亦為可笑愚按周禮天官以聴官府之六計弊羣吏之治必察之以㢘甚矣貪之足以禍其身也夫利所以資身利積而身敗則利乃所以殞身也可不戒哉然自昔戒貪之言多矣善乎太宗之言曰明珠身外之物尚不可以彈雀何況性命之重乃以博財物此可為有官君子之箴終之曰帝王亦然是不惟有以戒其臣而亦以自戒也可不謂賢君乎貞觀二年太宗謂侍臣曰朕嘗謂貪人不解愛財也解音懈後同至如内外官五品以上禄秩優厚一年所得其數自多若受人財賄不過數萬一朝彰露禄秩削奪此豈是解愛財物規小得而大失者也昔公儀休公儀複姓休名魯相也性嗜魚而不受人魚其魚長存且為主貪必喪其國為臣貪必亡其身詩云大風有隧貪人敗𩔖詩大雅桑柔篇之辭固非謬言也昔秦恵王即秦恵公僭稱王是為恵文王欲伐蜀不知其逕乃刻五石牛置金其後蜀人見之以為牛能便金便平聲蜀王使五丁力士拖牛入蜀道成秦師隨而伐之蜀國遂亡事見蜀記漢大司農漢制掌諸錢穀金帛貨幣之職田延年字子賔齊諸田之後漢昭帝時為大司農贓賄三千萬事覺自死時茂陵富人焦氏賈氏以數千萬積貯炭葦諸𦵏物昭帝大行用度未辦延年奏言豫收不祥物冀疾用以求利非臣民所當為請沒入官奏可富人皆怨出錢求延年罪初大司農取民牛車三萬兩為僦車直千錢延年詐增二千凡六千萬盜取其半焦賈告其事時議以延年廢昌邑王時嘗發大議當以功覆過霍光曰往就獄公議過延年曰我何面目入牢獄遂刎死如此之流何可勝記勝平聲朕今以蜀王為元龜卿等亦須以延年為覆轍也愚按書曰凡厥正人既富方穀中庸曰忠信重禄所以勸士蓋分田制禄所以養其愧恥之心而厲其忠㢘之節也太宗謂當時五品已上禄秩自厚若受財不過數萬其知所以勸矣自以蜀王為監以牛金而亡國欲臣下以田延年為監以贓列賄而殞身非特以此戒臣下且以此律其身則於庶位者寧不知所懲哉貞觀四年太宗謂公卿曰朕終日孜孜非但憂憐百姓亦欲使卿等長守富貴天非不髙地非不厚朕常兢兢業業以畏天地卿等若能小心奉法常如朕畏天地非但百姓安寧自身常得驩樂音洛古人云賢者多財損其志愚者多財益其過此言可為深誡若徇私貪濁非止壊公法損百姓縱事未發間中心豈不常懼恐懼既多亦有因而致死大丈夫豈得茍貪財物以害及身命使子孫每懐愧恥耶卿等宜深思此言愚按詩云上帝臨女毋貳爾心自古聖人拳拳於畏天者豈謂人君尊無與敵借天以壓之哉蓋兢業祗懼是乃天心之所存而堯舜禹湯所傳之大原也太宗自謂常兢兢業業以畏天地又使羣臣當如朕畏天地是真能合乎聖人畏天之學矣然太宗之所謂天者蒼蒼之天耳昊天曰明及爾出王昊天曰旦及爾游衍何往而非天哉一息之間斷非畏天也一事之作輟非畏天也詩曰文王之徳之純聖人之所以事天者純而已矣愚觀太宗之行事知謹刑矣而復濫殺知尚文矣而復慕武知任賢矣而復聴讒知斷恩矣而復牽愛甚矣其雜而不純也此豈足為畏天之實哉貞觀六年右衛将軍陳萬福自九成宫赴京違法取驛家麩數石太宗賜其麩令自負出以恥之令平聲愚按大學引孟獻子之言曰與其有聚斂之臣寧有盜臣蓋君子寧亡己之財而不忍傷民之力故也陳萬福違法取驛家麩非有取於民者其盜臣之謂乎太宗賜其麩令自負出以愧其心而不加罪可謂寛仁也已貞觀十年治書侍御史權萬紀上言宣饒二州宣州今為寜國路饒州今仍舊並隸江東諸山大有銀坑採之極是利益每嵗可得錢數百萬貫太宗曰朕貴為天子是事無所少乏惟須納嘉言進善事有益於百姓者且國家賸得數百萬貫錢何如得一有才行人行去聲不見卿推賢進善之事又不能按舉不法震肅權豪惟道税鬻銀坑以為利益昔堯舜抵璧於山林投珠於淵谷由是崇名美號見稱千載後漢桓靈二帝後漢桓帝名志靈帝名宏好利賤義好去聲漢靈帝時開西邸賣官自關内侯虎賁羽林入錢各有差私令左右賣公卿公千萬卿五百萬又賣關内侯假金印紫綬傳世入五百萬為近代庸暗之主卿遂欲将我比桓靈耶是日勅放令萬紀還第令平聲孫氏甫曰太宗所以能斥言利之臣者無它内能節用外謹制度絶權倖抑恩寵無妄費耳官中欲修一殿則想秦皇之過公卿請營一閣則念文帝之儉将修洛陽殿則聴張𤣥素之言而遂止嫁送長樂則納魏徵之諫而從薄宫人罷遣而出者三千此其謹身節用天下已隂受其賜矣而文武官止六百四十三員府兵止六十萬又皆散之農畆以自給天子惟務徳義以致治平薄賦斂以厚風俗而已此言利之臣所以不能合也胡氏寅曰大學之教曰長國家而務財用者必自小人矣與其有聚斂之臣寜有盜臣故治國不以利為利而以義為利也自事言之國家嵗得數百萬緡非因頭會箕斂而取之山澤似亦未有害者太宗不惟置其利又且黜其人而専以進賢利民為急以桓靈私藏為戒審所取舍明示好惡可為人君法矣愚按大學曰治國家不以利為利而以義為利也觀太宗郤權萬紀銀坑之奏真能不以利為利者蓋當是時宫室服用毎能慎乃儉徳是宜諄諄訓下無愧辭也夫表正而景隨源清則流清表未正而求正於景源未清而求清於流無是理也是故欲臣下厲㢘名當自人君之崇儉徳始貞觀十六年太宗謂侍臣曰古人云鳥棲於林猶恐其不髙復巢於木末魚藏於水猶恐其不深復穴於窟下然而為人所獲者皆由貪餌故也今人臣受任居髙位食厚禄當須履忠正蹈公清則無災害長守富貴矣古人云禍福無門惟人所召然陷其身者皆為去聲貪冒財利與夫音扶魚鳥何以異哉卿等宜思此語為鑒誡舊本此章重岀鑒戒篇今按此章喻貪為切故去彼存此愚按太宗訓臣下㢘潔之為美貪利之為害者數矣魚鳥之喻尤其明白痛切令人讀之竦然誠足懲創人之逸志也可不戒哉貞觀政要卷六
