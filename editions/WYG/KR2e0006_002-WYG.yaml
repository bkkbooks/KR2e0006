body:
  text: 貞觀政要卷二唐吳兢撰元戈直集論任賢第三凡八章房𤣥齡名喬以字顯父彦謙仕隋歴刺史𤣥齡少警敏通經史善屬文開皇中隋方盛宻白父曰上無功徳徒以周近親妄誅殺亂嫡庶競僣侈終當滅亡父驚曰無妄言年十八舉進士授羽騎尉校讎秘省侍郎髙孝基曰此郎當為國器恨不見其聳壑昻霄耳中原方亂慨然有憂天下之志既事秦王王曰漢光武得鄧禹今我得𤣥齡猶禹也餘見下文齊州臨淄人也齊州今濟南路𨽻山東臨淄縣名今属益都路初仕隋為隰城尉隰音習隰城今隰州𨽻河東唐制縣置尉掌親理庶務分判衆曹割斷追催收率課調令之佐也坐事除名徙上郡太宗徇地渭北渭水之北今陜西之地𤣥齡杖䇿謁於軍門太宗一見便如舊識署渭北道行軍記室㕘軍唐制掌軍府表啟書疏之職𤣥齡既遇知已遂罄竭心力是時賊冦每平衆人競求金寳𤣥齡獨先收人物致之幕府及有謀臣猛將與之潛相申結各致死力累授秦王府記室兼陜東道今河南等處大行臺考功郎中唐制掌百官功過善惡之職𤣥齡在秦府十餘年恒典管記隐太子巢刺王以𤣥齡及杜如晦詳見下章為太宗所親禮甚惡之惡烏去聲譛之髙祖諱淵字叔徳由是與如晦並遭驅斥及隐太子將有變也太宗召𤣥齡如晦令衣道士服令平聲衣去聲潛引入閤謀議及事平太宗入春宫東宫也武徳九年六月太宗初為皇太子擢拜太子左庶子唐制東宫左春坊左庶子掌侍從贊相禮儀駮正啟奏之職貞觀元年遷中書令唐制中書省之長掌佐天子執大政而總判省亊宰相也三年拜尚書左僕射監修國史唐制史館有監修國史皆宰相兼領封梁國公實封一千三百戸唐爵九等一曰王食邑萬户二曰郡王食邑五千户三曰國公食邑三千户四曰開國郡公食邑二千户五曰開國縣公食邑千五百户六曰開國縣侯食邑千户七曰開國縣伯食七百户八曰開國縣子食五百户九曰開國縣男食三百户此言千三百户者實封數也後倣此既總任百司䖍恭夙夜盡心竭節不欲一物失所聞人有善若已有之明達吏事飾以文學審定法令意在寛平不以求備取人不以已長格物隨能收敘無隔踈賤論者稱為良相焉相去聲後同十三年加太子少師少去聲唐制太子少師少傅少保掌曉三師徳行以諭皇太子奉觀三師之徳𤣥齡自以一居端揆舜使禹宅百揆端揆者相位也十有五年頻抗表辭位優詔不許十六年進拜司空唐制太尉司徒司空為三公佐天子理隂陽平邦國無所不統仍總朝政依舊監修國史𤣥齡復以年老請致仕太宗遣使去聲謂曰國家乆相任使相如字一朝忽無良相朝音昭如失兩手公若筋力不衰無煩此讓自知衰謝當更奏聞𤣥齡遂止按史傳𤣥齡抗表陳辭太宗遣使謂之曰昔留侯讓位竇融辭榮自懼盈滿知進能退善自止足前代美之公亦欲齊蹤往哲實可嘉尚然國家久相任使一朝忽無良相如失兩手𤣥齡遂止太宗又嘗追思王業之艱難佐命之匡弼乃作威鳳賦以自喻因賜𤣥齡其見稱𩔖如此按新舊唐書皆曰太宗追思王業艱難佐命之力作威鳳賦以賜無忌俱載長孫無忌傳㕘之通鑑亦然政要作賜𤣥齡未詳孰是愚謂其所紀姓名雖不同而太宗眷命功臣之意則一也今録其賦於此以備觀覽焉其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲𤣥霜資長風以舉翰戾天衢而逺翔西翥則煙氛閉色東飛則日月騰光化垂鵬於北裔訓羣鳥於南荒弭亂世而方降應明時而自彰俛翼雲路歸功本樹仰喬枝而見猜俯脩條而抱蠧同林之侣俱嫉共榦之儔並忤無桓山之義情有炎洲之㐫度若巢葦而居安獨懐危而履懼鴟鴞嘯乎側葉燕雀喧乎下枝慙已陋之至鄙害它賢之獨竒或聚咮而交撃乍分羅而見羈戢凌雲之逸羽韜偉世之清儀遂乃蓄情宵影結志晨暉霜殘綺翼露㸃紅衣嗟憂患之易結歎矰繳之難違期畢命於一死本無情於再飛幸賴君子以依以恃引此風雲濯斯塵滓披䝉翳於葉下發光彩於枝裏仙翰屈而還舒靈音摧而復起盼八極以遐翥臨九天而髙峙庶廣徳於衆禽非崇利於一已是以徘徊感徳顧慕懐賢憑明哲而禍散託英才而福全答恵之情彌結報功之志方宣非知難而行易思令後而終前俾賢徳之流慶畢萬葉而芳𫝊朱氏黼曰人主以任相為職宰相以任人為職使宅百揆舜所以命禹也旁招俊乂列於庶位傅説所以相髙宗也太宗嘗謂𤣥齡當廣求賢人隨材授任可謂知任相矣𤣥齡聞人有善若已有之不以求備取人不以已長格物可謂知相職矣是以居端揆十五年有司庶府皆稱其職也竊嘗論之宰相非量材受任為難而為國用人之不易貞觀之盛羣材蟻附一財計之任雖賤有司且能之𤣥齡特以度支闗天下利害寧虚其位而不以與人寧任於己而不庀凡士盖以民力所繫不當委裒刻之吏國計所本不可付聚歛之臣故寧抱乏材之歎而不容茍且以具員寧受吝權之譏而不忍冐昧以與下此其所以號稱名相歟吕氏祖謙曰房𤣥齡之相太宗王魏以善諌而司直英衛以善兵而立功𤣥齡乃斷斷於上而為一時之名相可謂無它枝而能有容足以任天下之事矣觀其以度支係天下利害嘗有缺求其人未得乃自領之其材固足以辦天下之事而能不自用也由是言之無它技而有容固足為貴至於材不自用而能用人之材則𤣥齡之賢所以為不可及也真氏徳秀曰梁文昭公佐太宗定天下及終相位凡三十三年其持身也敬其謀國也忠盖庶乎古大臣之風矣至於用人則委諌争於王魏付征伐於英衛使衆善畢集於君退然若無能為者此一節盖秦漢以來未有能及之者後之君子其于梁公之用心當端拜師之愚按昔漢高祖初入闗也諸將争走金帛財物之府而蕭何獨收相府律令圖書竟為開基之根本夫蕭何起秦刀筆吏而高見逺識如此為興王名相豈偶然之故哉房𤣥齡杖策謁軍門太宗一見如舊識賊寇每平衆人争求金寳𤣥齡獨先收人物致之幕府其知所先務與蕭何收相府圖書同一髙見逺謀興王相業蕭不専美於漢風雲感召此豈人力也哉非天其孰能使之杜如晦字克明少英爽以風流自命内負大節臨機輙斷隋世預吏部選髙孝基異之曰君當為棟梁用願保令徳餘見下文京兆萬年人也京兆郡名今奉元路萬年縣名今咸寜縣𨽻陜西武德初爲秦王府兵曹㕘軍唐制掌王府武官簿書考課儀衛假使等事俄遷陜州今仍舊𨽻河南總管府長史長音掌唐制邉要之地置總管以統軍長史其貳職也時府中多英俊被外遷者衆太宗患之記室房𤣥齡曰府僚去者雖多盖不足惜杜如晦聰明識達王佐才也若大王守藩端拱無所用之必欲經營四方非此人莫可太宗自此彌加禮重寄以心腹遂奏為府屬嘗㕘謀帷幄時軍國多事剖斷如流深為時軰所服累除天䇿府從事中郎武徳四年髙祖以秦王功髙古官號不足以稱乃加號天䇿上將位在王公上開府置官属從事中郎其属職也兼文學館學士太宗為天䇿上將亂稍平乃嚮儒宫城西作文學館收聘賢才詢訪討論學士其職也隱太子之敗如晦與𤣥齡功第一遷拜太子右庶子唐制東宫右春坊右庶子掌侍從左右獻納啟奏宣傳令㫖之政俄遷兵部尚書唐制兵部掌武選地圖車馬甲械之政尚書其長也進封蔡國公實封一千三百户貞觀二年以本官檢校侍中唐制檢校某官者皆詔除而非正命三年拜尚書右僕射兼知吏部選事唐制吏部掌文選勲封考課之政知猶主也仍與房𤣥齡共掌朝政至於臺閣規模典章文物皆二人所定甚獲當代之譽時稱房杜焉按史𫝊如晦進僕射乆之以疾辭職薨贈司空謚曰成手詔虞世南為碑文言痛悼意它日食􅆶美輟其半奠焉後夢如晦若平生明日勅所御饌往祭勞問妻子恩禮無少衰後詔功臣世襲贈宻州刺史徙國莱栁氏芳曰房杜佐太宗天下號為賢相然無迹可尋徳亦至矣故太宗定禍亂而房杜不言功王魏善諌諍而房杜讓其賢英衛善將兵而房杜行其道理致太平善歸人主為唐宗臣宜哉劉氏昫曰房杜皆以命世之才遭逢明主謀猷允協以致升平議者以比漢之蕭曹信矣然杜之見用房之所舉也太宗嘗與𤣥齡圖事則曰非如晦莫能籌之及如晦至竟如𤣥齡之䇿盖房知杜之能斷大事杜知房之善建嘉謀裨諶草創東里潤色相須而成俾無悔事賢達用心良有以也若以往􅈒方之房則管仲子産杜則鮑叔罕虎矣宋氏祁曰太宗取孤隋攘羣盜天下已平用房杜輔政大亂之餘紀綱彫弛而能興仆植僵使號令典刑粲然㒺不完可謂名宰相然求所以致之之迹殆不可見何哉雖然宰相代天者也輔贊彌縫而藏諸用使斯人由而不知彼揚已取名瞭然使户曉者殆房杜之細耶張氏九成曰太宗身屬櫜鞬以基帝業閫外之臣皆以功為尚而房杜隱然為國名臣自後世觀之任公竭節身處要地如𤣥齡者誰人也臨機獨斷吐胸中之竒若如晦者誰人也吕氏祖謙曰房杜輔相太宗成貞觀之治而後世觀之無迹可尋此則近於無聲無􅆨之至矣是故漢之文景紀無可書之事而為西都之仁君唐之房杜𫝊無可載之功而為貞觀之賢相唐氏仲友曰太宗與房杜君臣之契深矣謂之明良相遇可矣而古之王者必有師臣湯之於伊尹武王之於尚父是也是故能以道正君格其非心以登堯舜之盛故曰成王畏相房杜之於太宗可以為名相矣未可以為畏相也愚按蘇文忠公有言唐之房杜𫝊無可載之功今以史𫝊攷之則禇遂良嘗謂𤣥齡自義旗之始翼贊聖功武徳之季冒死决䇿貞觀之初選賢立政人臣之勤𤣥齡為最髙祖謂𤣥齡論事千里外猶對靣長孫后謂𤣥齡竒謀祕計未嘗宣泄是𤣥齡之功猶可得而知也至於如晦之為人則世稱𤣥齡善謀如晦善斷每有大事𤣥齡輙曰非如晦不能斷及如晦至卒用𤣥齡之䇿是如晦之斷初不能出於𤣥齡之謀也故如晦之功不可得而知也然世豈以如晦為不及𤣥齡哉嗚呼後之大臣幸而與賢者同列恥己之短而求加於人者真如晦之罪人也哉魏徵字𤣥成孤貧落拓有大志不事生業出家為道士好讀書尤屬意縱横之説大業末李宻見徵所為文召之徵進十䇿宻竒之而不能用後竇建徳攻䧟黎陽獲徵署為起居舍人及竇建徳就擒與裴矩西入闗隱太子聞其名引直洗馬甚禮之餘見下文鉅鹿人也鉅鹿郡名今順徳路鉅鹿縣𨽻河東近徙家相州之内黄相去聲相州今彰徳路𨽻腹裏内黄縣名今属滑州武徳末為太子洗馬洗音跣洗馬漢有是職太子出則當直者前驅清道唐制東宫左春坊司經局置洗馬掌經史子集四庫圖籍刋緝之事凡天下之圖書上東宫者皆受而藏之見太宗與隱太子隂相傾奪每勸建成早為之謀太宗既誅隱太子召徵責之曰汝離間我兄弟何也間去聲衆皆為之危懼徵慷慨自若從容對曰從即容切皇太子若從臣言必無今日之禍太宗為之歛容厚加禮異擢拜諫議大夫數引之卧内數音朔訪以政術徵雅有經國之才性又抗直無所屈撓太宗每與之言未嘗不悦徵亦喜逢知己之主竭其力用又勞之曰勞去聲慰喻也卿所諌前後二百餘事皆稱朕意稱去聲非卿忠誠奉國何能若是三年累遷秘書監叅預朝政深謀逺􅄸多所宏益太宗嘗謂曰卿罪重於中鉤我任卿逾於管仲中去聲管仲名夷吾齊卿也初齊襄公被弑議立君髙國先隂告公子小白於莒魯亦發兵送公子糾而使管仲别將兵遮魯道射中小白帶鉤糾至齊小白已立是為桓公管仲請囚鮑叔牙請公用之公以為大夫後為相遂覇天下近代君臣相得寧有似我於卿者乎六年太宗幸九成宫隋仁夀宫也宴近臣長孫無忌曰長音掌凡言長孫並同長孫複姓無忌其名也字輔機文徳皇后之兄從太宗征討有功累擢比部郎中貞觀初遷吏部尚書封齊國公復進䇿司空為太子太傅髙宗時以沮立武后削官爵置黔州卒王珪魏徵往事息隱臣見之若讐不謂今者又同此宴太宗曰魏徵往者實我所讐但其盡心所事有足嘉者朕能擢而用之何慙古烈徵毎犯顔切諌不許我為非我所以重之也徵再拜曰陛下導臣使言臣所以敢言若陛下不受臣言臣亦何敢犯龍鱗觸忌諱也史記韓非𫝊曰諌説之士不可不察夫龍可擾狎而馴也然㗋下有逆鱗徑寸嬰之必殺人人主亦有逆鱗説之者能無嬰人主逆鱗則㡬矣太宗大悦各賜錢十五萬七年代王珪為侍中累封鄭國公尋以疾乞辭所職請為散官太宗曰朕㧞卿於讎虜之中任卿以樞要之職見朕之非未嘗不諌公獨不見金之在鑛古猛切金璞也何足貴哉良冶鍜而為器冶陶鑄匠也便為人所寶朕方自比於金以卿為良工雖有疾未為衰老豈得便爾耶徵乃止後復固辭聴觧侍中授以特進仍知門下省事十二年太宗以誕皇孫詔宴公卿帝極歡謂侍臣曰貞觀以前從我平定天下周旋艱險𤣥齡之功無所與讓貞觀之後盡心於我獻納忠讜安國利人成我今日功業為天下所稱者惟魏徵而已古之名臣何以加也於是親觧佩刀以賜二人庶人承乾太宗初立長子承乾為太子後以罪廢為庶人在春宫不修徳業魏王泰字恵褒太宗第四子封魏王好士善属文後貶王濮謚曰恭寵愛日隆内外庶寮咸有疑議太宗聞而惡之惡烏去聲謂侍臣曰當今朝臣忠謇無如魏徵我遣傅皇太子用絶天下之望十七年遂授太子太師唐制太子太師太傅太保為三師掌以道徳輔導皇太子知門下事如故徵自陳有疾太宗謂曰太子宗社之本須有師傅故選中正以為輔弼知公疹病可臥䕶之徵乃就職尋遇疾徵宅内先無正堂太宗時欲營小殿乃輟其材為造為去聲五日而就遣中使去聲賜以布被素褥遂其所尚後數日薨太宗親臨慟哭臨去聲贈司空謚曰文貞太宗親為製碑文復自書於石特賜其家食實封九百戸太宗後嘗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今魏徵殂逝遂亡一鏡矣因泣下乆之乃詔曰昔惟魏徵每顯予過自其逝也雖過莫彰朕豈獨有非於往時而皆是於兹日故亦庶僚茍順難觸龍鱗者歟所以虚已外求披迷内省悉井切言而不用朕所甘心用而不言誰之責也自斯已後各悉乃誠若有是非直言無隱按史傳徵疾甚藥膳賜遺無􅄸上親問疾語終日後復與太子至徵加朝服拖帶上悲懣拊之將以衡山公主降其子叔玉時公主從上曰公强視新婦徵不能謝及旦薨帝臨哭罷朝五日太子舉哀西蕐堂詔内外百官朝集皆赴䘮晉王奉詔致祭陪𦵏昭陵上登苑西樓望哭盡哀劉氏昫曰魏公與文皇討論政術往復應對凡數十萬言其匡過弼違能近取譬博約連𩔖皆前代爭臣所不至者其實身正而心勁上不負時主中不阿權倖内不侈親族外不為朋黨不以逢時改節不以圖位賣忠前代爭臣一人而已宋氏祁曰君臣之際顧不難哉以徵之忠而太宗之睿身沒未㡬猜譛遽行始徵之諌至君子小人未嘗不反覆言之以邪佞之亂忠也乆猶不免故曰皓皓者易汙嶢嶢者難全自古所歎云曽氏鞏曰太宗屈己以從羣臣之議而魏公之徒喜遭其時感知己之遇事之大小無不諌諍雖其忠直所自至亦得君以然也吕氏祖謙曰或謂三代遺直者言其以至公為心而不以事形迹為美以後言為戒而不以即應為嫌任强直之責而不顧擅權之議為忠讜之論而不畏誹謗之譏此太宗貞觀之治獨歸於徵勸行仁義之效者其以此歟唐氏仲友曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊此孟子之諫爭徵有之矣真氏徳秀曰魏公始終以規諌為己任唐史以為前代争臣一人而己豈不信哉然攷其學問淵源殆不可見文中子世家謂魏徵嘗從其學受王佐之道先儒疑之觀其勸太宗行仁義則必有所本然嘗論之有仁義之體有仁義之用正其心修其身而達之於國家天下無往而非仁義此二帝三王之所行兼體用之全者也心未必正身未必修假仁義以行之而不免於利欲之雜然其愛人利物之功禁暴止亂之政亦有補於世教此齊桓晉文之所行依倣於仁義之用而體則未純故其用亦未盡也太宗除隋之難身致升平可謂偉矣然由心而身由身而家皆有慚徳觀魏公之所論諌即事而言者多即心而論者少正救於己形者多而變化於未形者少君臣之間相與䇿勲者黽勉於仁義之用而已故貞觀之治雖有志於三王迄未能大異於五伯魏公正君之功雖秦漢以下所難及而揆之伊傅周召則猶可憾焉或以為出於縱横之學則又有未然者盖戰國䇿士多邪謟之言而魏公所陳皆正大之論是豈可同日語哉叔玠以王魏並稱考觀本末盖亦其流亞云愚按魏鄭公之諌自兩漢以来一人而已史稱為三代遺直豈不信哉然嘗聞之孟子曰人不足與適也政不足間也惟大人為能格君心之非盖而更一弊政是一弊政而已去一小人是一小人已非心存焉吾恐不勝其去不勝其更也今觀魏公之諫疏大槩能禆益於政事而不能匡正於本原能規諫於臨時而不能涵養於平昔律以孟子之言殆所謂過讁用人之非非間行政之失而已無乃於格心之道猶有所未至乎故程子謂其能正君而不能養徳真氏謂其即事而言者多即心而論者少正救於己形者多變化於未形者少其知言哉王珪字叔玠志量隱正能安於貧賤交不茍合開皇末為奉禮郎季叔頗坐事被誅珪當從坐遂亡匿積十餘嵗髙祖入闗相府司録李綱薦珪貞諒有器識引為世子府諮議叅軍及東宫建除中舍人尋轉中允餘見下文太原祁縣人也太原郡名今翼寧路𨽻河東祁縣今仍舊武徳中為隱太子中允唐制東宫官属掌侍從贊相駮正啟奏總司經典膳藥甚為建成所禮後以連其隂謀事流於巂州嶲音髓武徳末髙祖以太子與秦王有隙責珪等不能輔導皆被流貶嶲州属羅羅斯地今為建昌路𨽻雲南建成誅後太宗即位召拜諌議大夫每推誠盡節多所獻納珪嘗上封事切諌封事實封言事也太宗謂曰卿所論皆中朕之失中去聲自古人君莫不欲社稷永安然而不得者秪為不聞己過為去聲或聞而不能改故也今朕有所失卿能直言朕復聞過能改何慮社稷之不安乎太宗又嘗謂珪曰卿若常居諫官朕必永無過失顧待益厚貞觀元年遷黄門侍郎叅預政事兼太子右庶子二年進拜侍中時房𤣥齡魏徵李靖詳見下章温彦博字大臨并州人警悟而辯隋末幽州總管羅藝以州降彦博預謀召入為郎戰突厥被執貞觀初始得還尋檢校吏部侍郎時譏其煩碎後遷尚書右僕射卒追贈特進謚曰恭戴胄字𤣥𦙍相州人性明正善簿最王世充謀簒胄以大義説之秦王引為府士曹叅軍貞觀初遷大理少卿又遷尚書左丞號稱職拜諫議大夫杜如晦遺言請以選舉委胄遂檢校吏部尚書卒謚曰忠與珪同知國政嘗因侍宴太宗謂珪曰卿識鑒精通尤善談論自𤣥齡等咸宜品藻定其差品文質也又可自量孰與諸子賢量平聲對曰孜孜奉國知無不為臣不如𤣥齡每以諌諍為心耻君不及堯舜臣不如魏徵才兼文武出將入相臣不如李靖將相並去聲敷奏詳明出納惟允臣不如温彦博處繁理劇衆務必舉臣不如戴胄處上聲至如激濁揚清嫉惡好善好去聲臣於數子亦有一日之長太宗深然其言羣公亦各以為盡已所懷謂之確論按史傳珪後進爵郡公八年拜禮部尚書十一年正定五禮兼魏王師十三年卒上素服舉哀詔魏王泰率百官臨哭贈吏部尚書謚曰懿劉氏昫曰王珪履正不回忠讜無比君臣時命胥㑹于兹易曰自天祐之吉無不利叔玠有之矣陳氏惇修曰太宗嘗厯數諸臣之得失以夸大於一已而復使王珪商㩁人物珪亦盍因是而進戒曰知人之道堯以為難陛下不當以知人為能子貢方人夫子謂不暇臣亦不敢以知人自負昔臯陶陳謨分為九徳亦欲多方而叅攷之以示所難之意也今陛下安可輕問而臣亦安可輕對惜乎珪不知此且復一二而為之商㩁遂使太宗謂吾之知人如此其易而珪之品藻如此其當天下之賢否善惡皆不足辨而邪佞之言所以乘間而入也然則太宗之為君固有愧於帝堯而王珪之徒盖亦有愧於臯陶者矣愚按太宗既正位東宫首以魏徵為詹事主簿珪為諫議大夫是珪為諌官在徵之先也是時前宫齊府之黨多懐反側不安珪首請太宗坦懐待之以示無間是珪之論諫在徵之先也厥後與徵上下其論卒得與徵齊名豈偶然哉然嘗觀宋末真氏論後世賢臣悉以四事律之一曰正己二曰正君三曰謀國四曰用人以唐初諸賢臣觀之則論謀國用人王魏不如房杜論正己正君房杜不如王魏四賢如耳目股肱相資為用其致貞觀之治不亦宜乎李靖字藥師姿貌魁竒少有文武材毎曰大丈夫若遇主逢時必當立事立功以取富貴其舅韓擒虎號名將毎與論兵必曰可與言孫吴者仕隋為長安縣功曹厯駕部員外郎楊素牛𢎞皆器之餘見下文京兆三原人也京兆見前註三原縣名今属輝州路𨽻陕西大業末為馬邑郡丞大業隋煬帝年號馬邑郡今朔州路𨽻河東丞守之貳也㑹髙祖為太原留守靖觀察髙祖知有四方之志因自鎖上變詣江都今揚州路江都縣𨽻淮東至長安即闗中道塞不通而止髙祖克京城執靖將斬之靖大呼曰呼去聲公起義兵除暴亂不欲就大事而以私怨斬壯士乎太宗亦加救靖髙祖遂捨之武徳中以平蕭銑輔公祏功銑音跣祏音石蕭姓銑名後梁宣帝曽孫也隋末起兵巴陵自稱梁王靖陳十䇿髙祖命副趙郡王孝恭討之遂降輔姓公袥名為淮南道行臺僕射武徳中據丹陽反叛又詔靖副孝恭討之擒獲遂平厯遷揚州大都督府長史長音掌揚州見上註唐制總十州者為大都督長史其上佐也太宗嗣位召拜刑部尚書唐制刑部掌律令刑法徒𨽻按覆讞禁尚書其長也貞觀二年以本官檢校中書令三年轉兵部尚書為代州行軍總管代州今仍舊𨽻腹裏唐制武徳初置行軍總管以統軍進撃突厥定襄城破之定襄郡名今忻州𨽻腹裏突厥諸部落俱走磧北走音奏沙土日磧地在塞北北擒隋齊王暕之子暕古限切楊道政及煬帝蕭后送于長安突利可汗来降汗音韓凡言可汗並同降下江切後同可汗蕃王之稱猶漢時稱單于中國稱天子也突利可汗始畢可汗之子名什鉢苾嘗自結於太宗請入朝太宗禮見良厚拜右衛將軍頡利可汗處羅可汗之弟名莫賀咄設牙直五原北太宗因其地置伊西州僅以身遁太宗謂曰昔李陵提歩卒五千不免身降匈奴李陵字少卿漢武帝時為侍中將兵伐匈奴無救而敗遂降匈奴尚得名書竹帛卿以三千輕騎深入虜庭尅復定襄威振北狄實古今未有足報往年渭水之役矣以功進封代國公此後頡利可汗大懼四年退保鐵山西北之地遣使入朝謝罪使去聲後同請舉國内附又以靖為定襄道行軍總管往迎頡利頡利雖外請降而心懐疑貳詔遣鴻臚卿秦官典客漢武時更名大鴻臚郊廟行禮讃道九賔鴻聲臚傳之也唐制掌賔客及㐫儀之亊唐儉字茂系并州人聞隋政日亂説秦王建大計為天䇿長史攝户部尚書唐制户部掌天下土地人民錢穀之政貢賦之差尚書其長也詔除而非正命謂之攝將軍安修仁安姓修仁名慰諭之靖謂副將去聲張公謹字𢎞慎魏州人仕王世充為洧州長史挈城歸髙祖授檢校鄒州别駕李勣等啟秦王引入府貞觀初為代州都督謀破頡利有功封鄒國公改封州都督以恵政聞七年卒曰詔使到彼虜必自寛乃選精騎賫二十日糧引兵自白道襲之公謹曰既許其降詔使在彼未宜討撃靖曰此兵機也時不可失遂督軍疾進行至隂山在西北之極綿亘數百里遇其斥候千餘帳皆俘以隨軍頡利見使者甚悦不虞官兵至也靖前鋒乘霧而行去其牙帳七里頡利始覺列兵未及成陣單馬輕走虜衆因而潰散斬萬餘級殺其妻隋義成公主俘男女十餘萬斥土界自隂山至于大漠北邊廣漠之地遂滅其國尋獲頡利可汗於别部落餘衆悉降太宗大悦顧謂侍臣曰朕聞主憂臣辱主辱臣死往者國家草創突厥强梁太上皇以百姓之故稱臣於頡利朕未嘗不痛心疾首志㓕匈奴坐不安席食不甘味今者暫動偏師無往不捷單于稽顙單音蟬漢時蕃王之號猶可汗也耻其雪乎羣臣皆稱萬嵗漢武帝禮祭中嶽太室從官在山下聞若有言萬嵗者三後世臣下稱萬嵗者本此尋拜靖光禄大夫尚書右僕射賜實封五百户又為西海道行軍大總管征吐谷渾胡昆切吐谷渾西域國名本遼東鮮卑徒河渉歸長子之名其孫葉延遂以其名為氏大破其國改封衛國公及靖身亡有詔許墳塋制度依漢衛霍故事衛青霍去病皆漢武時為大將軍討匈奴有大功去病尚公主及亡詔與主合塟起冢象盧山築闕象突厥内燕然山燕平聲吐谷渾内積石二山以旌殊績按史傳十四年靖妻卒故有墳塋之詔及靖身亡四字疑誤十八年上幸其第問疾上將伐遼東靖入閣賜坐謂曰公南平吴㑹北清沙漠西定慕容惟東有髙麗未服公意如何對曰臣往者憑藉天威薄展微效今殘年朽骨唯擬此行陛下若不棄老臣病其瘳矣上愍其羸老不許二十三年薨贈司徒謚曰景武張氏九成曰當隋氏䘮鹿之際承唐祖騰龍之時而能依乗風雲勒功帝籍者豈有它哉特以根于忠智故功名若是其顯也觀其用兵善于料敵速于應機故所嚮有功南平吴北破突厥西走吐谷渾功大寵盛乃能闔户自守以謝過從可謂能自全矣始能免俘戮終能保厥躬勝於韓信逺矣愚按太宗天資英武善戰無敵一時羣臣皆不足以仰望清光帝之所推服而師問者獨李靖一人而已盖自孫武以来能將法度之師者獨諸葛武侯與靖耳今世傳武經雖未必出靖之手要必有近似者其論霍邑之戰謂建成㡬敗為竒兵太宗旁撃為正兵大意謂唐之戰勝特暗合兵法耳亦猶韓信謂漢髙天授非人力是也異時太宗伐遼無功而歸謂靖曰吾以天下之力屈於小夷何也靖不答所問顧曰兹事道宗知之盖指駐蹕之戰請分兵襲平壤之事也嗚呼即其所至而論靖可謂知兵之聖者欤世以英衛並稱要之李勣非靖之匹彚倫伍也虞世南字伯施性沈靜寡欲篤意學問與兄世基仕隋俱有重名時人方晉二陸累遷至秘書郎起居舍人從宇文化及至聊城又陷于竇建徳偽授黄門侍郎太宗後滅建徳引為秦府叅軍餘見下文㑹稽餘姚人也㑹音檜稽音基㑹稽郡名今紹興路餘姚縣名今陞為州𨽻浙東貞觀初太宗引為上客因開文館館中號為多士咸推世南為文學之宗授以記室與房𤣥齡對掌文翰嘗命寫列女傳去聲以装屏風於時無本世南暗書之一無遺失貞觀七年累遷祕書監太宗毎機務之隙引之談論共觀經史世南雖容貌懦弱如不勝衣懦乃亂切一音儒勝字平聲而志性抗烈毎論及古先帝王為政得失必存規諷多所補益及髙祖晏駕漢書曰宫車晏駕註謂天子當晨起早作而方崩殞故稱晏駕者臣子之心猶謂宫車晩出也按髙祖以貞觀九年五月崩太宗執䘮過禮䘮平聲後同哀容毁顇久替萬機文武百寮計無所出世南毎入進諌太宗甚嘉納之益所親禮嘗謂侍臣曰朕因暇日毎與虞世南商㩁古今朕有一言之善世南未嘗不恱有一言之失未嘗不悵恨其懇誠若此朕用嘉焉羣臣皆若世南天下何憂不理太宗嘗稱世南有五絶一曰徳行去聲二曰忠直三曰博學四曰詞藻五曰書翰及卒子聿切太宗舉哀於别次哭之甚慟䘮事官給仍賜以東園秘器𦵏具也贈禮部尚書唐制禮部掌禮儀祭享貢舉之政尚書其長也凡既没而加之以官曰贈謚曰文懿太宗手勅魏王㤗曰虞世南於我猶一體也拾遺補闕無日暫忘實當代名臣人倫凖的吾有小善必將順而成之吾有小失必犯顔而諌之今其云亡石渠東觀之中無復人矣觀去聲漢置石渠閣東觀皆藏圖籍秘書之所痛惜豈可言耶未㡬平聲太宗為詩一篇追思往古理亂之道既而歎曰鍾子期死伯牙不復皷琴列子曰鍾子期與伯牙為友伯牙皷琴子期善聽子期死伯牙絶絃以世無知音者朕之此篇將何所示因令平聲後同起居官名唐制門下省置起居郎中書省置起居舍人掌録天子之動作法度以修記事之史書以授之于國史焉禇遂良字登善杭州人愽渉經史工楷𨽻累遷起居郎十五年拜諌議大夫兼起居事後授太子賔客髙宗時拜僕射因沮立武后后立被貶卒詣其靈帳讀訖焚之其悲悼也若此又令與房𤣥齡長孫無忌杜如晦李靖等二十四人圖形於凌煙閣按史傳十七年詔趙國公長孫無忌河間元王孝恭萊國成公杜如晦鄭國文貞公魏徵梁國公房𤣥齡鄂國公尉遲敬徳衛國公李靖宋國公蕭瑀褒忠壯公叚志𤣥䕫國公劉𢎞基將忠公屈突通鄖節公殷開山譙襄公柴紹邳襄公長孫順徳鄖國公張亮陳國公侯君集郯襄公張公謹盧國公程知節永興文懿公虞世南渝襄公劉政㑹莒國公唐儉英國公李勣胡壯公秦叔寳二十四人可並圖畵於凌煙閣張氏九成曰世南始以文翰馳譽陳隋間兄弟長安方之二陸在唐以五絶見稱而論議規諷固多忠稱補過弼違有犯無隐上贊明聖之徳下植生民之利宜其眷眷勤宻而見於夢想君臣之情何其厚哉愚按世南信為徳行忠直文章之士唐興之儒臣也終身以正事君將順匡救其𢎞多矣雖君臣相得之深而未臻大用太宗止歎息以石渠東觀之中無復人亦可惜也矣李勣本名世勣字茂功永徽中以犯太宗諱單名勣焉餘見下文曹州離狐人也曹州今仍舊𨽻腹裏離狐縣名後改南華今廢本姓徐初仕李宻為左武侯大將軍李宻字元邃其先遼東人大業末韋城人翟讓聚衆為盜勣徃從之宻初從楊𤣥感起兵謀事及𤣥感敗亡命雍丘勣説讓奉宻為主號魏公宻後殺讓而人心始離武徳初入闗見髙祖拜光禄卿復以反誅宻後為王世充所破王世充字行滿本西域人姓支㓜從母嫁王氏因冐其姓仕隋為民部侍郎隂結豪傑自為太尉矯隋主侗䇿禪位殺侗自立武徳初破李宻髙祖詔秦王攻之擒歸長安族徙于蜀擁衆歸國勣猶據宻舊境十郡之地宻舊境東至於海南至于江西至汝州北至魏郡時未有所附勣並據之武徳二年謂長史郭孝恪曰長音掌郭孝恪許州人初附宻為長史後謁秦王上䇿擒竇建徳拜上柱國後遷大總管破龜兹國為流矢所中而卒魏公既歸大唐今此人衆土地魏公所有也吾若上表獻之則是利主之敗自為己功以邀富貴是吾所耻今宜具録州縣及軍人户口總啟魏公聼公自獻此則魏公之功也不亦可乎乃遣使啟宻使去聲後同使人初至髙祖聞無表惟有啟與宻甚恠之使者以勣意聞奏髙祖方大喜曰徐勣感徳推功實純臣也拜黎州總管黎州今睿州𨽻腹裏賜姓李氏附屬籍於宗正唐制宗正府掌親属以别昭穆宗室居之封其父盖為濟隂王濟上聲瀆名固辭王爵乃封舒國公授散騎常侍唐制掌規諷過失侍從顧問之職尋加勣右武候大將軍唐制武衛之職及李宻反叛伏誅勣發䘮行服䘮平聲備君臣之禮表請收𦵏髙祖遂歸其屍於是大具威儀三軍縞素三軍上軍中軍下軍也𦵏於黎陽山在今濬州禮成釋服而散朝野義之尋為竇建徳所攻䧟於建徳又自㧞歸京師竇建徳貝州人世為農材力絶人大業中募兵伐遼補隊長後據渤海自立為夏王建元置官属武徳初擒化及於魏縣進兵攻勣力屈降之收勣父為質令勣復收黎陽三年勣自㧞歸京師四年從太宗平建徳於是獲而斬之從太宗征王世充竇建徳平之貞觀元年拜并州都督并州即太原唐制武徳七年改總管曰都督立府置佐令行禁止號為稱職稱去聲突厥甚加畏憚太宗謂侍臣曰隋煬帝不觧精選賢良觧音懈鎮撫邊境惟逺築長城廣屯將士將去聲以備突厥隋大業三年詔發丁男百餘萬築長城西距榆林東至紫河旬而畢工而情識之惑一至於此朕今委任李勣於并州遂得突厥畏威逺遁塞垣安靜豈不勝數千里長城耶其後并州改置大都督府又以勣為長史長音掌累封英國公在并州凡十六年召拜兵部尚書兼知政事勣時遇暴疾驗方云鬚灰可以療之太宗自剪鬚為其和藥為和並去聲後同勣頓首見血泣以陳謝太宗曰吾為社稷計耳不煩深謝十七年髙宗居春宫轉太子詹事唐制東宫官掌統三寺十率府之政加特進仍知政事太宗又嘗宴顧勣曰朕將属以孤㓜属音嘱思之無越卿者公往不遺於李宻今豈負於朕哉勣雪涕致辭因噬指流血俄沉醉御服覆之覆音副其見委信如此勣毎行軍用師籌算臨敵應變動合事機自貞觀以來討撃突厥頡利及薛延陀北狄國名本延陀部與薛種雜居號薛延陀貞觀中㧞灼立勣滅其國置為州縣髙麗等並大破之太宗嘗曰李靖李勣二人古之韓白漢將韓信秦將白起也衛霍見前註豈能及也按史傳二十三年帝疾謂太子曰李勣才智有餘然汝與之無恩恐不能懷服我今黜之若其即行俟我死汝用為僕射親任之若徘徊顧望當殺之乃授疊州都督受詔不至家而去髙宗立召進僕射後欲立武昭儀為后畏大臣異議未决帝密訪勣勣曰此陛下家事無須問外人帝意遂定詔勣率冊立武氏總章二年卒贈太尉謚曰貞武范氏祖禹曰太宗以勣為何如人哉以為愚也則不可託㓜孤而寄天下矣以為賢也當任而弗疑何乃憂後嗣之不能懐服先黜之而後用之是以犬馬畜之也豈堯舜親賢之道乎利禄之士可得而使也又曰髙宗欲廢立而猶難於顧命大臣取决於勣之一言勣若以為不可則武氏必不立矣勣非惟不諌又勸成之孽后之立無忌遂良之死唐室中絶皆勣之由其禍豈不博哉太宗以勣為忠故託以㓜孤而其大節如此知人帝其難之信矣胡氏寅曰古者不盟結言而退盖人不愛其情相命而信喻矣逮徳下衰疑阻猜貳至於刑牲㰱血曽未旋踵又已背之是故孔子於春秋不貴盟誓而善胥命取荀息欲人之惇信而不食言也若李勣齧指出血以受太宗之託若不為負義者而於王武廢興之際以一言䘮邦則不必待如里克然後為隳大節也夫以言許人者猶恐非其本心勣受託而無一言徒齧指出血而已使當堯舜之智豈得遁乎吕氏祖謙曰太宗以勣守邊可謂善用人矣至其任以託孤之寄則非其所能也按吴起與田文論功起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如治百官親萬民實府庫子孰與起文曰不如此二者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時属之子乎属之我乎起黙然良乆曰属之子矣盖勣之賢於長城是亦吴起之所長而太宗以之處田文之任宜其敗也葉氏適曰勣本無甚所長只是不負人夫不負人固可任以事至於闗朝廷之重則非不負者能之如立武氏之説彼豈有意於負太宗者奈何利害所在彼其不學誠不識此噫以周勃之少文㡬陷吕氏之禍以霍子孟之重厚猶有所不免皆不學無術所以致也况勣以一言之失豈知他日之禍如此哉愚按太宗英武將畧優於漢髙至於知人料事不及漢髙逺矣其間章章較著者李勣之事是也自今觀之勣之為人外若純慤内任術數非特太宗不能知至今人不能知何也勣始事翟讓讓為李宻所誅勣不能死後為竇建徳所敗屈伏請降復不能死勣始與單雄信誓同死生雄信誅又不能死其名節如此獨於李宻之敗生則推功死則收𦵏太宗信其區區之小節遂謂可以託孤過矣太宗之將終也黜勣為疊州都督謂太子曰勣若即行汝用為相若不即行汝必殺之勣聞命不辭家而去夫太宗之術數可謂精矣孰知勣之術數又髙出於其上哉厥後武氏之立竟以勣一言而定而唐之子孫㡬盡於武氏之手盖太宗以術數待勣故勣亦以術數報之固不暇為唐社稷計也勣之將死告其弟曰我見房杜辛勤起家皆為不肖子所敗吾後子孫有交遊非𩔖者汝必殺之異時敬業舉兵覆宗至毁冡而暴骨嗚呼勣所任之術數至是而無所施其巧矣是以君子惡任智而大居正也馬周字賔王家貧嗜學資志曠逺武徳中補州助教不治事而去宻州趙仁本髙其才厚贈使入闗留汴為浚儀令崔賢所辱遂感激而西舍新豐逆旅主人不之顧周命酒一斗八升悠然獨酌衆異之餘見下文博州茌平人也茌士疑切博州今東昌路茌平縣名今仍舊𨽻山東貞觀五年至京師舍於中郎將去聲唐制中郎將太子府屬掌校尉旅帥及親勲翊衛之屬常何之家常姓何名史無傳時太宗令百官上書言得失令平聲後同周為何陳便宜二十餘事為去聲令奏之事皆合㫖太宗恠其能問何何對曰此非臣所發慮乃臣家客馬周也太宗即日召之未至間凡四度遣使催促使去聲及謁見與語其悦令直門下省授監察御史唐制掌分察百寮廵按州郡獄訟軍戎祭祀營作太府出納皆𨽻焉累除中書舍人唐制掌侍進奏叅議表章周有機辯能敷奏深識事端故動無不中去聲太宗嘗曰我於馬周暫時不見則便思之十八年歴遷中書令如字兼太子左庶子周既職兼兩宫處事平允處上聲甚獲當時之譽又以本官攝吏部尚書太宗嘗謂侍臣曰周見事敏速性甚慎至一作貞正至於論量人物量平聲直道而言朕比任使之比音鼻多稱朕意稱去聲既寫忠誠親附於朕實藉此人共康時政也按史傳帝嘗以飛白書賜周曰鸞鳳冲霄必假羽翼股肱之寄要在忠力周疾甚詔使視䕶躬為調藥周以所上章奏悉焚之曰管晏暴君之過取身後名吾不為也二十二年卒按此章曰貞觀五年周為何陳便宜與舊史同通鑑考異曰五年不見有詔令百官上封事唐歴曰三年六月詔文武官言得失馬周代常何陳事舊史或本於政要而吳氏所紀是也宋氏祁曰周之遇太宗顧不異哉由一介草茅言天下事若素宦於朝明習憲章者其自視與築巖釣渭亦何以異迹夫帝鋭於立事而周所建皆切一時君宰間不膠漆而固恨相得晚宜矣然周才不逮傅説吕望使後世未有述焉惜哉唐氏仲友曰觀太宗待遇馬周過于房杜王魏如四使催趣飛白之賜皆異寵也惜周不及四子功業止此史氏謂君宰不膠漆而固信矣然周之才豈獨不及説望而已哉林氏之竒曰魏無知之在漢常何之在唐其才能技業初無大過於人而無知以舉陳平而獲賞常何以舉馬周而受賜故無知之名託於陳平常何之名託於馬周以為萬世不朽之傳由此觀之人之有善豈必盡出於己哉愚按自耕莘飯牛築巖釣渭由匹夫而陞朝著君臣相得建事立功者不多見於後世矣太宗覽常何之奏而知其非何所為何又能以實告遂以布衣起新豐逆旅濟濟清要卒如覽奏之所見若馬周固偉矣太宗之知人得不尤偉矣乎周固未可焉以並驅先哲而太宗則可謂有古先哲王之遺風求諫第四凡十一童太宗威容儼肅百僚進見者見音現皆失其舉措太宗知其若此每見人奏事必假顔色兾聞諌諍知政教得失貞觀初嘗謂公卿曰人欲自照必須明鏡主欲知過必藉忠臣主若自賢臣不匡正欲不危敗豈可得乎故君失其國臣亦不能獨全其家至於隋煬帝暴虐臣下鉗口鉗巨淹切卒令不聞其過卒子聿切令平聲遂至滅亡虞世基等尋亦誅死前事不逺公等每看事有不利於人必須極言規諌愚按太宗之求諌可謂切矣而其納諌亦可以為難矣非惟能容人之諌又導人而使之諌非惟不怒人之諌又賞人而使之諌故一時之臣非特大臣能諌小臣如皇甫徳叅無不諌也非特内臣能諌外臣如李大亮無不諌也非特文臣能諌武臣如尉遲敬徳亦無不諫也非特廷臣能諫宫妾如充容徐恵亦無不諌也賢臣而能諫固也佞臣如裴矩亦諫焉中國之臣能諫固也夷狄之臣如契苾何力亦諫焉盖自三代而下求諫之誠納諌之美未能或之先也觀其貞觀之初自以威容儼肅故嘗假人以顔色深鑒煬帝滅亡故嘗求人使諫諍夫能鑒隋之亡則内有樂諌之實假人以色則外無拒諫之容故能化及一時大小咸諫雖古昔謗木諫旌之盛無以加焉盖由初年二者實有以感召之也史臣置此於求諫之首其有深意哉貞觀元年太宗謂侍臣曰正主任邪臣不能致理正臣事邪主亦不能致理惟君臣相遇有同魚水則海内可安朕雖不明幸諸公數相匡救數音朔兾憑直言鯁議鯁音梗刺在㗋也致天下太平諌議大夫王珪對曰臣聞木從繩則正后從諌則聖商書傅説告髙宗之辭明諫之不可不受是故古者聖主必有争臣七人言而不用則相繼以死爭讀曰諍孝經曰天子有爭臣七人雖無道不失其天下陛下開聖慮納芻蕘愚臣處不諱之朝處上聲實願罄其狂瞽太宗稱善詔令自是宰相入内令平聲相去聲平章國計必使諌官唐制諌官左右散騎常侍四人常規諷過失侍從顧問左右諫議大夫八人掌諌論得失侍從贊相左右補闕十二人掌供奉諷諌大事廷議小事則上封事左右拾遺十二人掌同補闕隨入預聞政事有所開説必虛已納之按通鑑曰詔諫官隨中書門下同三品官入閣孫氏甫曰太宗之任諫官真得其道夫天下之務至廣也軍國之機至要也雖明主聼斷賢相謀議思慮之失亦不能免當君相論事之際使諌官預聞得以闗説或有缺失從而正之豈不美乎然大臣論事規正於人君之前安有不從之議兹亦制馭大臣使之無過之術耳若以諫官小臣不可預聞國謀必衆知缺失方許諫正事或已行而不可救過或已彰而不可言故剛直之臣有激訐不顧以争之者君從之猶掩其過或不從則君之過大臣之罪愈大矣太宗任諫官可謂眞得其道胡氏寅曰有失輙許諫官諫止貞觀致治之本凡有天下者皆可行是為王者師也雖然諫官盡如魏徵禇遂良王珪之徒則上不懾人君威嚴下不承大臣風㫖而言可聼矣茍徒有聼諫之名而不擇忠直識治之士則或訐或比陰行其私而人主不之覺其弊有甚於不置諌官者故耳目之任以得人為要也尹氏起莘曰夫官以諫為名所言必本於公而宰相制天下事豈必盡能無失誠使諫官得隨事言之則不待命令已行而後救之於末流矣雖然諌官入閣或非大臣之所樂也必有英明之君體而行之則貞觀之治可復見矣愚按唐制入閣儀最為後世美稱盖天子既御紫宸殿復移仗御便殿百官隨入曰入閤太宗用王珪言詔諫官隨中書門下同三品入閤夫君相一體固也而宰相入内必使諌官隨之則君臣舉無過矣兹太宗所以致治之美歟愚有望後世之君人也貞觀二年太宗謂侍臣曰明主思短而益善暗主䕶短而永愚隋煬帝好自矜誇好去聲䕶短拒諌誠亦實難犯忤虞世基不敢直言或恐未為深罪昔箕子徉狂自全孔子亦稱其仁箕國名子爵也紂之諸父見紂無道諌之紂囚之為奴箕子因徉狂而受孔子曰殷有三仁焉謂㣲子去之箕子為之奴比干諫而死也及煬帝被殺世基合同死否杜如晦對曰天子有諍臣雖無道不失其天下仲尼稱直哉史魚邦有道如矢邦無道如矢仲尼孔子字史官名魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諌事見家語世基豈得以煬帝無道不納諌諍遂杜口無言偷安重位又不能辭職請退則與箕子徉狂而去事理不同昔晉恵帝姓司馬名𠂻武帝次子也西晉昏庸之主賈后恵帝之后後為趙王倫所廢矯詔賜死將廢愍懐太子名遹恵帝太子為賈后所殺趙王倫後謚曰愍懐司空張蕐司空三公之官張蕐字茂先范陽人也恵帝時為丞相竟不能苦爭阿意茍免及趙王倫字子彛晉宣帝第九子後以篡逆誅死舉兵廢后遣使收蕐使去聲後同蕐曰將廢太子日非是無言當不被納用當去聲後同其使曰公為三公太子無罪被廢言既不從何不引身而退蕐無辭以答遂斬之夷其三族古人有云危而不持顛而不扶則將焉用彼相焉於䖍切相去聲故君子臨大節而不可奪也皆論語之辭張蕐既抗直不能成節遜言不足全身王臣之節固已墜矣虞世基位居宰輔在得言之地竟無一言諌諍誠亦合死太宗曰公言是也人君必須忠良輔弼乃得身安國寧煬帝豈不以下無忠臣身不聞過惡積禍盈滅亡斯及若人主所行不當臣下又無匡諌茍且阿順事皆稱美則君為暗主臣為䛕臣君暗臣䛕危亡不逺朕今志在君臣上下各盡至公共相切磋以成理道公等各宜務盡忠讜匡救朕惡終不以直言忤意輙相責怒愚按太宗之問歸咎於君如晦之對歸罪於臣可謂兩得其道矣盖君知所以歸咎於君則為君也必能盡君之道臣知所以歸咎於臣則為臣也必能盡臣之道矣太宗君臣辭令之間豈非兩得其道哉然太宗因是而求言於臣謂終不以直言忤意輙相責怒可謂尤賢也已况斯時也正年穀豐熟百姓樂生邇安内肅上恬下熈太宗方以行帝王道有既效之語固宜望侍臣以匡救之益也制治於未亂保邦於未危此古先哲王處治安之大猷也太宗有焉貞觀三年太宗謂司空裴寂字𤣥真蒲州人仕隋為晉陽宫副監秦王方建大計未敢白髙祖以寂最善遂以情告之寂乃以宫人私侍髙祖脅從之武徳初拜僕射呼裴監不名貞觀初進拜司空後坐罪放靜州㑹𦍑反或言寂為主既而寂率家僮破𦍑帝念寂詔入朝㑹卒封河東公曰比有比音鼻上書奏事條數甚多朕總黏之屋壁出入觀省悉井切所以孜孜不倦者欲盡臣下之情每一思政理或三更方寢更平聲亦望公軰用心不倦以副朕懐也愚按成湯之聖昧爽丕顯坐以待旦周公之聖思兼三王夜以繼日經綸萬化皆是心也聖哲猶爾况賢主乎太宗毎思政理或至三更猶望羣臣同心不倦是心也坐以待旦之心乎夜以繼日之心乎貞觀五年太宗謂房𤣥齡等曰自古帝王多任情喜怒喜則濫賞無功怒則濫殺無罪是以天下䘮亂莫不由此朕今夙夜未嘗不以此為心恒欲公等盡情極諌公等亦須受人諌語豈得以人言不同己意便即䕶短不納若不能受諌安能諌人胡氏寅曰太宗俾大臣受諌盖欲大臣知諌之難受欲之難違以明已之不易然其言則善矣非惟責其臣以諫君又訓其臣以正己切磋之義也三代人君必有師友後世師難其人得端良正直之士使講論經訓規箴闕失如三益之友則亦可以成徳而寡過太宗勉此不怠其致昇平之治宜哉愚按太宗之納諫其三代以下之所無有也已能納諌可以為賢矣而又勸其臣使受人之諌可不謂尤賢乎哉且其言曰不能受諫安能諫人至哉言乎盖必已能遷善而後能告其君以善已能改過而後能正其君之過是故曹參成清靜之治資盖公之一言仁傑成中興之功賴行冲之藥石𫝊曰惟善人能受直言已不能受人之直言而望其直言於主不亦難乎貞觀六年太宗以御史大夫唐制以掌刑法典章糾正百官之罪惡御史臺之長也韋挺京兆人少與隱太子善後為太子宫臣武徳七年或言太子與宫臣謀逆帝専責宫臣遂流巂州貞觀初王珪數薦之拜御史大夫俄兼魏王府事復改太常卿帝討遼東命挺主餉料運渠塞不通挺以待凍泮帝怒廢為民中書侍郎唐制貳令之職也朝廷大政叅議焉臨軒冊命則為使以授之四夷來朝則受其表疏而奏之獻贄幣則受以付有司杜正倫相州人隋世舉秀才貞觀初魏徵薦之擢兵部員外郎遷知起居注累進中書侍郎後行左庻子漏泄帝怒太子廢坐流驩州顯慶初遷中書令出為横州刺史卒秘書少監少去聲唐制秘書監之貳職也虞世南著作郎唐制秘書省屬官也掌修撰碑志祝文祭文與佐郎分判局事姚思廉名簡以字行京兆人仕隋為河間郡司法遷代王侍讀髙祖定京師府僚皆奔獨思亷侍王帝義之授秦王府文學王即位改𢎞文館學士遷著作郎等上封事稱㫖稱去聲召而謂曰朕厯觀自古人臣立忠之事若值明主便宜盡誠規諫至如龍逄比干龍逄桀之賢臣比干紂之賢臣皆以忠諫見殺不免孥戮一作仇戮孥子也戮殺也謂併妻子而戮之也為君不易以豉切為臣極難朕又聞龍可擾而馴音循然喉下有逆鱗卿等遂不避犯觸各進封事常能如此朕豈慮宗社之傾敗每思卿等此意不能暫忘故設宴為樂音洛仍賜絹有差唐氏仲友曰此太宗見諌者悦而從之之一事也有功見之猶悦况諫諍而見知乎設宴賜帛謂思至意故舉酒相樂具有鹿鳴燕嘉賔之意亦太宗行王道之一端也愚按太宗以廷臣上封事稱㫖設宴賜帛所以奬進激勸之道可謂至矣而且以觸鱗為喻使臣下知觸忤之必無罪則將犯顔而進諌也且龍逄比干之誅事無道之君而然也以太宗之聰明英叡夫豈有是哉而能以無道之君戮諫臣以為戒亦聖王兢懼之意欤太常卿唐制掌禮樂郊廟社稷之事韋挺嘗上疏陳得失太宗賜書曰所上意見極是讜言辭理可觀甚以為慰昔齊境之難去聲夷吾有射鉤之罪蒲城之役勃鞮為斬袂之仇而小白不以為疑重耳待之若舊重平聲夷吾射鈎事見任賢篇注勃鞮晉寺人披也重耳晉文公名晉獻公使勃鞮殺重耳重耳踰垣勃鞮遂斬其衣袪重耳奔狄後重耳歸晉即位為晉君懐公之黨欲弑之勃鞮欲以告求見觧前罪文公使人讓之勃鞮曰臣不能以二心事君故得罪君已反國其無蒲狄乎於是見之豈非各吠非主漢書桀犬吠堯堯非不仁特吠非其主耳志在無二卿之深誠見於斯矣若能克全此節則永保令名如其怠之可不惜也勉勵終始􅂷範將來當使後之視今亦猶今之視古不亦美乎朕比不聞其過比音鼻未覩其闕賴竭忠懇數進嘉言數音朔用沃朕懐一何可道舊本此與上章通為一章今按不同分為二章愚按太宗賜書韋挺示至公用人之道而舉齊之管仲晉之勃鞮為喻夫齊晉二伯主置射鈎斬袂而用二子二子亦能盡忠于其君矣然嘗觀之懷公入國狐突之子毛及偃從重耳懷公命突召其子狐突曰子之能仕父教之忠䇿名委質貳乃辟也狐突寧死而毛偃事文公不二若以狐突之言律之則管仲勃鞮又若之何而可哉貞觀八年太宗謂侍臣曰朕毎閒居静坐則自内省悉井切恒恐上不稱天心稱去聲下為百姓所怨但思正人匡諫欲令平聲耳目外通下無怨滯又比見比音鼻人來奏事者多有怖慴音輙懼也言語致失次第尋常奏事情猶如此况欲諌諍必當畏犯逆鱗所以毎有諌者縱不合朕心朕亦不以為忤若即嗔責深恐人懐戰懼豈肯更言愚按昔漢賈山曰人主之威非特雷霆也勢重非特萬鈞也開導而求諌和顔色而受之人猶恐懼不敢自盡况震之以威怒乎太宗每以上不厭天心下為百姓所怨以自省固宜開導人言和顔聼納也為人君者思賈山之言充太宗之量何慮人臣之不忠諌哉貞觀十五年太宗問魏徵曰比來比音鼻朝臣都不論事何也徵對曰陛下虛心採納誠宜有言者然古人云未信而諌則以為謗己信而不諌則謂之尸禄論語子夏曰信而後諌未信則以為謗己也尸禄謂尸位而竊禄但人之才器各有不同懦弱之人懷忠直而不能言踈逺之人恐不信而不得言懐禄之人慮不便身而不敢言所以相與緘黙俛仰過日太宗曰誠如卿言朕毎思之人臣欲諌輙懼死亡之禍與夫音扶赴鼎鑊音霍冒白刃亦何異哉故忠貞之臣非不欲竭誠竭誠者乃是極難所以禹拜昌言語見虞書益稷謨豈不為此也為去聲朕今開懐抱納諌諍卿等無勞怖懼遂不極言朱氏黼曰言路通塞闗君徳之盛衰人主因言者之多寡固可自察其身之得失也諌者多必吾之能聼諌者直必吾之能容犯顔而不憚必吾無拒人之色苦口而無隐必吾無好佞之心一或反是則是吾徳之不進吾心之不大吾之好佞而惡直樂諛而畏忠也太宗即位之初虛心訪納故論諌者歩隨袂接表疏之進笥溢几盈一日萬幾在今猶昔而論事之誠頓爾銷減帝而内省當必有以致此者始導諌中悦從終勉强徵屢論矣今猶此問徵以愛身畏罪為告盖欲使帝自悟耳帝以赴鼎冒刃為開説之比終不能深自克責復為敷求也愚按貞觀十五年魏徵謂陛下欲善之志不及於昔時聞過必改少虧於曩日十三年又謂陛下志業比貞觀初漸不克終者凡十事則君徳亦少貶矣尚幸勉强欲善之意猶能自克故能開導聼納至謂羣臣近来都不論事則又在魏徵戒不克終之後得無或如徵之言乎後之人君所宜慎始而敬終也貞觀十六年太宗謂房𤣥齡等曰自知者明信為難矣如屬文之士屬音囑伎巧之徒皆自謂己長他人不及若名工文匠商畧詆訶蕪詞拙跡於是乃見由是言之人君須得匡諌之臣舉其􅄽過􅄽與愆同一日萬幾一人聼斷雖復憂勞安能盡善常念魏徵隨事諌正多中朕失中去聲如明鏡鑒形美惡必見因舉觴賜𤣥齡等數人朂之朂吁玉切勉也愚按魏徵以貞觀十七年春正月卒太宗謂𤣥齡嘗念魏徵隨事諫正如鏡照形美惡必見舉觴賜𤣥齡等數人以朂之盖欲羣臣亦如徵之極言無隠也然此言恐在徵卒之後未必在十六年也貞觀十七年太宗問諌議大夫褚遂良曰昔舜造漆器漆木名可以髹物世𫝊造漆器自舜始禹雕其俎俎薦肉之器雕鏤飾也當時諌者十有餘人食器之間何須苦諌遂良對曰雕琢害農事纂組傷女工組音祖綉作也首創奢滛危亡之漸漆器不已必金為之金器不已必玊為之所以諍臣必諌其漸及其滿盈無所復諌復音缶太宗曰卿言是矣朕所為事若有不當去聲或在其漸或已將終皆宜進諌比見前史比音鼻或有人臣諌事遂答云業已為之或道業已許之竟不為停改為去聲此則危亡之禍可反手而待也舊本此與前章通為一章今按不同分為二章仍按通鑑標年於此章之首范氏祖禹曰所貴乎賢者為其能止亂於未然閑邪於未形也若其已然則衆人之所能知也何賴於賢乎危亡之言惟明主能信闇主忽焉是以自古無事之時常患乎諌之難入也故聖主能從諌于未然賢主能改過於己然諫而不聽斯為下矣忠臣之事上君也亦諫其未然事中君也多諌其已然事闇君也救其横流故有以諌殺身者矣唐虞之時羣聖聚於朝無過舉矣憂其所當憂戒其所當戒故常有儆懼之言其慮患豫防也至于後世令王其賢臣多諌其已然而防其未然太宗求諫於羣臣其有意於防未然者乎唐氏仲友曰遂良之對是矣抑猶有説舜禹大聖纎過必改與太保旅􅋙同意荀卿謂事聖君有聼從無諫爭豈知言哉愚按昔商紂始為象箸箕子歎曰彼為象箸必不盛以土簋將為犀玉之杯玉杯象箸必不羮菽藿衣短褐而舍於茅茨之下則錦衣九重髙臺廣室稱此以求天下不足矣逺方珎恠之物輿馬宫室之漸自此而始故吾畏其卒也遂良之言其意盖亦若此也然所謂滿盈無所復諫則似非忠臣愛君之語幸太宗之言有足以救斯言之失也納諫第五凡十章直諫另為一𩔖附此篇之後貞觀初太宗與黄門侍郎王珪宴語通鑑作貞觀二年十二月以黄門侍郎王珪為守侍中上嘗閒居與珪語時有美人侍側美人女官九員充世婦之數本廬江王瑗之姬也廬江王名瑗太祖生蔚蔚生哲哲生瑗武徳末為幽州都督右領軍王君廓誘瑗反後瑗傳首至京師瑗敗籍沒入宫太宗指示珪曰廬江不道賊殺其夫而納其室暴虐之甚何有不亡者乎珪避席曰陛下以廬江取之為是邪為非邪太宗曰安有殺人而取其妻卿乃問朕是非何也珪對曰臣聞於管子曰管仲著書十八篇曰管子齊桓公之郭國齊桓公名小白郭小國齊滅之之猶往也問其父老曰郭何故亡父老曰以其善善而惡惡也惡惡上烏去聲下如字後同桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也去上聲後同已上王珪述管子之言以為喻也今此婦人尚在左右臣竊以為聖心是之陛下若以為非所謂知惡而不去也太宗大悦稱為至善遽令以美人還其親族令平聲按新舊史皆云帝雖不出此美人而甚重其言與此異通鑑考異曰太宗賢主既重珪言何得反棄而不用乎且美人汎侍左右又非嬖寵著名之人太宗何愛而留之此章為是也唐氏仲友曰王珪納諫皆人主情慾之際人所難言可謂無慙於魏徵矣愚按春秋傳曰人誰無過過而能改善莫大焉王珪之直言無諱言人之所難言太宗之改過不吝改人之所難改王珪進諌之誠太宗納諫之美方之古昔何以尚兹貞觀四年詔發卒修洛陽之乾元殿洛陽古成周之地今河南路乾元殿隋所建以備廵狩孟子曰天子適諸侯曰廵狩廵狩者廵所守也給事中唐制掌侍左右分判省事之官察𢎞文舘繕寫校讐之課大事覆奏小事署而行之張𤣥素蒲州人仕隋為景城縣户曹竇建徳陷景城將殺之邑人號泣曰此清吏殺之是無天也遂釋之貞觀初召問以政道厯太子詹事遷左庶子㑹東宫廢坐罪為民頃之召授刺史麟徳初卒上書諌曰陛下智周萬物囊括四海令之所行何往不應志之所欲何事不從微臣竊思秦始皇之為君也藉周室之餘因六國之盛將貽之萬葉及其子而亡周之季世天下大亂秦并吞之六國齊楚燕韓趙魏也始皇曰朕為始皇帝後世以數計二世三世至于萬世𫝊之無窮始皇歿二世立而趙髙弑之子嬰立而遂降于漢諒由逞嗜奔慾逆天害人者也是知天下不可以力勝神祗不可以親恃惟當宏儉約薄賦歛去聲慎終始可以永固方今承百王之末屬凋弊之餘必欲節以禮制陛下宜以身為先東都未有幸期即令補葺令平聲諸王今並出藩又湏營搆興發數多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毁天下翕然同心傾仰豈有初則惡其侈靡惡烏去聲今乃襲其雕麗其不可二也毎承音㫖未即廵幸此乃事不急之務成虛費之勞國無兼年之積何用兩都之好兩都東都洛陽西都長安也勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立粗平聲饑寒猶切生計未安三五年間未能復舊奈何營未幸之都而奪疲人之力其不可四也昔漢髙祖將都洛陽婁敬一言即日西駕漢髙祖姓劉名邦沛人伐秦得天下國號漢婁敬齊人髙祖在洛陽敬説曰陛下取天下與周異宜入闗而都按秦之故上未决張良言入闗便即日駕西都長安賜敬姓劉氏拜郎中豈不知地惟土中貢賦所均但以形勝不如闗内也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣嘗見隋室初造此殿楹棟宏壯大木非近道所有多自豫章採來豫章郡名今龍興路𨽻江西二千人拽一柱其下施轂皆以生鐵為之中間若用木輪動即火出略計一柱已用數十萬則餘費又過倍於此臣聞阿房成秦人散房音旁見政體篇註章蕐就楚衆離楚靈王為章蕐之臺納亡人以寔之乾元畢工隋人觧體且以陛下今時功力何如隋日承凋殘之後役瘡痍之人費億萬之功襲百王之弊以此言之恐甚於煬帝逺矣深願陛下思之無為由余所笑由余西戎人戎王使由余觀秦繆公示以宫室積聚由余曰鬼為之則勞神矣人為之亦苦民矣公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治由余笑曰此乃中國所以亂也云云出史記則天下幸甚矣太宗謂𤣥素曰卿以我不如煬帝何如桀紂對曰若此殿卒興卒子聿切所謂同歸於亂太宗歎曰我不思量平聲遂至於此顧謂房𤣥齡曰今𤣥素上表洛陽實亦未宜修造後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古來不易以豉切非其忠直安能如此且衆人之唯唯並音葦不如一士之諤諤可賜絹五百匹魏徵歎曰張公遂有囘天之力可謂仁人之言其利溥哉按史傳此疏有曰臣聞東都始平太上皇詔宫室過度者焚之陛下謂瓦木可用請賜貧人亊雖不從天下稱為盛徳今復度而營之是隋役又興不五六年間一捨一取天下將謂何帝顧𤣥齡曰洛陽朝貢天下中朕營之意欲便四方百姓今𤣥素言如此使後必往雖露坐庸何苦即詔罷役范氏祖禹曰上之所好者下之所競也太宗虚已以求直言故羣臣爭救其失惟恐其言之不切太宗不惟悦而從之又賞以勸之此人君之所難能也夫如是何患於有過乎張氏九成曰古人以片言干知己以疏賤投至貴非至誠切直豈足以遇合始𤣥素以小吏在擾攘間䝉天子訪問隋唐興替之由遂獲寵遇洛陽之役懇切疏諌遂有囘天之力惜乎匪人滛慢厭疾忠誨功無成而遷播之禍至此忠良所以於邑而痛哭也吕氏祖謙曰堯舜天下之至善也故人情莫不欲為之桀紂天下之至惡也故人情莫不恥言之世之為人君者未嘗不是堯舜而未為堯舜之所為亦未嘗不非桀紂而未必不為桀紂之所為如是則雖知以堯舜自名而未必不為桀紂之歸也惟聖明之君知所以為堯舜者在於力行而不在於空言茍其行之未善人雖被以桀紂之名而不怒夫然後可以進於堯舜則漢髙祖唐太宗其人也髙祖問周昌曰我何如主對曰桀紂之主太宗謂𤣥素曰我何如桀紂對曰此役不息同歸於亂夫二君三代以下之英主也雖其臣比之桀紂而二君受之雖不能盡如堯舜而亦堯舜之徒耳此無他知以桀紂自儆故不敢為桀紂之歸也愚按洛邑為土中以四方貢賦道里均也周之都鎬京也洛為東都於此而朝諸侯焉漢之都長安也洛有南宫於此而臨幸焉唐都長安視洛陽與周漢同天下既平修治洛邑若未甚害也然洛陽多隋宫室制度過侈非所宜修太宗納𤣥素之諌遽令罷役善矣它日飛仙翠㣲玉蕐之役又非洛陽陪京之事勢能追思𤣥素之言則尤善矣太宗有一駿馬特愛之恒於宫中養飼無病而暴死太宗怒養馬宫人將殺之皇后長孫氏諌曰昔齊景公以馬死殺人齊景公名杵臼晏子請數其罪云數上聲晏子名嬰字平仲齊大夫爾養馬而死爾罪一也使公以馬殺人百姓聞之必怨吾君爾罪二也諸侯聞之必輕吾國爾罪三也公乃釋罪陛下嘗讀書見此事豈忘之邪太宗意乃觧又謂房𤣥齡曰皇后庶事相啟沃極有利益爾愚按晏子諌齊景公有三罪之説其意美矣今觀太宗欲殺宫人之事盖亦有三失焉何也不寳賢而寳駿馬則寳非其寳矣不任牧人而任宫人則任非其任矣以馬死而欲殺人則刑非其刑矣向非文徳皇后之諫豈不為盛徳之累乎史稱太宗有壯馬不能御則天時為宫人進而言曰妾有三物能御之一曰鐵鞭鞭其背二曰鐵檛檛其首三曰匕首斷其㗋太宗壯之夫太宗使宫人養馬不過一時溺於嗜好而已孰知宫人之中有善御馬如則天者已潛擬於其後乎吁可畏哉貞觀七年太宗將幸九成宫隋仁夀宫也散騎常侍姚思亷進諌曰陛下髙居紫極寧濟蒼生應須以欲從人應平聲不可以人從欲然則離宫遊幸此秦皇漢武之事始皇姓嬴名政國號秦武帝姓劉名徹國號漢故非堯舜禹湯之所為也言甚切至太宗諭之曰朕有氣疾熱便頓劇故非情好遊幸好去聲甚嘉卿意因賜帛五十叚愚按漢元欲乘樓船以薛廣徳之言而止則天欲觀舍利以狄仁傑之言而止夫漢元庸君則天女主尚能改過不吝況如太宗之素號納諫者乎思亷九成之諫非不切也太宗氣疾之諭亦近於飾非矣且既不從其言復多賜之帛是人君之過可以賄賂而免人臣之直諫可以賄賂而移也太宗之賜思亷之受胥失之矣貞觀三年李大亮京兆人有文武才髙祖入闗自歸授土門令撃盗皆降擢金州司馬貞觀初授太府卿復出為凉州都督俄為西北道安撫大使以綏諸部降者八年討吐谷渾有功進爵為公拜右衛將軍臨終表請罷遼東役為凉州都督凉州今西凉州𨽻甘肅嘗有臺使至州境使去聲後同見有名鷹諷大亮獻之大亮宻表曰陛下乆絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自擅便是使非其人太宗下書曰以卿兼資文武志懐貞確故委藩牧藩屏牧守也當兹重寄比在州鎮比音鼻聲績逺彰念此忠勤豈忘寤寐使遣獻鷹遂不曲順論今引古逺獻直言披露腹心非常懇到覽用嘉歎不能已已有臣若此朕復何憂宜守此誠終始若一詩云靖恭爾位好是正直神之聼之介爾景福好去聲詩小雅小明篇之辭古人稱一言之重侔於千金卿之所言深足貴矣今賜卿金壺缾金椀各一枚雖無千鎰之重鎰音益重二十四兩為鎰是朕自用之物卿立志方直竭節至公處職當官處上聲每副所委方大任使如字以申重寄公事之閒宜觀典籍兼賜卿荀悦漢紀一部荀悦字仲豫潁川人後漢時為秘書監撰漢紀三十卷此書敘致簡要論議深博極為政之體盡君臣之義今以賜卿宜加尋閲舊本此章之首曰貞觀初今按通鑑標年張氏九成曰事君必以忠立忠必以才行已必以誠三者全脩可謂賢矣大亮文武才幹而諌獻鷹近於忠太宗親任之篤盖才兼文武而濟之以忠誠耳房喬稱有陵勃之節詎不信夫愚按太宗之朝臺閣侍從之臣獻可替否必開諭亹亹不啻如饑渇之於飲食是宜列在外服之臣亦不肯順㫖曲從敢踰位而言也若李大亮求鷹之諌太宗非惟悦從之又賞賚之盛哉太宗之納諫也然廷臣進諌猶曰朝夕論思日月獻納也逺方藩臣不在君側寧咈㫖而不顧身若大亮者可謂忠臣也已此尤藩臣之所當則效也貞觀八年陜縣丞陜縣今仍舊屬陜州𨽻河南皇甫徳叅皇甫複姓徳叅名也上書忤㫖太宗以為訕謗訕所諫切侍中魏徵進言曰昔賈誼當漢文帝上書云云可為痛哭者一可為長歎息者六漢文帝名恒髙祖次子也賈誼洛陽人文帝召為博士後為梁懐王傅上書陳亊多所匡建其畧曰臣竊惟事埶可為痛哭者一可為流涕者二可為長太息者六自古上書率多激切若不激切則不能起人主之心激切即似訕謗惟陛下詳其可否太宗曰非公無能道此者令賜徳叅帛二十叚令平聲按通鑑中牟丞皇甫徳叅上言修洛陽宫勞人收地租厚歛俗好髙髻盖宫中所化上怒謂房𤣥齡等曰徳叅欲國家不役一人不收一租宫人皆無髪乃可其意耶欲治訕謗之罪魏徵諌曰云云上曰朕罪斯人則誰敢言乃賜絹二十四匹它日徵奏言陛下近日不好直言雖勉强含容非曩時之豁如上乃更加優賜拜監察御史與此章雖小異而詳故附見焉胡氏寅曰無常者惟人心乎太宗初下洛陽毁隋宫室惡其侈也即欲修建雖為諌少輟然意終不已竟使成之最後并怒諌者欲加之罪何其一念之難囘也太宗克己從諫終自勉焉其心術有蔽不能自袪猶如此况不能克己從諫者宜如何則亦觸情縱欲猶蒹葭萑葦寧有既耶愚按為人上者甚矣虚心聽諫之難也以太宗之始怒皇甫徳叅而欲罪之復從徵言徳叅遂擢髙官膺厚賞始也怒人之言終也從人之諫不貴無過而貴改過太宗之謂矣然忤㫖之怒其中心之發見耶抑一時磯激而然也向非徵之忠鯁其為君徳之累豈少哉徳叅區區一縣丞耳乃能奮不自顧如此尤可為微臣之則效也貞觀十五年遣使詣西域使去聲後同西域西夷之國也立葉䕶可汗未還葉音攝葉䕶突厥大臣之號也本曰葉䕶統葉䕶嗣其兄射匱可汗乃號葉䕶可汗是年葉䕶數遣使入貢秋七月左領軍將軍張大帥持節即其所號立為可汗賜以皷纛又令人多賫金帛令平聲後同厯諸國市馬魏徵諫曰今發使以立可汗為名可汗未定立即詣諸國市馬彼必以為意在市馬不為專立可汗不為之為去聲可汗得立則不甚懷恩不得立則生深怨諸蕃聞之且不重中國但使彼國安寧使如字則諸國之馬不求自至昔漢文帝有獻千里馬者曰吾吉行日三十吉行謂廵幸祭祀也凶行日五十凶漢書作師凶行謂出兵行師也鸞輿在前輿漢書作旗屬車在後屬音囑漢因秦制大車八十一乘相屬也吾獨乘千里馬將安之乎乗平聲之猶往也乃償其道里所費而返之又光武名秀漢中興之君有獻千里馬及寳劍者馬以駕皷車劒以賜騎士今陛下凡所施為施平聲皆邈過三王之上邈音莫奈何至此欲為孝文光武之下乎又魏文帝姓曹名丕操之子也受漢禪國號魏求市西域大珠蘇則曰蘇姓則名字文師扶風人仕魏為侍中若陛下恵及四海則不求自至求而得之不足貴也陛下縱不能慕漢文之髙行去聲可不畏蘇則之正言耶太宗遽令止之舊本此章之首曰貞觀中今按通鑑標年唐氏仲友曰魏徵之諫不使蠻夷窺中國也先王内中夏而外四夷其待之固有其道矣後世不為所亂則為所窺皆起於喜功貪利之故太宗聖明猶不免此徵之所言切中其病而終唐之世困於亂蕐可不戒哉愚按禹貢曰織皮崑崙析支渠捜西戎即敘因其織皮之貢而即敘之此大禹之撫四夷也漢武因名馬通大宛而致連年之師光武卻名馬閉玉闗而絶西域之使二君之得失盖可覩矣是宜魏徵之進諫幸太宗克從之也貞觀十七年太子右庶子髙季輔名馮以字行徳州人以孝聞貞觀初拜監察御史不避權要累轉中書舍人列上五事後除是職遷吏部侍郎及卒謚曰憲上疏陳得失特賜鍾乳一劑鍾乳産於石食之使人生氣通胃謂曰卿進藥石之言謂其言有益於國猶藥石有益於病也故以藥石相報按史傳季輔後為吏部侍郎善銓敘人物帝賜金背鏡一以况其清鑒焉唐氏仲友曰書曰徳懋懋官功懋懋賞人主勉進臣下之功徳欲其不怠如此太宗兩賜季輔得懋賞之意然以季輔文武正直不至宰輔未為盡其才也愚按藥石所以愈膏肓之疾金鏡可以别􅎀妍之形太宗嘉人臣之進言比之為藥石望人臣之清鑒比之于金鏡可為君臣相與之盛事也貞觀十八年太宗謂長孫無忌等曰夫人臣之對帝王夫音扶多順從而不逆甘言以取容朕今發問不得有隱宜以次言朕過失長孫無忌唐儉等皆曰陛下聖化道致太平以臣觀之不見其失黄門侍郎劉洎字思道荆州人貞觀七年為治書侍御史遷右丞號稱職十七年逓日直東宫遷侍中太宗征遼東詔輔太子監國洎曰願無憂大臣有罪當按法誅之帝恠其言及還遂賜死對曰陛下撥亂創業實功髙萬古誠如無忌等言然頃有人上書辭理不稱者稱去聲或對靣窮詰無不慚退恐非奬進言者太宗曰此言是也當為卿改之為去聲按通鑑是年夏四月上至太平宫因有是問無唐儉名又載馬周曰陛下比来賞罰㣲以喜怒有所髙下此外不見其失上皆納之林氏之竒曰仁人君子之亊君當夫治安之世而危敗禍亂之言未嘗一日而忘於口者盖不如是不足以維持其治安而保養其聰明也舜襲堯之位行堯之道可謂治世矣然益曰㒺失法度禹曰無若丹朱傲臯陶曰元首叢脞哉夫舜豈有是哉而禹益臯陶則不可以無是言也太宗之徳固未能盡如堯舜貞觀之治固未能盡如唐虞之時而欲自聞其過則其心猶足為堯舜之心也惜夫太宗有堯舜好問之心而長孫無忌之徒無禹益臯陶箴規之戒可勝嘆哉愚按貞觀末年魏徵既死在廷羣臣𩔖多䛕説之風其間䛕説之特甚者長孫無忌是也太宗欲羣臣直言無忌則曰陛下無失太宗欲知其過無忌則曰陛下武功文徳臣等將順之不暇太宗欲問破髙麗之計無忌則曰諸將奉成筭而已嗚呼孔子所謂言而莫予違者其無忌之謂乎向非劉洎軰靣折廷爭庶㡬魏徵之風則貞觀之政難乎令終矣太宗嘗怒苑西監掌宫苑之官穆裕穆姓裕名命於朝堂斬之時髙宗為皇太子髙宗名治初封晉王十七年立為皇太子遽犯顔進諫太宗意乃觧司徒長孫無忌曰自古太子之諫或乗間從容而言乗平聲間去聲從即容切今陛下發天威之怒太子申犯顔之諌誠古今未有太宗曰夫人乆相與處夫音扶處上聲自然染習自朕御天下虛心正直即有魏徵朝夕進諌自徵云亡劉洎岑文本字景仁鄧州人貞觀初除秘書郎奏籍田頌擢中書舍人號善職遷侍郎十七年文本不欲兼東宫官乃詔五日一叅東宫後遷中書令卒馬周褚遂良等繼之皇太子㓜在朕膝前每見朕心説諌者因染以成性故有今日之諫舊本此章與前章通為一章今按不同分為二章愚按髙宗之處東宫也不惟己能納諌又能諌於其父何其賢哉及其在位既乆艶后擅權諫臣結舌李善感一言至比之鳳鳴朝陽其不能納諌可知矣夫以一人之身始則能諫終則拒諫其故何哉盖嘗以唐史觀之髙宗以乆不聞諌問於李勣勣對曰陛下所為盡善無事可諫嗚呼髙宗始之能諌盖由太宗之徳有以化之終之拒諫豈非李勣軰實逢君之惡哉直諌附凡十章貞觀二年隋通事舍人隋制掌引納通奏鄭仁基女年十六七容色絶姝當時莫及文徳皇后長孫氏喜圖𫝊尚禮法性約素嘗著女則十篇又為論斥漢馬后不能撿抑外家使與政事乃戒其車馬之侈此謂開本源恤末事臨終請帝納忠諌勿受讒省遊畋作役訪求得之請備嬪御太宗乃聘為充蕐唐制女官號九嬪之一詔書已出䇿使未發使去聲後同魏徵聞其已許嫁陸氏方遽進而言曰陛下為人父母書曰元后作民父母撫愛百姓當憂其所憂樂其所樂樂並音洛自古有道之主以百姓之心為心故君處臺榭處上聲後同則欲民有棟宇之安食膏粱則欲民無饑寒之患顧嬪御則欲民有室家之歡此人主之常道也今鄭氏之女乆已許人陛下取之不疑無所顧問播之四海豈為民父母之道乎道一作義臣傳聞雖或未的然恐虧損聖徳情不敢隱君舉必書所願特留神慮太宗聞之大驚手詔答之深自克責遂停䇿使乃令女還舊夫令平聲後同左僕射房𤣥齡中書令温彦博禮部尚書王珪御史大夫韋挺等云女適陸氏無顯然之狀大禮既行不可中止又陸氏抗表云某父康在日與鄭家徃還時相贈遺資財初無婚姻交涉親戚並云外人不知妄有此説大臣又勸進太宗於是頗以為疑問徵曰羣臣或順㫖陸氏何為過爾分疏徵曰以臣度之度待洛切其意可識將以陛下同於太上皇太宗曰何也徵曰太上皇初平京城得辛處儉婦稍䝉寵遇處儉時為太子舎人唐制東宫右春坊置舍人掌行令書表啟太上皇聞之不悦遂令出東宫為萬年縣見任賢篇註每懷戰懼常恐不全首領陸爽陸氏名以為陛下今雖容之恐後隂加譴讁音摘責也所以反覆自陳意在於此不足為恠太宗笑曰外人意見或當如此然朕之所言未能使人必信乃出勑曰今聞鄭氏之女先已受人禮聘前出文書之日事不詳審此乃朕之不是亦為有司之過授充蕐者宜停時莫不稱歎朱氏黼曰人主以改過為徳而以耻過作非為戒人臣以格非為職而以順非逢惡為罪太宗嘗曰前世帝王拒諫者多矣或曰業已為之又曰業已許之終不為改如此欲無危亡得乎是以終身導人使諌從善如流未嘗少有靳吝也聘陸氏已聘之女是誠不知而作也聞魏徵一言遂罪已停䇿可謂更也人皆仰之矣𤣥齡軰一時名臣宜有以將順其美正救其惡有以格君心之非可也乃曰大禮旣行不可中止雖妾婦所以愛主不當如是況大臣乎太宗有改過之徳而𤣥齡軰不免有逢惡之罪若魏徵其賢矣哉愚按古者天子一后三夫人九嬪二十七世婦八十一御妻盖天子所娶之國嫡為正后庶為娣媵正后既終則其娣媵攝行后職故曰天子諸侯不冄娶大抵六宫之職一定則不可改移不可増益也後世正家之道不明正后之立亦多以色而舉況妃嬪乎故姝麗之所在不逺千里求之雖有夫之婦有不暇恤以太宗之為君文徳之為后亦不能免魏徵之諌勉强從之而已厥後士彠之女亦以色選孰知牝晨之禍已兆於此乎益之戒舜曰㒺滛於樂仲虺之稱湯曰不邇聲色後之人君亦法乎此而已矣貞觀三年詔闗中免二年租税闗東給復一年闗東潼闗以東也尋有勅已役已納並遣輸納明年總為準折為去聲後同給事中魏徵上書曰伏見八月九日詔書率土皆給復一年老㓜相歡或歌且舞又聞有勅丁已配役即令役滿折造餘物亦遣輸了待明年總為準折道路之人咸失所望此誠平分百姓均同七子但下民難與圖始日用不足皆以國家追悔前言二三其徳臣竊聞之天之所輔者仁人之所助者信今陛下初膺大寳易大傳曰聖人之大寳曰位億兆觀徳始發大號便有二言生八表之疑心失四時之大信縱國家有倒懸之急猶必不可況以㤗山之安而輙行此事為陛下為此計者為此之為如字於財利小益於徳義大損臣誠智識淺短竊為陛下惜之伏願少覽臣言詳擇利益冐昧之罪臣所甘心簡㸃使去聲後同右僕射封徳彛等並欲中男十八已上簡㸃入軍勅三四出徵執奏以為不可徳彛重奏重平聲今見簡㸃者云次男内大有壯者太宗怒乃出勅中男已上雖未十八身形壯大亦取徵又不從不肯署勅太宗召徵及王珪作色而待之曰中男若實小自不㸃入軍若實大亦可簡取於君何嫌過作如此固執朕不觧公意觧音懈徵正色曰臣聞竭澤取魚非不得魚明年無魚焚林而畋非不獲獸明年無獸若次男已上盡㸃入軍租賦雜徭將何取給且比年比音鼻國家衛士不堪攻戰豈為其少但為禮遇失所遂使如字後同人無鬪心若多㸃取人還充雜使其數雖衆終是無用若精簡壯徤遇之以禮人百其勇謂一人可當百夫也何必在多陛下每云我之為君以誠信待物欲使官人百姓並無矯偽之心自登極已来大事三數件皆是不信復何以取信於人太宗愕然曰所云不信是何等也徵曰陛下初即位詔書曰逋私宿債欠負官物並悉原免即令平聲所司列為事條秦府國司亦非官物陛下自秦王為天子國司不為官物其餘物復何所有又闗中免二年租調去聲闗外給復一年百姓䝉恩無不歡悦更有勅㫖今年白丁多已役訖若從此放免並是虛荷國恩荷去聲若已折已輸令總納取了所免者皆以来年為始散還之後方更徵收徵平聲後同百姓之心不能無恠已徵得物便㸃入軍来年為始何以取信又共理所寄在於刺史唐制武徳初罷郡為州改太守曰刺史掌宣徳化嵗廵屬縣觀風俗録囚恤鰥寡縣令唐制縣置令掌導揚風化撫字黎氓敦民業崇地利養鰥寡恤孤貧審寃屈親獄訟常年貌税並悉委之至於簡㸃即疑其詐偽望下誠信不亦難乎太宗曰我見君固執不已疑君蔽此事今論國家不信乃人情不通我不尋思過亦深矣行事往往如此錯失若為致理乃停中男賜金罋一口賜珪絹五十匹愚按孔子曰去食去兵無信不立湯之有天下也首曰彰信兆民武王之有天下也首曰惇信明義三代之得天下未有不以信為先者也太宗即位之初首欲以誠信待物可謂能以湯武為法者矣然徒知其為信不知其所以信故魏徵厯陳其目謂原免逋債而秦府不與一不信也給散租調已散復徵二不信也簡㸃丁男不任守令三不信也太宗欣然從徵之言君臣魚水實始於此終致貞觀之盛有以也哉貞觀五年持書侍御史唐制舉劾官品本作治書避髙宗諱故改曰持權萬紀權姓萬紀名京兆人性悻直為治書侍御史魏徵奏黜之後數年復是官侍御史唐制掌紏舉百寮及入閣承詔推彈雜事李仁發俱以告訐譛毁訐居謁切數䝉引見數音朔見音現任心彈射彈平聲後同肆其欺㒺令在上震怒令平聲臣下無以自安内外知其不可而莫能論諍給事中魏徵正色而奏之曰權萬紀李仁發並是小人不識大體以譛毁為是告訐為直凡所彈射皆非有罪陛下掩其所短収其一切乃騁其姦計附下罔上多行無禮以取强直之名誣房𤣥齡𤣥齡嘗掌内外官考萬紀劾其不平斥退張亮鄭州人初𤣥齡薦為車騎將軍詳見公平篇註無所肅厲徒損聖明道路之人皆興謗議臣伏度聖心度待洛切必不以為謀慮深長可委以棟梁之任將以其無所避忌欲以警厲羣臣若信狎回邪猶不可以小謀大羣臣素無矯偽空使臣下離心以𤣥齡亮之徒猶不可得伸其枉直其餘踈賤孰能免其欺罔伏願陛下留意再思自驅使二人以来有一𢎞益臣即甘心斧鉞受不忠之罪陛下縱未能舉善以崇徳豈可進姦而自損乎太宗欣然納之賜徵絹五百疋其萬紀又姦狀漸露仁發亦解黜萬紀貶連州司馬連州今仍舊𨽻廣東司馬州僚佐也朝廷咸相慶賀焉愚按中庸曰敬大臣則不眩先儒曰信任専而小臣不得以間之故臨事而不眩也自古英明之君若漢之武宣隋之髙祖宋之孝宗既任委大臣而復信小臣之言其意盖慮大臣之専權而恃小臣之察以防之也太宗之於萬紀輩亦若是而已矣雖𤣥齡之親宻猶得而間之況其餘乎夫天下之權初無定在專在於大臣固足以致亂移於小臣尤非所以為治也唯持敬則足以増一已之聰明窮理則足以察他人之邪正人君亦勉於此而巳徒恃小臣之察欲廣已之耳目者何其惑之甚哉貞觀六年有人告尚書右丞魏徵言其阿黨親戚太宗使御史大夫温彦博案驗其事乃言者不直彦博奏稱徵既為人所道雖在無私亦有可責遂令彦博謂徵曰令平聲後同爾諫正我數百條豈以此小事便損衆美自今已後不得不存形迹居數日太宗問徵曰昨来在外聞有何不是事徵曰前日令彦博宣勅語臣云因何不存形迹此言大不是臣聞君臣同氣義均一體未聞不存公道惟事形迹若君臣上下同遵此路則邦國之興䘮或未可知太宗矍然改容曰矍厥縛切驚悟貌前發此語尋己悔之實大不是公亦不得遂懷隱避徵乃拜而言曰臣以身許國直道而行必不敢有所欺負但願陛下使臣為良臣勿使臣為忠臣太宗曰忠良有異乎徵曰良臣使身獲美名君受顯號子孫𫝊世福禄無疆忠臣身受誅夷君䧟大惡家國並䘮獨有其名以此而言相去逺矣太宗曰君但莫違此言我必不忘社稷之計乃賜絹二百疋按通鑑徵又曰稷契臯陶良臣也龍逄比干忠臣也胡氏寅曰忠良一道也未有優於忠而劣於良者亦未有偏於良而短於忠者魏公之言過為分别不若曰臣願為稷契臯陶諫行言聽不願如龍逄比干身誅國亡如此自足以警帝意也夫稷契比干所謂易地則皆然也後世事君者柔和獻納不敢强諫曰吾效稷契臯陶茍有犯顔苦口靣折廷爭者則或非之曰爾何以桀紂事吾君而欲為忠臣乎則魏公之説啟之矣林氏之竒曰自古君明臣良猶腹心手足之一體歡然無間而后朝廷之政無不舉豈拘拘形迹之末以自為疑外者太宗之於魏公雖曰言必聼諫必從而責之以宜存形迹則仆碑之兆已見於此吕氏闕而曰魏公之對誠足以警動太宗之心矣何則臣諫君從之則可以為稷契臯陶之良不從則亦不失其為龍逄比干之忠則是忠之與良固未甚相逺也若乃君之聽諌從之則為堯舜不從之則為桀紂其相去不啻霄壤則太宗於此安得而不警乎愚按魏徵忠良之論美矣然攷之文義則有不然者何也文武之臣身獲美名君受顯號専謂之良臣可也而冏命則曰咸懐忠良商紂之臣身受誅忠夷君䧟大惡専謂之忠臣可也而武王則曰焚炙良此猶渾而言之也子文仕為令尹身得令終可以為良臣矣夫子則稱之為忠奄息殺身殉𦵏以從其君可以為忠臣矣詩人則稱之為良然則徵之言豈得為定論哉先儒有言忠良一道也未有優於忠而劣於良者亦未有偏於良而短於忠者言不可易矣貞觀六年匃奴克平逺夷入貢符瑞日至年穀頻登岳牧等屢請封禪去聲封禪者封土於山襌祭於地也羣臣等又稱述功徳以為時不可失天不可違今行之臣等猶謂其晚惟魏徵以為不可太宗曰朕欲得卿直言之勿有所隱朕功不髙耶曰髙矣徳未厚耶曰厚矣蕐夏未安耶曰安矣逺夷未慕耶曰慕矣符瑞未至耶曰至矣年穀未登耶曰登矣然則何為不可對曰陛下功髙矣民未懐恵徳厚矣澤未旁流蕐夏安矣未足以供事供平聲後同逺夷慕矣無以供其求符瑞雖臻而罻羅猶宻罻音蔚積嵗豐稔而倉廩尚虛此臣所以竊謂未可臣未能逺譬且借近喻於人有人長患疼痛不能任持療理且愈皮骨僅存便欲負一石米日行百里必不可得隋氏之亂非止十年陛下為之良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封謂東封㤗山也在今㤗安州萬國咸萃要荒之外要平聲要服荒服蠻夷之地也莫不奔馳今自伊洛之東暨乎海岱岱㤗山也雈莾巨澤茫茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻寧可引彼戎狄示以虛弱竭財以賞未厭逺人之望厭音淹足也加年給復不償百姓之勞或遇水旱之災風雨之變庸夫邪議悔不可追豈獨臣之誠懇亦有輿人之論太宗稱善於是乃止按通鑑是年王月文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪漢文帝不封禪後世豈以文帝之賢不及始皇耶且事天掃地而祭何必登㤗山之顛封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徵獨以為不可云云㑹河南北數州大水事遂寢孫氏甫曰封禪之文不著於經典秦漢諸儒用管仲説以為帝王盛徳之事無大此禮故秦皇漢武行之儀物侈大自謂光輝無窮然封禪之後灾異數至天下多事盖繁費生靈干動和氣所致則崇尚此禮惡足以當天意哉況此禮不著於經典也司馬遷作封禪書引經典之文但廵守之禮耳帝王廵守每至方嶽必燔柴以告至非謂自陳功於天也帝王治天下能以功徳濟生民致時太平則天必佑之以永乆之福郊祀之禮足伸其報何待自告其功也太宗嘗謂事天至敬掃地而祭何必登山封土此實至論范氏祖禹曰古者天子廵守至於方岳必告祭柴望所以尊天而懐柔百神也後世學禮者失其傳而謟諛者為説以希世主謂之封禪實自秦始古無有也且三代不封禪而王秦封禪而亡不法三代而法秦以為太平盛事亦已謬矣太宗方明朝多賢而佞者猶倡其議獨魏徵以為時未可而亦不以其事為非也其後使顔師古議其禮𤣥齡裁定之徵亦與行之焉貞觀之末欲東封以事而止髙宗明皇遂踵終唐之世惟柳宗元以為非以韓愈之賢猶勸憲宗則其餘無足恠者鳴呼禮之失也乆矣世俗之惑可勝救哉胡氏寅曰自孟子沒聖學不𫝊學者以天人為二致不能監觀休咎之符凡天事尚象往往以道逺難知置於㝠漠而不省昧者無足恠矣以太宗之明房杜王魏並侍左右正旦日食天變為大不聞其胥訓告胥教誨以消隂沴復陽徳而羣臣獻謟侈蕩上心請登太山明示徳意太宗口雖不允實欲從之至稱功髙徳厚偃然自足徵雖以空虚勞費為言若非數州大水亦未必為止也夫大水者隂氣沴也日食者陽氣㣲也二者君象尤當儆懼而不知戒焉豈非以天人為二致不學不知道之過歟愚按文中子曰封禪其秦漢之侈心乎聖人復起不易斯言矣虞舜之制五載一廵守成周之盛六年一時廵肆覲羣后大明黜陟望秩山川盖所以盡報本之誠明命討之公也豈泥金刻玉升中告成之謂哉善乎太宗之言曰秦始皇封禪漢文帝不封禪後世豈以文帝不及始皇耶厥後惑於謟佞自背其言為魏徵計者惟當援古据經正名定論于以復先王之常禮于以掃秦漢之謬説不亦偉歟顧以罻羅猶宻倉廩尚虚執為未可夫以為未可行則必有可行之時也嗚呼大道不明禮學無据為君者昧於上為臣者惑於下不有聖人出焉孰能祛其謬而反諸正乎貞觀七年蜀王名愔太宗第六子也妃父楊譽在省競婢都官郎中唐制刑部官掌配役徒𨽻簿録俘囚以給衣糧藥料以理訴競雪寃凡公私良賤必周知之凡反逆相坐沒其家為官奴婢薛仁方留身勘問未及予奪予音與其子為千牛後魏官名隋有千牛刀人主防身刀也其職夲掌御刀葢取莊子庖丁為惠文君解牛十九年所割者數千牛而刀刃若新發硎石言此刀可以􅊀身因以名官唐制左右千牛衛將軍掌宫殿侍衛及供御儀仗左右執弓箭宿衛於殿庭陳訴云五品以上非反逆不合留身以是國親故生節目不肯决斷淹留嵗月太宗聞之怒曰知是我親戚故作如此艱難即令平聲後同杖仁方一百解所任官魏徵進曰城狐社䑕皆㣲物為其有所憑恃故除之猶不易為去聲後同易以豉切古語城狐不灌社䑕不燻謂其所棲穴者得所憑恃也故議者率謂人君左右近習為城狐社䑕况世家貴戚舊號難理漢晉以来不能禁禦武徳之中已多驕縱陛下登極方始蕭條仁方既是職司能為國家守法豈可枉加刑罰以成外戚之私乎此源一開萬端爭起後必悔之將無所及自古能禁斷此事惟陛下一人􅊀豫不虞為國常道為如字豈可以水未横流横去聲便欲自毁隄防臣竊思度待洛切未見其可太宗曰誠如公言嚮者不思然仁方輙禁不言頗是専權雖不合重罪宜少加懲肅乃令杖二十而赦之愚按仁方之問楊譽雖申屠之屈鄧通董宣之抗湖陽不是過也太宗不惟不能賞之又欲加刑焉其視孝文光武何其逺哉且既從魏徵之諫免仁方之罪可也顧猶杖二十而後赦之是猶紾兄臂而曰姑徐云爾攘鄰雞而曰請俟来年以五十步笑百步而巳從諫之道豈如是乎貞觀八年左僕射房𤣥齡右僕射髙士亷名儉齊清河王岳之孫初隱居終南山武徳初秦王領雍州牧舉為治中及居東宫授右庶子遷益州都督長史勵風俗有聲入為吏部尚書拜僕射卒贈司徒於路逢少府監少去聲唐制掌百工繕作之政竇徳素問北門近来更何營造徳素以聞太宗乃謂𤣥齡曰君但知南衙事我北門少有營造何預君事𤣥齡等拜謝魏徵進曰臣不觧陛下責觧音懈後同亦不解𤣥齡士亷拜謝𤣥齡既任大臣即陛下股肱耳目有所營造何容不知責其訪問官司臣所不觧且有利害役工多少陛下所為善當助陛下成之所為不是雖營造當奏陛下罷之此乃君使臣臣事君之道論語孔子對魯定公曰君使臣以禮臣事君以忠𤣥齡等問既無罪而陛下責之臣所不觧𤣥齡等不識所守但知拜謝臣亦不觧太宗深愧之朱氏黼曰宰相之職無所不統冢宰以九式均節財用固於朝廷庶務無不當預也作洛之役周召經營未央之成蕭何綜理烏有營繕之小而宰臣不知乎以將軍為内廷以宰相為外廷正漢人體統之紊太宗方鼎新三省復修六典獨欲使宰相専立南牙政事不預北門營造是分朝廷為二岐内外為兩以一司而處相臣也㣲魏徵盡言則唐之相職豈正哉愚按王者以天下為一家其大臣宗子之家相也故天下之事天子無不當與宰相亦無不當與者豈有南衙北門之分乎太宗責非其所當責𤣥齡等謝非其所當謝㣲魏徵之言君臣盖莫知其失也唐中葉以後以中書門下為南衙以樞宻中尉為北司軍機之宻䇿立之重宰相遂不得與聞太宗之失言實啟之矣貞觀十年越王名貞太宗第八子也長孫皇后所生太子介弟聰明絶倫太宗特所寵異或言三品以上皆輕蔑王者意在譛侍中魏徵等以激上怒上御齊政殿引三品已上入坐定大怒作色而言曰我有一言向公等道往前天子即是天子今時天子非天子耶往年天子兒是天子兒今日天子兒非天子兒耶我見隋家諸王達官已下皆不免被其躓頓我之兒子自不許其縱横縱平聲公等所容易過得相共輕蔑易以豉切後同我若縱之豈不能躓頓公等𤣥齡等戰慄皆拜謝徵正色而諌曰當今羣臣必無輕蔑越王者然在禮臣子一例𫝊稱𫝊去聲王人雖微列於諸侯之上諸侯用之為公即是公用之為卿即是卿若不為公卿即下士於諸侯也今三品已上列為公卿並天子大臣陛下所加敬異縱其小有不是越王何得輙加折辱若國家紀綱廢壞臣所不知以當今聖明之時越王豈得如此且隋髙祖不知禮義寵樹諸王使行無禮尋以罪黜不可為法亦何足道太宗聞其言喜形於色謂羣臣曰凡人言語理到不可不伏朕之所言當身私愛當去聲魏徵所論國家大法朕嚮者忿怒自謂理在不疑及見魏徵所論始覺大非道理為人君言何可容易召𤣥齡等而切責之賜徵絹一千匹愚按齊桓殊會王世子于首止春秋大之胡氏釋之曰自天王而言欲屈逺其子使次乎其下示謙徳也自臣下而言欲尊敬王世子則序乎其上正分義也然則由胡氏分義之説觀之魏徵之言非耶曰皆是也胡氏之言謂在外諸侯也魏徵之言謂在内公卿也胡氏之言謂世子也魏徵之言謂諸王也為大臣者茍不能權其輕重隨時以取中又豈足與論春秋之義哉貞觀十一年所司奏凌敬乞貪之狀凌平聲凌姓敬名初仕竇建徳為祭酒太宗責侍中魏徵等濫進人徵曰臣等每䝉顧問常具言其長短有學識强諌諍是其所長愛生活好經營是其所短好去聲今凌敬為人作碑文為去聲教人讀漢書因兹附托囘易求利與臣等所説不同陛下未用其長惟見其短以為臣等欺㒺實不敢心伏太宗納之愚按夫子曰孟公綽為趙魏老則優不可為滕薛大夫夫寸有所長尺有所短人君用其所長棄其所短可也善乎魏徵之言曰有學識强諫諍凌敬之所長也愛生活好經營凌敬之所短也太宗既不能用其所長顧欲因其所短責及舉者豈用人之道乎向非鄭公之諌太宗好賢之意荒矣貞觀十二年太宗謂魏徵曰比来所行得失政化比音鼻何如往前對曰若恩威所加逺夷朝貢比於貞觀之始不可等級而言若徳義潜通民心悦服比於貞觀之初相去又甚逺太宗曰逺夷来服應由徳義所加應平聲往前功業何因益大徵曰昔者四方未定常以徳義為心旋以海内無虞旋平聲漸加驕奢自溢所以功業雖盛終不如往初太宗又曰所行比往前何為異徵曰貞觀之初恐人不言導之使諫三年已後見人諫悦而從之一二年来不悦人諫雖勉强聼受而意終不平諒有難也太宗曰於何事如此對曰即位之初處元律師死罪處上聲後同元姓律師名孫伏伽貝州人武徳中上言三事帝稱之曰誼臣貞觀中拜御史遷大理卿諫曰法不至死無容濫加酷罰遂賜以蘭陵公主園直錢百萬人或曰所言乃常事而所賞太厚答曰我即位来未有諫者所以賞之此導之使言也徐州司户栁雄徐州今仍舊𨽻河南司户州屬户曹栁姓雄名於隋資妄加階級人有告之者陛下令其自首令平聲首去聲後同不首與罪遂固言是實竟不肯首大理推得其偽將處雄死罪少卿戴胄奏法止合徒少去聲唐制徒刑五一年至於三年陛下曰我已與其斷當訖當去聲但當與死罪胄曰陛下既不然即付臣法司罪不合死不可酷濫陛下作色遣殺胄執之不已至於四五然後赦之乃謂法司曰但能為我如此守法為去聲豈畏濫有誅夷此則悦以從諫也往年陕縣丞皇甫徳叅上書大忤聖㫖陛下以為訕謗臣奏稱上書不激切不能起人主意激切即似訕謗于時雖從臣言賞物二十叚意甚不平難於受諌也太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論説過失堪驚公但存此心朕終不違公語胡氏寅曰天下之理不進則退不退則進以天地日月四時之運與萬物之盈虛消長觀焉則見矣人之徳慧智術何獨不然太宗自謂今所為猶往年也是則不逮往年也譬之日焉雖在昃晡未嘗不明若語其嚮於熈盛豈若未中之時乎是故乾之象曰君子以自强不息湯之盤銘曰茍日新日日新又日新知從事於此者惟持忠存誠以堯舜為法豈不可及勉焉日有孜孜斃而後已是則湯所以入聖域而成功不殊惜乎太宗之未學也愚按隋文帝失天下之道不一而莫大於拒諫唐太宗得天下之道不一而莫大於納諫夫太宗之納諫豈其天性之本然哉良由目覩煬帝之亡矯揉勉强而行之也故貞觀之初天下未安則能導人使諫中年天下漸安尚能悦人之諫末年天下已安則勉强從人之諫矣昔者舜之舍己從人禹之聞善則拜湯之從諫弗咈終其身於一日果何道哉盖聖人之納諫由於志氣之自然故無始終之異太宗之納諫由於血氣之矯揉故少而鋭老而衰也然則人君欲盡納諫之道者可不孳孳而務聖人之學哉貞觀政要卷二
