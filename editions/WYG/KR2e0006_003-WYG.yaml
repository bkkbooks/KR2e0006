body:
  text: 貞觀政要卷三唐吳兢撰元戈直集論君臣鑒戒第六凡七章貞觀三年太宗謂侍臣曰君臣本同治亂共安危若主納忠諌臣進直言斯故君臣合契古來所重若君自賢臣不匡正欲不危亡不可得也君失其國臣亦不能獨全其家至如隋煬帝暴虐臣下鉗口卒令不聞其過卒子聿切令平聲遂至滅亡虞世基等尋亦誅死前事不逺朕與卿等可得不慎無為後所嗤愚按大宗常以隋煬帝為戒而欲其臣以虞世基為戒形之於言者數矣夫人雖至愚未有不愛吾身者也煬帝之縱欲肆志未必不曰吾知愛吾身而已不暇憂吾民也世基之緘黙保位未必不曰吾知愛吾身而已不暇憂吾君也豈知江都西閣之變君臣俱不免也哉故君以煬帝為戒則凡吾之容受直言非以愛其臣也所以為吾身計也臣以世基為戒則凡吾之盡忠無隱非以愛其君也所以為吾身計也君臣各為其身計則炎涼寒燠無一時不愛吾身也寧可以須㬰之不謹乎髪膚齒甲無一處之非吾身也寧可以細㣲之不謹乎然則君臣宵旰相與嘉惠蒼生者非以利天下國家也各愛其身而已太宗斯言推其意若出於一己之私盡其義乃所以成天下之公也貞觀四年太宗論隋日魏徵對曰臣往在隋朝曾聞有盗發曽音層煬帝令於士澄捕逐令平聲後同於如字姓也士澄名為隋將以魏郡降唐但有疑似苦加拷掠枉承賊者二千餘人並令同日斬決大理丞隋獄官之貳職張元濟怪之試尋其狀乃有六七人盗發之日先禁他所被放纔出亦遭推勘不勝苦痛勝平聲自誣行盗元濟因此更事究尋二千人内惟九人逗遛不明逗音豆遛音留遷延也官人有諳識者就九人内四人非賊有司以煬帝已令斬決遂不執奏並殺之太宗曰非是煬帝無道臣下亦不盡心須相匡諫不避誅戮豈得惟行諂佞茍求悦譽平聲君臣如此何得不敗朕賴公等共相輔佐遂令囹圄空虛願公等善始克終恒如今日愚按大學曰為人君止於仁為人臣止於敬此言君臣各盡其道也虞廷賡歌帝舜先言股肱皋陶先言元首此言君臣更相責難也各盡其道所以明上下之分更相責難所以明上下之交也今觀前章太宗自以煬帝為戒欲羣臣以世基為戒此君臣各盡其道者也此章論隋世濫刑則魏徵歸過於君太宗歸過於臣此君臣更相責難者也二章之㫖實相為用史臣以此居鑒戒之首豈非貞觀致治之本歟貞觀六年太宗謂侍臣曰朕聞周秦初得天下其事不異然周則惟善是務積功累徳所以能保八百之基秦乃恣其奢滛好行刑罰好去聲後同不過二世而滅豈非為善者福祚延長為惡者降年不永朕又聞桀紂帝王也以匹夫比之則以為辱顔閔匹夫也顔回字子淵閔損字子騫皆孔子弟子以徳行稱以帝王比之則以為榮此亦帝王深恥也朕每將此事以為鑒戒常恐不逮為人所笑魏徴對曰臣聞魯哀公魯君名蔣謂孔子曰有人好忘者移宅乃忘其妻孔子曰又有好忘甚於此者丘見桀紂之君丘孔子名乃忘其身願陛下每以此為慮庶免後人笑爾愚按桀紂帝王也以匹夫比之則以為辱何辱焉人心之惡惡也顔閔匹夫也以帝王比之則以為榮何榮焉人心之善善也孜孜為善顔閔之徒也以匹夫而天下後世所企敬匹夫而帝王矣孜孜為惡桀紂之徒也以帝王而天下後世所羞稱帝王而匹夫矣太宗所論亦知言哉而魏徴之對又明桀紂之所以為桀紂也愚則曰欲知桀紂顔閔之分善與惡之間也貞觀十四年太宗以髙昌平高昌西域國名都交河城漢車師之地其王麴文泰是年文泰卒子智盛立平謂征討平定也召侍臣賜宴於兩儀殿謂房𤣥齡曰高昌若不失臣禮豈至滅亡朕平此一國甚懷危懼惟當戒驕逸以自防納忠謇以自正謇音蹇直言也黜邪佞用賢良不以小人之言而議君子以此慎守庶幾於獲安也幾平聲魏徴進曰臣觀古來帝王撥亂創業必自戒慎採芻蕘之議從忠讜之言天下既安則恣情肆欲甘樂諂䛕樂音洛惡聞正諌惡烏去聲張子房漢王計畫之臣及高祖為天子將廢嫡立庶子房曰今日之事非口舌所能争也張子房名良漢封留侯高祖欲廢太子盈立趙王如意或謂呂后曰留侯善畫計上信用之后刼良曰君為上謀臣今上欲易太子君安得高枕而卧良曰始上在急困中幸用臣䇿天下已定以愛欲易太子雖臣等百人何益后强要曰為我畫計良曰此難以口舌争遂為太子請四皓為輔賴以不廢終不敢復有開説復音􅇲况陛下功徳之盛以漢祖方之彼不足凖即位十有五年太宗以武徳九年即帝位至是十有五年聖徳光被今又平殄高昌屢以安危繫意方欲納用忠良開直言之路天下幸甚昔齊桓公齊君名小白與管仲鮑叔牙寗戚三人皆齊相四人飲桓公謂叔牙曰盍起為寡人夀乎為去聲諸侯自稱曰寡人言寡徳之人也叔牙奉觴而起曰奉音捧願公無忘出在莒時桓公初出奔於莒鮑叔為之傅使管仲無忘束縛於魯時桓公立謂魯曰管仲讐也請得甘心醢之管仲請囚叔牙迎受之及堂阜而脱桎梏使寗戚無忘飯牛車下時寗戚嘗候桓公出扣牛角歌曰南山矸白石爛中有鯉魚長尺半生不遭堯與舜禪短布單衣纔至骭從昏飯牛至夜半公遂召之為相桓公避席而謝曰寡人與二大夫能無忘夫子之言則社稷不危矣太宗謂徵曰朕必不敢忘布衣時公不得忘叔牙之為人也按通鑑十三年髙昌王麴文泰遏絶西域朝貢伊吾既内屬高昌又與西突厥共擊之上徴其臣阿史那矩文泰不遣中國人在突厥者或奔高昌詔使歸之亦不遣又與西突厥共破焉耆上遣使責之文泰語不遜於是詔侯君集等擊之遂降由此唐地東極于海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里為唐之極盛焉愚按唐虞之世雍熈泰和帝治之極盛也聖君賢相都俞吁咈於一堂之上凛乎儆戒之言以聖君賢相夫豈有是哉兹所以保雍熈泰和之盛也今觀高昌既平土宇極盛太宗有兢兢保治之言魏徴有諄諄鍳戒之意兹所以成貞觀太平之盛也然古帝王傳心之學其要在於欽而儆戒之際尤謹於欽之一辭蓋敬者萬化之本原一心之妙用聖神之能事學問之極功帝王授受之懿在此其發於言者皆由於心也故能無怠無荒謹終如始為上人者佩太宗君臣鑒戒之言體帝王心學之要則豈惟貞觀可以進於三代之上矣貞觀十四年特進魏徴上疏曰臣聞君為元首臣作股肱齊契同心合而成體體或不備未有成人然則首雖尊高必資手足以成體君雖明哲必藉股肱以致理禮云人以君為心君以人為體心莊則體舒心肅則容敬禮緇衣篇之辭書云元首明哉股肱良哉庶事康哉元首叢脞哉股肱惰哉萬事墮哉墮音隳虞書皋陶賡歌之辭然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇夫音扶後同自古為難以石投水千載一合以水投石無時不有其能開至公之道申天下之用内盡心膂音旅外竭股肱和若鹽梅商書高宗命傅説曰若作和羮爾惟鹽梅固同金石者非惟高位厚秩在於禮之而已昔周文王遊於鳳皇之墟韈系解顧左右莫可使者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子者哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝功於垓下若夏桀不棄於伊尹項羽垂恩於韓信寧肯敗已成之國為滅亡之虜乎媵音𦙍垓音該伊姓尹字也伊尹名摯湯三聘之遂佐湯伐桀放桀於南巢之地有莘國名送女曰媵湯妃有莘氏之女也史記謂伊尹欲行道以致君而無由乃為有莘氏之媵臣説湯致於王道蓋戰國時有為此説者韓姓信名也淮陰人數以䇿干項羽羽弗聽信亡歸漢高祖用蕭何言於是擇日齋戒設壇塲拜信為大將後圍羽於垓下之地又㣲子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者微箕二國名子爵也㣲子紂之庶兄諌紂不聽遂去之武王克商封㣲子於宋箕子紂之諸父諌紂不聽被囚為奴武王即位訪之箕子為陳洪範九疇論語曰㣲子去之箕子為之奴比干諫焉而死孔子曰殷有三仁禮記稱魯穆公問於子思曰穆公魯君名顯子思孔子之孫名伋為舊君反服古歟為去聲子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸泉隊音墜泉禮作淵蓋避高祖諱故以泉代淵毋為戎首不亦善乎又何反服之禮之有禮檀弓篇之辭齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死難去聲後同出亡不送公曰裂地以封之疏爵而待之疏平聲有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諌而見納終身不亡臣何送焉若言不見用有難而死是妄死也諫不見納出亡而送是詐忠也春秋左氏傳曰傳去聲春秋孔子所作而左氏為傳崔杼弑齊莊公崔杼齊臣崔武子也莊公名光晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之為去聲後同為社稷亡則亡之若為已死為已亡非其親暱誰敢任之門啟而入枕尸股而哭興三踊而出枕去聲踴音勇事見左傳襄公二十五年孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如糞土臣視君如㓂讐孟子告齊宣王之辭雖臣之事君無二志至於去就之節當緣恩之厚薄然則為人主者為如字後同安可以無禮於下哉竊觀在朝羣臣當主樞機之寄者或地隣秦晉或業與經綸與音預並立事立功皆一時之選處之衡軸處上聲為任重矣任之雖重信之未篤則人或自疑人或自疑則心懷茍且心懷茍且則節義不立節義不立則名敎不興名敎不興而可與固太平之基保七百之祚未之有也又聞國家重惜功臣不念舊惡方之前聖一無所間去聲然但寛於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之況上啟其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一源下生百端之變無不亂者也禮記曰愛而知其惡憎而知其善禮曲禮篇之辭若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庶遄沮詩小雅巧言篇之辭然則古人之震怒將以懲惡當今之威罰所以長姦長音掌後同此非唐虞之心也非禹湯之事也書曰撫我則后虐我則讐周書武王誓師之辭荀卿子名况趙人卿者時人相尊之號著書曰荀子曰君舟也人水也水所以載舟亦所以覆舟此本家語之辭而荀子述之也故孔子曰魚失水則死水失魚猶為水也故唐虞戰戰慄慄日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求至理豈可得乎又政貴有恒不求屢易今或責小臣以大體或責大臣以小事小臣乗非所據乗平聲大臣失其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其辜欲其無私求其盡力不亦難乎難如字小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟咎莫能自明則茍求免禍大臣茍免則譎詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣又委任大臣欲其盡力毎官有所避忌不言則為不盡若舉得其人何嫌於故舊若舉非其任何貴於踈逺待之不盡誠信何以責其忠恕哉臣雖或有失之君亦未為得也夫上之不信於下必以為下無可信矣若必下無可信則上亦有可疑矣禮曰上人疑則百姓惑下難知則君長勞禮緇衣篇之辭上下相疑則不可以言至理矣當今羣臣之内逺在一方流言三至而不投杼者秦甘茂告秦王曰魯人有與曾參同姓名者殺人人告其母母織自若三人告之其母投杼下機踰墻而走臣之賢不及曾參王之信臣不如其母疑臣者非特三人臣恐大王之投抒也臣竊思度待洛切未見其人夫以四海之廣士庶之衆豈無一二可信之人哉蓋信之則無不可疑之則無可信者豈獨臣之過乎夫以一介庸夫結為交友以身相許死且不渝況君臣契合寄同魚水若君為堯舜臣為稷契音泄稷農官舜命棄曰汝后稷播時百榖命契曰汝作司徒敬敷五敎豈有遇小事則變志見小利則易心哉此雖下之立忠未有明著亦由上懷不信待之過薄之所致也豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四三皇史記謂庖犧氏女媧氏神農氏也孔安國書序以伏羲神農黄帝為三皇一説謂天皇地皇人皇未詳孰是五帝可俯而六矣夏殷周漢夫何足數上聲太宗深嘉納之范氏祖禹曰昔衛獻公捨大臣而與小臣謀故失國出奔且大臣之所任者大小臣之所任者小而以小謀大以逺謀近此人君偏聽之蔽鮮有不敗事者也唐氏仲友曰此魏徵論聽納任用之要人君必先知此然後能任君子去小人納忠諫察奸言以太宗之聰明惟其見道之淺至於聽言任用之間數領鄭公之諫而非諫之左挈右提則移於小人惑於奸言多矣此徵最冇功於貞觀者於格非近之矣愚按太宗於是臨御乆矣魏徴竭誠進諌惓惓於慎終如始之言至此疏復以君臣同心一體詳譬而曲陳之甚若致戒於庸君常主之前其愛君亦云至矣且終之曰三皇可追而四五帝可俯而六夏殷周漢夫何足數皇道尚矣五帝之徳蔑以加矣嘗觀典謨所陳都俞吁咈於一堂之上始而克艱之戒終之明良之歌而其要領則在欽哉之一言君臣同心其在是也魏徴四三皇六五帝之說亦所謂貴難於君者歟貞觀十六年太宗問特進魏徴曰朕克己為政仰企前烈至於積徳累仁豐功厚利四者常以為稱首朕皆庶幾自勉幾平聲人苦不能自見不知朕之所行何等優劣徴對曰徳仁功利陛下兼而行之然則内平禍亂外除戎狄是陛下之功安諸黎元各有生業是陛下之利由此言之功利居多惟徳與仁願陛下自彊不息必可致也愚按太宗以徳仁功利岐而言之而魏徴之對亦未得為知言也蓋徳仁本也功利用也有徳與仁則功利在其中所謂不求利而未嘗不利也外徳與仁而言功利則非聖賢所謂功利矣昔孟子告梁惠王曰王何必曰利亦有仁義而已矣正以仁義乃所以利之言仁義而利在其中也積徳累仁則豐功厚利莫大焉政恐未之能爾貞觀十七年太宗謂侍臣曰自古草創之主至于子孫多亂何也司空房𤣥齡曰此為㓜主為去聲生長深宫長音掌少居富貴少去聲未嘗識人間情偽理國安危所以為政多亂太宗曰公意推過於主朕則歸咎於臣夫功臣子弟夫音扶多無才行去聲藉祖父資䕃遂處大官處上聲徳義不修奢縱是好去聲主既㓜弱臣又不才顚而不扶豈能無亂隋煬帝錄宇文述在藩之功擢化及於高位不思報效翻行弑逆化及隋相字文述之子為右屯衛將軍武徳初弑煬帝於江都立秦王浩復殺浩自立稱許帝二年竇建徳破化及於聊城殺之此非臣下之過歟朕發此言欲公等戒朂子弟使無􅄽過即家國之慶也太宗又曰化及與𤣥感即隋大臣受恩深者子孫皆反其故何也𤣥感隋相楊素之子為大將大業九年起兵黎陽圍東都隋主命宇文述等討之遂敗死岑文本對曰君子乃能懷徳荷恩荷去聲𤣥感化及之徒並小人也古人所以貴君子而賤小人太宗曰然愚按古者諸侯有世封公卿大夫無世官何也蓋諸侯有大臣輔佐自非甚無道者皆足繼其先世公卿大夫一非其人民有受其害者矣有周盛世自諸侯入為公卿必若呂伋召虎而後可也自兩漢以來未聞宰相大臣有世官者煬帝無道事不師古𤣥感化及之禍自取之耳太宗問守成之君何以多亂𤣥齡以為㓜主生長深宫不識人間情偽所以多亂其説是矣太宗迺歸咎於功臣之子弟則愚不知其何説也今觀太宗之後近而高宗中宗之昏庸逺而穆敬懿僖之謬戻馴致亂亡咸其自取豈功臣子弟之罪乎擇官第七凡十一章貞觀元年太宗謂房𤣥齡等曰致理之本惟在於審量才授職量平聲後同務省官員故書稱任官惟賢才又云官不必備惟其人商周書之辭若得其善者雖少亦足矣其不善者縱多亦奚為古人亦以官不得其才比於畫地作餅不可食也詩曰謀夫孔多是用不集詩小雅小旻篇之辭又孔子曰官事不攝焉得儉焉於䖍切論語孔子言管仲之辭且千羊之皮不如一狐之腋史記商君問趙良曰子觀我冶秦也孰與五羖大夫賢良曰千羊之皮不如一狐之腋千人之諾諾不如一士之諤諤此皆載在經典不能具道當須更併省官員使得各當所任各當之當去聲則無為而理矣卿宜詳思此理量定庶官員位𤣥齡等由是所置文武總六百四十員太宗從之因謂𤣥齡曰自此儻有樂工雜𩔖假使術逾儕輩者只可特賜錢帛以賞其能必不可超授官爵與夫朝賢君子夫音扶比肩而立比音鼻同坐而食遺諸衣冠以為恥累良偽切按通鑑唐初士大夫以亂離之後不樂仕進官員不充省符下諸州差人赴選勒赴省選集者七千餘人吏部劉林甫隨材銓敘各得其所時人稱之上謂𤣥齡曰官在得人不在員多命併省留文武總六百四十三員百官志曰太宗省内外官定制七百三十員曰吾以此待天下賢才足矣朱氏黼曰有事則有職有職則有官理也古人以事任人事省則職省故有有職而無官後世以人任官人増則官増故有有官而無職有職而無官非廢事也或一官而兼數職有官而無職非增事也或一職而任數人周官雖多非皆具員也考之周禮名存而實不備職具而官不除者尚多貞觀之制非不甚美矣然員外之置已見於當時將何以一流品杜將來哉其後宰相或至數人員外官至二千餘員其末流之弊未必非太宗啟之愚按唐虞稽古建官惟百夏商官倍亦克用乂古之建官簡矣然九官四岳十二牧實二十五人而書稱二十二人蓋亦有以一人而兼二職者也周官三百六十總計六萬三千六百有竒周之建官雖多然周禮者周公未行之書也書稱召公以太保兼冢宰畢公以太師兼司馬蓋亦有以一人而兼二職者也後世建官既冗復無攝事太宗深懲斯弊省内外官文武總六百四十員自後世觀之可謂省之極矣然房𤣥齡以僕射而兼領度支魏徴以侍中而兼東宫官蓋亦有以一人而兼二職者矣愚嘗論貞觀之善政當以省官為首何也易於選擇上不至於失人俸禄易供下不憂於厚歛權任專一無避事茍免之患員數不多無紛更生事之憂官冗則四者反是厥後兵部之職分於樞宻戸部之職分於三司監軍侵監司之權州將奪太守之任員外之置多於正員墨敕斜封數逾千百而貞觀之善政隳矣夫後世之天下猶貞觀之天下太宗何以致是哉竊謂其大要有二一曰息奔競二曰裁嬖幸蓋奔競之風盛則員多而闕少官不得以不增也嬖倖之門多則私思無所施官不得以不增也斯二者省官之本也有志於貞觀之治者盍亦反其本而已貞觀二年太宗謂房𤣥齡杜如晦曰公為僕射當助朕憂勞廣聞耳目求訪賢哲比聞公等比音鼻聽受辭訟日有數百此則讀符牒不暇安能助朕求賢哉因敕尚書省唐制尚書謂之都省置令一人典領百官貞觀中以太宗曾為之故缺而不置其次左右僕射各一人左右丞各一人其屬有六部庶務皆會決焉凡符移闗牒必遣於都省乃下天下大事不决者皆上都省細碎務皆付左右丞唐制掌辨六官之儀紀正省内劾御史舉不當者吏戸禮三部左丞總焉兵刑工三部右丞總焉惟寃滯大事合聞奏者闗於僕射范氏祖禹曰太宗責宰相以求賢而不使親細務可謂能任以其職矣書曰惟説式克欽承旁招俊乂列于庶位此相之職也茍不務此而治簿書期㑹百吏之事豈所謂相乎胡氏寅曰宰相受詞既非古制然當之者未有以為不可雖賢如房杜亦且行之何也其説有五無經濟之畧姑以是為勤於所職者一也人君明察則不敢當權而以吏事自為者二也才用粗淺熟於有司之務躐躋其任益以勉勉者三也上不知治本而責成於叢脞因以奉承之者四也實侵大權故治文案以助其君者五也若誠知宰相職分必不肯然矣房杜之才非能賢於太宗故太宗如是而止固不能為太甲高宗成王之事也唐氏仲友曰王省惟歲卿士惟月師尹惟日蓋其位愈尊其事愈要其任愈逸其位愈卑其事愈詳其任愈勞太宗以細務屬左右丞大事闗僕射當矣責宰相以廣耳目訪賢才亦當矣雖然廣耳目訪賢才坐論大事在房杜任之尚恐未能無愧古人而叅之以封倫楊師道之屬可乎是知宰相之職而未得擇宰相之道也愚按人主之職在論一相一相之職在任百官此君相之要道也受詞誠非為相之體然大臣慮四方豈惟高虛拱揖以自居哉畢公周之元老大臣也克勤小物弼亮四世小物非細務乎昔陳平不答錢榖决獄之問而曰宰相上佐天子理陰陽下遂萬物之宜此言固大矣然錢榖國計民命所闗冢宰之所制者也獄者生民之司命三公之所當叅聽者也此皆裁成輔相以左右生民者而曰宰相不當知則所職者何事耶太宗敕宰相勿親細務特不可下行有司之事耳克勤小物以弼亮天子有古人之相業在貞觀二年太宗謂侍臣曰朕毎夜恒思百姓間事或至夜半不寐惟恐都督唐制武徳七年改總管曰都督掌督諸州兵馬甲械城隍鎮戍糧廩總判府事刺史見前篇註堪養百姓與否故於屏風上録其姓名坐卧恒看在官如有善事亦具列於名下朕居深宫之中視聽不能及逺所委者惟都督刺史此輩實理亂所繫尤須得人愚按自秦罷侯置守之後郡守古諸侯其闗繫民生至不輕也漢宣帝謂與我共理者惟良二千石太宗謂治民之本在刺史斯言也真知本者矣然宣帝以刑名繩下故當時固多循吏而未免有酷吏太宗英明仁恕故當時居多循吏而無酷吏此又二帝之優劣也貞觀二年太宗謂右僕射封徳彛曰致安之本惟在得人比來比音鼻命卿舉賢未嘗有所推薦天下事重卿宜分朕憂勞卿既不言朕將安寄對曰臣愚豈敢不盡情但今未見有奇才異能太宗曰前代明王使人如器皆取士於當時不借才於異代豈得待夢傅説音悦傅説商賢相也武丁夢得聖人名曰説以夢所見視羣臣百吏皆非也乃使營求之野得説扵巖中立為相逢吕尚吕尚太公也本姓姜從其封姓周西伯將出獵卜之曰所獲非龍非彲非虎非羆覇王之輔果遇太公於渭之陽與語大悦遂載與俱歸立為師然後為政乎且何代無賢但患遺而不知耳徳彛慙赧而退赧奴版切愧態也按史傳繫元年二月帝謂封倫曰大理之職人命所懸此官極須妙選公直倫未對帝曰戴胄忠直每事用心即其人也又謂倫曰云云孫氏甫曰大臣之職薦達人才固非細事天下之大羣臣之衆可容一日乏才乎然人之才有能有不能器而使之衆職舉矣豈有人主責其舉賢己未推薦但言無奇才異能上欲欺主之明下欲蔽天下之善此真姦人也蓋姦人不樂進賢其情有三保位固寵常懼失之以賢者既用必建立功業掩己之名見己之過名滅過露則位不能保寵不能固其情一也姦人立私必人附己乃引之賢者進退以道不肯趨附姦人以謂不附己而引之則不知己之恩不知恩則不為己之黨其情二也姦人心既不公知人不明雖遇賢才不能深識慮引而進之或有大過為已之累其情三也封倫之情正在於此太宗以前代未嘗乏人折之使慙懼無辭可謂能照姦人之情者也人主能照姦人之情則賢者進矣胡氏寅曰舉賢才而效之君大臣職也為大臣而乆無所舉人主詰之是也若出此令而委之房杜王魏非惟丕應徯志亦必各得其人矣乃以望於封倫且取人以身不誣之理也倫非賢者安能知賢若舉其𩔖集于朝廷豈非大憂乎是則非特倫無知人之鑒而太宗於倫亦初不知其姦邪也信知人之難哉愚按封倫謟佞人也其在隋附麗虞世基諂順其主得羣臣表疏則屛而不奏鞫獄用法則峻文深刻論功行賞則抑削就薄故世基之寵日以隆而孤隋之政日以壞皆倫所為也以若所為烏知所謂舉善薦賢之義哉其曰未有奇才異能蓋未有如已者耳是猶以隋事唐也太宗雖愧於知人之明幸不惑其説然之人也屛斥有餘罪矣貞觀三年太宗謂吏部尚書杜如晦曰比見比音鼻吏部擇人惟取其言詞刀筆不悉其景行去聲後同數年之後惡跡始彰雖加刑戮而百姓已受其弊如何可獲善人如晦對曰兩漢取人皆行著鄉閭州郡貢之然後入用故當時號為多士今毎年選集選去聲後同向數千人厚貌飾詞不可知悉選司但配其階品而已銓簡之理實所未精所以不能得才太宗乃將依漢時法令本州辟召令平聲㑹功臣等將行世封事遂止愚按古者取士之法鄉論秀士升之司徒司徒升之學大樂正升之司馬司馬辨論官材論定然後官之任官然後爵之位定然後禄之蓋未仕之前凡經四級已仕之後又經三級其詳且重如此故嘗謂後世取人之道不能復成周之法皆茍焉而已今觀太宗問如何可獲善人大哉問乎如晦政當告以成周取士之法可也乃以兩漢辟召之事為對何其陋哉厥後竟以將行世封不及施行後世惜焉然使真能行辟召之法又豈足以致成周多士之隆乎貞觀六年太宗謂魏徵曰古人云王者須為官擇人為去聲不可造次即用造七到切朕今行一事則為天下所觀出一言則為天下所聽用得正人為善者皆勸誤用惡人不善者競進賞當其勞當去聲後同無功者自退罰當其罪為惡者戒懼故知賞罰不可輕行用人彌須慎擇徴對曰知人之事自古為難故考績黜陟虞書曰三載考績三考黜陟幽明察其善惡今欲求人必須審訪其行去聲後同若知其善然後用之設令此人令平聲後同不能濟事只是才力不及不為大害誤用惡人假令强幹為害極多但亂代惟求其才不顧其行太平之時必須才行俱兼始可任用范氏祖禹曰太宗以治亂在庶官欲進君子退小人王者之言也而魏徵之所謂才行者不亦異乎夫才有君子之才有小人之才古之所謂才者君子之才也後世之所謂才者小人之才也周公制禮作樂孔子以為才此古人所謂才者兼徳行而言也後世之所謂才者辯給以禦人詭詐以用兵僻邪險詖趨利就事是以天下多亂職斯人之用於世也王者創業垂統敷求哲人以遺後嗣故能長世也豈宜以天下未定而可專用小人之才歟夫有才無行之小人無時而可用退之猶恐其或進也豈可先用而後廢乃取才行兼全之人乎徵之學駮而不純故所以輔導其君者卒不至於三王之治也愚按春秋傳曰髙陽氏有才子八人齊聖廣淵明允篤誠是以才兼徳而言之也司馬氏曰徳勝才為君子才勝徳為小人是以才對徳而言之也學者安所折衷哉愚聞之孟子曰君夫為不善非才之罪也程子曰才禀於氣氣有清濁朱子曰孟子専指其發於性者言之故以為才無不善程子兼指其禀於氣者言之則人才固有昏明强弱之不同矣以事理考之程子之言為宻由此觀之春秋傳之言即孟子之意也司馬氏之言即程子之意也然司馬氏之言宻矣范氏譏魏徴不當言亂代求才不顧其行其説是也然謂才行無所分别則將如程子之言何貞觀十一年侍御史馬周上疏曰理天下者以人為本欲令百姓安樂令平聲樂音洛惟在刺史縣令縣令既衆不能皆賢若毎州得良刺史則合境蘓息天下刺史悉稱聖意稱去聲則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢徳欲有遷擢為將相並去聲後同必先試以臨人或從二千石漢世郡守曰二千石入為丞相及司徒太尉者朝廷必不可獨重内臣外刺史縣令遂輕其選所以百姓未安殆由於此太宗因謂侍臣曰刺史朕當自簡擇縣令詔京官五品已上各舉一人按史傳此與諫營造奢侈及論太子諸王定分同一疏孫氏洙曰民者國之本也守令民之本也古者天子列爵頒禄非為臣下皆以為民也故擇其人以牧養之重其任以付責之假其權以安固之厚其禄以寵利之上之責吏一本於民下之報上一本於民則民重矣民重則守令重守令重則天下國家重矣輕守令是輕民也民輕則天下國家輕矣可不慎歟昔漢制郡守入為三公郎官出宰百里又出諌大夫補郡吏有治效者璽書勉勵増秩賜金而不輙遷公卿缺則選其尤異者用之故良吏於是為盛知所重也魏晉以下謂居朝者為要職治外者為左遷故吏多貪殘而風俗日壞失所重也唐之失亦然故内職常遷外選常滯然守宰之植風節者猶班班可言也胡氏寅曰刺史至多人君安能徧識人才委大臣謹舉可也縣令卑而尤衆近民尤甚尤不可不擇必欲得人使為縣有政績舉其人可也若展轉求之則千百賢令亦可致矣人各有才其用不同則識趣各異京官五品以上安能皆得縣令之才乎唐氏仲友曰周之意蓋謂察之於己任則民被害不如悉以才徳選則所得多矣愚按聖人以天下為一家朝廷其堂奥州縣其戸庭也唐虞之時百揆統九官四岳統十二牧故曰内有百揆四岳外有州牧侯伯庶政惟和萬邦咸寧何内外之重輕哉唐有天下於重内輕外之時下至縣令士多不屑為之夫令親民之先者也以輕心處之謂之何哉馬周之言其知體要者歟為天下者莫先於謹擇守令太宗之言固善矣然刺史録名屏上著政績善惡可以自擇矣九重之尊豈能周知惟當使内外輕重之平均朝堂擇刺史都督刺史都督舉縣令可也貞觀十一年治書侍御史劉洎以為左右丞宜特加精簡上疏曰臣聞尚書萬機實為政本伏尋此選授任誠難是以八座比於文昌左右僕射及六部是為八座漢志曰斯乃文昌天府衆務淵藪二丞方於管轄二丞左右丞也六典曰掌管轄省事爰至曹郎上應列宿音秀漢明帝曰郎官上應列宿茍非稱職稱去聲竊位興譏伏見比來比音鼻後同尚書省詔敕稽停稽音朞文案壅滯臣誠庸劣請述其源貞觀之初未有令僕尚書令及僕射也于時省務繁雜倍多於今而左丞戴胄右丞魏徴並曉達吏方質性平直事應彈舉應彈並平聲無所迴避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勲親在位為去聲器非其任功勢相傾凡在官寮未循公道雖欲自强先懼囂謗囂音枵浮薄也所以郎中予奪予上聲惟事諮禀尚書依違不能斷決或紏彈聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便渉年載或希㫖失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否便論並平聲當去聲互相姑息惟事彌縫且選衆授能非才莫舉天工人代虞書曰天工人其代之言人君代天理物官所治皆天事焉可妄加焉於䖍切至於懿戚元勲但宜優其禮秩或年高及耄音冐八十九十曰耄或積病智昏既無益於時宜當置之以間逸乆妨賢路殊為不可將救兹弊且宜精簡尚書左右丞及左右郎中唐制副二丞所轄諸司事署録目勘稽失知省内宿直之事如並得人自然綱維備舉亦當矯正趨競豈惟息其稽滯哉疏奏尋以洎為尚書左丞張氏九成曰觀洎以章疏白尚書非人之弊務欲擇賢任職整綱維振稽滯此皆詳練治體深達政本惜乎忠誠憂國不宻其身宜來者之戒也愚按唐制三省尚書省居其首樞機之要也尚書令掌典領百官其屬有六左右僕射統理六官為令之貳皆宰相也左丞則總吏部户部禮部右丞則總兵部刑部工部其所闗繫豈小哉劉洎以剛直果敢之才當紏彈舉劾之任於是而極言委任之弊具陳精簡之方可謂知政本稱厥職矣太宗即以洎為左丞可謂知人也已以太宗之器使人才後之人主所宜為法也貞觀十三年太宗謂侍臣曰朕聞太平後必有大亂大亂後必有太平大亂之後即是太平之運也能安天下者惟在用得賢才公等既不知賢朕又不可徧識日復一日無得人之理今欲令人自舉令平聲後同於事何如魏徴對曰知人者智自知者明知人既以為難自知誠亦不易以䜴切且愚暗之人皆矜能伐善恐長澆競之風長音掌不可令其自舉愚按太宗急於得天下之賢於是有令人自舉之議魏徴以為知人既難自知不易若令自舉恐長澆競之風誠為知言也夫三代盛時比閭族黨州鄉逓進而考其徳行道藝賔興于王此所謂鄉舉里選也世道已降此制不復乃曰令人自舉吾見其自鬻而已矣非善論也貞觀十四年特進魏徴上疏曰臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寧一人有慶必藉忠良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功舜舉八凱使主后土百揆時序舉八元使布五教内平外成周召光煥乎之美周公名旦武王之弟召公名奭為周太保二公夾輔成王然則四岳唐虞官名掌四岳諸侯之事或一人而總兼之九官舜命禹作司空稷播百榖契為司徒皋陶作士垂為共工益掌山澤伯夷為秩宗夔典樂龍作納言是為九官五臣論語曰舜有臣五人而天下治謂禹稷契皋陶伯益也十亂周書武王曰予有亂臣十人亂治也十人謂周公旦召公奭太公望畢公榮公太顚閎天散宜生南宫适其一文母論語曰有婦人焉九人而已先儒以為子無臣母之義蓋邑姜也九人治外邑姜治内豈惟生之於曩代而獨無於當今者哉在乎求與不求好與不好耳好並去聲後同何以言之夫美玉明珠夫音扶孔翠犀象大宛之馬宛平聲大宛西域國漢武時李廣利破其國獲汗血馬以獻西旅之獒西旅西夷國武王時貢獒犬高八尺曰獒或無足也或無情也生於八荒之表塗遥萬里之外重譯入貢重平聲言語不通必重譯而來也道路不絶者何哉蓋由乎中國之所好也况從仕者懷君之榮食君之禄率之以義將何往而不至哉臣以為與之為孝則可使同乎曾參子騫矣曾參字子輿子騫姓閔名損皆孔子弟子孟子曰事親若曾子可也論語曰孝哉閔子騫人不間於其父母昆弟之言與之為忠則可使同乎龍逄比干矣龍逄桀臣比干紂臣皆以忠諫見殺與之為信則可使同乎尾生展禽矣莊子曰尾生與女子期於梁下女子不來水至不去抱梁柱而死展禽魯大夫展獲名禽食邑柳下諡曰惠與之為㢘則可使同乎伯夷叔齊矣伯夷叔齊孤竹國君之二子讓國而逃諫伐而餓然而今之羣臣罕能貞白卓異者蓋求之不切勵之未精故也若勗之以公忠期之以逺大各有職分去聲得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所不受賤則觀其所不為因其材以取之審其能以任之用其所長揜其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故説苑曰前漢光禄大夫劉向字子政楚元王交之後采傳記行事著説苑二十篇人臣之行去聲有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌芽未動形兆未見音現昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎顯榮之處如此者聖臣也二曰虛心盡意日進善道勉主以禮義諭主以長䇿將順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱往古之行事數音朔以厲主意如此者忠臣也四曰明察成敗早防而救之塞其間去聲隙也絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺去聲辭禄讓賜飲食節儉如此者貞臣也六曰家國昏亂所為不諛敢犯主之嚴顔面言主之過失如此者直臣也是謂六正何謂六邪一曰安官食禄不務公事與代浮沉左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂音洛後同不顧其後害如此者諛臣也三曰内實險詖音蔽外貌小謹巧言令色妬善嫉賢所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當去聲號令不行如此者奸臣也四曰智足以飾非辯足以行説音税内離骨肉之親外搆朝廷之亂如此者讒臣也五曰專權擅勢以輕為重私門成黨以富其家擅矯主命以自貴顯如此者賊臣也六曰諂主以佞邪䧟主於不義朋黨比周比音鼻以蔽主明使白黑無别彼列切是非無間去聲使主惡布於境内聞於四隣如此者亡國之臣也是謂六邪賢臣處六正之道處上聲後同不行六邪之術故上安而下理生則見樂死則見思此人臣之術也禮記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐禮經解篇之辭然則臣之情偽知之不難矣又設禮以待之執法以御之為善者䝉賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉蓋言之是也行之非也言之是則出乎公道行之非則涉乎邪徑是非相亂好惡相攻好惡並去聲後所惡惡之同所愛雖有罪不及於刑所惡雖無辜不免於罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有罪免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺疎逺罰不阿親貴以公平為規矩以仁義為凖繩考事以正其名循名以求其實則邪正莫隱善惡自分然後取其實不尚其華處其厚不居其薄則不言而化朞月而可知矣若徒愛美錦而不為人擇官為去聲有至公之言無至公之實愛而不知其惡憎而遂忘其善狥私情以近邪佞背公道而逺忠良背音倍逺去聲則雖夙夜不怠勞神苦思將求至理不可得也書奏甚嘉納之愚按大禹曰知人則哲能官人臯陶為陳九徳曰載采采言知人在於以徳而驗於行事也然徳雖有九豈能全哉魏徴進求賢審官之説而舉劉向六正六邪之論是則然矣然知人者惟在於辨君子小人邪正之分固難一一以某臣某臣律之也果君子邪則正人也聖良忠智貞直六正之徳雖未必備未必不兼也果小人邪則邪人也具諂奸讒賊亡國六邪之惡雖未必備未必不兼也其曰知人則哲則明之極矣君子小人邪正之異何所逃於哲之中乎貞觀二十一年太宗在翠㣲宫在長安縣武徳八年置貞觀十年廢是年復修方成授司農卿唐制掌倉儲委積之事李緯户部尚書房𤣥齡是時留守京城會有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰但云李緯大好髭鬚更無他語由是改授洛州刺史洛州今河南府路愚按太宗至是已倦于勤矣𤣥齡以耆壽佚在厥服矣翠㣲宴息聞老臣有大好髭鬚之語旋即改授亦可謂留心治道者也愚觀自古人君蓋有聞諫而不能改者聞諌而能改者斯為善矣太宗之用李緯𤣥齡未嘗諌也特私有所議耳太宗聞而遽改迨近於不諌亦入者眉山蘇氏謂太宗之從諌近於聖詎不信哉封建第八凡二章貞觀元年封中書令房𤣥齡為梁國公兵部尚書杜如晦為蔡國公吏部尚書長孫無忌為齊國公並為第一等食邑實封一千三百戸皇從父淮安王神通從去聲後同神通與高祖為從兄弟從高祖平京師典兵宿衛封淮安王上言義旗初起臣率兵先至隋大業十三年五月高祖起兵太原六月傳檄稱義師故曰義旗神通自長安入鄠南山舉兵應太原從平京師有功今𤣥齡等刀筆之人功居第一臣竊不服太宗曰國家大事惟賞與罰賞當其勞當去聲後同無功者自退罰當其罪為惡者咸懼則知賞罰不可輕行也今計勲行賞𤣥齡等有籌謀帷幄畫定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一推他回切漢高祖論功行封羣臣爭功不决帝以蕭何功盛先封酇侯功臣皆曰何無汗馬之勞徒持文墨議論顧居臣等上何也帝曰夫獵追殺獸者狗也發蹤指示者人也諸君徒能得獸耳功狗也何之功人也羣臣皆莫敢言叔父於國至親誠無愛惜但以不可緣私濫與勲臣同賞矣由是諸功臣自相謂曰陛下以至公賞不私其親吾屬何可妄訴初高祖舉宗正籍弟姪再從三從孩童已上封王者數十人至是太宗謂羣臣曰自兩漢已降惟封子及兄弟其疎逺者非有大功如漢之賈澤漢高祖封從兄弟賈為荆王從祖昆弟澤為燕王並為將軍有功並不得受封若一切封王多給力役乃至勞苦萬姓以養已之親屬於是宗室先封郡王其間無功者皆降為縣公按本紀降封事係武徳九年十一月又按膠東郡王道彦傳云唐興務廣藩鎮故從昆弟子自勝衣已上皆爵郡王太宗即位舉屬籍問大臣曰盡王宗子於天下可乎封徳彛曰漢所封惟帝子若親昆弟其屬逺非大功不王如周郇滕漢賈澤尚不得茅土所以别親疏也先朝一切封之爵命崇而力役多以天下為私奉非所以示至公帝曰朕君天下以安百姓不容勞百姓以養已之親於是疏屬王者皆降為公惟有功者不降故道彦等並降封公由是言之其初所封郡王者後所降皆郡公也縣字疑衍愚按三代有國大封同姓異姓親親賢賢褒表功徳示天下以至公也豈為一家之私哉周公至親太公異姓皆祚大國以功徳也豈避至親之嫌哉唐封功臣雖非祚土而爵號食邑禮典隆重雖以皇從父之言而亦示以賞不可私之説猶有褒表功徳之遺意至如降封宗族弟姪以明有功尤足以見至公也貞觀十一年太宗以周封子弟八百餘年秦罷諸侯二世而滅呂后欲危劉氏終賴宗室獲安吕后名雉漢高祖后惠帝母也惠帝崩呂后臨朝欲王諸呂諸呂擅權朱虛侯劉章因侍宴以軍法斬諸呂一人自是諸呂憚之劉氏益彊封建親賢當是子孫長乆之道乃定制以子弟荆州都督荆王元景高祖第六子安州都督吳王恪太宗次子也等二十一人又以功臣司空趙州刺史長孫無忌尚書左僕射宋州刺史房𤣥齡等一十四人並為世襲刺史禮部侍郎尚書之貳李百藥字重規定州人㓜多病祖母趙以百藥名之貞觀初拜中書舍人後遷是職復授右庶子卒諡曰康奏論駮世封事曰臣聞經國庇民王者之常制尊主安上人情之大方思聞理定之規以宏長代之業萬古不易百慮同歸然命厯有餘促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數昔成王定鼎卜世三十卜年七百後厯三十七主八百六十七年過其數也秦不及期初秦皇謂二世三世至于萬世後二世被弑子嬰降漢不及期也存亡之理在於郡國周氏以鑒夏殷之長乆遵皇王之並建維城磐石深根固本雖王綱㢮廢而枝幹相持故使逆節不生宗祀不絶秦氏背師古之訓背音倍商書傅説告髙宗曰事不師古匪説攸聞棄先王之道剪華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號呼而七廟隳祀號平聲禮天子七廟賈誼曰斬華為城因河為津自以闗中之固金城千里子孫萬世之業也秦皇沒山東豪傑並起而亡秦一夫作難而七廟隳身死人手為天下笑臣以為自古皇王君臨宇内莫不受命上𤣥冊名帝籙締構遇興王之運殷憂屬啟聖之期雖魏武攜養之資曹操沛人父嵩為漢中常侍曹騰養子不能審其生出本末操子丕受漢禪國號魏追號操為武皇帝漢高徒役之賤漢高祖姓劉名邦字季沛人初為泗上亭長為縣送徒驪山徒多道亡自度比至必皆亡乃縱所送徒徒中願從者十餘人由是起兵非止意有覬覦推之亦不能去也推他回切若其獄訟不歸孟子曰獄訟者不之堯之子而之舜菁華已竭雖帝堯之光被四表虞書贊堯之辭謂徳之光顯被及于四外也大舜之上齊七政虞書曰在璿璣玉衡以齊七政謂日月五星也非止情存揖讓守之亦不可焉以放勛重蕐之徳放上聲勛與勲同重平聲放勛者總言堯之徳重蕐者總言舜之徳史記因以為堯舜之名尚不能克昌厥後是知祚之長短必在於天時政或興衰有闗於人事隆周卜世三十卜年七百雖淪胥之道斯極而文武之器尚存斯龜鼎之祚已懸定於杳㝠也至使南征不返周昭王徳衰南巡濟于漢人惡之以膠船進王御船至中流膠液船解王沒水中東遷避逼周平王東遷雒邑以避戎㓂禋祀闕如郊畿不守此乃陵夷之漸有累於封建焉累去聲暴秦運距閏餘數終百六秦世為閏餘百六為周之阨數也漢王莾傳云餘分閏位陽九之阨百六之㑹謂莾為閏位百六為漢之阨數也律厯志曰易九戹曰初入元百六注易爻有九六七八百六與三百七十四六乗八之數也六八四十八合為四百八十歲也受命之主徳異禹湯繼世之君才非啟誦啟夏禹之子誦周武王之子成王也借使李斯王綰之輩咸開四履李斯王綰皆秦丞相四履為諸侯而有四方所履踐之界也將閭子嬰之徒俱啟千乗將閭秦公子為二世所殺子嬰始皇之孫趙高立為秦王後殺高降漢千乗諸侯之國其地可出兵車千乗者也豈能逆帝子之勃興抗龍顔之基命者也漢髙祖應赤帝子之䜟隆凖而龍顔然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯五服者甸侯綏要荒也虞夏制王城之外四靣各五百里曰甸服甸服外又各五百里曰侯服侯服外又各五百里曰綏服綏服外又各五百里曰要服要服外又各五百里曰荒服周制乃分其五服為九見周禮王畿千里之間俱為采地周制天子畿内之地方千里詩曰邦畿千里是也采地者天子之卿大夫邑地也是則以結繩之化行虞夏之朝易大傳曰上古結繩而治後世聖人易之以書契此言雖虞夏之時已不可行上古之法也用象刑之典治劉曹之末虞書曰象以典刑象如天之垂象以示人而典者常也劉漢之姓曹魏之姓言漢魏之時又豈可以帝世之法而為治也紀綱㢮紊斷可知焉鍥船求劍未見其可鍥音刻呂氏春秋曰楚人有涉江其劍自舟中墜於水遂刻其舟曰是吾劍所墜水也舟已行而劍不行若此求劍而不其惑乎膠柱成文彌多所惑楊子曰以往聖之法治將來譬猶膠柱而調瑟徒知問鼎請隧有懼霸王之師左傳宣公三年楚子觀兵于周疆定王使王孫滿勞之楚子問鼎之大小輕重對曰在徳不在鼎僖公二十五年晉侯朝王王享之請隧弗許曰王章也未有代徳而有二王亦叔父之所惡也白馬素車無復藩維之援漢高祖初至霸上使人約降秦王子嬰繫頸以組白馬素車奉天子璽符降軹道旁而降不悟望夷之釁秦相趙高弑二世望夷宫未堪羿浞之災羿音刈浞夏帝相既立后羿有窮氏篡位帝相徙商邱羿躭于畋獵信用寒浞浞後殺羿自立為帝因羿之室生子奡奡弑帝相夏之貴臣殺浞後滅奡立帝相子是為少康既罹髙貴之殃罹音離魏高貴鄉公名髦文帝之孫嗣明帝位六年司馬昭擅政遂勒兵誅昭而敗為昭黨所弑寧異申繒之酷周幽王嬖褒姒而廢申后立褒姒之子伯服而黜太子申侯怒與繒及犬戎殺王驪山下此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸㣲始自藩屏音餅詩曰价人維藩大邦為屏化為仇敵家殊俗國異政强陵弱衆暴寡疆場彼此干戈侵伐狐駘之役女子盡髽莊華切髽麻髪合結也左傳襄公四年邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘國人逆䘮者皆髽魯於是乎髽禮記曰魯婦人髽而弔崤陵之師隻輪不反公羊傳僖公二十二年晉人及姜戎敗秦師于殽匹馬隻輪無反者斯蓋略舉一隅其餘不可勝數上平聲下上聲陸士衡名機晉吳郡人以聖王經國義在封建著五等諸侯論方規規然云嗣王委其九鼎凶族據其天邑嗣王謂周惠王襄王悼王也委九鼎謂三王棄國出奔也凶族謂王子頽王子帶王子朝也據天邑謂三子據國僭位也天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循良之才膺共治之寄刺舉分竹何世無人漢文帝初與郡守為銅虎符當發兵遣使者至郡合符乃聽受之以代古之圭璋分竹亦其義也至使地或呈祥天不愛寶前漢黄霸為潁川太守政化大行嘉禾生鳳凰集後漢秦彭為潁川太守有甘露嘉禾鳳麟之瑞民稱父母讀曰甫牡前漢召信臣為河南太守視民如子號曰召父後漢杜詩為南陽太守為政清平民為之語曰前有召父後有杜母政比神明後漢孟嘗為合浦太守郡産珠先守多貪珠徙交趾人物無資嘗至革前弊去珠復還百姓反業謂為神明曹元首魏人上六代論感悟曹爽方區區然稱與人共其樂者樂音洛後同人必憂其憂與人同其安者人必拯其危豈容以為侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉其門資忘其先業之艱難輕其自然之崇貴莫不世增滛虐代益驕侈離宫别舘切漢淩雲或刑人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徴舒徴平聲左傳宣公九年陳靈公與孔寧儀行父通于夏姬十年公與二人飲酒于夏氏公謂行父曰徴舒似汝對曰亦似君徴舒病之公出自其廐而殺之二子奔楚徴舒夏姬之子也衛宣則父子聚麀終誅壽朔麀音幽牝鹿也聚麀謂無禮也衛宣公納子伋之妻是為宣姜生壽及朔朔與宣姜愬伋於公公令伋之齊使賊先待於隘而殺之壽知之以告伋伋曰君命也不可逃壽竊其節先往賊殺之伋至曰君命殺我壽何罪賊又殺之國人哀之作二子乗舟之詩壽朔當作伋壽乃云為已思治豈若是乎為去聲後同内外羣官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸禄不入私門後漢楊秉為豫章太守清儉計日受禄餘俸不入私門妻子不之官舍後漢闕每為鉅鹿太守何並為潁川太守之官妻子不入官舍班條之貴食不舉火後漢左雄為冀州刺史在任不舉煙火常食乾飯剖符之重居惟飲水晉鄧攸為吳郡太守載米居官惟飲吳水而已南陽太守弊布裹身後漢羊續為南陽太守常敝衣薄食妻子資藏布衾敝袛裯而已萊蕪縣長凝塵生甑長音掌後漢范丹為萊蕪縣令家貧里歌曰甑中生塵范史雲釡中生魚范萊蕪專云為利圖物何其爽歟總而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚知所辨安可惑哉至如滅國弑君亂常干紀春秋二百年間略無寧歲春秋始魯隱公元年終哀公十四年凡二百四十二年言二百者舉大數也次睢咸秩遂用玉帛之君睢音綏左傳僖公十九年宋公使邾文公用鄫子於次睢之社睢水名此水受汴入泗有妖神東夷祀之鄫子小國之君乃殺而祭之非禮也魯道有蕩毎等衣裳之㑹魯道有蕩詩載驅篇之辭按春秋魯桓公夫人姜氏會齊侯者几六故齊人作是詩以刺文姜來會齊襄公也縱使西漢哀平之際前漢都長安故曰西漢哀帝名欣定陶恭王之子平帝名衎中山孝王之子皆元帝之庶孫東洛桓靈之時後漢都洛陽故曰東洛桓帝名志章帝曾孫靈帝名宏章帝𤣥孫下吏滛暴必不至此為政之理為如字後同可以一言蔽焉伏惟陛下握紀御天膺期啟聖救億兆之焚溺掃氛祲於寰區創業垂統配二儀以立徳發號施令施平聲妙萬物而為言獨照神衷永懷前古將復五等而修舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯乖況晉氏失馭㝢縣崩離晉司馬氏初受魏禪後遜于宋後魏乗時華夷雜處乗平聲後魏拓拔氏本北夷種改姓元氏重以闗河分阻吳楚懸隔重平聲習文者學長短從横之術從音蹤習武者盡干戈戰争之心畢為狙詐之階彌長澆浮之俗長音掌開皇在運開皇隋文帝年號因藉外家驅御羣英任雄猜之數坐移明運非克定之功年踰二紀人不見徳文帝在位二十四年及大業嗣立大業煬帝年號世道交䘮一人一物掃地將盡雖天縱神武削平㓂虐兵威不息勞止未康自陛下仰順聖慈嗣膺寶厯情深致理綜覈前王雖至道無名言象所紀略陳梗槩實所庶幾平聲愛敬烝烝勞而不倦大舜之孝也虞書稱舜曰克諧以孝烝烝乂不格姦訪安内豎親嘗御膳文王之徳也禮記曰文王之為世子朝於王季日三鷄初鳴而衣服至寢門外問内䜿之御者曰今日安否何如曰安文王乃喜日中又至亦如之及莫又至亦如之食上必在視寒煖之節食下問所饍毎憲司讞罪尚書奏獄大小必察枉直咸舉以斷趾之法易大辟之刑仁心隱惻貫徹幽顯大禹之泣辜也讞音碾議也説苑曰禹出見罪人下車問而泣之左右曰罪人不順道何為痛之禹曰堯舜之民皆以堯舜之心為心寡人之民各自以其心為心是以痛之正色直言虛心受納不簡鄙訥無棄芻蕘帝堯之求諫也訥當作陋虞書曰稽于衆舍己從人𢎞獎名教勸勵學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也相去聲論語曰夫子循循然善誘人羣臣以宫中暑濕寢饍或乖請移御高明營一小閣遂惜十家之産竟抑子來之願不􅈔陰陽之感以安卑陋之居頃歲霜儉普天饑饉䘮亂甫爾倉廩空虛聖情矜愍勤加賑恤竟無一人流離道路猶且食惟藜藿樂徹簨虡上音筍下音巨縣鐘鼔之具也皆以木為之横曰簨縱曰虡言必悽動貌成癯瘦公旦喜於重譯重平聲旦周公名史記曰交趾之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝文命矜其即敘文命史記以為禹名夏書曰織皮崑崙析支渠捜西戎即敘即就也言雍州水土既平而餘功及於西戎也陛下每見四夷􅅃附萬里歸仁必退思進省悉井切凝神動慮恐妄勞中國以求逺方不藉萬古之英聲以存一時之茂實心切憂勞志絶遊幸毎旦視朝音潮聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非論平聲備盡肝膈惟及政事更無異辭纔日昃必命才學之士賜以清閒高談典籍雜以文詠間以𤣥言間去聲乙夜忘疲太宗嘗曰若不甲夜視事乙夜讀書何以為人君中宵不寐此之四道獨邁往初斯實生民以來一人而已𢎞兹風化昭示四方信可以朞月之間彌綸天壤而淳粹尚阻浮詭未移此由習之乆難以卒變卒音猝請待斵雕成器以質代文刑措之敎一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虛與時消息况於人乎易豐卦彖𫝊之辭美哉斯言也中書舍人馬周又上疏曰伏見詔書令宗室勲賢令平聲作鎮藩部貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重之欲其緒裔承守與國無疆可使世官也何則以堯舜之父猶有朱均之子堯之子曰丹朱舜之子曰商均皆不肖況下此以還而欲以父取兒恐失之逺矣儻有孩童嗣職萬一驕逸則兆庶被其殃而國家受其敗政欲絶之也則子文之理猶在子文楚令尹姓鬭名榖於莵其孫克黄使齊復命自拘於司㓂王思子文之治曰子文無後何以勸善使復其官政欲留之也而欒黶之惡已彰黶音黯欒姓黶名晉大夫武子之子也晉士鞅曰欒黶汰虐已甚猶可以免其在盈乎黶死武子所施沒矣而黶之怨實章後盈見逐盈黶之子也與其毒害於見存之百姓見音現則寧使割恩於已亡之一臣明矣然則嚮之所謂愛之者乃適所以傷之也臣謂宜賦以茅土古者天子以五色土為壇封諸侯取其方土苴以白茅授之使立社於其國疇其户邑必有材行去聲隨器方授則翰翮非强亦可以獲免尤累良偽切昔漢光武不任功臣以吏事所以終全其世者良由得其術也願陛下深思其宜使夫音扶得奉大恩而子孫終其福禄也太宗並嘉納其言於是竟罷子弟及功臣世襲刺史按通鑑貞觀五年上令羣臣議封建魏徴以為若封建則卿大夫咸資俸禄必致厚歛又京畿賦税不多所資畿外若盡封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵内地難以奔赴李百藥云云顔師古以為不若分王宗子勿令過大間以州縣雜錯而居互相維持各守其境協力同心足扶京室為置官寮皆省司選用法令之外不得擅作威福朝貢禮儀具為條式一定此制萬代無虞十一月詔宗室勲賢作鎮藩部云云十三年二月于志寧以為古今事殊恐非乆安之道上疏争之馬周亦上疏云云會長孫無忌等皆不願上表固讓稱承恩以來形影相弔若履春冰宗室憂虞如寘湯火緬惟三代封建蓋由力不能制因而利之禮樂節文多非已出兩漢罷侯蠲除曩弊深協事宜今因臣等復有變更恐紊聖朝綱紀且後世愚㓜不肖之嗣或抵冒邦憲自取誅夷更因延世之賞致成勦絶之禍良可哀愍願停渙汗之㫖賜其性命之恩又因子婦長樂公主固請於上且言臣等披荆棘事陛下今海内寧一奈何棄之外州與遷徙何異上曰割地以封功臣古今通義意欲公之後嗣輔朕子孫共傳永乆而公等乃復發言怨望朕豈强公等以茅土耶詔停世封刺史與此章所紀年歲不同今備録于此亦以見唐世議封建之始末云范氏祖禹曰柳宗元有言曰封建非聖人意也勢也蓋自古以來有之聖人不得而廢也周室既衰併為十二列為六七而封建之禮已亡秦滅六國以為郡縣三代之制不可復矣必欲法上古而封之弱則不足以藩屏彊則必至於僭亂此後世封國之弊也况諸侯之後嗣或賢或不肖而必使之繼世是以一人而害一國也然則如之何記曰禮時為大順次之三代封國後世郡縣時也因時制宜以便其民順也古之法不可用於今猶今之法不可用於古也後世如有王者親親而尊賢務徳而愛民慎擇守令以治郡縣亦足以致太平而興禮樂矣何必如古封建乃為盛哉胡氏寅曰太宗嘗讀周官書辨方正位體國經野設官分職以為民極之言慨然歎曰不井田不封建不足以法三代之治詔羣臣議封建其本於此乎夫封建與天下共其利天道之公也郡縣以天下奉一人人欲之私也魏徴蓋未嘗詳考古制鹵莾甚矣而近世蘇范二氏亦謂封建不可行始皇李斯柳宗元之論聖人不能易也嗚呼豈其然哉宗元之言曰封建非聖人意也勢也誠使上古諸侯以為民害聖人不得已而存之則唐虞之際洪水懐襄民無所定武王周公誅紂伐奄滅國五十皆天下之大變也此數聖人不能因時之變更立制度以為郡縣乃畫壤列土修明侯甸之法何哉宗元又曰徳在人者死必奉其嗣故封建非聖人意也勢也夫為其徳之不可忘是以憫其絶此仁之至義之盡而出於人心之固然者固非聖人之私意而歸之勢可乎宗元又曰諸侯國亂天子不得變其君夫孟子所言貶國削地六師移之之法皆先王之制也烏在其不改變乎漢不能制侯王未萌之惡及大逆不道然後勒兵夷之此非三代故事自漢之失爰盎固言之矣豈可舉此以例禹湯文武所為哉方三代盛時諸侯或自其國入為三公王室有難諸侯或釋位以間王政至其衰也五伯雖彊大猶且攘夷狄以尊戴天下之共主凡若此類宗元皆略而不稱乃摘取衰微禍亂之一二欲舉封建而廢之是猶見刖者而欲廢天下之屨也宗元又曰湯資三千諸侯以黜夏武資八百諸侯以翦商故不敢變易也是聖人於未舉兵之前要結衆力及成功之後姑息茍安此六國五代庸主之所行而謂湯武為之乎宗元又曰封建非公之大者公天下自秦始夫謂三代聖王無公心以封建自私是伯夷而為盗跖之事也謂秦無私意以郡縣公天下是飛亷而有比干之忠也一何不𩔖之甚歟宗元又曰諸侯繼世而立又有世大夫食禄采地以盡其封域雖聖賢生于其時無以立于天下天子聖明公卿必得其人諸侯不敢越亂法度世固多賢也而又有鄉舉里選之法有明明側陋之揚何患乎材之不用也若上無明君下無賢臣如周之衰秦之季漢魏隋唐之時在位者無非小人而興邦之良佐悉沈于民伍不見庸也雖守宰徧宇内將何救於此故凡宗元封建論皆無稽而不可信也夫為君如堯舜禹湯亦足矣帝王之治至於唐虞三代亦無以加矣井天下之田使民各有以養其生經天下之國使賢才皆得以施其用人主自治不過千里大小相維輕重相制外無强暴侵陵㣲弱不立之患内無廣土衆民奢泰恣肆之失是以義處利均天下之施故曰封建之法天下之公也若秦則妬民之兼并而自為兼并筦天下之私以自奉故曰郡縣之制人欲之私也或曰然則封建今可行乎曰何獨封建也二帝三王之法孰不可行者在人而已矣然欲行封建先自井田始范子亦惑於宗元謂今日之法不可用於古猶古之法不可用於今夫後世之私意妄為固不可行於古而為天下者不以二帝三王善政良法為則則又何貴於稽古哉愚按封建古先哲王公天下之良法美意也後世言治者何敢妄議哉自秦罷侯置守之後田制學制皆非古矣由漢以下封建郡縣參錯若漢七國晉八王挻禍尤甚其間悖逆自恣負强梗化者不可勝數而維垣維翰者亦復不少然終不若郡縣臂指運掉之為得於是封建是非之論興焉河南程子曰有闗雎麟趾之意然後可行周官之法度後世無古先哲王治天下之本而用古先哲王治天下之具宜致然也豈封建之失哉愚不揆竊謂栁宗元之論固難盡非而謂封建非聖人意謂公天下自秦始此誠為過不以盛時封建之美處為言而以李世之弊處為説此誠為偏若胡氏以井田封建可行於後世則亦未敢以為知言也封建井田兆於黄帝畫埜分州綿厯幾代大備於周豈一朝夕之故哉居今之世出宗室而分王之取民田而井疆之紛紜轇轕何能有定故以封建為非者昧於古之實也以封建為是者泥於古之名也盍曰彼三代而上之事勢此三代而下之事勢去古既逺權時施宜郡縣不可易也惟當精擇守令拔其有治平之績者加秩而乆任之登進而激勸之體古先哲王之美意而行後世之良法可也毋庸曰不井田不封建不足以為治貞觀政要卷三
