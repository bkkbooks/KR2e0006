front:
  text: 政號為清明則是書也不無補於治云
  hash: sha256:2ae22878eaf59f9965352c91201a84e863b19687a188393e283f8ca04cee360e
body:
  text: 君道第一凡五章貞觀初太宗謂侍臣曰為君之道必須先存百姓若損百姓以奉其身猶割股以啖腹股一作脛啖音淡食也腹飽而身斃若安天下必須先正其身未有身正而影曲上理而下亂者朕每思傷其身者不在外物皆由嗜欲以成其禍若躭嗜滋味玩悦聲色所欲既多所損亦大既妨政事又擾生人擾亦作損且復出一非理之言萬姓為之觧體怨讟既作讟音瀆痛怨也離叛亦興朕每思此不敢縱逸諌議大夫唐制掌諫論得失侍從贊相之職魏徵詳見任賢篇對曰古者聖哲之主皆亦近取諸身故能逺體諸物昔楚聘詹何楚春秋時國名僣稱王詹何楚詹尹之後隱於釣楚莊王聞而異之召而問焉出列子問其理國之要詹何對以修身之術楚王又問理國何如詹何曰未聞身理而國亂者陛下所明實同古義按通鑑武徳九年太宗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君䘮矣朕嘗以此思之故不敢縱欲也與此章辭異而㫖同故附見於此愚按中庸九經修身為先大學八目修身為本古者二帝三王之治未有不先正其身而能正天下者也故堯必克明峻徳而後能黎民時雍舜必帝徳㒺愆而後能萬邦咸寧禹必祗台徳先而後能朔南暨聲教湯必懋昭大徳而後能表正萬邦武王必建其有極而後能作民父母盖身者表也天下者景也未有表正而景曲者也身者源也天下者流也未有源清而流濁者也後之人君若漢髙之約法除苛文景之㡬致刑措宣帝之綜核名實光武之恭勤儉約明帝之明察善斷孝章之寛厚長者其愛民之心治民之具盖亦有合乎先王者矣特其本原之地有未純焉者爾由此觀之身心與國家天下為一者三代以上之治也身心與國家天下為二者三代以下之治也唐太宗以英武之姿當大亂之後芟除羣雄拓定四海一旦君臨南面首告其羣臣曰安天下必須先正其身未有身正而影曲者斯言也非三代以下之言也魏徵斯時正當告之以中庸之九經大學之八目於以闡揚聖學之奥於以發明心術之微可也顧乃以二帝楚王詹何之言言之何其逺哉使太宗斯時得聞三王之學必將終始如一而無晚年之悔内外如一而無宫闈之愧矣豈特貞觀之治而已邪惜乎太宗能言之而不能行之魏徵能贊美之而不能發明之也呉氏編是書置此於開卷之首其有所取也夫抑有所感也夫貞觀二年太宗問魏徵曰何為明君暗君徵曰君之所以明者兼聼也其所以暗者偏信也詩云先人有言詢於芻蕘詩大雅板篇之辭芻蕘採薪之人言雖賤而不棄也人詩作民盖避太宗諱故以人代民他皆類此昔唐虞之理堯曰陶唐氏舜曰有虞氏理本作治盖避髙宗諱故以理代治他皆類此闢四門明四目達四聰虞書史贊舜之辭謂開四方之門以来天下之賢俊廣四方之視聼以决天下之壅蔽也是以聖無不照故共鯀之徒不能塞也共音恭鯀音衮共工唐虞官名古之世族官也鯀崇伯名夏禹父也共工滛辟鯀治水無功舜流共工於幽州殛鯀于羽山塞猶蔽也靖言庸回不能惑也虞書曰靜言庸違靖與能言靜同回亦違也謂静則用之則不然也秦二世則隱藏其身捐隔踈賤而偏信趙髙及天下潰叛不得聞也捐音員棄也秦二世始皇少子名胡亥嗣位號二世皇帝趙髙秦宦者二世用之為相二世常居禁中公卿希得朝見盜賊益多二世後為髙所弑梁武帝偏信朱异而侯景舉兵向闕竟不得知也异羊吏切梁武帝姓蕭名衍仕齊封梁王受齊禪國號梁朱异仕梁為散騎常侍侯景東魏臣叛歸魏復請歸梁武帝從朱异之議納景為大將軍及景反叛朝野共怨异武帝後為景所逼餓而死隋煬帝偏信虞世基而諸賊攻城剽邑亦不得知也剽音漂刼也隋煬帝姓楊名廣文帝次子也虞世基仕隋為内史侍郎世基以帝惡聞盜賊告者皆不以實聞由是盜賊競起䧟沒郡縣皆弗之知煬帝後為宇文化及等所弑是故人君兼聼納下則貴臣不得壅蔽而下情必得上通也太宗甚善其言范氏祖禹曰善哉太宗之問魏徵之對也可謂得其要矣夫聖人以天下為耳目故聰明庸君以近習為耳目故暗蔽明暗之分惟在於逺近大小而已矣唐氏仲友曰兼聼則公正忠讜進偏信則浸潤膚受行此魏徵論聼納任用之本愚按太宗問明君暗君魏徵謂兼聼者明偏信者時兹言固簡而當矣然兼聼偏信此自外至者也明之與暗又有存於中者焉堯之欽明舜之聰明乃其中扄澄徹如鑑之空如衡之平妍􅎀輕重隨物而見者也彼昧者昏者反是此又明暗之所分盖偏信固易於蔽而兼聼亦有所當擇惟明足以燭理何施而不可哉君天下者欲進於堯舜之明當自格物致知之學始貞觀十年太宗謂侍臣曰帝王之業草創與守成孰難守成亦作守文後同尚書左僕射尚音常射音夜凡言尚書僕射並同僕射秦官古者重武官有主射以督課取其領事之號也唐制尚書省置左右僕射掌統理六官為令之貳令闕則總省事宰相職也房𤣥齡詳見任賢篇對曰天地草昧易屯卦㒸𫝊曰天造草昧草雜亂昧㝠晦也羣雄競起攻破乃降下江切戰勝乃尅由此言之草創為難魏徵對曰帝王之起必承衰亂覆彼昏狡百姓樂推樂音洛四海歸命天授人與乃不為難然既得之後志趣驕逸百姓欲靜而徭役不休百姓凋殘而侈務不息國之衰弊恒由此起恒胡登切常也以斯而言守成則難太宗曰𤣥齡昔從我定天下脩嘗艱苦出萬死而遇一生所以見草創之難也魏徵與我安天下慮生驕逸之端必踐危亡之地所以見守成之難也今草創之難既已往矣守成之難者當思與公等慎之按通鑑係十二年又云𤣥齡等拜曰陛下及此言四海之福也范氏祖禹曰自古創業而失之者寡守成而失之者多周公曰相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難故禍亂未嘗不生於安逸也然非特創業之君守成為難其後嗣守成尤難也林氏之竒曰創業之難雖庸人亦知其然守成之難雖明者亦有所忽周宣王六月出師不以為難而末年庭燎鄉晨以視朝為不易漢髙帝好謀能聼從諫若轉園之易而末年欲易太子以聼言為甚難是以文帝之世賈生有厝火積薪之言太宗之世魏徵有失於安逸之戒唐氏仲友曰太宗之問禍福之機房魏之對更為本末若言創業易太宗身更其難此不可罔若言守成易太宗必謂難者吾猶身濟之怠忽生矣太宗悟二臣之意加謹於守成之難明哉愚按自古人君創業守成鮮有身兼之者周武漢髙創業者也而不及守成成康文景守成者也而不及創業惟神禹在帝位十年成湯在帝位十三年兼創業守成之事者也然以書𫝊攷之禹不以治水敷土為難而以本固邦寧為難湯不以升陑伐桀為難而以時忱克終為難豈創業果易而守成果難乎盖創業逆境也可以進徳守成順境也易以䘮徳太宗身兼創業守成之事不以其己能者自滿而以其未能者為懼其致貞觀之治也宜哉貞觀十一年特進漢世諸侯功徳優盛朝廷所敬異者賜位特進位三公下唐制因之魏徵上疏曰臣觀自古受圖膺運繼體守文控御英雄一作傑南靣臨下易説卦𫝊曰聖人南靣而聼天下嚮明而治皆欲配厚徳於天地齊髙明於日月本支百世𫝊祚無窮祚禄位也然而克終者鮮上聲少也後同敗亡相繼其故何哉所以求之失其道也殷鑒不逺詩大雅蕩篇之辭言商紂之所當鑒者近在夏桀之世也可得而言昔在有隋統一寰宇甲兵彊鋭一作盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安惡烏去聲不欲社稷之長乆故行桀虐以就滅亡哉桀名履癸夏末淫暴之君湯伐之而死恃其富强不虞後患驅天下以從欲罄萬物而自奉採域中之子女求逺方之竒異宫苑是飾臺榭是崇徭役無時干戈不戢外示嚴重内多險忌讒邪者必受其福讒鉏咸切譛也忠正者莫保其生上下相䝉揜蔽也君臣道隔民不堪命率土分崩遂以四海之尊殞於匹夫之手殞羽敏切歿也子孫殄絶殄音腆盡也為天下笑可不痛哉聖哲乗機拯其危溺拯之慶切救也八柱傾而復正淮南子曰地有九州八柱括地象曰崑崙山為柱地之中也地下有八柱牽制名山大川孔穴相通四維弛而更張弛音矢廢也更平聲管子曰禮義亷恥是謂四維四維不張國乃滅亡逺肅邇安不踰於期月期與朞同謂周一嵗之月也論語曰茍有用我者朞月而已可也勝殘去殺無待於百年勝平聲去上聲論語曰善人為邦百年亦可以勝殘去殺矣今宫觀臺榭盡居之矣觀去聲竒珍異物盡收之矣姬姜淑媛盡侍於側矣媛美女也音援四海九州盡為臣妾矣若能鑒彼之所以失一作亡念我之所以得日慎一日雖休勿休焚鹿臺之寳衣武王克商紂走反入登鹿臺䝉衣其珠玉自燔于火而死武王命南宫括散鹿臺之財毁阿房之廣殿阿於何切房讀曰旁秦始皇作前殿阿房東西五百歩南北五十丈上可坐萬人下可建五文旗自殿下直抵南山表閣道絶漢後為楚所焚懼危亡於峻宇夏書五子之歌曰甘酒嗜音峻宇雕墻有一於此未或不亡思安處於卑宫處上聲後同論語曰卑宫室而盡力乎溝洫禹吾無間然矣謂禹薄於已而勤於民也則神化潛通無為而治徳之上也若成功不毁即仍其舊除其不急損之又損雜茅茨於桂棟㕘玉砌以土堦堯舜之朝土堦三等茅茨不剪悦以使人不竭其力常念居之者逸作之者勞億兆悦以子来羣生仰而遂性徳之次也若惟聖㒺念周書曰惟聖㒺念作狂言一念之差雖聖亦為狂矣不慎厥終忘締搆之艱難締音帝結也搆音姤成也謂天命之可恃忽采椽之恭儉椽音傳榱桷也追雕墻之靡麗因其基以廣之增其舊而飾之觸類而長音掌不知止足人不見徳而勞役是聞斯為下矣譬之負薪救火揚湯止沸以暴易亂與亂同道莫可測也測一作則後嗣何觀夫事無可觀則人怨夫音扶後同人怨則神怒神怒則災害必生災害既生則禍亂必作禍亂既作而能以身名全者鮮矣順天革命之后將隆七百之祚隆一作基左傳曰成王定鼎於郏鄏卜世三十卜年七百天所命也貽厥子孫𫝊之萬葉難得易失易以豉切後同可不念哉按通鑑係十一年正月上作飛山宫故魏徵上此䟽是月徵又上疏曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其徳義源不深而望流之逺根不固而求木之長徳不厚而思國之理臣雖下愚知其不可而況於明哲乎人君當神器之重神器帝位也居域中之大老子曰域中有四大道大天大地大王亦大將崇極天之峻永保無疆之休不念居安思危戒奢以儉徳不處其厚情不勝其欲斯亦伐根以求木盛塞源而欲流長者也凡百元首虞書曰元首明哉所以喻君也承天景命莫不殷憂而道著殷憂憂之甚也功成而徳衰有善始者實繁能克終者葢寡豈取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體胡越者極南北之間言至異可同也傲物則骨肉為行路言至親反踈也雖董之以嚴刑董督也虞書曰董之用威震之以威怒終茍免而不懐仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎家語曰君者舟也庶人者水也水所以載舟亦所以覆舟也奔車朽索其可忽乎朽許九切索蘇各切夏書曰予臨兆民懍乎若朽索之御六馬喻危懼可畏之甚奔車朽索亦此意也君人者誠能見可欲則思知足以自戒將有作則思知止以安人念髙危則思謙冲而自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度樂音洛後同盤遊畋獵也周書曰不敢盤於遊田三驅者圍合其三靣前開一路使之可去不忍盡物好生之仁也易比卦六五王用三驅失前禽盖猶成湯祝網之義憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罸所及則思無因怒而濫刑總此十思宏兹九徳虞書臯陶曰亦行有九徳寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞彊而義言人之徳見於行者凡九盖知人之事也簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其恵信者効其忠文武爭馳君臣無事可以盡豫遊之樂孟子曰一遊一豫為諸侯度豫樂遊巡也言王者一遊一豫皆有恵及民而諸侯所取法不敢慢遊以病民也可以養松喬之夀赤松王喬皆古仙人之有夀者鳴琴垂拱不言而化家語曰舜彈五絃之琴造南風之詩垂拱者垂衣拱手無為而治也何必勞神苦思代下司職役聰明之耳目虧無為之大道哉按通鑑係十一年四月魏徵上此疏太宗手詔答曰省頻抗表省悉井切視也誠極忠欵苦管切誠也言窮切至披覽忘倦每達宵分夜半也非公體國情深啟沃義重啟開也沃灌溉也商書髙宗命傅説曰啟乃心沃朕心豈能示以良圖匡其不及朕聞晉武自平吳已後晉武帝複姓司馬名炎家世仕魏封晉王受魏禪國號晉吳國名三國孫𣙜之後晉武滅之務在驕奢不復留心治政何曽字頴考仕魏為司徒晉受禪以曽為太傅退朝謂其子劭字敬祖曽之子也仕晉為司徒曰吾每見主上不論經國逺圖但説平生常語此非貽厥子孫者爾身猶可以免指諸孫曰此等必遇亂死及孫綏果為淫刑所戮綏字伯蔚曽之孫也仕晉為尚書後為東海王越所殺前史美之以為明於先見朕意不然謂曽之不忠其罪大矣夫為人臣當進思盡忠退思補過將順其美匡救其惡孝經傳曽子述孔子之辭所以共為理也曽位極台司三公上應三台台司者三公之位也名器崇重當直辭正諫論道佐時今乃退有後言進無廷諍以為明智不亦謬乎危而不持焉用彼相去聲焉於䖍切論語孔子告冉求曰危而不持顛而不扶則將焉用彼相矣公之所陳朕聞過矣當置之几案事等弦韋弦弓弦韋柔皮也韓子曰西門豹性急佩韋以自緩董安于性緩佩弦以自急必望收彼桑榆期之嵗暮不使康哉良哉獨美於往日美亦作盛虞書舜臯陶賡歌之辭曰股肱良哉庶事康哉若魚若水遂爽於當今蜀先主曰孤之有孔明猶魚之得水也遲復嘉謀犯而無隠遲去聲禮事君有犯而無隠朕將虚襟靜志敬佇徳音按太宗此詔通鑑係在十一年七月魏徴累上疏之後孫氏甫曰魏公以忠直稱歴數百年而名愈髙李翺論修史之法則曰假如𫝊魏徴則記其諫諍之詞足以見正直是魏公得諫諍之道其言足以𫝊信於後也此二疏乃諫諍之著者魏公事英主力賛治道已成太平之治見其小失尚孜孜諫諍以防其甚如事中常之主天下未治其君或有大過諫必危切至安危大計必忘身以争也葢輔相之道不至此不足以為忠後之為相者宜詳之吕氏祖謙曰魏徵教太宗十思使太宗能以是十思而充之則當時之治不惟貞觀而已雖並隆于堯舜可也然魏公之十思可以與孔子之九思同垂訓于萬世矣愚按魏徵之于諫也可謂難矣不惟大事能諫雖小事未嘗舍也不惟初年能諌雖末年未嘗輟也史稱其平生諫疏二百餘篇而是年一月之中見於諫疏者凡二焉見于書者如此則其見于言者可知矣傳于世者如此則其不傳于世者亦可知矣臣不以數諫為嫌君不以數諫為忤其致貞觀之治有以也夫今以二疏觀之一以為當監隋之所以失念唐之所以得一以為有善始者實繁能克終者實寡夫能懼得失而後能慎終始能慎終始則有得而無失矣二疏之言相為表衷者也吳氏合二疏為一章厥有㫖哉貞觀十五年太宗謂侍臣曰守天下難易以䜴切侍中唐制門下省侍中掌出納帝命相國儀凡國家之務與中書令叅總而顓判國事宰相職也魏徵對曰甚難太宗曰任賢能受諫諍即可即一作則何謂為難徵曰觀自古帝王在於憂危之間則任賢受諫及至安樂音洛必懷寛怠言事者惟令兢懼令平聲日陵月替以至危亡聖人所以居安思危正為此也為去聲安而能懼豈不為難愚按太宗以間世之才内芟羣雄外清四夷其視取天下有不足為者況于守天下乎故魏徵因其問而對以甚難魏徵豈欲難人之所易哉盖自古人主在憂危則思敬畏思敬畏則亂者治矣居安樂則懐寛怠懐寛怠則治者亂矣周宣能謹于北伐之日而不能謹于庭燎鄉晨之時晉武知謹于平吳之先而不能謹于天下一統之後明皇首誅諸韋安居而禄山之亂生憲宗平蕩淮蔡休兵而𢎞志之禍作唐虞盛治兢兢業業于一日萬幾者豈徒然哉昔定公問一言興邦孔子對以為君之難然則魏徵之言其一言興邦者乎政體第二凡十三章貞觀初太宗謂蕭瑀字時文後梁明帝子也髙祖入闗招之授光禄大夫武徳初遷内史令貞觀初拜太子少師遷僕射又遷御史大夫㕘預朝政後拜太子少傅卒謚曰恭帝以性忌改謚貞褊曰朕少好弓矢少好並去聲自謂能盡其妙近得良弓十數以示弓工乃曰皆非良材也朕問其故工曰木心不正則脉理皆邪皆一作多弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓多矣而猶不得其理况朕有天下之日淺得為理之意固未及於弓弓猶失之而況於理乎自是詔京官五品以上京官謂京都官唐制五品以上皆以名聼制授更宿中書内省更平聲唐制中書内省在禁中每召見皆賜坐與語詢訪外事務知百姓利害政教得失焉范氏祖禹曰𫝊曰國之將興也君子自以為不足其亡也若有餘太宗因識弓之未精而知天下之理已不能盡詢謀於衆而不自用此其所以興也胡氏寅曰太宗射藝絶世矢無虚發若使弓材不良發矢不直則當危㡬交急之時所欲斃者不能應弦而倒而濵於殆也乆矣工人之意則不為是盖見太宗之微故借弓為喻所以規之也猶曰君心不正則言行皆邪勢雖尊嚴而出政不善云爾執藝之言所謂伯牙之彈而太宗聞之異乎子期之聼耶太宗英才盖世羣臣亦一時豪傑多不足以望清光而造弓者乃自外而窺其内衆不可揜盖如此人君可不慎哉凡人能反求諸已者實難太宗雖愧於聼徳之聰然能因是召見京官問民疾苦政事得失是亦為君之道也愚按古者工執藝事以諫固時見於𫝊不謂唐之弓工能見太宗之微而有木心不正表裏皆邪之語斯言也孟子曰一正君而國定董子曰為人君者正心以正朝廷正朝廷以正百官正百官以正萬民而逺近莫不一於正不知太宗果能因工人之言而觸類於經傳之言乎貞觀元年太宗謂黄門侍郎漢世禁門曰黄闥以中人主之故曰黄門唐制黄門侍郎貳侍中職掌祭祀贊獻奏天下祥瑞之官王珪詳見任賢篇曰中書所出詔勑中書省名武徳三年改内書省曰中書省唐制中書掌軍國政令凡制冊詔牒皆宣署而施行焉置令二人侍郎二人右諫議大夫四人右補闕六人令之貳也其屬則有舍人六人右散騎常侍二人右拾遺六人起居舍人二人時中書門下與尚書號曰三省頗有意見不同或兼錯失而相正以否元置中書門下省名唐制門下省掌出納詔令國務則與中書㕘總焉置侍中二人黄門侍郎二人侍中之貳也其屬則有左散騎常侍二人左諫議大夫四人給事中四人起居郎二人補闕二人左拾遺二人𢎞文館亦𨽻焉本擬相防過誤人之意見每或不同有所是非本為公事為去聲或有䕶已之短忌聞其失有是有非銜以為怨銜戸監切含也或有茍避私隙相惜顔靣知非政事遂即施行施平聲難違一官之小情頓為萬人之大弊此實亡國之政卿輩特須在意防也隋日内外庶官政以依違而致禍亂人多不能深思此理當時皆謂禍不及身靣從背言虞書曰汝無靣從退有後言謂靣䛕以為是背毁以為非也不以為患後至大亂一起家國俱䘮雖有脱身之人縱不遭刑戮皆辛苦僅免甚為時論所貶黜卿等特須滅私狥公堅守直道庶事相啟沃勿上下雷同也雷之發聲物無不同時應者故曰雷同胡氏寅曰古者論一相而止至成王雖以周公位冢宰然亦與召公同相為左右何者周公不敢自聖獨専相事又將訓後世為人心不同大賢難得則㕘錯並行相輔相正歸於無失而已自漢以来或置左右丞相或並置三公不拘一相之文至唐而法意猶宻既有左右僕射又有侍中中書尚書兩令左右丞又以官未及而人可用者㕘預朝政而其大綱則俾中書出令門下審駮而尚書受成頒之有司當貞觀時君明臣忠朝希粃政不數年坐致太平其集材並用之效如此諸葛武侯曰㕘署者集衆思廣忠益也若難相違覆曠闕損矣違覆而得中猶棄弊屩而獲珠玉也嗚呼為君如太宗為臣如武侯公心望治可為後世法也愚按胡氏謂古者論一相而止至周召始並相以書傳考之殆不然也何則虞廷之使宅百揆宰相之職也后稷臯陶垂益伯夷后夔皆羣有司之職也若契之敷教龍之納言則不可以有司言也豈非輔正宰相恭預朝政者乎湯以伊尹仲虺並為宰相紂以鄂侯西伯並為三公豈待周召而後有並相之事哉唐制俾中書出令門下審駮尚書受成盖所以集衆人之善而防一已之私真唐虞三代之遺意也觀太宗戒王珪之辭首言䕶短避隙之私次言隋朝依違之禍是不惟法度之善其申儆戒飭於法外者豈不尤深切矣哉貞觀二年太宗問黄門侍郎王珪曰近代君臣理國多劣於前古何也對曰古之帝王為政皆志尚清靜以百姓之心為心近代則唯損百姓以適其欲所任用大臣復非經術之士漢家宰相無不精通一經如漢宣帝時丞相韋賢通禮魏相學易之類朝廷若有疑事皆引經决定由是人識禮教理致太平近代重武輕儒或叅以法律儒行既虧行去聲淳風大壞太宗深然其言自此百官中有學業優長兼識政體者多進其階品累加遷擢焉胡氏寅曰上既泛問珪亦泛對如是則無切磋之益矣前古凡㡬古近世凡幾世珪宜復帝曰不知陛下所指為何代請得論之如是則有因事獻替之功矣若魏晉而下則無足言若自兩漢則西京文學之美不如東漢名節之卲而風俗厚薄治化淳漓無不本於人君者忠臣事君必勉其所未能而奬其所未至兩漢盛時太宗所可及也禹湯文武之業豈不在所希慕乎愚按太宗近代劣於前古之問自三代以下之善哉問也王珪首以漢為對而謂近代重武輕儒果何所指也夫古者臯陶稷契伊傅周召此所謂儒也以明體適用之學躋斯世於極治者也豈特漢之經術比哉太宗以學業優長兼識政體者進其階品不知學業優長者果真儒乎貞觀三年太宗謂侍臣曰中書門下機要之司擢才而居委任實重詔勑如有不稳便皆須執論比来比音鼻惟覺阿㫖順情唯唯茍過唯唯並音葦遂無一言諫諍者豈是道理若惟署詔勅行文書而已人誰不堪何煩簡擇以相委付自今詔勑疑有不穩便必須執言無得妄有畏懼知而寢黙按通鑑是年四月上始御太極殿謂侍臣曰云云房𤣥齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黄門侍郎駁正之上始申明舊制由是鮮有敗事范氏祖禹曰朝廷設官分職非徒使上下相從欲交修其所不逮也故書曰百官修職茍取充位而奉行上令則是胥吏而已不明之君自以無過惡人之言是以政亂而上不聞太宗勅責而使之言雖欲不治不可得也吕氏闕而曰武王諤諤而昌商紂唯唯而亡盖朝廷之上和不同論難往來務求至當此諤諤之風也朝廷以諤諤為風則正人進而佞人退安得而不昌乎其或君臣上下有非不諫務相順從以為雷同此唯唯之風也朝廷以唯唯為風則佞人進而君子退安得而不亡乎是道也豈武王與紂為然秦人唯唯而亡漢家諤諤而昌隋人唯唯而亡唐家諤諤而昌未有唯唯而不亡亦未有諤諤而不昌者也愚按舜命龍作納言曰夙夜出納朕命惟允説者謂後世中書門下之職即納言也夫出者受上言以宣于下納者聼下言以聞于上而允者當於理之謂也下情上達上情下孚一切以帝命之公而無讒説之私此非擇才不能也彼阿㫖順情唯唯茍免者豈惟允之義乎貞觀四年太宗問蕭瑀曰隋文帝何如主也隋文帝姓楊名堅𢎞農人後周朝以元舅輔政位相國封隋王受周禪國號隋對曰克已復禮論語孔子答顔淵問仁之辭言克去已私復還天理也勤勞思政每一坐朝音潮或至日昃五品已上引坐論事宿衛之士𫝊飱而食飱音孫熟食也雖性非仁明亦是勵精之主太宗曰公知其一未知其二此人性至察而心不明夫音扶心暗則照有不通至察則多疑於物又欺孤兒寡婦以得天下隋文帝受禪之時周宣帝既䘮静帝㓜冲之日也恒恐羣臣内懷不服不肯信任百司每事皆自决斷雖則勞神苦形未能盡合於理朝臣既知其意亦不敢直言宰相以下相去聲後同惟承順而已朕意則不然以天下之廣四海之衆千端萬緒須合變通皆委百司商量平聲宰相籌畫於事稳便方可奏行豈得以一日萬㡬虞書曰一日二日萬㡬㡬與機同言日之至淺而事之至多也獨斷一人之慮也且日斷十事五條不中去聲後同謂中於理也中者信善其如不中者何以日繼月乃至累年乖謬既多不亡何待豈如廣任賢良髙居深視法令嚴肅誰敢為非因令諸司因令之令平聲若詔勅頒下有未穩便者必須執奏不得順㫖便即施行務盡臣下之意范氏祖禹曰君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢者不得茍容於朝此庶事所以康也若夫君行臣職則叢脞矣臣不任君之事則惰此萬事所以墮也當舜之時禹為一相總百官自稷以下分職以聼焉君人者如天運於上而四時寒暑各司其序則不勞而萬物生矣君不可以不逸所治者大所司者要也臣不可以不勞所治者寡所職者詳也不明之君不能知人故務察而多疑欲以一人之身代百官之所為則雖聖智亦日力不足矣故其臣下事無大小皆歸之君政有得失不任其患賢者不得行其志而持禄之士得以保其位此天下所以不治也是以隋文勤而無功太宗逸而有成彼不得其道而此得其道故也愚按古之君天下者勞於求賢逸於得人未有身代羣臣之事而自以為勵精者也隋文帝天資苛察多疑自任欲以一身之耳目而周知天下之務以一人之手足而悉代百司之勞不及再𫝊天下大亂後世道學不明故隋文自以為勵精之事蕭瑀亦稱之為勵精之主夫堯之兢兢堯之勵精也舜之孶孶舜之勵精也堯以不得舜為已憂舜以不得禹臯陶為已憂堯舜之勵精勞於求賢而已豈以其身代羣臣之事哉瑀又謂其能克已復禮斯顔子之所勉行也豈隋文之所能乎失之逺矣太宗深悟隋文之非非惟欲廣任賢良髙居深視且令百司不得順㫖務盡臣下之意故貞觀之治較之開皇相去懸絶者有以也夫貞觀五年太宗謂侍臣曰治國與養病無異也病人覺愈彌須將䕶若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便驕逸必至䘮敗今天下安危繋之於朕故日慎一日雖休勿休然耳目股肱寄於卿輩既義均一體宜協力同心事有不安可極言無隠儻君臣相疑不能脩盡肝膈實為國之大害也按通鑑是年康國求内附太宗因有是言魏徵曰内外治安臣不以為喜惟喜陛下居安思危耳吕氏祖謙曰魏徵之於太宗救其惡多矣而未嘗不將順其美焉故其言曰内外治安臣不以為喜惟喜陛下居安思危耳夫既將其居安思危之美俾其居安思危之心永永不忘則其將順正救之道豈不兩盡乎愚按太宗謂治國與養病無異竊嘗因其言而推之天下猶一身也人君為元首大臣為心腹其㳄為股肱又其㳄為耳目又其㳄為爪牙天下之疲癃殘疾則癢疴疾痛舉切吾身者也唐虞三代康强無事之時也春秋戰國病困危篤之時也三國南北朝病􅏓盭痱辟者也隋亡唐興其病愈新起之時乎慎其起居節其飲食兢兢焉保䕶之可也一有觸犯不惟病之復作一且不可復愈矣雖然先儒嘗言仁者以天地萬物為體認得為己何所不至若不属己如手足痿痺氣已不貫嗚呼使太宗而知此義又豈特貞觀之治而已貞觀六年太宗謂侍臣曰看古之帝王有興有衰猶朝之有暮皆為蔽其耳目不知時政得失忠正者不言邪謟者日進既不見過所以至於滅亡朕既在九重平聲君門九重不能盡見天下事故布之卿等以為朕之耳目莫以天下無事四海安寧便不存意書曰可愛非君可畏非民虞書舜告禹之辭言君可愛而民可畏也天子者有道則人推而為主無道則人棄而不用誠可畏也魏徵對曰自古失國之主皆為居安忘危處理忘亂處上聲所以不能長乆今陛下富有四海内外清晏能留心理道常臨深履薄詩曰如臨深淵如履薄氷喻可畏之甚也國家厯數厯數者帝王相繼之㳄第猶嵗月氣節之先後也自然靈長臣又聞古語云君舟也人水也水能載舟亦能覆舟陛下以為可畏誠如聖㫖愚按書曰詢于四岳闢四門明四目達四聰所以通下情而防壅蔽也太宗以廷臣為耳目有合於此歟又曰民惟邦本本固邦寧天下愚夫愚婦一能勝予所以畏民心而保君位也魏徵以水能載舟覆舟有得於此歟君臣之相儆戒如此誠有天下者之鑑也貞觀六年太宗謂侍臣曰古人云危而不持顛而不扶焉用彼相焉於䖍切相去聲見君道篇註君臣之義得不盡忠匡救乎朕嘗讀書見桀殺闗龍逄音旁桀夏桀見君道篇註闗龍逄夏之賢大夫諫桀被殺漢誅鼂錯上音潮下音措鼂錯潁川人漢景帝時為御史大夫請諸侯之罪過削其地吳楚七國遂反袁盎請帝斬錯遂斬於東市未嘗不廢書歎息公等但能正詞直諌禆益政教終不以犯顔忤㫖忤音午逆也妄有誅責朕比來比音鼻臨朝斷決亦有乖於律令者公等以為小事遂不執言凡大事皆起於小事小事不論大事又將不可救社稷傾危莫不由此隋主殘暴身死匹夫之手率土蒼生罕聞嗟痛公等為朕思隋氏滅亡之事為去聲後同朕為公等思龍逄鼂錯之誅君臣保全豈不美哉林氏之竒曰君臣之間其安危禍福之所在未嘗不相與共之也夏桀為一已之欲故不恤闗龍逢之死龍逢既誅而桀亦不免於亡虞世基為一已之計故不諌煬帝之禍煬帝既亡而世基亦不免於禍夫夏桀之殺龍逢世基之媚煬帝豈不以在己之意為自得哉及其危禍之至而俱以不免此太宗所以戒其臣使之為己思煬帝之亡也亦為之念龍逢之死也由是言之君之納諌臣之進諌豈非相為謀而後能相保乎愚按君臣一心則君體其臣臣體其君上下交泰之時也君臣二心則君不恤其臣臣不恤其君上下不交否之時也太宗欲為羣臣思龍逢鼂錯之誅是君能以臣之心為心也又使羣臣為已思隋氏滅亡之事是臣能以君之心為心也君以臣之心為心臣以君之心為心其上下之交泰乎宜其致貞觀之治也貞觀七年太宗與秘書監唐制秘書省置監一人掌邦國經籍圖書之事有二局曰著作曰太史皆率其屬而修其職少監為之貳魏徵從容論自古理政得失從即容切從容和緩貌因曰當今大亂之後造次不可致理造七到切後同造次急遽也徵曰不然凡人在危困則憂死亡憂死亡則思理思理則易教易以豉切後同然則亂後易教猶饑人易食也太宗曰善人為邦百年然後勝殘去殺勝平聲去上聲此􅄒論語之辭大亂之後將求致理寧可造次而望乎徵曰此據常人不在聖哲若聖哲施化施平聲上下同心人應如響不疾而速朞月而可信不為難三年成功猶謂其晩論語曰茍有用我者朞月而已可也三年有成太宗以為然封徳彛名倫以字行觀州人初仕隋為起居舍人佐虞世基以謟承主意後與宇文士及降唐以秘䇿干髙祖為秦王參謀軍事貞觀初拜右僕射卒謚曰明後以邪佞改謚繆等對曰按通鑑無等字作非之曰三代以後以一作之人漸澆訛上古聊切薄也下五禾切謬也故秦任法律謂秦之治専用刑法律令言尚酷也漢雜霸道謂漢之治以王道霸道雜施之言不純也皆欲理而不能豈能理而不欲若信魏徵所説一作論恐敗亂國家徵曰五帝史記謂黄帝顓頊帝嚳唐堯虞舜為五帝孔安國書序以少昊顓頊髙辛唐虞為五帝未詳孰是三王夏殷周創業之主禹湯武王是也不易人而理易如字行帝道則帝行王道則王在於當時所以化之而已考之載籍可得而知昔黄帝與􅃖尤七十餘戰其亂甚矣既勝之後便致太平黄帝姓公孫名軒轅號有熊氏􅃖尤古諸侯之無道者􅃖尤作亂黄帝徵師諸侯與戰於􅃰鹿之野遂擒殺之而萬國和九黎亂徳顓頊征之既克之後不失其理九黎􅃖尤之属也顓頊號髙陽氏黄帝之孫也國語楚觀射父曰少皥氏之衰也九黎亂徳人神雜糅不可方物顓帝承之乃命南正重司天以属神火正黎司地以属人桀為亂虐而湯放之在湯之代即致太平桀夏王名履癸湯殷主名履桀不務徳而賊傷百姓湯遂率兵伐之桀走鳴條遂放而死湯乃踐位平定四海紂為無道武王伐之成王之代亦致太平紂殷王名受武王周文王之子名發紂滛亂日甚百姓怨望武王遂率諸侯伐之紂死於鹿臺武王克殷二年太子誦立是為成王若言人漸澆訛不及純樸至今應悉為鬼魅應平聲當也寧可復得而教化耶徳彛等無以難之難去聲駁也然咸以為不可以上文按通鑑係在四年太宗每力行不倦數年間海内康寧突厥破滅突陀沒切厥九勿切突厥阿史那氏古匈奴北部也居金山之陽夏曰獯鬻商曰鬼方周曰獫狁其别部凡二十八等皆世其官與中國抗衡厯代為患悉臣服於唐因謂羣臣曰貞觀初人皆異論云當今必不可行帝道王道惟魏徴勸我既從其言不過數載遂得華夏安寧逺戎賔服突厥自古以來常為中國勍敵勍音檠强也今酋長酋慈由切長音掌畨國之長也並帶刀宿衛部落皆襲衣冠使我遂至於此皆魏徵之力也顧謂徵曰玉雖有美質在於石間不值良工琢磨與瓦礫不别礫音的小石也别彼列切若遇良工即為萬代之寶朕雖無美質為公所切磋七多切詩曰如切如磋如琢如磨言其治之有緒而益致其精也勞公約朕以仁義𢎞朕以道徳使朕功業至此公亦足為良工爾按史傳曰帝納其言不疑於是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺戸闔不閉行旅不賫糧取給於道帝謂羣臣曰此徵勸我行仁義既效矣惜不令封徳彛見之孫氏甫曰帝王興治道在觀時而為之觀時在至明至明在至公至明則理無不通至公則事無不正通於理故能變天下之弊正其事故能立天下之教弊變教立其治不勞而成矣孔子曰如有用我者期月而已可也三年有成則聖人之意可見矣但後之為天下者雖欲興起治道多非聖哲之才不能通究時弊以道變之務速其功以行一時之事故所為駁雜莫復前古之治也觀魏公之論誠得聖人之意文皇能納其言而不惑姦人之論力變時弊以行王道嗚呼明哉大亂之後興立教法不急其功致時太平徳流於後嗚呼公哉范氏祖禹曰太宗可謂能審取捨矣魏徵仁義之言也欲順天下之理而治之封徳彛刑罰之言也欲咈天下之性而治之夫民莫不惡危而欲安惡勞而欲息以仁義治之則順以刑罰治之則咈矣欲治天下則順之而已咈之而能治之未之聞也太宗從魏徵而不從徳彛行之數年遂致太平仁義之效如此其速也故治道在人主所力行耳孰不可為太宗乎及其成功復歸於下此前世帝王之所不及也胡氏寅曰徳彛言三代以還人漸澆訛未為甚失魏徴言若果澆訛當為鬼魅則非也以書契以來觀之三代之時固不若唐虞之世周之文勝又不若虞夏之質兩漢風俗豈敢望周而唐室風俗又安能及漢邪若謂民常淳檏無有澆訛是結䋲之治可以易約劑土鼔之樂可以變絲竹矣要之一治一亂天地之大數也亂極人少則氣厚而人淳治極人多則氣漓而人澆淳漓一變而天地之氣盈虚消息後世誠不及古逺矣若夫人之所以為人出於本心不可泯滅者則古猶今耳是故可以懐之以仁理之以義先之以敬讓示之以好惡也魏徵有見於饑渇者易為飲食而無見於人心之未亡者故其效止於斗米數錢外户不閉則無以進矣固不能使人人有士君子之器也愚按仁者心之徳而愛之理義者心之制而事之宜二者皆出於天理之本然人心之固有也古之聖人體之於心行之於身措之於家國天下操存於未發之時持守於隱微之地終始如一無須㬰之離也表裏如一無毫髪之間也故能使天地自位萬物自育氣無不和四靈畢至此豈可以偽而為之襲而取之哉周道既衰聖學榛塞孟子於戰國之時汲汲然以仁義説齊梁之君則見謂迂闊而莫之行也自時厥後則自謂馬上得之安事詩書者有之矣崇尚黄老不信儒術者有之矣自謂本雜霸道不喜書生者有之矣其視仁義不過尊之以美名待之以虚噐而已寥寥千載唐太宗以英武間世之姿當撥亂反正之運獨能黜抑封倫之言力行魏徵之請故能致斗米三錢外户不閉行旅野宿幾於刑措亦可謂仁義之效矣然太宗之於仁義也慕其名而不得其實喜其文而不究其本知求之於紀綱政亊而不知反之於吾身方寸之間知求之於外廷朝著而不知行之於宫闈隐微之際故始以從諫為美而終不免仆碑之失外以出宫女為名而内不免懐嬴之累内外扞格終始衡決其於聖人之仁義盖外似而内違名同而實乖也夫自成康八百餘年而後有漢漢八百餘年而後有太宗天之生賢君如此其不數數也幸而有力行仁義之君而較之於聖人之道則又若碔砆之於美玉稊稗之於美稼焉豈非聖道不明有君無臣之所致乎嗚呼惜哉貞觀八年太宗謂侍臣曰隋時百姓縱有財物豈得保此自朕有天下已來存心撫養無有所科差人人皆得營生守其資財即朕所賜向使朕科唤不已雖數資賞賜數音朔亦不如不得魏徵對曰堯舜在上百姓亦云耕田而食鑿井而飲含哺鼓腹而云帝何力於其間矣堯時有老人撃壤於路曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉今陛下如此含養百姓可謂日用而不知又奏稱晉文公晉春秋時國名文公晉君名重耳出田逐獸於碭徒浪切入大澤迷不知所出其中有漁者文公謂曰我若君也道將安出我且厚賜若漁者曰臣願有獻文公曰出澤而受之於是送出澤文公曰今子之所欲教寡人者何也願受之漁者曰鴻鵠保河海厭而徙之小澤則有矰丸之憂矰音曽矢也黿鼉保深淵厭而出之淺渚必有釣射之憂射音石今君逐獸碭入至此何行之太逺也文公曰善哉謂從者記漁者名從去聲漁者曰君何以名為君尊天事地敬社稷保四國慈愛萬人薄賦歛去聲輕租税臣亦與焉與去聲君不尊天不事地不敬社稷不固四海外失禮於諸侯内逆人心一國流亡漁者雖有厚賜不得保也遂辭不受太宗曰卿言是也舊本此章附忠義篇今按其言於政體尤切故附於此愚按恵王移民移粟孟子不許其仁子産濟人溱洧孟子譏其不知為政夫使梁國有九年之儲子産有輿梁之政安用區區之小恵哉善乎太宗曰人得營生即朕所賜若科差不已雖賞賜不如不得此可謂知為政之本矣愚觀後世之君有賜民今年田租者有賜民爵賜民帛者夫耕田鑿井之民尚不知帝力之何有彼有限之賜何足以周無窮之民乎貞觀九年太宗謂侍臣曰往昔初平京師師衆也周都鎬京後世因以天子建都之地曰京師此指長安隋之都而言也宫中美女珍玩無院不滿煬帝意猶不足徵求無已徵平聲召也兼東西征討窮兵黷武黷音瀆百姓不堪遂致滅亡此皆朕所目見故夙夜孜孜並音兹篤意也惟欲清淨使天下無事遂得徭役不興年穀豐稔百姓安樂音洛後同夫治國猶如栽樹夫音扶本根不摇則枝葉茂榮一作盛君能清淨百姓何得不安樂乎愚按孟子曰其為人也多欲雖有存焉者寡矣人莫不然而君天下者尤甚焉夫峻宇雕墻本於宫室酒池肉林本於飲食滛虐嚴酷本於刑罰窮兵黷武本於征伐自古亡國䘮家之君未有不由多欲者也桀以多欲而亡成湯反之而興紂以多欲而亡武王反之而興煬帝多欲而亡太宗反之而興夫太宗之寡欲非能如湯武也不過勉强行之耳猶能身致盛治厯年數百況於真知實踐者乎貞觀十六年太宗謂侍臣曰或君亂於上臣理於下或臣亂於下君理於上二者茍逢何者為甚特進魏徵對曰君心理則照見下非誅一勸百誰敢不畏威盡力若昏暴於上忠諌不從雖百里奚伍子胥之在虞吳不救其禍敗亡亦繼一作促虞吴二國名百里奚虞之賢臣晉假道於虞以伐虢欲并取虞百里奚知虞公之不可諌而去之秦後果為晉所滅伍子胥名員楚人吴之賢臣吴王夫差伐越越請和子胥諌吴王不聼與越平復欲伐齊子胥以為不可吴王又不聼太宰嚭譛子胥於王王賜劍使自死後吴為越王勾踐所滅太宗曰必如此齊文宣昏暴楊遵彦以正道扶之得理何也齊文宣姓髙名洋東魏臣襲其父歡位封齊王受魏禪國號齊楊遵彦名愔仕齊為尚書令文宣以功業自矜遂嗜酒滛佚肆行强暴而能委政楊愔總攝機衡百度修飭時人皆言主昏於上政清於下徵曰遵彦彌縫暴主救理蒼生纔得免亂亦甚危苦與人主嚴明臣下畏法直言正諌皆見信用不可同年而語也林氏之竒曰君者臣之綱君正則臣正未有綱之不正而能使其目之正者然則君茍自亂安能使其臣之治也鄭公之言可謂得夫正綱之道而太宗乃以齊文宣得楊遵彦為君亂臣治之比殊不知彼之所為才能救其亡耳烏足以為治哉孔子言衛靈公之無道康子曰夫如是奚而不䘮孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其䘮是亦君亂而臣治然止於不䘮而巳安能以興邦乎愚按書曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳君臣相須以成至治此元首股肱所由以取喻也太宗之言未為知要夫君亂臣理此季世之所見也求之古先盛時太甲欲敗度縱敗禮可以言亂必有元聖大臣如伊尹之匡救遂終為賢君降此則魏徵所謂才得免亂耳若夫君理臣亂尤無是理君能理矣明其政刑臣何自亂臣之亂政由君之未理也貞觀十九年太宗謂侍臣曰朕觀古来帝王驕矜而取敗者不可勝數上平聲下上聲不能逺述古昔至如晉武平吳見君道篇註隋文伐陳陳後主之世隋滅之已後心逾驕奢自矜諸已臣下不復敢言政道因兹㢮紊上音矢下音汶散亂也朕自平定突厥破髙麗已後麗平聲凡言髙麗並同髙麗東夷國名本扶餘别種居遼東周封箕子之國也今為鎮東省兼并鐵勒席卷沙漠以為州縣鐵勒匈奴苖裔其種𩔖多居西海之北突厥北部也太宗既平其國即其部落列置州縣號為覊縻以其首領為都督刺史皆得世襲凡四夷内属者皆然也夷狄逺服聲教益廣朕恐懐驕矜恒自抑折音舌日旰而食旰音幹晚也坐以待晨每思臣下有讜言直諫讜音黨亦直也可以施於政教者施平聲當拭目以師友待之一無友字如此庶幾於時康道泰爾幾平聲愚按是時魏徵既死諫諍之臣漸少髙麗雖破忿兵之興未已既破鐵勒自謂雪恥酬百王除兇報千古其驕矜滿溢之意固形於歌咏矣然猶能日旰而食坐以待晨俾羣臣讜言直諫欲以師友待之嗚呼此所以克終盛治不失令名有晉武隋文之功而無晉武隋文之禍歟太宗自即位之始霜旱為灾米穀踴貴突厥侵擾州縣騷然帝志在憂人鋭精為政崇尚節儉大布恩徳是時自京師及河東古冀州之域今河東道河南古兖州之域今河南等處隴右古梁州之域今陜西等處饑饉尤甚饑音飢饉音僅穀不熟曰饑菜不熟曰饉一匹絹纔得一斗米百姓雖東西逐食未嘗嗟怨莫不自安至貞觀三年闗中豐熟漢書闗中左殽函右隴蜀太宗分天下為十道此為闗西唐建都之地也今陕西省咸自歸鄉竟無一人逃散其得人心如此加以從諌如流雅好儒術一作學好去聲孜孜求士務在擇官改革舊弊興復制度每因一事觸𩔖為善初息隱海陵之黨息隱髙祖長子也名建成初立為皇太子海陵髙祖第四子也名元吉初封齊王建成荒色嗜酒畋遊無度見秦王功髙與元吉謀害秦王秦王知之遂殺二人既即帝位乃封建成為息王謚曰隱元吉為海陵王謚曰刺同謀害太宗者數百千人事寧後引居左右近侍心術豁然不有疑阻時論以為能斷決大事得帝王之體深惡官吏貪濁惡烏去聲有枉法受財者必無赦免在京流外有犯贓者皆遣執奏隨其所犯寘以重法由是官吏多自清謹制馭王公妃主之家大姓豪猾之伍皆畏威屛跡屏音餅無敢侵欺細人商旅野次無復盜賊囹圄常空囹音零圄音語周獄名也馬牛布野外户不閉又頻致豐稔米斗三四錢行旅自京師至於嶺表五嶺之外今二廣之地自山東至于滄海山東古冀州之域今濟南等路滄海束海之名也皆不賫糧取給於路入山東村落行客經過者過平聲必厚加供待供平聲或發時有贈遺去聲饋送也此皆古昔未有也歐陽氏修曰盛哉太宗之烈也其除隋之亂比迹湯武致治之美庶㡬成康自古功徳兼隆由漢以來未之有也至其牽於多愛復立浮屠好大喜功勤兵於逺此中材庸主之所常為然春秋之法責脩賢者是以後世君子欲成人之美者莫不歎息於斯焉曽氏鞏曰太宗之為君也屈已從諌仁心愛人可謂有天下之志以租庸任民以府衛任兵以職事任官以才能任職以興義任俗以尊本任衆賦役有定制兵農有定業官無虚名職無廢事人習於善行離於末作使之操於上者要而不煩取於下者寡而易供民有農之實而兵之􅊀存有兵之名而農之利在事之分有歸而禄之出不浮材之品不遺而治之體相承其亷耻日以篤田野日以闢以其法修則安且治廢則危且亂可謂有天下之材行之數嵗粟米之賤斗至數錢居者有餘蓄行者有餘貲人人自厚幾於刑措可謂有治天下之效有是三者而不得與先王並者法度之行禮樂之具田疇之制庠序之教擬之先王未脩也躬親行陣之間戰必勝攻必取天下莫以不以為武而非先王之所尚也四夷萬里古所未及政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者如此其得失可睹矣司馬氏光曰太宗文武之才髙出前古驅䇿英雄網羅俊乂好用善謀樂聞直諌拯民於水火之中而措之袵席之上使盜賊化為君子吟呻轉為謳謌衣食有餘刑措不用突厥之渠繋頸闕庭北海之濵悉為州縣盖三代以還中國之盛未之有也范氏祖禹曰太宗以武撥亂以仁勝殘其才畧優於漢髙而規模不及也恭儉不若孝文而功烈過之矣迹其性本彊悍而能畏義而好賢屈已以從諌刻厲矯揉力於為善此所以致貞觀之治也夫人主之所行其善惡是非在後世當其時不可得辨也老子曰善人者不善人之師不善人者善人之資人君擇其善者而從之足以得師其不善而戒之足以為資矣程氏祁曰太宗舉兵五年定海内率天下於仁夀富庶之域者亦以天下之才為天下之務而已觀其任王珪魏徵於仇讐任褚亮李百藥於降虜起劉洎馬周於疎逺起張𤣥素孫伏伽於耆舊委之以政責之以功諌無不從謀無不獲且太宗之才固非天下之所能及然而不以此驕天下之士惴惴然常若有所不逮此其所以能為三百年之基也愚按太宗之為君可以為賢矣貞觀之治可以為盛矣今即其行事觀之内除羣雄外定四夷身經百戰未嘗負北後世君人之功未有髙焉者也其人君之大徳有三一曰謙虚納諫二曰知人善任三曰恭儉愛民後世人君之徳未有過焉者也定租庸調以為取民之制定府兵十六衛以為養兵之制任官則有職爵勲階之制用刑則有笞杖徒流之制後世制度之美莫能加也命房杜以為相英衛以為將王魏之諌爭褒鄂之驍勇虞褚之詞翰下至孫思邈之醫藥李淳風之厯數袁天綱之相法莫不至精至妙度越千古後世人才之盛莫能及也夫功也徳也制度也人才也其盛如此而卒不得與于二帝三王之盛者何哉盖嘗觀之古先帝王雖其天資之美未有不由學問而成者也二帝三王之事尚矣其所從學猶班班可考若髙宗之學于古訓而有獲成王之學有緝熈于光明泰和盛治冠冕百王有以也夫太宗外親瀛洲王之賢内立𢎞文之館未嘗不學也特非二帝三之學耳使其能從事於二帝三王之學又豈特貞觀之治而已哉貞觀政要卷一
