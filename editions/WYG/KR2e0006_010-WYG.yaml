body:
  text: 樂善右謹依定本恭錄堂全集御製讀貞觀政要薰風何習習朱明屆長候北忩髙卧起洛誦勤時懋貞觀政要編覽罷再三復文皇治世功在漢文景右斗米值三錢太倉粟腐臭闗東暨嶺南開門夜無寇論古緬遐思治功非倖覯文貞立朝端彌縫而匡救九重亦虛已勤政夜繼晝勵精圖至治俗用臻富厚二十餘年間中外稱明后徴没明鑑昏志滿漸差謬東征無成功幸能自引咎復碑念前規厚賜撫其後猶不負初心終身無罅漏信順立丕基尚賢天所祐先哲留嘉謨後人當勉就樂善右謹依定本恭録堂全集懿徳嘉言在簡編憂勤想見廿三年燭情已自同懸鏡從諫端知勝轉圜房杜有容能讓直魏王無事不繩愆髙山景仰心何限字字香生翰墨筵乾隆丙辰君子慎言行其發乃樞機出身發乎邇千里應在兹所以古聖王左右史有司匪惟記善惡亦以謹起居叶遙遙三代下不乏為君師漢文唐太宗髙山予仰跂叶漢帝質無忝唐皇文有餘叶至今政要書炳然法則垂求賢與納諫簡編多令儀獨於觀史事不能我無疑文皇信英辟易理豈不知九皋鶴聞野榮辱應不遲詎藉金匱蔵却觀知所為遂良執簡記𫝊信恒於斯秘之不與觀固也非達宜禮云記動言非禮戒宴私不觀史何據或者其未思善哉劉洎言人君日月齊設遂良不記天下皆記之復如封宇文至唐皆進規使其記隋事筆應多詭辭豈能掩煬惡煬惡誰直書叶乾隆乙丑仲夏御製右二首謹依詩初集恭録御製題金版貞觀政要好名曽昔議文皇三代下名好亦臧言不以人廢如是書原同帝範之蘉呉兢采輯質文備梁肅鋟行勸戒詳幾度披芸欽古鑒寧徒玩紙墨精良御製右一首謹依詩二集恭錄御製題貞觀政要魏徴王珪請送葬二王事上表明陳送寢園豈非不忘舊君恩舊君若問辰嬴事死後將何對九原徴珪平日皆自命敢言者也雖太宗欲立楊氏為后徴進言乃止然此事豈待立后始為失徳哉既為太宗之累亦無以對海陵則上表欲送息隠海陵之葬不過為名之舉耳故詩以刺之御製右一首謹依詩三集恭錄欽定四庫全書史部五貞觀政要雜史類提要臣等謹按貞觀政要十卷唐吳兢撰兢汴州浚儀人以魏元忠薦直史館累官太子左庶子貶荆州司馬厯洪舒二州刺史入為恒王傅天寳初年八十卒事蹟具唐書本傳宋中興書目稱兢于太宗實録外采其與羣臣問答之語作為此書用偹觀戒總四十篇新唐書著録十卷均與今本合考舊唐書曹確傳載確奏臣覽貞觀故事太宗初定官品云云其文與此書擇官篇第一條相同而唐志所録别無貞觀故事豈即此書之别名歟其書在當時嘗經表進而不著年月惟兢自序所稱侍中安陽公者乃源乾曜中書令河東公者乃張嘉貞考元宗本紀乾曜為侍中嘉貞為中書令皆在開元八年則兢成此書又在八年以後矣書中所記太宗事蹟以唐書通鑑參考亦頗見牴牾如新舊唐書載太宗作威鳯賦賜長孫無忌而此作賜房元齡通鑑載張藴古以救李好徳被誅而此謂其與囚戲博漏洩帝㫖事状迴異又通鑑載皇甫徳參上書賜絹二十四匹拜監察御史而此但作賜帛二十段又通鑑載宗室諸王降封由封徳彛之奏貞觀初放宫人由李百藥之奏而此則謂出于太宗獨斷俱小有異同史稱兢叙事簡核號良史而晚節稍疎牾此書盖出其耄年之筆故不能盡免滲漏然太宗為一代令辟其良法善政嘉言􅍇行臚具是編洵足以資法鑒前代經筵進講每多及之故中興書目稱厯代寳傳至今無闕伏讀皇上御製樂善堂集開卷首篇即邀褒詠千年舊籍榮荷表章則是書之有裨治道亦概可見矣書中之註為元至順四年臨川戈直所作又採唐栁芳晉劉昫宋宋祁孫甫歐陽脩曽鞏司馬光孫洙范祖禹馬存朱黼張九成胡寅吕祖謙唐仲友葉適林之竒真徳秀陳惇修尹起莘程竒及吕氏通鑑精義二十二家之説附之名曰集論吳澄郭思貞皆為之序直字伯敬即澄之門人也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀明憲宗貞觀政要序朕惟三代而後治功莫盛於唐而唐三百年間尤莫若貞觀之盛誠以太宗克已勵精圖治於其上而羣臣如魏徵輩感其知遇之隆相與獻可替否以輔治於下君明臣良其獨盛也宜矣厥後史臣吳兢采其故實編類為十卷名曰貞觀政要有元儒士臨川戈直復加考訂註釋附載諸儒論說以暢其義而當時大儒吳澄又為之題辭以為世不可無其信然也朕萬幾之暇銳情經史偶及是編喜其君有任賢納諫之美臣有輔君進諫之忠其論治亂興亡利害得失明白切要可為鑒戒朕甚嘉尚焉顧傳刻嵗久字多訛謬因命儒臣重訂正之刻梓以永其傳於戲太宗在唐為一代英明之君其濟世康民偉有成烈卓乎不可及已所可惜者正心修身有愧於二帝三王之道而治未純也朕將逺師往聖允廸大猷以宏至治固不專於是編然而嘉尚之者以其可為行逺登髙之助也序于篇端讀者鑒焉成化元年八月初一日夏有天下四百五十餘年商有天下六百三十餘年周有天下八百六十餘年三代以後享國之久唯漢與唐唐之可稱者三君而已太宗文皇帝身兼創業守成之事納諫求治勵精不倦其效至于米㪷三錢外户不閉故貞觀之盛有非開元元和之所可及而太宗卓然為唐三宗之冠史臣吳兢類輯朝廷之設施君臣之問對忠賢之諍議萃成十卷曰貞觀政要事覈辭質讀者易曉唐之子孫奉為祖訓聖世亦重其書澄備位經筵時嘗以是進講焉夫過唐者漢孝文之恭儉愛民可鏡也超漢者夏大禹之好善言惡㫖酒可規也繼夏者商成湯之不邇聲色不殖貨利可師法也周監二代郁郁乎文文武之徳旦奭之猷具載二南二雅周頌之詩召誥立政無逸之書義理昭融教戒深切率而由之其不上躋泰和景運之隆乎然譬之行逺必自邇譬之登髙必自卑則貞觀政要之書何可無也庶士戈直考訂音釋附以諸儒論說又足開廣將来進講此書者之視聽其所裨益豈少哉前翰林學士資善大夫知制誥同修國史吳澄題辭二帝三王之治後世莫能及者順人之道盡乎仁義也唐太宗以英武之資克敵如拉朽所向無前天下甫定魏鄭公力排封徳彛之繆以仁義進雖太宗未能允廸其實有愧於修齊然四年之間内安外服貞觀之治亦仁義之明效歟史臣吳兢類為政要凡命令政教敷奏復逆詢謀之同謇諤之異所以植國體而裕民生者赫赫若前日事江右戈直集前賢之論以釋之翰林草廬吳公叙其首以屬於余值拜奎章召命道廣陵謀於憲使日新程公將有以廣其傳也程公慨然即以學廩之羨鋟諸梓嗚呼仁義之心亘古今而無間因其所已然勉其所未至以進輔於聖朝則二帝三王之治特由此而推之耳觀是編者尚朂之哉至順四年嵗在癸酉正月辛夘前中奉大夫江南諸道行御史臺侍御史奎章閣大學士郭思貞書貞觀政要者唐太宗文皇帝之嘉言善行良法美政而史臣吳兢編類之書也自唐世子孫既已書之屏帷銘之几案祖述而憲章之矣至於後世之君亦莫不列之講讀形之論議景仰而傚法焉夫二帝三王之事尚矣兩漢之賢君六七作何貞觀之政獨赫然耳目之間哉葢兩漢之時世已逺貞觀之去今猶近遷固之文髙古爾雅而所紀之事畧吳氏之文質樸該贍而所紀之事詳是則太宗之事章章較著於天下後世者豈非此書之力哉夫太宗之於正心修身之道齊家明倫之方誠有愧於二帝三王之事矣然其屈已而納諫任賢而使能恭儉而節用寛厚而愛民亦三代而下絶無而僅有者也後之人君擇其善者而從之其不善者而改之豈不交有所益乎惜乎是書傳寫謬誤竊嘗會萃衆本參互考訂而其義之難明音之難通字為之釋句為之述章之不當分者合之不當合者分之自唐以来諸儒之論莫不采而輯之間亦斷以已意附於其後然後此書之㫖頗為明白雖於先儒窮理之學不敢妄議然於國家致治之方未必無小補云後學臨川戈直謹書貞觀政要原序有唐良相曰侍中安陽公中書令河東公以時逢聖明位居宰輔寅亮帝道弼諧王政恐一物之乖所慮四維之不張每克已勵精緬懷故實未嘗有乏太宗時政化良足可觀振古而来未之有也至於垂世立教之美典謨諫奏之詞可以𢎞闡大猷增崇至道者爰命不才備加甄録體制大畧咸發成規於是綴集所聞㕘詳舊史撮其指要舉其宏綱詞兼質文義在懲勸人倫之紀備矣軍國之政存焉凡一帙一十卷合四十篇名曰貞觀政要庶乎有國有家者克遵前軌擇善而從則可久之業益彰矣可大之功尤著矣豈必祖述堯舜憲章文武而已哉其篇目次第列之于左唐衛尉少卿兼修國史修文舘學士吳兢撰按兢汴州浚儀人少厲志貫知經史方直寡諧惟與魏元忠朱敬則游唐長安中二人者當道薦兢才堪論撰詔直史舘修國史神龍中為右補闕累遷衛尉少卿兼修文舘學士復修史於是采摭太宗朝政事之要隨事載録以備勸戒合四十篇上之名曰貞觀政要開元中為太子左庶子又嘗私撰唐書唐春秋兢居官多忠諫敘事簡核有古良史之風嘗撰則天實録直筆無諱當世謂今董狐云欽定四庫全書史部五貞觀政要目録雜史類卷一論君道第一論政體第二卷二論任賢第三論求諫第四論納諌第五卷三論君臣鑒戒第六論擇官第七論封建第八卷四論太子諸王定分第九論尊敬師傅第十論教戒太子諸王第十一論規諌太子第十二卷五論仁義第十三論忠義第十四論孝友第十五論公平第十六論誠信第十七卷六論儉約第十八論謙讓第十九論仁惻第二十慎所好第二十一慎言語第二十二杜讒邪第二十三論悔過第二十四論奢縱第二十五論貪鄙第二十六卷七崇儒學第二十七論文史第二十八論禮樂第二十九卷八論務農第三十論刑法第三十一論赦令第三十二論貢賦第三十三辨興亡第三十四卷九議征伐第三十五議安邊第三十六卷十論行幸第三十七論畋獵第三十八論災祥第三十九論慎終第四十欽定四庫全書貞觀政要卷一唐吳兢撰元戈直集論愚按貞觀者唐太宗表年之號也易大𫝊曰天地之道貞觀者也猶言天地之文理主於正以示人也政要者唐史臣吳兢類輯貞觀間君臣之嘉言善行良法美政之大要也唐史本紀曰太宗姓李氏諱世民隴西成紀人為凉武昭王八世孫髙祖次子也母曰太穆皇后竇氏生而不驚方四嵗有書生謁髙祖曰公貴人也必有貴子及見太宗曰龍鳳之姿天日之表其年㡬冠必能濟世安民書生既去乃采其語名之曰世民及長聰明英武有大志能屈節下士結納豪傑佐髙祖以定天下之亂功業日隆隋義寧元年髙祖以唐王受隋禪國號唐明年改元武徳封世民為秦王九年立秦王世民為皇太子聼政是年八月即皇帝位明年改元貞觀在位凡二十三年為一代之賢君其言行之美政治之盛與夫任賢使能之方從諫樂善之道大畧皆聚此書也後文宗讀此慨然慕之故太和初政號為清明則是書也不無補於治云君道第一凡五章貞觀初太宗謂侍臣曰為君之道必須先存百姓若損百姓以奉其身猶割股以啖腹股一作脛啖音淡食也腹飽而身斃若安天下必須先正其身未有身正而影曲上理而下亂者朕每思傷其身者不在外物皆由嗜欲以成其禍若躭嗜滋味玩悦聲色所欲既多所損亦大既妨政事又擾生人擾亦作損且復出一非理之言萬姓為之觧體怨讟既作讟音瀆痛怨也離叛亦興朕每思此不敢縱逸諌議大夫唐制掌諫論得失侍從贊相之職魏徵詳見任賢篇對曰古者聖哲之主皆亦近取諸身故能逺體諸物昔楚聘詹何楚春秋時國名僣稱王詹何楚詹尹之後隱於釣楚莊王聞而異之召而問焉出列子問其理國之要詹何對以修身之術楚王又問理國何如詹何曰未聞身理而國亂者陛下所明實同古義按通鑑武徳九年太宗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君䘮矣朕嘗以此思之故不敢縱欲也與此章辭異而㫖同故附見於此愚按中庸九經修身為先大學八目修身為本古者二帝三王之治未有不先正其身而能正天下者也故堯必克明峻徳而後能黎民時雍舜必帝徳㒺愆而後能萬邦咸寧禹必祗台徳先而後能朔南暨聲教湯必懋昭大徳而後能表正萬邦武王必建其有極而後能作民父母盖身者表也天下者景也未有表正而景曲者也身者源也天下者流也未有源清而流濁者也後之人君若漢髙之約法除苛文景之㡬致刑措宣帝之綜核名實光武之恭勤儉約明帝之明察善斷孝章之寛厚長者其愛民之心治民之具盖亦有合乎先王者矣特其本原之地有未純焉者爾由此觀之身心與國家天下為一者三代以上之治也身心與國家天下為二者三代以下之治也唐太宗以英武之姿當大亂之後芟除羣雄拓定四海一旦君臨南面首告其羣臣曰安天下必須先正其身未有身正而影曲者斯言也非三代以下之言也魏徵斯時正當告之以中庸之九經大學之八目於以闡揚聖學之奥於以發明心術之微可也顧乃以二帝楚王詹何之言言之何其逺哉使太宗斯時得聞三王之學必將終始如一而無晚年之悔内外如一而無宫闈之愧矣豈特貞觀之治而已邪惜乎太宗能言之而不能行之魏徵能贊美之而不能發明之也呉氏編是書置此於開卷之首其有所取也夫抑有所感也夫貞觀二年太宗問魏徵曰何為明君暗君徵曰君之所以明者兼聼也其所以暗者偏信也詩云先人有言詢於芻蕘詩大雅板篇之辭芻蕘採薪之人言雖賤而不棄也人詩作民盖避太宗諱故以人代民他皆類此昔唐虞之理堯曰陶唐氏舜曰有虞氏理本作治盖避髙宗諱故以理代治他皆類此闢四門明四目達四聰虞書史贊舜之辭謂開四方之門以来天下之賢俊廣四方之視聼以决天下之壅蔽也是以聖無不照故共鯀之徒不能塞也共音恭鯀音衮共工唐虞官名古之世族官也鯀崇伯名夏禹父也共工滛辟鯀治水無功舜流共工於幽州殛鯀于羽山塞猶蔽也靖言庸回不能惑也虞書曰靜言庸違靖與能言靜同回亦違也謂静則用之則不然也秦二世則隱藏其身捐隔踈賤而偏信趙髙及天下潰叛不得聞也捐音員棄也秦二世始皇少子名胡亥嗣位號二世皇帝趙髙秦宦者二世用之為相二世常居禁中公卿希得朝見盜賊益多二世後為髙所弑梁武帝偏信朱异而侯景舉兵向闕竟不得知也异羊吏切梁武帝姓蕭名衍仕齊封梁王受齊禪國號梁朱异仕梁為散騎常侍侯景東魏臣叛歸魏復請歸梁武帝從朱异之議納景為大將軍及景反叛朝野共怨异武帝後為景所逼餓而死隋煬帝偏信虞世基而諸賊攻城剽邑亦不得知也剽音漂刼也隋煬帝姓楊名廣文帝次子也虞世基仕隋為内史侍郎世基以帝惡聞盜賊告者皆不以實聞由是盜賊競起䧟沒郡縣皆弗之知煬帝後為宇文化及等所弑是故人君兼聼納下則貴臣不得壅蔽而下情必得上通也太宗甚善其言范氏祖禹曰善哉太宗之問魏徵之對也可謂得其要矣夫聖人以天下為耳目故聰明庸君以近習為耳目故暗蔽明暗之分惟在於逺近大小而已矣唐氏仲友曰兼聼則公正忠讜進偏信則浸潤膚受行此魏徵論聼納任用之本愚按太宗問明君暗君魏徵謂兼聼者明偏信者時兹言固簡而當矣然兼聼偏信此自外至者也明之與暗又有存於中者焉堯之欽明舜之聰明乃其中扄澄徹如鑑之空如衡之平妍􅎀輕重隨物而見者也彼昧者昏者反是此又明暗之所分盖偏信固易於蔽而兼聼亦有所當擇惟明足以燭理何施而不可哉君天下者欲進於堯舜之明當自格物致知之學始貞觀十年太宗謂侍臣曰帝王之業草創與守成孰難守成亦作守文後同尚書左僕射尚音常射音夜凡言尚書僕射並同僕射秦官古者重武官有主射以督課取其領事之號也唐制尚書省置左右僕射掌統理六官為令之貳令闕則總省事宰相職也房𤣥齡詳見任賢篇對曰天地草昧易屯卦㒸𫝊曰天造草昧草雜亂昧㝠晦也羣雄競起攻破乃降下江切戰勝乃尅由此言之草創為難魏徵對曰帝王之起必承衰亂覆彼昏狡百姓樂推樂音洛四海歸命天授人與乃不為難然既得之後志趣驕逸百姓欲靜而徭役不休百姓凋殘而侈務不息國之衰弊恒由此起恒胡登切常也以斯而言守成則難太宗曰𤣥齡昔從我定天下脩嘗艱苦出萬死而遇一生所以見草創之難也魏徵與我安天下慮生驕逸之端必踐危亡之地所以見守成之難也今草創之難既已往矣守成之難者當思與公等慎之按通鑑係十二年又云𤣥齡等拜曰陛下及此言四海之福也范氏祖禹曰自古創業而失之者寡守成而失之者多周公曰相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難故禍亂未嘗不生於安逸也然非特創業之君守成為難其後嗣守成尤難也林氏之竒曰創業之難雖庸人亦知其然守成之難雖明者亦有所忽周宣王六月出師不以為難而末年庭燎鄉晨以視朝為不易漢髙帝好謀能聼從諫若轉園之易而末年欲易太子以聼言為甚難是以文帝之世賈生有厝火積薪之言太宗之世魏徵有失於安逸之戒唐氏仲友曰太宗之問禍福之機房魏之對更為本末若言創業易太宗身更其難此不可罔若言守成易太宗必謂難者吾猶身濟之怠忽生矣太宗悟二臣之意加謹於守成之難明哉愚按自古人君創業守成鮮有身兼之者周武漢髙創業者也而不及守成成康文景守成者也而不及創業惟神禹在帝位十年成湯在帝位十三年兼創業守成之事者也然以書𫝊攷之禹不以治水敷土為難而以本固邦寧為難湯不以升陑伐桀為難而以時忱克終為難豈創業果易而守成果難乎盖創業逆境也可以進徳守成順境也易以䘮徳太宗身兼創業守成之事不以其己能者自滿而以其未能者為懼其致貞觀之治也宜哉貞觀十一年特進漢世諸侯功徳優盛朝廷所敬異者賜位特進位三公下唐制因之魏徵上疏曰臣觀自古受圖膺運繼體守文控御英雄一作傑南靣臨下易説卦𫝊曰聖人南靣而聼天下嚮明而治皆欲配厚徳於天地齊髙明於日月本支百世𫝊祚無窮祚禄位也然而克終者鮮上聲少也後同敗亡相繼其故何哉所以求之失其道也殷鑒不逺詩大雅蕩篇之辭言商紂之所當鑒者近在夏桀之世也可得而言昔在有隋統一寰宇甲兵彊鋭一作盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安惡烏去聲不欲社稷之長乆故行桀虐以就滅亡哉桀名履癸夏末淫暴之君湯伐之而死恃其富强不虞後患驅天下以從欲罄萬物而自奉採域中之子女求逺方之竒異宫苑是飾臺榭是崇徭役無時干戈不戢外示嚴重内多險忌讒邪者必受其福讒鉏咸切譛也忠正者莫保其生上下相䝉揜蔽也君臣道隔民不堪命率土分崩遂以四海之尊殞於匹夫之手殞羽敏切歿也子孫殄絶殄音腆盡也為天下笑可不痛哉聖哲乗機拯其危溺拯之慶切救也八柱傾而復正淮南子曰地有九州八柱括地象曰崑崙山為柱地之中也地下有八柱牽制名山大川孔穴相通四維弛而更張弛音矢廢也更平聲管子曰禮義亷恥是謂四維四維不張國乃滅亡逺肅邇安不踰於期月期與朞同謂周一嵗之月也論語曰茍有用我者朞月而已可也勝殘去殺無待於百年勝平聲去上聲論語曰善人為邦百年亦可以勝殘去殺矣今宫觀臺榭盡居之矣觀去聲竒珍異物盡收之矣姬姜淑媛盡侍於側矣媛美女也音援四海九州盡為臣妾矣若能鑒彼之所以失一作亡念我之所以得日慎一日雖休勿休焚鹿臺之寳衣武王克商紂走反入登鹿臺䝉衣其珠玉自燔于火而死武王命南宫括散鹿臺之財毁阿房之廣殿阿於何切房讀曰旁秦始皇作前殿阿房東西五百歩南北五十丈上可坐萬人下可建五文旗自殿下直抵南山表閣道絶漢後為楚所焚懼危亡於峻宇夏書五子之歌曰甘酒嗜音峻宇雕墻有一於此未或不亡思安處於卑宫處上聲後同論語曰卑宫室而盡力乎溝洫禹吾無間然矣謂禹薄於已而勤於民也則神化潛通無為而治徳之上也若成功不毁即仍其舊除其不急損之又損雜茅茨於桂棟㕘玉砌以土堦堯舜之朝土堦三等茅茨不剪悦以使人不竭其力常念居之者逸作之者勞億兆悦以子来羣生仰而遂性徳之次也若惟聖㒺念周書曰惟聖㒺念作狂言一念之差雖聖亦為狂矣不慎厥終忘締搆之艱難締音帝結也搆音姤成也謂天命之可恃忽采椽之恭儉椽音傳榱桷也追雕墻之靡麗因其基以廣之增其舊而飾之觸類而長音掌不知止足人不見徳而勞役是聞斯為下矣譬之負薪救火揚湯止沸以暴易亂與亂同道莫可測也測一作則後嗣何觀夫事無可觀則人怨夫音扶後同人怨則神怒神怒則災害必生災害既生則禍亂必作禍亂既作而能以身名全者鮮矣順天革命之后將隆七百之祚隆一作基左傳曰成王定鼎於郏鄏卜世三十卜年七百天所命也貽厥子孫𫝊之萬葉難得易失易以豉切後同可不念哉按通鑑係十一年正月上作飛山宫故魏徵上此䟽是月徵又上疏曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其徳義源不深而望流之逺根不固而求木之長徳不厚而思國之理臣雖下愚知其不可而況於明哲乎人君當神器之重神器帝位也居域中之大老子曰域中有四大道大天大地大王亦大將崇極天之峻永保無疆之休不念居安思危戒奢以儉徳不處其厚情不勝其欲斯亦伐根以求木盛塞源而欲流長者也凡百元首虞書曰元首明哉所以喻君也承天景命莫不殷憂而道著殷憂憂之甚也功成而徳衰有善始者實繁能克終者葢寡豈取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體胡越者極南北之間言至異可同也傲物則骨肉為行路言至親反踈也雖董之以嚴刑董督也虞書曰董之用威震之以威怒終茍免而不懐仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎家語曰君者舟也庶人者水也水所以載舟亦所以覆舟也奔車朽索其可忽乎朽許九切索蘇各切夏書曰予臨兆民懍乎若朽索之御六馬喻危懼可畏之甚奔車朽索亦此意也君人者誠能見可欲則思知足以自戒將有作則思知止以安人念髙危則思謙冲而自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度樂音洛後同盤遊畋獵也周書曰不敢盤於遊田三驅者圍合其三靣前開一路使之可去不忍盡物好生之仁也易比卦六五王用三驅失前禽盖猶成湯祝網之義憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罸所及則思無因怒而濫刑總此十思宏兹九徳虞書臯陶曰亦行有九徳寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞彊而義言人之徳見於行者凡九盖知人之事也簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其恵信者効其忠文武爭馳君臣無事可以盡豫遊之樂孟子曰一遊一豫為諸侯度豫樂遊巡也言王者一遊一豫皆有恵及民而諸侯所取法不敢慢遊以病民也可以養松喬之夀赤松王喬皆古仙人之有夀者鳴琴垂拱不言而化家語曰舜彈五絃之琴造南風之詩垂拱者垂衣拱手無為而治也何必勞神苦思代下司職役聰明之耳目虧無為之大道哉按通鑑係十一年四月魏徵上此疏太宗手詔答曰省頻抗表省悉井切視也誠極忠欵苦管切誠也言窮切至披覽忘倦每達宵分夜半也非公體國情深啟沃義重啟開也沃灌溉也商書髙宗命傅説曰啟乃心沃朕心豈能示以良圖匡其不及朕聞晉武自平吳已後晉武帝複姓司馬名炎家世仕魏封晉王受魏禪國號晉吳國名三國孫𣙜之後晉武滅之務在驕奢不復留心治政何曽字頴考仕魏為司徒晉受禪以曽為太傅退朝謂其子劭字敬祖曽之子也仕晉為司徒曰吾每見主上不論經國逺圖但説平生常語此非貽厥子孫者爾身猶可以免指諸孫曰此等必遇亂死及孫綏果為淫刑所戮綏字伯蔚曽之孫也仕晉為尚書後為東海王越所殺前史美之以為明於先見朕意不然謂曽之不忠其罪大矣夫為人臣當進思盡忠退思補過將順其美匡救其惡孝經傳曽子述孔子之辭所以共為理也曽位極台司三公上應三台台司者三公之位也名器崇重當直辭正諫論道佐時今乃退有後言進無廷諍以為明智不亦謬乎危而不持焉用彼相去聲焉於䖍切論語孔子告冉求曰危而不持顛而不扶則將焉用彼相矣公之所陳朕聞過矣當置之几案事等弦韋弦弓弦韋柔皮也韓子曰西門豹性急佩韋以自緩董安于性緩佩弦以自急必望收彼桑榆期之嵗暮不使康哉良哉獨美於往日美亦作盛虞書舜臯陶賡歌之辭曰股肱良哉庶事康哉若魚若水遂爽於當今蜀先主曰孤之有孔明猶魚之得水也遲復嘉謀犯而無隠遲去聲禮事君有犯而無隠朕將虚襟靜志敬佇徳音按太宗此詔通鑑係在十一年七月魏徴累上疏之後孫氏甫曰魏公以忠直稱歴數百年而名愈髙李翺論修史之法則曰假如𫝊魏徴則記其諫諍之詞足以見正直是魏公得諫諍之道其言足以𫝊信於後也此二疏乃諫諍之著者魏公事英主力賛治道已成太平之治見其小失尚孜孜諫諍以防其甚如事中常之主天下未治其君或有大過諫必危切至安危大計必忘身以争也葢輔相之道不至此不足以為忠後之為相者宜詳之吕氏祖謙曰魏徵教太宗十思使太宗能以是十思而充之則當時之治不惟貞觀而已雖並隆于堯舜可也然魏公之十思可以與孔子之九思同垂訓于萬世矣愚按魏徵之于諫也可謂難矣不惟大事能諫雖小事未嘗舍也不惟初年能諌雖末年未嘗輟也史稱其平生諫疏二百餘篇而是年一月之中見於諫疏者凡二焉見于書者如此則其見于言者可知矣傳于世者如此則其不傳于世者亦可知矣臣不以數諫為嫌君不以數諫為忤其致貞觀之治有以也夫今以二疏觀之一以為當監隋之所以失念唐之所以得一以為有善始者實繁能克終者實寡夫能懼得失而後能慎終始能慎終始則有得而無失矣二疏之言相為表衷者也吳氏合二疏為一章厥有㫖哉貞觀十五年太宗謂侍臣曰守天下難易以䜴切侍中唐制門下省侍中掌出納帝命相國儀凡國家之務與中書令叅總而顓判國事宰相職也魏徵對曰甚難太宗曰任賢能受諫諍即可即一作則何謂為難徵曰觀自古帝王在於憂危之間則任賢受諫及至安樂音洛必懷寛怠言事者惟令兢懼令平聲日陵月替以至危亡聖人所以居安思危正為此也為去聲安而能懼豈不為難愚按太宗以間世之才内芟羣雄外清四夷其視取天下有不足為者況于守天下乎故魏徵因其問而對以甚難魏徵豈欲難人之所易哉盖自古人主在憂危則思敬畏思敬畏則亂者治矣居安樂則懐寛怠懐寛怠則治者亂矣周宣能謹于北伐之日而不能謹于庭燎鄉晨之時晉武知謹于平吳之先而不能謹于天下一統之後明皇首誅諸韋安居而禄山之亂生憲宗平蕩淮蔡休兵而𢎞志之禍作唐虞盛治兢兢業業于一日萬幾者豈徒然哉昔定公問一言興邦孔子對以為君之難然則魏徵之言其一言興邦者乎政體第二凡十三章貞觀初太宗謂蕭瑀字時文後梁明帝子也髙祖入闗招之授光禄大夫武徳初遷内史令貞觀初拜太子少師遷僕射又遷御史大夫㕘預朝政後拜太子少傅卒謚曰恭帝以性忌改謚貞褊曰朕少好弓矢少好並去聲自謂能盡其妙近得良弓十數以示弓工乃曰皆非良材也朕問其故工曰木心不正則脉理皆邪皆一作多弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓多矣而猶不得其理况朕有天下之日淺得為理之意固未及於弓弓猶失之而況於理乎自是詔京官五品以上京官謂京都官唐制五品以上皆以名聼制授更宿中書内省更平聲唐制中書内省在禁中每召見皆賜坐與語詢訪外事務知百姓利害政教得失焉范氏祖禹曰𫝊曰國之將興也君子自以為不足其亡也若有餘太宗因識弓之未精而知天下之理已不能盡詢謀於衆而不自用此其所以興也胡氏寅曰太宗射藝絶世矢無虚發若使弓材不良發矢不直則當危㡬交急之時所欲斃者不能應弦而倒而濵於殆也乆矣工人之意則不為是盖見太宗之微故借弓為喻所以規之也猶曰君心不正則言行皆邪勢雖尊嚴而出政不善云爾執藝之言所謂伯牙之彈而太宗聞之異乎子期之聼耶太宗英才盖世羣臣亦一時豪傑多不足以望清光而造弓者乃自外而窺其内衆不可揜盖如此人君可不慎哉凡人能反求諸已者實難太宗雖愧於聼徳之聰然能因是召見京官問民疾苦政事得失是亦為君之道也愚按古者工執藝事以諫固時見於𫝊不謂唐之弓工能見太宗之微而有木心不正表裏皆邪之語斯言也孟子曰一正君而國定董子曰為人君者正心以正朝廷正朝廷以正百官正百官以正萬民而逺近莫不一於正不知太宗果能因工人之言而觸類於經傳之言乎貞觀元年太宗謂黄門侍郎漢世禁門曰黄闥以中人主之故曰黄門唐制黄門侍郎貳侍中職掌祭祀贊獻奏天下祥瑞之官王珪詳見任賢篇曰中書所出詔勑中書省名武徳三年改内書省曰中書省唐制中書掌軍國政令凡制冊詔牒皆宣署而施行焉置令二人侍郎二人右諫議大夫四人右補闕六人令之貳也其屬則有舍人六人右散騎常侍二人右拾遺六人起居舍人二人時中書門下與尚書號曰三省頗有意見不同或兼錯失而相正以否元置中書門下省名唐制門下省掌出納詔令國務則與中書㕘總焉置侍中二人黄門侍郎二人侍中之貳也其屬則有左散騎常侍二人左諫議大夫四人給事中四人起居郎二人補闕二人左拾遺二人𢎞文館亦𨽻焉本擬相防過誤人之意見每或不同有所是非本為公事為去聲或有䕶已之短忌聞其失有是有非銜以為怨銜戸監切含也或有茍避私隙相惜顔靣知非政事遂即施行施平聲難違一官之小情頓為萬人之大弊此實亡國之政卿輩特須在意防也隋日内外庶官政以依違而致禍亂人多不能深思此理當時皆謂禍不及身靣從背言虞書曰汝無靣從退有後言謂靣䛕以為是背毁以為非也不以為患後至大亂一起家國俱䘮雖有脱身之人縱不遭刑戮皆辛苦僅免甚為時論所貶黜卿等特須滅私狥公堅守直道庶事相啟沃勿上下雷同也雷之發聲物無不同時應者故曰雷同胡氏寅曰古者論一相而止至成王雖以周公位冢宰然亦與召公同相為左右何者周公不敢自聖獨専相事又將訓後世為人心不同大賢難得則㕘錯並行相輔相正歸於無失而已自漢以来或置左右丞相或並置三公不拘一相之文至唐而法意猶宻既有左右僕射又有侍中中書尚書兩令左右丞又以官未及而人可用者㕘預朝政而其大綱則俾中書出令門下審駮而尚書受成頒之有司當貞觀時君明臣忠朝希粃政不數年坐致太平其集材並用之效如此諸葛武侯曰㕘署者集衆思廣忠益也若難相違覆曠闕損矣違覆而得中猶棄弊屩而獲珠玉也嗚呼為君如太宗為臣如武侯公心望治可為後世法也愚按胡氏謂古者論一相而止至周召始並相以書傳考之殆不然也何則虞廷之使宅百揆宰相之職也后稷臯陶垂益伯夷后夔皆羣有司之職也若契之敷教龍之納言則不可以有司言也豈非輔正宰相恭預朝政者乎湯以伊尹仲虺並為宰相紂以鄂侯西伯並為三公豈待周召而後有並相之事哉唐制俾中書出令門下審駮尚書受成盖所以集衆人之善而防一已之私真唐虞三代之遺意也觀太宗戒王珪之辭首言䕶短避隙之私次言隋朝依違之禍是不惟法度之善其申儆戒飭於法外者豈不尤深切矣哉貞觀二年太宗問黄門侍郎王珪曰近代君臣理國多劣於前古何也對曰古之帝王為政皆志尚清靜以百姓之心為心近代則唯損百姓以適其欲所任用大臣復非經術之士漢家宰相無不精通一經如漢宣帝時丞相韋賢通禮魏相學易之類朝廷若有疑事皆引經决定由是人識禮教理致太平近代重武輕儒或叅以法律儒行既虧行去聲淳風大壞太宗深然其言自此百官中有學業優長兼識政體者多進其階品累加遷擢焉胡氏寅曰上既泛問珪亦泛對如是則無切磋之益矣前古凡㡬古近世凡幾世珪宜復帝曰不知陛下所指為何代請得論之如是則有因事獻替之功矣若魏晉而下則無足言若自兩漢則西京文學之美不如東漢名節之卲而風俗厚薄治化淳漓無不本於人君者忠臣事君必勉其所未能而奬其所未至兩漢盛時太宗所可及也禹湯文武之業豈不在所希慕乎愚按太宗近代劣於前古之問自三代以下之善哉問也王珪首以漢為對而謂近代重武輕儒果何所指也夫古者臯陶稷契伊傅周召此所謂儒也以明體適用之學躋斯世於極治者也豈特漢之經術比哉太宗以學業優長兼識政體者進其階品不知學業優長者果真儒乎貞觀三年太宗謂侍臣曰中書門下機要之司擢才而居委任實重詔勑如有不稳便皆須執論比来比音鼻惟覺阿㫖順情唯唯茍過唯唯並音葦遂無一言諫諍者豈是道理若惟署詔勅行文書而已人誰不堪何煩簡擇以相委付自今詔勑疑有不穩便必須執言無得妄有畏懼知而寢黙按通鑑是年四月上始御太極殿謂侍臣曰云云房𤣥齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黄門侍郎駁正之上始申明舊制由是鮮有敗事范氏祖禹曰朝廷設官分職非徒使上下相從欲交修其所不逮也故書曰百官修職茍取充位而奉行上令則是胥吏而已不明之君自以無過惡人之言是以政亂而上不聞太宗勅責而使之言雖欲不治不可得也吕氏闕而曰武王諤諤而昌商紂唯唯而亡盖朝廷之上和不同論難往來務求至當此諤諤之風也朝廷以諤諤為風則正人進而佞人退安得而不昌乎其或君臣上下有非不諫務相順從以為雷同此唯唯之風也朝廷以唯唯為風則佞人進而君子退安得而不亡乎是道也豈武王與紂為然秦人唯唯而亡漢家諤諤而昌隋人唯唯而亡唐家諤諤而昌未有唯唯而不亡亦未有諤諤而不昌者也愚按舜命龍作納言曰夙夜出納朕命惟允説者謂後世中書門下之職即納言也夫出者受上言以宣于下納者聼下言以聞于上而允者當於理之謂也下情上達上情下孚一切以帝命之公而無讒説之私此非擇才不能也彼阿㫖順情唯唯茍免者豈惟允之義乎貞觀四年太宗問蕭瑀曰隋文帝何如主也隋文帝姓楊名堅𢎞農人後周朝以元舅輔政位相國封隋王受周禪國號隋對曰克已復禮論語孔子答顔淵問仁之辭言克去已私復還天理也勤勞思政每一坐朝音潮或至日昃五品已上引坐論事宿衛之士𫝊飱而食飱音孫熟食也雖性非仁明亦是勵精之主太宗曰公知其一未知其二此人性至察而心不明夫音扶心暗則照有不通至察則多疑於物又欺孤兒寡婦以得天下隋文帝受禪之時周宣帝既䘮静帝㓜冲之日也恒恐羣臣内懷不服不肯信任百司每事皆自决斷雖則勞神苦形未能盡合於理朝臣既知其意亦不敢直言宰相以下相去聲後同惟承順而已朕意則不然以天下之廣四海之衆千端萬緒須合變通皆委百司商量平聲宰相籌畫於事稳便方可奏行豈得以一日萬㡬虞書曰一日二日萬㡬㡬與機同言日之至淺而事之至多也獨斷一人之慮也且日斷十事五條不中去聲後同謂中於理也中者信善其如不中者何以日繼月乃至累年乖謬既多不亡何待豈如廣任賢良髙居深視法令嚴肅誰敢為非因令諸司因令之令平聲若詔勅頒下有未穩便者必須執奏不得順㫖便即施行務盡臣下之意范氏祖禹曰君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢者不得茍容於朝此庶事所以康也若夫君行臣職則叢脞矣臣不任君之事則惰此萬事所以墮也當舜之時禹為一相總百官自稷以下分職以聼焉君人者如天運於上而四時寒暑各司其序則不勞而萬物生矣君不可以不逸所治者大所司者要也臣不可以不勞所治者寡所職者詳也不明之君不能知人故務察而多疑欲以一人之身代百官之所為則雖聖智亦日力不足矣故其臣下事無大小皆歸之君政有得失不任其患賢者不得行其志而持禄之士得以保其位此天下所以不治也是以隋文勤而無功太宗逸而有成彼不得其道而此得其道故也愚按古之君天下者勞於求賢逸於得人未有身代羣臣之事而自以為勵精者也隋文帝天資苛察多疑自任欲以一身之耳目而周知天下之務以一人之手足而悉代百司之勞不及再𫝊天下大亂後世道學不明故隋文自以為勵精之事蕭瑀亦稱之為勵精之主夫堯之兢兢堯之勵精也舜之孶孶舜之勵精也堯以不得舜為已憂舜以不得禹臯陶為已憂堯舜之勵精勞於求賢而已豈以其身代羣臣之事哉瑀又謂其能克已復禮斯顔子之所勉行也豈隋文之所能乎失之逺矣太宗深悟隋文之非非惟欲廣任賢良髙居深視且令百司不得順㫖務盡臣下之意故貞觀之治較之開皇相去懸絶者有以也夫貞觀五年太宗謂侍臣曰治國與養病無異也病人覺愈彌須將䕶若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便驕逸必至䘮敗今天下安危繋之於朕故日慎一日雖休勿休然耳目股肱寄於卿輩既義均一體宜協力同心事有不安可極言無隠儻君臣相疑不能脩盡肝膈實為國之大害也按通鑑是年康國求内附太宗因有是言魏徵曰内外治安臣不以為喜惟喜陛下居安思危耳吕氏祖謙曰魏徵之於太宗救其惡多矣而未嘗不將順其美焉故其言曰内外治安臣不以為喜惟喜陛下居安思危耳夫既將其居安思危之美俾其居安思危之心永永不忘則其將順正救之道豈不兩盡乎愚按太宗謂治國與養病無異竊嘗因其言而推之天下猶一身也人君為元首大臣為心腹其㳄為股肱又其㳄為耳目又其㳄為爪牙天下之疲癃殘疾則癢疴疾痛舉切吾身者也唐虞三代康强無事之時也春秋戰國病困危篤之時也三國南北朝病􅏓盭痱辟者也隋亡唐興其病愈新起之時乎慎其起居節其飲食兢兢焉保䕶之可也一有觸犯不惟病之復作一且不可復愈矣雖然先儒嘗言仁者以天地萬物為體認得為己何所不至若不属己如手足痿痺氣已不貫嗚呼使太宗而知此義又豈特貞觀之治而已貞觀六年太宗謂侍臣曰看古之帝王有興有衰猶朝之有暮皆為蔽其耳目不知時政得失忠正者不言邪謟者日進既不見過所以至於滅亡朕既在九重平聲君門九重不能盡見天下事故布之卿等以為朕之耳目莫以天下無事四海安寧便不存意書曰可愛非君可畏非民虞書舜告禹之辭言君可愛而民可畏也天子者有道則人推而為主無道則人棄而不用誠可畏也魏徵對曰自古失國之主皆為居安忘危處理忘亂處上聲所以不能長乆今陛下富有四海内外清晏能留心理道常臨深履薄詩曰如臨深淵如履薄氷喻可畏之甚也國家厯數厯數者帝王相繼之㳄第猶嵗月氣節之先後也自然靈長臣又聞古語云君舟也人水也水能載舟亦能覆舟陛下以為可畏誠如聖㫖愚按書曰詢于四岳闢四門明四目達四聰所以通下情而防壅蔽也太宗以廷臣為耳目有合於此歟又曰民惟邦本本固邦寧天下愚夫愚婦一能勝予所以畏民心而保君位也魏徵以水能載舟覆舟有得於此歟君臣之相儆戒如此誠有天下者之鑑也貞觀六年太宗謂侍臣曰古人云危而不持顛而不扶焉用彼相焉於䖍切相去聲見君道篇註君臣之義得不盡忠匡救乎朕嘗讀書見桀殺闗龍逄音旁桀夏桀見君道篇註闗龍逄夏之賢大夫諫桀被殺漢誅鼂錯上音潮下音措鼂錯潁川人漢景帝時為御史大夫請諸侯之罪過削其地吳楚七國遂反袁盎請帝斬錯遂斬於東市未嘗不廢書歎息公等但能正詞直諌禆益政教終不以犯顔忤㫖忤音午逆也妄有誅責朕比來比音鼻臨朝斷決亦有乖於律令者公等以為小事遂不執言凡大事皆起於小事小事不論大事又將不可救社稷傾危莫不由此隋主殘暴身死匹夫之手率土蒼生罕聞嗟痛公等為朕思隋氏滅亡之事為去聲後同朕為公等思龍逄鼂錯之誅君臣保全豈不美哉林氏之竒曰君臣之間其安危禍福之所在未嘗不相與共之也夏桀為一已之欲故不恤闗龍逢之死龍逢既誅而桀亦不免於亡虞世基為一已之計故不諌煬帝之禍煬帝既亡而世基亦不免於禍夫夏桀之殺龍逢世基之媚煬帝豈不以在己之意為自得哉及其危禍之至而俱以不免此太宗所以戒其臣使之為己思煬帝之亡也亦為之念龍逢之死也由是言之君之納諌臣之進諌豈非相為謀而後能相保乎愚按君臣一心則君體其臣臣體其君上下交泰之時也君臣二心則君不恤其臣臣不恤其君上下不交否之時也太宗欲為羣臣思龍逢鼂錯之誅是君能以臣之心為心也又使羣臣為已思隋氏滅亡之事是臣能以君之心為心也君以臣之心為心臣以君之心為心其上下之交泰乎宜其致貞觀之治也貞觀七年太宗與秘書監唐制秘書省置監一人掌邦國經籍圖書之事有二局曰著作曰太史皆率其屬而修其職少監為之貳魏徵從容論自古理政得失從即容切從容和緩貌因曰當今大亂之後造次不可致理造七到切後同造次急遽也徵曰不然凡人在危困則憂死亡憂死亡則思理思理則易教易以豉切後同然則亂後易教猶饑人易食也太宗曰善人為邦百年然後勝殘去殺勝平聲去上聲此􅄒論語之辭大亂之後將求致理寧可造次而望乎徵曰此據常人不在聖哲若聖哲施化施平聲上下同心人應如響不疾而速朞月而可信不為難三年成功猶謂其晩論語曰茍有用我者朞月而已可也三年有成太宗以為然封徳彛名倫以字行觀州人初仕隋為起居舍人佐虞世基以謟承主意後與宇文士及降唐以秘䇿干髙祖為秦王參謀軍事貞觀初拜右僕射卒謚曰明後以邪佞改謚繆等對曰按通鑑無等字作非之曰三代以後以一作之人漸澆訛上古聊切薄也下五禾切謬也故秦任法律謂秦之治専用刑法律令言尚酷也漢雜霸道謂漢之治以王道霸道雜施之言不純也皆欲理而不能豈能理而不欲若信魏徵所説一作論恐敗亂國家徵曰五帝史記謂黄帝顓頊帝嚳唐堯虞舜為五帝孔安國書序以少昊顓頊髙辛唐虞為五帝未詳孰是三王夏殷周創業之主禹湯武王是也不易人而理易如字行帝道則帝行王道則王在於當時所以化之而已考之載籍可得而知昔黄帝與􅃖尤七十餘戰其亂甚矣既勝之後便致太平黄帝姓公孫名軒轅號有熊氏􅃖尤古諸侯之無道者􅃖尤作亂黄帝徵師諸侯與戰於􅃰鹿之野遂擒殺之而萬國和九黎亂徳顓頊征之既克之後不失其理九黎􅃖尤之属也顓頊號髙陽氏黄帝之孫也國語楚觀射父曰少皥氏之衰也九黎亂徳人神雜糅不可方物顓帝承之乃命南正重司天以属神火正黎司地以属人桀為亂虐而湯放之在湯之代即致太平桀夏王名履癸湯殷主名履桀不務徳而賊傷百姓湯遂率兵伐之桀走鳴條遂放而死湯乃踐位平定四海紂為無道武王伐之成王之代亦致太平紂殷王名受武王周文王之子名發紂滛亂日甚百姓怨望武王遂率諸侯伐之紂死於鹿臺武王克殷二年太子誦立是為成王若言人漸澆訛不及純樸至今應悉為鬼魅應平聲當也寧可復得而教化耶徳彛等無以難之難去聲駁也然咸以為不可以上文按通鑑係在四年太宗每力行不倦數年間海内康寧突厥破滅突陀沒切厥九勿切突厥阿史那氏古匈奴北部也居金山之陽夏曰獯鬻商曰鬼方周曰獫狁其别部凡二十八等皆世其官與中國抗衡厯代為患悉臣服於唐因謂羣臣曰貞觀初人皆異論云當今必不可行帝道王道惟魏徴勸我既從其言不過數載遂得華夏安寧逺戎賔服突厥自古以來常為中國勍敵勍音檠强也今酋長酋慈由切長音掌畨國之長也並帶刀宿衛部落皆襲衣冠使我遂至於此皆魏徵之力也顧謂徵曰玉雖有美質在於石間不值良工琢磨與瓦礫不别礫音的小石也别彼列切若遇良工即為萬代之寶朕雖無美質為公所切磋七多切詩曰如切如磋如琢如磨言其治之有緒而益致其精也勞公約朕以仁義𢎞朕以道徳使朕功業至此公亦足為良工爾按史傳曰帝納其言不疑於是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺戸闔不閉行旅不賫糧取給於道帝謂羣臣曰此徵勸我行仁義既效矣惜不令封徳彛見之孫氏甫曰帝王興治道在觀時而為之觀時在至明至明在至公至明則理無不通至公則事無不正通於理故能變天下之弊正其事故能立天下之教弊變教立其治不勞而成矣孔子曰如有用我者期月而已可也三年有成則聖人之意可見矣但後之為天下者雖欲興起治道多非聖哲之才不能通究時弊以道變之務速其功以行一時之事故所為駁雜莫復前古之治也觀魏公之論誠得聖人之意文皇能納其言而不惑姦人之論力變時弊以行王道嗚呼明哉大亂之後興立教法不急其功致時太平徳流於後嗚呼公哉范氏祖禹曰太宗可謂能審取捨矣魏徵仁義之言也欲順天下之理而治之封徳彛刑罰之言也欲咈天下之性而治之夫民莫不惡危而欲安惡勞而欲息以仁義治之則順以刑罰治之則咈矣欲治天下則順之而已咈之而能治之未之聞也太宗從魏徵而不從徳彛行之數年遂致太平仁義之效如此其速也故治道在人主所力行耳孰不可為太宗乎及其成功復歸於下此前世帝王之所不及也胡氏寅曰徳彛言三代以還人漸澆訛未為甚失魏徴言若果澆訛當為鬼魅則非也以書契以來觀之三代之時固不若唐虞之世周之文勝又不若虞夏之質兩漢風俗豈敢望周而唐室風俗又安能及漢邪若謂民常淳檏無有澆訛是結䋲之治可以易約劑土鼔之樂可以變絲竹矣要之一治一亂天地之大數也亂極人少則氣厚而人淳治極人多則氣漓而人澆淳漓一變而天地之氣盈虚消息後世誠不及古逺矣若夫人之所以為人出於本心不可泯滅者則古猶今耳是故可以懐之以仁理之以義先之以敬讓示之以好惡也魏徵有見於饑渇者易為飲食而無見於人心之未亡者故其效止於斗米數錢外户不閉則無以進矣固不能使人人有士君子之器也愚按仁者心之徳而愛之理義者心之制而事之宜二者皆出於天理之本然人心之固有也古之聖人體之於心行之於身措之於家國天下操存於未發之時持守於隱微之地終始如一無須㬰之離也表裏如一無毫髪之間也故能使天地自位萬物自育氣無不和四靈畢至此豈可以偽而為之襲而取之哉周道既衰聖學榛塞孟子於戰國之時汲汲然以仁義説齊梁之君則見謂迂闊而莫之行也自時厥後則自謂馬上得之安事詩書者有之矣崇尚黄老不信儒術者有之矣自謂本雜霸道不喜書生者有之矣其視仁義不過尊之以美名待之以虚噐而已寥寥千載唐太宗以英武間世之姿當撥亂反正之運獨能黜抑封倫之言力行魏徵之請故能致斗米三錢外户不閉行旅野宿幾於刑措亦可謂仁義之效矣然太宗之於仁義也慕其名而不得其實喜其文而不究其本知求之於紀綱政亊而不知反之於吾身方寸之間知求之於外廷朝著而不知行之於宫闈隐微之際故始以從諫為美而終不免仆碑之失外以出宫女為名而内不免懐嬴之累内外扞格終始衡決其於聖人之仁義盖外似而内違名同而實乖也夫自成康八百餘年而後有漢漢八百餘年而後有太宗天之生賢君如此其不數數也幸而有力行仁義之君而較之於聖人之道則又若碔砆之於美玉稊稗之於美稼焉豈非聖道不明有君無臣之所致乎嗚呼惜哉貞觀八年太宗謂侍臣曰隋時百姓縱有財物豈得保此自朕有天下已來存心撫養無有所科差人人皆得營生守其資財即朕所賜向使朕科唤不已雖數資賞賜數音朔亦不如不得魏徵對曰堯舜在上百姓亦云耕田而食鑿井而飲含哺鼓腹而云帝何力於其間矣堯時有老人撃壤於路曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉今陛下如此含養百姓可謂日用而不知又奏稱晉文公晉春秋時國名文公晉君名重耳出田逐獸於碭徒浪切入大澤迷不知所出其中有漁者文公謂曰我若君也道將安出我且厚賜若漁者曰臣願有獻文公曰出澤而受之於是送出澤文公曰今子之所欲教寡人者何也願受之漁者曰鴻鵠保河海厭而徙之小澤則有矰丸之憂矰音曽矢也黿鼉保深淵厭而出之淺渚必有釣射之憂射音石今君逐獸碭入至此何行之太逺也文公曰善哉謂從者記漁者名從去聲漁者曰君何以名為君尊天事地敬社稷保四國慈愛萬人薄賦歛去聲輕租税臣亦與焉與去聲君不尊天不事地不敬社稷不固四海外失禮於諸侯内逆人心一國流亡漁者雖有厚賜不得保也遂辭不受太宗曰卿言是也舊本此章附忠義篇今按其言於政體尤切故附於此愚按恵王移民移粟孟子不許其仁子産濟人溱洧孟子譏其不知為政夫使梁國有九年之儲子産有輿梁之政安用區區之小恵哉善乎太宗曰人得營生即朕所賜若科差不已雖賞賜不如不得此可謂知為政之本矣愚觀後世之君有賜民今年田租者有賜民爵賜民帛者夫耕田鑿井之民尚不知帝力之何有彼有限之賜何足以周無窮之民乎貞觀九年太宗謂侍臣曰往昔初平京師師衆也周都鎬京後世因以天子建都之地曰京師此指長安隋之都而言也宫中美女珍玩無院不滿煬帝意猶不足徵求無已徵平聲召也兼東西征討窮兵黷武黷音瀆百姓不堪遂致滅亡此皆朕所目見故夙夜孜孜並音兹篤意也惟欲清淨使天下無事遂得徭役不興年穀豐稔百姓安樂音洛後同夫治國猶如栽樹夫音扶本根不摇則枝葉茂榮一作盛君能清淨百姓何得不安樂乎愚按孟子曰其為人也多欲雖有存焉者寡矣人莫不然而君天下者尤甚焉夫峻宇雕墻本於宫室酒池肉林本於飲食滛虐嚴酷本於刑罰窮兵黷武本於征伐自古亡國䘮家之君未有不由多欲者也桀以多欲而亡成湯反之而興紂以多欲而亡武王反之而興煬帝多欲而亡太宗反之而興夫太宗之寡欲非能如湯武也不過勉强行之耳猶能身致盛治厯年數百況於真知實踐者乎貞觀十六年太宗謂侍臣曰或君亂於上臣理於下或臣亂於下君理於上二者茍逢何者為甚特進魏徵對曰君心理則照見下非誅一勸百誰敢不畏威盡力若昏暴於上忠諌不從雖百里奚伍子胥之在虞吳不救其禍敗亡亦繼一作促虞吴二國名百里奚虞之賢臣晉假道於虞以伐虢欲并取虞百里奚知虞公之不可諌而去之秦後果為晉所滅伍子胥名員楚人吴之賢臣吴王夫差伐越越請和子胥諌吴王不聼與越平復欲伐齊子胥以為不可吴王又不聼太宰嚭譛子胥於王王賜劍使自死後吴為越王勾踐所滅太宗曰必如此齊文宣昏暴楊遵彦以正道扶之得理何也齊文宣姓髙名洋東魏臣襲其父歡位封齊王受魏禪國號齊楊遵彦名愔仕齊為尚書令文宣以功業自矜遂嗜酒滛佚肆行强暴而能委政楊愔總攝機衡百度修飭時人皆言主昏於上政清於下徵曰遵彦彌縫暴主救理蒼生纔得免亂亦甚危苦與人主嚴明臣下畏法直言正諌皆見信用不可同年而語也林氏之竒曰君者臣之綱君正則臣正未有綱之不正而能使其目之正者然則君茍自亂安能使其臣之治也鄭公之言可謂得夫正綱之道而太宗乃以齊文宣得楊遵彦為君亂臣治之比殊不知彼之所為才能救其亡耳烏足以為治哉孔子言衛靈公之無道康子曰夫如是奚而不䘮孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其䘮是亦君亂而臣治然止於不䘮而巳安能以興邦乎愚按書曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳君臣相須以成至治此元首股肱所由以取喻也太宗之言未為知要夫君亂臣理此季世之所見也求之古先盛時太甲欲敗度縱敗禮可以言亂必有元聖大臣如伊尹之匡救遂終為賢君降此則魏徵所謂才得免亂耳若夫君理臣亂尤無是理君能理矣明其政刑臣何自亂臣之亂政由君之未理也貞觀十九年太宗謂侍臣曰朕觀古来帝王驕矜而取敗者不可勝數上平聲下上聲不能逺述古昔至如晉武平吳見君道篇註隋文伐陳陳後主之世隋滅之已後心逾驕奢自矜諸已臣下不復敢言政道因兹㢮紊上音矢下音汶散亂也朕自平定突厥破髙麗已後麗平聲凡言髙麗並同髙麗東夷國名本扶餘别種居遼東周封箕子之國也今為鎮東省兼并鐵勒席卷沙漠以為州縣鐵勒匈奴苖裔其種𩔖多居西海之北突厥北部也太宗既平其國即其部落列置州縣號為覊縻以其首領為都督刺史皆得世襲凡四夷内属者皆然也夷狄逺服聲教益廣朕恐懐驕矜恒自抑折音舌日旰而食旰音幹晚也坐以待晨每思臣下有讜言直諫讜音黨亦直也可以施於政教者施平聲當拭目以師友待之一無友字如此庶幾於時康道泰爾幾平聲愚按是時魏徵既死諫諍之臣漸少髙麗雖破忿兵之興未已既破鐵勒自謂雪恥酬百王除兇報千古其驕矜滿溢之意固形於歌咏矣然猶能日旰而食坐以待晨俾羣臣讜言直諫欲以師友待之嗚呼此所以克終盛治不失令名有晉武隋文之功而無晉武隋文之禍歟太宗自即位之始霜旱為灾米穀踴貴突厥侵擾州縣騷然帝志在憂人鋭精為政崇尚節儉大布恩徳是時自京師及河東古冀州之域今河東道河南古兖州之域今河南等處隴右古梁州之域今陜西等處饑饉尤甚饑音飢饉音僅穀不熟曰饑菜不熟曰饉一匹絹纔得一斗米百姓雖東西逐食未嘗嗟怨莫不自安至貞觀三年闗中豐熟漢書闗中左殽函右隴蜀太宗分天下為十道此為闗西唐建都之地也今陕西省咸自歸鄉竟無一人逃散其得人心如此加以從諌如流雅好儒術一作學好去聲孜孜求士務在擇官改革舊弊興復制度每因一事觸𩔖為善初息隱海陵之黨息隱髙祖長子也名建成初立為皇太子海陵髙祖第四子也名元吉初封齊王建成荒色嗜酒畋遊無度見秦王功髙與元吉謀害秦王秦王知之遂殺二人既即帝位乃封建成為息王謚曰隱元吉為海陵王謚曰刺同謀害太宗者數百千人事寧後引居左右近侍心術豁然不有疑阻時論以為能斷決大事得帝王之體深惡官吏貪濁惡烏去聲有枉法受財者必無赦免在京流外有犯贓者皆遣執奏隨其所犯寘以重法由是官吏多自清謹制馭王公妃主之家大姓豪猾之伍皆畏威屛跡屏音餅無敢侵欺細人商旅野次無復盜賊囹圄常空囹音零圄音語周獄名也馬牛布野外户不閉又頻致豐稔米斗三四錢行旅自京師至於嶺表五嶺之外今二廣之地自山東至于滄海山東古冀州之域今濟南等路滄海束海之名也皆不賫糧取給於路入山東村落行客經過者過平聲必厚加供待供平聲或發時有贈遺去聲饋送也此皆古昔未有也歐陽氏修曰盛哉太宗之烈也其除隋之亂比迹湯武致治之美庶㡬成康自古功徳兼隆由漢以來未之有也至其牽於多愛復立浮屠好大喜功勤兵於逺此中材庸主之所常為然春秋之法責脩賢者是以後世君子欲成人之美者莫不歎息於斯焉曽氏鞏曰太宗之為君也屈已從諌仁心愛人可謂有天下之志以租庸任民以府衛任兵以職事任官以才能任職以興義任俗以尊本任衆賦役有定制兵農有定業官無虚名職無廢事人習於善行離於末作使之操於上者要而不煩取於下者寡而易供民有農之實而兵之􅊀存有兵之名而農之利在事之分有歸而禄之出不浮材之品不遺而治之體相承其亷耻日以篤田野日以闢以其法修則安且治廢則危且亂可謂有天下之材行之數嵗粟米之賤斗至數錢居者有餘蓄行者有餘貲人人自厚幾於刑措可謂有治天下之效有是三者而不得與先王並者法度之行禮樂之具田疇之制庠序之教擬之先王未脩也躬親行陣之間戰必勝攻必取天下莫以不以為武而非先王之所尚也四夷萬里古所未及政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者如此其得失可睹矣司馬氏光曰太宗文武之才髙出前古驅䇿英雄網羅俊乂好用善謀樂聞直諌拯民於水火之中而措之袵席之上使盜賊化為君子吟呻轉為謳謌衣食有餘刑措不用突厥之渠繋頸闕庭北海之濵悉為州縣盖三代以還中國之盛未之有也范氏祖禹曰太宗以武撥亂以仁勝殘其才畧優於漢髙而規模不及也恭儉不若孝文而功烈過之矣迹其性本彊悍而能畏義而好賢屈已以從諌刻厲矯揉力於為善此所以致貞觀之治也夫人主之所行其善惡是非在後世當其時不可得辨也老子曰善人者不善人之師不善人者善人之資人君擇其善者而從之足以得師其不善而戒之足以為資矣程氏祁曰太宗舉兵五年定海内率天下於仁夀富庶之域者亦以天下之才為天下之務而已觀其任王珪魏徵於仇讐任褚亮李百藥於降虜起劉洎馬周於疎逺起張𤣥素孫伏伽於耆舊委之以政責之以功諌無不從謀無不獲且太宗之才固非天下之所能及然而不以此驕天下之士惴惴然常若有所不逮此其所以能為三百年之基也愚按太宗之為君可以為賢矣貞觀之治可以為盛矣今即其行事觀之内除羣雄外定四夷身經百戰未嘗負北後世君人之功未有髙焉者也其人君之大徳有三一曰謙虚納諫二曰知人善任三曰恭儉愛民後世人君之徳未有過焉者也定租庸調以為取民之制定府兵十六衛以為養兵之制任官則有職爵勲階之制用刑則有笞杖徒流之制後世制度之美莫能加也命房杜以為相英衛以為將王魏之諌爭褒鄂之驍勇虞褚之詞翰下至孫思邈之醫藥李淳風之厯數袁天綱之相法莫不至精至妙度越千古後世人才之盛莫能及也夫功也徳也制度也人才也其盛如此而卒不得與于二帝三王之盛者何哉盖嘗觀之古先帝王雖其天資之美未有不由學問而成者也二帝三王之事尚矣其所從學猶班班可考若髙宗之學于古訓而有獲成王之學有緝熈于光明泰和盛治冠冕百王有以也夫太宗外親瀛洲王之賢内立𢎞文之館未嘗不學也特非二帝三之學耳使其能從事於二帝三王之學又豈特貞觀之治而已哉貞觀政要卷一欽定四庫全書貞觀政要卷二唐吳兢撰元戈直集論任賢第三凡八章房𤣥齡名喬以字顯父彦謙仕隋歴刺史𤣥齡少警敏通經史善屬文開皇中隋方盛宻白父曰上無功徳徒以周近親妄誅殺亂嫡庶競僣侈終當滅亡父驚曰無妄言年十八舉進士授羽騎尉校讎秘省侍郎髙孝基曰此郎當為國器恨不見其聳壑昻霄耳中原方亂慨然有憂天下之志既事秦王王曰漢光武得鄧禹今我得𤣥齡猶禹也餘見下文齊州臨淄人也齊州今濟南路𨽻山東臨淄縣名今属益都路初仕隋為隰城尉隰音習隰城今隰州𨽻河東唐制縣置尉掌親理庶務分判衆曹割斷追催收率課調令之佐也坐事除名徙上郡太宗徇地渭北渭水之北今陜西之地𤣥齡杖䇿謁於軍門太宗一見便如舊識署渭北道行軍記室㕘軍唐制掌軍府表啟書疏之職𤣥齡既遇知已遂罄竭心力是時賊冦每平衆人競求金寳𤣥齡獨先收人物致之幕府及有謀臣猛將與之潛相申結各致死力累授秦王府記室兼陜東道今河南等處大行臺考功郎中唐制掌百官功過善惡之職𤣥齡在秦府十餘年恒典管記隐太子巢刺王以𤣥齡及杜如晦詳見下章為太宗所親禮甚惡之惡烏去聲譛之髙祖諱淵字叔徳由是與如晦並遭驅斥及隐太子將有變也太宗召𤣥齡如晦令衣道士服令平聲衣去聲潛引入閤謀議及事平太宗入春宫東宫也武徳九年六月太宗初為皇太子擢拜太子左庶子唐制東宫左春坊左庶子掌侍從贊相禮儀駮正啟奏之職貞觀元年遷中書令唐制中書省之長掌佐天子執大政而總判省亊宰相也三年拜尚書左僕射監修國史唐制史館有監修國史皆宰相兼領封梁國公實封一千三百戸唐爵九等一曰王食邑萬户二曰郡王食邑五千户三曰國公食邑三千户四曰開國郡公食邑二千户五曰開國縣公食邑千五百户六曰開國縣侯食邑千户七曰開國縣伯食七百户八曰開國縣子食五百户九曰開國縣男食三百户此言千三百户者實封數也後倣此既總任百司䖍恭夙夜盡心竭節不欲一物失所聞人有善若已有之明達吏事飾以文學審定法令意在寛平不以求備取人不以已長格物隨能收敘無隔踈賤論者稱為良相焉相去聲後同十三年加太子少師少去聲唐制太子少師少傅少保掌曉三師徳行以諭皇太子奉觀三師之徳𤣥齡自以一居端揆舜使禹宅百揆端揆者相位也十有五年頻抗表辭位優詔不許十六年進拜司空唐制太尉司徒司空為三公佐天子理隂陽平邦國無所不統仍總朝政依舊監修國史𤣥齡復以年老請致仕太宗遣使去聲謂曰國家乆相任使相如字一朝忽無良相朝音昭如失兩手公若筋力不衰無煩此讓自知衰謝當更奏聞𤣥齡遂止按史傳𤣥齡抗表陳辭太宗遣使謂之曰昔留侯讓位竇融辭榮自懼盈滿知進能退善自止足前代美之公亦欲齊蹤往哲實可嘉尚然國家久相任使一朝忽無良相如失兩手𤣥齡遂止太宗又嘗追思王業之艱難佐命之匡弼乃作威鳳賦以自喻因賜𤣥齡其見稱𩔖如此按新舊唐書皆曰太宗追思王業艱難佐命之力作威鳳賦以賜無忌俱載長孫無忌傳㕘之通鑑亦然政要作賜𤣥齡未詳孰是愚謂其所紀姓名雖不同而太宗眷命功臣之意則一也今録其賦於此以備觀覽焉其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲𤣥霜資長風以舉翰戾天衢而逺翔西翥則煙氛閉色東飛則日月騰光化垂鵬於北裔訓羣鳥於南荒弭亂世而方降應明時而自彰俛翼雲路歸功本樹仰喬枝而見猜俯脩條而抱蠧同林之侣俱嫉共榦之儔並忤無桓山之義情有炎洲之㐫度若巢葦而居安獨懐危而履懼鴟鴞嘯乎側葉燕雀喧乎下枝慙已陋之至鄙害它賢之獨竒或聚咮而交撃乍分羅而見羈戢凌雲之逸羽韜偉世之清儀遂乃蓄情宵影結志晨暉霜殘綺翼露㸃紅衣嗟憂患之易結歎矰繳之難違期畢命於一死本無情於再飛幸賴君子以依以恃引此風雲濯斯塵滓披䝉翳於葉下發光彩於枝裏仙翰屈而還舒靈音摧而復起盼八極以遐翥臨九天而髙峙庶廣徳於衆禽非崇利於一已是以徘徊感徳顧慕懐賢憑明哲而禍散託英才而福全答恵之情彌結報功之志方宣非知難而行易思令後而終前俾賢徳之流慶畢萬葉而芳𫝊朱氏黼曰人主以任相為職宰相以任人為職使宅百揆舜所以命禹也旁招俊乂列於庶位傅説所以相髙宗也太宗嘗謂𤣥齡當廣求賢人隨材授任可謂知任相矣𤣥齡聞人有善若已有之不以求備取人不以已長格物可謂知相職矣是以居端揆十五年有司庶府皆稱其職也竊嘗論之宰相非量材受任為難而為國用人之不易貞觀之盛羣材蟻附一財計之任雖賤有司且能之𤣥齡特以度支闗天下利害寧虚其位而不以與人寧任於己而不庀凡士盖以民力所繫不當委裒刻之吏國計所本不可付聚歛之臣故寧抱乏材之歎而不容茍且以具員寧受吝權之譏而不忍冐昧以與下此其所以號稱名相歟吕氏祖謙曰房𤣥齡之相太宗王魏以善諌而司直英衛以善兵而立功𤣥齡乃斷斷於上而為一時之名相可謂無它枝而能有容足以任天下之事矣觀其以度支係天下利害嘗有缺求其人未得乃自領之其材固足以辦天下之事而能不自用也由是言之無它技而有容固足為貴至於材不自用而能用人之材則𤣥齡之賢所以為不可及也真氏徳秀曰梁文昭公佐太宗定天下及終相位凡三十三年其持身也敬其謀國也忠盖庶乎古大臣之風矣至於用人則委諌争於王魏付征伐於英衛使衆善畢集於君退然若無能為者此一節盖秦漢以來未有能及之者後之君子其于梁公之用心當端拜師之愚按昔漢高祖初入闗也諸將争走金帛財物之府而蕭何獨收相府律令圖書竟為開基之根本夫蕭何起秦刀筆吏而高見逺識如此為興王名相豈偶然之故哉房𤣥齡杖策謁軍門太宗一見如舊識賊寇每平衆人争求金寳𤣥齡獨先收人物致之幕府其知所先務與蕭何收相府圖書同一髙見逺謀興王相業蕭不専美於漢風雲感召此豈人力也哉非天其孰能使之杜如晦字克明少英爽以風流自命内負大節臨機輙斷隋世預吏部選髙孝基異之曰君當為棟梁用願保令徳餘見下文京兆萬年人也京兆郡名今奉元路萬年縣名今咸寜縣𨽻陜西武德初爲秦王府兵曹㕘軍唐制掌王府武官簿書考課儀衛假使等事俄遷陜州今仍舊𨽻河南總管府長史長音掌唐制邉要之地置總管以統軍長史其貳職也時府中多英俊被外遷者衆太宗患之記室房𤣥齡曰府僚去者雖多盖不足惜杜如晦聰明識達王佐才也若大王守藩端拱無所用之必欲經營四方非此人莫可太宗自此彌加禮重寄以心腹遂奏為府屬嘗㕘謀帷幄時軍國多事剖斷如流深為時軰所服累除天䇿府從事中郎武徳四年髙祖以秦王功髙古官號不足以稱乃加號天䇿上將位在王公上開府置官属從事中郎其属職也兼文學館學士太宗為天䇿上將亂稍平乃嚮儒宫城西作文學館收聘賢才詢訪討論學士其職也隱太子之敗如晦與𤣥齡功第一遷拜太子右庶子唐制東宫右春坊右庶子掌侍從左右獻納啟奏宣傳令㫖之政俄遷兵部尚書唐制兵部掌武選地圖車馬甲械之政尚書其長也進封蔡國公實封一千三百户貞觀二年以本官檢校侍中唐制檢校某官者皆詔除而非正命三年拜尚書右僕射兼知吏部選事唐制吏部掌文選勲封考課之政知猶主也仍與房𤣥齡共掌朝政至於臺閣規模典章文物皆二人所定甚獲當代之譽時稱房杜焉按史𫝊如晦進僕射乆之以疾辭職薨贈司空謚曰成手詔虞世南為碑文言痛悼意它日食􅆶美輟其半奠焉後夢如晦若平生明日勅所御饌往祭勞問妻子恩禮無少衰後詔功臣世襲贈宻州刺史徙國莱栁氏芳曰房杜佐太宗天下號為賢相然無迹可尋徳亦至矣故太宗定禍亂而房杜不言功王魏善諌諍而房杜讓其賢英衛善將兵而房杜行其道理致太平善歸人主為唐宗臣宜哉劉氏昫曰房杜皆以命世之才遭逢明主謀猷允協以致升平議者以比漢之蕭曹信矣然杜之見用房之所舉也太宗嘗與𤣥齡圖事則曰非如晦莫能籌之及如晦至竟如𤣥齡之䇿盖房知杜之能斷大事杜知房之善建嘉謀裨諶草創東里潤色相須而成俾無悔事賢達用心良有以也若以往􅈒方之房則管仲子産杜則鮑叔罕虎矣宋氏祁曰太宗取孤隋攘羣盜天下已平用房杜輔政大亂之餘紀綱彫弛而能興仆植僵使號令典刑粲然㒺不完可謂名宰相然求所以致之之迹殆不可見何哉雖然宰相代天者也輔贊彌縫而藏諸用使斯人由而不知彼揚已取名瞭然使户曉者殆房杜之細耶張氏九成曰太宗身屬櫜鞬以基帝業閫外之臣皆以功為尚而房杜隱然為國名臣自後世觀之任公竭節身處要地如𤣥齡者誰人也臨機獨斷吐胸中之竒若如晦者誰人也吕氏祖謙曰房杜輔相太宗成貞觀之治而後世觀之無迹可尋此則近於無聲無􅆨之至矣是故漢之文景紀無可書之事而為西都之仁君唐之房杜𫝊無可載之功而為貞觀之賢相唐氏仲友曰太宗與房杜君臣之契深矣謂之明良相遇可矣而古之王者必有師臣湯之於伊尹武王之於尚父是也是故能以道正君格其非心以登堯舜之盛故曰成王畏相房杜之於太宗可以為名相矣未可以為畏相也愚按蘇文忠公有言唐之房杜𫝊無可載之功今以史𫝊攷之則禇遂良嘗謂𤣥齡自義旗之始翼贊聖功武徳之季冒死决䇿貞觀之初選賢立政人臣之勤𤣥齡為最髙祖謂𤣥齡論事千里外猶對靣長孫后謂𤣥齡竒謀祕計未嘗宣泄是𤣥齡之功猶可得而知也至於如晦之為人則世稱𤣥齡善謀如晦善斷每有大事𤣥齡輙曰非如晦不能斷及如晦至卒用𤣥齡之䇿是如晦之斷初不能出於𤣥齡之謀也故如晦之功不可得而知也然世豈以如晦為不及𤣥齡哉嗚呼後之大臣幸而與賢者同列恥己之短而求加於人者真如晦之罪人也哉魏徵字𤣥成孤貧落拓有大志不事生業出家為道士好讀書尤屬意縱横之説大業末李宻見徵所為文召之徵進十䇿宻竒之而不能用後竇建徳攻䧟黎陽獲徵署為起居舍人及竇建徳就擒與裴矩西入闗隱太子聞其名引直洗馬甚禮之餘見下文鉅鹿人也鉅鹿郡名今順徳路鉅鹿縣𨽻河東近徙家相州之内黄相去聲相州今彰徳路𨽻腹裏内黄縣名今属滑州武徳末為太子洗馬洗音跣洗馬漢有是職太子出則當直者前驅清道唐制東宫左春坊司經局置洗馬掌經史子集四庫圖籍刋緝之事凡天下之圖書上東宫者皆受而藏之見太宗與隱太子隂相傾奪每勸建成早為之謀太宗既誅隱太子召徵責之曰汝離間我兄弟何也間去聲衆皆為之危懼徵慷慨自若從容對曰從即容切皇太子若從臣言必無今日之禍太宗為之歛容厚加禮異擢拜諫議大夫數引之卧内數音朔訪以政術徵雅有經國之才性又抗直無所屈撓太宗每與之言未嘗不悦徵亦喜逢知己之主竭其力用又勞之曰勞去聲慰喻也卿所諌前後二百餘事皆稱朕意稱去聲非卿忠誠奉國何能若是三年累遷秘書監叅預朝政深謀逺􅄸多所宏益太宗嘗謂曰卿罪重於中鉤我任卿逾於管仲中去聲管仲名夷吾齊卿也初齊襄公被弑議立君髙國先隂告公子小白於莒魯亦發兵送公子糾而使管仲别將兵遮魯道射中小白帶鉤糾至齊小白已立是為桓公管仲請囚鮑叔牙請公用之公以為大夫後為相遂覇天下近代君臣相得寧有似我於卿者乎六年太宗幸九成宫隋仁夀宫也宴近臣長孫無忌曰長音掌凡言長孫並同長孫複姓無忌其名也字輔機文徳皇后之兄從太宗征討有功累擢比部郎中貞觀初遷吏部尚書封齊國公復進䇿司空為太子太傅髙宗時以沮立武后削官爵置黔州卒王珪魏徵往事息隱臣見之若讐不謂今者又同此宴太宗曰魏徵往者實我所讐但其盡心所事有足嘉者朕能擢而用之何慙古烈徵毎犯顔切諌不許我為非我所以重之也徵再拜曰陛下導臣使言臣所以敢言若陛下不受臣言臣亦何敢犯龍鱗觸忌諱也史記韓非𫝊曰諌説之士不可不察夫龍可擾狎而馴也然㗋下有逆鱗徑寸嬰之必殺人人主亦有逆鱗説之者能無嬰人主逆鱗則㡬矣太宗大悦各賜錢十五萬七年代王珪為侍中累封鄭國公尋以疾乞辭所職請為散官太宗曰朕㧞卿於讎虜之中任卿以樞要之職見朕之非未嘗不諌公獨不見金之在鑛古猛切金璞也何足貴哉良冶鍜而為器冶陶鑄匠也便為人所寶朕方自比於金以卿為良工雖有疾未為衰老豈得便爾耶徵乃止後復固辭聴觧侍中授以特進仍知門下省事十二年太宗以誕皇孫詔宴公卿帝極歡謂侍臣曰貞觀以前從我平定天下周旋艱險𤣥齡之功無所與讓貞觀之後盡心於我獻納忠讜安國利人成我今日功業為天下所稱者惟魏徵而已古之名臣何以加也於是親觧佩刀以賜二人庶人承乾太宗初立長子承乾為太子後以罪廢為庶人在春宫不修徳業魏王泰字恵褒太宗第四子封魏王好士善属文後貶王濮謚曰恭寵愛日隆内外庶寮咸有疑議太宗聞而惡之惡烏去聲謂侍臣曰當今朝臣忠謇無如魏徵我遣傅皇太子用絶天下之望十七年遂授太子太師唐制太子太師太傅太保為三師掌以道徳輔導皇太子知門下事如故徵自陳有疾太宗謂曰太子宗社之本須有師傅故選中正以為輔弼知公疹病可臥䕶之徵乃就職尋遇疾徵宅内先無正堂太宗時欲營小殿乃輟其材為造為去聲五日而就遣中使去聲賜以布被素褥遂其所尚後數日薨太宗親臨慟哭臨去聲贈司空謚曰文貞太宗親為製碑文復自書於石特賜其家食實封九百戸太宗後嘗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今魏徵殂逝遂亡一鏡矣因泣下乆之乃詔曰昔惟魏徵每顯予過自其逝也雖過莫彰朕豈獨有非於往時而皆是於兹日故亦庶僚茍順難觸龍鱗者歟所以虚已外求披迷内省悉井切言而不用朕所甘心用而不言誰之責也自斯已後各悉乃誠若有是非直言無隱按史傳徵疾甚藥膳賜遺無􅄸上親問疾語終日後復與太子至徵加朝服拖帶上悲懣拊之將以衡山公主降其子叔玉時公主從上曰公强視新婦徵不能謝及旦薨帝臨哭罷朝五日太子舉哀西蕐堂詔内外百官朝集皆赴䘮晉王奉詔致祭陪𦵏昭陵上登苑西樓望哭盡哀劉氏昫曰魏公與文皇討論政術往復應對凡數十萬言其匡過弼違能近取譬博約連𩔖皆前代爭臣所不至者其實身正而心勁上不負時主中不阿權倖内不侈親族外不為朋黨不以逢時改節不以圖位賣忠前代爭臣一人而已宋氏祁曰君臣之際顧不難哉以徵之忠而太宗之睿身沒未㡬猜譛遽行始徵之諌至君子小人未嘗不反覆言之以邪佞之亂忠也乆猶不免故曰皓皓者易汙嶢嶢者難全自古所歎云曽氏鞏曰太宗屈己以從羣臣之議而魏公之徒喜遭其時感知己之遇事之大小無不諌諍雖其忠直所自至亦得君以然也吕氏祖謙曰或謂三代遺直者言其以至公為心而不以事形迹為美以後言為戒而不以即應為嫌任强直之責而不顧擅權之議為忠讜之論而不畏誹謗之譏此太宗貞觀之治獨歸於徵勸行仁義之效者其以此歟唐氏仲友曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊此孟子之諫爭徵有之矣真氏徳秀曰魏公始終以規諌為己任唐史以為前代争臣一人而己豈不信哉然攷其學問淵源殆不可見文中子世家謂魏徵嘗從其學受王佐之道先儒疑之觀其勸太宗行仁義則必有所本然嘗論之有仁義之體有仁義之用正其心修其身而達之於國家天下無往而非仁義此二帝三王之所行兼體用之全者也心未必正身未必修假仁義以行之而不免於利欲之雜然其愛人利物之功禁暴止亂之政亦有補於世教此齊桓晉文之所行依倣於仁義之用而體則未純故其用亦未盡也太宗除隋之難身致升平可謂偉矣然由心而身由身而家皆有慚徳觀魏公之所論諌即事而言者多即心而論者少正救於己形者多而變化於未形者少君臣之間相與䇿勲者黽勉於仁義之用而已故貞觀之治雖有志於三王迄未能大異於五伯魏公正君之功雖秦漢以下所難及而揆之伊傅周召則猶可憾焉或以為出於縱横之學則又有未然者盖戰國䇿士多邪謟之言而魏公所陳皆正大之論是豈可同日語哉叔玠以王魏並稱考觀本末盖亦其流亞云愚按魏鄭公之諌自兩漢以来一人而已史稱為三代遺直豈不信哉然嘗聞之孟子曰人不足與適也政不足間也惟大人為能格君心之非盖而更一弊政是一弊政而已去一小人是一小人已非心存焉吾恐不勝其去不勝其更也今觀魏公之諫疏大槩能禆益於政事而不能匡正於本原能規諫於臨時而不能涵養於平昔律以孟子之言殆所謂過讁用人之非非間行政之失而已無乃於格心之道猶有所未至乎故程子謂其能正君而不能養徳真氏謂其即事而言者多即心而論者少正救於己形者多變化於未形者少其知言哉王珪字叔玠志量隱正能安於貧賤交不茍合開皇末為奉禮郎季叔頗坐事被誅珪當從坐遂亡匿積十餘嵗髙祖入闗相府司録李綱薦珪貞諒有器識引為世子府諮議叅軍及東宫建除中舍人尋轉中允餘見下文太原祁縣人也太原郡名今翼寧路𨽻河東祁縣今仍舊武徳中為隱太子中允唐制東宫官属掌侍從贊相駮正啟奏總司經典膳藥甚為建成所禮後以連其隂謀事流於巂州嶲音髓武徳末髙祖以太子與秦王有隙責珪等不能輔導皆被流貶嶲州属羅羅斯地今為建昌路𨽻雲南建成誅後太宗即位召拜諌議大夫每推誠盡節多所獻納珪嘗上封事切諌封事實封言事也太宗謂曰卿所論皆中朕之失中去聲自古人君莫不欲社稷永安然而不得者秪為不聞己過為去聲或聞而不能改故也今朕有所失卿能直言朕復聞過能改何慮社稷之不安乎太宗又嘗謂珪曰卿若常居諫官朕必永無過失顧待益厚貞觀元年遷黄門侍郎叅預政事兼太子右庶子二年進拜侍中時房𤣥齡魏徵李靖詳見下章温彦博字大臨并州人警悟而辯隋末幽州總管羅藝以州降彦博預謀召入為郎戰突厥被執貞觀初始得還尋檢校吏部侍郎時譏其煩碎後遷尚書右僕射卒追贈特進謚曰恭戴胄字𤣥𦙍相州人性明正善簿最王世充謀簒胄以大義説之秦王引為府士曹叅軍貞觀初遷大理少卿又遷尚書左丞號稱職拜諫議大夫杜如晦遺言請以選舉委胄遂檢校吏部尚書卒謚曰忠與珪同知國政嘗因侍宴太宗謂珪曰卿識鑒精通尤善談論自𤣥齡等咸宜品藻定其差品文質也又可自量孰與諸子賢量平聲對曰孜孜奉國知無不為臣不如𤣥齡每以諌諍為心耻君不及堯舜臣不如魏徵才兼文武出將入相臣不如李靖將相並去聲敷奏詳明出納惟允臣不如温彦博處繁理劇衆務必舉臣不如戴胄處上聲至如激濁揚清嫉惡好善好去聲臣於數子亦有一日之長太宗深然其言羣公亦各以為盡已所懷謂之確論按史傳珪後進爵郡公八年拜禮部尚書十一年正定五禮兼魏王師十三年卒上素服舉哀詔魏王泰率百官臨哭贈吏部尚書謚曰懿劉氏昫曰王珪履正不回忠讜無比君臣時命胥㑹于兹易曰自天祐之吉無不利叔玠有之矣陳氏惇修曰太宗嘗厯數諸臣之得失以夸大於一已而復使王珪商㩁人物珪亦盍因是而進戒曰知人之道堯以為難陛下不當以知人為能子貢方人夫子謂不暇臣亦不敢以知人自負昔臯陶陳謨分為九徳亦欲多方而叅攷之以示所難之意也今陛下安可輕問而臣亦安可輕對惜乎珪不知此且復一二而為之商㩁遂使太宗謂吾之知人如此其易而珪之品藻如此其當天下之賢否善惡皆不足辨而邪佞之言所以乘間而入也然則太宗之為君固有愧於帝堯而王珪之徒盖亦有愧於臯陶者矣愚按太宗既正位東宫首以魏徵為詹事主簿珪為諫議大夫是珪為諌官在徵之先也是時前宫齊府之黨多懐反側不安珪首請太宗坦懐待之以示無間是珪之論諫在徵之先也厥後與徵上下其論卒得與徵齊名豈偶然哉然嘗觀宋末真氏論後世賢臣悉以四事律之一曰正己二曰正君三曰謀國四曰用人以唐初諸賢臣觀之則論謀國用人王魏不如房杜論正己正君房杜不如王魏四賢如耳目股肱相資為用其致貞觀之治不亦宜乎李靖字藥師姿貌魁竒少有文武材毎曰大丈夫若遇主逢時必當立事立功以取富貴其舅韓擒虎號名將毎與論兵必曰可與言孫吴者仕隋為長安縣功曹厯駕部員外郎楊素牛𢎞皆器之餘見下文京兆三原人也京兆見前註三原縣名今属輝州路𨽻陕西大業末為馬邑郡丞大業隋煬帝年號馬邑郡今朔州路𨽻河東丞守之貳也㑹髙祖為太原留守靖觀察髙祖知有四方之志因自鎖上變詣江都今揚州路江都縣𨽻淮東至長安即闗中道塞不通而止髙祖克京城執靖將斬之靖大呼曰呼去聲公起義兵除暴亂不欲就大事而以私怨斬壯士乎太宗亦加救靖髙祖遂捨之武徳中以平蕭銑輔公祏功銑音跣祏音石蕭姓銑名後梁宣帝曽孫也隋末起兵巴陵自稱梁王靖陳十䇿髙祖命副趙郡王孝恭討之遂降輔姓公袥名為淮南道行臺僕射武徳中據丹陽反叛又詔靖副孝恭討之擒獲遂平厯遷揚州大都督府長史長音掌揚州見上註唐制總十州者為大都督長史其上佐也太宗嗣位召拜刑部尚書唐制刑部掌律令刑法徒𨽻按覆讞禁尚書其長也貞觀二年以本官檢校中書令三年轉兵部尚書為代州行軍總管代州今仍舊𨽻腹裏唐制武徳初置行軍總管以統軍進撃突厥定襄城破之定襄郡名今忻州𨽻腹裏突厥諸部落俱走磧北走音奏沙土日磧地在塞北北擒隋齊王暕之子暕古限切楊道政及煬帝蕭后送于長安突利可汗来降汗音韓凡言可汗並同降下江切後同可汗蕃王之稱猶漢時稱單于中國稱天子也突利可汗始畢可汗之子名什鉢苾嘗自結於太宗請入朝太宗禮見良厚拜右衛將軍頡利可汗處羅可汗之弟名莫賀咄設牙直五原北太宗因其地置伊西州僅以身遁太宗謂曰昔李陵提歩卒五千不免身降匈奴李陵字少卿漢武帝時為侍中將兵伐匈奴無救而敗遂降匈奴尚得名書竹帛卿以三千輕騎深入虜庭尅復定襄威振北狄實古今未有足報往年渭水之役矣以功進封代國公此後頡利可汗大懼四年退保鐵山西北之地遣使入朝謝罪使去聲後同請舉國内附又以靖為定襄道行軍總管往迎頡利頡利雖外請降而心懐疑貳詔遣鴻臚卿秦官典客漢武時更名大鴻臚郊廟行禮讃道九賔鴻聲臚傳之也唐制掌賔客及㐫儀之亊唐儉字茂系并州人聞隋政日亂説秦王建大計為天䇿長史攝户部尚書唐制户部掌天下土地人民錢穀之政貢賦之差尚書其長也詔除而非正命謂之攝將軍安修仁安姓修仁名慰諭之靖謂副將去聲張公謹字𢎞慎魏州人仕王世充為洧州長史挈城歸髙祖授檢校鄒州别駕李勣等啟秦王引入府貞觀初為代州都督謀破頡利有功封鄒國公改封州都督以恵政聞七年卒曰詔使到彼虜必自寛乃選精騎賫二十日糧引兵自白道襲之公謹曰既許其降詔使在彼未宜討撃靖曰此兵機也時不可失遂督軍疾進行至隂山在西北之極綿亘數百里遇其斥候千餘帳皆俘以隨軍頡利見使者甚悦不虞官兵至也靖前鋒乘霧而行去其牙帳七里頡利始覺列兵未及成陣單馬輕走虜衆因而潰散斬萬餘級殺其妻隋義成公主俘男女十餘萬斥土界自隂山至于大漠北邊廣漠之地遂滅其國尋獲頡利可汗於别部落餘衆悉降太宗大悦顧謂侍臣曰朕聞主憂臣辱主辱臣死往者國家草創突厥强梁太上皇以百姓之故稱臣於頡利朕未嘗不痛心疾首志㓕匈奴坐不安席食不甘味今者暫動偏師無往不捷單于稽顙單音蟬漢時蕃王之號猶可汗也耻其雪乎羣臣皆稱萬嵗漢武帝禮祭中嶽太室從官在山下聞若有言萬嵗者三後世臣下稱萬嵗者本此尋拜靖光禄大夫尚書右僕射賜實封五百户又為西海道行軍大總管征吐谷渾胡昆切吐谷渾西域國名本遼東鮮卑徒河渉歸長子之名其孫葉延遂以其名為氏大破其國改封衛國公及靖身亡有詔許墳塋制度依漢衛霍故事衛青霍去病皆漢武時為大將軍討匈奴有大功去病尚公主及亡詔與主合塟起冢象盧山築闕象突厥内燕然山燕平聲吐谷渾内積石二山以旌殊績按史傳十四年靖妻卒故有墳塋之詔及靖身亡四字疑誤十八年上幸其第問疾上將伐遼東靖入閣賜坐謂曰公南平吴㑹北清沙漠西定慕容惟東有髙麗未服公意如何對曰臣往者憑藉天威薄展微效今殘年朽骨唯擬此行陛下若不棄老臣病其瘳矣上愍其羸老不許二十三年薨贈司徒謚曰景武張氏九成曰當隋氏䘮鹿之際承唐祖騰龍之時而能依乗風雲勒功帝籍者豈有它哉特以根于忠智故功名若是其顯也觀其用兵善于料敵速于應機故所嚮有功南平吴北破突厥西走吐谷渾功大寵盛乃能闔户自守以謝過從可謂能自全矣始能免俘戮終能保厥躬勝於韓信逺矣愚按太宗天資英武善戰無敵一時羣臣皆不足以仰望清光帝之所推服而師問者獨李靖一人而已盖自孫武以来能將法度之師者獨諸葛武侯與靖耳今世傳武經雖未必出靖之手要必有近似者其論霍邑之戰謂建成㡬敗為竒兵太宗旁撃為正兵大意謂唐之戰勝特暗合兵法耳亦猶韓信謂漢髙天授非人力是也異時太宗伐遼無功而歸謂靖曰吾以天下之力屈於小夷何也靖不答所問顧曰兹事道宗知之盖指駐蹕之戰請分兵襲平壤之事也嗚呼即其所至而論靖可謂知兵之聖者欤世以英衛並稱要之李勣非靖之匹彚倫伍也虞世南字伯施性沈靜寡欲篤意學問與兄世基仕隋俱有重名時人方晉二陸累遷至秘書郎起居舍人從宇文化及至聊城又陷于竇建徳偽授黄門侍郎太宗後滅建徳引為秦府叅軍餘見下文㑹稽餘姚人也㑹音檜稽音基㑹稽郡名今紹興路餘姚縣名今陞為州𨽻浙東貞觀初太宗引為上客因開文館館中號為多士咸推世南為文學之宗授以記室與房𤣥齡對掌文翰嘗命寫列女傳去聲以装屏風於時無本世南暗書之一無遺失貞觀七年累遷祕書監太宗毎機務之隙引之談論共觀經史世南雖容貌懦弱如不勝衣懦乃亂切一音儒勝字平聲而志性抗烈毎論及古先帝王為政得失必存規諷多所補益及髙祖晏駕漢書曰宫車晏駕註謂天子當晨起早作而方崩殞故稱晏駕者臣子之心猶謂宫車晩出也按髙祖以貞觀九年五月崩太宗執䘮過禮䘮平聲後同哀容毁顇久替萬機文武百寮計無所出世南毎入進諌太宗甚嘉納之益所親禮嘗謂侍臣曰朕因暇日毎與虞世南商㩁古今朕有一言之善世南未嘗不恱有一言之失未嘗不悵恨其懇誠若此朕用嘉焉羣臣皆若世南天下何憂不理太宗嘗稱世南有五絶一曰徳行去聲二曰忠直三曰博學四曰詞藻五曰書翰及卒子聿切太宗舉哀於别次哭之甚慟䘮事官給仍賜以東園秘器𦵏具也贈禮部尚書唐制禮部掌禮儀祭享貢舉之政尚書其長也凡既没而加之以官曰贈謚曰文懿太宗手勅魏王㤗曰虞世南於我猶一體也拾遺補闕無日暫忘實當代名臣人倫凖的吾有小善必將順而成之吾有小失必犯顔而諌之今其云亡石渠東觀之中無復人矣觀去聲漢置石渠閣東觀皆藏圖籍秘書之所痛惜豈可言耶未㡬平聲太宗為詩一篇追思往古理亂之道既而歎曰鍾子期死伯牙不復皷琴列子曰鍾子期與伯牙為友伯牙皷琴子期善聽子期死伯牙絶絃以世無知音者朕之此篇將何所示因令平聲後同起居官名唐制門下省置起居郎中書省置起居舍人掌録天子之動作法度以修記事之史書以授之于國史焉禇遂良字登善杭州人愽渉經史工楷𨽻累遷起居郎十五年拜諌議大夫兼起居事後授太子賔客髙宗時拜僕射因沮立武后后立被貶卒詣其靈帳讀訖焚之其悲悼也若此又令與房𤣥齡長孫無忌杜如晦李靖等二十四人圖形於凌煙閣按史傳十七年詔趙國公長孫無忌河間元王孝恭萊國成公杜如晦鄭國文貞公魏徵梁國公房𤣥齡鄂國公尉遲敬徳衛國公李靖宋國公蕭瑀褒忠壯公叚志𤣥䕫國公劉𢎞基將忠公屈突通鄖節公殷開山譙襄公柴紹邳襄公長孫順徳鄖國公張亮陳國公侯君集郯襄公張公謹盧國公程知節永興文懿公虞世南渝襄公劉政㑹莒國公唐儉英國公李勣胡壯公秦叔寳二十四人可並圖畵於凌煙閣張氏九成曰世南始以文翰馳譽陳隋間兄弟長安方之二陸在唐以五絶見稱而論議規諷固多忠稱補過弼違有犯無隐上贊明聖之徳下植生民之利宜其眷眷勤宻而見於夢想君臣之情何其厚哉愚按世南信為徳行忠直文章之士唐興之儒臣也終身以正事君將順匡救其𢎞多矣雖君臣相得之深而未臻大用太宗止歎息以石渠東觀之中無復人亦可惜也矣李勣本名世勣字茂功永徽中以犯太宗諱單名勣焉餘見下文曹州離狐人也曹州今仍舊𨽻腹裏離狐縣名後改南華今廢本姓徐初仕李宻為左武侯大將軍李宻字元邃其先遼東人大業末韋城人翟讓聚衆為盜勣徃從之宻初從楊𤣥感起兵謀事及𤣥感敗亡命雍丘勣説讓奉宻為主號魏公宻後殺讓而人心始離武徳初入闗見髙祖拜光禄卿復以反誅宻後為王世充所破王世充字行滿本西域人姓支㓜從母嫁王氏因冐其姓仕隋為民部侍郎隂結豪傑自為太尉矯隋主侗䇿禪位殺侗自立武徳初破李宻髙祖詔秦王攻之擒歸長安族徙于蜀擁衆歸國勣猶據宻舊境十郡之地宻舊境東至於海南至于江西至汝州北至魏郡時未有所附勣並據之武徳二年謂長史郭孝恪曰長音掌郭孝恪許州人初附宻為長史後謁秦王上䇿擒竇建徳拜上柱國後遷大總管破龜兹國為流矢所中而卒魏公既歸大唐今此人衆土地魏公所有也吾若上表獻之則是利主之敗自為己功以邀富貴是吾所耻今宜具録州縣及軍人户口總啟魏公聼公自獻此則魏公之功也不亦可乎乃遣使啟宻使去聲後同使人初至髙祖聞無表惟有啟與宻甚恠之使者以勣意聞奏髙祖方大喜曰徐勣感徳推功實純臣也拜黎州總管黎州今睿州𨽻腹裏賜姓李氏附屬籍於宗正唐制宗正府掌親属以别昭穆宗室居之封其父盖為濟隂王濟上聲瀆名固辭王爵乃封舒國公授散騎常侍唐制掌規諷過失侍從顧問之職尋加勣右武候大將軍唐制武衛之職及李宻反叛伏誅勣發䘮行服䘮平聲備君臣之禮表請收𦵏髙祖遂歸其屍於是大具威儀三軍縞素三軍上軍中軍下軍也𦵏於黎陽山在今濬州禮成釋服而散朝野義之尋為竇建徳所攻䧟於建徳又自㧞歸京師竇建徳貝州人世為農材力絶人大業中募兵伐遼補隊長後據渤海自立為夏王建元置官属武徳初擒化及於魏縣進兵攻勣力屈降之收勣父為質令勣復收黎陽三年勣自㧞歸京師四年從太宗平建徳於是獲而斬之從太宗征王世充竇建徳平之貞觀元年拜并州都督并州即太原唐制武徳七年改總管曰都督立府置佐令行禁止號為稱職稱去聲突厥甚加畏憚太宗謂侍臣曰隋煬帝不觧精選賢良觧音懈鎮撫邊境惟逺築長城廣屯將士將去聲以備突厥隋大業三年詔發丁男百餘萬築長城西距榆林東至紫河旬而畢工而情識之惑一至於此朕今委任李勣於并州遂得突厥畏威逺遁塞垣安靜豈不勝數千里長城耶其後并州改置大都督府又以勣為長史長音掌累封英國公在并州凡十六年召拜兵部尚書兼知政事勣時遇暴疾驗方云鬚灰可以療之太宗自剪鬚為其和藥為和並去聲後同勣頓首見血泣以陳謝太宗曰吾為社稷計耳不煩深謝十七年髙宗居春宫轉太子詹事唐制東宫官掌統三寺十率府之政加特進仍知政事太宗又嘗宴顧勣曰朕將属以孤㓜属音嘱思之無越卿者公往不遺於李宻今豈負於朕哉勣雪涕致辭因噬指流血俄沉醉御服覆之覆音副其見委信如此勣毎行軍用師籌算臨敵應變動合事機自貞觀以來討撃突厥頡利及薛延陀北狄國名本延陀部與薛種雜居號薛延陀貞觀中㧞灼立勣滅其國置為州縣髙麗等並大破之太宗嘗曰李靖李勣二人古之韓白漢將韓信秦將白起也衛霍見前註豈能及也按史傳二十三年帝疾謂太子曰李勣才智有餘然汝與之無恩恐不能懷服我今黜之若其即行俟我死汝用為僕射親任之若徘徊顧望當殺之乃授疊州都督受詔不至家而去髙宗立召進僕射後欲立武昭儀為后畏大臣異議未决帝密訪勣勣曰此陛下家事無須問外人帝意遂定詔勣率冊立武氏總章二年卒贈太尉謚曰貞武范氏祖禹曰太宗以勣為何如人哉以為愚也則不可託㓜孤而寄天下矣以為賢也當任而弗疑何乃憂後嗣之不能懐服先黜之而後用之是以犬馬畜之也豈堯舜親賢之道乎利禄之士可得而使也又曰髙宗欲廢立而猶難於顧命大臣取决於勣之一言勣若以為不可則武氏必不立矣勣非惟不諌又勸成之孽后之立無忌遂良之死唐室中絶皆勣之由其禍豈不博哉太宗以勣為忠故託以㓜孤而其大節如此知人帝其難之信矣胡氏寅曰古者不盟結言而退盖人不愛其情相命而信喻矣逮徳下衰疑阻猜貳至於刑牲㰱血曽未旋踵又已背之是故孔子於春秋不貴盟誓而善胥命取荀息欲人之惇信而不食言也若李勣齧指出血以受太宗之託若不為負義者而於王武廢興之際以一言䘮邦則不必待如里克然後為隳大節也夫以言許人者猶恐非其本心勣受託而無一言徒齧指出血而已使當堯舜之智豈得遁乎吕氏祖謙曰太宗以勣守邊可謂善用人矣至其任以託孤之寄則非其所能也按吴起與田文論功起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如治百官親萬民實府庫子孰與起文曰不如此二者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時属之子乎属之我乎起黙然良乆曰属之子矣盖勣之賢於長城是亦吴起之所長而太宗以之處田文之任宜其敗也葉氏適曰勣本無甚所長只是不負人夫不負人固可任以事至於闗朝廷之重則非不負者能之如立武氏之説彼豈有意於負太宗者奈何利害所在彼其不學誠不識此噫以周勃之少文㡬陷吕氏之禍以霍子孟之重厚猶有所不免皆不學無術所以致也况勣以一言之失豈知他日之禍如此哉愚按太宗英武將畧優於漢髙至於知人料事不及漢髙逺矣其間章章較著者李勣之事是也自今觀之勣之為人外若純慤内任術數非特太宗不能知至今人不能知何也勣始事翟讓讓為李宻所誅勣不能死後為竇建徳所敗屈伏請降復不能死勣始與單雄信誓同死生雄信誅又不能死其名節如此獨於李宻之敗生則推功死則收𦵏太宗信其區區之小節遂謂可以託孤過矣太宗之將終也黜勣為疊州都督謂太子曰勣若即行汝用為相若不即行汝必殺之勣聞命不辭家而去夫太宗之術數可謂精矣孰知勣之術數又髙出於其上哉厥後武氏之立竟以勣一言而定而唐之子孫㡬盡於武氏之手盖太宗以術數待勣故勣亦以術數報之固不暇為唐社稷計也勣之將死告其弟曰我見房杜辛勤起家皆為不肖子所敗吾後子孫有交遊非𩔖者汝必殺之異時敬業舉兵覆宗至毁冡而暴骨嗚呼勣所任之術數至是而無所施其巧矣是以君子惡任智而大居正也馬周字賔王家貧嗜學資志曠逺武徳中補州助教不治事而去宻州趙仁本髙其才厚贈使入闗留汴為浚儀令崔賢所辱遂感激而西舍新豐逆旅主人不之顧周命酒一斗八升悠然獨酌衆異之餘見下文博州茌平人也茌士疑切博州今東昌路茌平縣名今仍舊𨽻山東貞觀五年至京師舍於中郎將去聲唐制中郎將太子府屬掌校尉旅帥及親勲翊衛之屬常何之家常姓何名史無傳時太宗令百官上書言得失令平聲後同周為何陳便宜二十餘事為去聲令奏之事皆合㫖太宗恠其能問何何對曰此非臣所發慮乃臣家客馬周也太宗即日召之未至間凡四度遣使催促使去聲及謁見與語其悦令直門下省授監察御史唐制掌分察百寮廵按州郡獄訟軍戎祭祀營作太府出納皆𨽻焉累除中書舍人唐制掌侍進奏叅議表章周有機辯能敷奏深識事端故動無不中去聲太宗嘗曰我於馬周暫時不見則便思之十八年歴遷中書令如字兼太子左庶子周既職兼兩宫處事平允處上聲甚獲當時之譽又以本官攝吏部尚書太宗嘗謂侍臣曰周見事敏速性甚慎至一作貞正至於論量人物量平聲直道而言朕比任使之比音鼻多稱朕意稱去聲既寫忠誠親附於朕實藉此人共康時政也按史傳帝嘗以飛白書賜周曰鸞鳳冲霄必假羽翼股肱之寄要在忠力周疾甚詔使視䕶躬為調藥周以所上章奏悉焚之曰管晏暴君之過取身後名吾不為也二十二年卒按此章曰貞觀五年周為何陳便宜與舊史同通鑑考異曰五年不見有詔令百官上封事唐歴曰三年六月詔文武官言得失馬周代常何陳事舊史或本於政要而吳氏所紀是也宋氏祁曰周之遇太宗顧不異哉由一介草茅言天下事若素宦於朝明習憲章者其自視與築巖釣渭亦何以異迹夫帝鋭於立事而周所建皆切一時君宰間不膠漆而固恨相得晚宜矣然周才不逮傅説吕望使後世未有述焉惜哉唐氏仲友曰觀太宗待遇馬周過于房杜王魏如四使催趣飛白之賜皆異寵也惜周不及四子功業止此史氏謂君宰不膠漆而固信矣然周之才豈獨不及説望而已哉林氏之竒曰魏無知之在漢常何之在唐其才能技業初無大過於人而無知以舉陳平而獲賞常何以舉馬周而受賜故無知之名託於陳平常何之名託於馬周以為萬世不朽之傳由此觀之人之有善豈必盡出於己哉愚按自耕莘飯牛築巖釣渭由匹夫而陞朝著君臣相得建事立功者不多見於後世矣太宗覽常何之奏而知其非何所為何又能以實告遂以布衣起新豐逆旅濟濟清要卒如覽奏之所見若馬周固偉矣太宗之知人得不尤偉矣乎周固未可焉以並驅先哲而太宗則可謂有古先哲王之遺風求諫第四凡十一童太宗威容儼肅百僚進見者見音現皆失其舉措太宗知其若此每見人奏事必假顔色兾聞諌諍知政教得失貞觀初嘗謂公卿曰人欲自照必須明鏡主欲知過必藉忠臣主若自賢臣不匡正欲不危敗豈可得乎故君失其國臣亦不能獨全其家至於隋煬帝暴虐臣下鉗口鉗巨淹切卒令不聞其過卒子聿切令平聲遂至滅亡虞世基等尋亦誅死前事不逺公等每看事有不利於人必須極言規諌愚按太宗之求諌可謂切矣而其納諌亦可以為難矣非惟能容人之諌又導人而使之諌非惟不怒人之諌又賞人而使之諌故一時之臣非特大臣能諌小臣如皇甫徳叅無不諌也非特内臣能諌外臣如李大亮無不諌也非特文臣能諌武臣如尉遲敬徳亦無不諫也非特廷臣能諫宫妾如充容徐恵亦無不諌也賢臣而能諫固也佞臣如裴矩亦諫焉中國之臣能諫固也夷狄之臣如契苾何力亦諫焉盖自三代而下求諫之誠納諌之美未能或之先也觀其貞觀之初自以威容儼肅故嘗假人以顔色深鑒煬帝滅亡故嘗求人使諫諍夫能鑒隋之亡則内有樂諌之實假人以色則外無拒諫之容故能化及一時大小咸諫雖古昔謗木諫旌之盛無以加焉盖由初年二者實有以感召之也史臣置此於求諫之首其有深意哉貞觀元年太宗謂侍臣曰正主任邪臣不能致理正臣事邪主亦不能致理惟君臣相遇有同魚水則海内可安朕雖不明幸諸公數相匡救數音朔兾憑直言鯁議鯁音梗刺在㗋也致天下太平諌議大夫王珪對曰臣聞木從繩則正后從諌則聖商書傅説告髙宗之辭明諫之不可不受是故古者聖主必有争臣七人言而不用則相繼以死爭讀曰諍孝經曰天子有爭臣七人雖無道不失其天下陛下開聖慮納芻蕘愚臣處不諱之朝處上聲實願罄其狂瞽太宗稱善詔令自是宰相入内令平聲相去聲平章國計必使諌官唐制諌官左右散騎常侍四人常規諷過失侍從顧問左右諫議大夫八人掌諌論得失侍從贊相左右補闕十二人掌供奉諷諌大事廷議小事則上封事左右拾遺十二人掌同補闕隨入預聞政事有所開説必虛已納之按通鑑曰詔諫官隨中書門下同三品官入閣孫氏甫曰太宗之任諫官真得其道夫天下之務至廣也軍國之機至要也雖明主聼斷賢相謀議思慮之失亦不能免當君相論事之際使諌官預聞得以闗説或有缺失從而正之豈不美乎然大臣論事規正於人君之前安有不從之議兹亦制馭大臣使之無過之術耳若以諫官小臣不可預聞國謀必衆知缺失方許諫正事或已行而不可救過或已彰而不可言故剛直之臣有激訐不顧以争之者君從之猶掩其過或不從則君之過大臣之罪愈大矣太宗任諫官可謂眞得其道胡氏寅曰有失輙許諫官諫止貞觀致治之本凡有天下者皆可行是為王者師也雖然諫官盡如魏徵禇遂良王珪之徒則上不懾人君威嚴下不承大臣風㫖而言可聼矣茍徒有聼諫之名而不擇忠直識治之士則或訐或比陰行其私而人主不之覺其弊有甚於不置諌官者故耳目之任以得人為要也尹氏起莘曰夫官以諫為名所言必本於公而宰相制天下事豈必盡能無失誠使諫官得隨事言之則不待命令已行而後救之於末流矣雖然諌官入閣或非大臣之所樂也必有英明之君體而行之則貞觀之治可復見矣愚按唐制入閣儀最為後世美稱盖天子既御紫宸殿復移仗御便殿百官隨入曰入閤太宗用王珪言詔諫官隨中書門下同三品入閤夫君相一體固也而宰相入内必使諌官隨之則君臣舉無過矣兹太宗所以致治之美歟愚有望後世之君人也貞觀二年太宗謂侍臣曰明主思短而益善暗主䕶短而永愚隋煬帝好自矜誇好去聲䕶短拒諌誠亦實難犯忤虞世基不敢直言或恐未為深罪昔箕子徉狂自全孔子亦稱其仁箕國名子爵也紂之諸父見紂無道諌之紂囚之為奴箕子因徉狂而受孔子曰殷有三仁焉謂㣲子去之箕子為之奴比干諫而死也及煬帝被殺世基合同死否杜如晦對曰天子有諍臣雖無道不失其天下仲尼稱直哉史魚邦有道如矢邦無道如矢仲尼孔子字史官名魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諌事見家語世基豈得以煬帝無道不納諌諍遂杜口無言偷安重位又不能辭職請退則與箕子徉狂而去事理不同昔晉恵帝姓司馬名𠂻武帝次子也西晉昏庸之主賈后恵帝之后後為趙王倫所廢矯詔賜死將廢愍懐太子名遹恵帝太子為賈后所殺趙王倫後謚曰愍懐司空張蕐司空三公之官張蕐字茂先范陽人也恵帝時為丞相竟不能苦爭阿意茍免及趙王倫字子彛晉宣帝第九子後以篡逆誅死舉兵廢后遣使收蕐使去聲後同蕐曰將廢太子日非是無言當不被納用當去聲後同其使曰公為三公太子無罪被廢言既不從何不引身而退蕐無辭以答遂斬之夷其三族古人有云危而不持顛而不扶則將焉用彼相焉於䖍切相去聲故君子臨大節而不可奪也皆論語之辭張蕐既抗直不能成節遜言不足全身王臣之節固已墜矣虞世基位居宰輔在得言之地竟無一言諌諍誠亦合死太宗曰公言是也人君必須忠良輔弼乃得身安國寧煬帝豈不以下無忠臣身不聞過惡積禍盈滅亡斯及若人主所行不當臣下又無匡諌茍且阿順事皆稱美則君為暗主臣為䛕臣君暗臣䛕危亡不逺朕今志在君臣上下各盡至公共相切磋以成理道公等各宜務盡忠讜匡救朕惡終不以直言忤意輙相責怒愚按太宗之問歸咎於君如晦之對歸罪於臣可謂兩得其道矣盖君知所以歸咎於君則為君也必能盡君之道臣知所以歸咎於臣則為臣也必能盡臣之道矣太宗君臣辭令之間豈非兩得其道哉然太宗因是而求言於臣謂終不以直言忤意輙相責怒可謂尤賢也已况斯時也正年穀豐熟百姓樂生邇安内肅上恬下熈太宗方以行帝王道有既效之語固宜望侍臣以匡救之益也制治於未亂保邦於未危此古先哲王處治安之大猷也太宗有焉貞觀三年太宗謂司空裴寂字𤣥真蒲州人仕隋為晉陽宫副監秦王方建大計未敢白髙祖以寂最善遂以情告之寂乃以宫人私侍髙祖脅從之武徳初拜僕射呼裴監不名貞觀初進拜司空後坐罪放靜州㑹𦍑反或言寂為主既而寂率家僮破𦍑帝念寂詔入朝㑹卒封河東公曰比有比音鼻上書奏事條數甚多朕總黏之屋壁出入觀省悉井切所以孜孜不倦者欲盡臣下之情每一思政理或三更方寢更平聲亦望公軰用心不倦以副朕懐也愚按成湯之聖昧爽丕顯坐以待旦周公之聖思兼三王夜以繼日經綸萬化皆是心也聖哲猶爾况賢主乎太宗毎思政理或至三更猶望羣臣同心不倦是心也坐以待旦之心乎夜以繼日之心乎貞觀五年太宗謂房𤣥齡等曰自古帝王多任情喜怒喜則濫賞無功怒則濫殺無罪是以天下䘮亂莫不由此朕今夙夜未嘗不以此為心恒欲公等盡情極諌公等亦須受人諌語豈得以人言不同己意便即䕶短不納若不能受諌安能諌人胡氏寅曰太宗俾大臣受諌盖欲大臣知諌之難受欲之難違以明已之不易然其言則善矣非惟責其臣以諫君又訓其臣以正己切磋之義也三代人君必有師友後世師難其人得端良正直之士使講論經訓規箴闕失如三益之友則亦可以成徳而寡過太宗勉此不怠其致昇平之治宜哉愚按太宗之納諫其三代以下之所無有也已能納諌可以為賢矣而又勸其臣使受人之諌可不謂尤賢乎哉且其言曰不能受諫安能諫人至哉言乎盖必已能遷善而後能告其君以善已能改過而後能正其君之過是故曹參成清靜之治資盖公之一言仁傑成中興之功賴行冲之藥石𫝊曰惟善人能受直言已不能受人之直言而望其直言於主不亦難乎貞觀六年太宗以御史大夫唐制以掌刑法典章糾正百官之罪惡御史臺之長也韋挺京兆人少與隱太子善後為太子宫臣武徳七年或言太子與宫臣謀逆帝専責宫臣遂流巂州貞觀初王珪數薦之拜御史大夫俄兼魏王府事復改太常卿帝討遼東命挺主餉料運渠塞不通挺以待凍泮帝怒廢為民中書侍郎唐制貳令之職也朝廷大政叅議焉臨軒冊命則為使以授之四夷來朝則受其表疏而奏之獻贄幣則受以付有司杜正倫相州人隋世舉秀才貞觀初魏徵薦之擢兵部員外郎遷知起居注累進中書侍郎後行左庻子漏泄帝怒太子廢坐流驩州顯慶初遷中書令出為横州刺史卒秘書少監少去聲唐制秘書監之貳職也虞世南著作郎唐制秘書省屬官也掌修撰碑志祝文祭文與佐郎分判局事姚思廉名簡以字行京兆人仕隋為河間郡司法遷代王侍讀髙祖定京師府僚皆奔獨思亷侍王帝義之授秦王府文學王即位改𢎞文館學士遷著作郎等上封事稱㫖稱去聲召而謂曰朕厯觀自古人臣立忠之事若值明主便宜盡誠規諫至如龍逄比干龍逄桀之賢臣比干紂之賢臣皆以忠諫見殺不免孥戮一作仇戮孥子也戮殺也謂併妻子而戮之也為君不易以豉切為臣極難朕又聞龍可擾而馴音循然喉下有逆鱗卿等遂不避犯觸各進封事常能如此朕豈慮宗社之傾敗每思卿等此意不能暫忘故設宴為樂音洛仍賜絹有差唐氏仲友曰此太宗見諌者悦而從之之一事也有功見之猶悦况諫諍而見知乎設宴賜帛謂思至意故舉酒相樂具有鹿鳴燕嘉賔之意亦太宗行王道之一端也愚按太宗以廷臣上封事稱㫖設宴賜帛所以奬進激勸之道可謂至矣而且以觸鱗為喻使臣下知觸忤之必無罪則將犯顔而進諌也且龍逄比干之誅事無道之君而然也以太宗之聰明英叡夫豈有是哉而能以無道之君戮諫臣以為戒亦聖王兢懼之意欤太常卿唐制掌禮樂郊廟社稷之事韋挺嘗上疏陳得失太宗賜書曰所上意見極是讜言辭理可觀甚以為慰昔齊境之難去聲夷吾有射鉤之罪蒲城之役勃鞮為斬袂之仇而小白不以為疑重耳待之若舊重平聲夷吾射鈎事見任賢篇注勃鞮晉寺人披也重耳晉文公名晉獻公使勃鞮殺重耳重耳踰垣勃鞮遂斬其衣袪重耳奔狄後重耳歸晉即位為晉君懐公之黨欲弑之勃鞮欲以告求見觧前罪文公使人讓之勃鞮曰臣不能以二心事君故得罪君已反國其無蒲狄乎於是見之豈非各吠非主漢書桀犬吠堯堯非不仁特吠非其主耳志在無二卿之深誠見於斯矣若能克全此節則永保令名如其怠之可不惜也勉勵終始􅂷範將來當使後之視今亦猶今之視古不亦美乎朕比不聞其過比音鼻未覩其闕賴竭忠懇數進嘉言數音朔用沃朕懐一何可道舊本此與上章通為一章今按不同分為二章愚按太宗賜書韋挺示至公用人之道而舉齊之管仲晉之勃鞮為喻夫齊晉二伯主置射鈎斬袂而用二子二子亦能盡忠于其君矣然嘗觀之懷公入國狐突之子毛及偃從重耳懷公命突召其子狐突曰子之能仕父教之忠䇿名委質貳乃辟也狐突寧死而毛偃事文公不二若以狐突之言律之則管仲勃鞮又若之何而可哉貞觀八年太宗謂侍臣曰朕毎閒居静坐則自内省悉井切恒恐上不稱天心稱去聲下為百姓所怨但思正人匡諫欲令平聲耳目外通下無怨滯又比見比音鼻人來奏事者多有怖慴音輙懼也言語致失次第尋常奏事情猶如此况欲諌諍必當畏犯逆鱗所以毎有諌者縱不合朕心朕亦不以為忤若即嗔責深恐人懐戰懼豈肯更言愚按昔漢賈山曰人主之威非特雷霆也勢重非特萬鈞也開導而求諌和顔色而受之人猶恐懼不敢自盡况震之以威怒乎太宗每以上不厭天心下為百姓所怨以自省固宜開導人言和顔聼納也為人君者思賈山之言充太宗之量何慮人臣之不忠諌哉貞觀十五年太宗問魏徵曰比來比音鼻朝臣都不論事何也徵對曰陛下虛心採納誠宜有言者然古人云未信而諌則以為謗己信而不諌則謂之尸禄論語子夏曰信而後諌未信則以為謗己也尸禄謂尸位而竊禄但人之才器各有不同懦弱之人懷忠直而不能言踈逺之人恐不信而不得言懐禄之人慮不便身而不敢言所以相與緘黙俛仰過日太宗曰誠如卿言朕毎思之人臣欲諌輙懼死亡之禍與夫音扶赴鼎鑊音霍冒白刃亦何異哉故忠貞之臣非不欲竭誠竭誠者乃是極難所以禹拜昌言語見虞書益稷謨豈不為此也為去聲朕今開懐抱納諌諍卿等無勞怖懼遂不極言朱氏黼曰言路通塞闗君徳之盛衰人主因言者之多寡固可自察其身之得失也諌者多必吾之能聼諌者直必吾之能容犯顔而不憚必吾無拒人之色苦口而無隐必吾無好佞之心一或反是則是吾徳之不進吾心之不大吾之好佞而惡直樂諛而畏忠也太宗即位之初虛心訪納故論諌者歩隨袂接表疏之進笥溢几盈一日萬幾在今猶昔而論事之誠頓爾銷減帝而内省當必有以致此者始導諌中悦從終勉强徵屢論矣今猶此問徵以愛身畏罪為告盖欲使帝自悟耳帝以赴鼎冒刃為開説之比終不能深自克責復為敷求也愚按貞觀十五年魏徵謂陛下欲善之志不及於昔時聞過必改少虧於曩日十三年又謂陛下志業比貞觀初漸不克終者凡十事則君徳亦少貶矣尚幸勉强欲善之意猶能自克故能開導聼納至謂羣臣近来都不論事則又在魏徵戒不克終之後得無或如徵之言乎後之人君所宜慎始而敬終也貞觀十六年太宗謂房𤣥齡等曰自知者明信為難矣如屬文之士屬音囑伎巧之徒皆自謂己長他人不及若名工文匠商畧詆訶蕪詞拙跡於是乃見由是言之人君須得匡諌之臣舉其􅄽過􅄽與愆同一日萬幾一人聼斷雖復憂勞安能盡善常念魏徵隨事諌正多中朕失中去聲如明鏡鑒形美惡必見因舉觴賜𤣥齡等數人朂之朂吁玉切勉也愚按魏徵以貞觀十七年春正月卒太宗謂𤣥齡嘗念魏徵隨事諫正如鏡照形美惡必見舉觴賜𤣥齡等數人以朂之盖欲羣臣亦如徵之極言無隠也然此言恐在徵卒之後未必在十六年也貞觀十七年太宗問諌議大夫褚遂良曰昔舜造漆器漆木名可以髹物世𫝊造漆器自舜始禹雕其俎俎薦肉之器雕鏤飾也當時諌者十有餘人食器之間何須苦諌遂良對曰雕琢害農事纂組傷女工組音祖綉作也首創奢滛危亡之漸漆器不已必金為之金器不已必玊為之所以諍臣必諌其漸及其滿盈無所復諌復音缶太宗曰卿言是矣朕所為事若有不當去聲或在其漸或已將終皆宜進諌比見前史比音鼻或有人臣諌事遂答云業已為之或道業已許之竟不為停改為去聲此則危亡之禍可反手而待也舊本此與前章通為一章今按不同分為二章仍按通鑑標年於此章之首范氏祖禹曰所貴乎賢者為其能止亂於未然閑邪於未形也若其已然則衆人之所能知也何賴於賢乎危亡之言惟明主能信闇主忽焉是以自古無事之時常患乎諌之難入也故聖主能從諌于未然賢主能改過於己然諫而不聽斯為下矣忠臣之事上君也亦諫其未然事中君也多諌其已然事闇君也救其横流故有以諌殺身者矣唐虞之時羣聖聚於朝無過舉矣憂其所當憂戒其所當戒故常有儆懼之言其慮患豫防也至于後世令王其賢臣多諌其已然而防其未然太宗求諫於羣臣其有意於防未然者乎唐氏仲友曰遂良之對是矣抑猶有説舜禹大聖纎過必改與太保旅􅋙同意荀卿謂事聖君有聼從無諫爭豈知言哉愚按昔商紂始為象箸箕子歎曰彼為象箸必不盛以土簋將為犀玉之杯玉杯象箸必不羮菽藿衣短褐而舍於茅茨之下則錦衣九重髙臺廣室稱此以求天下不足矣逺方珎恠之物輿馬宫室之漸自此而始故吾畏其卒也遂良之言其意盖亦若此也然所謂滿盈無所復諫則似非忠臣愛君之語幸太宗之言有足以救斯言之失也納諫第五凡十章直諫另為一𩔖附此篇之後貞觀初太宗與黄門侍郎王珪宴語通鑑作貞觀二年十二月以黄門侍郎王珪為守侍中上嘗閒居與珪語時有美人侍側美人女官九員充世婦之數本廬江王瑗之姬也廬江王名瑗太祖生蔚蔚生哲哲生瑗武徳末為幽州都督右領軍王君廓誘瑗反後瑗傳首至京師瑗敗籍沒入宫太宗指示珪曰廬江不道賊殺其夫而納其室暴虐之甚何有不亡者乎珪避席曰陛下以廬江取之為是邪為非邪太宗曰安有殺人而取其妻卿乃問朕是非何也珪對曰臣聞於管子曰管仲著書十八篇曰管子齊桓公之郭國齊桓公名小白郭小國齊滅之之猶往也問其父老曰郭何故亡父老曰以其善善而惡惡也惡惡上烏去聲下如字後同桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也去上聲後同已上王珪述管子之言以為喻也今此婦人尚在左右臣竊以為聖心是之陛下若以為非所謂知惡而不去也太宗大悦稱為至善遽令以美人還其親族令平聲按新舊史皆云帝雖不出此美人而甚重其言與此異通鑑考異曰太宗賢主既重珪言何得反棄而不用乎且美人汎侍左右又非嬖寵著名之人太宗何愛而留之此章為是也唐氏仲友曰王珪納諫皆人主情慾之際人所難言可謂無慙於魏徵矣愚按春秋傳曰人誰無過過而能改善莫大焉王珪之直言無諱言人之所難言太宗之改過不吝改人之所難改王珪進諌之誠太宗納諫之美方之古昔何以尚兹貞觀四年詔發卒修洛陽之乾元殿洛陽古成周之地今河南路乾元殿隋所建以備廵狩孟子曰天子適諸侯曰廵狩廵狩者廵所守也給事中唐制掌侍左右分判省事之官察𢎞文舘繕寫校讐之課大事覆奏小事署而行之張𤣥素蒲州人仕隋為景城縣户曹竇建徳陷景城將殺之邑人號泣曰此清吏殺之是無天也遂釋之貞觀初召問以政道厯太子詹事遷左庶子㑹東宫廢坐罪為民頃之召授刺史麟徳初卒上書諌曰陛下智周萬物囊括四海令之所行何往不應志之所欲何事不從微臣竊思秦始皇之為君也藉周室之餘因六國之盛將貽之萬葉及其子而亡周之季世天下大亂秦并吞之六國齊楚燕韓趙魏也始皇曰朕為始皇帝後世以數計二世三世至于萬世𫝊之無窮始皇歿二世立而趙髙弑之子嬰立而遂降于漢諒由逞嗜奔慾逆天害人者也是知天下不可以力勝神祗不可以親恃惟當宏儉約薄賦歛去聲慎終始可以永固方今承百王之末屬凋弊之餘必欲節以禮制陛下宜以身為先東都未有幸期即令補葺令平聲諸王今並出藩又湏營搆興發數多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毁天下翕然同心傾仰豈有初則惡其侈靡惡烏去聲今乃襲其雕麗其不可二也毎承音㫖未即廵幸此乃事不急之務成虛費之勞國無兼年之積何用兩都之好兩都東都洛陽西都長安也勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立粗平聲饑寒猶切生計未安三五年間未能復舊奈何營未幸之都而奪疲人之力其不可四也昔漢髙祖將都洛陽婁敬一言即日西駕漢髙祖姓劉名邦沛人伐秦得天下國號漢婁敬齊人髙祖在洛陽敬説曰陛下取天下與周異宜入闗而都按秦之故上未决張良言入闗便即日駕西都長安賜敬姓劉氏拜郎中豈不知地惟土中貢賦所均但以形勝不如闗内也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣嘗見隋室初造此殿楹棟宏壯大木非近道所有多自豫章採來豫章郡名今龍興路𨽻江西二千人拽一柱其下施轂皆以生鐵為之中間若用木輪動即火出略計一柱已用數十萬則餘費又過倍於此臣聞阿房成秦人散房音旁見政體篇註章蕐就楚衆離楚靈王為章蕐之臺納亡人以寔之乾元畢工隋人觧體且以陛下今時功力何如隋日承凋殘之後役瘡痍之人費億萬之功襲百王之弊以此言之恐甚於煬帝逺矣深願陛下思之無為由余所笑由余西戎人戎王使由余觀秦繆公示以宫室積聚由余曰鬼為之則勞神矣人為之亦苦民矣公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治由余笑曰此乃中國所以亂也云云出史記則天下幸甚矣太宗謂𤣥素曰卿以我不如煬帝何如桀紂對曰若此殿卒興卒子聿切所謂同歸於亂太宗歎曰我不思量平聲遂至於此顧謂房𤣥齡曰今𤣥素上表洛陽實亦未宜修造後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古來不易以豉切非其忠直安能如此且衆人之唯唯並音葦不如一士之諤諤可賜絹五百匹魏徵歎曰張公遂有囘天之力可謂仁人之言其利溥哉按史傳此疏有曰臣聞東都始平太上皇詔宫室過度者焚之陛下謂瓦木可用請賜貧人亊雖不從天下稱為盛徳今復度而營之是隋役又興不五六年間一捨一取天下將謂何帝顧𤣥齡曰洛陽朝貢天下中朕營之意欲便四方百姓今𤣥素言如此使後必往雖露坐庸何苦即詔罷役范氏祖禹曰上之所好者下之所競也太宗虚已以求直言故羣臣爭救其失惟恐其言之不切太宗不惟悦而從之又賞以勸之此人君之所難能也夫如是何患於有過乎張氏九成曰古人以片言干知己以疏賤投至貴非至誠切直豈足以遇合始𤣥素以小吏在擾攘間䝉天子訪問隋唐興替之由遂獲寵遇洛陽之役懇切疏諌遂有囘天之力惜乎匪人滛慢厭疾忠誨功無成而遷播之禍至此忠良所以於邑而痛哭也吕氏祖謙曰堯舜天下之至善也故人情莫不欲為之桀紂天下之至惡也故人情莫不恥言之世之為人君者未嘗不是堯舜而未為堯舜之所為亦未嘗不非桀紂而未必不為桀紂之所為如是則雖知以堯舜自名而未必不為桀紂之歸也惟聖明之君知所以為堯舜者在於力行而不在於空言茍其行之未善人雖被以桀紂之名而不怒夫然後可以進於堯舜則漢髙祖唐太宗其人也髙祖問周昌曰我何如主對曰桀紂之主太宗謂𤣥素曰我何如桀紂對曰此役不息同歸於亂夫二君三代以下之英主也雖其臣比之桀紂而二君受之雖不能盡如堯舜而亦堯舜之徒耳此無他知以桀紂自儆故不敢為桀紂之歸也愚按洛邑為土中以四方貢賦道里均也周之都鎬京也洛為東都於此而朝諸侯焉漢之都長安也洛有南宫於此而臨幸焉唐都長安視洛陽與周漢同天下既平修治洛邑若未甚害也然洛陽多隋宫室制度過侈非所宜修太宗納𤣥素之諌遽令罷役善矣它日飛仙翠㣲玉蕐之役又非洛陽陪京之事勢能追思𤣥素之言則尤善矣太宗有一駿馬特愛之恒於宫中養飼無病而暴死太宗怒養馬宫人將殺之皇后長孫氏諌曰昔齊景公以馬死殺人齊景公名杵臼晏子請數其罪云數上聲晏子名嬰字平仲齊大夫爾養馬而死爾罪一也使公以馬殺人百姓聞之必怨吾君爾罪二也諸侯聞之必輕吾國爾罪三也公乃釋罪陛下嘗讀書見此事豈忘之邪太宗意乃觧又謂房𤣥齡曰皇后庶事相啟沃極有利益爾愚按晏子諌齊景公有三罪之説其意美矣今觀太宗欲殺宫人之事盖亦有三失焉何也不寳賢而寳駿馬則寳非其寳矣不任牧人而任宫人則任非其任矣以馬死而欲殺人則刑非其刑矣向非文徳皇后之諫豈不為盛徳之累乎史稱太宗有壯馬不能御則天時為宫人進而言曰妾有三物能御之一曰鐵鞭鞭其背二曰鐵檛檛其首三曰匕首斷其㗋太宗壯之夫太宗使宫人養馬不過一時溺於嗜好而已孰知宫人之中有善御馬如則天者已潛擬於其後乎吁可畏哉貞觀七年太宗將幸九成宫隋仁夀宫也散騎常侍姚思亷進諌曰陛下髙居紫極寧濟蒼生應須以欲從人應平聲不可以人從欲然則離宫遊幸此秦皇漢武之事始皇姓嬴名政國號秦武帝姓劉名徹國號漢故非堯舜禹湯之所為也言甚切至太宗諭之曰朕有氣疾熱便頓劇故非情好遊幸好去聲甚嘉卿意因賜帛五十叚愚按漢元欲乘樓船以薛廣徳之言而止則天欲觀舍利以狄仁傑之言而止夫漢元庸君則天女主尚能改過不吝況如太宗之素號納諫者乎思亷九成之諫非不切也太宗氣疾之諭亦近於飾非矣且既不從其言復多賜之帛是人君之過可以賄賂而免人臣之直諫可以賄賂而移也太宗之賜思亷之受胥失之矣貞觀三年李大亮京兆人有文武才髙祖入闗自歸授土門令撃盗皆降擢金州司馬貞觀初授太府卿復出為凉州都督俄為西北道安撫大使以綏諸部降者八年討吐谷渾有功進爵為公拜右衛將軍臨終表請罷遼東役為凉州都督凉州今西凉州𨽻甘肅嘗有臺使至州境使去聲後同見有名鷹諷大亮獻之大亮宻表曰陛下乆絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自擅便是使非其人太宗下書曰以卿兼資文武志懐貞確故委藩牧藩屏牧守也當兹重寄比在州鎮比音鼻聲績逺彰念此忠勤豈忘寤寐使遣獻鷹遂不曲順論今引古逺獻直言披露腹心非常懇到覽用嘉歎不能已已有臣若此朕復何憂宜守此誠終始若一詩云靖恭爾位好是正直神之聼之介爾景福好去聲詩小雅小明篇之辭古人稱一言之重侔於千金卿之所言深足貴矣今賜卿金壺缾金椀各一枚雖無千鎰之重鎰音益重二十四兩為鎰是朕自用之物卿立志方直竭節至公處職當官處上聲每副所委方大任使如字以申重寄公事之閒宜觀典籍兼賜卿荀悦漢紀一部荀悦字仲豫潁川人後漢時為秘書監撰漢紀三十卷此書敘致簡要論議深博極為政之體盡君臣之義今以賜卿宜加尋閲舊本此章之首曰貞觀初今按通鑑標年張氏九成曰事君必以忠立忠必以才行已必以誠三者全脩可謂賢矣大亮文武才幹而諌獻鷹近於忠太宗親任之篤盖才兼文武而濟之以忠誠耳房喬稱有陵勃之節詎不信夫愚按太宗之朝臺閣侍從之臣獻可替否必開諭亹亹不啻如饑渇之於飲食是宜列在外服之臣亦不肯順㫖曲從敢踰位而言也若李大亮求鷹之諌太宗非惟悦從之又賞賚之盛哉太宗之納諫也然廷臣進諌猶曰朝夕論思日月獻納也逺方藩臣不在君側寧咈㫖而不顧身若大亮者可謂忠臣也已此尤藩臣之所當則效也貞觀八年陜縣丞陜縣今仍舊屬陜州𨽻河南皇甫徳叅皇甫複姓徳叅名也上書忤㫖太宗以為訕謗訕所諫切侍中魏徵進言曰昔賈誼當漢文帝上書云云可為痛哭者一可為長歎息者六漢文帝名恒髙祖次子也賈誼洛陽人文帝召為博士後為梁懐王傅上書陳亊多所匡建其畧曰臣竊惟事埶可為痛哭者一可為流涕者二可為長太息者六自古上書率多激切若不激切則不能起人主之心激切即似訕謗惟陛下詳其可否太宗曰非公無能道此者令賜徳叅帛二十叚令平聲按通鑑中牟丞皇甫徳叅上言修洛陽宫勞人收地租厚歛俗好髙髻盖宫中所化上怒謂房𤣥齡等曰徳叅欲國家不役一人不收一租宫人皆無髪乃可其意耶欲治訕謗之罪魏徵諌曰云云上曰朕罪斯人則誰敢言乃賜絹二十四匹它日徵奏言陛下近日不好直言雖勉强含容非曩時之豁如上乃更加優賜拜監察御史與此章雖小異而詳故附見焉胡氏寅曰無常者惟人心乎太宗初下洛陽毁隋宫室惡其侈也即欲修建雖為諌少輟然意終不已竟使成之最後并怒諌者欲加之罪何其一念之難囘也太宗克己從諫終自勉焉其心術有蔽不能自袪猶如此况不能克己從諫者宜如何則亦觸情縱欲猶蒹葭萑葦寧有既耶愚按為人上者甚矣虚心聽諫之難也以太宗之始怒皇甫徳叅而欲罪之復從徵言徳叅遂擢髙官膺厚賞始也怒人之言終也從人之諫不貴無過而貴改過太宗之謂矣然忤㫖之怒其中心之發見耶抑一時磯激而然也向非徵之忠鯁其為君徳之累豈少哉徳叅區區一縣丞耳乃能奮不自顧如此尤可為微臣之則效也貞觀十五年遣使詣西域使去聲後同西域西夷之國也立葉䕶可汗未還葉音攝葉䕶突厥大臣之號也本曰葉䕶統葉䕶嗣其兄射匱可汗乃號葉䕶可汗是年葉䕶數遣使入貢秋七月左領軍將軍張大帥持節即其所號立為可汗賜以皷纛又令人多賫金帛令平聲後同厯諸國市馬魏徵諫曰今發使以立可汗為名可汗未定立即詣諸國市馬彼必以為意在市馬不為專立可汗不為之為去聲可汗得立則不甚懷恩不得立則生深怨諸蕃聞之且不重中國但使彼國安寧使如字則諸國之馬不求自至昔漢文帝有獻千里馬者曰吾吉行日三十吉行謂廵幸祭祀也凶行日五十凶漢書作師凶行謂出兵行師也鸞輿在前輿漢書作旗屬車在後屬音囑漢因秦制大車八十一乘相屬也吾獨乘千里馬將安之乎乗平聲之猶往也乃償其道里所費而返之又光武名秀漢中興之君有獻千里馬及寳劍者馬以駕皷車劒以賜騎士今陛下凡所施為施平聲皆邈過三王之上邈音莫奈何至此欲為孝文光武之下乎又魏文帝姓曹名丕操之子也受漢禪國號魏求市西域大珠蘇則曰蘇姓則名字文師扶風人仕魏為侍中若陛下恵及四海則不求自至求而得之不足貴也陛下縱不能慕漢文之髙行去聲可不畏蘇則之正言耶太宗遽令止之舊本此章之首曰貞觀中今按通鑑標年唐氏仲友曰魏徵之諫不使蠻夷窺中國也先王内中夏而外四夷其待之固有其道矣後世不為所亂則為所窺皆起於喜功貪利之故太宗聖明猶不免此徵之所言切中其病而終唐之世困於亂蕐可不戒哉愚按禹貢曰織皮崑崙析支渠捜西戎即敘因其織皮之貢而即敘之此大禹之撫四夷也漢武因名馬通大宛而致連年之師光武卻名馬閉玉闗而絶西域之使二君之得失盖可覩矣是宜魏徵之進諫幸太宗克從之也貞觀十七年太子右庶子髙季輔名馮以字行徳州人以孝聞貞觀初拜監察御史不避權要累轉中書舍人列上五事後除是職遷吏部侍郎及卒謚曰憲上疏陳得失特賜鍾乳一劑鍾乳産於石食之使人生氣通胃謂曰卿進藥石之言謂其言有益於國猶藥石有益於病也故以藥石相報按史傳季輔後為吏部侍郎善銓敘人物帝賜金背鏡一以况其清鑒焉唐氏仲友曰書曰徳懋懋官功懋懋賞人主勉進臣下之功徳欲其不怠如此太宗兩賜季輔得懋賞之意然以季輔文武正直不至宰輔未為盡其才也愚按藥石所以愈膏肓之疾金鏡可以别􅎀妍之形太宗嘉人臣之進言比之為藥石望人臣之清鑒比之于金鏡可為君臣相與之盛事也貞觀十八年太宗謂長孫無忌等曰夫人臣之對帝王夫音扶多順從而不逆甘言以取容朕今發問不得有隱宜以次言朕過失長孫無忌唐儉等皆曰陛下聖化道致太平以臣觀之不見其失黄門侍郎劉洎字思道荆州人貞觀七年為治書侍御史遷右丞號稱職十七年逓日直東宫遷侍中太宗征遼東詔輔太子監國洎曰願無憂大臣有罪當按法誅之帝恠其言及還遂賜死對曰陛下撥亂創業實功髙萬古誠如無忌等言然頃有人上書辭理不稱者稱去聲或對靣窮詰無不慚退恐非奬進言者太宗曰此言是也當為卿改之為去聲按通鑑是年夏四月上至太平宫因有是問無唐儉名又載馬周曰陛下比来賞罰㣲以喜怒有所髙下此外不見其失上皆納之林氏之竒曰仁人君子之亊君當夫治安之世而危敗禍亂之言未嘗一日而忘於口者盖不如是不足以維持其治安而保養其聰明也舜襲堯之位行堯之道可謂治世矣然益曰㒺失法度禹曰無若丹朱傲臯陶曰元首叢脞哉夫舜豈有是哉而禹益臯陶則不可以無是言也太宗之徳固未能盡如堯舜貞觀之治固未能盡如唐虞之時而欲自聞其過則其心猶足為堯舜之心也惜夫太宗有堯舜好問之心而長孫無忌之徒無禹益臯陶箴規之戒可勝嘆哉愚按貞觀末年魏徵既死在廷羣臣𩔖多䛕説之風其間䛕説之特甚者長孫無忌是也太宗欲羣臣直言無忌則曰陛下無失太宗欲知其過無忌則曰陛下武功文徳臣等將順之不暇太宗欲問破髙麗之計無忌則曰諸將奉成筭而已嗚呼孔子所謂言而莫予違者其無忌之謂乎向非劉洎軰靣折廷爭庶㡬魏徵之風則貞觀之政難乎令終矣太宗嘗怒苑西監掌宫苑之官穆裕穆姓裕名命於朝堂斬之時髙宗為皇太子髙宗名治初封晉王十七年立為皇太子遽犯顔進諫太宗意乃觧司徒長孫無忌曰自古太子之諫或乗間從容而言乗平聲間去聲從即容切今陛下發天威之怒太子申犯顔之諌誠古今未有太宗曰夫人乆相與處夫音扶處上聲自然染習自朕御天下虛心正直即有魏徵朝夕進諌自徵云亡劉洎岑文本字景仁鄧州人貞觀初除秘書郎奏籍田頌擢中書舍人號善職遷侍郎十七年文本不欲兼東宫官乃詔五日一叅東宫後遷中書令卒馬周褚遂良等繼之皇太子㓜在朕膝前每見朕心説諌者因染以成性故有今日之諫舊本此章與前章通為一章今按不同分為二章愚按髙宗之處東宫也不惟己能納諌又能諌於其父何其賢哉及其在位既乆艶后擅權諫臣結舌李善感一言至比之鳳鳴朝陽其不能納諌可知矣夫以一人之身始則能諫終則拒諫其故何哉盖嘗以唐史觀之髙宗以乆不聞諌問於李勣勣對曰陛下所為盡善無事可諫嗚呼髙宗始之能諌盖由太宗之徳有以化之終之拒諫豈非李勣軰實逢君之惡哉直諌附凡十章貞觀二年隋通事舍人隋制掌引納通奏鄭仁基女年十六七容色絶姝當時莫及文徳皇后長孫氏喜圖𫝊尚禮法性約素嘗著女則十篇又為論斥漢馬后不能撿抑外家使與政事乃戒其車馬之侈此謂開本源恤末事臨終請帝納忠諌勿受讒省遊畋作役訪求得之請備嬪御太宗乃聘為充蕐唐制女官號九嬪之一詔書已出䇿使未發使去聲後同魏徵聞其已許嫁陸氏方遽進而言曰陛下為人父母書曰元后作民父母撫愛百姓當憂其所憂樂其所樂樂並音洛自古有道之主以百姓之心為心故君處臺榭處上聲後同則欲民有棟宇之安食膏粱則欲民無饑寒之患顧嬪御則欲民有室家之歡此人主之常道也今鄭氏之女乆已許人陛下取之不疑無所顧問播之四海豈為民父母之道乎道一作義臣傳聞雖或未的然恐虧損聖徳情不敢隱君舉必書所願特留神慮太宗聞之大驚手詔答之深自克責遂停䇿使乃令女還舊夫令平聲後同左僕射房𤣥齡中書令温彦博禮部尚書王珪御史大夫韋挺等云女適陸氏無顯然之狀大禮既行不可中止又陸氏抗表云某父康在日與鄭家徃還時相贈遺資財初無婚姻交涉親戚並云外人不知妄有此説大臣又勸進太宗於是頗以為疑問徵曰羣臣或順㫖陸氏何為過爾分疏徵曰以臣度之度待洛切其意可識將以陛下同於太上皇太宗曰何也徵曰太上皇初平京城得辛處儉婦稍䝉寵遇處儉時為太子舎人唐制東宫右春坊置舍人掌行令書表啟太上皇聞之不悦遂令出東宫為萬年縣見任賢篇註每懷戰懼常恐不全首領陸爽陸氏名以為陛下今雖容之恐後隂加譴讁音摘責也所以反覆自陳意在於此不足為恠太宗笑曰外人意見或當如此然朕之所言未能使人必信乃出勑曰今聞鄭氏之女先已受人禮聘前出文書之日事不詳審此乃朕之不是亦為有司之過授充蕐者宜停時莫不稱歎朱氏黼曰人主以改過為徳而以耻過作非為戒人臣以格非為職而以順非逢惡為罪太宗嘗曰前世帝王拒諫者多矣或曰業已為之又曰業已許之終不為改如此欲無危亡得乎是以終身導人使諌從善如流未嘗少有靳吝也聘陸氏已聘之女是誠不知而作也聞魏徵一言遂罪已停䇿可謂更也人皆仰之矣𤣥齡軰一時名臣宜有以將順其美正救其惡有以格君心之非可也乃曰大禮旣行不可中止雖妾婦所以愛主不當如是況大臣乎太宗有改過之徳而𤣥齡軰不免有逢惡之罪若魏徵其賢矣哉愚按古者天子一后三夫人九嬪二十七世婦八十一御妻盖天子所娶之國嫡為正后庶為娣媵正后既終則其娣媵攝行后職故曰天子諸侯不冄娶大抵六宫之職一定則不可改移不可増益也後世正家之道不明正后之立亦多以色而舉況妃嬪乎故姝麗之所在不逺千里求之雖有夫之婦有不暇恤以太宗之為君文徳之為后亦不能免魏徵之諌勉强從之而已厥後士彠之女亦以色選孰知牝晨之禍已兆於此乎益之戒舜曰㒺滛於樂仲虺之稱湯曰不邇聲色後之人君亦法乎此而已矣貞觀三年詔闗中免二年租税闗東給復一年闗東潼闗以東也尋有勅已役已納並遣輸納明年總為準折為去聲後同給事中魏徵上書曰伏見八月九日詔書率土皆給復一年老㓜相歡或歌且舞又聞有勅丁已配役即令役滿折造餘物亦遣輸了待明年總為準折道路之人咸失所望此誠平分百姓均同七子但下民難與圖始日用不足皆以國家追悔前言二三其徳臣竊聞之天之所輔者仁人之所助者信今陛下初膺大寳易大傳曰聖人之大寳曰位億兆觀徳始發大號便有二言生八表之疑心失四時之大信縱國家有倒懸之急猶必不可況以㤗山之安而輙行此事為陛下為此計者為此之為如字於財利小益於徳義大損臣誠智識淺短竊為陛下惜之伏願少覽臣言詳擇利益冐昧之罪臣所甘心簡㸃使去聲後同右僕射封徳彛等並欲中男十八已上簡㸃入軍勅三四出徵執奏以為不可徳彛重奏重平聲今見簡㸃者云次男内大有壯者太宗怒乃出勅中男已上雖未十八身形壯大亦取徵又不從不肯署勅太宗召徵及王珪作色而待之曰中男若實小自不㸃入軍若實大亦可簡取於君何嫌過作如此固執朕不觧公意觧音懈徵正色曰臣聞竭澤取魚非不得魚明年無魚焚林而畋非不獲獸明年無獸若次男已上盡㸃入軍租賦雜徭將何取給且比年比音鼻國家衛士不堪攻戰豈為其少但為禮遇失所遂使如字後同人無鬪心若多㸃取人還充雜使其數雖衆終是無用若精簡壯徤遇之以禮人百其勇謂一人可當百夫也何必在多陛下每云我之為君以誠信待物欲使官人百姓並無矯偽之心自登極已来大事三數件皆是不信復何以取信於人太宗愕然曰所云不信是何等也徵曰陛下初即位詔書曰逋私宿債欠負官物並悉原免即令平聲所司列為事條秦府國司亦非官物陛下自秦王為天子國司不為官物其餘物復何所有又闗中免二年租調去聲闗外給復一年百姓䝉恩無不歡悦更有勅㫖今年白丁多已役訖若從此放免並是虛荷國恩荷去聲若已折已輸令總納取了所免者皆以来年為始散還之後方更徵收徵平聲後同百姓之心不能無恠已徵得物便㸃入軍来年為始何以取信又共理所寄在於刺史唐制武徳初罷郡為州改太守曰刺史掌宣徳化嵗廵屬縣觀風俗録囚恤鰥寡縣令唐制縣置令掌導揚風化撫字黎氓敦民業崇地利養鰥寡恤孤貧審寃屈親獄訟常年貌税並悉委之至於簡㸃即疑其詐偽望下誠信不亦難乎太宗曰我見君固執不已疑君蔽此事今論國家不信乃人情不通我不尋思過亦深矣行事往往如此錯失若為致理乃停中男賜金罋一口賜珪絹五十匹愚按孔子曰去食去兵無信不立湯之有天下也首曰彰信兆民武王之有天下也首曰惇信明義三代之得天下未有不以信為先者也太宗即位之初首欲以誠信待物可謂能以湯武為法者矣然徒知其為信不知其所以信故魏徵厯陳其目謂原免逋債而秦府不與一不信也給散租調已散復徵二不信也簡㸃丁男不任守令三不信也太宗欣然從徵之言君臣魚水實始於此終致貞觀之盛有以也哉貞觀五年持書侍御史唐制舉劾官品本作治書避髙宗諱故改曰持權萬紀權姓萬紀名京兆人性悻直為治書侍御史魏徵奏黜之後數年復是官侍御史唐制掌紏舉百寮及入閣承詔推彈雜事李仁發俱以告訐譛毁訐居謁切數䝉引見數音朔見音現任心彈射彈平聲後同肆其欺㒺令在上震怒令平聲臣下無以自安内外知其不可而莫能論諍給事中魏徵正色而奏之曰權萬紀李仁發並是小人不識大體以譛毁為是告訐為直凡所彈射皆非有罪陛下掩其所短収其一切乃騁其姦計附下罔上多行無禮以取强直之名誣房𤣥齡𤣥齡嘗掌内外官考萬紀劾其不平斥退張亮鄭州人初𤣥齡薦為車騎將軍詳見公平篇註無所肅厲徒損聖明道路之人皆興謗議臣伏度聖心度待洛切必不以為謀慮深長可委以棟梁之任將以其無所避忌欲以警厲羣臣若信狎回邪猶不可以小謀大羣臣素無矯偽空使臣下離心以𤣥齡亮之徒猶不可得伸其枉直其餘踈賤孰能免其欺罔伏願陛下留意再思自驅使二人以来有一𢎞益臣即甘心斧鉞受不忠之罪陛下縱未能舉善以崇徳豈可進姦而自損乎太宗欣然納之賜徵絹五百疋其萬紀又姦狀漸露仁發亦解黜萬紀貶連州司馬連州今仍舊𨽻廣東司馬州僚佐也朝廷咸相慶賀焉愚按中庸曰敬大臣則不眩先儒曰信任専而小臣不得以間之故臨事而不眩也自古英明之君若漢之武宣隋之髙祖宋之孝宗既任委大臣而復信小臣之言其意盖慮大臣之専權而恃小臣之察以防之也太宗之於萬紀輩亦若是而已矣雖𤣥齡之親宻猶得而間之況其餘乎夫天下之權初無定在專在於大臣固足以致亂移於小臣尤非所以為治也唯持敬則足以増一已之聰明窮理則足以察他人之邪正人君亦勉於此而巳徒恃小臣之察欲廣已之耳目者何其惑之甚哉貞觀六年有人告尚書右丞魏徵言其阿黨親戚太宗使御史大夫温彦博案驗其事乃言者不直彦博奏稱徵既為人所道雖在無私亦有可責遂令彦博謂徵曰令平聲後同爾諫正我數百條豈以此小事便損衆美自今已後不得不存形迹居數日太宗問徵曰昨来在外聞有何不是事徵曰前日令彦博宣勅語臣云因何不存形迹此言大不是臣聞君臣同氣義均一體未聞不存公道惟事形迹若君臣上下同遵此路則邦國之興䘮或未可知太宗矍然改容曰矍厥縛切驚悟貌前發此語尋己悔之實大不是公亦不得遂懷隱避徵乃拜而言曰臣以身許國直道而行必不敢有所欺負但願陛下使臣為良臣勿使臣為忠臣太宗曰忠良有異乎徵曰良臣使身獲美名君受顯號子孫𫝊世福禄無疆忠臣身受誅夷君䧟大惡家國並䘮獨有其名以此而言相去逺矣太宗曰君但莫違此言我必不忘社稷之計乃賜絹二百疋按通鑑徵又曰稷契臯陶良臣也龍逄比干忠臣也胡氏寅曰忠良一道也未有優於忠而劣於良者亦未有偏於良而短於忠者魏公之言過為分别不若曰臣願為稷契臯陶諫行言聽不願如龍逄比干身誅國亡如此自足以警帝意也夫稷契比干所謂易地則皆然也後世事君者柔和獻納不敢强諫曰吾效稷契臯陶茍有犯顔苦口靣折廷爭者則或非之曰爾何以桀紂事吾君而欲為忠臣乎則魏公之説啟之矣林氏之竒曰自古君明臣良猶腹心手足之一體歡然無間而后朝廷之政無不舉豈拘拘形迹之末以自為疑外者太宗之於魏公雖曰言必聼諫必從而責之以宜存形迹則仆碑之兆已見於此吕氏闕而曰魏公之對誠足以警動太宗之心矣何則臣諫君從之則可以為稷契臯陶之良不從則亦不失其為龍逄比干之忠則是忠之與良固未甚相逺也若乃君之聽諌從之則為堯舜不從之則為桀紂其相去不啻霄壤則太宗於此安得而不警乎愚按魏徵忠良之論美矣然攷之文義則有不然者何也文武之臣身獲美名君受顯號専謂之良臣可也而冏命則曰咸懐忠良商紂之臣身受誅忠夷君䧟大惡専謂之忠臣可也而武王則曰焚炙良此猶渾而言之也子文仕為令尹身得令終可以為良臣矣夫子則稱之為忠奄息殺身殉𦵏以從其君可以為忠臣矣詩人則稱之為良然則徵之言豈得為定論哉先儒有言忠良一道也未有優於忠而劣於良者亦未有偏於良而短於忠者言不可易矣貞觀六年匃奴克平逺夷入貢符瑞日至年穀頻登岳牧等屢請封禪去聲封禪者封土於山襌祭於地也羣臣等又稱述功徳以為時不可失天不可違今行之臣等猶謂其晚惟魏徵以為不可太宗曰朕欲得卿直言之勿有所隱朕功不髙耶曰髙矣徳未厚耶曰厚矣蕐夏未安耶曰安矣逺夷未慕耶曰慕矣符瑞未至耶曰至矣年穀未登耶曰登矣然則何為不可對曰陛下功髙矣民未懐恵徳厚矣澤未旁流蕐夏安矣未足以供事供平聲後同逺夷慕矣無以供其求符瑞雖臻而罻羅猶宻罻音蔚積嵗豐稔而倉廩尚虛此臣所以竊謂未可臣未能逺譬且借近喻於人有人長患疼痛不能任持療理且愈皮骨僅存便欲負一石米日行百里必不可得隋氏之亂非止十年陛下為之良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封謂東封㤗山也在今㤗安州萬國咸萃要荒之外要平聲要服荒服蠻夷之地也莫不奔馳今自伊洛之東暨乎海岱岱㤗山也雈莾巨澤茫茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻寧可引彼戎狄示以虛弱竭財以賞未厭逺人之望厭音淹足也加年給復不償百姓之勞或遇水旱之災風雨之變庸夫邪議悔不可追豈獨臣之誠懇亦有輿人之論太宗稱善於是乃止按通鑑是年王月文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪漢文帝不封禪後世豈以文帝之賢不及始皇耶且事天掃地而祭何必登㤗山之顛封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徵獨以為不可云云㑹河南北數州大水事遂寢孫氏甫曰封禪之文不著於經典秦漢諸儒用管仲説以為帝王盛徳之事無大此禮故秦皇漢武行之儀物侈大自謂光輝無窮然封禪之後灾異數至天下多事盖繁費生靈干動和氣所致則崇尚此禮惡足以當天意哉況此禮不著於經典也司馬遷作封禪書引經典之文但廵守之禮耳帝王廵守每至方嶽必燔柴以告至非謂自陳功於天也帝王治天下能以功徳濟生民致時太平則天必佑之以永乆之福郊祀之禮足伸其報何待自告其功也太宗嘗謂事天至敬掃地而祭何必登山封土此實至論范氏祖禹曰古者天子廵守至於方岳必告祭柴望所以尊天而懐柔百神也後世學禮者失其傳而謟諛者為説以希世主謂之封禪實自秦始古無有也且三代不封禪而王秦封禪而亡不法三代而法秦以為太平盛事亦已謬矣太宗方明朝多賢而佞者猶倡其議獨魏徵以為時未可而亦不以其事為非也其後使顔師古議其禮𤣥齡裁定之徵亦與行之焉貞觀之末欲東封以事而止髙宗明皇遂踵終唐之世惟柳宗元以為非以韓愈之賢猶勸憲宗則其餘無足恠者鳴呼禮之失也乆矣世俗之惑可勝救哉胡氏寅曰自孟子沒聖學不𫝊學者以天人為二致不能監觀休咎之符凡天事尚象往往以道逺難知置於㝠漠而不省昧者無足恠矣以太宗之明房杜王魏並侍左右正旦日食天變為大不聞其胥訓告胥教誨以消隂沴復陽徳而羣臣獻謟侈蕩上心請登太山明示徳意太宗口雖不允實欲從之至稱功髙徳厚偃然自足徵雖以空虚勞費為言若非數州大水亦未必為止也夫大水者隂氣沴也日食者陽氣㣲也二者君象尤當儆懼而不知戒焉豈非以天人為二致不學不知道之過歟愚按文中子曰封禪其秦漢之侈心乎聖人復起不易斯言矣虞舜之制五載一廵守成周之盛六年一時廵肆覲羣后大明黜陟望秩山川盖所以盡報本之誠明命討之公也豈泥金刻玉升中告成之謂哉善乎太宗之言曰秦始皇封禪漢文帝不封禪後世豈以文帝不及始皇耶厥後惑於謟佞自背其言為魏徵計者惟當援古据經正名定論于以復先王之常禮于以掃秦漢之謬説不亦偉歟顧以罻羅猶宻倉廩尚虚執為未可夫以為未可行則必有可行之時也嗚呼大道不明禮學無据為君者昧於上為臣者惑於下不有聖人出焉孰能祛其謬而反諸正乎貞觀七年蜀王名愔太宗第六子也妃父楊譽在省競婢都官郎中唐制刑部官掌配役徒𨽻簿録俘囚以給衣糧藥料以理訴競雪寃凡公私良賤必周知之凡反逆相坐沒其家為官奴婢薛仁方留身勘問未及予奪予音與其子為千牛後魏官名隋有千牛刀人主防身刀也其職夲掌御刀葢取莊子庖丁為惠文君解牛十九年所割者數千牛而刀刃若新發硎石言此刀可以􅊀身因以名官唐制左右千牛衛將軍掌宫殿侍衛及供御儀仗左右執弓箭宿衛於殿庭陳訴云五品以上非反逆不合留身以是國親故生節目不肯决斷淹留嵗月太宗聞之怒曰知是我親戚故作如此艱難即令平聲後同杖仁方一百解所任官魏徵進曰城狐社䑕皆㣲物為其有所憑恃故除之猶不易為去聲後同易以豉切古語城狐不灌社䑕不燻謂其所棲穴者得所憑恃也故議者率謂人君左右近習為城狐社䑕况世家貴戚舊號難理漢晉以来不能禁禦武徳之中已多驕縱陛下登極方始蕭條仁方既是職司能為國家守法豈可枉加刑罰以成外戚之私乎此源一開萬端爭起後必悔之將無所及自古能禁斷此事惟陛下一人􅊀豫不虞為國常道為如字豈可以水未横流横去聲便欲自毁隄防臣竊思度待洛切未見其可太宗曰誠如公言嚮者不思然仁方輙禁不言頗是専權雖不合重罪宜少加懲肅乃令杖二十而赦之愚按仁方之問楊譽雖申屠之屈鄧通董宣之抗湖陽不是過也太宗不惟不能賞之又欲加刑焉其視孝文光武何其逺哉且既從魏徵之諫免仁方之罪可也顧猶杖二十而後赦之是猶紾兄臂而曰姑徐云爾攘鄰雞而曰請俟来年以五十步笑百步而巳從諫之道豈如是乎貞觀八年左僕射房𤣥齡右僕射髙士亷名儉齊清河王岳之孫初隱居終南山武徳初秦王領雍州牧舉為治中及居東宫授右庶子遷益州都督長史勵風俗有聲入為吏部尚書拜僕射卒贈司徒於路逢少府監少去聲唐制掌百工繕作之政竇徳素問北門近来更何營造徳素以聞太宗乃謂𤣥齡曰君但知南衙事我北門少有營造何預君事𤣥齡等拜謝魏徵進曰臣不觧陛下責觧音懈後同亦不解𤣥齡士亷拜謝𤣥齡既任大臣即陛下股肱耳目有所營造何容不知責其訪問官司臣所不觧且有利害役工多少陛下所為善當助陛下成之所為不是雖營造當奏陛下罷之此乃君使臣臣事君之道論語孔子對魯定公曰君使臣以禮臣事君以忠𤣥齡等問既無罪而陛下責之臣所不觧𤣥齡等不識所守但知拜謝臣亦不觧太宗深愧之朱氏黼曰宰相之職無所不統冢宰以九式均節財用固於朝廷庶務無不當預也作洛之役周召經營未央之成蕭何綜理烏有營繕之小而宰臣不知乎以將軍為内廷以宰相為外廷正漢人體統之紊太宗方鼎新三省復修六典獨欲使宰相専立南牙政事不預北門營造是分朝廷為二岐内外為兩以一司而處相臣也㣲魏徵盡言則唐之相職豈正哉愚按王者以天下為一家其大臣宗子之家相也故天下之事天子無不當與宰相亦無不當與者豈有南衙北門之分乎太宗責非其所當責𤣥齡等謝非其所當謝㣲魏徵之言君臣盖莫知其失也唐中葉以後以中書門下為南衙以樞宻中尉為北司軍機之宻䇿立之重宰相遂不得與聞太宗之失言實啟之矣貞觀十年越王名貞太宗第八子也長孫皇后所生太子介弟聰明絶倫太宗特所寵異或言三品以上皆輕蔑王者意在譛侍中魏徵等以激上怒上御齊政殿引三品已上入坐定大怒作色而言曰我有一言向公等道往前天子即是天子今時天子非天子耶往年天子兒是天子兒今日天子兒非天子兒耶我見隋家諸王達官已下皆不免被其躓頓我之兒子自不許其縱横縱平聲公等所容易過得相共輕蔑易以豉切後同我若縱之豈不能躓頓公等𤣥齡等戰慄皆拜謝徵正色而諌曰當今羣臣必無輕蔑越王者然在禮臣子一例𫝊稱𫝊去聲王人雖微列於諸侯之上諸侯用之為公即是公用之為卿即是卿若不為公卿即下士於諸侯也今三品已上列為公卿並天子大臣陛下所加敬異縱其小有不是越王何得輙加折辱若國家紀綱廢壞臣所不知以當今聖明之時越王豈得如此且隋髙祖不知禮義寵樹諸王使行無禮尋以罪黜不可為法亦何足道太宗聞其言喜形於色謂羣臣曰凡人言語理到不可不伏朕之所言當身私愛當去聲魏徵所論國家大法朕嚮者忿怒自謂理在不疑及見魏徵所論始覺大非道理為人君言何可容易召𤣥齡等而切責之賜徵絹一千匹愚按齊桓殊會王世子于首止春秋大之胡氏釋之曰自天王而言欲屈逺其子使次乎其下示謙徳也自臣下而言欲尊敬王世子則序乎其上正分義也然則由胡氏分義之説觀之魏徵之言非耶曰皆是也胡氏之言謂在外諸侯也魏徵之言謂在内公卿也胡氏之言謂世子也魏徵之言謂諸王也為大臣者茍不能權其輕重隨時以取中又豈足與論春秋之義哉貞觀十一年所司奏凌敬乞貪之狀凌平聲凌姓敬名初仕竇建徳為祭酒太宗責侍中魏徵等濫進人徵曰臣等每䝉顧問常具言其長短有學識强諌諍是其所長愛生活好經營是其所短好去聲今凌敬為人作碑文為去聲教人讀漢書因兹附托囘易求利與臣等所説不同陛下未用其長惟見其短以為臣等欺㒺實不敢心伏太宗納之愚按夫子曰孟公綽為趙魏老則優不可為滕薛大夫夫寸有所長尺有所短人君用其所長棄其所短可也善乎魏徵之言曰有學識强諫諍凌敬之所長也愛生活好經營凌敬之所短也太宗既不能用其所長顧欲因其所短責及舉者豈用人之道乎向非鄭公之諌太宗好賢之意荒矣貞觀十二年太宗謂魏徵曰比来所行得失政化比音鼻何如往前對曰若恩威所加逺夷朝貢比於貞觀之始不可等級而言若徳義潜通民心悦服比於貞觀之初相去又甚逺太宗曰逺夷来服應由徳義所加應平聲往前功業何因益大徵曰昔者四方未定常以徳義為心旋以海内無虞旋平聲漸加驕奢自溢所以功業雖盛終不如往初太宗又曰所行比往前何為異徵曰貞觀之初恐人不言導之使諫三年已後見人諫悦而從之一二年来不悦人諫雖勉强聼受而意終不平諒有難也太宗曰於何事如此對曰即位之初處元律師死罪處上聲後同元姓律師名孫伏伽貝州人武徳中上言三事帝稱之曰誼臣貞觀中拜御史遷大理卿諫曰法不至死無容濫加酷罰遂賜以蘭陵公主園直錢百萬人或曰所言乃常事而所賞太厚答曰我即位来未有諫者所以賞之此導之使言也徐州司户栁雄徐州今仍舊𨽻河南司户州屬户曹栁姓雄名於隋資妄加階級人有告之者陛下令其自首令平聲首去聲後同不首與罪遂固言是實竟不肯首大理推得其偽將處雄死罪少卿戴胄奏法止合徒少去聲唐制徒刑五一年至於三年陛下曰我已與其斷當訖當去聲但當與死罪胄曰陛下既不然即付臣法司罪不合死不可酷濫陛下作色遣殺胄執之不已至於四五然後赦之乃謂法司曰但能為我如此守法為去聲豈畏濫有誅夷此則悦以從諫也往年陕縣丞皇甫徳叅上書大忤聖㫖陛下以為訕謗臣奏稱上書不激切不能起人主意激切即似訕謗于時雖從臣言賞物二十叚意甚不平難於受諌也太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論説過失堪驚公但存此心朕終不違公語胡氏寅曰天下之理不進則退不退則進以天地日月四時之運與萬物之盈虛消長觀焉則見矣人之徳慧智術何獨不然太宗自謂今所為猶往年也是則不逮往年也譬之日焉雖在昃晡未嘗不明若語其嚮於熈盛豈若未中之時乎是故乾之象曰君子以自强不息湯之盤銘曰茍日新日日新又日新知從事於此者惟持忠存誠以堯舜為法豈不可及勉焉日有孜孜斃而後已是則湯所以入聖域而成功不殊惜乎太宗之未學也愚按隋文帝失天下之道不一而莫大於拒諫唐太宗得天下之道不一而莫大於納諫夫太宗之納諫豈其天性之本然哉良由目覩煬帝之亡矯揉勉强而行之也故貞觀之初天下未安則能導人使諫中年天下漸安尚能悦人之諫末年天下已安則勉强從人之諫矣昔者舜之舍己從人禹之聞善則拜湯之從諫弗咈終其身於一日果何道哉盖聖人之納諫由於志氣之自然故無始終之異太宗之納諫由於血氣之矯揉故少而鋭老而衰也然則人君欲盡納諫之道者可不孳孳而務聖人之學哉貞觀政要卷二欽定四庫全書貞觀政要卷三唐吳兢撰元戈直集論君臣鑒戒第六凡七章貞觀三年太宗謂侍臣曰君臣本同治亂共安危若主納忠諌臣進直言斯故君臣合契古來所重若君自賢臣不匡正欲不危亡不可得也君失其國臣亦不能獨全其家至如隋煬帝暴虐臣下鉗口卒令不聞其過卒子聿切令平聲遂至滅亡虞世基等尋亦誅死前事不逺朕與卿等可得不慎無為後所嗤愚按大宗常以隋煬帝為戒而欲其臣以虞世基為戒形之於言者數矣夫人雖至愚未有不愛吾身者也煬帝之縱欲肆志未必不曰吾知愛吾身而已不暇憂吾民也世基之緘黙保位未必不曰吾知愛吾身而已不暇憂吾君也豈知江都西閣之變君臣俱不免也哉故君以煬帝為戒則凡吾之容受直言非以愛其臣也所以為吾身計也臣以世基為戒則凡吾之盡忠無隱非以愛其君也所以為吾身計也君臣各為其身計則炎涼寒燠無一時不愛吾身也寧可以須㬰之不謹乎髪膚齒甲無一處之非吾身也寧可以細㣲之不謹乎然則君臣宵旰相與嘉惠蒼生者非以利天下國家也各愛其身而已太宗斯言推其意若出於一己之私盡其義乃所以成天下之公也貞觀四年太宗論隋日魏徵對曰臣往在隋朝曾聞有盗發曽音層煬帝令於士澄捕逐令平聲後同於如字姓也士澄名為隋將以魏郡降唐但有疑似苦加拷掠枉承賊者二千餘人並令同日斬決大理丞隋獄官之貳職張元濟怪之試尋其狀乃有六七人盗發之日先禁他所被放纔出亦遭推勘不勝苦痛勝平聲自誣行盗元濟因此更事究尋二千人内惟九人逗遛不明逗音豆遛音留遷延也官人有諳識者就九人内四人非賊有司以煬帝已令斬決遂不執奏並殺之太宗曰非是煬帝無道臣下亦不盡心須相匡諫不避誅戮豈得惟行諂佞茍求悦譽平聲君臣如此何得不敗朕賴公等共相輔佐遂令囹圄空虛願公等善始克終恒如今日愚按大學曰為人君止於仁為人臣止於敬此言君臣各盡其道也虞廷賡歌帝舜先言股肱皋陶先言元首此言君臣更相責難也各盡其道所以明上下之分更相責難所以明上下之交也今觀前章太宗自以煬帝為戒欲羣臣以世基為戒此君臣各盡其道者也此章論隋世濫刑則魏徵歸過於君太宗歸過於臣此君臣更相責難者也二章之㫖實相為用史臣以此居鑒戒之首豈非貞觀致治之本歟貞觀六年太宗謂侍臣曰朕聞周秦初得天下其事不異然周則惟善是務積功累徳所以能保八百之基秦乃恣其奢滛好行刑罰好去聲後同不過二世而滅豈非為善者福祚延長為惡者降年不永朕又聞桀紂帝王也以匹夫比之則以為辱顔閔匹夫也顔回字子淵閔損字子騫皆孔子弟子以徳行稱以帝王比之則以為榮此亦帝王深恥也朕每將此事以為鑒戒常恐不逮為人所笑魏徴對曰臣聞魯哀公魯君名蔣謂孔子曰有人好忘者移宅乃忘其妻孔子曰又有好忘甚於此者丘見桀紂之君丘孔子名乃忘其身願陛下每以此為慮庶免後人笑爾愚按桀紂帝王也以匹夫比之則以為辱何辱焉人心之惡惡也顔閔匹夫也以帝王比之則以為榮何榮焉人心之善善也孜孜為善顔閔之徒也以匹夫而天下後世所企敬匹夫而帝王矣孜孜為惡桀紂之徒也以帝王而天下後世所羞稱帝王而匹夫矣太宗所論亦知言哉而魏徴之對又明桀紂之所以為桀紂也愚則曰欲知桀紂顔閔之分善與惡之間也貞觀十四年太宗以髙昌平高昌西域國名都交河城漢車師之地其王麴文泰是年文泰卒子智盛立平謂征討平定也召侍臣賜宴於兩儀殿謂房𤣥齡曰高昌若不失臣禮豈至滅亡朕平此一國甚懷危懼惟當戒驕逸以自防納忠謇以自正謇音蹇直言也黜邪佞用賢良不以小人之言而議君子以此慎守庶幾於獲安也幾平聲魏徴進曰臣觀古來帝王撥亂創業必自戒慎採芻蕘之議從忠讜之言天下既安則恣情肆欲甘樂諂䛕樂音洛惡聞正諌惡烏去聲張子房漢王計畫之臣及高祖為天子將廢嫡立庶子房曰今日之事非口舌所能争也張子房名良漢封留侯高祖欲廢太子盈立趙王如意或謂呂后曰留侯善畫計上信用之后刼良曰君為上謀臣今上欲易太子君安得高枕而卧良曰始上在急困中幸用臣䇿天下已定以愛欲易太子雖臣等百人何益后强要曰為我畫計良曰此難以口舌争遂為太子請四皓為輔賴以不廢終不敢復有開説復音􅇲况陛下功徳之盛以漢祖方之彼不足凖即位十有五年太宗以武徳九年即帝位至是十有五年聖徳光被今又平殄高昌屢以安危繫意方欲納用忠良開直言之路天下幸甚昔齊桓公齊君名小白與管仲鮑叔牙寗戚三人皆齊相四人飲桓公謂叔牙曰盍起為寡人夀乎為去聲諸侯自稱曰寡人言寡徳之人也叔牙奉觴而起曰奉音捧願公無忘出在莒時桓公初出奔於莒鮑叔為之傅使管仲無忘束縛於魯時桓公立謂魯曰管仲讐也請得甘心醢之管仲請囚叔牙迎受之及堂阜而脱桎梏使寗戚無忘飯牛車下時寗戚嘗候桓公出扣牛角歌曰南山矸白石爛中有鯉魚長尺半生不遭堯與舜禪短布單衣纔至骭從昏飯牛至夜半公遂召之為相桓公避席而謝曰寡人與二大夫能無忘夫子之言則社稷不危矣太宗謂徵曰朕必不敢忘布衣時公不得忘叔牙之為人也按通鑑十三年髙昌王麴文泰遏絶西域朝貢伊吾既内屬高昌又與西突厥共擊之上徴其臣阿史那矩文泰不遣中國人在突厥者或奔高昌詔使歸之亦不遣又與西突厥共破焉耆上遣使責之文泰語不遜於是詔侯君集等擊之遂降由此唐地東極于海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里為唐之極盛焉愚按唐虞之世雍熈泰和帝治之極盛也聖君賢相都俞吁咈於一堂之上凛乎儆戒之言以聖君賢相夫豈有是哉兹所以保雍熈泰和之盛也今觀高昌既平土宇極盛太宗有兢兢保治之言魏徴有諄諄鍳戒之意兹所以成貞觀太平之盛也然古帝王傳心之學其要在於欽而儆戒之際尤謹於欽之一辭蓋敬者萬化之本原一心之妙用聖神之能事學問之極功帝王授受之懿在此其發於言者皆由於心也故能無怠無荒謹終如始為上人者佩太宗君臣鑒戒之言體帝王心學之要則豈惟貞觀可以進於三代之上矣貞觀十四年特進魏徴上疏曰臣聞君為元首臣作股肱齊契同心合而成體體或不備未有成人然則首雖尊高必資手足以成體君雖明哲必藉股肱以致理禮云人以君為心君以人為體心莊則體舒心肅則容敬禮緇衣篇之辭書云元首明哉股肱良哉庶事康哉元首叢脞哉股肱惰哉萬事墮哉墮音隳虞書皋陶賡歌之辭然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇夫音扶後同自古為難以石投水千載一合以水投石無時不有其能開至公之道申天下之用内盡心膂音旅外竭股肱和若鹽梅商書高宗命傅説曰若作和羮爾惟鹽梅固同金石者非惟高位厚秩在於禮之而已昔周文王遊於鳳皇之墟韈系解顧左右莫可使者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子者哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝功於垓下若夏桀不棄於伊尹項羽垂恩於韓信寧肯敗已成之國為滅亡之虜乎媵音𦙍垓音該伊姓尹字也伊尹名摯湯三聘之遂佐湯伐桀放桀於南巢之地有莘國名送女曰媵湯妃有莘氏之女也史記謂伊尹欲行道以致君而無由乃為有莘氏之媵臣説湯致於王道蓋戰國時有為此説者韓姓信名也淮陰人數以䇿干項羽羽弗聽信亡歸漢高祖用蕭何言於是擇日齋戒設壇塲拜信為大將後圍羽於垓下之地又㣲子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者微箕二國名子爵也㣲子紂之庶兄諌紂不聽遂去之武王克商封㣲子於宋箕子紂之諸父諌紂不聽被囚為奴武王即位訪之箕子為陳洪範九疇論語曰㣲子去之箕子為之奴比干諫焉而死孔子曰殷有三仁禮記稱魯穆公問於子思曰穆公魯君名顯子思孔子之孫名伋為舊君反服古歟為去聲子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸泉隊音墜泉禮作淵蓋避高祖諱故以泉代淵毋為戎首不亦善乎又何反服之禮之有禮檀弓篇之辭齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死難去聲後同出亡不送公曰裂地以封之疏爵而待之疏平聲有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諌而見納終身不亡臣何送焉若言不見用有難而死是妄死也諫不見納出亡而送是詐忠也春秋左氏傳曰傳去聲春秋孔子所作而左氏為傳崔杼弑齊莊公崔杼齊臣崔武子也莊公名光晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之為去聲後同為社稷亡則亡之若為已死為已亡非其親暱誰敢任之門啟而入枕尸股而哭興三踊而出枕去聲踴音勇事見左傳襄公二十五年孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如糞土臣視君如㓂讐孟子告齊宣王之辭雖臣之事君無二志至於去就之節當緣恩之厚薄然則為人主者為如字後同安可以無禮於下哉竊觀在朝羣臣當主樞機之寄者或地隣秦晉或業與經綸與音預並立事立功皆一時之選處之衡軸處上聲為任重矣任之雖重信之未篤則人或自疑人或自疑則心懷茍且心懷茍且則節義不立節義不立則名敎不興名敎不興而可與固太平之基保七百之祚未之有也又聞國家重惜功臣不念舊惡方之前聖一無所間去聲然但寛於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之況上啟其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一源下生百端之變無不亂者也禮記曰愛而知其惡憎而知其善禮曲禮篇之辭若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庶遄沮詩小雅巧言篇之辭然則古人之震怒將以懲惡當今之威罰所以長姦長音掌後同此非唐虞之心也非禹湯之事也書曰撫我則后虐我則讐周書武王誓師之辭荀卿子名况趙人卿者時人相尊之號著書曰荀子曰君舟也人水也水所以載舟亦所以覆舟此本家語之辭而荀子述之也故孔子曰魚失水則死水失魚猶為水也故唐虞戰戰慄慄日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求至理豈可得乎又政貴有恒不求屢易今或責小臣以大體或責大臣以小事小臣乗非所據乗平聲大臣失其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其辜欲其無私求其盡力不亦難乎難如字小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟咎莫能自明則茍求免禍大臣茍免則譎詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣又委任大臣欲其盡力毎官有所避忌不言則為不盡若舉得其人何嫌於故舊若舉非其任何貴於踈逺待之不盡誠信何以責其忠恕哉臣雖或有失之君亦未為得也夫上之不信於下必以為下無可信矣若必下無可信則上亦有可疑矣禮曰上人疑則百姓惑下難知則君長勞禮緇衣篇之辭上下相疑則不可以言至理矣當今羣臣之内逺在一方流言三至而不投杼者秦甘茂告秦王曰魯人有與曾參同姓名者殺人人告其母母織自若三人告之其母投杼下機踰墻而走臣之賢不及曾參王之信臣不如其母疑臣者非特三人臣恐大王之投抒也臣竊思度待洛切未見其人夫以四海之廣士庶之衆豈無一二可信之人哉蓋信之則無不可疑之則無可信者豈獨臣之過乎夫以一介庸夫結為交友以身相許死且不渝況君臣契合寄同魚水若君為堯舜臣為稷契音泄稷農官舜命棄曰汝后稷播時百榖命契曰汝作司徒敬敷五敎豈有遇小事則變志見小利則易心哉此雖下之立忠未有明著亦由上懷不信待之過薄之所致也豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四三皇史記謂庖犧氏女媧氏神農氏也孔安國書序以伏羲神農黄帝為三皇一説謂天皇地皇人皇未詳孰是五帝可俯而六矣夏殷周漢夫何足數上聲太宗深嘉納之范氏祖禹曰昔衛獻公捨大臣而與小臣謀故失國出奔且大臣之所任者大小臣之所任者小而以小謀大以逺謀近此人君偏聽之蔽鮮有不敗事者也唐氏仲友曰此魏徵論聽納任用之要人君必先知此然後能任君子去小人納忠諫察奸言以太宗之聰明惟其見道之淺至於聽言任用之間數領鄭公之諫而非諫之左挈右提則移於小人惑於奸言多矣此徵最冇功於貞觀者於格非近之矣愚按太宗於是臨御乆矣魏徴竭誠進諌惓惓於慎終如始之言至此疏復以君臣同心一體詳譬而曲陳之甚若致戒於庸君常主之前其愛君亦云至矣且終之曰三皇可追而四五帝可俯而六夏殷周漢夫何足數皇道尚矣五帝之徳蔑以加矣嘗觀典謨所陳都俞吁咈於一堂之上始而克艱之戒終之明良之歌而其要領則在欽哉之一言君臣同心其在是也魏徴四三皇六五帝之說亦所謂貴難於君者歟貞觀十六年太宗問特進魏徴曰朕克己為政仰企前烈至於積徳累仁豐功厚利四者常以為稱首朕皆庶幾自勉幾平聲人苦不能自見不知朕之所行何等優劣徴對曰徳仁功利陛下兼而行之然則内平禍亂外除戎狄是陛下之功安諸黎元各有生業是陛下之利由此言之功利居多惟徳與仁願陛下自彊不息必可致也愚按太宗以徳仁功利岐而言之而魏徴之對亦未得為知言也蓋徳仁本也功利用也有徳與仁則功利在其中所謂不求利而未嘗不利也外徳與仁而言功利則非聖賢所謂功利矣昔孟子告梁惠王曰王何必曰利亦有仁義而已矣正以仁義乃所以利之言仁義而利在其中也積徳累仁則豐功厚利莫大焉政恐未之能爾貞觀十七年太宗謂侍臣曰自古草創之主至于子孫多亂何也司空房𤣥齡曰此為㓜主為去聲生長深宫長音掌少居富貴少去聲未嘗識人間情偽理國安危所以為政多亂太宗曰公意推過於主朕則歸咎於臣夫功臣子弟夫音扶多無才行去聲藉祖父資䕃遂處大官處上聲徳義不修奢縱是好去聲主既㓜弱臣又不才顚而不扶豈能無亂隋煬帝錄宇文述在藩之功擢化及於高位不思報效翻行弑逆化及隋相字文述之子為右屯衛將軍武徳初弑煬帝於江都立秦王浩復殺浩自立稱許帝二年竇建徳破化及於聊城殺之此非臣下之過歟朕發此言欲公等戒朂子弟使無􅄽過即家國之慶也太宗又曰化及與𤣥感即隋大臣受恩深者子孫皆反其故何也𤣥感隋相楊素之子為大將大業九年起兵黎陽圍東都隋主命宇文述等討之遂敗死岑文本對曰君子乃能懷徳荷恩荷去聲𤣥感化及之徒並小人也古人所以貴君子而賤小人太宗曰然愚按古者諸侯有世封公卿大夫無世官何也蓋諸侯有大臣輔佐自非甚無道者皆足繼其先世公卿大夫一非其人民有受其害者矣有周盛世自諸侯入為公卿必若呂伋召虎而後可也自兩漢以來未聞宰相大臣有世官者煬帝無道事不師古𤣥感化及之禍自取之耳太宗問守成之君何以多亂𤣥齡以為㓜主生長深宫不識人間情偽所以多亂其説是矣太宗迺歸咎於功臣之子弟則愚不知其何説也今觀太宗之後近而高宗中宗之昏庸逺而穆敬懿僖之謬戻馴致亂亡咸其自取豈功臣子弟之罪乎擇官第七凡十一章貞觀元年太宗謂房𤣥齡等曰致理之本惟在於審量才授職量平聲後同務省官員故書稱任官惟賢才又云官不必備惟其人商周書之辭若得其善者雖少亦足矣其不善者縱多亦奚為古人亦以官不得其才比於畫地作餅不可食也詩曰謀夫孔多是用不集詩小雅小旻篇之辭又孔子曰官事不攝焉得儉焉於䖍切論語孔子言管仲之辭且千羊之皮不如一狐之腋史記商君問趙良曰子觀我冶秦也孰與五羖大夫賢良曰千羊之皮不如一狐之腋千人之諾諾不如一士之諤諤此皆載在經典不能具道當須更併省官員使得各當所任各當之當去聲則無為而理矣卿宜詳思此理量定庶官員位𤣥齡等由是所置文武總六百四十員太宗從之因謂𤣥齡曰自此儻有樂工雜𩔖假使術逾儕輩者只可特賜錢帛以賞其能必不可超授官爵與夫朝賢君子夫音扶比肩而立比音鼻同坐而食遺諸衣冠以為恥累良偽切按通鑑唐初士大夫以亂離之後不樂仕進官員不充省符下諸州差人赴選勒赴省選集者七千餘人吏部劉林甫隨材銓敘各得其所時人稱之上謂𤣥齡曰官在得人不在員多命併省留文武總六百四十三員百官志曰太宗省内外官定制七百三十員曰吾以此待天下賢才足矣朱氏黼曰有事則有職有職則有官理也古人以事任人事省則職省故有有職而無官後世以人任官人増則官増故有有官而無職有職而無官非廢事也或一官而兼數職有官而無職非增事也或一職而任數人周官雖多非皆具員也考之周禮名存而實不備職具而官不除者尚多貞觀之制非不甚美矣然員外之置已見於當時將何以一流品杜將來哉其後宰相或至數人員外官至二千餘員其末流之弊未必非太宗啟之愚按唐虞稽古建官惟百夏商官倍亦克用乂古之建官簡矣然九官四岳十二牧實二十五人而書稱二十二人蓋亦有以一人而兼二職者也周官三百六十總計六萬三千六百有竒周之建官雖多然周禮者周公未行之書也書稱召公以太保兼冢宰畢公以太師兼司馬蓋亦有以一人而兼二職者也後世建官既冗復無攝事太宗深懲斯弊省内外官文武總六百四十員自後世觀之可謂省之極矣然房𤣥齡以僕射而兼領度支魏徴以侍中而兼東宫官蓋亦有以一人而兼二職者矣愚嘗論貞觀之善政當以省官為首何也易於選擇上不至於失人俸禄易供下不憂於厚歛權任專一無避事茍免之患員數不多無紛更生事之憂官冗則四者反是厥後兵部之職分於樞宻戸部之職分於三司監軍侵監司之權州將奪太守之任員外之置多於正員墨敕斜封數逾千百而貞觀之善政隳矣夫後世之天下猶貞觀之天下太宗何以致是哉竊謂其大要有二一曰息奔競二曰裁嬖幸蓋奔競之風盛則員多而闕少官不得以不增也嬖倖之門多則私思無所施官不得以不增也斯二者省官之本也有志於貞觀之治者盍亦反其本而已貞觀二年太宗謂房𤣥齡杜如晦曰公為僕射當助朕憂勞廣聞耳目求訪賢哲比聞公等比音鼻聽受辭訟日有數百此則讀符牒不暇安能助朕求賢哉因敕尚書省唐制尚書謂之都省置令一人典領百官貞觀中以太宗曾為之故缺而不置其次左右僕射各一人左右丞各一人其屬有六部庶務皆會決焉凡符移闗牒必遣於都省乃下天下大事不决者皆上都省細碎務皆付左右丞唐制掌辨六官之儀紀正省内劾御史舉不當者吏戸禮三部左丞總焉兵刑工三部右丞總焉惟寃滯大事合聞奏者闗於僕射范氏祖禹曰太宗責宰相以求賢而不使親細務可謂能任以其職矣書曰惟説式克欽承旁招俊乂列于庶位此相之職也茍不務此而治簿書期㑹百吏之事豈所謂相乎胡氏寅曰宰相受詞既非古制然當之者未有以為不可雖賢如房杜亦且行之何也其説有五無經濟之畧姑以是為勤於所職者一也人君明察則不敢當權而以吏事自為者二也才用粗淺熟於有司之務躐躋其任益以勉勉者三也上不知治本而責成於叢脞因以奉承之者四也實侵大權故治文案以助其君者五也若誠知宰相職分必不肯然矣房杜之才非能賢於太宗故太宗如是而止固不能為太甲高宗成王之事也唐氏仲友曰王省惟歲卿士惟月師尹惟日蓋其位愈尊其事愈要其任愈逸其位愈卑其事愈詳其任愈勞太宗以細務屬左右丞大事闗僕射當矣責宰相以廣耳目訪賢才亦當矣雖然廣耳目訪賢才坐論大事在房杜任之尚恐未能無愧古人而叅之以封倫楊師道之屬可乎是知宰相之職而未得擇宰相之道也愚按人主之職在論一相一相之職在任百官此君相之要道也受詞誠非為相之體然大臣慮四方豈惟高虛拱揖以自居哉畢公周之元老大臣也克勤小物弼亮四世小物非細務乎昔陳平不答錢榖决獄之問而曰宰相上佐天子理陰陽下遂萬物之宜此言固大矣然錢榖國計民命所闗冢宰之所制者也獄者生民之司命三公之所當叅聽者也此皆裁成輔相以左右生民者而曰宰相不當知則所職者何事耶太宗敕宰相勿親細務特不可下行有司之事耳克勤小物以弼亮天子有古人之相業在貞觀二年太宗謂侍臣曰朕毎夜恒思百姓間事或至夜半不寐惟恐都督唐制武徳七年改總管曰都督掌督諸州兵馬甲械城隍鎮戍糧廩總判府事刺史見前篇註堪養百姓與否故於屏風上録其姓名坐卧恒看在官如有善事亦具列於名下朕居深宫之中視聽不能及逺所委者惟都督刺史此輩實理亂所繫尤須得人愚按自秦罷侯置守之後郡守古諸侯其闗繫民生至不輕也漢宣帝謂與我共理者惟良二千石太宗謂治民之本在刺史斯言也真知本者矣然宣帝以刑名繩下故當時固多循吏而未免有酷吏太宗英明仁恕故當時居多循吏而無酷吏此又二帝之優劣也貞觀二年太宗謂右僕射封徳彛曰致安之本惟在得人比來比音鼻命卿舉賢未嘗有所推薦天下事重卿宜分朕憂勞卿既不言朕將安寄對曰臣愚豈敢不盡情但今未見有奇才異能太宗曰前代明王使人如器皆取士於當時不借才於異代豈得待夢傅説音悦傅説商賢相也武丁夢得聖人名曰説以夢所見視羣臣百吏皆非也乃使營求之野得説扵巖中立為相逢吕尚吕尚太公也本姓姜從其封姓周西伯將出獵卜之曰所獲非龍非彲非虎非羆覇王之輔果遇太公於渭之陽與語大悦遂載與俱歸立為師然後為政乎且何代無賢但患遺而不知耳徳彛慙赧而退赧奴版切愧態也按史傳繫元年二月帝謂封倫曰大理之職人命所懸此官極須妙選公直倫未對帝曰戴胄忠直每事用心即其人也又謂倫曰云云孫氏甫曰大臣之職薦達人才固非細事天下之大羣臣之衆可容一日乏才乎然人之才有能有不能器而使之衆職舉矣豈有人主責其舉賢己未推薦但言無奇才異能上欲欺主之明下欲蔽天下之善此真姦人也蓋姦人不樂進賢其情有三保位固寵常懼失之以賢者既用必建立功業掩己之名見己之過名滅過露則位不能保寵不能固其情一也姦人立私必人附己乃引之賢者進退以道不肯趨附姦人以謂不附己而引之則不知己之恩不知恩則不為己之黨其情二也姦人心既不公知人不明雖遇賢才不能深識慮引而進之或有大過為已之累其情三也封倫之情正在於此太宗以前代未嘗乏人折之使慙懼無辭可謂能照姦人之情者也人主能照姦人之情則賢者進矣胡氏寅曰舉賢才而效之君大臣職也為大臣而乆無所舉人主詰之是也若出此令而委之房杜王魏非惟丕應徯志亦必各得其人矣乃以望於封倫且取人以身不誣之理也倫非賢者安能知賢若舉其𩔖集于朝廷豈非大憂乎是則非特倫無知人之鑒而太宗於倫亦初不知其姦邪也信知人之難哉愚按封倫謟佞人也其在隋附麗虞世基諂順其主得羣臣表疏則屛而不奏鞫獄用法則峻文深刻論功行賞則抑削就薄故世基之寵日以隆而孤隋之政日以壞皆倫所為也以若所為烏知所謂舉善薦賢之義哉其曰未有奇才異能蓋未有如已者耳是猶以隋事唐也太宗雖愧於知人之明幸不惑其説然之人也屛斥有餘罪矣貞觀三年太宗謂吏部尚書杜如晦曰比見比音鼻吏部擇人惟取其言詞刀筆不悉其景行去聲後同數年之後惡跡始彰雖加刑戮而百姓已受其弊如何可獲善人如晦對曰兩漢取人皆行著鄉閭州郡貢之然後入用故當時號為多士今毎年選集選去聲後同向數千人厚貌飾詞不可知悉選司但配其階品而已銓簡之理實所未精所以不能得才太宗乃將依漢時法令本州辟召令平聲㑹功臣等將行世封事遂止愚按古者取士之法鄉論秀士升之司徒司徒升之學大樂正升之司馬司馬辨論官材論定然後官之任官然後爵之位定然後禄之蓋未仕之前凡經四級已仕之後又經三級其詳且重如此故嘗謂後世取人之道不能復成周之法皆茍焉而已今觀太宗問如何可獲善人大哉問乎如晦政當告以成周取士之法可也乃以兩漢辟召之事為對何其陋哉厥後竟以將行世封不及施行後世惜焉然使真能行辟召之法又豈足以致成周多士之隆乎貞觀六年太宗謂魏徵曰古人云王者須為官擇人為去聲不可造次即用造七到切朕今行一事則為天下所觀出一言則為天下所聽用得正人為善者皆勸誤用惡人不善者競進賞當其勞當去聲後同無功者自退罰當其罪為惡者戒懼故知賞罰不可輕行用人彌須慎擇徴對曰知人之事自古為難故考績黜陟虞書曰三載考績三考黜陟幽明察其善惡今欲求人必須審訪其行去聲後同若知其善然後用之設令此人令平聲後同不能濟事只是才力不及不為大害誤用惡人假令强幹為害極多但亂代惟求其才不顧其行太平之時必須才行俱兼始可任用范氏祖禹曰太宗以治亂在庶官欲進君子退小人王者之言也而魏徵之所謂才行者不亦異乎夫才有君子之才有小人之才古之所謂才者君子之才也後世之所謂才者小人之才也周公制禮作樂孔子以為才此古人所謂才者兼徳行而言也後世之所謂才者辯給以禦人詭詐以用兵僻邪險詖趨利就事是以天下多亂職斯人之用於世也王者創業垂統敷求哲人以遺後嗣故能長世也豈宜以天下未定而可專用小人之才歟夫有才無行之小人無時而可用退之猶恐其或進也豈可先用而後廢乃取才行兼全之人乎徵之學駮而不純故所以輔導其君者卒不至於三王之治也愚按春秋傳曰髙陽氏有才子八人齊聖廣淵明允篤誠是以才兼徳而言之也司馬氏曰徳勝才為君子才勝徳為小人是以才對徳而言之也學者安所折衷哉愚聞之孟子曰君夫為不善非才之罪也程子曰才禀於氣氣有清濁朱子曰孟子専指其發於性者言之故以為才無不善程子兼指其禀於氣者言之則人才固有昏明强弱之不同矣以事理考之程子之言為宻由此觀之春秋傳之言即孟子之意也司馬氏之言即程子之意也然司馬氏之言宻矣范氏譏魏徴不當言亂代求才不顧其行其説是也然謂才行無所分别則將如程子之言何貞觀十一年侍御史馬周上疏曰理天下者以人為本欲令百姓安樂令平聲樂音洛惟在刺史縣令縣令既衆不能皆賢若毎州得良刺史則合境蘓息天下刺史悉稱聖意稱去聲則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢徳欲有遷擢為將相並去聲後同必先試以臨人或從二千石漢世郡守曰二千石入為丞相及司徒太尉者朝廷必不可獨重内臣外刺史縣令遂輕其選所以百姓未安殆由於此太宗因謂侍臣曰刺史朕當自簡擇縣令詔京官五品已上各舉一人按史傳此與諫營造奢侈及論太子諸王定分同一疏孫氏洙曰民者國之本也守令民之本也古者天子列爵頒禄非為臣下皆以為民也故擇其人以牧養之重其任以付責之假其權以安固之厚其禄以寵利之上之責吏一本於民下之報上一本於民則民重矣民重則守令重守令重則天下國家重矣輕守令是輕民也民輕則天下國家輕矣可不慎歟昔漢制郡守入為三公郎官出宰百里又出諌大夫補郡吏有治效者璽書勉勵増秩賜金而不輙遷公卿缺則選其尤異者用之故良吏於是為盛知所重也魏晉以下謂居朝者為要職治外者為左遷故吏多貪殘而風俗日壞失所重也唐之失亦然故内職常遷外選常滯然守宰之植風節者猶班班可言也胡氏寅曰刺史至多人君安能徧識人才委大臣謹舉可也縣令卑而尤衆近民尤甚尤不可不擇必欲得人使為縣有政績舉其人可也若展轉求之則千百賢令亦可致矣人各有才其用不同則識趣各異京官五品以上安能皆得縣令之才乎唐氏仲友曰周之意蓋謂察之於己任則民被害不如悉以才徳選則所得多矣愚按聖人以天下為一家朝廷其堂奥州縣其戸庭也唐虞之時百揆統九官四岳統十二牧故曰内有百揆四岳外有州牧侯伯庶政惟和萬邦咸寧何内外之重輕哉唐有天下於重内輕外之時下至縣令士多不屑為之夫令親民之先者也以輕心處之謂之何哉馬周之言其知體要者歟為天下者莫先於謹擇守令太宗之言固善矣然刺史録名屏上著政績善惡可以自擇矣九重之尊豈能周知惟當使内外輕重之平均朝堂擇刺史都督刺史都督舉縣令可也貞觀十一年治書侍御史劉洎以為左右丞宜特加精簡上疏曰臣聞尚書萬機實為政本伏尋此選授任誠難是以八座比於文昌左右僕射及六部是為八座漢志曰斯乃文昌天府衆務淵藪二丞方於管轄二丞左右丞也六典曰掌管轄省事爰至曹郎上應列宿音秀漢明帝曰郎官上應列宿茍非稱職稱去聲竊位興譏伏見比來比音鼻後同尚書省詔敕稽停稽音朞文案壅滯臣誠庸劣請述其源貞觀之初未有令僕尚書令及僕射也于時省務繁雜倍多於今而左丞戴胄右丞魏徴並曉達吏方質性平直事應彈舉應彈並平聲無所迴避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勲親在位為去聲器非其任功勢相傾凡在官寮未循公道雖欲自强先懼囂謗囂音枵浮薄也所以郎中予奪予上聲惟事諮禀尚書依違不能斷決或紏彈聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便渉年載或希㫖失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否便論並平聲當去聲互相姑息惟事彌縫且選衆授能非才莫舉天工人代虞書曰天工人其代之言人君代天理物官所治皆天事焉可妄加焉於䖍切至於懿戚元勲但宜優其禮秩或年高及耄音冐八十九十曰耄或積病智昏既無益於時宜當置之以間逸乆妨賢路殊為不可將救兹弊且宜精簡尚書左右丞及左右郎中唐制副二丞所轄諸司事署録目勘稽失知省内宿直之事如並得人自然綱維備舉亦當矯正趨競豈惟息其稽滯哉疏奏尋以洎為尚書左丞張氏九成曰觀洎以章疏白尚書非人之弊務欲擇賢任職整綱維振稽滯此皆詳練治體深達政本惜乎忠誠憂國不宻其身宜來者之戒也愚按唐制三省尚書省居其首樞機之要也尚書令掌典領百官其屬有六左右僕射統理六官為令之貳皆宰相也左丞則總吏部户部禮部右丞則總兵部刑部工部其所闗繫豈小哉劉洎以剛直果敢之才當紏彈舉劾之任於是而極言委任之弊具陳精簡之方可謂知政本稱厥職矣太宗即以洎為左丞可謂知人也已以太宗之器使人才後之人主所宜為法也貞觀十三年太宗謂侍臣曰朕聞太平後必有大亂大亂後必有太平大亂之後即是太平之運也能安天下者惟在用得賢才公等既不知賢朕又不可徧識日復一日無得人之理今欲令人自舉令平聲後同於事何如魏徴對曰知人者智自知者明知人既以為難自知誠亦不易以䜴切且愚暗之人皆矜能伐善恐長澆競之風長音掌不可令其自舉愚按太宗急於得天下之賢於是有令人自舉之議魏徴以為知人既難自知不易若令自舉恐長澆競之風誠為知言也夫三代盛時比閭族黨州鄉逓進而考其徳行道藝賔興于王此所謂鄉舉里選也世道已降此制不復乃曰令人自舉吾見其自鬻而已矣非善論也貞觀十四年特進魏徴上疏曰臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寧一人有慶必藉忠良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功舜舉八凱使主后土百揆時序舉八元使布五教内平外成周召光煥乎之美周公名旦武王之弟召公名奭為周太保二公夾輔成王然則四岳唐虞官名掌四岳諸侯之事或一人而總兼之九官舜命禹作司空稷播百榖契為司徒皋陶作士垂為共工益掌山澤伯夷為秩宗夔典樂龍作納言是為九官五臣論語曰舜有臣五人而天下治謂禹稷契皋陶伯益也十亂周書武王曰予有亂臣十人亂治也十人謂周公旦召公奭太公望畢公榮公太顚閎天散宜生南宫适其一文母論語曰有婦人焉九人而已先儒以為子無臣母之義蓋邑姜也九人治外邑姜治内豈惟生之於曩代而獨無於當今者哉在乎求與不求好與不好耳好並去聲後同何以言之夫美玉明珠夫音扶孔翠犀象大宛之馬宛平聲大宛西域國漢武時李廣利破其國獲汗血馬以獻西旅之獒西旅西夷國武王時貢獒犬高八尺曰獒或無足也或無情也生於八荒之表塗遥萬里之外重譯入貢重平聲言語不通必重譯而來也道路不絶者何哉蓋由乎中國之所好也况從仕者懷君之榮食君之禄率之以義將何往而不至哉臣以為與之為孝則可使同乎曾參子騫矣曾參字子輿子騫姓閔名損皆孔子弟子孟子曰事親若曾子可也論語曰孝哉閔子騫人不間於其父母昆弟之言與之為忠則可使同乎龍逄比干矣龍逄桀臣比干紂臣皆以忠諫見殺與之為信則可使同乎尾生展禽矣莊子曰尾生與女子期於梁下女子不來水至不去抱梁柱而死展禽魯大夫展獲名禽食邑柳下諡曰惠與之為㢘則可使同乎伯夷叔齊矣伯夷叔齊孤竹國君之二子讓國而逃諫伐而餓然而今之羣臣罕能貞白卓異者蓋求之不切勵之未精故也若勗之以公忠期之以逺大各有職分去聲得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所不受賤則觀其所不為因其材以取之審其能以任之用其所長揜其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故説苑曰前漢光禄大夫劉向字子政楚元王交之後采傳記行事著説苑二十篇人臣之行去聲有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌芽未動形兆未見音現昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎顯榮之處如此者聖臣也二曰虛心盡意日進善道勉主以禮義諭主以長䇿將順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱往古之行事數音朔以厲主意如此者忠臣也四曰明察成敗早防而救之塞其間去聲隙也絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺去聲辭禄讓賜飲食節儉如此者貞臣也六曰家國昏亂所為不諛敢犯主之嚴顔面言主之過失如此者直臣也是謂六正何謂六邪一曰安官食禄不務公事與代浮沉左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂音洛後同不顧其後害如此者諛臣也三曰内實險詖音蔽外貌小謹巧言令色妬善嫉賢所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當去聲號令不行如此者奸臣也四曰智足以飾非辯足以行説音税内離骨肉之親外搆朝廷之亂如此者讒臣也五曰專權擅勢以輕為重私門成黨以富其家擅矯主命以自貴顯如此者賊臣也六曰諂主以佞邪䧟主於不義朋黨比周比音鼻以蔽主明使白黑無别彼列切是非無間去聲使主惡布於境内聞於四隣如此者亡國之臣也是謂六邪賢臣處六正之道處上聲後同不行六邪之術故上安而下理生則見樂死則見思此人臣之術也禮記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐禮經解篇之辭然則臣之情偽知之不難矣又設禮以待之執法以御之為善者䝉賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉蓋言之是也行之非也言之是則出乎公道行之非則涉乎邪徑是非相亂好惡相攻好惡並去聲後所惡惡之同所愛雖有罪不及於刑所惡雖無辜不免於罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有罪免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺疎逺罰不阿親貴以公平為規矩以仁義為凖繩考事以正其名循名以求其實則邪正莫隱善惡自分然後取其實不尚其華處其厚不居其薄則不言而化朞月而可知矣若徒愛美錦而不為人擇官為去聲有至公之言無至公之實愛而不知其惡憎而遂忘其善狥私情以近邪佞背公道而逺忠良背音倍逺去聲則雖夙夜不怠勞神苦思將求至理不可得也書奏甚嘉納之愚按大禹曰知人則哲能官人臯陶為陳九徳曰載采采言知人在於以徳而驗於行事也然徳雖有九豈能全哉魏徴進求賢審官之説而舉劉向六正六邪之論是則然矣然知人者惟在於辨君子小人邪正之分固難一一以某臣某臣律之也果君子邪則正人也聖良忠智貞直六正之徳雖未必備未必不兼也果小人邪則邪人也具諂奸讒賊亡國六邪之惡雖未必備未必不兼也其曰知人則哲則明之極矣君子小人邪正之異何所逃於哲之中乎貞觀二十一年太宗在翠㣲宫在長安縣武徳八年置貞觀十年廢是年復修方成授司農卿唐制掌倉儲委積之事李緯户部尚書房𤣥齡是時留守京城會有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰但云李緯大好髭鬚更無他語由是改授洛州刺史洛州今河南府路愚按太宗至是已倦于勤矣𤣥齡以耆壽佚在厥服矣翠㣲宴息聞老臣有大好髭鬚之語旋即改授亦可謂留心治道者也愚觀自古人君蓋有聞諫而不能改者聞諌而能改者斯為善矣太宗之用李緯𤣥齡未嘗諌也特私有所議耳太宗聞而遽改迨近於不諌亦入者眉山蘇氏謂太宗之從諌近於聖詎不信哉封建第八凡二章貞觀元年封中書令房𤣥齡為梁國公兵部尚書杜如晦為蔡國公吏部尚書長孫無忌為齊國公並為第一等食邑實封一千三百戸皇從父淮安王神通從去聲後同神通與高祖為從兄弟從高祖平京師典兵宿衛封淮安王上言義旗初起臣率兵先至隋大業十三年五月高祖起兵太原六月傳檄稱義師故曰義旗神通自長安入鄠南山舉兵應太原從平京師有功今𤣥齡等刀筆之人功居第一臣竊不服太宗曰國家大事惟賞與罰賞當其勞當去聲後同無功者自退罰當其罪為惡者咸懼則知賞罰不可輕行也今計勲行賞𤣥齡等有籌謀帷幄畫定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一推他回切漢高祖論功行封羣臣爭功不决帝以蕭何功盛先封酇侯功臣皆曰何無汗馬之勞徒持文墨議論顧居臣等上何也帝曰夫獵追殺獸者狗也發蹤指示者人也諸君徒能得獸耳功狗也何之功人也羣臣皆莫敢言叔父於國至親誠無愛惜但以不可緣私濫與勲臣同賞矣由是諸功臣自相謂曰陛下以至公賞不私其親吾屬何可妄訴初高祖舉宗正籍弟姪再從三從孩童已上封王者數十人至是太宗謂羣臣曰自兩漢已降惟封子及兄弟其疎逺者非有大功如漢之賈澤漢高祖封從兄弟賈為荆王從祖昆弟澤為燕王並為將軍有功並不得受封若一切封王多給力役乃至勞苦萬姓以養已之親屬於是宗室先封郡王其間無功者皆降為縣公按本紀降封事係武徳九年十一月又按膠東郡王道彦傳云唐興務廣藩鎮故從昆弟子自勝衣已上皆爵郡王太宗即位舉屬籍問大臣曰盡王宗子於天下可乎封徳彛曰漢所封惟帝子若親昆弟其屬逺非大功不王如周郇滕漢賈澤尚不得茅土所以别親疏也先朝一切封之爵命崇而力役多以天下為私奉非所以示至公帝曰朕君天下以安百姓不容勞百姓以養已之親於是疏屬王者皆降為公惟有功者不降故道彦等並降封公由是言之其初所封郡王者後所降皆郡公也縣字疑衍愚按三代有國大封同姓異姓親親賢賢褒表功徳示天下以至公也豈為一家之私哉周公至親太公異姓皆祚大國以功徳也豈避至親之嫌哉唐封功臣雖非祚土而爵號食邑禮典隆重雖以皇從父之言而亦示以賞不可私之説猶有褒表功徳之遺意至如降封宗族弟姪以明有功尤足以見至公也貞觀十一年太宗以周封子弟八百餘年秦罷諸侯二世而滅呂后欲危劉氏終賴宗室獲安吕后名雉漢高祖后惠帝母也惠帝崩呂后臨朝欲王諸呂諸呂擅權朱虛侯劉章因侍宴以軍法斬諸呂一人自是諸呂憚之劉氏益彊封建親賢當是子孫長乆之道乃定制以子弟荆州都督荆王元景高祖第六子安州都督吳王恪太宗次子也等二十一人又以功臣司空趙州刺史長孫無忌尚書左僕射宋州刺史房𤣥齡等一十四人並為世襲刺史禮部侍郎尚書之貳李百藥字重規定州人㓜多病祖母趙以百藥名之貞觀初拜中書舍人後遷是職復授右庶子卒諡曰康奏論駮世封事曰臣聞經國庇民王者之常制尊主安上人情之大方思聞理定之規以宏長代之業萬古不易百慮同歸然命厯有餘促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數昔成王定鼎卜世三十卜年七百後厯三十七主八百六十七年過其數也秦不及期初秦皇謂二世三世至于萬世後二世被弑子嬰降漢不及期也存亡之理在於郡國周氏以鑒夏殷之長乆遵皇王之並建維城磐石深根固本雖王綱㢮廢而枝幹相持故使逆節不生宗祀不絶秦氏背師古之訓背音倍商書傅説告髙宗曰事不師古匪説攸聞棄先王之道剪華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號呼而七廟隳祀號平聲禮天子七廟賈誼曰斬華為城因河為津自以闗中之固金城千里子孫萬世之業也秦皇沒山東豪傑並起而亡秦一夫作難而七廟隳身死人手為天下笑臣以為自古皇王君臨宇内莫不受命上𤣥冊名帝籙締構遇興王之運殷憂屬啟聖之期雖魏武攜養之資曹操沛人父嵩為漢中常侍曹騰養子不能審其生出本末操子丕受漢禪國號魏追號操為武皇帝漢高徒役之賤漢高祖姓劉名邦字季沛人初為泗上亭長為縣送徒驪山徒多道亡自度比至必皆亡乃縱所送徒徒中願從者十餘人由是起兵非止意有覬覦推之亦不能去也推他回切若其獄訟不歸孟子曰獄訟者不之堯之子而之舜菁華已竭雖帝堯之光被四表虞書贊堯之辭謂徳之光顯被及于四外也大舜之上齊七政虞書曰在璿璣玉衡以齊七政謂日月五星也非止情存揖讓守之亦不可焉以放勛重蕐之徳放上聲勛與勲同重平聲放勛者總言堯之徳重蕐者總言舜之徳史記因以為堯舜之名尚不能克昌厥後是知祚之長短必在於天時政或興衰有闗於人事隆周卜世三十卜年七百雖淪胥之道斯極而文武之器尚存斯龜鼎之祚已懸定於杳㝠也至使南征不返周昭王徳衰南巡濟于漢人惡之以膠船進王御船至中流膠液船解王沒水中東遷避逼周平王東遷雒邑以避戎㓂禋祀闕如郊畿不守此乃陵夷之漸有累於封建焉累去聲暴秦運距閏餘數終百六秦世為閏餘百六為周之阨數也漢王莾傳云餘分閏位陽九之阨百六之㑹謂莾為閏位百六為漢之阨數也律厯志曰易九戹曰初入元百六注易爻有九六七八百六與三百七十四六乗八之數也六八四十八合為四百八十歲也受命之主徳異禹湯繼世之君才非啟誦啟夏禹之子誦周武王之子成王也借使李斯王綰之輩咸開四履李斯王綰皆秦丞相四履為諸侯而有四方所履踐之界也將閭子嬰之徒俱啟千乗將閭秦公子為二世所殺子嬰始皇之孫趙高立為秦王後殺高降漢千乗諸侯之國其地可出兵車千乗者也豈能逆帝子之勃興抗龍顔之基命者也漢髙祖應赤帝子之䜟隆凖而龍顔然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯五服者甸侯綏要荒也虞夏制王城之外四靣各五百里曰甸服甸服外又各五百里曰侯服侯服外又各五百里曰綏服綏服外又各五百里曰要服要服外又各五百里曰荒服周制乃分其五服為九見周禮王畿千里之間俱為采地周制天子畿内之地方千里詩曰邦畿千里是也采地者天子之卿大夫邑地也是則以結繩之化行虞夏之朝易大傳曰上古結繩而治後世聖人易之以書契此言雖虞夏之時已不可行上古之法也用象刑之典治劉曹之末虞書曰象以典刑象如天之垂象以示人而典者常也劉漢之姓曹魏之姓言漢魏之時又豈可以帝世之法而為治也紀綱㢮紊斷可知焉鍥船求劍未見其可鍥音刻呂氏春秋曰楚人有涉江其劍自舟中墜於水遂刻其舟曰是吾劍所墜水也舟已行而劍不行若此求劍而不其惑乎膠柱成文彌多所惑楊子曰以往聖之法治將來譬猶膠柱而調瑟徒知問鼎請隧有懼霸王之師左傳宣公三年楚子觀兵于周疆定王使王孫滿勞之楚子問鼎之大小輕重對曰在徳不在鼎僖公二十五年晉侯朝王王享之請隧弗許曰王章也未有代徳而有二王亦叔父之所惡也白馬素車無復藩維之援漢高祖初至霸上使人約降秦王子嬰繫頸以組白馬素車奉天子璽符降軹道旁而降不悟望夷之釁秦相趙高弑二世望夷宫未堪羿浞之災羿音刈浞夏帝相既立后羿有窮氏篡位帝相徙商邱羿躭于畋獵信用寒浞浞後殺羿自立為帝因羿之室生子奡奡弑帝相夏之貴臣殺浞後滅奡立帝相子是為少康既罹髙貴之殃罹音離魏高貴鄉公名髦文帝之孫嗣明帝位六年司馬昭擅政遂勒兵誅昭而敗為昭黨所弑寧異申繒之酷周幽王嬖褒姒而廢申后立褒姒之子伯服而黜太子申侯怒與繒及犬戎殺王驪山下此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸㣲始自藩屏音餅詩曰价人維藩大邦為屏化為仇敵家殊俗國異政强陵弱衆暴寡疆場彼此干戈侵伐狐駘之役女子盡髽莊華切髽麻髪合結也左傳襄公四年邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘國人逆䘮者皆髽魯於是乎髽禮記曰魯婦人髽而弔崤陵之師隻輪不反公羊傳僖公二十二年晉人及姜戎敗秦師于殽匹馬隻輪無反者斯蓋略舉一隅其餘不可勝數上平聲下上聲陸士衡名機晉吳郡人以聖王經國義在封建著五等諸侯論方規規然云嗣王委其九鼎凶族據其天邑嗣王謂周惠王襄王悼王也委九鼎謂三王棄國出奔也凶族謂王子頽王子帶王子朝也據天邑謂三子據國僭位也天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循良之才膺共治之寄刺舉分竹何世無人漢文帝初與郡守為銅虎符當發兵遣使者至郡合符乃聽受之以代古之圭璋分竹亦其義也至使地或呈祥天不愛寶前漢黄霸為潁川太守政化大行嘉禾生鳳凰集後漢秦彭為潁川太守有甘露嘉禾鳳麟之瑞民稱父母讀曰甫牡前漢召信臣為河南太守視民如子號曰召父後漢杜詩為南陽太守為政清平民為之語曰前有召父後有杜母政比神明後漢孟嘗為合浦太守郡産珠先守多貪珠徙交趾人物無資嘗至革前弊去珠復還百姓反業謂為神明曹元首魏人上六代論感悟曹爽方區區然稱與人共其樂者樂音洛後同人必憂其憂與人同其安者人必拯其危豈容以為侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉其門資忘其先業之艱難輕其自然之崇貴莫不世增滛虐代益驕侈離宫别舘切漢淩雲或刑人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徴舒徴平聲左傳宣公九年陳靈公與孔寧儀行父通于夏姬十年公與二人飲酒于夏氏公謂行父曰徴舒似汝對曰亦似君徴舒病之公出自其廐而殺之二子奔楚徴舒夏姬之子也衛宣則父子聚麀終誅壽朔麀音幽牝鹿也聚麀謂無禮也衛宣公納子伋之妻是為宣姜生壽及朔朔與宣姜愬伋於公公令伋之齊使賊先待於隘而殺之壽知之以告伋伋曰君命也不可逃壽竊其節先往賊殺之伋至曰君命殺我壽何罪賊又殺之國人哀之作二子乗舟之詩壽朔當作伋壽乃云為已思治豈若是乎為去聲後同内外羣官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸禄不入私門後漢楊秉為豫章太守清儉計日受禄餘俸不入私門妻子不之官舍後漢闕每為鉅鹿太守何並為潁川太守之官妻子不入官舍班條之貴食不舉火後漢左雄為冀州刺史在任不舉煙火常食乾飯剖符之重居惟飲水晉鄧攸為吳郡太守載米居官惟飲吳水而已南陽太守弊布裹身後漢羊續為南陽太守常敝衣薄食妻子資藏布衾敝袛裯而已萊蕪縣長凝塵生甑長音掌後漢范丹為萊蕪縣令家貧里歌曰甑中生塵范史雲釡中生魚范萊蕪專云為利圖物何其爽歟總而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚知所辨安可惑哉至如滅國弑君亂常干紀春秋二百年間略無寧歲春秋始魯隱公元年終哀公十四年凡二百四十二年言二百者舉大數也次睢咸秩遂用玉帛之君睢音綏左傳僖公十九年宋公使邾文公用鄫子於次睢之社睢水名此水受汴入泗有妖神東夷祀之鄫子小國之君乃殺而祭之非禮也魯道有蕩毎等衣裳之㑹魯道有蕩詩載驅篇之辭按春秋魯桓公夫人姜氏會齊侯者几六故齊人作是詩以刺文姜來會齊襄公也縱使西漢哀平之際前漢都長安故曰西漢哀帝名欣定陶恭王之子平帝名衎中山孝王之子皆元帝之庶孫東洛桓靈之時後漢都洛陽故曰東洛桓帝名志章帝曾孫靈帝名宏章帝𤣥孫下吏滛暴必不至此為政之理為如字後同可以一言蔽焉伏惟陛下握紀御天膺期啟聖救億兆之焚溺掃氛祲於寰區創業垂統配二儀以立徳發號施令施平聲妙萬物而為言獨照神衷永懷前古將復五等而修舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯乖況晉氏失馭㝢縣崩離晉司馬氏初受魏禪後遜于宋後魏乗時華夷雜處乗平聲後魏拓拔氏本北夷種改姓元氏重以闗河分阻吳楚懸隔重平聲習文者學長短從横之術從音蹤習武者盡干戈戰争之心畢為狙詐之階彌長澆浮之俗長音掌開皇在運開皇隋文帝年號因藉外家驅御羣英任雄猜之數坐移明運非克定之功年踰二紀人不見徳文帝在位二十四年及大業嗣立大業煬帝年號世道交䘮一人一物掃地將盡雖天縱神武削平㓂虐兵威不息勞止未康自陛下仰順聖慈嗣膺寶厯情深致理綜覈前王雖至道無名言象所紀略陳梗槩實所庶幾平聲愛敬烝烝勞而不倦大舜之孝也虞書稱舜曰克諧以孝烝烝乂不格姦訪安内豎親嘗御膳文王之徳也禮記曰文王之為世子朝於王季日三鷄初鳴而衣服至寢門外問内䜿之御者曰今日安否何如曰安文王乃喜日中又至亦如之及莫又至亦如之食上必在視寒煖之節食下問所饍毎憲司讞罪尚書奏獄大小必察枉直咸舉以斷趾之法易大辟之刑仁心隱惻貫徹幽顯大禹之泣辜也讞音碾議也説苑曰禹出見罪人下車問而泣之左右曰罪人不順道何為痛之禹曰堯舜之民皆以堯舜之心為心寡人之民各自以其心為心是以痛之正色直言虛心受納不簡鄙訥無棄芻蕘帝堯之求諫也訥當作陋虞書曰稽于衆舍己從人𢎞獎名教勸勵學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也相去聲論語曰夫子循循然善誘人羣臣以宫中暑濕寢饍或乖請移御高明營一小閣遂惜十家之産竟抑子來之願不􅈔陰陽之感以安卑陋之居頃歲霜儉普天饑饉䘮亂甫爾倉廩空虛聖情矜愍勤加賑恤竟無一人流離道路猶且食惟藜藿樂徹簨虡上音筍下音巨縣鐘鼔之具也皆以木為之横曰簨縱曰虡言必悽動貌成癯瘦公旦喜於重譯重平聲旦周公名史記曰交趾之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝文命矜其即敘文命史記以為禹名夏書曰織皮崑崙析支渠捜西戎即敘即就也言雍州水土既平而餘功及於西戎也陛下每見四夷􅅃附萬里歸仁必退思進省悉井切凝神動慮恐妄勞中國以求逺方不藉萬古之英聲以存一時之茂實心切憂勞志絶遊幸毎旦視朝音潮聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非論平聲備盡肝膈惟及政事更無異辭纔日昃必命才學之士賜以清閒高談典籍雜以文詠間以𤣥言間去聲乙夜忘疲太宗嘗曰若不甲夜視事乙夜讀書何以為人君中宵不寐此之四道獨邁往初斯實生民以來一人而已𢎞兹風化昭示四方信可以朞月之間彌綸天壤而淳粹尚阻浮詭未移此由習之乆難以卒變卒音猝請待斵雕成器以質代文刑措之敎一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虛與時消息况於人乎易豐卦彖𫝊之辭美哉斯言也中書舍人馬周又上疏曰伏見詔書令宗室勲賢令平聲作鎮藩部貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重之欲其緒裔承守與國無疆可使世官也何則以堯舜之父猶有朱均之子堯之子曰丹朱舜之子曰商均皆不肖況下此以還而欲以父取兒恐失之逺矣儻有孩童嗣職萬一驕逸則兆庶被其殃而國家受其敗政欲絶之也則子文之理猶在子文楚令尹姓鬭名榖於莵其孫克黄使齊復命自拘於司㓂王思子文之治曰子文無後何以勸善使復其官政欲留之也而欒黶之惡已彰黶音黯欒姓黶名晉大夫武子之子也晉士鞅曰欒黶汰虐已甚猶可以免其在盈乎黶死武子所施沒矣而黶之怨實章後盈見逐盈黶之子也與其毒害於見存之百姓見音現則寧使割恩於已亡之一臣明矣然則嚮之所謂愛之者乃適所以傷之也臣謂宜賦以茅土古者天子以五色土為壇封諸侯取其方土苴以白茅授之使立社於其國疇其户邑必有材行去聲隨器方授則翰翮非强亦可以獲免尤累良偽切昔漢光武不任功臣以吏事所以終全其世者良由得其術也願陛下深思其宜使夫音扶得奉大恩而子孫終其福禄也太宗並嘉納其言於是竟罷子弟及功臣世襲刺史按通鑑貞觀五年上令羣臣議封建魏徴以為若封建則卿大夫咸資俸禄必致厚歛又京畿賦税不多所資畿外若盡封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵内地難以奔赴李百藥云云顔師古以為不若分王宗子勿令過大間以州縣雜錯而居互相維持各守其境協力同心足扶京室為置官寮皆省司選用法令之外不得擅作威福朝貢禮儀具為條式一定此制萬代無虞十一月詔宗室勲賢作鎮藩部云云十三年二月于志寧以為古今事殊恐非乆安之道上疏争之馬周亦上疏云云會長孫無忌等皆不願上表固讓稱承恩以來形影相弔若履春冰宗室憂虞如寘湯火緬惟三代封建蓋由力不能制因而利之禮樂節文多非已出兩漢罷侯蠲除曩弊深協事宜今因臣等復有變更恐紊聖朝綱紀且後世愚㓜不肖之嗣或抵冒邦憲自取誅夷更因延世之賞致成勦絶之禍良可哀愍願停渙汗之㫖賜其性命之恩又因子婦長樂公主固請於上且言臣等披荆棘事陛下今海内寧一奈何棄之外州與遷徙何異上曰割地以封功臣古今通義意欲公之後嗣輔朕子孫共傳永乆而公等乃復發言怨望朕豈强公等以茅土耶詔停世封刺史與此章所紀年歲不同今備録于此亦以見唐世議封建之始末云范氏祖禹曰柳宗元有言曰封建非聖人意也勢也蓋自古以來有之聖人不得而廢也周室既衰併為十二列為六七而封建之禮已亡秦滅六國以為郡縣三代之制不可復矣必欲法上古而封之弱則不足以藩屏彊則必至於僭亂此後世封國之弊也况諸侯之後嗣或賢或不肖而必使之繼世是以一人而害一國也然則如之何記曰禮時為大順次之三代封國後世郡縣時也因時制宜以便其民順也古之法不可用於今猶今之法不可用於古也後世如有王者親親而尊賢務徳而愛民慎擇守令以治郡縣亦足以致太平而興禮樂矣何必如古封建乃為盛哉胡氏寅曰太宗嘗讀周官書辨方正位體國經野設官分職以為民極之言慨然歎曰不井田不封建不足以法三代之治詔羣臣議封建其本於此乎夫封建與天下共其利天道之公也郡縣以天下奉一人人欲之私也魏徴蓋未嘗詳考古制鹵莾甚矣而近世蘇范二氏亦謂封建不可行始皇李斯柳宗元之論聖人不能易也嗚呼豈其然哉宗元之言曰封建非聖人意也勢也誠使上古諸侯以為民害聖人不得已而存之則唐虞之際洪水懐襄民無所定武王周公誅紂伐奄滅國五十皆天下之大變也此數聖人不能因時之變更立制度以為郡縣乃畫壤列土修明侯甸之法何哉宗元又曰徳在人者死必奉其嗣故封建非聖人意也勢也夫為其徳之不可忘是以憫其絶此仁之至義之盡而出於人心之固然者固非聖人之私意而歸之勢可乎宗元又曰諸侯國亂天子不得變其君夫孟子所言貶國削地六師移之之法皆先王之制也烏在其不改變乎漢不能制侯王未萌之惡及大逆不道然後勒兵夷之此非三代故事自漢之失爰盎固言之矣豈可舉此以例禹湯文武所為哉方三代盛時諸侯或自其國入為三公王室有難諸侯或釋位以間王政至其衰也五伯雖彊大猶且攘夷狄以尊戴天下之共主凡若此類宗元皆略而不稱乃摘取衰微禍亂之一二欲舉封建而廢之是猶見刖者而欲廢天下之屨也宗元又曰湯資三千諸侯以黜夏武資八百諸侯以翦商故不敢變易也是聖人於未舉兵之前要結衆力及成功之後姑息茍安此六國五代庸主之所行而謂湯武為之乎宗元又曰封建非公之大者公天下自秦始夫謂三代聖王無公心以封建自私是伯夷而為盗跖之事也謂秦無私意以郡縣公天下是飛亷而有比干之忠也一何不𩔖之甚歟宗元又曰諸侯繼世而立又有世大夫食禄采地以盡其封域雖聖賢生于其時無以立于天下天子聖明公卿必得其人諸侯不敢越亂法度世固多賢也而又有鄉舉里選之法有明明側陋之揚何患乎材之不用也若上無明君下無賢臣如周之衰秦之季漢魏隋唐之時在位者無非小人而興邦之良佐悉沈于民伍不見庸也雖守宰徧宇内將何救於此故凡宗元封建論皆無稽而不可信也夫為君如堯舜禹湯亦足矣帝王之治至於唐虞三代亦無以加矣井天下之田使民各有以養其生經天下之國使賢才皆得以施其用人主自治不過千里大小相維輕重相制外無强暴侵陵㣲弱不立之患内無廣土衆民奢泰恣肆之失是以義處利均天下之施故曰封建之法天下之公也若秦則妬民之兼并而自為兼并筦天下之私以自奉故曰郡縣之制人欲之私也或曰然則封建今可行乎曰何獨封建也二帝三王之法孰不可行者在人而已矣然欲行封建先自井田始范子亦惑於宗元謂今日之法不可用於古猶古之法不可用於今夫後世之私意妄為固不可行於古而為天下者不以二帝三王善政良法為則則又何貴於稽古哉愚按封建古先哲王公天下之良法美意也後世言治者何敢妄議哉自秦罷侯置守之後田制學制皆非古矣由漢以下封建郡縣參錯若漢七國晉八王挻禍尤甚其間悖逆自恣負强梗化者不可勝數而維垣維翰者亦復不少然終不若郡縣臂指運掉之為得於是封建是非之論興焉河南程子曰有闗雎麟趾之意然後可行周官之法度後世無古先哲王治天下之本而用古先哲王治天下之具宜致然也豈封建之失哉愚不揆竊謂栁宗元之論固難盡非而謂封建非聖人意謂公天下自秦始此誠為過不以盛時封建之美處為言而以李世之弊處為説此誠為偏若胡氏以井田封建可行於後世則亦未敢以為知言也封建井田兆於黄帝畫埜分州綿厯幾代大備於周豈一朝夕之故哉居今之世出宗室而分王之取民田而井疆之紛紜轇轕何能有定故以封建為非者昧於古之實也以封建為是者泥於古之名也盍曰彼三代而上之事勢此三代而下之事勢去古既逺權時施宜郡縣不可易也惟當精擇守令拔其有治平之績者加秩而乆任之登進而激勸之體古先哲王之美意而行後世之良法可也毋庸曰不井田不封建不足以為治貞觀政要卷三欽定四庫全書貞觀政要卷四唐吳兢撰元戈直集論太子諸王定分第九凡四章貞觀七年授吳王恪齊州都督太宗謂侍臣曰父子之情豈不欲常相見耶但家國事殊須出作藩屏且令其早有定分令平聲分去聲凡言定分並同絶覬覦之心我百年後使其兄弟無危亡之患也按史傳恪初王欝林貞觀十年始改王吳授安州都督帝賜書曰汝惟茂親勉思所以藩王室以義制事以禮制心外為之君臣内為之父子今當去膝下不遺汝珍而遺汝以言其念之哉帝後以晉王為太子又欲立恪長孫無忌固争帝曰公豈以非已甥邪且恪英果𩔖我無忌曰晉王仁厚守文之良主且舉棊不定則敗況儲位乎帝乃止愚按是時承乾方處東宮凶德未著太宗出吳王使居藩屏欲其早有定分可謂處之盡其道矣其後既立晉王又欲立恪卒陷恪於死地何始終之矛盾邪竊嘗論之漢高祖之欲易惠帝唐太宗之欲易高宗皆為宗廟社稷之逺圖初不可以尋常嫡庶之禮槩論之也合二君之事而觀之則太宗之事近正何也漢高祖之欲易太子是也其欲立趙王則出於溺愛之私矣子房之不立如意是也然遂引致四皓擁䕶太子以成呂氏之禍杜牧所謂四老安劉反為滅劉者其可不寒心哉故朱子謂高祖若能以天下大計為心則蚤與張陳陵勃謀之以恒易盈可也若吳王恪之在當時内不聞其母有戚姬嬖愛之私外不聞恪有魏王奪嫡之計太宗深知高宗之懦弱不足以承宗廟之重故以社稷大計問之無忌無忌外雖為正大之論内實懷外家之私其後卒以無辜陷恪死地無忌之罪上通於天矣失以恪之英才幸而嗣聖之際尚存庶幾匡正唐室不致牝晨之禍如此其烈也豈不悲哉然則太宗之事賢於高祖無忌之心則真子房之罪人矣貞觀十一年侍御史馬周上疏曰漢晉以來諸王皆為樹置失宜為去聲不預立定分以至於滅亡人主熟知其然但溺於私愛故前車既覆而後車不改轍也今諸王承寵遇之恩有過厚者臣之愚慮不惟慮其恃恩驕矜也昔魏武帝寵樹陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王從而畏之也魏武帝曹操也操生四子丕彰植熊丕文帝也植陳思王也植多藝能操愛之文帝既立植寵日衰後以悖慢貶安鄉侯後進王東阿此則武帝之寵陳思適所以苦之也且帝子何患不富貴身食大國封戸不少好衣美食之外更何所須而毎年别加優賜曾無紀極曾音層俚語曰俚音里俚語猶云俗諺也貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已處上聲見音現當須制長乆之法使萬代遵行疏奏太宗甚嘉之賜物百段唐氏仲友曰太宗制古之所不制臣古之所不臣而獨牽於私欲不能自克於嫡庶之際不為逺處竟使賢才宗支連頸就戮周實有先見之明惜哉言之不力愚按周官有王世子不會之文王之衆子不與焉夫先王愛子之心豈不欲其周徧哉葢所以别嫌疑明嫡庶絶覬覦息禍亂也隋文帝既立勇為太子又使晉漢秦蜀四王各據方面恩寵相埒且誇示於人曰前代兄弟相爭者由嫡庶之分也今吾五子同母何憂禍亂哉其後五子互相攘奪無一人得令終者至今為天下笑太宗目覩隋室之禍宜知所鑒矣既立承乾為太子復寵待諸王無所高下馬周窺見禍亂之端亟以為言太宗雖能嘉賞迄不能改愚觀太宗毎事以隋為鑒獨於諸王定分而忘之豈所謂溺愛者不明耶貞觀十三年諌議大夫褚遂良以毎日一作月特給魏王泰府料物有逾於皇太子上疏諫曰昔聖人制禮尊嫡卑庶謂之儲君儲音除副也太子君之副故謂之儲君道亞霄極甚為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本於人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正禮特須尊崇如不能明立定分遂使當親者疎當尊者卑則佞巧之徒乗機而動私恩害公或至亂國伏惟陛下功超萬古道冠百王冠去聲發施號令施平聲為世作法為去聲一日萬幾或未盡美臣職諫諍無容靜黙伏見儲君料物翻少魏王朝野見聞不以為是臣聞傳曰傳去聲愛子敎以義方忠孝恭儉義方之謂昔漢竇太后及景帝並不識義方之理遂驕恣梁孝王封四十餘城苑方三百里大營宫室複道彌望積財鏹巨萬計出警入蹕小不得意發病而死鏹舉兩切貫錢索也蹕音畢天子出稱警入稱蹕竇太后漢文帝之后生景帝及梁王王名武諡曰孝事見本傳宣帝亦驕恣淮陽王幾至於敗賴其輔以退讓之臣僅乃獲免幾平聲淮陽王名欽漢宣帝庶子也諡曰憲事見本傳且魏王既新出閤伏願恒存禮訓妙擇師傅示其成敗既敦之以節儉又勸之以文學惟忠惟孝因而奬之道德齊禮論語曰道之以德齊之以禮有恥且格乃為良器此所謂聖人之敎不肅而成者也太宗深納其言陳氏惇修曰甚哉太宗之不善為父也所以啟泰之邪心者太宗也非泰之罪也太宗既立承乾為太子而所以眷眷於泰而寵錫之者其禮乃過於承乾其理何邪是時雖未嘗許泰為太子而禮數優異則立泰之意固已見於不言之間矣然則寧免泰之無覬覦而不以計傾承乾者乎及其邪心既啟然後從而裁抑之既幽之復降之是何異誘其入而復閉其門不亦惑乎愚按古者不以私恩害公義故嫡長之重衆子雖愛不得而並焉所以明尊卑之等杜僭忒之源也太宗以聰明之君而於太子魏王之事獨不能定其分異其禮雖深納遂良之言而私愛之心終不能自克卒至於兩廢焉其亦可監也夫貞觀十六年太宗謂侍臣曰當今國家何事最急各為我言之為去聲後為朕同尚書右僕射高士廉名儉以字行初秦王薦為治中王為皇太子授右庶子既即位為吏部尚書封許國公後遷僕射攝太傅掌機務二十一年卒曰養百姓最急黄門侍郎劉洎曰撫四夷急中書侍郎岑文本曰傳稱道之以徳齊之以禮義為急傳去聲諌議大夫褚遂良曰即日四方仰徳不敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫遺去聲此最當今日之急太宗曰此言是也朕年將五十已覺衰怠既以長子守器東宫長音掌諸弟及庶子數將四十心常憂慮在此耳但自古嫡庶無良何嘗不傾敗家國公等為朕捜訪賢德以輔儲宫爰及諸王咸求正士且官人事王不宜歲乆歲乆則分義情深非意闚􅎿分去聲闚音窺􅎿音俞窺伺貌多由此作其王府官寮勿令過四考令平聲唐氏仲友曰太宗不知溺愛之在巳獨欲責之保傅王者又令王府官不得過四考何也彼誠賢者雖終身而未足誠不賢一日猶不可况四考乎愚按國家急務養百姓也撫四夷也道徳齊禮也若高士廉劉洎岑文本之言皆急務也而褚遂良則以太子諸王須有定分為當今之急考其時承乾之惡已著魏王泰窺伺之情頗露漢王元昌同惡之迹益彰遂良之言宜其為急務也非以養百姓撫四夷道徳齊禮為不急也太宗不思所以正定分而責備於人抑末矣且踰年而有東宫之變矣方且曰公等為朕捜訪賢徳以輔儲宫又何益之有哉尊敬師傅第十凡六章貞觀三年太子少師少去聲李綱字文紀觀州人始名瑗慕張綱為人改焉仕隋為太子洗馬擢尚書右丞隋末賊帥何潘仁刼為長史高祖平京師綱上謁既受禪拜禮部尚書太子詹事諫建成不聽遂乞骸骨貞觀初拜是職五年卒諡曰貞有脚疾不堪踐履太宗賜步輿令三衛轝入東宫令平聲唐制東宫六率府分為上中下三等掌宿衛之事是為三衛詔皇太子引上殿親拜之大見崇重綱為太子為去聲陳君臣父子之道問寢侍膳之方見封建篇註理順辭直聽者忘倦太子嘗商略古來君臣名教竭忠盡節之事綱懔然曰懍音凜嚴毅貌託六尺之孤寄百里之命論語曽子之言謂輔幼君攝國政也古人以為難綱以為易以豉切毎吐論發言皆辭色慷慨有不可奪之志太子未嘗不聳然禮敬愚按世子為王之貳天下之本也太宗即位之後蚤建太子以固天下之本而嚴太子尊敬師傅之禮稽之古典允合其宜李綱少慷慨有風節故其發言吐論辭色毅然宜皇儲之所禮敬也古人謂一心可以事百君者綱之謂歟貞觀六年詔曰朕比尋討經史比音鼻明王聖帝曷嘗無師傅哉前所進令遂不覩三師之位意將未可何以然黄帝學大顚顓頊學録圖堯學尹壽一作君疇舜學務成昭禹學西王國湯學威子伯文王學子期武王學虢叔已上出劉向新序前代聖王未遭此師則功業不著乎天下名譽不傳乎載籍况朕接百王之末智不同聖人其無師傅安可以臨兆民者哉詩不云乎不愆不忘率由舊章詩大雅嘉樂篇之辭夫不學則不明古道夫音扶而能政致太平者未之有也可即著令置三師之位按史志隋廢三師貞觀十一年復置與三公皆不設官屬愚按周書曰立太師太傅太保曰三公論道經邦燮理陰陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地豈易其人哉若論其極必臯䕫稷契伊傅周召而後可世變無窮隨世升降可也唐以太師太傅太保為三師天子所師法無所總職太尉司徒司空為三公佐天子理陰陽平邦國無所不統此則非古制也以太宗之時固皆元勲碩徳居之制雖殊古而名意則同降此則為加官視品秩崇髙耳豈皆其人哉人君欲稽古以正名茍捨周官愚未見其可也貞觀八年太宗謂侍臣曰上智之人自無所染但中智之人無恒從教而變况太子師保古難其選成王幼小周召為保傅賈誼曰成王幼在襁抱之中召公為太傅周公為太保保保其身體傳傅之徳義左右皆賢日聞雅訓足以長仁益徳長音掌使為聖君秦之胡亥用趙髙作傅教以刑法及其嗣位誅功臣殺親族酷暴不已旋踵而亡胡亥秦二世名初始皇使趙高教胡亥决獄胡亥幸之及嗣位高説曰陛下嚴法而刻刑令有罪者相坐誅滅大臣宗室盡除先帝之故臣更置陛下之所親信二世乃更為法律大臣公子有罪輙誅二世卒為髙所弑故知人之善惡誠由近習朕今為太子諸王為去聲精選師傅令其式瞻禮度令平聲有所禆益公等可訪正直忠信者各舉三兩人愚按太子國家之根本也諸王公族之枝葉也根本安固枝葉茂盛永孚于休則開導而訓告之豈不在師傅乎然三代尚矣自漢以來未嘗不切切於嚴師傅也而諸王之賢求如河間東平何不多見夫世禄之家鮮克由禮以蕩陵徳實悖天道况崇高之上者乎為君父者尚慎于兹貞觀十一年以禮部尚書王珪兼為魏王師唐因隋制皇叔昆弟皇子為親王者置師掌傳相訓導匡其過失太宗謂尚書左僕射房𤣥齡曰古來帝子生於深宫及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲皆得安全王珪我乆驅使甚知剛直志存忠孝選為子師卿宜語泰毎對王珪如見我面宜加尊敬不得懈怠珪亦以師道自處上聲時議善之也胡氏寅曰為人師者豈徒禮貌云乎哉必有道以授人而道以人倫為至魏王泰是時承寵偏厚於兄弟間漸生異慮防其㣲而革其心不於師而誰望而王珪告戒之方教訓之道未之聞也魏王卒以窺伺儲位廢斥而死夫豈獨泰之罪哉珪亦與有責矣愚按太宗以王珪為魏王師且諭𤣥齡以嚴教之意可謂得人矣然嘗觀太宗愛泰之心甚至固父子之情也乃詔即府置文館得自引博士蘇於是勗勸泰延賔客著書如古賢王奏撰括地志士有文學者多與而貴游因藉其門如市泰之月禀又過太子逺甚褚遂良亦以為言其後卒有奪嫡之罪竟罹幽貶夫傚古賢王著書必如河間東平而後可也且漢武帝為戾太子立博望苑使通賓客識者非之今泰諸王也使之置館引賓客私權勢其毋乃與所謂嚴教之意異歟貞觀十七年太宗謂司徒長孫無忌司空房𤣥齡曰三師以徳道人者也若師體卑太子無所取則於是詔令平聲撰太子接三師儀注太子出殿門迎先拜三師三師答拜毎門讓三師三師坐太子乃坐與三師書前名惶恐後名惶恐再拜愚按太宗制太子接三師儀注委曲尊隆意亦至矣師嚴然後道尊况元良而屈體盡敬於師傅其闗繫豈不尤重也然嘗觀賈誼引大戴記之言於政事書曰師道之教訓保保其身體傅傅之徳義於是為置三少皆上大夫也三公三少固明孝仁禮義以道習之入學則承師問道退習而考於太傅太傅罰其不則而匡其不及此古昔太子親師傅之實也又不止於儀注之文而已為君父者不可不考於賈誼之書貞觀十八年髙宗初立為皇太子貞觀十七年四月立晉王治為皇太子是為髙宗尚未尊賢重道太宗又嘗令太子令平聲後同居寢殿之側絶不往東宫散騎常侍劉洎上書曰臣聞郊迎四方孟侯所以成徳月令天子立春迎春於東郊立夏迎夏於南郊立秋迎秋於西郊立冬迎冬於北郊按此非王世子之事或曰周制東西南北之學在於四郊孟長也孟侯謂世子也此説於成徳為切迎字疑誤齒學三讓元良由是作貞文王世子行一物而三善皆得者其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓曰有父在則禮然然而衆知父子之道矣二曰君在則禮然而衆著於君臣之義矣三曰長長也然而衆知長幼之節矣故父子君臣長幼之道得而國治禮曰一有元良萬邦作貞斯皆屈主祀之尊主祀一作嗣主申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由兹道永固鴻基者焉至若生乎深宫之中長乎婦人之手長音掌未曾識憂懼曾音層無由曉風雅雖復神機不測天縱生知而開物成務終由外奬匪夫崇彼干籥夫音扶後同籥音約于舞者所執之楯也籥樂管以竹為之三孔長三尺以和衆聲者也聽兹謡頌何以辨章庶類甄覈彛倫甄音珍厯考聖賢咸資琢玉學記玉不琢不成器人不學不知道是故周儲上哲師望奭而加裕周儲謂成王也望太公號奭召公名成王以二公為師保漢嗣深仁引園綺而昭徳漢嗣謂惠帝盈也高祖欲廢太子盈張良教太子迎四皓髙祖置酒太子侍四皓從皆年八十餘上曰煩公幸卒調䕶太子既去上目送之曰彼四人為之輔羽翼已成難動矣卒不廢四皓東園公綺里季夏黄公甪里先生也原夫太子宗祧是繫善惡之際興亡斯在不勤于始將悔于終是以鼂錯上書令通政術鼂音潮錯音措漢文帝時鼂錯為太子舍人遷博士上書曰人主所以尊顯功名揚於萬世者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海内必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之賈誼獻䇿務知禮教賈誼雒陽人漢文帝時為梁懷王傅丄書曰古之王者太子迺生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教已行矣竊惟皇太子玉裕挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天姿非勞審諭固以華夷仰徳翔泳希風矣然則寢門視膳已表於三朝音潮事見封建篇註藝宫論道宜𢎞於四術王制樂正崇四術立四教順先王詩書禮樂以造士雖富於春秋飭躬有漸實恐歲月易往易以豉切墮業興譏取適晏安言從此始臣以愚短幸叅侍從去聲思廣儲明暫願聞徹不敢曲陳故事切請以聖徳言之伏惟陛下誕叡膺圖登庸厯試多才多藝道著於匡時允文允武功成於纂祀萬方即敘九圍清晏尚且雖休勿休日慎一日求異聞於振古勞叡思於當年思去聲後同乙夜觀書事髙漢帝漢紀光武講論經理夜分乃寐馬上披卷勤過魏王魏紀文帝雖在軍旅手不釋卷陛下自勵如此而令太子優游棄日不習圖書臣所未諭一也加以暫屏機務屏音餅棄也即寓雕蟲揚子曰或問吾子少而好賦曰童子雕蟲箓刻壯夫不為也紆寶思於天文則長河韜映摛玉華於仙札摛音癡則流霞成彩固以錙銖萬代錙音淄銖音殊十黍為絫十絫為銖十銖為錙冠冕百王屈宋不足以升堂屈原名平楚懐王時為大夫作離騷經為詞賦之祖宋玉屈原弟子楚大夫以詞賦名鍾張何階於入室鍾繇字元常魏太尉善草書張芝字伯英後漢太尉臨池學書池水盡黒時稱草聖陛下自好如此好去聲而太子悠然静處上聲不尋篇翰臣所未諭二也陛下備該衆妙獨秀寰中猶晦天聰俯詢凡識聽朝之隟與隙同引見羣官降以温顏訪以今古故得朝廷是非閭里好惡凡有巨細必闗聞聽陛下自行如此而令太子乆趨入侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥詩曰貽厥孫謀蔑而不急未見其可伏願俯推叡範訓及儲君授以良書娛之嘉客朝披經史觀成敗於前蹤晩接賔遊訪得失於當代間以書札間去聲繼以篇章則日聞所未聞日見所未見副徳愈光羣生之福也竊以良娣之選徧於中國仰惟聖㫖本求典内冀防㣲慎逺慮臣下所知暨乎徴簡人物徴平聲則與聘納相違監撫二周監平聲監撫謂監國撫軍也未近一士愚謂内既如彼外亦宜然者恐招物議謂陛下重内而輕外也古之太子問安而退所以廣敬於君父異宮而處上聲所以分别於嫌疑别彼列切今太子一侍天闈動移旬朔師傅已下無由接見假令供奉有隟供平聲暫還東朝拜謁既疎且事俯仰規諫之道固所未暇陛下不可以親教宫寀無因以進言寀音采寮屬也雖有具寮竟將何補伏願俯循前躅音燭跡也稍抑下流𢎞逺大之規展師友之義則離徽克茂帝圖斯廣凡在黎元孰不慶賴太子温良恭儉聰明叡哲含靈所悉臣豈不知而淺識勤勤思効愚忠者願滄溟益潤日月增華也太宗乃令洎與岑文本馬周遞日往東宮與皇太子談論按通鑑此疏係十七年又按髙宗諫誅穆裕太宗歸功洎等事在十八年則洎上此疏當在十七年唐氏仲友曰劉洎此疏足見其為剛直果敢之士太宗以太子諌誅穆裕歸功諌臣則洎接正人聞正論之説驗矣惜太子不足有為也又曰古之制命士以上父子異宮意甚深矣易子而教責善則離還東宮近師傳之諫當矣愚按太子承乾既廢晉王治初立之後劉洎此疏條陳詳悉誠教世子之至善也太宗以洎言令洎與岑文本馬周逓日往東宮談論可謂得人矣夫修身正家之道敬大臣體羣臣親君子逺小人之要未必不見於談論也出震繼明不旋踵而背之卒基唐家之禍於不忍言其氣化人事之相符乎抑所以輔翼之具未至耶教戒太子諸王第十一凡七章貞觀七年太宗謂太子左庶子于志寧字仲謐京兆人貞觀三年為中書侍郎遷左庶子上諫苑俄兼詹事晉王為皇太子復拜左庶子杜正倫曰卿等輔導太子常須為説為去聲後為説同百姓間利害事朕年十八猶在人間百姓艱難無不諳練及居帝位毎商量處置量平聲處上聲或時有乖疎得人諌諍方始覺悟若無忠諌者為説何由行得好事况太子生長深宮長音掌百姓艱難都不聞見乎且人主安危所繫不可輙為驕縱但出敕云有諌者即斬必知天下士庶無敢更發直言故克已勵精容納諌諍卿等常須以此意共其談説毎見有不是事宜極言切諌令有所禆益也令平聲唐氏仲友曰太宗誠有知子之明其教之亦云篤矣此數語者即周公無逸之書也至謂若詔天下敢諫者死將無復發言此則煬帝有前鑒矣奈何承乾方欲以殺止諌雖百正倫何益哉愚按太宗君臨天下方勵精之初容受直言導人使諌蚤建太子命東宮輔臣極言規正令有所禆益蓋望太子亦如已之從諌其意不亦深切哉惜乎承乾不足以副君父之意貞觀十八年太宗謂侍臣曰古有胎教世子文王之母太任為人端一誠莊惟徳之行及其娠文王目不視惡色耳不聽淫聲口不出傲言生文王而明聖太任教之以一識百卒為周宗而君子謂太任為能胎教朕則不暇但近自建立太子遇物必有誨諭見其臨食將飯謂曰汝知飯乎對曰不知曰凡稼穡艱難皆出人力不奪其時常有此飯見其乗馬乗平聲後同又謂曰汝知馬乎對曰不知曰能代人勞苦者也以時消息不盡其力則可以常有馬也見其乗舟又謂曰汝知舟乎對曰不知曰舟所以比人君水所以比黎庶水能載舟亦能覆舟爾方為人主可不畏懼見其休於曲木之下又謂曰汝知此樹乎對曰不知曰此木雖曲得繩則正為人君雖無道受諌則聖此傅説所言説音悦商書傅説告髙宗曰惟木從繩則正后從諌則聖可以自鑒愚按太宗懲承乾之失徳望儲君之近徳於是遇事必誨其愛儲君者所以愛百姓也將飯而戒則知民生之艱難矣乗馬而戒則知民力之困乏矣乗舟而戒則知民心之無恒矣休曲木而戒則知立身之必從正矣觀前代教誡太子之辭未有切於此者稽之古禮經教世子之道亦不過如是也迨夫高宗臨御其於子庶民猶知所以保養之意惟疎逺老臣失徳宫閫竟忘王業之艱難毋乃雖誨諄諄而聽藐藐乎貞觀七年太宗謂侍中魏徴曰自古侯王能自保全者甚少皆由生長富貴長音掌後同好尚驕逸好去聲多不解音懈親君子逺小人故爾逺去聲後同朕所有子弟欲使見前言往行去聲冀其以為規範因命徴錄古來帝王子弟成敗事名為自古諸侯王善惡録以賜諸王其序曰觀夫音扶後同膺期受命握圖御宇咸建懿親藩屏王室布在方䇿可得而言自軒分二十五子國語黄帝之子二十五人其同姓者二人青陽與夷鼓是也其同生而異姓者十四人别為十二姓姬酉祁已滕箴任荀僖姞儇依是也舜舉一十六族即八元八凱見擇官篇註爰厯周漢以逮陳隋分裂山河大啟磐石者衆矣或保乂王家與時升降或失其土宇不祀忽諸然考其隆替察其興滅功成名立咸資始封之君國䘮身亡多因繼體之后其故何哉始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴以求賢漢楚元王敬禮申公等穆生不嗜酒元王毎置酒嘗為穆生設醴或吐飱而接士周公戒伯禽曰我於天下亦不賤矣然我一沐三握髪一飯三吐哺猶恐失天下之賢人子之魯慎無以國驕人故甘忠言之逆耳家語曰忠言逆耳利於行得百姓之懽心孝經曰治國者不敢侮於鰥寡故得百姓之懽心樹至徳於生前流遺愛於身後暨夫子孫繼體多屬隆平生自深宫之中長居婦人之手不以高危為憂懼豈知稼穡之艱難周書曰相小人厥父母勤勞稼穡難厥子乃不知稼穡之艱昵近小人昵與暱同疎逺君子綢繆哲婦傲狠明徳犯義悖禮滛荒無度不遵典憲僭差越等恃一顧之權寵便懷匹嫡之心矜一事之微勞遂有無厭之望厭平聲棄忠貞之正路蹈姦宄之迷塗宄音鬼書曰冦賊姦宄注在外曰姦在内曰宄愎諌違卜愎音僻往而不返雖梁孝齊冏之勲庸梁孝名武漢文帝子也封梁王七國反先擊梁殺虜有功諡曰孝齊冏姓司馬名冏晉齊王攸子也為大司馬封齊王以功遷游擊將軍淮南東阿之才俊淮南名安漢武帝諸父也封淮南王好書鼓瑟招賓客喜文辭後坐反謀自殺諡曰厲東阿見定分篇注摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功齊桓公晉文公皆春秋諸侯之伯有尊王室匡天下之功就梁董之顯戮梁冀漢桓帝時為大將軍後為反謀冀與妻皆自殺董卓漢獻帝時自為太尉相國作亂被誅夷三族垂為炯戒可不惜乎皇帝以聖哲之資拯傾危之運耀七徳以清六合左傳楚子曰夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章注云此武王七徳之義總萬國而朝百靈懷柔四荒親睦九族九族高祖𤣥曾之親也念華萼於棠棣棠棣詩小雅篇名燕兄弟之樂歌也寄維城於宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑑鏡貽厥孫謀臣輙竭愚誠稽諸前訓凡為藩為翰有國有家者其興也必由於積善其亡也皆在於積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已惟人所召豈徒言哉今錄自古諸王行事得失分其善惡各為一篇名曰諸王善惡錄欲使見善思齊足以揚名不朽聞惡能改能一作知庶得免乎大過從善則有譽改過則無咎興亡是繫可不勉歟太宗覽而稱善謂諸王曰此宜置于座右用為立身之本愚按人性皆善也而惡則豈人之性哉習於善則善習於惡則惡耳况太子諸王乎嘗觀漢諸侯王恪謹以守國者何少放逸以失國者何多今太宗命集往古之事為諸侯王善惡録使知善之足以成名惡之足以滅身昭然可鑒矣然唐室興王之初其諸王如道宗道𤣥孝恭道彦皆相與艱難共成大勲賢徳著聞此善之可稱者也暨有天下之後諸王皆身享富貴福澤順境而䘮徳者何多耶蓋太宗家廷之内恩常揜義訓教之言雖切佩服之心蓋寡毋乃居移氣養移體有以汨其本然之善乎豈人性之惡哉貞觀十年太宗謂荆王元景漢王元昌吳王恪魏王泰等曰自漢已來帝弟帝子受茅土居榮貴者甚衆惟東平及河間王東平王名蒼漢光武子也好經書有智思文稱典雅明帝問處家何事最樂王曰為善最樂諡曰憲河間王名徳漢景帝子也博學有徳武帝時奏對推道術而言得事之中諡曰獻最有令名得保其祿位如楚王瑋之徒瑋音筆楚王瑋晉武帝第五子也元康中掌兵權剛狠好殺因矯詔殺太宰汝南王亮太保衛瓘賈后遂執瑋下廷尉斬之諡曰隱覆亡非一並為生長富貴為去聲後同好自驕逸所致好去聲汝等鑒誡宜熟思之揀擇賢才為汝師友須受其諫諍勿得自專我聞以徳服物信非虛説比嘗比音鼻夢中見一人云虞舜我不覺竦然敬異豈不為仰其徳也向若夢見桀紂必應斫之應平聲桀紂雖是天子今若相喚作桀紂人必大怒顔回閔子騫顔回字子淵閔損字子騫皆孔子弟子以徳行稱郭林宗黄叔度二人皆後漢時高尚之士郭林宗名泰太原人也范滂稱之曰隱不違親身不絶俗天子不得臣諸侯不得友黄叔度名憲汝南人也郭林宗稱之曰汪汪若千頃陂澄之不清淆之不濁不可量也雖是布衣今若相稱贊道類此四賢必當大喜故知人之立身所貴者惟在徳行去聲後徳行同何必要論榮貴汝等位列藩王家食實封更能克修徳行豈不具美也且君子小人本無常行善事則為君子行惡事則為小人當須自剋勵使善事日聞勿縱欲肆情自䧟刑戮貞觀十年太宗謂房𤣥齡曰朕厯觀前代撥亂創業之主生長人間長音掌皆識達情偽罕至於敗亡逮乎繼世守文之君生而富貴不知疾苦動至夷滅朕少小以來少去聲經營多難備知天下之事猶恐有所不逮至於荆王諸弟生自深宫識不及逺安能念此哉朕毎一食便念稼穡之艱難毎一衣則思紡績之辛苦諸弟何能學朕乎選良佐以為藩弼庶其習近善人得免於愆過爾貞觀十一年太宗謂吳王恪曰父之愛子人之常情非待教訓而知也子能忠孝則善矣若不遵誨誘忘棄禮法必自致刑戮父雖愛之將如之何昔漢武帝既崩昭帝嗣立燕王旦素驕縱譸張不服譸音舟譸張狂貌霍光遣一折簡誅之則身死國除漢武帝名徹既崩少子弗陵立是為昭帝燕王名旦武帝第三子也霍光為大將軍輔昭帝燕王與上官桀等濳謀不軌事敗桀等伏誅乃賜燕壐書責之因以綬自絞賜諡曰刺夫為臣子夫音扶不得不慎愚按太宗之教戒諸王也其辭㫖諄諄矣既以漢河間東平之善楚王瑋之惡以曉之復以虞舜之聖桀紂之惡與夫漢霍光誅燕王旦之事以曉之又謂𤣥齡選良佐以為藩弼使其能佩服斯訓何以尚兹然愚觀太宗教戒之辭誠諄諄毋乃以言教乎所與言者荆王元景漢王元昌吳王恪魏王泰也其後荆王與房遺愛同反漢王與承乾同反魏王以謀奪嫡而廢吳王亦以嫌疑為高宗所殺四人無得令終者豈富貴驕奢有以移其本性邪抑太宗敎敕之言雖切而表率之道未至耶貞觀中皇子年小者多授以都督刺史諌議大夫褚遂良上疏諌曰昔兩漢以郡國理人除郡以外分立諸子割土封疆雜用周制皇唐郡縣粗依秦法粗去聲皇子㓜年或授刺史陛下豈不以王之骨肉王去聲鎮扞四方聖人造制道髙前古臣愚見有小未盡何者刺史師帥人仰以安得一善人部内蘇息遇一不善人闔州勞弊是以人君愛恤百姓常為擇賢為去聲後為立同或稱河潤九里京師䝉福漢光武時潁川盗起徴拜漁陽太守郭伋為潁川太守召見帝勞曰賢能太守去帝城不逺河潤九里冀京師并䝉福也伋到郡招懷羣盗皆降或輿人興詠生為立祠漢明帝時王堂拜巴州太守時西羌為冦堂討平之巴庸清静生為立祠漢宣帝名詢武帝曾孫衛太子之孫也云與我共理者惟良二千石乎如臣愚見陛下子内年齒尚幼未堪臨人者請且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三帝後漢明帝名莊章帝名炟和帝名肇能友愛子弟自兹以降以為準的封立諸王雖各有土年尚幼小者各留京師訓以禮法垂以恩惠訖三帝世諸王數十百人惟二王稍惡二王謂楚王英廣陵思王荆也皆以謀逆自殺自餘皆沖和深粹惟陛下詳察太宗嘉納其言唐氏仲友曰遂良之諫切中太宗之病太宗十八舉義兵以已揆人不間幼小曾不知人才不同未知稼穡之艱難乃使之臨民何止未能操刀而使割也况膏粱之性難正古人病之而况於帝子乎遂良欲養成徳器審堪臨州然後除遣真良䇿也然帝子之重土地不足藩維磐石之宗使臨一州亦何益哉賢乎適足以勞之不賢適足以累之而已惜哉唐之君臣其見之未及此也愚按昔封建之世固有年幼而祚土者何則一國而有卿大夫士上焉者命於天子下焉者命於其國國君之齒少則正卿當國法制秩然成王封小弱弟於唐其後卒開大國之迹此封建之世之事也唐都督刺史古方伯諸侯之職而事體不同非如建國之有卿大夫士以相參佐也而使皇子之年小者居之非懦弱不自樹立則驕泰以取敗耳非司牧之道也遂良之疏誠為龜鑑規諌太子第十二凡四章貞觀五年李百藥為太子右庶子時太子承乾字髙明太宗長子也生承乾殿即以命之貞觀初立為皇太子甫八歲特敏惠及長過惡浸聞十七年廢為庶人十八年卒封常山王諡曰愍頗留意典墳孔安國曰伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也然閑讌之後嬉戲過度百藥作贊道賦以諷焉其詞曰下臣側聞先聖之格言嘗覽載籍之遺則伊天地之𤣥造洎皇王之建國曰人紀與人綱資立言與立徳履之則率性成道違之則㒺念作忒望興廢如從鈞視吉凶如紏纆音墨至乃受圖膺籙握鏡君臨因萬物之思化以百姓而為心體大儀之潛運閲往古於來今盡為善於乙夜惜勤勞於寸陰淮南子曰聖人不貴尺璧而重寸之陰時難得而易失也故能釋層冰於瀚海變塞谷於蹛林蹛都賴都例二切唐之思結地置蹛林州漢書注云蹛林匈奴繞林而祭也總人靈以胥悦極穹壤而懐音赫矣聖唐大哉靈命時維大始大讀曰泰運鍾上聖天縱皇儲固本居正機悟宏逺神姿凝映顧三善而必𢎞見教誡篇注祗四徳而為行去聲易文言傳曰君子行此四徳者故曰元亨利貞毎趨庭而聞禮論語伯魚曰鯉趨而過庭曰學禮乎曰未也鯉退而學禮常問寢而資敬奉聖訓以周旋誕天文之明命邁觀喬而望梓商子曰喬仰父道也梓俯子道也即元龜與明鏡自大道云革禮教斯起以正君臣以篤父子君臣之禮父子之親盡情義以兼極諒𢎞道之在人論語曰人能𢎞道豈夏啟與周誦亦丹朱與商均既雕且琢温故知新惟忠與敬曰孝與仁則可以下光四海上燭三辰日月星也昔三王之教子兼四時以齒學將交發於中外乃先之以禮樂樂以移風易俗禮以安上化人非有悦於鍾鼓將宣志以和神寧有懐於玉帛將克已而庇身生於深宫之中處於羣后之上處上聲羣后諸侯也未深思於王業不自珍於匕鬯上音比下音唱匕所以載鼎實鬯香酒灌地以求神者也謂富貴之自然恃崇髙以矜尚心恣驕狠動愆禮讓輕師傅而慢禮儀狎姦諂而縱淫放前星之耀遽隱心三星中為君前為太子後為少子少陽之道斯諒震為少陽長子之道也雖天下之為家蹈夷險之非一或以才而見升或見讒而受黜足可以自省厥休咎省悉井切觀其得失請粗略而陳之粗去聲覬披文而相質相去聲在宗周之積徳乃執契而膺期賴昌發而作貳昌文王名發武王名啟七百之鴻基逮扶蘇之副秦非有虧於聞望聞去聲以長嫡之隆重長音掌監偏師於亭障監平聲扶蘇秦始皇長子也始皇欲坑諸生扶蘇切諌始皇怒使北監䝉恬上郡始皇崩公子胡亥詐受遺詔自立賜扶蘇死始禍則金以寒離左傳閔公二年晉侯使太子申生伐東山臯落氏衣之偏衣佩之金玦狐突歎曰衣之尨服逺其躬也佩以金玦棄其􅇆也尨涼冬殺金寒玦離胡可恃也金玦金環也厥妖則火不炎上五行傳曰棄法律逐功臣殺太子以妾為妻則火不炎上言火失其性而為灾也既樹置之違道見宗祀之遄䘮伊漢氏之長世固明兩之遞作易曰明兩作離大人以繼明照于四方高惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓並見教戒篇註景有慙於鄧子成從理之淫虐終生患於强吳由發怒於争博漢景帝名啟文帝太子也鄧子名通文帝佞幸臣也强吳髙祖兄仲之子吳王濞也文帝嘗病癰鄧通常為帝吮之帝曰天下誰最愛我通曰宜莫如太子太子入問病帝使吮癰吮而色難之已而聞通嘗為帝吮心慙由此怨通及即位鄧通免太子又嘗與吳太子飲博吳太子素驕博争不恭太子引博局提吳太子殺之吳王由是怨望稍失藩臣禮徹居儲兩時猶幼沖防衰年之絶議識亞夫之矜功故能恢𢎞祖業紹三代之遺風徹漢武帝名儲兩為太子時也亞夫周勃之子仕至丞相景帝甚重之帝欲廢栗太子亞夫不可帝由是疏之帝嘗目之曰比鞅鞅非少主臣也據開博望其名未融哀時命之奇舛遇讒賊於江充雖備兵以誅亂竟背義而凶終背音倍據戻太子名漢武帝子也帝為太子立博望苑使通賔客趙人江充與太子有隙見帝年老恐他日為所誅因言帝疾祟在巫蠱帝乃使充入宫治之充云太子宫木人尤多又有帛書所言不道太子遂捕充斬之長安軍亂因言太子反上怒太子自經宣嗣好儒大猷行闡嗟被尤於徳教美發言於忠謇始聞道於匡韋終獲戾於恭顯好去聲宣嗣漢元帝也名奭好儒術文辭用韋𤣥成匡衡相繼為丞相多所嚮納復以𢎞恭石顯相繼擅權用事蕭望之京房賈捐之等皆以言顯短而死太孫雜藝雖異定陶馳道不絶抑惟小善猶見重於通人當傳芳於前典漢成帝名驁字太孫元帝太子也定陶共王元帝庶子也成帝博好經書為太子時帝急召之太子出龍樓門不敢絶馳道西至直城門得絶乃度還入作室門上遲之問其故以狀對帝悦乃詔太子得絶馳道其後帝以定陶王有材藝欲立為嗣賴侍中史丹輔助太子得無廢中興上嗣明章濟濟俱達時政咸通經禮極至情於敬愛惇友于於兄弟是以固東海之遺堂因西周之繼體光武為漢中興之君太子莊是為明帝號顯宗明帝太子炟是為章帝號肅宗東海王明帝之兄極相友愛史贊顯宗丕承業業兢兢危心恭徳政察姦勝肅宗濟濟天性豈弟於穆后徳諒惟淵體五官在魏無聞徳音或受譏於妲己且自悦於從禽雖才高而學富竟取累於荒淫累去聲魏文帝姓曹名丕初為五官中郎將見袁熈妻甄氏美而悦之太祖為之聘焉及受漢禪嘗出射雉謂羣臣曰射雉樂哉辛毗對曰於陛下甚樂於羣臣甚苦暨貽厥於明皇搆崇基於三世得秦帝之奢侈亞漢武之才藝遂驅役於羣臣亦無救於凋弊明皇名叡魏文帝太子也嗣帝位侍中劉曄稱之曰秦始皇漢孝武之儔才具㣲不及耳景初元年起土山於芳林園使公卿羣僚皆負土栽木於其上捕禽驅獸於其中羣臣皆面目垢黒由是百姓凋弊四海分崩中撫寛愛相表多奇重桃符而致惑納鉅鹿之明規竟能掃江表之氛穢舉要荒而見覊相去聲要音腰晉武帝姓司馬名炎晉王昭之子也仕魏為中撫軍桃符武帝弟齊王攸之小名也初晉王欲以攸為世子何曾裴秀曰中撫軍聰明神武人望既茂天表如此固非人臣之相也晉王由是意定立炎為世子嗣晉王位受魏禪國號晉惠處東朝察其遺跡在聖徳其如初實御床之可惜處上聲晉惠帝名衷武帝第三子東朝為太子時也是時朝野咸知太子昏愚不堪為嗣尚書令衛瓘欲陳啟而未敢發會侍宴凌雲臺瓘陽醉跪帝前欲言而止者三因以手撫床曰此座可惜悼愍懐之云廢遇烈風之吹沙盡性靈之狎藝亦自敗於凶邪安能奉其粢盛承此邦家粢音咨盛音成晉愍懐太子名遹惠帝長子也有令譽賈后忌之使閹官輩媚之為非於是慢㢮益彰賈后遂設計讒譛於帝廢為庶人惟聖上之慈愛訓義方於至道同論政於漢幄修致戒於京鄗音鎬地名鄙韓子之所賜晉元帝好任刑法以韓非子賜太子重經術以為寶咨政理之美惡亦文身之黼藻庶有擇於愚夫慙乞言於遺老致庶績於咸寧先得人而為盛帝堯以則哲垂謨虞書曰知人則哲能官人文王以多士興詠詩曰濟濟多士文王以寧取之於正人鑑之於靈鏡量其器能量平聲審其檢行去聲必宜度機而分職度待洛切不可違方以從政若其惑於聽受暗於知人則有道者咸屈無用者必伸讒䛕競進以求媚玩好不召而自臻好去聲直言正諌以忠信而獲罪賣官鬻獄以貨賄而見親鬻音育於是虧我王度斁我彛倫斁音妬亂也九鼎遇姦回而逺逝九鼎周之寶器周沈泗水中始皇求之不能出萬姓望撫我而歸仁此一節述任用之戒蓋造化之至育惟人靈之為貴獄訟不理有生死之異塗寃結不伸乖陰陽之和氣士之通塞屬之以深文命之修短懸之於酷吏是故帝堯畫像陳恤隱之言虞書曰象以典刑又曰惟刑之恤哉漢書唐虞畫像而民不犯注畫像者畫衣冠異章服象五刑也犯黥者皂其巾犯劓者丹其服犯宫者雜其屨大辟之罪誅殛之刑布其衣裾無領緣夏禹泣辜盡哀矜之志見封建篇注此一節述刑罰之戒因取象於大壯易大傳曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯乃峻宇而雕墻將瑶臺以瓊室桀作瑶臺紂作瓊室豈畫棟以虹梁或凌雲以遐觀世説魏作凌雲臺極精巧隨風摇動終無崩隕或通天而納凉漢武帝作神明通天之臺於林光宫髙五十丈極醉飽而形人力命痿蹷而受身殃痿音逶蹷音鱖是以言惜十家之産漢帝以昭儉而垂裕漢文帝欲作露臺召匠計之直百金帝曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為雖成百里之囿周文以子來而克昌孟子曰文王之囿方七十里此言百里者舉成數言也囿者蕃育鳥獸之所詩曰經始勿亟庶民子來經之營之不日成之此一節述營繕之戒彼嘉會而禮通重㫖酒之為徳儀狄作酒禹飲而甘之曰後世必有以酒亡國者遂疏儀狄而絶㫖酒出戰國䇿至忘歸而受祉在齊聖而温克若其酗醟以致昏酗音昫醟音詠酣怒也酖湎而成忒酖音眈湎音沔嗜飲也痛殷受與灌夫亦亡身而䘮國殷紂名受以酒為池竟亡其國漢灌夫醉酒罵坐遂誅其身是以伊尹以酣歌而作戒商書伊尹作訓曰敢有恒舞于宫酣歌于室時謂巫風周公以亂邦而貽則周書周公作誥曰越小大邦用䘮亦罔非酒此一節述甘酒之戒咨幽閑之令淑實好逑於君子好上聲逑匹也詩曰窈窕淑女君子好逑辭玉輦而割愛固班姬之所恥漢成帝遊於後庭嘗欲與班偼妤同輦辭曰觀古圗畫聖賢之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎帝善納其言而後止脱簮珥而思愆亦宣姜之為美宣姜周宣王后也王嘗晏起后乃脱纓珥待罪於永巷使傅毋通言於王曰王樂色而忘徳失禮而晏起亂之興自婢子始敢請罪王曰寡人不徳實自生過非夫人之罪也自是勤於政事早朝晏罷卒成中興之主乃有禍晉之驪姬晉獻公伐驪戎獲驪姬愛之生奚齊公有子八人惟太子申生重耳夷吾賢驪姬佯譽太子而陰令人譛之欲立其子太子自殺又譛二公子於是重耳走蒲夷吾走屈竟以亂晉䘮周之褒姒周幽王嬖愛褒姒生子伯服王竟廢申后及太子宜臼以褒姒為后伯服為太子後因取褒姒笑失信於諸侯西夷犬戎殺王驪山下虜褒姒盡取周賂而去盡妖妍於圖畫極凶悖於人理傾城傾國思昭示於後王麗質冶容宜永鑒於前史此一節述色荒之戒復有蒐狩之禮蒐音捜禮春曰蒐田冬曰狩田馳射之塲不節之以正義必自致於禽荒匪外形之疲極亦中心而發狂老子曰馳騁田獵令人心發狂夫髙深不懼夫音扶胥靡之徒韝緤為娱小豎之事韝音鈎鷹㡌也緤音懾所以繫犬者以宗社之崇重持先王之名器與鷹犬而並驅凌艱險而逸轡馬有衘橛之理橛音厥相如諫獵書時有衘橛之變獸駭不存之地猶有靦於獲多靦音腆慙也獨無情而内愧此一節述禽荒之戒以小臣之愚鄙忝不貲之恩榮擢無庸於草澤齒陋質於簮纓遇大道行而兩儀泰喜元良㑹而萬國貞以監府之多暇毎講論而肅成仰惟神之敏速歎將聖之聰明自禮賢於秋實足歸道於春卿芳年淑景時和氣清華殿邃兮簾幃静灌木森兮風雲輕花飄香兮動笑日嬌鸎囀兮相哀嗚以物華之繁靡尚絶思於將迎思去聲猶允蹈而不倦極躭翫以研精命庸才以載筆謝摛藻於天庭異洞簫之娛侍漢元帝為太子時好吹洞簫自度聲被歌調王褒上洞簫賦乃令後宫貴人皆誦讀之殊飛盖之緣情魏文帝為世子時曹植賦詩曰清夜遊西園飛蓋相追随闕雅言以贊徳思報恩以輕生敢下拜而稽首願永樹於風聲奉皇靈之遐壽冠振古之鴻名冠去聲太宗見而遣使去聲謂百藥曰朕於皇太子處見卿所作賦述古來儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事為去聲大稱所委稱去聲但須善始令終耳因賜廐馬一匹綵物三百叚愚按此東宫毓徳之初羣工贊善之始承乾頗留意典墳然燕間之後嬉戲無度昔賈誼言輔翼太子有曰少成若天性習慣如自然蓋愛子教之以義方亦孰不欲教之於其初其後乃爾相逺耶夫子所謂下愚不移者乎抑所以輔翼之具有未至乎然肅觀李百藥贊道賦一篇歴述秦漢魏晉以來儲貳之善惡與夫任賢去邪之道明刑愼罰之方峻宇雕墻甘酒嗜音内作色荒外作禽荒之戒莫不畢具事實切當文辭流麗光輔前星者足為典訓也貞觀中太子承乾數虧禮度數音朔侈縱日甚太子左庶子于志寜撰諫苑二十卷諷之是時太子右庶子孔穎達字仲達翼州人八歲就學日記千餘言隋世舉明經髙第貞觀初數進忠言為右庶子嘗撰五經義疏號為詳博毎犯顔進諌承乾乳母遂安夫人謂穎達曰太子長成長音掌何宜屢得面折對曰䝉國厚恩死無所恨諫諍愈切承乾令撰令平聲孝經義疏頴達又因文見意愈廣規諌之道太宗並嘉納之二人各賜帛五百匹黄金一斤以勵承乾之意按史傳各賜帛百匹黄金十斤愚按于志寧撰諫苑以形匡救之益孔頴逹疏經義以廣規諫之道太宗又賜賚二臣以寓激勵之意君父師友之責盡矣是時承乾雖虧禮侈縱而於文史規誨猶未咈拒毋亦不難於知而難於行耶貞觀十三年太子右庶子張𤣥素以承乾頗以遊畋廢學上書諫曰臣聞皇天無親惟徳是輔周書蔡仲之命之辭茍違天道人神同棄然古三驅之禮非欲教殺將為百姓除害為去聲故湯羅一面天下歸仁湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及禽獸今苑内娛獵雖名異遊畋若行之無恒終虧雅度且傅説曰學不師古匪説攸聞説音悦商書傅説告髙宗之辭然則𢎞道在於學古學古必資師訓既奉恩詔令孔頴達侍講令平聲後同望數存顧問數音朔後同以補萬一仍博選有名行學士行去聲兼朝夕侍奉覽聖人之遺敎察既往之行事日知其所不足月無忘其所能此則盡善盡美夏啟周誦焉足言哉焉於䖍切夫為人上者夫音扶未有不求其善但以性不勝情勝平聲後同耽惑成亂耽惑既甚忠言盡塞所以臣下茍順君道漸虧古人有言勿以小惡而不去上聲小善而不為故知禍福之來皆起於漸殿下地居儲貳當須廣樹嘉猷既有好畋之淫好去聲後同何以主斯匕鬯慎終如始猶恐漸衰始尚不慎終將安保承乾不納𤣥素又上書諫曰臣聞稱皇子入學而齒胄者欲令太子知君臣父子尊卑長幼之道長音掌後同見教誡篇註然君臣之義父子之親尊卑之序長幼之節用之方寸之内𢎞之四海之外者皆因行以逺聞假言以光被伏惟殿下睿質已隆尚湏學文以飾其表竊見孔頴達趙𢎞智等非惟宿徳鴻儒亦兼達政要望令數得侍講開釋物理覽古論今増輝睿徳至如騎射畋遊酣歌妓翫茍悦耳目終穢心神漸染既乆漸音尖必移情性古人有言心為萬事主動而無節即亂恐殿下敗徳之源在於此矣承乾覽書愈怒謂𤣥素曰庶子患風狂耶十四年太宗知𤣥素在東宫頻有進諫擢授銀青榮禄大夫行太子左庶子時承乾嘗於宫中擊鼓聲聞於外聞去聲𤣥素叩閤請見音現極言切諫乃出宫内鼔對𤣥素毁之遣戸奴伺𤣥素早朝音潮陰以馬檛擊之檛音查殆至於死是時承乾好營造亭觀去聲窮極奢侈費用日廣𤣥素上書諫曰臣以愚蔽竊位兩宫在臣有江海之潤於國無秋毫之益是用必竭愚誠思盡臣節者也伏惟儲君之寄荷戴殊重荷上聲如其積徳不𢎞何以嗣守成業聖上以殿下親則父子事兼家國所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下惟聚工匠望苑之内不覩賢良今言孝敬則闕侍膳問豎之禮語恭順則違君父慈訓之方求風聲則無學古好道之實觀舉措則有因緣誅戮之罪宫臣正士未嘗在側羣邪淫巧昵近深宫愛好者皆遊伎雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱宻寧可勝計哉勝平聲宣猷禁門不異闤闠上音環下音㑹朝入暮出惡聲漸逺右庶子趙𢎞智經明行修行去聲當今善士臣毎請望數召進與之談論庶廣徽猷令㫖反有猜嫌謂臣妄相推引從善如流尚恐不逮飾非拒諫必是招損古人云苦藥利病苦口利行伏願居安思危日慎一日書入承乾大怒遣刺客將加屠害俄屬宫廢按後一書通鑑係十三年詔自今皇太子出用庫物所司勿為限制於是太子發取無度故𤣥素上疏十七年承乾廢胡氏寅曰周官有王及后世子不會之文以愚度之莫尊於王次曰后次曰世子用物不㑹是尊貴之故得肆為費侈豈節以制度自家刑國之道哉正使周官饍夫酒正内府有此文然冢宰之職量入為出得以九式均節財用則雖曰不會而會在其中特不使有司以法沮止若自下而制上耳太宗之詔太子於是大失諸賢在朝不聞以為不可獨張𤣥素止於末流幾於被害豈非君臣之交失乎唐氏仲友曰太宗於𤣥素可謂不察矣𤣥素力諌太子至于一再至于三四承乾諱其切至遣户奴檛擊遣刺客伺之其脱死者幸矣乃與他宫僚同坐至除名為民起為刺史訖不復親近太宗於此刑濫害及善人矣可不悲哉事與于志寧同而賞罰異太宗何所見而然耶愚按隋太子勇唐太子承乾皆以罪廢雖二人不肖有以自取亦文帝太宗所以處之失其道也何也文帝既立勇為太子而復寵待煬帝太宗既立承乾為太子而復寵待魏王煬帝攘奪於其初魏王效尤於其後承乾目覩庶人勇之禍故為是不得已之邪謀向使太宗於太子諸王之間早有定分則承乾雖不肖不至如是之甚也今既不能消其不平之忿乃賞擢張𤣥素子志寧之流使救正於言語章疏之末果何益之有哉貞觀十四年太子詹事唐制東宫置詹事府掌統三寺十率府之政于志寧以太子承乾廣造宫室奢侈過度躭好聲樂好去聲上書諫曰臣聞克儉節用實𢎞道之源崇侈恣情乃敗徳之本是以凌雲槩日戎人於是致譏秦繆公夸示宫室之盛為西戎由余所笑詳見納諌篇註峻宇雕墻夏書以之作誡五子之歌曰甘酒嗜音峻宇雕墻有一於此未或不亡昔趙盾匡晉盾晉靈公大夫即趙宣子也呂望師周望太公也為周太師或勸之以節財或諫之以厚歛去聲莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聽咸著簡䇿用為美談且今所居東宫隋日營建覩之者尚譏甚侈見之者猶歎甚華何容於此中更有修造財帛日費土木不停窮斤斧之工極磨礱之妙且丁匠官奴入内比者比音鼻曾無復監曾音層此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿緣其身槌杵在其手監門本防非慮監平聲宿衛以備不虞直長既自不知長音掌直長官名千牛又復不見千牛官名見納諫篇註爪牙在外厮役在内所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲鄭衛二國名樂記曰鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也昔朝歌之鄉迴車者墨翟朝音昭翟音狄朝歌殷之邑名漢書鄒陽書曰邑號朝歌墨子回車夾谷之會揮劍者孔丘夾谷魯地名家語曰定公與齊侯會于夾谷孔子攝相事齊使萊人以兵刼定公孔子厯階而進以公退曰裔不謀夏夷不亂華俘不干盟兵不偪好齊侯心怍麾而避之齊奏樂俳優侏儒戲於前孔子曰匹夫熒惑侮諸侯者罪應誅於是斬侏儒齊侯懼有慙色先聖既以為非通賢將以為失頃聞宫内屢有鼓聲大樂伎兒入便不出聞之者股栗言之者心戰往年口勅伏請重尋重去聲聖㫖殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宫闕已積歲時犬馬尚解識恩解音懈木石猶能知感臣所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤㫖則臣是罪人但悦意取容臧孫方以疾疢犯顔逆耳春秋比之藥石臧孫魯大夫名紇即臧武仲也左傳襄公三十三年臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多伏願停工巧之作罷乆役之人絶鄭衛之音斥羣小之輩則三善允備萬國作貞矣承乾覽書不悅十五年承乾以務農之時召駕士等役不許分畨人懷怨苦又私引突厥羣豎入宫志寧上書諌曰臣聞上天蓋髙日月光其徳明君至聖輔佐贊其功是以周誦升儲見匡毛畢毛叔鄭畢公周之輔臣漢盈居震取資黄綺見定分篇注姬旦抗法於伯禽姬周之姓旦周公之名伯禽周公子也禮曰成王幼不能涖阼周公相踐阼而治抗世子法於伯禽成王有過則撻伯禽所以示成王世子之道也賈生陳事於文帝賈生即賈誼也見納諫篇注咸殷勤於端士皆懇切於正人厯代賢君莫不丁寧於太子者良以地膺上嗣位處儲君處上聲後同善則率土霑其恩惡則海内罹其禍近聞僕寺司馭駕士獸醫始自春初迄兹夏晚常居内役不放分畨或家有尊親闕於溫凊禮記曰子之事父母冬溫而夏凊或室有幼弱絶於撫養春既廢其耕墾夏又妨其播殖事乖存育恐致怨嗟儻聞天聽後悔何及又突厥達哥支等咸是人面獸心豈得以禮義期不可以仁信待心則未識於忠孝言則莫辯其是非近之有損於英聲昵之無益於盛徳引之入閤人皆驚駭豈臣庸識獨用不安殿下必須上副至尊聖情下允黎元本望不可輕微惡而不避無容略小善而不為理敦杜漸之方須有防萌之術屏退不肖狎近賢良如此則善道日隆徳音自逺承乾大怒遣刺客張師政紇干承基紇音鶻紇干虜複姓就舍殺之是時丁母憂起復為詹事二人潛入其第見志寧寢處苫廬禮居父母之䘮者寢苫枕塊竟不忍而止及承乾敗太宗知其事深勉勞之勞去聲按前一書通鑑係十四年舊史曰承乾敗後推鞫具得其事太宗謂志寜曰知公數有規諫事無所隱深加勉勞右庶子令狐徳棻等以無諫書皆從貶貴胡氏寅曰詹事東宫官之尊也太子於是學為父子焉學為君臣焉于志寧不當起復太宗不當奪其䘮也人臣冇奪䘮者惟金革之事耳詹事輔導儲君以忠以孝乃從金革之例冐哀居官則何以訓太子宜太子之不納諫也雖然自太子言之從欲肆情又將殺諫臣是兩刺客之不如其不能終宜哉愚按自古臣子之事君親能盡其道者可以感發人之善心也嘗觀春秋傳晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝麑退曰不忘恭敬民之主也賊民之主不忠是宣子以敬於君而免於難也今觀承乾無道于志寧上書諌之承乾怒遣刺客張師政紇干承基殺之時志寧母憂起復二人潛入其第見寢處苫廬不忍而止是志寧以孝於親而脫於禍也之二人者庶幾無愧於鉏麑矣承乾之為曾不如刺客之有人心也然亦未聞有寢苫枕塊而仕於人之國當輔翼太子之任者太宗志寧胥失之矣貞觀政要卷四欽定四庫全書貞觀政要卷五唐吳兢撰元戈直集論仁義第十三凡四章貞觀元年太宗曰朕看古来帝王以仁義為治者國祚延長任法御人者雖救弊於一時敗亡亦促既見前王成事足是元龜今欲專以仁義誠信為治望革近代之澆薄也黄門侍郎王珪對曰天下彫䘮日久陛下承其餘弊𢎞道移風萬代之福但非賢不理惟在得人太宗曰朕思賢之情豈捨夢寐給事中杜正倫進曰世必有才隨時所用豈待夢傅説音悦逢吕尚然後為治乎太宗深納其言愚按太宗即位之初知古帝王以仁義為治欲以誠信行之此其所以致貞觀之盛也然嘗聞之正其心修其身而達之於家國天下此二帝三王仁義之事也心未必正身未必修而其愛人利物之功禁暴止亂之效亦有補於當世此齊桓晉文假仁義之事也太宗芟除禍亂身致昇平可謂偉矣然由心而身由身而家皆有慚徳凡魏徴之所諫太宗之所行不過黽勉於仁義之功而已故雖有志於三王迄未能大異於五霸也王珪謂非賢不理惟在得人斯言是已然所謂得人者必得周召孔孟其人而後可也夫茍得周召孔孟而用之則能施其致君澤民之術盡其格心養徳之方而仁義之全體備於君身仁義之大用周於天下後世矣貞觀二年太宗謂侍臣曰朕謂亂離之後風俗難移比觀比音鼻百姓漸知亷恥官人奉法盜賊日稀故知人無常俗但政有治亂耳是以為國之道必須撫之以仁義示之以威信因人之心去其苛刻不作異端自然安靜公等宜共行斯事也愚按風俗有古今人心無古今人心之不如古以風俗之不如古也然而羙風俗者則在於正人心人心正而風俗美矣太宗云比觀百姓漸知亷恥故知人無常俗但政有治亂耳斯言也其魏徵勸行仁義畧效之時乎夫太宗之所行不過仁義之似而已其眀效大驗如此况於真知實踐正已以正人心者乎貞觀四年房𤣥齡奏言今閲武庫甲仗勝隋日逺矣太宗曰飭兵備寇雖是要事然朕惟欲卿等存心理道務盡忠貞使百姓安樂音洛便是朕之甲仗隋煬帝豈為甲仗不足為去聲以至滅亡正由仁義不修而羣下怨叛故也宜識此心愚按周頌之美武王曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之下武右文信矣武王能保天下也太宗身履行陣芟除羣雄即位之四年謂不以甲仗之備為美戒廷臣以徳義相輔亦信矣其能保天下之道歟貞觀十三年太宗謂侍臣曰林深則鳥棲水廣則魚㳺仁義積則物自歸之人皆知畏避災害不知行仁義則災害不生夫仁義之道夫音扶當思之在心常令相繼令平聲後同若斯須懈怠去之已逺去如字猶如飲食資身恒令腹飽乃可存其性命王珪頓首曰陛下能知此言天下幸甚唐氏仲友曰仁義是帝王之道然必如中府九經與大學自誠意逹之眀眀徳於天下方為醇粹太宗言仁義本乎魏徵之勸然所謂仁義乃在制度紀綱而已愚按太宗之言曰林深則鳥棲水廣則魚㳺仁義積則物自歸之此言真善喻也謂仁義之道當思之在心如飲食資身恒令腹飽此固欲不忘乎仁義者然不知仁義乃吾心固有之理孟子所謂根於心者也又何待思之在心哉論忠義第十四凡十五章馮立馮翊人武徳中為東宫率音律唐制東宫置左右率府掌兵仗宿衛之政令總諸曹之事甚被隐太子親遇太子之死也左右多逃散立歎曰豈有生受其恩而死逃其難去聲於是率兵犯𤣥武門苦戰殺屯營將軍敬君𢎞絳州人謂其徒曰㣲以報太子矣遂解兵遁於野俄而来請罪太宗數之曰數上聲汝昨者出兵来戰大殺傷吾兵將何以逃死立飲泣而對曰飲去聲立出身事主期之効命當戰之日無所顧憚因歔欷上音虚下音希悲歎貌悲不自勝平聲太宗慰勉之授左屯衛中郎將去聲後同唐制掌宿衛之屬立謂所親曰逢莫大之恩幸而獲免終當以此奉答未幾平聲突厥至便橋率數百騎與虜戰於咸陽殺獲甚衆所向皆披靡太宗聞而嘉歎之時有齊王元吉府左車騎謝叔方萬年人率府兵與立合軍拒戰及殺敬君𢎞中郎將吕衡將去聲史作吕世衡此避太宗諱除世字王師不振秦府䕶軍尉唐制掌宿衛之職尉遲敬徳尉音蔚尉遲複姓名恭以字行朔州人為劉武周將武徳初舉地降為右府統軍後從討隐巢有功封鄂國公卒贈徐州都督乃持元吉首以示之叔方下馬號泣號平聲拜辭而遁明日出首去聲太宗曰義士也命釋之授右翊衛郎將唐制掌供奉侍衛之職按通鑑武徳九年六月馮立聞建成死乃與副䕶軍薛萬徹屈咥直府左車騎謝叔方帥東宫齊府精兵二千馳赴𤣥武門張公謹多力獨閉闗以拒之不得入敬君𢎞掌宿衛兵屯𤣥武門挺身出戰與吕世衡大呼而進皆死之守門兵與萬徹等力戰良久萬徹欲攻秦府尉遲敬徳持建成元吉首示之宫府兵遂潰萬徹亡入終南山馮立遂解兵逃於野髙祖既赦天下馮立謝叔方皆自出萬徹亡匿屢使諭之乃出秦王曰皆忠於所事義士也釋之馮立後授廣州都督卒于官敬君𢎞後贈左屯衛大將軍吕衡贈右驍衛將軍唐氏仲友曰若立者所謂一心可事百君忠義勇敢兼有之觀其於隐太子之死能不避難然君𢎞世衡既死則解兵而去不為已甚則異乎徒勇者盖可知也然立之與叔方俱可謂見危致命者矣較其人品叔方其立之亞歟愚按馮立之言曰豈有生受其恩而死逃其難此子路所謂食焉而不避其難者也謝叔方亦有慷慨殺身從容受死之意二人雖皆受爵然亦可謂忠義也已太宗旌之此正興王之所宜然也若薛萬徹亦可謂忠於所事始焉與馮謝無異也然知進而不知退終以邪謀就誅寧不有愧乎史臣是編書馮謝於忠義之首萬徹乃削而不書厥有㫖哉貞觀元年太宗嘗從容從即容刀言及隋亡之事慨然歎曰姚思亷不懼兵刃以明大節求諸古人亦何以加也思亷時在洛陽因寄物三百叚并遺其書曰遺去聲想卿忠節之風故有斯贈初大業末思亷為隋代王侑侍讀代王侑隋元徳太子之子煬帝十三年南巡以侑留守長安髙祖克長安立侑為帝及義旗尅京城時代王府僚多駭散惟思亷侍王不離其側離去聲兵士將昇殿思亷厲聲謂曰唐公髙祖初封唐公舉義兵本匡王室卿等不宜無禮於王衆服其言於是稍却布列階下須臾髙祖至聞而義之許其扶代王侑至順陽閤下思亷泣拜而去見者咸歎曰忠烈之士仁者有勇此之謂乎張氏九成曰君子以仁存誠以義為勇白刃在前不能懼凶暴之氣不能懾盖不在力之武由忠義之壯也觀隋之亡亂兵入京侍臣駭潰思亷以微軀奮不顧以全君親之生即甲兵之衆顧輕於一言哉誠以仁在其中也易曰能止健大正也惜乎大厦傾而一木不支矣懔懔風義激懦夫之志爾唐氏仲友曰姚思亷節義學問之士孟子論為人寡欲雖有不存焉者寡矣思㢘之謂歟學問惟寡欲能精節義惟寡欲能立説見第四章貞觀二年將𦵏故息隐王建成海陵王元吉尚書右丞魏徵與黄門侍郎王珪請預陪送上表曰臣等昔受命太上委質東宫出入龍樓垂將一紀前宫結釁宗社得罪人神臣等不能死亡甘從夷戮負其罪戾寘錄周行音杭徒竭生涯音牙將何上報陛下徳光四海道冠前王冠去聲陟岡有感追懐棠棣明社稷之大義申骨肉之深恩卜𦵏二王逺期有日臣等永惟疇昔忝曰舊臣䘮君有君雖展事居之禮宿草將列未申送往之哀瞻望九原義深凡百望於𦵏日送至墓所太宗義而許之於是宫府舊僚吏盡令送𦵏令平聲愚按王珪魏徵請送息隐海陵之䘮太宗義而許之二子可謂篤於義矣孟子曰生亦我所欲也義亦我所欲也二者不可得兼捨生而取義者也珪徵名臣也詎容輕議哉自有文公朱子之論斷在焉昔管仲不死於子糾而相桓公子貢子路以問夫子夫子稱其功論語集註引程子之言因論管仲而及於王珪魏徵之事朱子謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也斯言盡之矣貞觀五年太宗謂侍臣曰忠臣烈士何代無之公等知隋朝誰為忠貞王珪曰臣聞太常丞卿之佐也元善逹在京留守見羣賊縱横縱平聲遂轉騎逺詣江都諫煬帝令還京師令平聲既不受其言後更涕泣極諫煬帝怒乃逺使追兵身死瘴癘之地有虎賁郎中賁音奔獨孤盛獨孤複姓盛名也在江都宿衛宇文化及起逆盛惟一身抗拒而死太宗曰屈突通為隋將屈區勿切將去聲後同屈突虜複姓通名仕隋為虎賁郎將初代王遣通守河東髙祖兵圍之通守節不降後被擒帝勞之泣曰臣不能盡人臣之節故至此為本朝羞帝曰忠臣也授兵部尚書從討王世充時通二子在洛帝曰以東畧屬公如何通曰二兒死自其分終不以私害義帝曰烈士徇節吾今見之貞觀初卒共國家戰於潼闗在今華州華隂縣𨽻陕西省聞京城䧟乃引兵東走去聲義兵追及於桃林今陕州桃林縣𨽻河南朕遣其家人往招慰遽殺其奴又遣其子往乃云我䝉隋家驅使己事兩帝今者吾死節之秋汝舊於我家為父子今則於我家為仇讎因射之其子避走所領士卒多潰散通惟一身向東南慟哭盡哀曰臣荷國恩荷去聲任當將帥智力俱盡致此敗亡非臣不竭誠於國言盡追兵擒之太上皇授其官每託疾固辭此之忠節足可嘉尚因敕所司採訪大業中直諫被誅者子孫聞奏唐氏仲友曰屈突通不死於稠桑更盡力於唐尚得為節義乎曰隋運已亡河東之守力戰不屈天命有歸通如之何斬家奴射其子兵敗力屈而後擒亦足以報隋矣商之亡也雖如箕子猶陳洪範封朝鮮而欲責人以必死不亦難乎若通之竭力於所事亦足以為節義矣愚按太宗稱奬隋世忠義之臣於文臣則姚思亷於武臣則屈突通也或曰二子隋臣而仕扵唐國亡皆不能死可以為忠臣乎愚應之曰否不同也思亷仕隋不過諸王講讀之官耳於軍國之重事社稷之大計固不與聞也國亡諸人皆去思亷獨不去呵叱亂兵辭嚴義正又能扶掖舊君泣拜而别其後代王竟得善終思亷講讀調䕶之職可謂無負矣曷為而死哉至於通則不然通仕隋文已躋貴顯迨乎煬帝尊寵加隆楊諒𤣥感之亂嘗立大功名聞天下煬帝南行付以闗中之任身受重寄手握彊兵國亡師敗通安所辭其死哉並二子之事觀之庸夫能斷其是非矣然則太宗之奬忠義其得於思亷而失扵屈突乎貞觀六年授左光祿大夫陳叔達字子聰陳宣帝子也武徳初判納言始建成兄弟閲間太宗帝惑之叔達極意救辨及建成誅髙祖謂裴寂等曰不圗今日乃見此事當如之何蕭瑀陳叔逹曰建成元吉本不預義謀又無功於天下疾秦王功髙望重共為姦謀今秦王已討而誅之秦王功盖宇宙率土歸心陛下若處以元良委之國務無復事矣上曰善此吾之夙心也禮部尚書因謂曰武徳中公曾進直言於太上皇曾音層眀朕有克定大功不可黜退云朕本性剛烈若有抑挫恐不勝憂憤勝平聲以致疾斃之危今賞公忠謇有此遷授叔逹對曰臣以隋氏父子自相誅戮以至滅亡豈容目覩覆車不改前轍臣所以竭誠進諫太宗曰朕知公非獨為朕一人為去聲後同實為社稷之計胡氏寅曰人臣之義無私交而况藩王與太子有隙之時乎言所左右疑所集也而陳叔達無是心特以秦王有功不可黜恐生後悔是皆天下之公論亦初無贊髙祖廢立之意於秦王非私交也以叔達端良自宜在親近之地茍欲叙遷何患無名而太宗乃舉武徳中直言是以危疑向背誘臣下為後日計豈君道哉愚按時平先長嫡世亂先有功陳叔達當時之直言意固有在矣誠公論非私計也太宗於是臨御已六年矣揚其忠謇而遷秩之雖用得其人而心若私也言者心之聲可不慎哉貞觀八年先是桂州今仍舊𨽻廣西都督李𢎞節以清慎聞及身殁後其家賣珠太宗聞之乃宣於朝曰此人生平宰相皆言其清相去聲今日既然所舉者豈得無罪必當深理之不可捨也侍中魏徵承間言曰間去聲陛下生平言此人濁未見受財之所今聞其賣珠將罪舉者臣不知所謂自聖朝以来為國盡忠為去聲後同清貞慎守終始不渝屈突通張道源而已張道源并州人初守并州賊平拜大理卿時何稠得罪籍家屬以賜羣臣道源曰禍福無常安可利人之亡取其子女自奉仁者不為也更資以衣食遣之家無貲産比亡餘粟二斛通子三人来選去聲有一匹羸馬道源兒子不能存立未見一言及之今𢎞節為國立功前後大䝉賞賚居官殁後不言貪殘妻子賣珠未為有罪未為如字審其清者無所存問疑其濁者旁責舉人雖云疾惡不疑是亦好善不篤好去聲臣竊思度後洛切未見其可恐有識聞之必生枉議太宗撫掌曰造次不思造七到切遂聞此語方知談不容易以豉切並勿問之其屈突通張道源兒子宜各與一官舊本此章附直諫𩔖今附入此愚按皋陶之稱堯舜有曰罰弗及嗣賞延扵世盖善善之意長惡惡之心短也太宗知屈突道源之善而不能錄其子弟聞𢎞節曖昧之過則遽欲罪及舉官此豈唐虞賞罰之道乎向非魏徵之言亦足為太宗君徳之累矣貞觀七年太宗將發諸道唐分天下為十道一曰闗内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劍南十曰嶺南皆因山川形便而併省之也黜陟使去聲後同將命而出掌黜陟臧否故曰黜陟使畿内道唐建都之地即闗内道也未有其人太宗親定問於房𤣥齡等曰此道事最重誰可充使右僕射李靖曰畿内事大非魏徵莫可太宗作色曰朕今欲向九成宫亦非小寧可遣魏徵出使朕每行不欲與其相離者適為其見朕是非得失為去聲公等能正朕不可因輒有所言大非道理乃即令李靖充使令平聲按通鑑貞觀八年太宗欲分遣大臣為諸道黜陟使未得其人李靖薦魏徵上曰徵箴規朕失不可一日離左右乃命靖與蕭瑀等凡十三人分行天下察長吏賢不肖問民疾苦禮髙年振窮乏褒善起淹滯俾使者所至如朕親睹與此小異愚按太宗嘗問羣臣魏徵與諸葛亮孰賢岑文本對曰亮才兼將相非徵所及斯言是已然嘗論之太宗有餘於才而不足於徳勇於敢為而不能不為當時能攻其所短救其所偏惟徵一人而已使徵生於三國之時未必能勝武侯之任然使武侯生扵太宗之時不過為徵之所為耳故以唐之時勢觀之則二子政未易優劣也李靖之才兼資文武非徵所能及也然貞觀之時可以無靖不可以無徵何也盖靖之才能不過增太宗之所有餘徵之諫爭乃能補太宗之所不足也是以畿内之使太宗寧使靖而不使徵豈非自知之眀哉貞觀九年蕭瑀為尚書左僕射嘗因宴集太宗謂房𤣥齡曰武徳六年已後太上皇有廢立之心我當此日不為兄弟所容實有功髙不賞之懼蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也乃賜詩曰疾風知勁草板蕩識誠臣瑀拜謝曰臣特䝉誡訓許臣以忠諒雖死之日猶生之年舊本此章首曰貞觀中與第五章合為一章今按通鑑標年附入于此又按史傳魏徵曰臣有逆衆持法主恕之以公孤特守節主恕之以介昔聞其言乃今見之使瑀不遇陛下庸自保邪范氏祖禹曰太宗以蕭瑀無二心於己而嘉之可謂能知臣矣且太子在而私於藩王者眀君之所甚惡也或誘以利或脅以死而從之者不亦多乎惟瑀介然自立有隕無二太宗所以知其臨大節而不可奪也人君以此取人豈不得忠正之士乎唐氏仲友曰若以隐巢之事不可以利怵死懼亦可以為社稷臣矣然太宗此言盖亦有為瑀初以切詆房杜廢又以痛劾房杜罷至此復參知政事太宗賜詩欲羣臣知委任之意也魏徵之言亦以發眀太宗之意若以瑀較揚子雲近世社稷臣之論則猶有愧云愚按武徳季年髙祖立秦王為皇太子竟决扵瑀之一言瑀以躁狭之量剛勁之氣罷黜者三而卒預大政太宗實能容之者豈非念夫此耶瑀嘗劾奏魏徵之過矣今觀徵所言若未嘗有隙者所謂以義相與不以少嫌置胸中徵之謂矣然可不謂尤賢乎貞觀十一年太宗行至漢太尉楊震墓楊震字伯起𢎞農人也好學眀經諸儒稱為闗西夫子漢安帝時為刺史號清白吏後徵為太常遷太尉為内戚讒譛遣歸震曰死者人之常分吾䝉恩居上司姦臣狡猾而不能誅嬖女傾亂而不能禁何靣目復見日月飲酖而卒傷其以忠非命親為文以祭之房𤣥齡進曰楊震雖當年夭枉數百年後方遇聖眀停輿駐蹕親降神作一作玊趾可謂雖死猶生没而不朽不覺助伯起幸頼欣躍於九泉之下矣伏讀天文且感且慰凡百君子焉敢不朂勵名節焉於䖍切知為善之有效愚按太宗經異代名臣之墓親為文以祭之是可以見其惓惓於忠貞之臣矣異世相望且企敬如此况凡百君子列于庶位者乎貞觀十一年太宗謂侍臣曰狄人殺衛懿公名赤盡食其肉獨留其肝懿公之臣𢎞演呼天大哭自出其肝而内懿公之肝於其腹中内讀曰納今覓此人恐不可得特進魏徵對曰昔豫讓為智伯報讎為去聲後同豫讓智伯之臣智伯名瑶號襄子晉智宣子之後為韓趙魏所滅欲刺趙襄子名無恤晉趙簡子之後襄子執而獲之謂之曰子昔事范中行氏乎春秋之世晉有范氏中行氏與智氏韓氏魏氏趙氏為六卿春秋之末晉公室卑六卿強各據采地更相攻伐貞定王十一年智氏魏氏趙氏韓氏共伐范氏中行氏滅之而分其地智伯盡滅之子乃委質智伯不為報讎今即為智伯報讎何也讓答曰臣昔事范中行范中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之事見史記趙世家在君禮之而已亦何謂無人焉愚按夫子曰君使臣以禮臣事君以忠孟子曰君之視臣如手足則臣視君如腹心夫子之言涵容孟子之言激切大概忠臣義士何代無之在上之人有以感召之則在下之人興起矣太宗嘉古之忠臣以為今覓此人恐不可得斯言固所以激勸天下忠義之士而謂世無其人則不可宜魏徵引智伯豫讓之事以為譬也雖然為人臣者之分君之待我者或有未至而我之所以事君者其可不盡心乎貞觀十二年太宗幸蒲州今為解州𨽻河東因詔曰隋故鷹擊郎將將去聲隋制親侍置鷹揚府有鷹揚郎將後改副郎將為鷹擊郎將堯君素魏郡人煬帝為晉王時君素以左右從及嗣位累遷鷹擊郎將及天下大亂君素所部獨全後從屈突通守河東通敗通誘之降君素責通不義卒無降心其妻誘之降乃引弓射殺之嘗曰大義不得不死後為左右所害往在大業受任河東固守忠義克終臣節雖桀犬吠堯漢書曰桀犬吠堯堯非不仁特吠非其主耳有乖倒戈之志周書曰前徒倒戈言衆服周仁政無有戰心前徒倒戈自攻于後也疾風勁草實表嵗寒之心爰踐兹境追懐往事宜錫寵命以申勸奬可追贈蒲州刺史仍訪其子孫以聞愚按漢髙祖赦季布唐太宗褒堯君素皆帝王盛徳事也然合二子而論之則君素為賢何也季布身為楚將數窘沛公此人臣之常事國亡不能死而逃何足深取哉唐室方興兵精將勇戰無不勝攻無不破君素以區區一城之衆外無彊援徒以忠義激勵士卒自義寧元年至武徳三年始終四載唐朝凡易數將僅能克之此不唯忠義可嘉其知勇才能亦古今所罕有也嗚呼難哉太宗不惟褒贈又訪錄其子孫忠義之士其有不興起者乎貞觀十二年太宗謂中書侍郎岑文本曰梁陳梁姓蕭氏受齊禪陳姓陳氏受梁禪名臣有誰可稱復有子弟堪招引否文本奏言隋師入陳百司奔散莫有留者惟尚書僕射袁憲獨在其主之傍王世充將受隋禪羣僚表請勸進憲子國子司業承家託疾獨不署名此之父子足稱忠烈承家弟承序今為建昌令建昌縣名今陞州屬南康路𨽻江西清貞雅操實繼先風由是召拜晉王友兼令侍讀令平聲唐制諸王友掌陪侍逰居規諷道義侍讀掌講道經學尋授𢎞文館學士唐氏仲友曰古人云一心可以事百君其袁氏子弟之謂歟忠謹風操不忍負主誰不欲之為人臣乎為之者勉之而已愚按梁陳於唐相距頗逺猶有招引名臣子孫之言太宗之意深逺矣岑文本謂隋師入陳袁憲有獨侍其主之忠王世充受禪憲之子獨不署名其弟又清貞雅操一門父子兄弟忠義傳家而不著聞向非太宗心存忠義之臣而興言及此非文本之公忠不揜人善如此則袁氏之忠節何由著聞哉貞觀十五年詔曰朕聴朝之暇觀前史每覽前賢佐時忠臣狥國何嘗不想見其人廢書欽歎至於近代以来年嵗非逺然其𦙍緒或當見存見音現縱未能顯加旌表無容棄之遐裔其周隋二代名臣及忠節子孫有貞觀已来犯罪配流者宜令平聲所司具錄奏聞於是多從矜宥舊本此章在刑法篇今附入于此愚按太宗好賢可以為至矣不唯尊榮其朝臣又能上及扵前朝焉不唯登崇其一身又能下及扵後裔焉是故祭比干之靈封楊震之墓褒贈君素之官爵錄用諸儒之子孫今也又詔周隋名臣之後配流者悉從矜宥則凡列在庶位者孰不知所勸乎宜其忠良之士彬彬輩出有以開三百年之休運也嗚呼盛哉貞觀十九年太宗攻遼東安市城今為安市州𨽻鎮東髙麗人衆皆死戰詔令耨薩延夀惠真等降音杭耨薩髙延夀北部耨薩髙惠真南部衆止其城下以招之城中堅守不動每見帝幡旗必乗城皷譟乗平聲帝怒甚詔江夏王道宗髙祖從兄弟字承範年十七從秦王討賊有功初封任城後封江夏郡道宗好學接士不倨于貴為宗室最賢築土山以攻其城竟不能尅太宗將旋師嘉安市城主堅守臣節賜絹三百匹以勸勵事君者舊本此章與第十二章合為一章今按通鑑標年附入于此又按通鑑太宗親征遼東令李勣攻安市安市人望見旗盖輒乗城鼓譟上怒勣請克城之日男子皆阬之安市人聞之益堅守久不下江夏王道宗築土山於城東浸逼其城城中亦增髙其城以拒之又衝車礮石壊其城堞城中隨立木柵以塞之築山晝夜不息凡六旬用功五十萬山頽壓城崩城中數百人出戰遂奪據土山而守之諸將攻二日不克上以天寒糧盡先㧞遼盖二州户口渡遼乃耀兵城下而旋城中皆屏跡不出城主登城拜辭上嘉其固守賜縑百匹愚按遼東之役與前日義師有間矣夫以太宗之英武戡定禍亂於羣雄競起之日天戈所指夷貊不能嬰其鋒而晚年悉乃心力不能制服一逺國何哉退而嘉安市城主堅守之節賞賜以旌之以勵事君者斯意固羙矣然不若不黷武之尤全羙也孝友第十五凡五章司空房𤣥齡事繼母能以色養去聲恭謹過人其母病請醫人至門必迎拜垂泣及居䘮平聲尤甚柴毁言毁瘠如柴也太宗命散騎常侍劉洎就加寛譬遺寢床粥食鹽菜遺去聲愚按孝經傳曰事親孝故忠可移于君盖天理根於人心其發見於事親者此理也發見于事君者此理也忠孝豈二道哉故求忠臣于孝子之門未有事親孝而事君不忠者思修身不可以不事親未有身不修而可以治國平天下者房𤣥齡唐之名相而孝之至固宜忠之盡也且昔之以孝聞者如閔損王祥之𩔖皆繼母也夫是之謂孝𤣥齡其知此矣虞世南初仕隋歴起居舍人隋制掌書王言動作之事以為國志宇文化及殺逆之際殺讀曰弑其兄世基時為内史侍郎隋改中書為内史將被誅世南抱持號泣號平聲請以身代死化及竟不納世南自此哀毁骨立者數載時人稱重焉愚按虞世基兄弟出于吳中嘗從顧野王學一時文學才譽人比之晉二陸入隋而俱登班列世基與宇文化及之難世南不愛其身求代其兄其孝友可尚已世南歸唐為唐名卿盖其温恭豈弟出於天性云韓王元嘉髙祖第十一子也少好學藏書至萬卷皆以古文參定同異當世稱之貞觀初史作六年為潞州刺史潞州今仍舊𨽻河東時年十五在州聞太妃有疾太妃韓王之母隋大將軍宇文述之女也為昭儀有寵髙祖即位欲立為后固辭不受韓王以母有寵而為帝所愛便涕泣不食及至京師發䘮平聲哀毁過禮太宗嘉其至性屢慰勉之元嘉閨門修整有𩔖寒素士大夫與其弟魯哀王靈䕫髙祖第十九子韓王同母弟也好學善音律後以謀欲起兵應接越王貞父子事洩自縊謚曰哀甚相友愛兄弟集見如布衣之禮其修身潔已内外如一當代諸王莫能及者霍王元軌髙祖第十四子也多才藝出為刺史所至閉閤讀書與處士劉𤣥平為布衣交或問王所長𤣥平曰王無不備吾何以稱之武徳中初封為吳王武徳六年封蜀王八年徙封吳王貞觀七年為夀州刺史夀州今為安豐路𨽻淮西屬髙祖崩去職毁瘠過禮自後常衣布服衣去聲示有終身之戚太宗嘗問侍臣曰朕子弟孰賢侍中魏徵對曰臣愚暗不盡知其能惟吳王數與臣言數音朔臣未嘗不自失太宗曰卿以為前代誰比徵曰經學文雅亦漢之間平漢河間獻王徳東平憲王蒼也至如孝行去聲乃古之曾閔也曾參閔損也由是寵遇彌厚因令妻徵女焉令平聲妻去聲愚按孟子言性善堯舜至于塗人一也王孫公子之貴其性豈與人異哉孟子所謂其居使之然也觀太宗諸弟若韓王元嘉霍王元軌天性之孝友居處之儉約操履之修潔有一介之士所難能者可謂賢也已矣是尤見人性之初無爾殊也彼昏不知者乃自絶其天理耳貞觀中有突厥史行昌突厥阿史那氏此因以史為姓行昌其名也直𤣥武門𤣥武北方宿名取以名門也食而捨肉人問其故曰歸以奉母太宗聞而歎曰仁孝之性豈隔華夷賜尚乗馬一疋乗去聲尚乗主車乗之官詔令給其母肉料令平聲愚按一直門之士夷貊之人也而有孝于其母之心事聞於萬乗獲仁孝之褒優賜之厚則有人心者孰不感發於孝乎公平第十六凡八章太宗初即位中書令房𤣥齡奏言秦府舊左右未得官者並怨前宫及齊府左右處分之先已處上聲分先並去聲太宗曰古稱至公者盖謂平恕無私丹朱商均子也而堯舜廢之堯知子丹朱之不肖不足授天下卒授舜舜之子商均亦不肖乃以天下授禹管叔蔡叔兄弟也而周公誅之管叔名鮮蔡叔名度皆文王之子也武王既克殷封鮮于管封度于蔡相紂子武庚祿父治殷遺民武王崩成王少周公旦專王室叔疑之乃挟武庚作亂周公承王命遂誅武庚殺管叔流蔡叔故知君人者以天下為公無私於物昔諸葛孔眀小國之相去聲諸葛複姓字孔眀名亮琅琊人為蜀丞相猶曰吾心如稱與秤同不能為人作輕重為去聲後同况我今理大國乎朕與公等衣食出于百姓此則人力己奉於上而上恩未被於下今所以擇賢才者盖為求安百姓也用人但問堪否豈以新故異情凡一靣尚且相親况舊人而頓忘也才若不堪亦豈以舊人而先用今不論其能不能而直言其嗟怨豈是至公之道耶貞觀元年有上封事者請秦府舊兵並授以武職追入宿衛太宗謂曰朕以天下為家不能私於一物惟有才行是任行去聲豈以新舊為差况古人云兵猶火也弗戢將自焚汝之此意非益政理愚按書曰天視自我民視天聴自我民聴天無視聴以民為視聴一至公而已太宗踐祚之初首發至公無私之論古帝王憲天聰眀用是道也房𤣥齡言秦府未得官者共怨前宫齊府左右之先已則曰用人惟才不論舊故不如是則私故府之士矣有請秦府舊兵授以武職追入宿衛則曰唯有才行是任豈以新舊為差不如是則私故府之兵矣君天下者毎以至公存心何往而不當于人心乎貞觀元年吏部尚書長孫無忌嘗被召不解佩刀入東上閣門出閣門後監門校尉始覺尚書右僕射封徳彛議以監門校尉不覺罪當死無忌誤帶刀入徒二年罰銅二十斤太宗從之大理少卿少去聲卿之貳也戴胄駁曰校尉不覺無忌帶刀入内同為誤耳夫臣子之於尊極夫音扶不得稱誤准律云供御湯藥飲食舟船誤不如法者皆死陛下若錄其功非憲司所决若當據法罰銅未為得理太宗曰法者非朕一人之法乃天下之法何得以無忌國之親戚便欲撓法耶更令定議令平聲後同徳彛執議如初太宗將從其議胄又駮奏曰校尉緣無忌以致罪於法當輕若論其過誤則為情一也為情如字而生死頓殊敢以固請太宗乃免校尉之死是時朝廷大開選舉或有詐偽階資者太宗令其自首首去聲後同不首罪至於死俄有詐偽者事洩胄據法斷流以奏之太宗曰朕初下敕不首者死今斷從流是示天下以不信矣胄曰陛下當即殺之非臣所及既付所司臣不敢虧法太宗曰卿自守法而令朕失信耶胄曰法者國家所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿朝音昭而許殺之既知不可而寘之以法此乃忍小忿而存大信臣竊為陛下惜之為去聲太宗曰朕法有所失卿能正之朕復何憂也張氏九成曰法者天下公共雖天子喜怒不得輕重胄為大理之議可謂用法平允矣守所司之法不顧天子之詔救上之失逹君之聴使四海取信民不寃濫為吏若此國家何所患哉唐氏仲友曰書曰無虐㷀獨而畏髙眀盖小人之情必虐㷀獨而畏髙眀君子反是向無胄之言則太宗為失刑背皇極之訓矣其為利害豈淺哉愚按封徳彛隋之佞人也及唐之興以秘䇿而見用遂移其所以事隋者事唐勸用法律之説若行則仁義之效民生不覩於貞觀之世矣今觀徳彛與戴胄論無忌校尉之罪用捨之間其得失視仁義法律之説未相輕重也為國在于用人用人豈容輕哉非戴胄執法之公太宗從善之速其不寃人者幾希矣貞觀二年太宗謂房𤣥齡等曰朕比見比音鼻隋代遺老咸稱髙熲善為相者相去聲後同髙熲字昭𤣥隋之賢相煬帝以其忠諫為謗訕誅之遂觀其本傳去聲可謂公平正直尤識治體隋室安危繫其存沒煬帝無道枉見誅夷何嘗不想見此人廢書欽歎又漢魏以来諸葛亮為丞相亦甚平直嘗表廢廖立字公淵武陵人仕蜀為長水使者李嚴字正方南陽人仕蜀為中都説於南中立聞亮卒泣曰吾其左袵矣嚴聞亮卒發病而死故陳夀晉人撰三國志稱亮之為政開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者若如是則榮名髙位可以長守𤣥齡對曰臣聞理國要道在於公平正直故尚書云尚如字無偏無黨王道蕩蕩無黨無偏王道平平周書洪範篇之辭又孔子稱舉直錯諸枉則民服錯讀曰措孔子對魯哀公之辭今聖慮所尚誠足以極政教之源盡至公之要囊括區宇化成天下太宗曰此直朕之所懷豈有與卿等言之而不行也愚按昔傅説告髙宗曰事不師古以克永世匪説攸聞太宗謂朕每慕前代帝王之善者卿等可慕宰相之賢者其有合於師古者乎前代帝王之善者若堯舜禹湯文武成康降是則漢七制之主是已前代宰相之賢者若皋夔稷契伊傅周召降是則蕭曹丙魏是已髙熲之公平正直亦可謂賢相矣惜昧于不可則止之義諸葛亮王佐才也誠有古良相之遺風三代而下所不常見太宗令相臣企慕之亦知人哉嗚呼二帝三王之相不得而見之矣得見如武侯者斯可矣長樂公主樂音洛公主太宗第五女封長樂郡下嫁長孫沖文徳皇后所生也貞觀六年將出降謂下嫁也敕所司資送倍於長公主長音掌後同通鑑作永嘉長公主乃髙祖之女也魏徵奏言昔漢眀帝欲封其子帝曰朕子豈得同於先帝子乎可半楚淮陽王楚王英淮陽王昞皆光武子前史以為羙談天子姊妹為長公主天子之女為公主既加長字良以尊於公主也情雖有殊義無等别彼列切若令公主之禮令平聲有過長公主理恐不可實願陛下思之太宗稱善乃以其言告后后歎曰嘗聞陛下敬重魏徵殊未知其故而今聞其諫乃能以義制人王之情真社稷臣矣妾與陛下結髪為夫妻曲䝉禮敬情義深重每將有言必候顔色尚不敢輕犯威嚴况在臣下情踈禮隔故韓非謂之說難韓非戰國時刑名之學者東方朔稱其不易以䜴切東方朔字曼倩平原人漢武帝時為大夫良有以也忠言逆耳而利於行有國有家者深所要急納之則世治杜之則政亂誠願陛下詳之則天下幸甚因請遣中使去聲賫帛五百匹詣徵宅以賜之愚按易之歸妺曰帝乙歸妺其君之袂不如其娣之袂良盖謂王姬下嫁位雖至貴不事容餙也娣媵以容餙為事而衣袂所以為容餙者也尚禮而不尚餙故其袂不及其娣之袂良以儉徳也太宗于公主之降敕所司資送倍長公主雖以后之所生毋乃牽于愛而不節以制度乎是道之以踰禮越法矣幸魏徵之忠諫太宗之聴從而文徳皇后又從而褒賞之也若后之徳雖漢之隂馬亦不能及可謂無愧周之任姒邑姜者矣正家而天下定后之謂歟刑部尚書張亮坐謀反下獄亮為相州刺史假子公孫節以䜟有弓長之主當别都亮自以相舊都弓長其姓陰有怪謀陕人常徳告發其謀并言亮養假子五百太宗曰正欲反耳遣房𤣥齡謂曰法者天下平與公共為之公不自修乃至此將奈何于是斬之籍其家詔令百官議之令平聲後同多言亮當誅惟殿中少監少去聲唐制殿中監掌天下服御之事少監其貳也李道裕奏亮反形未具眀其無罪太宗既盛怒竟殺之俄而刑部侍郎有闕侍郎尚書之貳令宰相妙擇其人相去聲累奏不可太宗曰吾己得其人矣往者李道裕議張亮云反形未具可謂公平矣當時雖不用其言至今追悔遂授道裕刑部侍郎唐氏仲友曰道裕議張亮反形未具太宗不暇省嵗餘乃以刑部命道裕太宗可謂能改過道裕可謂善議刑矣愚按因李道裕議張亮之獄遂有刑部侍郎之除不唯見太宗悔過之心亦足見太宗擇人之術又所以示天下以明慎用刑之意開人臣以有過必諫之路也唐之刑部周官司寇掌邦禁之職妙擇其人而不輕授帝舜之命皋陶由此其選也太宗是舉衆善集焉貞觀初太宗謂侍臣曰朕今孜孜求士欲專心政道聞有好人則抽擢驅使而議者多稱彼者皆宰臣親故但公等至公行事勿避此言便為形迹古人内舉不避親外舉不避讎而為舉得其真賢故也但能舉用得才雖是子弟及有讐嫌不得不舉愚按祁奚舉賢不避祁午謝安舉將不避謝𤣥大臣之用人唯其公而已矣茍得其人雖子弟可也况親戚乎太宗謂侍臣但能舉用得才勿避形迹斯言當矣異時或告魏徵阿黨親戚太宗命案驗無狀乃使謂徵曰自今宜存形迹則又與斯言相戾矣使非鄭公直言不撓果得以踐斯言否乎貞觀十一年時屢有閹宦充外使閹音淹使去聲後同妄有奏事發太宗怒魏徵進曰閹竪雖微狎近左右時有言語輕而易信易以䜴切浸潤之譛為患特深今日之眀必無此慮為子孫教不可不杜絶其源太宗曰非卿朕安得聞此語自今已後充使宜停魏徵因上疏曰臣聞為人君者在乎善善而惡惡上烏去聲下如字後同近君子而逺小人逺去聲後同善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政逺小人則聴不私邪小人非無小善君子非無小過君子小過盖白玊之微瑕小人小善乃鈆刀之一割鈆刀一割良工之所不重小善不足以掩衆惡也白玊微瑕善賈之所不棄賈音古小疵不足以妨大美也善小人之小善謂之善善惡君子之小過惡烏去聲謂之惡惡此則蒿蘭同嗅玊石不分屈原所以沉江屈原名平楚懐王大夫王信讒而不見用乃自沉汨羅江而死卞和所以泣血者也卞和楚人得玊璞獻厲王王以為偽刖其足和抱璞而泣繼之以血既識玊石之分又辨蒿蘭之臭善善而不能進惡惡而不能去上聲此郭氏所以為墟事見納諫篇史魚所以遺恨也家語曰史魚病將卒命其子曰吾不能進蘧伯玊退彌子瑕是吾為臣不能正其君也生不能正其君則死無以成禮我死汝置屍牖下其子從之靈公弔其子以告公公曰寡人之過也命殯之客位進蘧伯玉而用退彌子瑕而逺之孔子曰古之諫者死則已矣未有如史魚死而屍諫忠感其君者也可不謂直乎陛下聰眀神武天姿英叡志存泛愛引納多塗好善而不甚擇人好去聲後同疾惡而未能逺佞又出言無隐疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之眀猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣長音掌後同聞善或疑則君子之道消矣為國家者急於進君子而退小人乃使君子道消小人道長則君臣失序上下否隔否音枇亂亡不䘏將何以理乎且世俗常人心無逺慮情在告訐好言朋黨夫以善相成夫音扶後同謂之同徳以惡相濟謂之朋黨今則清濁共流善惡無别彼列切以告訐為誠直以同徳為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不結於下臣忠所以不達於上大臣不能辯正小臣莫之敢論逺近承風混然成俗非國家之福非為理之道適足以長姦邪亂視聴使人君不知所信臣下不得相安若不逺慮深絶其源則後患未之息也今之幸而未敗者由乎君有逺慮雖失之於始必得之於終故也若時逢少隳往而不返雖欲悔之必無所及既不可以傳諸後嗣復何以垂法將来且夫進善黜惡施於人者也施平聲後同以古作鑒施於己者也鑒貌在乎止水鑒已在乎哲人能以古之哲王鑒於己之行事則貌之妍醜宛然在目事之善惡自得於心無勞司過之史不假芻蕘之議巍巍之功日著赫赫之名彌逺為人君者可不務乎臣聞道徳之厚莫尚於軒唐仁義之隆莫彰於舜禹欲繼軒唐之風將追舜禹之跡必鎮之以道徳𢎞之以仁義舉善而任之擇善而從之不擇善任能而委之俗吏既無逺度必失大體惟奉三尺之律以繩四海之人欲求垂拱無為不可得也故聖哲君臨移風易俗不資嚴刑峻法在仁義而已故非仁無以廣施如字非義無以正身惠下以仁正身以義則其政不嚴而理其教不肅而成矣然則仁義理之本也刑罰理之末也為理之有刑罰猶執御之有鞭䇿也人皆從化而刑罰無所施馬盡其力則有鞭䇿無所用由此言之刑罰不可致理亦己眀矣故潛夫論夫如字後漢王符字節信著書號潛夫論曰人君之理莫大於道徳教化也民有性有情有化有俗情性者心也本也俗化者行也末也行去聲後同是以上君撫世先其本而後其末順其心而履其行心情苟正則姦慝無所生邪意無所載矣是故上聖無不務理民心故曰聴訟吾猶人也必也使無訟乎孔子之辭道之以禮務厚其性而眀其情民相愛則無相傷害之意動思義則無畜姦邪之心若此非律令之所理也此乃教化之所致也聖人甚尊徳禮而卑刑罰故舜先敕契以敬敷五教契音泄舜臣名五教謂父子有親君臣有義夫婦有别長㓜有序朋友有信而後任咎繇以五刑也咎繇與皋陶同五刑謂墨劓剕宫大辟也凡立法者非以司民短而誅過誤也乃以防姦惡而救禍患檢淫邪而内正道内讀曰納民䝉善化則人有士君子之心被惡政則人有懐姦亂之慮故善化之養民猶工之為麯豉也六合之民猶一廕也黔首之屬秦稱民曰黔首猶荳麥也變化云為在將者耳遭良吏則懐忠信而履仁厚遇惡吏則懐姦邪而行淺薄忠厚積則致太平淺薄積則致危亡是以聖帝眀王皆敦徳化而薄威刑也徳者所以循已也威者所以理人也民之生也猶鑠金在爐方圎薄厚隨鎔制耳是故世之善惡俗之薄厚皆在於君世之主誠能使六合之内舉世之人感忠厚之情而無淺薄之惡各奉公正之心而無姦險之慮則醇釅之俗醇音淳釅音驗言俗如酒味之和也復見於兹矣後王雖未能遵專尚仁義當慎刑䘏典哀敬無私故管子曰聖君任法不任智任公不任私故王天下王去聲理國家貞觀之初志存公道人有所犯一一於法縱臨時處斷上上聲下去聲或有輕重但見臣下執論無不忻然受納民知罪之無私故甘心而不怨臣下見言無忤故盡力以効忠頃年以来意漸深刻雖開三靣之網見規諫篇注而察見川中之魚取捨在於愛憎輕重由乎喜怒愛之者罪雖重而強為之辭强上聲惡之者過雖小而深探其意惡烏去聲後同探平聲法無定科任情以輕重人有執論疑之以阿偽故受罰者無所控告當官者莫敢正言不服其心但窮其口欲加之罪其無辭乎又五品已上有犯悉令平聲曹司聞奏本欲察其情狀有所哀矜今乃曲求小節或重其罪使人攻擊惟恨不深事無重條求之法外所加十有六七故頃年犯者懼上聞得付法司以為多幸告訐無已窮理不息君私於上吏姦於下求細過而忘大體行一罰而起衆姦此乃背公平之道背音倍乖泣辜之意見封建篇注欲其人和訟息不可得也故體論云夫淫佚盜竊百姓之所惡也我從而刑罰之雖過乎當去聲百姓不以我為暴者公也怨曠饑寒亦百姓之所惡也遁而䧟之法我從而寛宥之百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞輕而勸善刑省而禁姦由此言之公之於法無不可也過輕亦可私之於法無可也過輕則縱姦過重則傷善聖人之於法也公矣然猶懼其未也而救之以化此上古所務也後之理獄者則不然未訊罪人則先為之意及其訊之則驅而致之意謂之能不探獄之所由生為之分探平聲而上求人主之微㫖以為制謂之忠其當官也能其事上也忠則名利隨而與之驅而䧟之欲望道化之隆亦難矣凡聴訟吏獄必原父子之親立君臣之義權輕重之序測淺深之量悉其聰眀致其忠愛疑則與衆共之疑則從輕者所以重之也故舜命咎繇曰汝作士惟刑之恤出虞書又復加之以三訊周禮以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民衆所善然後斷之是以為法叅之人情故傳曰傳去聲小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨者也立愛憎者也右親戚者也䧟怨讐者也怨平聲何世俗小吏之情與夫古人之懸逺乎有司以此情疑之羣吏人主以此情疑之有司是君臣上下通相疑也欲其盡忠立節難矣凡理獄之情必本所犯之事以主不敢訊不旁求不貴多端以見聰眀故律正其舉劾之法叅伍其辭所以求實也非所以飾實也但當叅伍眀聴之耳不使獄吏鍛鍊飾理成辭於手孔子曰古之聴獄求所以生之也今之聴獄求所以殺之也故析言以破律任案以成法執左道以必加也又淮南子漢淮南王安著書曰淮南子曰豐水之深十仞金鐵在焉則形見於外見音現非不深且清而魚鱉莫之歸也故為者以苛為察以功為眀以刻下為忠以訐多為功譬猶廣革大則大矣裂之道也夫賞宜從重罰宜從輕君居其厚百王通制刑之輕重恩之厚薄見思與見疾其可同日言哉且法國之權衡也時之凖繩也權衡所以定輕重凖繩所以正曲直今作法貴其寛平罪人欲其嚴酷喜怒肆志髙下在心是則捨凖繩以正曲直棄權衡而定輕重者也不亦惑哉諸葛孔眀小國之相去聲猶曰吾心如秤不能為人作輕重為去聲况萬乗之主天子畿内之地方千里出車萬乗故曰萬乗之主當可封之日唐虞之世比屋可封而任心棄法取怨於人乎又時有小事不欲人聞則暴作威怒以弭謗議若所為是也聞於外其何傷若所為非也雖掩之何益故諺曰欲人不知莫若不為欲人不聞莫若勿言為之而欲人不知言之而欲人不聞此猶捕雀而掩目盜鐘而掩耳者秪以取誚將何益乎臣又聞之無常亂之國無不可理之民者夫民之善惡由乎化之厚薄故禹湯以之理桀紂以之亂文武以之安幽厲以之危是以古之哲王盡已而不以尤人求身而不以責下故曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉左傳臧文仲告魯君之辭為之無己深乖惻隐之情實啟姦邪之路温舒恨於曩日温舒前漢人嘗上書言獄吏之害臣亦欲惜不用非所不聞也臣聞堯有敢諫之鼓通厯曰堯定四岳置諫鼓舜有誹謗之木淮南子曰舜立誹謗之木湯有司過之史淮南子曰湯有司直之人武有戒慎之銘太公述丹書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶武王聞之退而為戒乃書於几鑑盂槃為銘出大戴禮此則聴之於無形求之於未有虚心以待下庶下情之逹上上下無私君臣合徳者也魏武帝云有徳之君樂聞逆耳之言犯顔之諍樂音洛親忠臣厚諫士斥讒慝逺佞人者逺去聲後同誠欲全身保國逺避滅亡者也凡百君子膺期統運縱未能上下無私君臣合徳可不全身保國逺避滅亡乎然自古聖哲之君功成事立未有不資同心予違汝弼者也昔在貞觀之初側身勵行謙以受物盖聞善必改時有小過引納忠規每聴直言喜形顔色故凡在忠烈咸竭其辭自頃年海内無虞逺夷懾服志意盈滿事異厥初髙談疾邪而喜聞順㫖之説空論忠讜而不悦逆耳之言私嬖之徑漸開至公之道日塞往来行路咸知之矣邦之興衰實由斯道為人上者可不勉乎臣數年以来每奉眀㫖深懼羣臣莫肯盡言臣竊思之自比来比音鼻人或上書事有得失惟見述其所短未有稱其所長又天居自髙龍鱗難犯在於造次造七到切不敢盡言時有所陳不能盡意更思重竭重平聲其道無因且所言當理當去聲未必加於寵秩意或乖忤將有恥辱隨之莫能盡節實由於此雖左右近侍朝夕堦墀事或犯顔咸懐顧望况疎逺不接將何以極其忠欵哉又時或宣言云臣下見事秪可来道何因所言即望我用此乃拒諫之辭誠非納忠之意何以言之犯主嚴顔獻可替否所以成主之羙匡主之過若主聴則惑事有不行使其盡忠讜之言竭股肱之力猶恐臨時恐懼莫肯效其誠欵若如眀詔所道便是許其靣從而又責其盡言進退將何所據欲必使乎致諫在乎好之而已好去聲後同故齊桓好服紫而合境無異色楚王好細腰而後宫多餓死言上有好者下必有甚之意夫以耳目之玩人猶死而不違况聖眀之君求忠正之士千里斯應信不為難若徒有其言而内無其實欲其必至不可得也太宗手詔曰省前後諷諭省悉井切皆切至之意固所望於卿也朕昔在衡門尚惟童㓜未漸師保之訓漸音尖罕聞先達之言值隋主分崩萬邦塗炭惵惵黔黎惵音蝶庇身無所朕自二九之年有懐拯溺發憤投袂便提干戈䝉犯霜露東西征伐日不暇給居無寧嵗降蒼昊之靈禀廟堂之畧義旗所指觸向平夷弱水流沙今屬甘肅並通輶軒之使去聲輶輕車也被髪左袵四夷之人也皆為衣冠之域正朔所班無逺不届及恭承寶歴寅奉帝圖垂拱無為氛埃靖息於兹十有餘年斯盖股肱罄帷幄之籌爪牙竭熊羆之力協徳同心以致於此自惟寡薄厚享斯休毎以撫大神器憂深責重常懼萬幾多曠四聰不達戰戰兢兢坐以待旦詢於公卿以至𨽻皂推以赤心庶幾眀頼一動以鍾石淳風至徳永傳於竹帛克播鴻名常為稱首朕以虚薄多慙往代若不任舟楫豈得濟彼巨川不藉鹽梅安得調夫五味商書髙宗命傅説曰若濟巨川用汝作舟楫又曰若作和羮爾唯鹽梅賜絹三百匹愚按春秋之世衛至弱也季子知其後亡齊至强也周公知其後多簒弑夫所貴乎聖賢者以其見禮知政而前知于未然之先也善乎魏徵之言曰閹宦雖㣲為患特深今日之眀必無此慮為子孫計不可不杜絶其源厥後唐之中葉竟以宦者而亂及其末世遂以宦者而亡徵之眀見雖周公季子何逺之有哉太宗斯時正當著之為令俾後之子孫世世無得使宦者與政可也乃不過停其充使是特一時之計耳豈貽厥孫謀者耶徵既言閹宦之禍復上疏數千言極陳當時之失史稱徵諫疏二百餘篇其見於世者則此其最詳者也太宗答詔丁寧寵賜優渥君臣相與之際何其盛哉誠信第十七凡四章貞觀初有上書請去佞臣者去上聲太宗謂曰朕之所任皆以為賢卿知佞者誰耶對曰臣居草澤不的知佞者請陛下佯怒以試羣臣若能不畏雷霆直言進諫則是正人順情阿㫖則是佞人太宗謂封徳彛曰流水清濁在其源也君者政源人庶猶水君自為詐欲臣下行直是猶源濁而望水清理不可得朕常以魏武帝多詭詐深鄙其為人如此豈可堪為教令謂上書人曰朕欲使大信行於天下不欲以詐道訓俗卿言雖善朕所不取也范氏祖禹曰太宗可謂知君道矣夫君以一人之身御四海之廣應萬務之衆苟不以至誠與賢而役其獨智以先天下則耳目心智之所及者其能幾何是故人君必清心以涖之虛已以待之如鑑之眀如水之止則物至而不能罔矣夫權衡設而不可欺以輕重者唯其平也繩墨設而不可欺以曲直者唯其正也我以其正彼以其頗我以其真彼以其偽何患乎邪之不察佞之不辨而必行詐以試之哉一為不誠則心且蔽矣邪正何能辨乎是故鑑垢則物不能察也水動則形不能見也已不眀故也且待物以誠猶恐其不動也况不誠而能動物乎夫為君而使左右前後之人皆莫測其所為雖欲不欺不可得也唯能御以至誠則忠直者進而憸邪者無自入矣愚按昔夫子答顔淵為邦之問終之曰逺佞人佞人殆甚矣佞人之足以䘮家國也禹之答皋陶曰知人則哲何畏乎巧言令色孔壬盖人主一心攻之者衆一有所偏則讒邪靣䛕之人乗隙而進儻君心虛眀旁燭無疆則正邪自不能逃吾水鑑矣太宗謂君自為詐欲臣下直是猶源濁而望水清欲使大信行於天下不欲以詐真王言哉貞觀十年魏徵上疏曰臣聞為國之基必資於徳禮君之所保惟在於誠信誠信立則下無二心徳禮形則逺人斯格然則徳禮誠信國之大綱在於君臣父子不可斯須而廢也故孔子曰君使臣以禮臣事君以忠孔子對魯定公之辭又曰自古皆有死民無信不立孔子答子貢之辭文子姓辛名鈃一名計然濮上人師事老子著書十二篇名之曰通𤣥真經曰同言而信信在言前同令而行誠在令外然則言而不行言無信也令而不從令無誠也不信之言無誠之令為上則敗徳為下則危身雖在顛沛之中君子之所不為也自王道休眀十有餘載威加海外萬國来庭倉廪日積土地日廣然而道徳未益厚仁義未益博者何哉由乎待下之情未盡於誠信雖有善始之勤未覩克終之美故也昔貞觀之始乃聞善驚歎暨八九年間猶悦以從諫自兹厥後漸惡直言惡烏去聲後惡利同雖或勉强有所容強上聲非復曩時之豁如謇諤之輩稍避龍鱗便佞之徒肆其巧辯便平聲謂同心者為擅權謂忠讜者為誹謗謂之為朋黨雖忠信而可疑謂之為至公雖矯偽而無咎彊直者畏擅權之議忠讜者慮誹謗之尤正臣不得盡其言大臣莫能與之爭讀曰諍熒惑視聴鬱於大道妨政損徳其在此乎故孔子曰惡利口之覆邦家者盖為此也為去聲且君子小人貌同心異君子掩人之惡揚人之善臨難無茍免難去聲殺身以成仁小人不恥不仁不畏不義唯利之所在危人自安夫茍在危人則何所不至夫音扶後同今欲將求致理必委之於君子事有得失或訪之於小人其待君子也則敬而疎遇小人也必輕而狎狎則言無不盡踈則情不上通是則毁譽在於小人譽平聲刑罰加於君子實興䘮之所在可不慎哉此乃孫卿所謂使智者謀之與愚者論之使修潔之士行之與汙鄙之人疑之欲其成功可得乎哉夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免於傾敗况内懐奸利承顔順㫖其為禍患不亦深乎夫立直木而疑影之不直雖竭精神勞思慮其不得亦已眀矣夫君能盡禮臣得竭忠必在於内外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣昔齊桓公問於管仲曰吾欲使酒腐於爵肉腐於俎得無害霸乎管仲曰此極非其善者然亦無害於霸也桓公曰如何而害霸乎管仲曰不能知人害霸也知而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也晉中行穆伯中行氏穆伯晉卿也攻鼓城名經年而弗能下餽間倫間去聲後同曰鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一㦸折音舌不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若使間倫下之吾可以不賞之乎若賞之是賞佞人也佞人得志是使晉國之士捨仁而為佞雖得鼔將何用之夫穆伯列國之大夫管仲霸者之良佐猶能慎於信任逺避佞人也如此逺去聲况乎為四海之大君應千齡之上聖而可使巍巍至徳之盛將有所間乎若欲令平聲君子小人是非不雜必懐之以徳待之以信厲之以義節之以禮然後善善而惡惡上烏去聲下如字後同審罰而眀賞則小人絶其私佞君子自強不息無為之治何逺之有善善而不能進惡惡而不能去上聲罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚𦙍將何望哉太宗覽疏歎曰若不遇公何由得聞此語按史傳係十一年是嵗大雨穀洛溢毁官寺十九漂居人六百家故徵上疏陳事帝手詔嘉答於是廢眀徳宫𤣥圃院賜遭水者疏文比此章尤多唐氏仲友曰徵論基於徳禮保于誠信然而道徳未益厚仁義未益愽由待下之情未盡誠信最中太宗之病道徳仁義禮倘皆以誠信行之則終始唯一時乃日新豈至有善始之勤無克終之羙哉愚按天下之理一而已矣徳者得此理者也禮者履此理者也而誠信者實此理者也魏徵之諫疏並舉徳禮誠信而言之其要主於誠信其間如文子管仲中行穆伯之言皆出于誠信而言之也夫誠信者實心也有徳有禮而以實心行之則固善始而善終矣何憂于危亡哉徵之言於是乎知本矣太宗嘗謂長孫無忌等曰朕即位之初有上書者非一或言人主必須威權獨任不得委任羣下或欲耀兵振武懾服四夷惟有魏徵勸朕偃革興文布徳施惠施平聲中國既安逺人自服朕從此語天下大寧絶域君長皆來朝貢長音掌九夷重譯相望於道重平聲凡此等事皆魏徵之力也朕任用豈不得人徵拜謝曰陛下聖徳自天留心政術實以庸短承受不暇豈有益於聖明愚按先儒論學問以變化氣質為先論克己以性偏難克為始夫豈徒學者之事為然哉大臣正君之道亦如是而已矣愚觀太宗天資英武明敏不患其不能為而患其過于為不患其不能斷但患其過于斷當貞觀即位之初或勸其獨運威權或勸其懾服四夷此皆太宗之所已能所謂以水濟水以火濟火者也魏徵獨勸以偃武興文布徳施惠損其有餘益其不及兹非變其氣質而克其偏者歟甚矣徵之能正君也不然貞觀之治太宗何以獨歸功于徵哉貞觀十七年太宗謂侍臣曰傳稱去食存信傳去聲去上聲孔子曰人無信不立並孔子答子貢之辭昔項羽既入咸陽已制天下向能力行仁信誰奪耶項羽引兵屠咸陽殺秦降王子嬰燒秦宫室収其貨寳婦女而東秦民大失望房𤣥齡對曰仁義禮智信謂之五常廢一不可能勤行之甚有禆益殷紂狎侮五常武王奪之周書武王誓師之言曰今商王受狎侮五常項氏以無信為漢髙祖所奪誠如聖㫖愚按蕫子曰仁義禮智信五常之道王者所宜修飾也先儒謂此因武帝何修何飾之問而言其意雖甚正惜其剖析未明使武帝知若何而為仁若何而為義其修飾之方又孰先孰後也可為仲舒惜今觀太宗猶能以去食存信語羣臣而𤣥齡之對謂五常廢一不可誠是已儻能一一而明辨之使太宗知人之性情心之體用本然全具而各有條理必當反求黙識而擴充之不亦善乎愚于是復為𤣥齡惜貞觀政要卷五欽定四庫全書貞觀政要卷六唐吳兢撰元戈直集論儉約第十八凡八章貞觀元年太宗謂侍臣曰自古帝王凡有興造必須貴順物情昔大禹鑿九山禹貢曰九山刋旅蔡氏注九州之山也如冀州則梁岐之𩔖通九江禹貢曰九江孔殷蔡氏注即今之洞庭也今沅水漸水元水辰水敘水酉水澧水資水湘水皆合於洞庭故曰九江漢志所謂九江非是用人力極廣而無怨讟者物情所欲而衆所共有故也秦始皇營建宫室而人多謗議者為徇其私欲為去聲不與衆共故也朕今欲造一殿材木已具逺想秦皇之事遂不復作也復音缶古人云不作無益害有益周書旅獒之辭不見可欲使民心不亂老子之辭固知見可欲其心必亂矣至如雕鏤器物鏤音陋珠玉服玩若恣其驕奢則危亡之期可立待也自王公己下第宅車服婚嫁喪𦵏喪平聲準品秩不合服用者宜一切禁斷由是二十年間風俗簡樸衣無錦繡財帛富饒無饑寒之弊貞觀二年公卿奏曰依禮季夏之月可以居臺榭禮記仲夏之月毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭今夏暑未退秋霖方始宫中卑濕請營一閣以居之太宗曰朕有氣疾豈宜下濕若遂來請糜費良多昔漢文将起露臺而惜十家之産見教戒篇注朕徳不逮于漢帝而所費過之豈為人父母之道也固請至于再三竟不許朱氏黼曰財用之贏縮關於侈儉風俗好尚本之人主以儉約為先則公卿大夫不敢踰制朝廷以儉約為先則士庶人不敢越分尊卑上下事事物物皆尚質崇樸自然家給人足貨財不可勝用矣茍或反是則朝廷百官誇多鬬靡四方士民歆羨倣傚天地之生物有限上下之財力有涯烏能周贍而普足哉漢文帝惜十家之産基址既成而一臺不築於是成富庶之功唐太宗監秦人之敝材用既具而一殿不為於是成貞觀之治撙節於一身者甚微而功利之及一世者甚大窒遏一時之欲者甚微而培養數百年之基本者甚著人主其可不察哉愚按太宗可謂知化民之本矣一殿之建材木已具監秦皇之侈而亟已之一閣之營公卿所請慕漢帝之儉而竟不許其所以致貞觀之富庶也宜哉貞觀四年太宗謂侍臣曰崇飾宫宇遊賞池臺帝王之所欲百姓之所不欲帝王所欲者放逸百姓所不欲者勞弊孔子云有一言可以終身行之者其恕乎已所不欲勿施於人施平聲後同論語之辭勞弊之事誠不可施於百姓朕尊為帝王富有四海每事由已誠能自節若百姓不欲必能順其情也魏徵曰陛下本憐百姓每節已以順人臣聞以欲從人者昌以人樂已者亡樂音洛隋煬帝志在無厭平聲惟好奢侈好去聲後同所司每有供奉營造供平聲小不稱意稱去聲則有峻罰嚴刑上之所好下必有甚競為無限遂至滅亡此非書籍所𫝊亦陛下目所親見為其無道為去聲故天命陛下代之陛下若以為足今日不啻足矣啻音翅若以為不足更萬倍過此亦不足太宗曰公所奏對甚善非公朕安得聞此言貞觀十六年太宗謂侍臣曰朕近讀劉聰傳去聲劉聰字𤣥明元海第四子本新興匈奴以漢髙祖嘗以宗女妻冒頓故子孫冒劉姓元海於晉永興中立國是為前趙聰殺兄自立聰将為劉后為去聲后太保劉殷之女為左貴嬪後立為后起䳨儀殿廷尉陳元達廷尉獄官也元達字長宏後部人本姓髙以生月妨父改姓陳切諫聰大怒命斬之劉后手疏啓請辭情甚切聰怒乃解而甚愧之晉載記劉聰将起殿於後庭陳元達切諫聰大怒曰吾為萬幾主豈問汝鼠子乎将出斬之時在逍遥園李中堂劉后聞之密勅停刑上手疏曰今宫室已備宜愛民力廷尉之言四海之福也陛下宜加封賞而更誅之四海謂陛下如何哉陛下今興工費廣為妾營殿而殺諫臣使天下罪妾妾何以當之願賜死以塞陛下之過聰覽之命引元達謝之曰外輔如公内輔如后朕復何憂更命園曰納賢園堂曰愧賢堂人之讀書欲廣聞見以自益耳朕見此事可以為深誡比者比音鼻欲造一殿仍構重閣重平聲今於藍田縣名今仍舊屬奉元路採木並已備具逺想聰事斯作遂止愚按隋煬帝窮土木之工極宫室之麗迨有甚扵紂之傾宫鹿臺卒致家國不保然亦隋文帝有以啟之也文帝興王之君也天下既平而仁夀之役民不勝困是以後嗣傚之殆有甚焉太宗取孤隋殘弊之天下所宜休息幸而營造之事或納人言而止或監前古而止其過隋文逺矣觀其言曰帝王所欲者放逸百姓所不欲者勞弊以聖人之所謂恕而推已所不欲勿施於人之心君人者而味斯言也豈惟崇飾宫宇池臺為然哉樂聲色也求神仙也闢土地也事畋獵也肆遊觀也凡非百姓之所欲者一以恕之一言行之祈天永命之道也魏徵之復其君曰陛下若以為足今日不啻足矣若以為不足更萬倍過此亦不足此言尤為君人之格言也或曰太宗之言固善矣飛仙翠微玉華之作何居蓋飛仙之作既有魏徵之諫而翠微玉華以有疾避暑而即其舊以修之未可以是而求其備也貞觀十一年詔曰朕聞死者終也欲物之反真也𦵏者藏也欲令人之不得見也令平聲上古垂風未聞於封樹後世貽則乃備於棺槨易大傳曰古之𦵏者厚衣之以薪𦵏之中野不封不樹喪期無數後世聖人易之以棺槨譏僭侈者非愛其厚費美儉薄者實貴其無危是以唐堯聖帝也穀林有通樹之説吕氏春秋堯𦵏穀林通樹之秦穆明君也槖泉無丘隴之處秦穆公名任好史記注穆公𦵏雍州槖泉宫祈年觀下仲尼孝子也防墓不墳孔子合𦵏親於防曰吾聞古也墓而不墳延陵慈父也嬴博可隠吳延陵季子名札適齊而返其子死𦵏扵嬴博之間不歸鄉里斯皆懐無窮之慮成獨決之明乃便體於九泉非徇名於百代也洎乎闔閭違禮珠玉為鳬鴈闔閭吳王名𦵏虎丘山下發士十萬人治𦵏穿土為川積壤為丘銅棺三重澒池六尺以黄金珠玉為鳬鴈始皇無度水銀為江海秦始皇𦵏於驪山吏徒數十萬曠日十年合采金石被以珠玉水銀為江海人膏為燈燭季孫擅魯斂以璵璠斂去聲璵音與璠音煩季孫魯大夫季平子也左傳定公五年季平子行東野還未至卒于房陽虎将以璵璠斂仲梁懐弗與曰改步改玉陽虎欲逐之􅁻公山不狃不狃曰彼為君也子何怨焉桓魋専宋𦵏以石槨魋音頽桓魋宋向戍之孫為司馬禮記子游曰昔者夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也莫不因多藏以速禍由有利而招辱𤣥廬既發致焚如於夜臺𤣥廬夜臺墓之别名也黄腸再開同㬥骸於中野漢梁商薨賜以東國朱夀之器銀鏤黄腸注云器棺也以朱飾之以銀鏤之以柏木黄心為槨曰黄腸也詳思曩事豈不悲哉由此觀之奢侈者可以為戒節儉者可以為師矣朕居四海之尊承百王之弊未明思化中宵戰惕雖送往之典詳諸儀制失禮之禁著在刑書而勲戚之家多流通於習俗閭閻之内或侈靡而傷風以厚𦵏為奉終以髙墳為行孝遂使衣衾棺槨極雕刻之華靈輀冥器窮金玉之飾富者越法度以相尚貧者破資産而不逮徒傷教義無益泉壤為害既深宜為懲革宜為之為去聲其王公已下爰及黎庶自今已後送𦵏之具有不依令式者仰州府縣官明加檢察隨狀科罪在京五品已上及勲戚家仍録奏聞舊本此章在慎終篇今附入此愚按漢文帝嘗曰以北山為槨用紵絮斮陳漆其間豈可動哉張釋之對曰使其中有可欲者雖錮南山猶有隙也異時文帝之遺詔曰厚𦵏以破業吾甚不取霸陵山川因其故毋有所改斯言也其有感於釋之之言乎唐太宗初作獻陵務存隆厚猶文帝初年之意也虞世南諫而不能止十一年之詔豈非世南之言啟之歟愚嘗合二君之詔觀之則文帝之詔専為己之一身而已太宗之意則欲使天下之人同為儉約之歸以免於暴骸之禍此又文帝之所未及也岑文本為中書令宅卑濕無帷帳之飾有勸其營産業者文本歎曰吾本漢南一布衣耳竟無汗馬之勞徒以文墨致位中書令斯亦極矣荷俸禄之重荷去聲為懼已多更得言産業乎言者歎息而退舊本自此下四章並在貪鄙篇今附入于此愚按儉約者人之所難能也何曾之先見而日食萬錢謝安之相業而不忘聲色儉約豈可易能哉雖然有其道矣孟子曰志士不忘在溝壑勇士不忘喪其元士之仕於人之國者唯不忘其貧賤之時則自無侈靡之失矣岑文本身為中書令而能不忘其為漢南布衣時兹所以能不營産業而為唐名相歟户部尚書戴冑卒子聿反太宗以其居宅弊陋祭享無所令有司特為之造廟令平聲為去聲温彦博為尚書右僕射家貧無正寢及薨公侯死曰薨殯於旁室太宗聞而嗟歎遽命所司為造為去聲當厚加賻贈魏徵宅内先無正堂及遇疾太宗時欲造小殿而輟其材為徵營構五日而就遣中使去聲齎素褥布被而賜之以遂其所尚此章重出任賢篇愚按奢侈者常情之所同樂儉約者中人之所不堪自非為人君者於奢儉之際有以抑此揚彼則為人臣者何憚而去其所同樂趨其所不堪乎戴胄居宅卑濕太宗為之造廟温彦博死殯旁室太宗為之造正寢魏徵宅無正堂太宗輟其材而營之三臣之儉徳行於下太宗之褒賞加於上天下之士其有不聞風興起者哉謙讓第十九凡三章貞觀二年太宗謂侍臣曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懐畏懼昔舜誠禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功虞書大禹謨之辭又易曰人道惡盈而好謙惡好並去聲易謙卦彖辭凡為天子若惟自尊崇不守謙恭者在身儻有不是之事誰肯犯顔諫奏朕每思出一言行一事必上畏皇天下懼羣臣天髙聴卑何得不畏羣公卿士皆見瞻仰何得不懼以此思之但知常謙常懼猶恐不稱天心及百姓意也稱去聲魏徵曰古人云靡不有初鮮克有終鮮上聲詩大雅蕩篇之辭願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣唐虞所以太平實用此法吕氏祖謙曰無逸之書稱商三宗之享國而周公蔽之以一言曰畏而已蓋惟天子之尊茍以無所畏之心而自恃則治易忘亂安易忘危危亂而不自知矣惟能以有畏為心則上焉天心享之下焉臣民歸之如是而不安者未之有也太宗貞觀之治所以致之者固有其道而大要莫先於此愚按昔史臣贊堯曰允恭克讓光被四表贊舜曰濬哲文明温恭允塞夫堯舜五帝之盛帝也聖徳輝光在謙讓而已易之謙曰天道下濟而光明天道而非下濟則亢矣何自而見其光明哉太宗謂天子不當自尊崇正合謙恭此帝王之盛徳也魏徵於此時不将順其美而舉詩之靡不有初鮮克有終望其君謂常謙常懼日慎一日唐虞所以太平實用此法是固有以知太宗之心矣蓋以堯舜之所以謙讓終始如一非一時之言也後之人君志於帝王之道者勉之哉貞觀三年太宗問給事中孔穎達曰論語云以能問於不能以多問於寡有若無實若虚何謂也論語曾子之言穎達對曰聖人設教欲人謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶病以為少仍就寡少之人更求所益已之雖有其狀若無已之雖實其容若虚非惟匹庶帝王之徳亦當如此夫音扶帝王内蘊神明外須𤣥黙使深不可知故易稱以䝉養正易䝉卦彖辭曰䝉以養正以明夷莅衆莅音隸易象傳曰明入地中明夷君子以莅衆用晦而明若其位居尊極炫耀聰明以才陵人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗曰易云勞謙君子有終吉易謙卦九三爻辭誠如卿言詔賜物二百段胡氏寅曰太宗之問疑其不必如是蓋其為人已有善惟恐人之不知故於不矜不伐未能有行焉孔穎達所對亦足以箴之矣雖然吾友從事於斯之意則未易曉也夫既能矣不自以為能可也而又問於不能既多矣不自以為多可也而又問於少彼不能與少者将何益我不幾於偽以下人者乎是不然惟善學者志不倦心不盈一善之不聞一義之不知歉然如飲食之不飽也此何所為而然哉故曰學然後知不足夫聖如孔子猶曰我好古敏以求之我學不厭誠以道無量理無極而事無方太宗知之庶乎少進矣唐氏仲友曰太宗之夫正在矜伐穎達之對箴其膏肓太宗儻得此道雖帝王可及也惜其資矯拂勉强之力故時有用賢納諫之益亦蹈飾非拒諫之悔也愚按論語載曾子之言曰以能問於不能以多問於寡有若無實若虚蓋惟知義理之無窮不見物我之有間學者之所難能也故朱子集註以為吾友謂顔淵也太宗以天下之君舉此為問而孔穎達因而發明之以聖門為學之方勉進於帝王之徳蓋以太宗英明之資雄傑之才易致炫耀凌慢之失聞穎達之言有勞謙有終之語穎達其善於格君心歟河間王孝恭太祖之子也佐髙祖多進圖策獨存方面功寛恕退讓太宗親重之宗室莫比武徳初封為趙郡王累授東南道行臺尚書左僕射孝恭既討平蕭銑輔公祏遂領江淮及嶺南北皆統攝之専制一方威名甚著累遷禮部尚書孝恭性惟退讓無驕矜自伐之色時有特進江夏王道宗尤以将略馳名兼好學将好並去聲敬慕賢士動修禮讓太宗並加親待諸宗室中惟孝恭道宗莫與為比一代宗英云愚按自古國家之将興也天必生英傑竒偉之才於其子弟族屬之間所以昌大其門户而光啓其運祚也周之興也有周公康叔漢之興也有朱虚東牟降及魏晉六朝蓋莫不然唐起晉陽本支尤盛孝恭之威名與李靖相亞道宗之将略與李勣齊肩又能好學習禮退讓不伐求之布素之士有不可多得者雖未可方之周公之才之美其亦康叔朱虚之流輩歟嗚呼盛哉仁惻第二十凡四章貞觀初太宗謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求採無已至於離宫别館非幸御之所多聚宫人此皆竭人財力朕所不取且灑掃之餘更何所用今将出之任求伉儷上音抗敵也下音麗耦也非獨以省費兼以息人亦各得遂其情性於是後宫及掖庭前後所出三千餘人按通鑑貞觀二年九月天少雨中書舍人李百藥上言往年雖出宫人竊聞太上皇宫及掖庭宫人無用者尚多豈惟虚費衣食且隂氣鬱積亦足致旱上曰云云於是遣尚書左丞戴胄給事中杜正倫於掖庭西門簡出之前後所出三千餘人孫氏甫曰隋煬荒虐自古無比强取良家女置後宫者固無其數髙祖初入關放離宫之人還親屬此特美事之一節及受禪安然有其後宫欲不荒恣得乎賴聖子承之立矯其過計出三千之衆使天下聳動歌詠唐之盛徳也尹氏起莘曰按禮天子立后固有六宫三夫人九嬪二十七世婦八十一御妻矣然未聞千百其數也昔晉武平吳之後掖庭殆将萬人遂殞其軀而亡其國今太宗即位首放宫女三千餘人可謂盛徳之事遂使後人流之歌詠不一而足也愚按仁哉太宗之心也兹亊不見於武徳之初而見於貞觀之初論者謂聖子承統行父之所未能行誠可謂仁也然司晉陽之管鑰遂犯分於宫闈此謀臣因以迫之以興師也有天下之後安其後宫猶晉陽之心也昔漢祖入秦宫室能無所幸識者知其智不在小奄奠區宇規模宏逺矣非唐祖所及也太宗其殆庶幾乎貞觀二年關中旱大饑太宗謂侍臣曰水旱不調皆為人君失徳為去聲朕徳之不修天當責朕百姓何罪而多遭困窮聞有鬻男女者鬻音育賣也朕甚愍焉乃遣御史大夫杜淹字執禮如晦叔也材辯多聞秦王引為文學館學士及即位召為御史大夫俄檢校吏部尚書所薦引贏四十人後皆知名巡檢出御府金寶贖之還其父母愚按齊宣不忍牛之觳觫而就死地孟子曰是心足以王矣然惜其愛物之心重愛民之心輕欲其舉斯心加諸彼也太宗處九重之崇髙撫四海之廣大而能軫念饑人之子女出御府金寶以贖之其愛民之心重矣夫萬姓至繁也博施濟衆聖人猶病饑人子女豈能人人獲所哉然是心也足以王矣貞觀之盛孰謂非此心所致乎貞觀七年襄州都督襄州今為襄陽隸河南張公謹卒太宗聞而嗟悼出次發哀有司奏言準隂陽書云日在辰不可哭泣此亦流俗所忌太宗曰君臣之義同於父子情發於中安避辰日遂哭之按通鑑係六年夏四月辛夘襄州都督鄒襄公張公謹卒明日上出次發哀云云唐氏仲友曰太宗辰日哭張公謹謂君臣猶父子義感人心駕馭之畧髙矣愚按君於卿大夫比𦵏不食肉比卒哭不舉樂非私恩也蓋公義也是故衛之栁莊既死而獻公祭弔論者是之晉之荀盈未𦵏而晉侯飲樂膳宰譏之太宗於張公謹之卒雖辰日不為之輟哭可不謂賢君乎貞觀十九年太宗征髙麗次定州今中山府隸腹裏有兵士到者帝御州城北門樓撫慰之有從卒一人從去聲後同病不能進詔至床前問其所苦仍勅州縣醫療之是以将士将去聲後同莫不欣然願從及大軍回次栁城屬營州今廢詔集前後戰亡人骸骨設太牢致祭牛羊豕曰太牢親臨哭之盡哀臨去聲軍人無不灑泣兵士觀祭者歸家以言其父母曰吾兒之喪天子哭之死無所恨太宗征遼東攻白巖城唐置巖州今廢右衛大将軍李思摩頡利族人諸部納欵思摩獨留髙祖封和順郡王與秦王結為兄弟賜姓李為化州都督統頡利故部為可汗思摩遣使謝曰望世世為國一犬守天子北門如延陀侵逼願入保長城太宗詔許之居三年不得其衆入朝從伐遼為流矢所中去聲帝親為吮血為去聲吮粗兖切将士莫不感勵愚按太宗親征𦵏戰亡之骨吮思摩之瘡可謂仁恕也已然逺國强臣雖不義而未至於䖍劉邊鄙也若以偏方不霑王化自有大司馬九伐之制在何至躬率六師乎思遼水之無極慮扈從之匪輕仁恕一念油然發生於中則可以已矣惻隠之心何待形於遂事之後乎慎所好第二十一凡四章貞觀二年太宗謂侍臣曰古人云君猶器也人猶水也方圓在於器不在於水故堯舜率天下以仁而人從之桀紂率天下以暴而人從之下之所行皆從上之所好去聲後同至如梁武帝父子志尚浮華惟好釋氏老氏之教武帝末年頻幸同泰寺親講佛經百寮皆大冠髙履乗車扈從終日乗平聲後同從去聲談論苦空佛教也未嘗以軍國典章為意及侯景率兵向闕見君道篇尚書郎已下多不解乗馬解音懈狼狽步走狼似犬鋭首白頰髙前廣後狽狼屬生子或欠一足二足相附而行離則顛故猝遽謂之狼狽死者相繼於道路武帝及簡文簡文名綱武帝第三子侯景廢之卒被侯景幽逼而死卒被聿切孝元帝名繹武帝第七子起兵討侯景即帝位在于江陵郡名今中興路隸荆湖為萬紐于謹所圍梁承聖三年元魏遣萬紐于謹将兵五萬入冦攻江陵帝猶講老子不輟元帝好𤣥談嘗於龍光殿講老子聞魏師至停講聞報帖然復開講百寮皆戎衣以聴俄而城陷君臣俱被囚縶音贄庾信為梁将軍留於西魏亦歎其如此及作哀江南賦乃云宰衡以干戈為兒戲縉紳以清談為廟略此事亦足為鑒戒朕今所好者惟在堯舜之道周孔之教以為如鳥有翼如魚依水失之必死不可暫無耳胡氏寅曰太宗不好釋氏而好堯舜周孔之道可謂知所去取矣而以為如魚有水鳥有翼失之必死不可暫無者則未知其誠能然乎抑徒意之云爾也夫允執厥中者堯舜之盛也而始於道心欲不踰矩者孔子之盛也而始於志學志者非讀書記誦之謂道心之微又與老釋𤣥妙之言何以别乎自此而入庶乎其知道矣孔子曰知之者不如好之者知之如是則能好之矣未嘗知之而以為我好堯舜周孔之道云者妄也夫道非有一物可把玩而好之也百姓日用而不能離亦猶鳥之有翼魚之依水顧不自知耳真氏徳秀曰太宗之言可謂知所擇矣然終身所行未能無愧者以其嗜學雖篤所講者不過前代之得失而於三聖授受之微㫖六經致治之成法未之有聞其所親者雖或一時名儒而姦諛小人亦厠其列安得有佛時仔肩之益故名為希慕前聖而於道實無得焉其亦可憾也夫愚按太宗知老釋之虚無空寂不適於用知堯舜之道周孔之教不可暫無斯言也三代而下君人者所罕聞也中庸曰率性之謂道修道之謂教道者率性而已聖人以此道垂訓於天下後世則謂之教堯舜之道此道也周公孔子之教以堯舜之道為教也又曰道也者不可須臾離也可離非道也不可暫無其不可須臾離者乎太宗未足以進此也而言則然也貞觀二年太宗謂侍臣曰神仙事本是虚妄空有其名秦始皇非分愛好分好並去聲為方士所詐乃遣童男童女數千人隨其入海求神仙方士避秦苛虐因留不歸始皇猶海側踟蹰以待之踟音遲蹰音厨遲回貌還至沙丘而死始皇東遊海上方士徐市等上書請得與童男女入海求三神山不死藥始皇從之明年復遊海上後三年遊碣石考入海方士從上郡歸後五年復至海上冀遇仙藥不得還到沙丘崩沙丘在今順徳路鉅鹿縣漢武帝為求神仙為去聲乃将女嫁道術之人事既無驗便行誅戮漢武帝元鼎四年樂成侯登薦方士欒大上見之大悦大言曰黄金可成河決可塞不死之藥可得神仙可致時上方憂河決而黄金不就迺拜大為五利将軍賜列侯甲第童千人又以衛長公主妻之後竟坐誣罔遂腰斬據此二事神仙不煩妄求也愚按漢儒有言明於天地之性者不可惑以神怪通於萬物之情者不可罔以非𩔖太宗深懲秦皇漢武之失謂神仙虚妄空有其名可謂不惑於神怪不罔於非𩔖者矣然晚年深信婆羅門娑婆寐之説使之合長生之藥則又何所見而然耶貞觀四年太宗曰隋煬帝性好猜防好去聲専信邪道大忌胡人乃至謂胡牀為交牀胡𤓰為黄𤓰築長城以避胡終被宇文化及使令狐行達殺之令去聲令狐虜複姓行達其名時為校尉又誅戮李金才名渾為将軍有方士言曉圗䜟謂帝曰當有李氏為天子渾與宇文述有隙述因誣搆之於是盡誅渾族及諸李殆盡卒何所益卒子聿切且君天下者惟須正身修徳而已此外虚事不足在懐愚按桑穀生於朝而大戊以興雉升鼎而雊而殷道復盛䜟緯之書雖有定數然人君能至誠修徳未有不轉禍為福改妖為祥者也太宗謂君天下者惟須正身修徳譏煬帝枉殺李金才等其説是也然晩年竟以女主武王之䜟淫刑及於功臣則又何邪貞觀七年工部尚書唐制工部掌山澤屯田工匠之事尚書其長也段綸段姓綸名奏進巧人楊思齊至太宗令試令平聲綸遣造傀儡戲具傀古委切儡魯猥切木偶戲也世傳運機子起漢祖平城之圍其城一面即冐頓妻閼氏兵强於三面陳平訪之閼氏妬忌造木偶人運機關舞埤間閼氏望見謂是生人慮下城冒頓必納遂退軍後翻為戲具太宗謂綸曰所進巧匠将供國事供平聲卿令先造此物是豈百工相戒無作奇巧之意耶乃詔削綸階級並禁斷此戲舊本此章在儉約篇今附于此愚按中庸曰日省月試既廩稱事所以勸百工也朱子釋之曰日省月試以程其能既廩稱事以饋其勞則不信度作淫巧者無所容矣段綸奏進工人首令試造傀儡非所謂作奇技淫巧者乎太宗既削綸階級且令禁斷此戲可謂知所先矣慎言語第二十二凡三章貞觀二年太宗謂侍臣曰朕每日坐朝欲出一言即思此一言於百姓有利益否所以不敢多言給事中兼知起居事唐制起居郎及舍人掌天子起居法度貞觀初以給事中諫議大夫兼之執事紀録杜正倫進曰君舉必書言存左史春秋左氏傳也臣職當兼修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖徳累音𩔖非止當今損於百姓願陛下慎之太宗大悦賜綵百段唐氏仲友曰太宗言不敢多言意在史筆正倫之一言兩得将順正救之美宜乎太宗悦而賜之也愚按易大傳曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之況其邇者乎甚矣人君之言尤不可不慎也一言之善行之當世不惟天下䝉其利後世亦以為訓一言之不善行之當世不惟天下受其害後世亦以為戒人君之言可不慎哉太宗之言雖意在史筆其關於君道則甚重也貞觀八年太宗謂侍臣曰言語者君子之樞機談何容易以豉切凡在衆庶一言不善則人記之成其恥累音𩔖況是萬乗之主不可出言有所乖失其所虧損至大豈同匹夫我常以此為戒隋煬帝初幸甘泉宫泉石稱意稱去聲而怪無螢火敕云捉取多少於宫中照夜所司遽遣數千人採拾送五百轝於宫側小事尚爾況其大乎魏徵對曰人君居四海之尊若有虧失古人以為如日月之蝕人皆見之實如陛下所戒慎愚按易大傳曰言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也可不慎乎蓋能知所以慎言則知所以慎行矣行之不慎尚何望其慎言太宗謂言語者君子之樞機衆庶猶爾況於萬乗可謂知所慎言矣魏徵謂人君有失如日月之蝕人皆見之實如陛下所戒慎則足以兼慎言慎行之意也貞觀十六年太宗每與公卿言及古道必詰難往復難去聲散騎常侍劉洎上書諫曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聴其言虛襟以納其説猶恐羣下未敢對揚況動神機縱天辯飾辭以折其理援古以排其議欲令凡蔽令平聲何階應答臣聞皇天以無言為貴聖人以不言為徳老子稱大辯若訥莊子稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊議桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上曰君之所讀者古人之糟魄已夫以臣之事觀之斵輪徐則甘而不固疾則苦而不入不疾不徐得之扵手應之於心口不能言有數存焉古之人與不可傳也出莊子漢皇慕古張孺陳譏漢張良嘗匿下邳見老父授之以書曰孺子可教故稱良曰張孺項羽圍漢王於滎陽王與酈食其謀撓楚食其曰昔湯武伐桀紂皆封其後請立六國後王曰善具以告張良良曰誰為陛下畫此計陛下事去矣為陳八不可之説見史此亦不欲勞也且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必為累音𩔖後同須為社稷自愛為去聲後同豈為性好自傷乎好去聲竊以今日升平皆陛下力行所至欲其長久匪由辯博但當忘彼愛憎慎兹取捨每事敦朴無非至公若貞觀之初則可矣至如秦政强辯失人心於自矜魏文宏材虧衆望於虛説此才辯之累皎然可知累音𩔖伏願畧兹雄辯浩然養氣孟子曰我善養吾浩然之氣簡彼緗圖緗淺黄色圖書也澹焉怡悦固萬夀於南岳詩云如南山之夀不騫不崩齊百姓於東户則天下幸甚皇恩斯畢太宗手詔答曰非慮無以臨下非言無以述慮比有談論比音鼻遂至煩多輕物驕人恐由兹道形神心氣非此為勞今聞讜言虚懐以改按通鑑係十八年上好文學而辯敏羣臣言事者多引古今以折之多不能對洎上書云云上飛白答之張氏九成曰君子以謹密成徳而疎直致患而況處重之地可不戒哉洎每剛直敢言始以受知終以速禍蓋太宗英明剛武以取天下挾振矜之態雖議論及於羣臣而是正之語或不容下或往復詰難或面折其短才辯自逞氣驕於人夫以咫尺之威生殺在手非剛直之徒孰與抗哉而洎逺引聖人不言大辯若訥深為勸戒所以恢寛厚之徳廣進言之路觀其所陳若有優柔樂易之性矣及其發言處身或不自慮夫以太宗之明竟不深察何知之不審始卒有異乎抑疑似之詰有以啟之也唐氏仲友曰上執其謙下輸其直此議論之體也以鯀之不才堯獨知之然從試可乃已之論則人君之言豈務求勝太宗以智辯自居往復窮詰此最足以害從諫之美洎兩言之切中其病孟子所謂拒人於千里外者也答詔猶有反覆是非之言則太宗自聖之病頗亦難瘳賴洎言之不已使太宗許以能改不然其去徳豈逺乎哉一鑑既往獨洎能出此言不亦賢乎愚按劉洎諫䟽想見太宗以英雄之姿逞神機縱天辯未免有輕物驕人之失儻非能尅已自勵勉强從諫則所謂智足以拒諫辯足以飾非由此乎生矣今聞讜言虚懐以改其得為賢君也宜哉杜讒邪第二十三凡七章貞觀初太宗謂侍臣曰朕觀前代讒佞之徒皆國之蟊賊也蟊音矛蟲之害稼者或巧言令色朋黨比周比音鼻若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃故叢蘭欲茂秋風敗之王者欲明讒人蔽之此事著於史籍不能具道至如齊隋間讒譖事耳目所接者畧與公等言之斛律明月斛律複姓明月其字名光後齊朝兼行将相有名譽鄰敵所憚齊朝良将去聲威震敵國周家每嵗斵汾河氷慮齊兵之西渡及明月被祖孝徵名珽密為謡言讒斛律光殺之讒搆伏誅周人始有吞齊之意髙熲隋之賢相有經國大才為隋文帝贊成霸業為去聲後蓋為同知國政者二十餘載天下賴以安寧文帝惟婦言是聴特令擯斥令平聲及為煬帝所殺刑政由是衰壊又隋太子勇文帝太子名勇後廢為庶人撫軍監國監平聲凡二十年間固亦早有定分去聲楊素𤣥感之父為隋相欺主罔上賊害良善使父子之道一朝滅於天性朝音昭楊素揣知獨孤后意盛言太子不才文帝於是禁太子勇部分收其黨與楊素舞文巧詆以成其獄廢勇立晉王廣為皇太子是為煬帝逆亂之源自此開矣隋文既混淆嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防微杜漸用絶讒搆之端猶恐心力所不至或不能覺悟前史云猛獸處山林處上聲藜藿為之不採直臣立朝廷姦邪為之寢謀此實朕所望於羣公也魏徵曰禮云戒慎乎其所不睹恐懼乎其所不聞中庸首篇之辭詩云愷悌君子無信讒言讒人罔極交亂四國詩小雅青蠅篇之辭又孔子曰惡利口之覆邦家惡烏去聲蓋為此也臣嘗觀自古有國有家者若曲受讒譖妄害忠良必宗廟丘墟市朝霜露矣願陛下深慎之愚按自古讒邪之為惑人主非有知人之明不能辨也太宗援據古今以貴望於其臣魏徵敷述經訓以致戒於其君可謂極君臣之契讒邪無得而間矣厥後有毁徴阿黨者使温彦博按之雖足以直徵之枉而左右之為讒者竟不聞顯正其罪固非止讒之道及徵之卒乃因杜正倫之黜復以阿黨疑之疑情一萌讒言遽入謂徵録諫辭示史官有賣已直彰君過之意者遂有停婚仆碑之令何不察之甚邪使太宗它日無征遼東之悔尚得為明主乎信夫知人之難也貞觀七年太宗幸蒲州刺史趙元楷課父老服黄紗單衣迎謁路左盛飾廨宇修營樓雉以求媚又潛飼羊百餘口魚數千頭将饋貴戚太宗知召而數之曰數上聲朕巡省河洛省上聲經厯數州凡有所須皆資官物卿為飼羊養魚為去聲雕飾院宇此乃亡隋弊俗今不可復行復音缶當識朕心改舊態也以元楷在隋邪佞故太宗發此言以戒之元楷慙懼數日不食而卒子聿反舊本此章在貪鄙篇今附入此愚按元楷仕隋為厯陽郡丞以獻異味超遷江都郡丞迹其邪佞蓋與髙徳儒之指野鳥為鸞無異太宗縱不能誅之豈可復使為民之父母乎異時潛飼羊魚盛飾廨宇蓋猶以事隋者而事唐也太宗數而責之是矣然使能黜其官致其罪布告天下咸以為戒豈不尤偉矣乎貞觀十年太宗謂侍臣曰太子保傅古難其選成王幼小以周召為保傅左右皆賢足以長仁長音掌致理太平稱為聖主及秦之胡亥始皇所愛趙髙作傅教以刑法及其簒也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠去聲交遊惟柴紹字嗣昌臨汾人以任俠聞髙祖妻以平陽公主武徳初拜左翊衛大将軍累從戰伐而有功竇誕等外戚也貞觀為宗正卿太宗與語昏謬失對以光禄大夫罷為人既非三益論語曰益者三友友直友諒友多聞及朕居兹寶位經理天下雖不及堯舜之明庶免乎孫皓髙緯之暴孫皓三國吳主是為烏程侯降于晉髙緯北齊後主為周所虜以此而言復不由染何也魏徵曰中人可與為善可與為惡然上智之人自無所染陛下受命自天平定冦亂救萬民之命理致升平豈紹誕之徒能累聖徳累音𩔖但經云放鄭聲逺佞人逺去聲論語孔子答顔淵問為邦之辭近習之間尤宜深慎太宗曰善按自誠由近習已上文重出師傅篇舊本此章在直諫篇今附入于此愚按帝堯與共驩同處而不為共驩之所化周公與管蔡同處而不為管蔡之所化夫上智不移唯堯與周公為能耳然堯猶畏孔壬周公猶懼流言豈恃其資質之美而謂惡人不能染哉下此則善人之芝蘭惡人之鮑魚未有不與之俱化者也唐太宗少與柴竇為友而不能昏太宗之徳世莫不疑焉以愚觀之太宗之所以為太宗以其資質之過人也其不能進於三代之君者以柴竇輩為之累也雖然太宗少年之事爾及其君臨天下雖房杜王魏並居輔相而封權宇文之流亦得厠乎其間此貞觀之治所以止於如是也然則太宗所謂不由漸染者其然豈其然乎尚書左僕射杜如晦奏言監察御史陳師合史無傳上拔士論兼人之思慮有限一人不可總知數職以論臣等太宗謂戴冑曰朕以至公理天下今任𤣥齡如晦非為勲舊以其有才行也為行並去聲此人妄事毁謗正欲離間我君臣間去聲昔蜀後主昏弱名禪先主之子齊文宣狂悖然國稱理者以任諸葛亮楊遵彦並見前注不猜之故也朕今任如晦等亦復如法於是流陳師合于嶺外舊本自此已下三章在貪鄙篇今附入此孫氏甫曰人主之任大臣不可不専亦不可専若深知其人可付國事不専任之何以責成功蓋専任則責重責重則人必盡其才力也若知人未至而専任之茍無成功則有敗事又或竊擅威福有難制之患二者惟在人主審之不可一失失則事機難追矣太宗可謂能審知人之術者也知房杜之賢而付以國事房杜方盡心職事已著功效陳師合以平常之見欲移主意如晦奏其事意似不廣然慮小臣間言漸害於事公言之爾太宗不惑師合之言房杜荷信任如是敢不盡其才力乎此所以成太平之治也然有太宗之明房杜之賢則可専任而不容人言人主知人未至當審其付任不可執此為法説見後章貞觀中太宗謂房𤣥齡杜如晦曰朕聞自古帝王上合天心以致太平者皆股肱之力朕比開直言之路者比音鼻庶知寃屈欲聞諫諍所有上封事人多告訐百官訐音結細無可採朕厯選前王但有君疑於臣則下不能上達欲求盡忠極慮何可得哉而無識之人務行讒毁交亂君臣殊非益國自今已後有上書訐人小惡者當以讒人之罪罪之魏徵為祕書監有告徴謀反者太宗曰魏徵昔吾之讐祇以忠於所事吾遂拔而用之何乃妄生讒搆竟不問徵遽斬所告者范氏祖禹曰太宗欲聞直言而惡告訐不惟聖譖讒而又罪之可謂至明且逺矣此為君為長之道愚按上封事者訐人小惡而太宗罪之讒人告魏徵謀反而太宗誅之此可謂明也已陳師合上拔士論謂一人不可總知數職斯乃天下之確論也如晦遽以為譏論臣等太宗遽以為毁謗離間至流師合於嶺外亦可謂寃也已然則合三事而觀之太宗得其二而失其一乎貞觀十六年太宗謂諫議大夫禇遂良曰卿知起居比來比音鼻記我行事善惡遂良曰史官之設君舉必書善既必書過亦無隠太宗曰朕今勤行三事亦望史官不書吾惡一則鑒前代成敗事以為元龜二則進用善人共成政道三則斥棄羣小不聴讒言吾能守之終不轉也唐氏仲友曰太宗所言皆君道然謂守而不失亦望史官不書吾惡則有䕶過之意矣伐遼之監不逺而窮兵用魏徴而仆碑於身後知宇文士及佞而游言自解謂守而不失未免自矜也愚按善惡直書而義自見此史臣之職也揜其不善而著其善此人情之常也為人上者其於言行之際知善而力行之知惡而力改之在我而已史臣直筆吾不知也太宗嘗欲觀史矣而復問起居所記之行事是欲史臣每有以彰其善而有不善者則削而不書也所行果出於善始終如一史臣豈得而揜其善乎勤行三事之言雖為君道之善而表襮於起居注之臣則似有矜善之意矣悔過第二十四凡四章貞觀二年太宗謂房𤣥齡曰為人大須學問朕往為去聲羣兇未定東西征討躬親戎事不暇讀書比來比音鼻四海安静身處殿堂處上聲不能自執書卷使人讀而聴之君臣父子政教之道共在書内古人云不學牆面莅事惟煩周書周官之辭不徒言也却思少小時行事少去聲大覺非也愚按夫子於易之益曰君子以見善則遷有過則改釋者謂見善能遷則可以盡天下之善有過能改則無過矣益於人者無大於是夫遷善改過學者之所難而太宗定天下之亂處帝王之尊乃能知讀書之善而能遷之知少時之過而能改之可謂知為益之道矣充是心也為益之道豈有窮際乎貞觀中太子承乾多不修法度魏王泰尤以才能為太宗所重特詔泰移居武徳殿魏徵上疏諫曰魏王既是陛下愛子須使知定分去聲常保安全每事抑其驕奢不處嫌疑之地也今移居此殿使在東宫之西海陵昔居時人以為不可雖時移事異猶恐人之多言又王之本心亦不寧息既能以寵為懼伏願成人之美太宗曰我幾不思量甚大錯誤幾量並平聲遂遣泰歸於本第愚按古者世嫡之位既定而衆子各有定分觀於周官之衣服膳羞之不會者必曰惟王及后世子王及后固也而世子與焉者所以示尊隆絶覬覦也太宗之時既知承乾不修法度矣乃重魏王泰之才固以踰分越制矣又使居武徳殿他日兩廢之事寧非太宗有以啟之也雖以魏徵之言覺大錯誤終非宜為矣重天下之本者慎之哉貞觀十七年太宗謂侍臣曰人情之至痛者莫過乎喪親也故孔子云三年之喪平聲後同天下之通喪孔子答宰我之辭自天子達於庶人也又曰何必髙宗商君武丁也古之人皆然孔子答子張之辭近代帝王遂行不逮漢文以日易月之制漢文帝行短喪以日易月甚乖於禮典朕昨見徐幹中論後漢徐幹撰中論二十篇復三年喪篇義理甚深恨不早見此書所行大疏畧疏平聲但知自咎自責追悔何及因悲泣久之愚按孟子曰三年之喪齊疏之服飦粥之食自天子達於庶人三代共之夫三年之喪者子生三年然後免於父母之懐故父母之喪必以三年古今貴賤通行之禮也然自漢文短喪以日易月厯代因之恬不知改天子遂無三年之喪人紀廢壊綱常不明莫甚於此太宗雖不能蚤遵經訓躬行其禮而能引咎自責追悔悲泣抑亦可以為孝矣後之人君所宜遵復古制以詔後世俾子孫守之永永無斁罔使蹈漢文之失貽太宗之悔豈不卓冠千古哉貞觀十八年太宗謂侍臣曰夫音扶人臣之對帝王多承意順㫖甘言取容朕今欲聞已過卿等皆可直言散騎常侍劉洎對曰陛下每與公卿論事及有上書者以其不稱㫖稱去聲或面加詰難去聲無不慙退恐非誘進直言之道太宗曰朕亦悔有此問難當即改之此章重出納諫篇直諫𩔖比此為詳奢縱第二十五一章貞觀十一年侍御史馬周上疏陳時政曰臣厯覩前代自夏殷周及漢氏之有天下𫝊祚相繼多者八百餘年史記注周凡三十七主八百六十七年少者猶四五百年史記注從禹至桀十七君十四世有王與無王凡嵗四百七十一年殷凡三十一世六百二十九年東西兩漢共二十四帝凡四百二十四年見漢書皆為去聲後同積徳累業恩結於人心豈無僻王賴前哲以免爾自魏晉已還降及周隋多者不過五六十年少者纔二三十年而亡三國蜀二主四十五年魏五主四十五年吳四主五十九年西晉四主五十三年南齊七主二十二年蕭梁四主五十六年陳五主二十三年東晉十一主一百三年劉宋八主六十年元魏十二主一百一十九年東魏一主十七年西魏三主二十二年北齊五主二十八年後周五主二十五年隋三主三十七年良由創業之君不務廣恩化當時僅能自守後無遺徳可思故𫝊嗣之主政教少衰一夫大呼去聲而天下土崩矣今陛下雖以大功定天下而積徳日淺固當崇禹湯文武之道廣施徳化施平聲使恩有餘地為子孫立萬代之基豈欲但令政教無失令平聲後同以持當年而已且自古明王聖主雖因人設教寛猛隨時而大要以節儉於身恩加於人二者是務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶逺者往來至五六千里春秋冬夏畧無休時陛下每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有怨嗟之言以陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不復可行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸夫人慎夫人也衣不曳地至景帝以錦繡纂組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈而承文景遺徳故人心不動向使髙祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處益州今仍舊隸四川營造供奉器物供平聲并諸王妃主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理其弊猶亂陛下少處人間少去聲處上聲知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宫不更外事長音掌更平聲即萬嵗之後固聖慮所當憂也臣竊尋往代以來成敗之事但有黎庶怨叛聚為盜賊其國無不即滅人主雖欲改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之有失是以殷紂笑夏桀之亡而幽厲亦笑殷紂之滅周幽王名宫湼厲王名胡皆無道之主隋帝大業之初又笑周齊之失國然今之視煬帝亦猶煬帝之視周齊也故京房京姓房名字君明漢東郡人治易謂漢元帝云臣恐後之視今亦猶今之視古此言不可不戒也往者貞觀之初率土荒儉一匹絹纔得粟一斗而天下帖然百姓知陛下甚憂憐之故人人自安曾無謗讟自五六年來頻嵗豐稔一匹絹得十餘石粟而百姓皆以陛下不憂憐之咸有怨言以今所營為者頗多不急之務故也自古以來國之興亡不由蓄積多少唯在百姓苦樂音洛且以近事驗之隋家貯洛口倉而李密因之東都積布帛王世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛即世充李密未必能聚大衆但貯積者固是國之常事要當人有餘力而後收之若人勞而彊斂之斂去聲竟以資冦積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息儻中國被水旱之灾邊方有風塵之警狂狡因之竊發則有不可測之事非徒聖躬旰食晏寢而已旰居案切日晚也若以陛下之聖明誠欲勵精為政不煩逺求上古之術但及貞觀之初則天下幸甚太宗曰近令造小隨身器物不意百姓遂有嗟怨此則朕之過誤乃命停之按史傳通鑑此與論諸王定分刺史縣令同一疏范氏祖禹曰紂積鉅橋之粟武王發之人主不務徳而務聚斂者民散而國亡太宗在位寖久将外事四夷内治宫室聚財積穀欲以有為馬周先事而諫欲如初年之節儉可謂順其美而救其惡矣胡氏寅曰馬周所言四五事太宗從其一而已其要曰陛下當隆禹湯文武之業豈得但持當年而已此最太宗之病也豈特太宗凡三代已後得天下者皆然皆不知治蠱先甲後甲之義前弊未盡革而後患已生矣汲黯謂武帝内多欲而外施仁義太宗嬪御不為稀營造不為少窮兵黷武以收逺畧在位十餘年矣年豐食足而百姓怨咨馬周言之帝未改也豈非經濟之術已殫無所可為乎愚按馬周此疏以三代帝王取天下保天下之道望之太宗可謂能責難於其君矣夫禹湯文武之道修之於身推之於家國天下而後道洽政治澤潤生民非可以勉强而為之也太宗為唐賢君謂其行事有合於禹湯文武則可槩以禹湯文武之道則未之盡也孟子曰王者之民皞皞如也營造器物而百姓怨嗟與皞皞之氣象有間矣幸而因周之言即命停罷其足以保貞觀之盛也以此若夫廣施徳化為子孫立萬代之基此王者必世後仁之事未能進於是矣三代之所以長治久安者其必有道也夫貪鄙第二十六凡六章貞觀初太宗謂侍臣曰人有明珠莫不貴重若以彈雀豈非可惜況人之性命甚於明珠見金錢財帛不懼刑網徑即受納乃是不惜性命明珠是身外之物尚不可彈雀何況性命之重乃以博財物耶羣臣若能備盡忠直益國利人則官爵立至皆不能以此道求榮遂妄受財物贓賄既露其身亦殞實可為笑帝王亦然恣情放逸勞役無度信任羣小疎逺忠正逺去聲有一於此豈不滅亡隋煬帝奢侈自賢身死匹夫之手亦為可笑愚按周禮天官以聴官府之六計弊羣吏之治必察之以㢘甚矣貪之足以禍其身也夫利所以資身利積而身敗則利乃所以殞身也可不戒哉然自昔戒貪之言多矣善乎太宗之言曰明珠身外之物尚不可以彈雀何況性命之重乃以博財物此可為有官君子之箴終之曰帝王亦然是不惟有以戒其臣而亦以自戒也可不謂賢君乎貞觀二年太宗謂侍臣曰朕嘗謂貪人不解愛財也解音懈後同至如内外官五品以上禄秩優厚一年所得其數自多若受人財賄不過數萬一朝彰露禄秩削奪此豈是解愛財物規小得而大失者也昔公儀休公儀複姓休名魯相也性嗜魚而不受人魚其魚長存且為主貪必喪其國為臣貪必亡其身詩云大風有隧貪人敗𩔖詩大雅桑柔篇之辭固非謬言也昔秦恵王即秦恵公僭稱王是為恵文王欲伐蜀不知其逕乃刻五石牛置金其後蜀人見之以為牛能便金便平聲蜀王使五丁力士拖牛入蜀道成秦師隨而伐之蜀國遂亡事見蜀記漢大司農漢制掌諸錢穀金帛貨幣之職田延年字子賔齊諸田之後漢昭帝時為大司農贓賄三千萬事覺自死時茂陵富人焦氏賈氏以數千萬積貯炭葦諸𦵏物昭帝大行用度未辦延年奏言豫收不祥物冀疾用以求利非臣民所當為請沒入官奏可富人皆怨出錢求延年罪初大司農取民牛車三萬兩為僦車直千錢延年詐增二千凡六千萬盜取其半焦賈告其事時議以延年廢昌邑王時嘗發大議當以功覆過霍光曰往就獄公議過延年曰我何面目入牢獄遂刎死如此之流何可勝記勝平聲朕今以蜀王為元龜卿等亦須以延年為覆轍也愚按書曰凡厥正人既富方穀中庸曰忠信重禄所以勸士蓋分田制禄所以養其愧恥之心而厲其忠㢘之節也太宗謂當時五品已上禄秩自厚若受財不過數萬其知所以勸矣自以蜀王為監以牛金而亡國欲臣下以田延年為監以贓列賄而殞身非特以此戒臣下且以此律其身則於庶位者寧不知所懲哉貞觀四年太宗謂公卿曰朕終日孜孜非但憂憐百姓亦欲使卿等長守富貴天非不髙地非不厚朕常兢兢業業以畏天地卿等若能小心奉法常如朕畏天地非但百姓安寧自身常得驩樂音洛古人云賢者多財損其志愚者多財益其過此言可為深誡若徇私貪濁非止壊公法損百姓縱事未發間中心豈不常懼恐懼既多亦有因而致死大丈夫豈得茍貪財物以害及身命使子孫每懐愧恥耶卿等宜深思此言愚按詩云上帝臨女毋貳爾心自古聖人拳拳於畏天者豈謂人君尊無與敵借天以壓之哉蓋兢業祗懼是乃天心之所存而堯舜禹湯所傳之大原也太宗自謂常兢兢業業以畏天地又使羣臣當如朕畏天地是真能合乎聖人畏天之學矣然太宗之所謂天者蒼蒼之天耳昊天曰明及爾出王昊天曰旦及爾游衍何往而非天哉一息之間斷非畏天也一事之作輟非畏天也詩曰文王之徳之純聖人之所以事天者純而已矣愚觀太宗之行事知謹刑矣而復濫殺知尚文矣而復慕武知任賢矣而復聴讒知斷恩矣而復牽愛甚矣其雜而不純也此豈足為畏天之實哉貞觀六年右衛将軍陳萬福自九成宫赴京違法取驛家麩數石太宗賜其麩令自負出以恥之令平聲愚按大學引孟獻子之言曰與其有聚斂之臣寧有盜臣蓋君子寧亡己之財而不忍傷民之力故也陳萬福違法取驛家麩非有取於民者其盜臣之謂乎太宗賜其麩令自負出以愧其心而不加罪可謂寛仁也已貞觀十年治書侍御史權萬紀上言宣饒二州宣州今為寜國路饒州今仍舊並隸江東諸山大有銀坑採之極是利益每嵗可得錢數百萬貫太宗曰朕貴為天子是事無所少乏惟須納嘉言進善事有益於百姓者且國家賸得數百萬貫錢何如得一有才行人行去聲不見卿推賢進善之事又不能按舉不法震肅權豪惟道税鬻銀坑以為利益昔堯舜抵璧於山林投珠於淵谷由是崇名美號見稱千載後漢桓靈二帝後漢桓帝名志靈帝名宏好利賤義好去聲漢靈帝時開西邸賣官自關内侯虎賁羽林入錢各有差私令左右賣公卿公千萬卿五百萬又賣關内侯假金印紫綬傳世入五百萬為近代庸暗之主卿遂欲将我比桓靈耶是日勅放令萬紀還第令平聲孫氏甫曰太宗所以能斥言利之臣者無它内能節用外謹制度絶權倖抑恩寵無妄費耳官中欲修一殿則想秦皇之過公卿請營一閣則念文帝之儉将修洛陽殿則聴張𤣥素之言而遂止嫁送長樂則納魏徵之諫而從薄宫人罷遣而出者三千此其謹身節用天下已隂受其賜矣而文武官止六百四十三員府兵止六十萬又皆散之農畆以自給天子惟務徳義以致治平薄賦斂以厚風俗而已此言利之臣所以不能合也胡氏寅曰大學之教曰長國家而務財用者必自小人矣與其有聚斂之臣寜有盜臣故治國不以利為利而以義為利也自事言之國家嵗得數百萬緡非因頭會箕斂而取之山澤似亦未有害者太宗不惟置其利又且黜其人而専以進賢利民為急以桓靈私藏為戒審所取舍明示好惡可為人君法矣愚按大學曰治國家不以利為利而以義為利也觀太宗郤權萬紀銀坑之奏真能不以利為利者蓋當是時宫室服用毎能慎乃儉徳是宜諄諄訓下無愧辭也夫表正而景隨源清則流清表未正而求正於景源未清而求清於流無是理也是故欲臣下厲㢘名當自人君之崇儉徳始貞觀十六年太宗謂侍臣曰古人云鳥棲於林猶恐其不髙復巢於木末魚藏於水猶恐其不深復穴於窟下然而為人所獲者皆由貪餌故也今人臣受任居髙位食厚禄當須履忠正蹈公清則無災害長守富貴矣古人云禍福無門惟人所召然陷其身者皆為去聲貪冒財利與夫音扶魚鳥何以異哉卿等宜思此語為鑒誡舊本此章重岀鑒戒篇今按此章喻貪為切故去彼存此愚按太宗訓臣下㢘潔之為美貪利之為害者數矣魚鳥之喻尤其明白痛切令人讀之竦然誠足懲創人之逸志也可不戒哉貞觀政要卷六欽定四庫全書貞觀政要卷七唐吳兢撰元戈直集論崇儒學第二十七凡六章太宗初踐祚即扵正殿之左置𢎞文館精選天下文儒令以本官令平聲兼署學士給以五品珍膳更日宿直更平聲以聴朝之隙引入内殿討論墳典論平聲商略政事或至夜分乃罷又詔勲賢三品已上子孫為𢎞文學生舊本此與後三章通為一章今按崇儒雖同典故則異分為三章又按通鑑武徳九年九月上於𢎞文殿聚四部書二十餘萬卷置𢎞文館於殿側精選天下文學之士虞世南褚亮姚思㢘歐陽詢蔡允恭蕭徳言等並以本官兼學士云云又取三品已上子孫充𢎞文館學生真氏徳秀曰後世人主之好學者莫如唐太宗當戰攻未息之餘已留情於經術召名儒學士以講磨之此三代以下之無有也既即位置𢎞文館於殿之側引内學士畨宿更休聴朝之暇與討古今論成敗或日􅉴夜艾未嘗少怠此三代以下之所又無也故陸贄舉之以告徳宗謂言及稼穡艱難則務遵節儉言及閭閻疾苦則議息征徭此所以致貞觀之治也後之人君有志於帝王之事業則貞觀之規模不可以不復愚按太宗之好學可謂至矣其未即位也廣招瀛洲之賢其既即位也大啟𢎞文之館討論墳典商略政事蓋自三代以下人君講學之勤未能或之先也然嘗論之太宗之所講學豈真堯舜禹湯文武孔顔之學也夫允執厥中堯之學也危微精一舜禹之學也建中建極湯武之學也忠恕一貫孔門師友之學也瀛洲諸賢之所講亦嘗及於此乎愚不得而知也𢎞文諸儒之所講亦嘗及於此乎愚不得而知也愚獨怪夫君臣問答之際詔令章䟽之間一事之微無不講也一物之細無不講也獨於統宗會元之地迺無一語及之是則太宗之學學其所學非堯舜禹湯文武孔顔之學也嗚呼周公沒而百世無善治孟軻死而千載無真儒詎不信哉貞觀二年詔停周公為先聖始立孔子廟堂於國學稽式舊典以仲尼為先聖顔子為先師兩邊俎豆干戚之容始備于兹矣是嵗大收天下儒士賜帛給𫝊去聲驛𫝊也令詣京師令平聲後同擢以不次布在廊廟者甚衆學生通一大經已上咸得署吏署吏職入仕也國學增築學舍四百餘間國子太學四門廣文亦增置生員其書算各置博士學生以備衆藝唐制國子太學廣文四門律書算凡七學皆置博士國子掌教三品以上及國公子孫從二品以上曾孫為生者太學掌教五品以上及郡縣公子孫從三品曾孫為生者廣文館掌領國子學生業進士者四門館掌教七品以上侯伯子男為生及庶人子為俊士生者律學書學算學掌教八品以下及庶人子為俊士生者又有五經博士掌以其經教國子太宗又數幸國學數音朔令祭酒司業凡會同饗醼必尊長先以酒祭先故曰祭酒長者之稱也唐制國子監祭酒掌邦國儒學訓導之政兼領諸學凡釋奠則為初獻司業其貳職也博士講論畢各賜以束帛四方儒士負書而至者蓋以千數俄而吐蕃及髙昌髙麗新羅等諸夷酋長音掌亦遣子弟請入于學於是國學之内皷篋升講筵者篋方竹器所以盛書籍者幾至萬人幾平聲儒學之興古昔未有也按儒學𫝊貞觀十四年召天下惇師老徳以為學官數臨幸觀釋菜廣學舍千二百區益生員至三千二百自屯營飛騎皆給博士受經能通經者聴入貢限四方秀艾坌集京師於是新羅髙昌百濟吐蕃髙麗等羣酋長並遣子弟入學皷笥踵堂者凡八千餘人雖三代之盛所未聞也范氏祖禹曰古之教者家有塾黨有庠遂有序國有學士修之於家而後升於鄉升於鄉而後升於國升扵國而後達於天子其教之有素其養之有漸故成人有徳小子有造賢才不可勝用由此道也後世鄉里之學廢人君能教者不過聚天下之士而烏合於京師學者衆多眩耀於一時而已非有教養之實也唐之儒學惟貞觀開元為盛其人才之所成就者亦可睹矣孟子曰學所以明人倫也無學則人倫不明故有國者以為先如不復三代之制未知其可也愚按昌黎韓子原道曰堯以是𫝊之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公孔子然周公而上得位與時者也孔子不得位與時者也得位與時者其道見之於事不得位與時者其道託之於言而宰我曰以予觀於夫子賢於堯舜逺矣夫堯舜而至周公去夫子之時邈矣正道日以榛蕪非得夫子則堯舜之道何由而明於後世哉六經之訓如日行天夫子之功也先儒周子謂宜乎後世無窮王祀夫子報徳報功之無盡焉夫周公固為先聖而立孔子廟堂於國學以夫子為先聖實始於太宗遂為萬代之定制廟祀徧天下人知尊夫子之道即知尊堯舜禹湯文武周公之道矣太宗聰明英睿之君真特見也王封起於開元亦太宗有以致之貞觀十四年詔曰梁皇侃苦旦切皇姓侃名明三禮為散騎侍郎一作皇甫侃者非褚仲都明周易周熊安生字植之長樂人為國子博士沈重字子厚通春秋羣書為五經博士陳沈文阿字國衛通三禮春秋為五經博士周𢎞正字思行晉周顗之後為國子博士張譏字直言武城人為國子博士隋何妥字栖鳳西城人為國子祭酒劉炫字光明河間人為太學博士並前代名儒經術可紀加以所在學徒多行其講疏宜加優賞以勸後生可訪其子孫見在者見音現録姓名奏聞二十一年詔曰左丘明左丘明見於論語程子謂古之聞人唐啖趙氏謂孔子所言左丘明在孔子前則左氏傳非丘明所為亦有姓左而不得其名者為此傳也或問朱子朱子曰未可知也先友鄧著作考姓氏書曰蓋左丘姓而名明傳春秋者乃左氏耳然則太宗詔從祀諸儒以左丘明為首而寘於公穀之列者蓋漢晉以來相傳誤以左氏為左丘明也卜子夏名商孔子弟子以文學稱序詩傳易禮春秋公羊髙公羊姓髙名子夏弟子傳春秋穀梁赤穀梁姓赤名子夏弟子傳春秋伏勝濟南人為秦博士漢文時求治尚書者聞伏生能治之欲召時年九十餘詔使往受之秦時焚書伏生藏於屋壁兵起流亡獨得二十九篇教于齊魯之間髙堂生魯人前漢為博士得儀禮十七篇傳於世為漢言禮宗戴聖前漢為九江太守得禮記三十六篇傳於世號小戴記毛萇趙人為漢河間獻王博士治詩孔安國孔子之後漢武帝時為博士至臨淮太守為古文尚書之宗劉向字子政漢楚元王之後成帝時為光禄大夫校五經鄭衆後漢為大司農卿杜子春後漢河南人馬融字季長扶風人漢桓帝時為南郡太守著春秋三傳異同説盧植字子幹後漢為北中郎将鄭𤣥字康成北海人後漢為大司農卿著易書詩禮論語孝經國語乾象厯天文等書服䖍字子慎後漢為九江太守何休字邵公後漢為諫議大夫解春秋公羊傳孝經論語等書王肅字子雍三國時為魏太常蘭亭侯注孔子家語王弼字輔嗣三國時為魏尚書郎注易杜預字元凱晉惠帝時為鎮南大将軍當陽侯注春秋左氏傳范寗西晉時為豫章太守注春秋穀梁傳等二十有一人並用其書垂於國胄既行其道理合褒崇自今有事於太學可並配享尼父廟堂父音甫魯哀公誄孔子之稱其尊儒重道如此唐氏仲友曰梁周陳隋之際吾道窮矣儒於此時猶守先王之經有如劉炫之徒至於流離饑餓而不悔其所發明有以資後學之講習太宗能引擢其子孫以報之至於左丘明等二十一人用其書行其道者則又配享於夫子以褒大之先儒子孫䝉引擢之恩又有得配夫子之祀者則今之諸儒能不加勉又足為後世故實太宗二舉豈不美哉愚按太宗既以夫子為先聖立廟堂於國學後數年復優異梁周陳隋名儒之子孫雖其經術學行未探聖賢之閫奥然亦可以風厲天下矣又後數年復詔以左丘明等二十一人配享孔廟左氏諸儒注釋經義考論制度使後世有所依據誠足以當此秩祀遂為不刋之典太宗是舉亦前帝王所未及行也夫儒之近者恩沾於子孫儒之逺者禮秩於配享太宗之崇儒重道顧不美歟貞觀二年太宗謂侍臣曰為政之要惟在得人用非其才必難致治今所任用必須以徳行去聲後同學識為本諫議大夫王珪曰人臣若無學業不能識前言往行豈堪大任漢昭帝時昭帝名弗陵武帝幼子有人詐稱衛太子名據武帝太子衛皇后所生聚觀者數萬人衆皆致惑雋不疑雋音吮姓也不疑其名字曼倩渤海人時為京兆尹斷以蒯聵之事蒯古買切蒯聵春秋時衛靈公世子也出奔于宋靈公卒孫出公輒立晉又納蒯聵于戚父子争國後十五年蒯聵是為莊公輒乃出奔昭帝曰公卿大臣當用經術明於古義者昭帝始元五年有男子乗黄犢車詣北闕自謂衛太子詔公卿識視皆不敢言雋不疑後到叱從吏收縛曰昔蒯聵出奔輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自請此罪人也遂詔送獄帝嘉之廷尉驗治竟得姦詐此則固非刀筆俗吏所可比擬上曰信如卿言愚按賈子有言移風易俗使天下回心而鄉道𩔖非俗吏之所能為也昔漢霍光因夏侯勝之言而重經術之士昭帝因雋不疑之事謂公卿大臣當用明於古義者夫漢之諸儒要非真儒也而明效大驗如此況真知道者哉太宗謂任人須用徳行學識為本王珪謂人臣若無學業豈堪大任其説美矣此貞觀之治所由致也然太宗王珪之所稱道者又果真儒也哉貞觀四年太宗以經籍去聖久逺文字訛謬詔前中書侍郎顔師古名籕其先琅琊人博學善屬文隋世李綱薦之授安養尉髙祖入關謁見授朝散大夫遷中書舍人詔令一出其手貞觀中釐正五經拜祕書少監後撰五禮成進爵為子於祕書省考定五經及功畢復詔尚書左僕射房𤣥齡集諸儒重加詳議重平聲時諸儒𫝊習師説舛謬已久皆共非之異端􅑣起而師古輒引晉宋已來古本隨方曉答援據詳明皆出其意表諸儒莫不歎服太宗稱善者久之賜帛五百匹加授通直散騎常侍晉以員外常侍與散騎常通直故號通直後世因之頒其所定書於天下令學者習焉令平聲太宗又以文學多門章句繁雜詔師古與國子祭酒孔穎達等諸儒撰定五經疏義凡一百八十卷名曰五經正義付國學施行舊本五經疏義另為一章今合為一章唐氏仲友曰五經出於煨燼之餘諸儒習𫝊不勝異説當其並行之初是非當否之説持未定也世傳既久其迂怪淺陋之學稍稍堙滅其能盛行於世者如王弼之易孔安國之書毛鄭之詩鄭氏之三禮杜預之左氏何休之公羊范甯之穀梁皆卓然顯行於世而其他不勝異説之數十百家為之盡廢然為數子之學者又各持異見太宗始命名儒為義疏以統一之豈可謂無益於經哉然亦崇其教而已道未也又曰自漢以來經學分析傳習不同重以南北之分浸益訛舛師古家世齊周乃能通晉宋舊文故能釐正南北之謬其有益於學者多矣愚按自經籍僅遺於秦火之餘漢儒修補掇拾而専門名家之學紛紜轇轕學者不勝考也太宗興起斯文命顔師古考定五經孔穎達撰定疏義易主於王弼書主於安國詩主於毛鄭三禮主於康成杜預之左傳何休之公羊范寗之榖梁皆卓然顯行於世而其他數十百家盡廢唐之疏義可謂有功於經矣然嘗論之古者易有田氏焦氏賈氏數家自唐以王弼為正而秦漢象數之學晦矣古者書有歐陽氏大小夏侯氏數家自唐以安國為正而古文今文之本亂矣古者詩書之序不附於正經易之十翼不附於爻彖自唐之疏義既出而經傳殽亂不可復考矣由此論之則明六經之道者疏義也晦六經之道者亦疏義也雖然名物度數之詳字義音釋之備毫分縷析使後世有考焉此則其功之不可誣者也太宗嘗謂中書令岑文本曰夫人雖禀定性夫音扶必須博學以成其道亦猶蜃性含水待月光而水垂蜃音腎大蛤也海上月明蜃吐氣如樓閣之狀木性懐火待燧動而焰發燧取火之木也春取榆栁之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火人性含靈待學成而為美是以蘇秦刺股刺音漆蘇秦字季子雒陽人師鬼谷子得太公隂符伏而誦之讀書欲睡引錐自刺其股血流至踵簡練揣摩至期年而成後遊説佩六國相印董生垂帷董生名仲舒廣川人漢景帝時為博士治春秋下帷講誦弟子以次相授或莫見其面三年不窺園其精如此學者皆師尊之武帝即位舉賢良對䇿三篇擢為江都王相不勤道藝則其名不立文本對曰夫音扶人性相近情則遷移必須以學飭情以成其性禮云玉不琢不成器人不學不知道禮學記之辭所以古人勤於學問謂之懿徳愚按學之為言效也人性皆善覺有先後後覺者必效先覺之所為而後可以明善而復其初也由此論之善者吾性之所本有非學則無以復之也猶水者蜃性之所本有非月則無以成之也火者木性之所本有非燧則無以發之也太宗此論雖後世醇儒不能逺過文本斯時正當告之曰陛下既知性善之具於己則性無内外之分不當慎於外而怠於内也性無始終之異不當謹於始而怠於終也于以攻其邪心格其非心庶乎疾之有瘳矣顧乃泛引學記之言無所匡救道之不明有君無臣豈不可歎之甚哉文史第二十八凡四章貞觀初太宗謂監修國史房𤣥齡曰比見比音鼻前後漢史載録揚雄甘泉羽獵揚雄字子雲成都人漢成帝時有薦雄文似相如者上方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭從上甘泉還奏甘泉賦以風後上羽獵雄從以為非堯舜成湯文王三驅之意故作羽獵賦以風司馬相如子虚上林司馬複姓相如名成都人著子虚賦漢武帝讀而善之乃召問相如相如曰此乃諸侯之亊未足觀請為天子遊獵之賦相如以子虚虛言也欲明天子之義故虚藉為辭以推天子諸侯之苑囿為子虚上林賦其卒章歸之於節儉因以諷諫班固兩都等賦班固字孟堅彪之子也漢明帝時為校書郎繼父業著西漢書後遷𤣥武司馬作西都東都賦此既文體浮華無益勸誡何假書之史䇿其有上書論事詞理切直可裨於政理者朕從與不從皆須備載胡氏寅曰凡人之心已以為是則欲天下皆是已以為非則欲天下皆非太宗於此其心廣矣不敢自以為是而沒人之善使後有考焉雖然切直之言猶瞑眩之藥将以已疾也如其可服舍而不服而姑存其方豈若尅勉而從之以收益身之用乎愚按春秋者諸史之本也褒善貶惡進君子退小人進中國退夷狄一言一字皆足為後世法後世之史表年紀亊而已固難律之以春秋之法要使其善足為勸惡足為戒可也無益之文何必厠於其間哉太宗謂漢史載甘泉等賦文體浮華無益勸戒其説是也近時司馬氏作通鑑於韓文載文暢序於栁文載梓人傳取其有益於世教也較之舊史載進學解等文相去逺矣司馬氏之書真太宗之遺意哉貞觀十一年著作佐郎鄧隆通鑑作鄧世隆避太宗諱除世字表請編次太宗文章為集太宗謂曰朕若制亊出令有益於人者史則書之足為不朽若事不師古亂政害物雖有詞藻終貽後代笑非所須也祇如梁武帝父子武帝及昭明太子統也及陳後主名叔寳字元秀髙宗長子也國號陳多與狎客賦詩後為隋所滅封長城公隋煬帝亦大有文集如玉樹後庭花曲清夜遊西園曲之𩔖而所為多不法宗社皆須臾傾覆凡人主惟在徳行去聲何必要亊文章耶竟不許按通鑑係十二年愚按昔史臣贊堯曰欽明文思贊舜曰濬哲文明未嘗不言文也夫子之言堯曰煥乎其有文章朱子謂文者徳之著乎外者也其經緯天地者乎後世帝王於是乎有文集矣若梁武帝父子陳後主隋煬帝之所謂文文與行乖何足云也太宗謂人主惟在徳行何必事文章此言固為要論然藴之為徳行發之為文辭昭回天章光被萬物如帝堯之文章尚何厭於文哉貞觀十三年禇遂良為諫議大夫兼知起居注太宗問曰卿比知起居比音鼻書何等事大抵於人君得觀見否朕欲見此注記者将却觀所為得失以自警戒耳遂良曰今之起居古之左右史禮天子動則左史書之言則右史書之以記人君言行去聲善惡畢書庶幾人主不為非法幾平聲不聞帝王躬自觀史太宗曰朕有不善卿必記耶遂良曰臣聞守道不如守官臣職當載筆何不書之黄門侍郎劉洎進曰人君有過失如日月之蝕人皆見之設令平聲遂良不記天下之人皆記之矣范氏祖禹曰人君言行被於天下炳若日月衆皆睹之其得失何可私也欲其可傳於後世莫若自修而已矣何畏乎史官之記必自觀之邪劉洎謂天下亦皆記之斯言足以儆其君心全其臣職矣愚按古者天子動則左史書之言則右史書之所以約飭人君之身心使之無言動之失而已唐制雖不盡古而意則猶古必得其人以舉厥職則庶乎其有儆也若遂良之言可謂能守其職矣劉洎之言則兩箴之也賢矣哉貞觀十四年太宗謂房𤣥齡曰朕每觀前代史書彰善癉惡癉音亶病也足為将來規誡不知自古當代國史何因不令平聲帝王親見之對曰國史既善惡必書庶幾平聲人主不為非法止應平聲畏有忤㫖故不得見也太宗曰朕意殊不同古人今欲自看國史者蓋有善事固不須論若有不善亦欲以為鑒誡使得自修改耳卿可撰録進來𤣥齡等遂刪略國史為編年體撰髙祖太宗實録各二十卷表上之太宗見六月四日事武徳九年六月丁巳秦王殺太子建成齊王元吉語多微文乃謂𤣥齡曰昔周公誅管蔡而周室安見公平篇注季友鴆叔牙而魯國寧鴆直禁切毒鳥也以羽厯飲食即殺人春秋時魯莊公有三弟長慶父次叔牙次季友莊公娶孟任生子班欲立之及病問嗣於叔牙叔牙曰慶父可為嗣公患之問季友季友請立班季友以公命使人飲叔牙以鴆朕之所為義同此𩔖蓋所以安社稷利萬人耳史官執筆何煩有隠宜即改削浮詞直書其事侍中魏徵奏曰臣聞人主位居尊極無所忌憚惟有國史用為懲惡勸善書不以實後嗣何觀陛下今遣史官正其辭雅合至公之道范氏祖禹曰古者官守其職史書善惡君相不與焉故齊太史兄弟三人死於崔杼而卒不沒其罪此姦臣賊子所以懼也後世人君得以觀史而宰相監修欲其直筆不亦難乎司馬遷有言文史星厯近乎卜祝蓋止於執簡記事直書其實而已非如春秋有褒貶賞罰之文也後之為史者務褒貶而忘事實失其職矣人君任臣以職而宰相不與史事則善惡庶乎其可信也又曰昔者象日以殺舜為事舜為天子也則封之管蔡啟商以叛周周公為相也則誅之其迹不同而其道一也舜知象之将殺己也故象憂亦憂象喜亦喜盡其誠而親愛之而已矣象得罪於舜故封之管蔡流言於國将危周公以間王室得罪於天下故誅之非周公誅之天下之所當誅也周公豈得而私之哉後世如有王者不幸而有害兄之弟如象則當如舜封之是也不幸而有亂天下之兄如管蔡則當如周公誅之是也舜處其常周公處其變此則聖人所以同歸于道也若夫建成元吉豈得罪於天下者乎茍非得罪於天下則殺之者已之私也豈周公之心乎愚按唐世臨湖之事先儒論之詳矣太宗至是乃自比於周公誅管蔡為同𩔖尤不能逃儒者之議焉文公朱子謂只消以公私斷之周公全以周家天下為心太宗則假仁義以濟私欲斯言盡之矣愚謂使建成有泰伯固讓之心而太宗得如王季因心之友則至徳在建成聖徳在太宗可以掩絶千古矣是可為歎息也禮樂第二十九凡十二章太宗初即位謂侍臣曰準禮名終将諱之前古帝王亦不生諱其名故周文王名昌周詩云克昌厥後春秋時魯莊公名同十六年經書齊侯宋公同盟于幽唯近代諸帝妄為節制特令生避其諱令平聲理非通允宜有改張因詔曰依禮二名義不偏諱尼父達聖非無前指近世以來曲為節制兩字兼避廢闕已多率意而行有違經語今宜依據禮典務從簡約仰效先哲垂法将來其官號人名及公私文籍有世及民兩字不連讀並不須避愚按春秋傳曰周人以諱事神名終将諱之禮曰不諱嫌名二名不偏諱著在禮經昭然可法諱名所以示尊亊之意也降及後世諱益繁而愈重有偏有旁有嫌甚至改易聖經之字遂失其義甚非古也太宗灼見近代之失去其繁文二名不偏諱允合古義貞觀二年中書舍人髙季輔上疏曰竊見密王元曉等髙祖第二十一子也俱是懿親陛下友愛之懐義髙古昔分以車服委以藩維須依禮儀以副瞻望比見比音鼻帝子拜諸叔諸叔亦即答拜王爵既同家人有禮豈合如此顛倒昭穆昭如字古者宗廟之次左為昭右為穆而子孫亦以為序説見朱子中庸或問伏願一垂訓誡永循彞則太宗乃詔元曉等不得答吳王恪魏王泰兄弟拜唐氏仲友曰詩書所載必起宗族家之未正其如邦何正帝子諸叔之昭穆豈惟得敘族之禮亦以明本支見尊無二上之義愚按禮曰天子之元子士也天下無生而貴者入學齒胄所以尚敬也矧以帝諸子而受諸叔之答拜殊失親親之殺豈禮也哉季輔之言太宗之詔誠為彞則貞觀四年太宗謂侍臣曰比聞比音鼻京城士庶居父母喪者喪平聲乃有信巫書之言辰日不哭以此辭於弔問拘忌輟哀敗俗傷風極乖人理宜令平聲州縣教導齊之以禮典愚按太史公謂隂陽家使人拘而多畏降及後世其説愈長其術愈衍而拘畏愈甚令人欲逺絶而不能然嘗觀𫝊曰辰在子夘謂之疾日君徹宴樂從古以來有是説此又何也以子夘而不樂亦猶辰日而不哭也太宗嘗以辰日哭張公謹矣此固足以破時俗之惑而天下至有辰日而不哭父母者夫父天母地之傾摧號天叩地之不及乃以辰日而不哭此情果何為哉太宗令州縣教導齊之以禮典善矣然隂陽之説流弊于今豈惟辰日不哭而已哉傷風敗俗乖亂人理者尤多上之人道之以徳齊之以禮庶幾其少改乎貞觀五年太宗謂侍臣曰佛道設教本行善事豈遣僧尼道士等妄自尊崇坐受父母之拜損害風俗悖亂禮經宜即禁斷仍令平聲致拜於父母愚按張子西銘曰乾稱父坤稱母人藐焉而中處則天地其大父母也書曰天子作民父母以為天下王則天子者天下之父母也詩曰父兮鞠我母兮育我則育我鞠我者一家之父母也僧道二字三代無是名也後世而有其名有其人矣獨非上乾下坤而處於中者乎獨非為天下父母者之民乎獨非一家父母之子乎而曰出世間矣上而不拜君王下而不拜父母其不在君臨之内歟不出鞠育之中歟吾不知其何心也若唐世至於坐受父母之拜尤為不經之甚太宗勅之禁斷仍令致拜父母允合民彞誠可為後世之法也貞觀六年太宗謂尚書左僕射房𤣥齡曰比有比音鼻山東崔盧李鄭四姓雖累葉陵遲猶恃其舊地好自矜大好去聲稱為士大夫每嫁女他族必廣索聘財以多為貴論數定約同於市賈音古甚損風俗有紊禮經既輕重失宜理須改革乃詔吏部尚書髙士㢘御史大夫韋挺中書侍郎岑文本禮部侍郎令狐徳棻等棻音汾令狐複姓徳棻名也宜州人博貫文史武徳初起居舍人嘗建言論次隋周正史貞觀三年詔徳棻等撰周齊梁陳隋史書成遷禮部侍郎刋正姓氏普責天下譜牒兼據憑史𫝊去聲剪其浮華定其真偽忠賢者褒進悖逆者貶黜撰為氏族志士㢘等及進定氏族等第遂以崔幹為第一等太宗謂曰我與山東崔盧李鄭舊既無嫌為其世代衰微為去聲全無官宦猶自云士大夫婚姻之際則多索財物或才識庸下而偃仰自髙販鬻松檟音賈依託富貴我不解音懈人間何為重之且士大夫有能立功爵位崇重善事君父忠孝可稱或道義清素學藝通博此亦足為門户可謂天下士大夫今崔盧之屬惟矜逺葉衣冠寧比當朝之貴公卿已下何暇多輸錢物兼與他氣勢向聲背實背音倍以得為榮我今定氏族者誠欲崇樹今朝冠冕何因崔幹通鑑作崔民幹避太宗諱除民字猶為第一等祇看卿等不貴我官爵耶不論數代已前祇取今日官品人才作等級宜一量定用為永則遂以崔幹為第三等至十二年書成凡百卷頒天下又詔曰氏族之美實繁於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗陵替燕趙古姓多失衣冠之緒齊韓舊族或乖禮義之風名不著於州閭身未免於貧賤自號髙門之胄不敦匹嫡之儀問名唯在於竊貲結褵必歸於富室乃有新官之輩豐財之家慕其祖宗競結婚姻多納貨賄有如販鬻或自貶家門受屈辱於姻婭或矜其舊望行無禮於舅姑積習成俗迄今未已既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸已懲革唯此弊風未能盡變自今已後明加告示使識嫁娶之序務合禮典稱朕意焉稱去聲按通鑑凡二百九十三姓千六百五十一家唐氏仲友曰古者重氏姓故有同姓異姓庶姓之别以天揖時揖土揖為之禮奠繫世辨昭穆史氏掌之豈容少有混淆自秦罷侯封而命氏别族之禮廢自魏有中原而華夷之姓雜然無辨唐承南北之弊氏族之書安得不作又出英斷以定髙下不幸遭許李挾艷后以焚信書至見目為勲格而又納幣踰制禁昏成敝使太宗之美意不得一傳可勝歎哉林氏之奇曰善惡貴賤之在天下猶白黑之不相掩初不可以一時之私見而決之也班孟堅作古今人物表止曰羲皇至于西漢凡善惡之目别為九等而錙銖之遂使後世之議紛然而起此無他善惡之在天下自有公論而非一時私見所得而決之故也太宗之論可謂正當世之失以合夫天下之公論矣然猶以一時品秩之髙下而為後世門户之貴賤則太宗所見猶未免於徇流俗之情也孰若付之公論使貴者自貴賤者自賤乎愚按人之賢否不同善惡萬狀初不可以家世而求之也以堯舜為父而有朱均以瞽鯀為父而有舜禹伊尹自耕稼而佐成湯傅説自版築而相武丁太公自漁釣而為周太師此豈以家世而求之邪況自魏有中原華夷之姓雜然無辨赫連托始於夏后拓跋推本於軒轅李氏以𤣥元為祖崇韜認汾陽為宗書史失傳譜牒無據至若唐之崔盧李鄭矜其門地販鬻婚姻無所不至太宗深疾斯弊思欲革而正之是矣然猶以一時品級之髙下而為後世門户之貴賤則滋惑也姑以當時言之當時名臣無過房杜厥後遺愛與公主為非杜荷與承乾造逆将以其父祖之賢徳而取之乎抑以其子孫之叛逆而黜之乎然此猶在易世之後也若侯君集與凌烟之圖而身為叛逆許敬宗與登瀛之選而心極奸邪又将何以處之乎夫物之不齊物之情也奈何欲定以一時之私見哉宜其紛紛而卒無補於事也禮部尚書王珪子敬直尚太宗女南平公主珪曰禮有婦見舅姑之儀自近代風俗弊薄公主出降此禮皆廢主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執巾行盥饋之道令平聲盥音管饋音匱盥以盤水沃手也左傳奉匜沃盥饋以食為餉也易家人主中饋言婦人職乎中饋巽順而已禮成而退太宗聞而稱善是後公主下降有舅姑者皆遣備行此禮唐氏仲友曰有父子則有舅姑漢以來尚主者以貴降其父可謂逆人倫滅天理矣唐興猶不行婦禮王珪正之不亦宜乎愚按古者王姬下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之徳降及後世而此禮失矣夫人主以一身為人倫之主居億兆之上斯則尊無二上也帝女下降則婦道也豈宜以天子之女而壊五常之大倫乎太宗能善王珪言使公主行婦禮可謂庶幾乎人倫之主也貞觀十二年太宗謂侍臣曰古者諸侯入朝有湯沐之邑古者諸侯京師有朝宿之邑泰山有湯沐之邑蓋朝宿亦名湯沐諸侯來京師主為朝王故名朝宿從王巡狩主為助祭祭必沐浴故名湯沐隨亊立名爾芻禾百車芻茭也禾稈也所以供軍馬待以客禮晝坐正殿夜設庭燎音療大燭也諸侯将朝則司烜以物百枚并而束之設於門内也思與相見問其勞苦又漢家京城亦為去聲後同諸郡立邸舍頃聞考使去聲後同即朝集使也至京者皆賃房以坐與商人雜居纔得容身而已既待禮之不足必是人多怨歎豈肯竭情於共理哉乃令平聲就京城閑坊為諸州考使各造邸第及成太宗親幸觀焉愚按漢世於京師置諸侯王邸第諸侯王朝會寓焉上計吏到京寓焉太宗為諸州考使各造邸第允合古制及其成親幸臨觀尤見優異之意孰不竭情於共理哉貞觀十三年禮部尚書王珪奏言準令三品已上遇親王於路不合下馬今皆違法申敬有乖朝典太宗曰卿輩欲自崇貴卑我兒子耶魏徵對曰漢魏已來親王班皆次三公下今三品並天子六尚書九卿為王下馬為去聲王所不宜當也求諸故事則無可憑行之於今又乖國憲理誠不可帝曰國家立太子者擬以為君人之修短不在老幼設無太子則母弟次立母弟同母之弟也以此而言安得輕我子耶徵又曰殷人尚質有兄終弟及之義自周已降立嫡必長音掌所以絶庶孽之窺窬塞禍亂之源本為國家者所宜深慎太宗遂可王珪之奏愚按昔漢賈誼治安之書曰禮不敢齒君之路馬蹵其芻者有罰見君之几杖則起遭君之乗車則下又曰王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也然則臣之所以致敬於其君君之所以禮貌於其臣各盡其道而已王珪之奏固然而未免啟太宗輕我子之疑而太宗之言亦豈貴貴尊賢之道哉且當是時儲位之定久矣太宗至是而有設無太子則母弟次立之語固一時逺慮之言也如魏王泰輩之妄想寧不兆於此言邪可不慎哉貞觀十四年太宗謂禮官曰同爨尚有緦麻之恩而嫂叔無服又舅之與姨親疎相似而服之有殊未為得禮宜集學者詳議餘有親重而服輕者亦附奏聞是月尚書八座與禮官定議曰臣竊聞之禮所以決嫌疑定猶豫别同異别披列切明是非者也非從天下非從地出人情而已矣人道所先在乎敦睦九族九族者髙祖至𤣥孫之親舉近者以該逺五服異姓之親亦在其中九族敦睦由乎親親以近及逺親屬有等差故喪紀有隆殺喪平聲殺音賽隨恩之薄厚皆稱情以立文稱去聲後同此原夫音扶舅之與姨雖為同氣推之於母輕重相懸何則舅為母之本宗姨乃外戚他姓求之母族姨不與焉與音預考之經史舅誠為重故周王念齊是稱舅甥之國左傳成公二年晉侯使鞏朔獻齊捷于周王弗見使單襄公辭曰夫齊甥舅之國也寧不亦淫從其欲抑豈不可諫秦伯懐晉實切渭陽之詩詩秦渭陽篇曰我送舅氏曰至渭陽朱子註舅氏秦康公之舅晉公子重耳也出亡在外穆公召而納之時康公為太子送之渭陽而作此詩渭水名秦時都雍至渭陽者蓋東行送之於咸陽之地也今在舅服止一時之情為姨居喪五月為去聲後同喪平聲後喪紀同五月小功之服徇名喪實逐末棄本此古人之情或有未達所宜損益寔在兹乎禮記曰兄弟之子猶子也蓋引而進之也嫂叔之無服蓋推而逺之也推他回切逺去聲並後同禮喪記篇之辭禮繼父同居則為之期未嘗同居則不為服從母之夫從去後同聲舅之妻二人相為服或曰同爨緦麻然則繼父且非骨肉服重由乎同爨恩輕在乎異居固知制服雖係於名文蓋亦縁恩之厚薄者也或有長年之嫂長音掌遇孩童之叔劬勞鞠養情若所生分饑共寒契濶偕老契音挈譬同居之繼父方他人之同爨情義之深淺寧可同日而言哉在其生也乃愛同骨肉於其死也則推而逺之求之本源深所未喻若推而逺之為是為如字後同則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱如字載籍非一鄭仲虞則恩禮甚篤名均後漢時人好義篤實養寡嫂孤兒恩禮敦至兄子長令别居並門盡推財與之使得一尊其母顔𢎞都則竭誠致感名含晉時人嫂樊氏因疾失明含盡心奉養醫須蚺蛇膽含憂歎累時有童子持囊授含開視乃膽也藥成嫂病愈馬援則見之必冠馬援字文淵扶風人後漢伏波将軍奉嫂致恭不冠不敢入廬見孔伋則哭之為位孔伋孔子之孫字子思禮記檀弓篇曽子曰子思之哭嫂也為位此蓋並躬踐教義仁深孝友察其所行之㫖豈非先覺者歟但于時上無哲王禮非下之所議遂使深情鬱於千載至理藏於萬古其來久矣豈不惜哉今陛下以為尊卑之敘雖煥乎已備喪紀之制喪平聲或情理未安爰命秩宗詳議損益臣等奉遵明㫖觸𩔖旁求採摭羣經討論傳記論平聲傳去聲或抑或引兼名兼實損其有餘益其不足使無文之禮咸秩敦睦之情畢舉變薄俗於既往垂篤義於将來信六籍所不能談超百王而獨得者也謹按曾祖父母舊服齊衰三月齊讀曰咨衰七雷切齊衰五服之第二等衣長六尺博四寸裳下緝曰齊衰請加為齊衰五月嫡子婦舊服大功服九月請加為期衆子婦舊服小功今請與兄弟同為大功九月嫂叔舊無服今請服小功五月其弟妻及夫兄亦小功五月舅舊服緦麻請加與從母同服小功五月詔從其議詔從如字此並魏徵之詞也范氏祖禹曰人莫不有本自髙祖以上推而至於無窮苟或知之何可忘其所從來也既逺矣則服有時而絶先王之意豈以服盡而親絶乎而後世不達於禮者或益之或損之出於私意不足為法也嫂叔之無服古之人豈於其嫂獨無恩乎傳曰其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也至於嫂不可以為母無屬乎父道者也故推而逺之以明人倫加之而無義不若不加之為愈凡喪服從先王之禮則正矣愚按古之制禮尚矣嘗聞之師曰凡喪禮制為斬衰功緦之法者其文也不飲酒不食肉不處内者其實也中有其實而外飭以文是為情文之稱徒服其服而無其實則與不服等爾雖不服其服而有其實者謂之心喪心喪有隆而無殺服制之文有殺而有隆古之道也蓋服制一以周公之禮為正後世有所增改者皆溺乎其文昧乎其實而不究古制禮之意者也如從父之妻名以母之黨而服從子之妻名以婦之黨而服兄弟之妻不可名以妻之黨其無服者推而逺之也然兄弟有妻之服已之妻有娣姒之服已雖無服必不華靡於其躬宴樂於其室如無服之人也同爨且服緦麻朋友尚加麻鄰喪里殯猶無相杵巷歌之聲奚獨於兄嫂弟婦之喪而恝然待之如行路人乎古人制禮之意必有在而未易以淺識窺也夫實之無所不隆者仁之至文之有所或殺者義之精古人制禮之意蓋如此後世意欲加厚於古而不知古者之制未嘗薄也大抵古人所勉者喪之實也自盡於己者也後世所加者喪之文也可號於人者也誠偽之相去為何如嗚呼安得起唐之君臣而與語斯義哉貞觀十七年十二月癸丑太宗謂侍臣曰今日是朕生日俗間以生日可為喜樂音洛後同在朕情翻成感思君臨天下富有四海而追求侍養去聲永不可得仲由懐負米之恨家語子路曰昔者由也事二親之時常食藜藿之食為親負米於外親沒之後南遊於楚從車百乗積米萬鍾願欲食藜藿為親負米不可復得也良有以也況詩云哀哀父母生我劬勞上音渠病苦也詩蓼莪篇之辭奈何以劬勞之辰遂為宴樂之事甚是乖於禮度因而泣下久之通鑑係二十年十二月癸未胡氏寅曰劬勞之日父母存置酒為夀因以自慶可也父母既亡於是焉大為宴樂有人心者宜于此焉變矣天子者天下之表儀也太宗念親不宴而泣去之數百嵗讀其言猶使人惻然有感而後世流弊之逺取於百姓而為人臣報上之忠必如太宗一掃除之則人主孝慕之志彰而臣子諂諛之習革矣愚按以已之生日而念劬勞君上之至情也以君之生日而上朝賀臣子之至情也君上教天下以孝臣子訓天下以忠兩盡其情可也太常少卿少去聲祖孝孫祖姓也孝孫名奏所定新樂初隋用黄鐘一宫惟擊七鐘其五鐘設而不擊謂之啞鐘至是叶律郎張文收乃依古斷竹為十二律命與孝孫吹調五鐘叩之而應由是十二律皆用而孝孫又以三十一曲旋相為六十聲八十四調雅樂成調無出七聲七聲一宫二商三角四變徴五正徵六羽七變宫本宮旋相用唯樂章則隨律定均合以笙磬節以鐘鼔太宗曰禮樂之作是聖人縁物設教以為撙節撙祖本切治政善惡豈此之由御史大夫杜淹對曰前代興亡實由於樂陳将亡也為玉樹後庭花陳後主奢淫日甚每飲酒使妃嬪與狎客共賦詩采其艷麗者被以新聲選宫女千餘人習而歌之分部迭進其曲有玉樹後庭花臨春樂大略皆美諸妃嬪之容色君臣相酣歌自夕達旦以此為常由是覆滅齊将亡也而為伴侣曲齊東昏侯時作伴侣曲後為蕭衍所滅行路聞之莫不悲泣所謂亡國之音以是觀之實由於樂太宗曰不然夫音聲豈能感人夫音扶歡者聞之則悦哀者聴之則悲悲悦在於人心非由樂也将亡之政其人心苦然苦心相感故聞而則悲耳何樂聲哀怨能使悦者悲乎今玉樹伴侶之曲其聲具存朕能為公奏之為去聲知公必不悲耳尚書右丞魏徵進曰古人稱禮云禮云玉帛云乎哉唐史無此九字樂云樂云鐘鼔云乎哉論語孔子之辭樂在人和不由音調去聲太宗然之按通鑑係貞觀二年祖孝孫以為梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲作唐雅樂凡八十四調三十一曲十二和詔協律郎張文收與孝孫同修定六月乙酉孝孫等奏新樂上曰云云司馬氏光曰禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平又思與四海共之百世傳之於是作禮樂焉夫禮樂有本有文中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去其心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比鄰達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數千百年然後治化周浹鳳凰來儀也茍無其本徒有其末一日行之而百日舍之則雖韶夏濩武之音亦不能有以化一夫矣況齊陳淫昏之主亡國之音蹔奏於庭烏能變一世之哀樂乎而太宗遽云治之隆替不由於樂何其發言之易而果於非聖人也朱氏黼曰樂生於人心未嘗不與政通也發於外者雖本於人心之喜怒哀樂而作於外者亦足以感其心之逆順邪正世有治亂故其音有安樂怨怒之别而其音噍殺嘽緩粗厲勁直亦足為其民之思憂康樂剛毅肅敬之殊聞韶濩之音不覺和易聴鄭衛之曲不期流靡事有固然是豈經傳謾云哉如太宗所言則聖人移風易俗之具防情教和之理皆妄誕也聖人曰鐘鼓云蓋傷後世徇器而忘情知末而喪本耳魏徴知太宗之非不諫而反執是以順其㫖不惟不知樂固亦不知經義也愚按古者聖人之作樂也功成治定徳洽仁浹衆賢和於上萬民和於下然後定律本制器物立曲調習舞節作為一代之樂以養情性育人才事神祗和上下其體用功效廣大深切如此是故黎民時雍韶樂之本也然非后䕫制樂何以致鳳凰來儀之盛綏萬邦屢豐年武樂之本也然非周公制樂何以致清廟肅雝之盛蓋樂本於聖人之徳而樂之成也又有以輔聖人之徳樂本於天地之和而樂之成也又有以召天地之和先王重其本而未嘗遺其末也盡其實而未嘗舍其文也徒有其樂而無其徳固無以為美教化成風俗之本徒有其徳而無其樂則亦何以為感神人和上下之具哉唐之君臣謂樂在人和亦可謂知樂之本矣然遽謂治政善惡豈此之由則是先王制作皆為具文矣豈不悖哉嗚呼自秦滅典籍樂經最為殘缺今其可知者百不存一後之人君汲汲而求之猶懼其漫滅難考而況訾為無用之具乎司馬氏譏其發言之易而果於非聖人詎不信哉貞觀七年太常卿蕭瑀奏言今破陳樂舞陳音陣破陳樂即七徳舞也太宗為秦王時破劉武周軍中相與作破陳樂用樂工百二十八人被銀甲執㦸而舞凡三變每變為四陣象刺左圓右方先偏後伍交錯曲伸以象魚龍鵝鸛觀者莫不扼腕踊躍元日冬至朝會慶賀常奏後舞人改用進賢冠虎文袴螣蛇帶烏皮靴二人執旌居前更號神功破陣樂七徳者取左傳武有七徳名之也所以示其發揚蹈厲之容也天下之所共𫝊然美盛徳之形容尚有所未盡前後之所破劉武周馬邑人隋世為鷹揚校尉義寧初據馬邑郡起兵附于突厥突厥立武周為定楊可汗稱帝改元後太宗敗之于并州奔突厥為突厥所斬薛舉蘭州人隋末起兵自號西秦霸王建元後僭帝號于蘭州太宗降舉于髙墌城未幾死子仁杲代立秦王率諸将討之以仁杲及其黨歸京師斬之竇建徳王世充等臣願圖其形狀以寫戰勝攻取之容太宗曰朕當四方未定因為天下為去聲後我為同救焚拯溺故不獲已乃行戰伐之事戰一作攻所以人間遂有此舞國家因兹亦制其曲然雅樂之容止得陳其梗概若委曲寫之則其狀易識易以豉切朕以見在将相見音現将相並去聲多有曾經受彼驅使者曾音層既經為一日君臣今若重見其被擒獲之勢重平聲必當有所不忍我為此等所以不為也蕭瑀謝曰此事非臣思慮所及按史志太宗令魏徵與李百藥等更製破陣樂名曰七徳舞舞初成觀者皆踊躍諸将上夀羣臣皆稱萬嵗蠻夷在庭者請相率以舞自是朝會慶賀與九功舞同奏愚按古之樂莫善於韶舞韶舞尚矣今不可得而知矣夫子之論武舞有曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左退擊召公右六成復綴以崇天子其𤼵揚蹈厲之容進刺之節不過以象其克殷紂服荆蠻之事而已固未聞圖畫亡國之君而陳之也唐七徳之舞銀甲執㦸先偏後伍交錯屈伸以象魚龍鵝鸛之陣雖不能上法三代蓋亦庶幾武舞之遺意矣蕭瑀以為未盡請圖畫劉武周等形狀以識之夫君子於所不知蓋闕如也瑀何所據而云耶太宗謂今日将相有嘗為其臣者觀之有所不忍此特言當時之情耳要之瑀之論非特不便於當時蓋亦無稽於往古也貞觀政要卷七欽定四庫全書貞觀政要卷八唐吳兢撰元戈直集論務農第三十凡四章貞觀二年太宗謂侍臣曰凡事皆須務本國以人為本人以衣食為本凡營衣食以不失時為本夫不失時者夫音扶後同在人君簡静乃可致耳若兵戈屢動土木不息而欲不奪農時其可得乎王珪曰昔秦皇漢武外則窮極兵戈内則崇侈宫室人力既竭禍難遂興難去聲彼豈不欲安人乎失所以安人之道也亡隋之轍殷鑒不逺陛下親承其弊知所以易之易如字然在初則易以豉切終之實難伏願慎終如始方盡其美太宗曰公言是也夫安人寧國惟在於君君無為則人樂音洛君多欲則人苦朕所以抑情損欲尅已自勵耳愚按太宗之言曰國以人為本人以衣食為本營衣食以不失時為本人不失時以人君簡静為本竊嘗因其言而推之舜之罔遊于逸萬邦咸寧之本也禹之克儉於家朔南暨聲教之本也湯之不邇聲色表正萬邦之本也文王之不敢盤於遊田懷保小民之本也自古興王之君未有不簡静寡欲者也自古亡國之君未有不淫侈多欲者也至哉太宗之言乎其可謂知本者矣雖然言之非艱行之為難太宗既以隋之崇侈宫室為鑒矣而復有飛仙翠㣲之作既以隋之窮兵黷武為鑒矣而復有髙麗西域之師魏徴曰善始者實繁克終者蓋寡王珪曰在初則易終之實難然則向非二臣之言又豈能始終踐言也哉貞觀二年京師旱蝗蟲大起太宗入苑視禾見蝗蟲掇數枚而呪曰人以榖為命而汝食之是害於百姓百姓有過在予一人爾其有靈但當蝕我心無害百姓將吞之左右遽諫曰恐成疾不可太宗曰所冀移灾朕躬何疾之避遂吞之自是蝗不復為灾林氏之奇曰夫天灾可以至誠感不可以人力勝太宗掇蝗而吞之不忍民受其灾其害自息明皇遣使捕之欲以人力勝天而其灾愈甚天人之際豈不甚明矣哉愚按昔成湯禱旱於桑林以六事自責身代犧牲是不自有其身矣夫千金之子猶知愛其身人君以一身履九五之尊位崇髙莫大焉此身為何如也惟能知吾之一身億萬蒼生之身也則凡吾赤子之癢疴疾痛舉切其身矣太宗念蝗之為民害取而吞之曰寧食吾肺腸與湯之身代犧牲皆不自有其身者也其感天心也宜哉漢王嘉曰應天以實不以文此之謂也貞觀五年有司上書言皇太子將行冠禮冠去聲宜用二月為吉請追兵以備儀注太宗曰今東作方興恐妨農事令改用十月令平聲太子少保蕭瑀奏言凖隂陽家用二月為勝太宗曰隂陽拘忌朕所不行若動静必依隂陽不顧理義欲求福祐其可得乎若所行皆遵正道自然常與吉會且吉凶在人豈假隂陽拘忌農時甚要不可蹔失愚按夫子曰使民以時釋者曰時謂農隙無事之時使之不以其時則力本者不獲自盡雖有愛民之心而民不被其澤矣夫朝廷之上宫廷之間行儲君首服之禮固未至於使民而奪其時也而以追兵備儀妨農而止此太宗之心一念在民而不敢少弛也推是心於天下天下其有不務本者乎貞觀十六年太宗以天下粟價率計斗直五錢其尤賤處計斗直三錢因謂侍臣曰國以民為本人以食為命若禾黍不登則兆庶非國家所有既屬豐稔若斯朕為億兆人父母唯欲躬務儉約必不輒為奢侈朕常欲賜天下之人皆使富貴今省徭賦不奪其時使比屋之人比音鼻恣其耕稼此則富矣敦行禮讓使鄉閭之間少敬長少去聲長音掌妻敬夫此則貴矣但令天下皆然令平聲朕不聴管絃不從畋獵樂在其中矣樂音洛愚按論語曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之釋者曰庶而不富則民生不遂故制田里薄賦歛以富之富而不教則近於禽獸故必立學校明禮義以教之而孟子之告梁惠王亦曰王如施仁政於民省刑罰薄税歛深耕易耨壯者以暇日修其孝悌忠信此皆三代盛時所以王天下之要道也太宗謂朕欲賜天下人皆富貴省徭薄賦不奪其時恣其耕稼此則富矣敦行禮讓使鄉閭之間咸知敬順此則貴矣斯言也與孔孟之言同一揆也雖三代之治何以越此然貞觀之時亦云庶且富矣固嘗大召名儒增廣生員教亦云至矣朱子則謂其未知所以教也三代之教天子公卿躬行於上言行政事皆可師法太宗其能然乎愚謂太宗之言仁言也貞觀之政善政也孟子曰仁言不如仁聲之入人深善政不如善教之得民使太宗知此而力行之則所謂樂在其中者又當何如哉刑法第三十一凡九章貞觀元年太宗謂侍臣曰死者不可再生用法務在寛簡古人云鬻棺者欲嵗之疫非疾於人利於棺售故耳售音受賣也今法司覈理一獄必求深刻欲成其考課今作何法得使平允諫議大夫王珪進曰但選公直良善人斷獄允當者當去聲增秩賜金即姦偽自息詔從之太宗又曰古者斷獄必訊於三槐九棘之官周禮秋官左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位馬羣吏在其後面三槐三公位焉州長衆庶在其後今三公九卿三公見任賢篇註唐制九卿太常寺卿掌禮樂郊廟社稷之事光禄寺卿掌酒醴膳羞之政衛尉寺卿掌器械文物宗正寺卿掌天子族親屬籍以别昭穆太僕寺卿掌廏牧輦輿之政大理寺卿掌折獄詳刑鴻臚寺卿掌賓客凶儀之事司農寺卿掌倉儲委積之事太府寺卿掌財貨廩藏貿易皆有少卿以為之貳即其職也自今以後大辟罪辟音闢死刑也皆令平聲中書門下四品已上及尚書九卿議之如此庶免寃濫由是至四年斷死刑天下二十九人㡬致刑措㡬平聲舊本自太宗又曰以下另為一章今合為一章愚按昔舜命曰汝作士明於五刑以弼五教又曰刑期於無刑蓋帝王之治以教為先刑者不得已而行之以弼教而其心則期於無刑也然明用刑之要則曰惟明克允蓋明者所以得其情允者有以當於心理官之所重者在此而穆王訓刑尤切切於其審克之一語正奏讞詳審之謂也王珪謂必選公良直善之人斷獄允當者增秩賜金而太宗又使宰相及尚書九卿議之固宜致刑措之盛也夫唐虞之世期於無刑成周之隆至於刑措無刑尚矣刑措亦王者之極功也若漢之文景唐之太宗史臣皆以㡬致刑措美之自漢唐而論可謂仁君矣貞觀二年太宗謂侍臣曰比有比音鼻奴告主謀逆此極弊法特須禁斷假令平聲後同有謀反者必不獨成終將與人計之衆計之事必有他人論之豈藉奴告也自今奴告主者不須受盡令斬决愚按人臣謀逆此以下而叛上也奴告其主是亦以下而叛上也已惡人之叛上廼使叛上者得逞其志是以亂易亂相去㡬何太宗詔自今告主者勿受盡令斬决斯言一出固足以感格天下使無叛上之事矣貞觀五年張藴古為大理丞相州人李好徳相好並去聲後同素有風疾言涉妖妄詔令鞫其獄令平聲藴古言好徳癲病有徴法不當坐太宗許將寛宥藴古密報其㫖仍引與博戲治書侍御史權萬紀劾奏之太宗大怒令斬於東市既而悔之謂房𤣥齡曰公等食人之禄須憂人之憂事無巨細咸當留意今不問則不言見事都不諫諍何所輔弼如藴古身為法官與囚博戲漏洩朕言此亦罪狀甚重若據常律未至極刑朕當時盛怒即令處置處上聲後同公等竟無一言所司又不覆奏遂即决之豈是道理因詔曰凡有死刑雖令即決皆須五覆奏五覆奏自藴古始也又曰守文定罪或恐有寃自今以後門下省覆有據法令合死而情可矜者宜録奏聞藴古初以貞觀二年自幽州今大興路總管府記室兼直中書省表上大寳箴易大傳曰聖人之大寳曰位蓋取此義箴誡也文義甚美可為規誡其詞曰今來古往俯察仰觀惟辟作福辟音璧君也周書箕子陳洪範之辭為君實難孔子告魯定公曰為君難宅普天之下處王公之上任土貢其所有禹貢曰任土作貢具僚和其所唱和去聲是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯拯音軫屯諸倫切歸罪於己因心於人大明無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事見文史篇註出警而入蹕天子出稱警入稱蹕警者戒肅蹕者止行也四時調其慘舒三光同其得失故身為之度而聲為之律史記禹聲為律身為度注禹聲音應鍾律以身為法度勿謂無知居髙聴卑勿謂何害積小成大樂不可極樂音洛後同極樂成哀欲不可縱縱欲成災曲禮曰欲不可從樂不可極壯九重於内重平聲楚辭曰君門九重所居不過容膝彼昏不知瑤其臺而瓊其室桀作瑤臺紂作瓊室羅八珍於前周禮膳夫珍用八物謂淳熬淳母炮豚炮䍧𢷬珍漬熬肝膋所食不過適口惟狂罔念周書曰惟聖罔念作狂丘其糟而池其酒桀紂酒池可以運船糟隄可以望十里勿内荒於色勿外荒於禽夏書五子之歌其二曰訓有之内作色荒外作禽荒有一於此未或不亡色荒寵嬖女也禽荒耽遊畋也荒者迷荒之謂勿貴難得之貨老子曰不貴難得之貨使民不為盜勿聴亡國之音詩序曰亡國之音哀以思其民困内荒伐人性外荒蕩人心難得之物侈亡國之聲淫勿謂我尊而傲賢侮士勿謂我智而拒諫矜已聞之夏后據饋頻起史記夏后一饋而十起以勞天下之民亦有魏帝牽裾不止魏文帝欲徙冀州十萬户實河南辛毗諫帝不答起入内毗隨而引其裾帝怒良乆曰卿持我何太急耶於是從其半安彼反側如春陽秋露巍巍蕩蕩推漢髙大度漢紀髙祖寛仁有大度撫兹庶事如履薄臨深戰戰慄慄用周文小心詩小旻篇曰戰戰兢兢如臨深淵如履薄氷大明篇曰維此文王小心翼翼詩云不識不知詩皇矣篇曰不識不知順帝之則書曰無偏無黨周書曰無偏無黨王道蕩蕩一彼此於胷臆捐好惡於心想好惡並去聲衆棄而後加刑衆恱而後命賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自見音現如水如鏡不示物以形物之鑒者妍蚩自生勿渾渾而濁渾音溷勿皎皎而清勿汶汶而闇勿察察而明雖冕旒蔽目而視於未形冕十有二旒天子冠用五采藻為旒以藻貫五采王垂于綖之前後各十二取目不須視惡色之義雖黈纊塞耳而聴於無聲黈他口切纊音曠黈纊黄色綿也以黄綿為圓用組垂之于冕當兩耳旁示不聴讒邪也縱心乎湛然之域遊神於至道之精扣之者應洪纎而効響酌之者隨淺深而皆盈故曰天之清地之寧王之貞老子曰天得一以清地得一以寧王侯得一以為天下貞四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力戡音堪勝也人懼其威未懷其徳我皇撫運扇以淳風民懷其始未保其終爰􅄒金鏡窮神盡性使人以心應言以行去聲苞括理體抑揚辭令如字天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之争臣司直争讀曰諍敢告前疑太宗嘉之賜帛三百叚仍授以大理寺丞按通鑑無與囚博戲之説唐史張藴古無傳事見刑法志唐氏仲友曰張藴古文章鯁直之士太宗以一時誤見濫誅最為可惜大寳箴諷帝以民畏而未懷切中帝之病藴古敏書傳曉世務文擅當時加以切直太宗濫殺而悔則何益矣朱氏黼曰詩三百十一篇而疾讒者六君子有七惡而以訐為直居其一自昔賢智之棄逐政治之隳圯國家之昏亂未有不自讒訐也太宗方蒐積羣才共興治功乃復容萬紀輩玷汚朝列何哉房𤣥齡一代名相而萬紀以考選不公誣之張藴古平反妖言而萬紀以按事不實劾之𤣥齡以魏徴免按而藴古竟罹非命挾恩依勢逞其姦謀其為太宗盛徳累豈少乎詩曰讒人罔極交亂四國其萬紀也夫愚按自古王霸之辨治亂之分曰徳刑曰義利而已太宗知尚徳而不尚刑故能拒絶封徳彛法律之言知尚義而不知尚利故能斥權萬紀採銀之奏此其天資聰明最為合於帝王之道者也夫既知其言之非矣則廢逐其人可也封徳彛則任股肱之寄萬紀則居耳目之官徳彛論無忌佩刀之罪置校尉於死地萬紀論好徳妖言之罪陷藴古於非辜小人深文如出一律何太宗明於先而暗於後得於彼而失於此乎校尉以戴胄而免藴古則遂罹極刑愚觀藴古之箴曰衆棄而後加刑嗚呼藴古之罪豈所謂衆棄者邪亦可哀也已貞觀五年詔曰在京諸司比來比音鼻後同奏决死囚雖云五覆一日即了都未暇審思五奏何益縱有追悔又無所及自今後在京諸司奏决死囚宜三日中五覆奏天下諸州三覆奏又手詔勑曰比來有司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有寃自今門下省復有據法合死而情在可矜者宜録狀奏聞范氏祖禹曰易中孚之象曰君子以議獄緩死中孚者信發於中也議獄緩死者出於至誠也古者大司冦以獄之成告於王王命三公參聴之三公以獄之成告於王王三宥然後制刑先王重慎如此故刑清而民服若太宗之恤刑也可謂至誠而近於古矣㡬致刑措宜哉愚按易之象言刑獄者五而議獄緩死必見於中孚者蓋以君子者每於事於物無不用其中於人命所繫尤見中孚之至也獄者不得已而設議謂必究其情也死者不可以復生緩謂求所以生之也吕刑曰罔非在中又曰獄成而孚則中孚者誠議獄緩死之本也太宗恤刑之詔其出於中心之誠者歟亦近乎周官五聴三訊之遺意矣貞觀九年鹽澤道行軍總管􅡠州􅡠州今為西和州𨽻陜西都督髙甑生史無傳坐違李靖節度又誣告靖謀逆減死徙邊時有上言者曰甑生舊秦府功臣請寛其過太宗曰雖是藩邸舊勞誠不可忘然理國守法事須畫一今若赦之使開僥倖之路且國家建義太原元從及征戰有功者甚衆從去聲若甑生獲免誰不覬覦有功之人皆須犯法我所以必不赦者正為此也愚按諸葛武侯之治蜀也開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰堂堂三代之佐此後世之所不能也太宗以王魏為相以薛萬徹為將非所謂雖讐必賞歟至若髙甑生以秦府舊臣身從百戰一旦犯法黜之不疑非所謂雖親必罰歟嗚呼太宗之布公道其庶㡬武侯之治者乎貞觀十一年特進魏徴上疏曰臣聞書曰明徳慎罰周書康誥之辭惟刑恤哉虞書舜典之辭禮云為上易事易以豉切後同為下易知則刑不煩矣上人疑則百姓惑下難知則君長勞矣長音掌後同禮緇衣篇之辭夫音扶後同上易事則下易知君長不勞百姓不惑故君有一徳臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯起虞書臯陶賡歌曰庶事康哉當今道被華戎功髙宇宙無思不服無逺不臻然言尚於簡文志在於明察刑賞之用有所未盡夫刑賞之本在乎勸善而懲惡帝王之所以與天下為畫一不以貴賤親疎而輕重者也疎與疏同今之刑賞未必盡然或屈伸在乎好惡並去聲後同或輕重由乎喜怒遇喜則矜其情於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢音盤瘢痕可求則刑斯濫矣毛羽可出則賞因謬矣刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老孔子老聃也威怒所至則取法於申韓申不害韓非皆戰國刑名之學直道而行非無三黜三去聲論語曰栁下惠直道而事人焉徃而不三黜危人自安蓋亦多矣故道徳之㫖未𢎞刻薄之風已扇夫刻薄既扇則下生百端人競趍時則憲章不一稽之王度稽音覊實虧君道昔州犂上下其手楚國之法遂差左傳襄公二十六年楚與秦侵鄭楚穿封戍囚鄭皇頡公子圍與之争正於伯州犂州犂乃立囚曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍抽戈逐王子圍弗及楚人以皇頡歸張湯輕重其心漢朝之刑以弊漢張湯為廷尉鄉上意所便其所治即上意所欲辠子監史深刻者即上意所欲釋予監史輕平者所治即豪必舞文巧詆即下戸羸弱時口言雖文致法上裁察帝於是往往釋湯所言出本傳以人臣之頗僻頗平聲猶莫能申其欺罔况人君之髙下將何以措其手足乎以睿聖之聰明無幽㣲而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂音洛上同遂忘先笑之變禍福相倚吉凶同域惟人所召安可不思頃者責罰稍多威怒㣲厲或以供帳不贍或以營作差違或以物不稱心稱去聲或以人不從命皆非致治之所急實恐驕奢之攸漸是知貴不與驕期而驕自至富不與侈期而侈自來非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府藏去聲譬今日之資儲以隋氏之甲兵况當今之士馬以隋氏之户口校今時之百姓度長比大度待洛切曾何等級曾音層然隋氏以富强而喪敗動之也我以貧窮而安寧静之也静之則安動之則亂人皆知之非隱而難見也非㣲而難察也然鮮蹈平易之塗鮮上聲易以豉切後同多遵覆車之轍何哉在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至於將受戮辱竟未悟其滅亡之所由也可不哀哉夫鑒形之美惡必就於止水鑒國之安危必取於亡國故詩曰殷鑒不逺在夏后之世詩大雅蕩篇之辭又曰伐柯伐柯其則不逺詩豳風伐柯篇之辭臣願當今之動静必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜欲以從人省遊畋之娯息靡麗之作罷不急之務慎偏聴之怒近忠厚逺便佞逺去聲便平聲杜悦耳之邪説甘苦口之忠言去易進之人賤難得之貨採堯舜之誹謗堯舜設誹謗之木於五達之衢以書政治之愆失追禹湯之罪已左傳禹湯罪已其興也勃焉惜十家之産見納諫篇注順百姓之心近取諸身恕以待物思勞謙以受益易謙卦九三勞謙君子有終吉不自滿以招損虞書曰滿招損謙受益有動則庶𩔖以和出言而千里斯應易大傳曰君子居其室出其言善則千里之外應之超上徳於前載樹風聲於後昆此聖哲之宏規而帝王之大業能事斯畢在乎慎守而已夫守之則易取之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢淫泆動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保也易文言傳釋否九五爻義誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若以當今之無事行疇昔之恭儉則盡善盡美矣固無得而稱焉太宗深嘉而納用按史傳上幸洛陽次昭仁宫多所譴責徴諫曰隋惟責不獻食或供奉不精為此無限而至於亡故天命陛下代之正當兢懼戒約奈何令人悔為不奢若以為足今不啻足矣以為不足萬此寧有足邪上驚曰非公不聞此言退又上疏云云唐氏仲友曰徴言刑賞之本在乎勸善而懲惡今之刑賞或由喜怒此即皇極所謂王道書曰無有作好無有作惡惟辟作福惟辟作威二説並行而不相悖無作好惡道也惟作威福權也徳大而常禮不足以賞於是乎有作福罪大而常法不足以誅於是乎有作威此非有司之法守而出乎人君之權者雖作福而徳稱乎賞豈作好哉雖作威而罪宜乎誅豈作惡哉然則賞刑非不由喜怒也不由乎一人之私喜怒也愚按漢世賢良之策曰上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵賞而民不勸重刑罰而姦不止其上不正遇民不信也夫子曰其身正不令而行其身不正雖令不從又曰人而無信不知其可也其是之謂歟夫以太宗之世嘉善賞功之制明罰恤民之詔屢形於言亦可謂兢兢於君道者然而刑賞之失猶有如魏徵之言者豈正身之道未有以盡於己乎抑信未足以孚於民乎觀徴所謂欲善之志不減而改過之心少虧其未能正於己而信於民者可想見已雖然徴之疏必諄諄以隋為戒若致儆於庸君常主之前者亦猶賈山於漢而借秦為喻之意憂治危明之心也若徴者可謂忠愛其君者矣貞觀十四年戴州濟北地今廢刺史賈崇以所部有犯十惡者被刺史劾奏太宗謂侍臣曰昔陶唐大聖栁下惠大賢其子丹朱甚不肖其弟盜跖為巨惡盜跖莊子雜篇以為栁下惠之弟名跖而為大盜夫以夫音扶聖賢之訓父子兄弟之親尚不能使陶染變革去惡從善去上聲今遣刺史化被下人咸歸善道豈可得也若令平聲後同縁此皆被貶降或恐遞相掩蔽罪人斯失諸州有犯十惡者刺史不須從坐但令明加糾訪科罪庶可肅清姦惡愚按夫子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格謂政刑之不如徳禮也蓋政者為治之具刑者輔治之法徳禮者出治之本而徳又禮之本也後世之為治者徳禮有愧教化不先非惟徳禮不能使民有耻且格而政刑亦不能使民免而無耻矣甚而至於罪麗於十惡尚忍言之哉然究厥本原則承流宣化坐罪宜也而遂至於遞相掩蔽罪人斯失反以長姦容慝遂使麗於十惡者乃得全身於覆載之間而可乎哉太宗不坐刺史但令明加糾察以正其罪蓋深有以知其弊而不得不然也司牧民者其亦於徳禮政刑而知本末先後哉貞觀十六年太宗謂大理卿孫伏伽貝州人武徳初上言三事帝曰可謂誼臣矣貞觀中拜御史累遷大理卿曰夫作甲者夫音扶欲其堅恐人之傷作箭者欲其鋭恐人不傷何則各有司存利在稱職故也稱去聲朕常問法官刑罰輕重每稱法網寛於往代仍恐主獄之司利在殺人危人自達以釣聲價今之所憂正在此耳深宜禁止務在寛平唐氏仲友曰太宗留心聴斷天下刑㡬措固嘗拒封徳彛刑法伯道之説從魏公仁義之言雖道徳齊禮未純三代而欽恤之意形矣惜哉後世之不能守也愚按漢景帝之詔有曰欲令理獄者務先寛又曰獄者人之大命死者不可復生吏或不奉法以貨賂為市朋黨比周以苛為察以刻為明罪者不服姦法為暴甚無謂也諸獄雖疑若文致於法而罪人心不厭者則讞之誠後王之所當知也太宗謂恐主獄之司利在殺人危人自達深宜禁止務在寛平斯言也與景帝之詔同一仁心也史臣俱以刑措美之宜哉蓋寛則矜恕可得其情急則殘忍有失其情者矣然寛非縱弛之謂也寛而流於縱弛則幸免者有焉今曰務在寛平則平若持衡輕重不失矣罪在於輕而從輕罪在於重而從重此平也實寛之所致也則寛平者實明刑之典要歟赦令第三十二凡四章貞觀七年太宗謂侍臣曰天下愚人者多智人者少智者不肯為惡愚人好犯憲章好去聲凡赦宥之恩惟及不軌之輩古語云小人之幸君子之不幸一嵗再赦善人喑啞凡養稂莠者傷禾稼稂莠音郎酉革之害稼者惠姦宄者賊良人宄音詭昔文王作罰刑兹無赦周書康誥武王之辭又蜀先主姓劉名備字𤣥徳漢中山靖王之後三國時繼漢統都蜀嘗謂諸葛亮曰吾周旋陳元方鄭康成之間元方名紀康成名𤣥並後漢人每見啟告理亂之道備矣曾不語赦曾音層故諸葛亮理蜀十年不赦而蜀大化梁武帝每年數赦數音朔後同卒至傾敗卒子聿切夫謀小仁者夫音扶大仁之賊故我有天下已來絶不放赦今四海安寧禮義興行非常之恩彌不可數將恐愚人常冀僥倖惟欲犯法不能改過范氏祖禹曰數赦之害前世論之詳矣夫良民不被澤而罪人獲宥政之偏黨莫甚於此欲以致和而措刑不亦疎乎而人君每以赦為推恩或祈隂徳之報太宗懲之可謂善治矣馬氏存曰先王以教而化民以刑而禁民不幸或陷於憲網者聖人則原其情而省其過之大小而肆赦之蓋赦者聖人以之宥過也可以行而不行則傷乎仁不可以行而行之則失乎義故世之議者或以宜疎而不宜數或以宜數而不宜疎是疎者太簡數者太繁蓋惟當語其當否而不論其疎數也故周官三宥三赦之法曰不識曰過失曰遺忘以為宥之可用止於如此曰幼弱曰老耄曰惷愚則以為赦之可行止於如此由是觀之赦宥之法當其時而用之則為天下之利不當其時而用之則為天下之害故魯肆大眚春秋譏之管仲亦曰赦者小利而大害久而不勝其禍無赦宥者小害而大利久而不勝其福以為天下之民知赦之福而不知無赦之為福是亦議其赦之大者乎愚按書曰𤯝災肆赦怙終賊刑𤯝過誤也災不幸也故肆赦之怙有恃也終再犯也故賊刑之此聖人用法之權衡而忠厚之意寓於其間未聞不擇罪之輕重而悉赦之也易曰雷雨作解君子以赦過宥罪雷動而雨作天澤所施溥矣而曰赦過宥罪過之小者赦釋之罪之大者寛宥之而已亦非謂不擇罪之大小而悉赦之也故春秋莊公之世肆大眚聖人以為非常之事書之於經正以其非古也自是而赦令數矣然或者因天下有非常之事與夫凶荒流離之後盗賊垢汙之餘於是有以沛然洗濯於天下不得已而用之猶云可也否則雖足以見仁惠而未免所謂小人之幸而君子之不幸矣為人上者操刑賞之柄以勸善懲惡酌古之道揆今之宜必赦過宥罪而不可數要為得中也太宗謂絶不放赦而四海安寧非常之恩彌不可數其深有見於治道者哉貞觀十年太宗謂侍臣曰國家法令惟須簡約不可一罪作數種條格式既多官人不能盡記更生姦詐若欲出罪即引輕條若欲入罪即引重條數變法者數音朔實不益道理宜令審細令平聲毋使互文毋無通貞觀十一年太宗謂侍臣曰詔令格式若不常定則人心多惑姦詐益生周易稱渙汗其大號易渙卦九五爻辭言發號施令施平聲若汗出於體一出而不復也書曰慎乃出令令出惟行弗惟反周書周官之辭且漢祖日不暇給蕭何起於小吏制法之後猶稱畫一今宜詳思此義不可輕出詔令必須審定以為永式愚按唐之刑書有四曰律令格式令者尊卑貴賤之等殺國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於三者其有所違及人之為惡而入於罪戾者一斷之以律律之書凡十二篇所以使民遷善逺罪而無犯也皆太宗詔房𤣥齡等與法司因隋之舊而更定增損多降重為輕迄貞觀用之無所變改夫律令格式皆所以用法也太宗謂貴簡約貴常定此最為知法意者夫不簡約則出入輕重吏因之而作弊不常定則朝行夕改民莫知所信從太宗取則於蕭何畫一之法而不輕於數變法必須審定以為永式能致刑措實由此也長孫皇后遇疾漸危篤皇太子承乾也啟后曰醫藥備盡今尊體不瘳音抽愈也請奏赦囚徒并度人入道冀䝉福祐后曰死生有命非人力所加若修福可延吾素非為惡者若行善無效何福可求赦者國之大事佛道者上每示存異方之教耳常恐為理體之弊豈以吾一婦人而亂天下法不能依汝言按通鑑貞觀九年長孫皇后素有氣疾前年從上幸九成宫柴紹等中夕告變上擐甲出閤問狀后扶疾以從左右止之后曰上既震驚吾何心自安由是疾甚太子曰云云后曰云云必行汝言吾不如速死太子私以語房𤣥齡𤣥齡白上上哀之欲為之赦后固止之唐氏仲友曰天啟興運亦不偶然助興運必有賢妃以漢唐論長孫賢於隂馬有古后妃之美無後世后妃之失太宗謂内良佐信夫愚按三代興王之主無不内有賢助以協成至治任姒邑姜其表表於經傳者為天下母儀之所取則焉若長孫皇后之賢自三代而下之絶無僅有者也馬鄧不足以儕之矣遇危疾而不以肆赦徼福非卓然有見何以能兹不幸而弗登耆艾宜太宗有失内良佐之歎也天假之年使之擁佑於髙宗之世則庶㡬其遏禍亂之萌乎此可為深悲也貢賦第三十三凡五章貞觀二年太宗謂朝集使曰使去聲唐制諸州奉貢物入京者謂之朝集使任土作貢布在前典當州所産則充庭實當去聲比聞都督刺史比音鼻邀射聲名厥土所賦或嫌其不善踰境外求更相倣傚更平聲遂以成俗極為勞擾宜改此弊不得更然愚按夏書載禹平水土之績而以貢名篇貢者下獻上之名水土未平何由定貢書以貢名見地平天成之功也然曰任土作貢者亦非以其土之所有而悉貢也禹貢一書其所貢者皆服食器用之常宗廟朝廷之不可闕者非徒奉一人耳目心志之所欲也而唐之刺史至于越境求物更相倣傚亦由國無定制使踰越于常度之外太宗深懲而力革其弊誠王者之先務也貞觀中林邑國貢白鸚鵡性辨慧尤善應答屢有苦寒之言太宗愍之付其使令還於林邑使去聲令平聲按通鑑貞觀五年十一月林邑獻五色鸚鵡魏徵以為不宜受上喜而歸之愚按周書載召公戒武王之言曰犬馬非其土性不畜珍禽異獸不育于國其後穆王得白狼白鹿而荒服因以不至其得失可睹也太宗却林邑白鸚鵡之獻可謂能遵古先哲之訓而鑒後世之失矣貞觀十二年疎勒朱俱波甘棠皆西域國名疎勒距長安九千里餘王姓裴氏朱俱波在葱嶺之西甘棠在大海南遣使貢方物使去聲後同太宗謂羣臣曰向使中國不安日南南蠻國在安南之外西域朝貢使亦何緣而至朕何徳以堪之覩此翻懷危懼近代平一天下拓定邊方者拓音托惟秦皇漢武始皇暴虐至子而亡漢武驕奢國祚幾絶幾平聲朕提三尺劒以定四海逺夷率服億兆乂安自謂不減二主也然二主末途皆不能自保由是每自懼危亡必不敢懈怠惟藉公等直言正諫以相匡弼若惟揚美隐惡共進䛕言則國之危亡可立而待也按通鑑係貞觀九年十二月唐氏仲友曰太宗因四夷之賓而以秦皇漢武自儆求輔弼之言此忠言可進之機惜哉𤣥齡無杜漸之言俾進乎帝王保治之道也愚按昔武王克商西旅底貢厥獒大保作旅獒用訓于王而致慎徳之戒夫以武王之聖而召公所以警戒之者如此後之人主可不深思而加念之哉太宗因四夷之賓以秦皇漢武自儆以求言而當時大臣雖不聞有如太保作書之訓然自懷危亡不敢懈怠有合于夙夜罔或不勤之言庶幾乎帝王保治之道矣貞觀十八年太宗將伐髙麗其莫離支髙麗官名其職如中國吏部兼兵部尚書也貞觀十六年髙麗東部大人泉蓋蘇文弑其王武立王弟子藏為王自為莫離支官遣使去聲貢白金黄門侍郎褚遂良諫曰莫離支虐殺其主九夷所不容東方之夷有九種曰畎夷于夷方夷黄夷白夷赤夷𤣥夷風夷陽夷又一曰𤣥莬二曰樂浪三曰髙儷四曰滿飭五曰鳬㬰六曰索家七曰東屠八曰倭人九曰天都陛下以之興兵將事弔伐為遼東之人為去聲報主辱之恥古者討弑君之賊不受其賂昔宋督宋春秋時國名字華父宋戴公孫也遺魯君以郜鼎遺去聲魯君桓公名軌郜鼎郜國所造器故繫名於郜桓公受之於大廟大音泰後同大廟周公之廟也臧哀伯魯大夫臧孫達也諫曰君人者將昭徳塞違今滅徳立違而寘其賂器於大廟百官象之又何誅焉武王克商遷九鼎于雒邑九鼎殷所受夏鼎也武王克商乃營雒邑而後去之又遷九鼎焉義士猶或非之蓋伯夷之屬而况將昭違亂之賂器寘諸大廟其若之何事見左傳桓公二年宋督弑其君殤公與夷以郜鼎賂公故遂相宋公四月取郜鼎于宋納于大廟臧哀伯諫曰云云公不聴夫音扶春秋之書百王取則若受不臣之筐篚納弑逆之朝貢不以為愆將何致伐臣謂莫離支所獻自不合受太宗從之按通鑑太宗又謂髙麗使者曰汝曹皆事髙武有官爵莫離支弑逆汝曹不能復讐今更為之遊説以欺大國罪孰大焉悉以屬大理唐氏仲友曰名其為賊乃可服之此兵法也太宗固深忿莫離支必欲討之其貢使之來欲治之而未有辭遂良之諫與太宗意會宜其從之之速也愚按褚遂良援古證今諫太宗卻莫離支之獻則善矣而不能因以消其忿兵黷武之心而其諫辭與太宗意會卒成遼水之征惜哉貞觀十九年髙麗王髙藏藏去聲髙麗王名及莫離支蓋蘇文蓋音盍髙麗臣名金蓋蘇文既弑其王武於是專擅國事其狀貌雄偉意氣豪逸身佩五刀左右莫敢仰視常令貴人武將伏地而履之上馬出行必整隊伍導者長呼則人皆奔迸不避坑谷路絶行者國人甚苦之遣使去聲獻二美女太宗謂其使曰朕憫此女離其父母兄弟於本國若愛其色而傷其心我不取也並却還之本國按通鑑係貞觀二十年愚按周書曰明王慎徳四夷咸賓無有逺邇畢獻方物惟服食器用未聞以美女為貢者也適足以亂人之國而已矣昔紂受閎夭美女之獻而西伯興魯受齊人女樂之歸而孔子行蓋自古臣下之詭計列國之隂謀未有不以女子為間使之先有以惑其耳目移其心志或乘隙以沮敗其所為或遂中以不測之禍可不慎哉髙麗美女之貢夫豈不為是邪况當興師致討之時乎太宗還之謂不欲傷其心固仁惻之意亦豈非有見於此邪若太宗其可謂賢君也已辨興亡第三十四凡四章貞觀初太宗從容從即容切謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右僕射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而會武王伐紂諸侯會孟津者八百餘國周室㣲六國無罪秦氏專任智力吞食諸侯平定雖同人情則異太宗曰不然周既克殷務𢎞仁義秦既得志專行詐力非但取之有異抑亦守之不同祚之修短意在兹乎愚按太宗君臣嘗論創業守成孰難𤣥齡以創業為難魏徴以守成為難夫創業者既往之事守成者方來之事也與其追論於既往曷若致力於方來者為有益乎他日與羣臣論周秦運祚長短之由蕭瑀之言即創業之事太宗之言即守成之事也夫所貴乎君臣之間講論古今者欲其反之於己而推之於治也取天下之事太宗既已身親之矣方當即位之初所宜監秦之所以失效周之所以得庶乎如周祚之長不至如秦祚之短也嗚呼太宗之言可謂能切已近思者矣貞觀二年太宗謂黄門侍郎王珪曰隋開皇十四年大旱人多饑乏是時倉庫盈溢竟不許賑給乃令平聲百姓逐糧隋文不憐百姓而惜倉庫比至末年比音鼻計天下儲積得供五六十年供平聲煬帝恃此富饒所以奢華無道遂致滅亡煬帝失國亦此之由凡理國者務積於人不在盈其倉庫古人云百姓不足君孰與足論語有若對魯哀公之辭但使倉庫可備凶年此外何煩儲蓄後嗣若賢自能保其天下如其不肖多積倉庫徒益其奢侈危亡之本也舊本此章重出奢縱篇今去彼存此愚按古者三年耕必有一年之食以三十年之通制國用雖有凶旱水溢民無菜色此蓄積者所以為民非為君也百姓足孰與不足聖經所以垂訓而公私之積猶可哀痛賈誼所以言於漢文帝之時也蓋蓄積固有國之先務也至於蓄積豐富侈心一生貫朽粟陳不足以供排山倒海之欲非惟無可以養民且至於厲民矣太宗謂但使倉廩可備凶年此外何煩儲蓄此得古人制國用之意良足取也貞觀五年太宗謂侍臣曰天道福善禍淫事猶影響昔啟人本突厥啟民可汗避太宗諱改曰人亡國來奔隋文帝不恡粟帛大興士衆營衛安置乃得存立既而彊富子孫不思念報徳纔至失脱即起兵圍煬帝於鴈門郡名今為代州𨽻腹裏及隋國亂又恃彊深入遂使昔安立其國家者身及子孫並為頡利破亡豈非背恩忘義所至也羣臣咸曰誠如聖㫖愚按三代之待夷狄也來者不拒去者不追蓋不以中國之治治之也文王之伐玁狁止於城彼朔方而已宣王之伐淮夷止於徐方來庭而已曷嘗盡欲郡縣其地而臣妾其人哉後世不明華夷之辨務為懷逺之圗適以自遺患而已矣故漢宣扶立呼韓而建武多北邊之擾隋文撫存啟民而煬帝有鴈門之圍由不能以三代為法故也可不戒哉貞觀九年北蕃北突厥之國歸朝人奏突厥内大雪人饑羊馬並死中國人在彼者皆入山作賊人情大惡太宗謂侍臣曰觀古人君行仁義任賢良則理行暴亂任小人則敗突厥所信任者並共公等見之畧無忠正可取者頡利復不憂百姓恣情所為朕以人事觀之亦何可久矣魏徴進曰昔魏文侯名斯晉卿桓子之子為諸侯問李克戰國時人諸侯誰先亡克曰呉先亡文侯曰何故克曰數戰數勝數並音朔後同數勝則主驕數戰則民疲不亡何待頡利逢隋末中國喪亂遂恃衆内侵今尚不息此其必亡之道太宗深然之愚按大雪人饑羊馬並死突厥將亡之徴也太宗不以此論其必亡而以不任忠良不憂百姓知其必亡可謂善觀人之國矣然魏徴論呉亡之事則又有深意焉蓋頡利固數戰數勝者也太宗自起兵已來亦豈非數戰數勝者乎觀頡利之亡亦可惕然而懼矣厥後太宗既老而復興髙麗之師殆近於李克之所論者太宗固曰魏徴若在不使我有是行豈不信㢤貞觀九年太宗謂魏徴曰頃讀周齊史末代亡國之主為惡多相𩔖也齊主齊後主也名緯世祖之子深好奢侈好去聲所有府庫用之畧盡乃至關市無不税歛去聲朕常謂此猶如饞人自食其肉肉盡必死人君賦歛不已百姓既弊其君亦亡齊主即是也然天元後周宣帝名贇自稱天元皇帝齊主若為優劣徴對曰二主亡國雖同其行則别行去聲齊主愞弱愞與懦同政出多門國無綱紀遂至亡滅天元性兇而强威福在已亡國之事皆在其身以此論之齊主為劣舊本此章重出奢縱篇今去彼存此愚按詩曰殷鑒不逺在夏后之世又曰宜鑒於殷峻命不易夫殷之鑒以夏周之鑒以殷太宗以開基之明君而能以亡國之庸君為鑒可謂知所鑒矣其得為寡過也宜哉至論周齊之治孰優魏徴以齊主為劣愚觀周子之書有剛惡柔惡之説然則天元其剛惡齊主其柔惡歟剛柔雖異亡國則一政未易以優劣論也貞觀政要卷八欽定四庫全書貞觀政要卷九唐吳兢撰元戈直集論征伐第三十五凡十三章武徳九年冬突厥頡利突利二可汗音韓凡言可汗並同以其衆二十萬至渭水便橋之北漢武帝初作便門橋長安城北靣西頭門即平門也古者平便字同於此道作橋跨渡渭水以趨茂陵此便橋是也遣酋帥執失思力酋帥長帥也執失虜姓思力其名入朝為覘自張聲勢云二可汗總兵百萬今已至矣乃請返命太宗謂曰我與突厥靣自和親汝則背之背音倍我無所愧何輙將兵將去聲入我畿縣自夸彊盛我當先戮爾矣思力懼而請命蕭瑀封徳彛等請禮而遣之太宗曰不然今若放還必謂我懼乃遣囚之太宗曰頡利聞我國家新有内難去聲又聞朕初即位所以率其兵衆直至於此謂我不敢拒之朕若閉門自守虜必縱兵大掠强弱之勢在今一䇿朕將獨出以示輕之且耀軍容使知必戰事出不意乖其本圖制服匈奴在兹舉矣遂單馬而進隔津與語頡利莫能測俄而六軍繼至頡利見軍容大盛又知思力就拘由是大懼請盟而退按通鑑載此事甚詳辭多不録愚按蠻夷猾夏帝者嚴明刑之訓蠻夷率服帝者謹惇徳之心故弼成五服之制於要服則近而揆文教逺而奮武衛至於荒服則流蔡而已内外之限截乎其不可紊也降及後世徳不足以懐柔而藉乎威威不足以讋服而至于亂太宗内定中國外綏四夷以漢武窮征逺討而不能服者咸歸版圖若突厥為患乆矣唐有天下之初已憑陵上國至于斯時率騎二十萬直至渭水亦云肆矣太宗一時輕騎示威其氣槩直可以寒氊裘之膽而奪之氣不以一矢相加遺而中國尊安裔夷退抑雖不可與帝者明刑惇徳並論其不戰屈人亦足偉也謂之英武不亦宜乎貞觀初嶺南諸州今廣海之地奏言髙州今仍舊𨽻海北酋帥馮盎談殿盎字明達髙州人隋亡據嶺表唐興以其地降髙祖封為越國公談殿人姓名亦據嶺表阻兵反叛詔將軍藺謩藺音吝姓也名謩發江嶺數十州兵討之發江南道嶺南道諸州兵也秘書􅁥魏徵諌曰中國初定瘡痍未復嶺南瘴癘山川阻深兵逺難繼疾疫或起若不如意悔不可追且馮盎若反即須及中國未寧交結逺人分兵斷險破掠州縣署置官司何因告來數年兵不出境此則反形未成無容動衆陛下既未遣使人使去聲後同就彼觀察即來朝謁恐不見明今若遣使分明曉諭必不勞師旅自致闕庭太宗從之嶺表悉定侍臣奏言馮盎談殿往年恒相征伐陛下發一單使嶺外帖然太宗曰初嶺南諸州盛言盎反朕必欲討之魏徵頻諌以為但懐之以徳必不討自來既從其計遂得嶺表無事不勞而定勝於十萬之師乃賜徵絹五百疋按通鑑貞觀元年九月馮盎談殿等迭相攻撃乆未入朝諸奏盎反者以十數上命將討之魏徵諫曰云云上乃罷兵十月遣員外散騎侍郎李公掩持節慰諭之盎遣其子智戴隨使者入朝上曰魏徵令我發一介之使而嶺表遂安勝十萬之師不可不賞賜絹五百疋唐氏仲友曰甚哉讒人之可畏也盎不為南越王於武徳之初而肯反於貞觀耶譛言無端幾害忠良非魏徵何以明之以蕭銑輔公袥不足勞偏師剪除盎之區區何足當唐之興運然直壯曲老藺謩可撃之狀未可必也太宗罷之明哉以尉佗之驕倨文帝猶以徳懐而況盎乎全知命之臣止無名之師江淮以南所全活者不勝數矣仁人之言其利溥哉賢於十萬衆特以兵勢較之耳兵隙一開尺有所短寸有所長干戈轉餉瘴癘之鬼可以十萬其哉愚按昔漢文之時人有上書告周勃欲反下廷尉捕治之薄太后曰絳侯始誅諸吕綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反耶帝乃赦之復爵邑此與魏徵論馮盎談殿之事頗同盖周勃異於馮盎談殿之事勢而薄太后之言誠𩔖於魏徵之諌也其察人之情亦明矣哉貞觀四年有司上言林邑蠻國林邑南蠻國名漢南象郡之地在交州南千餘里表疏不順請發兵討撃之太宗曰兵者凶器不得已而用之故漢光武云每一發兵不覺頭鬚為白自古以來窮兵極武未有不亡者也苻堅自恃兵彊欲必吞晉室興兵百萬一舉而亡苻堅畧陽氐人晉時苻健據長安是為前秦健死子立苻堅弑主自立伐晉大敗後為姚萇所殺隋主亦必欲取髙麗平聲頻年勞役人不勝怨勝平聲遂死於匹夫之手至如頡利往嵗數来數音朔侵我國家部落疲於征役遂至滅亡朕今見此豈得輙即發兵且經歴山險土多瘴癘若我兵士疾疫雖尅剪此蠻亦何所補言語之間何足介意竟不討之按通鑑林邑獻大珠有司以其表辭不順請討之上曰好戰者亡如煬帝頡利皆所親見也小國勝之不武況未可必乎胡氏曰太宗不以夷狄一言之慢遽興兵革幾於能忍然林邑表辭敢為不順者以獻大珠嘗試朝廷也還其獻則善矣今不間還其獻則是太宗貪其寶而甘其慢也明年鸚鵡繼來則納侮多矣雖詔使者歸之而珠竟爾不還夫豈格逺人之道愚按是年方擒突厥北土以寜有司請討林邑而太宗不欲再勞師以黷武也然自古窮兵極武未有不亡又取譬於苻堅之伐晉隋主之取遼與夫頡利之侵疆皆致於滅亡之地可謂知所鑒矣夫是三者皆太宗耳目之所聞而知見而知者也以此為鑒宜終其身而不忘夫何晚年興忿兵於遼水之上而不知止耶書曰終始慎厥與惟明明后後之人主式監在兹貞觀五年康國即漢康居國一曰薩末鞬亦曰颯秣建元魏所謂悉萬斤者在那宻水南君姓温本月氐為突厥所破稍南依葱嶺其王屈木支請歸附時太宗謂侍臣曰前代帝王大有務廣土地以求身後之虛名無益於身其人甚困假令平聲於身有益於百姓有損朕必不為況求虛名而損百姓乎康國既來歸朝有急難不得不救難去聲兵行萬里豈得無勞於人若勞人求名非朕所欲所請歸附不須納也范氏祖禹曰太宗知招徠絶域之弊有所不為然以兵克者則以為己有而郡縣置之其為疲勞百姓一也豈先行其言而後從之者歟然其不受康國足以為後世法矣使其行事每如此其盛徳可少貶哉唐氏仲友曰古之待荒服之外正如此耳太宗推所以待康國而推之它夷不求臣服不亦善乎惜哉其未盡如此也愚按闢四夷之境􅅃殊俗之附三代未之聞也盖遐荒逺夷不足闗中國之重輕得之適足以勞民而不為益棄之斯足以安民而不為損其利害豈不甚明哉漢建武中西域求内屬光武以天下初定未遑外事而竟不許唐貞觀初康國請歸附太宗謂求虛名損百姓而竟不納二君柔逺之道可謂無愧于古宜乎為開基之明王也詩云恵此中國以綏四方二君之謂矣貞觀十四年兵部尚書侯君集幽州人以雄才稱少事秦王從征伐有功王即位進吏部尚書後從承乾謀反事覺被誅伐髙昌及師次柳谷西域地名候騎言髙昌王麴文泰死文泰聞唐兵臨磧口憂懼不知所為發疾卒尅日將𦵏國人咸集以二千輕騎襲之可盡得也副將去聲薛萬均燉煌人萬徹之兄髙祖以其材武授上柱國以計勝竇建徳撃突厥有功拜將軍姜行本名確以字行以幹力稱為宣威將軍太宗毎出幸即以從平髙昌有功封金城郡公皆以為然君集曰天子以髙昌驕慢使吾恭行天誅乃於墟墓間以襲其𦵏不足稱武此非問罪之師也遂按兵以待𦵏畢然後進軍遂平其國按通鑑於是皷行而進至田城諭之不下詰朝攻之及午而克虜男女計七千餘口遂降唐氏仲友曰髙昌地不千里勝兵纔萬人恃逺不賔太宗討之以其地控西域之中故也愚按師平髙昌所以闢西陲也髙昌去唐七千餘里當是時可謂逺討矣然幸功臣夙將智勇足以制勝是以克成厥功自髙昌既平之後唐之封域東西九千五百餘里南北一萬九百餘里為唐之極盛故嘗謂太宗之世於帝王懐柔之道雖不足而方之漢武致逺之功則有餘也貞觀十六年太宗謂侍臣曰北狄代為冦亂今延陀倔彊倔渠勿切延陀鐵勒諸部之姓倔彊不柔服也須早為之所朕熟思之惟有二䇿選徒十萬撃而虜之滌除兇醜百年無患此一䇿也若遂其來請與之為婚媾朕為蒼生父母茍可利之豈惜一女北狄風俗多由内政亦既生子則我外孫不侵中國斷可知矣以此而言邉境足得三十年來無事舉此二䇿何者為先司空房𤣥齡對曰遭隋室大亂之後戸口大半未復兵凶戰危聖人所慎和親之䇿實天下幸甚按通鑑即命兵部侍郎崔敦禮持節使薛延陀以新興公主妻之胡氏寅曰人各有偶天子之女非外夷所當偶昏世愚主則何較焉漢髙祖唐太宗不世出之英主而皆以外夷為子壻人君見有不及則藉羣臣而正之房公狃於漢故不知逺稽先王豈非可嘆之甚邪夫薛延陀之未服也無乃吾徳猶有所闕增修仁義而明其政刑来則接之不至不强也何必於服已乎此上䇿也舍而不用乃嫁女以結其心是為非䇿而太宗君臣正爾都俞不亦鄙歟愚按上古帝王之御四夷也服則懐之以徳叛則震之以威未聞與為婚姻也漢髙帝時冒頓數苦北邊髙帝從劉敬之請而結親唐武徳中突厥遣使請昏髙祖從裴矩之議而許昏然則和親之䇿漢髙帝啟之於漢唐髙祖啟之於唐皆非所以示子孫也劉敬固不必議裴矩亦毋足責房𤣥齡太宗之良相也乃曰兵戰聖人所慎和親實天下幸甚何不思之甚邪惟當勉其君曰兵戰則勞和親則辱皆不足以安百姓威四夷也君能行帝王之道以修其徳教明其政刑則中國安而邊圉固來賔率服自有不期然而然者矣嗚呼君行之而不以為恥臣亦不以為非惜哉貞觀十七年太宗謂侍臣曰盖蘇文弑其主而奪其國政誠不可忍今日國家兵力取之不難朕未能即動兵衆且令契丹靺鞨攪擾之何如令平聲契音乞靺音末鞨音曷契丹東胡種元魏時號契丹靺鞨居肅慎地凡數部有黒水部獨彊房𤣥齡對曰臣觀古之列國無不彊陵弱衆暴寡今陛下撫養蒼生將士勇鋭將去聲力有餘而不取之所謂止戈為武者也昔漢武帝屢伐匈奴隋主三征遼左人貧國敗實此之由惟陛下詳察太宗曰善按通鑑不載𤣥齡之辭止載長孫無忌曰盖蘇文自知罪大畏大國之討必嚴設守􅊀陛下姑為之隱忍彼得以自安必更驕惰愈肆其惡然後討之未晚也上曰善貞觀十八年太宗以髙麗莫離支賊殺其主殘虐其下議將討之諫議大夫褚遂良進曰陛下兵機神筭人莫能知昔隋末亂離克平寇難去聲及北狄侵邊西蕃失禮陛下欲命將撃之將去聲羣臣莫不苦諫唯陛下明略獨斷卒並誅夷卒子聿切今聞陛下將伐髙麗意皆熒惑然陛下神武英聲不比周隋之主兵若渡遼事須尅捷萬一不獲無以威示逺方必更發怒再動兵衆若至於此安危難測太宗然之按通鑑李勣又曰間者薛延陀入冦陛下欲發兵窮討魏徵諫而止使至今為患曏用陛下之䇿北鄙安矣上曰然此誠徵之失朕尋悔之而不欲言恐塞良謀故也上欲自征髙麗褚遂良上疏以為但命二三猛將四五萬衆仗陛下威靈取之如反掌耳今太子新立年尚㓜穉自餘藩屏陛下所知一旦棄金湯之全踰遼海之險以天下之君䡖行逺舉皆愚臣之所甚憂也時羣臣多諌者上皆不聼范氏祖禹曰髙麗臣屬於唐而其主為賊臣所弑為大國者不可不討然髙麗之大未如突厥其險逺不過於髙昌吐谷渾此三國者皆命將帥以偏師取之遂墟其國何獨至於髙麗而欲自征之乎太宗若從遂良之言雖伐而不克亦未失也朱氏黼曰自昔人主親睹亂敗者不勸而自懲深知禍咎者不戒而自戢煬帝伐遼之禍至於家夷國破身死而宗族屠盖太宗目睹曽莫之懲而反疾趍以襲其蹟何哉盖其心自謂吾之戰勝攻取國富民衆非隋敢望也乘平定四夷之餘力用諸將蕩平之餘威臨城一皷可以𠞰除意定志決雖傾朝盡諫不可復止矣唐氏仲友曰王魏既殁諫臣惟遂良爾而其識量不及魏徵李勣一折而遂良之諫不行勣武臣爾所見惟邉功奈天下計何魏徵在勣此言必不發就使有此言徵肯但已邪遂良以克為善則其言已不能無過矣胡不明夷夏之分申知足之戒以告帝曰髙麗小醜不犯邊吏今而討之勝之不武不勝為笑不亦善乎勣之指魏徵乃以杜遂良之再諫惜乎不抗疏而力陳之太宗之欲用兵也指魏徵之失其悔用師也興魏徵之思諌臣繋國之輕重如此論諫必若魏徵可也愚按貞觀十七年廷臣請增戍兵以逼髙麗太宗曰逺人不服則修文徳以来之未聞戍兵能威絶域者也斯言也帝王柔逺之道何以尚兹不數月而有討遼之議越明年而有親征之行不過為遼主雪怨為新羅報仇乃欲襲漢武隋煬之所為所存者小而所棄者大何言行之相反邪豈言之非艱而行之惟艱哉當時諫者多矣若𤣥齡之言以漢武隋煬為鑒戒誠保國之深規也無忌之言欲待其縱肆而後討亦保國之長䇿也遂良於下議之初固阻其意而親征之際復尼其行亦足少儆矣惜乎太宗意定志決而皆莫之從也若李勣沮遂良之諫以魏徵為非明致其君於不善之地此孟子所謂逢君之惡者其罪不亦大乎貞觀十九年太宗將親征髙麗開府儀同三司尉遲敬徳奏言車駕若自往遼左皇太子又監國監平聲定州東西二京府庫所在雖有鎮守終是空虛遼東路遙恐有𤣥感之變隋煬帝親征髙麗楊𤣥感遂起兵圍東都且邊隅小國不足親勞萬乗若克勝不足為武儻不勝翻為所笑伏請委之良將去聲自可應時摧滅太宗雖不從其諌而議者是之按通鑑上不從以敬徳為左一馬軍總管使從行愚按陳恒弑其君孔子沐浴請討古者臣弑其君子弑其父人皆得而誅之髙麗為唐之藩臣其君為莫離支所弑太宗舉兵討之其亦異乎煬帝無名之師矣但不當鑾輿自行耳尉遲敬徳請委之良將自可推滅其説是已然嘗論之髙麗以蕞爾小國四拒隋師五拒唐師非有謀臣良將能如是乎當時李靖嘗言莫離支自謂知兵故輕中國太宗亦嘗諷靖使伐髙麗靖欣然請行太宗不能從也異時無功而歸問於靖曰吾以天下之力屈於小夷何也靖曰兹事道宗知之盖指駐蹕之戰請分軍襲平壤之事也由此論之太宗若用李靖為帥其平髙麗必矣太宗不能用靖而用李勣為將勣違恵真延夀之言舍烏骨而不攻昧城有不攻之計守安市而不置卒之師老糧少無功而返由不用靖而用勣也禮部尚書江夏王道宗從太宗征髙麗詔道宗與李勣為前鋒及濟遼水尅盖牟城盖音盍今為盖州𨽻鎮東逢賊兵大至軍中僉欲深溝保險待太宗至徐進道宗議曰不可賊赴急逺來兵實疲頓恃衆輕我一戰可摧昔耿弇不以賊遺君父弇音揜耿弇漢光武將我既職在前軍當須清道以待輿駕李勣大然其議乃率驍勇數百騎直衝賊陣左右出入勣因合撃大破之太宗至深加賞勞去聲道宗在陣損足帝親為針灸音救賜以御膳按通鑑載此事甚詳辭多不録范氏祖禹曰太宗之伐髙麗非獨恃其四海之富兵力之彊也本其少時奮於布衣志氣英果百戰百勝以取天下治安既乆不能深思髙拱猶思所以逞志扼腕踴躍喜於用兵如馮婦搏虎不能自止非有禮義以養其心中和以養其氣始於勇敢終於勇敢而已矣記曰貴於勇敢彊有力者貴其敢行禮義也天下無事則用之於禮義天下有事則用之戰勝用之於戰勝則無敵用之於禮義則順治太宗於天下無事不知用之禮義而惟以戰勝為美也是故以天子之尊而較勝於逺夷一戰而克自以為功其器不亦小哉愚按漢耿弇之討張步也弇為飛矢所中光武時在魯知弇為步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以待上來弇曰乘輿且到臣子當撃牛釃酒以待百官反欲以賊虜遺君父邪乃出戰而破之此與道宗敗髙麗兵事正同盖臣子之義職當如是也若道宗者可謂能盡臣子之義而弇不得専美於漢矣太宗帝範曰貞觀二十二年正月太宗作帝範十二篇以賜太子曰君體建親求賢審官納諌去讒戒盈崇儉賞罰務農閲武崇文夫兵甲者夫音扶國家凶器也土地雖廣好戰則人凋好去聲中國雖安忘戰則人殆凋非保全之術殆非擬冦之方不可以全除不可以常用故農隙講武習威儀也三年治兵辨等列也是以勾踐軾蛙卒成霸業勾踐越王名越王既為吴所敗修徳治兵謀雪吴恥見蛙下車拜之左右怪問越王曰彼亦有氣者徐偃棄武終以䘮邦徐夷國子爵僣稱偃王周穆王聞之令楚伐徐徐子曰吾賴於文徳而不明武備故至於此何也越習其威徐忘其􅊀也孔子曰以不教人戰是謂棄之論語之辭故知弧矢之利以威天下易大傳曰弧矢之利以威天下此用兵之機也愚按書稱放牛歸馬詩言戢戈櫜弓甚矣兵非聖人之所尚也然嘗觀周公作周禮極言師帥旅帥卒長伍長之制詳陳振旅苃舍治兵大閲之儀至於斬牲徇陳凛乎如大敵之臨焉是兵亦非聖人之所廢也善乎太宗之言曰凋非保全之術殆非擬冦之方兵不可以全除亦不可以常用聖人復起不易斯言矣貞觀二十二年太宗將重討髙麗重平聲是時房𤣥齡寢疾増劇顧謂諸子曰當今天下清謐咸得其宜唯欲東討髙麗方為國害吾知而不言可謂衘恨入地遂上表諫曰臣聞兵惡不戢惡烏去聲後同武貴止戈當今聖化所覃無逺不暨上古所不臣者陛下皆能臣之所不制者皆能制之詳觀古今為中國患害無過突厥遂能坐運神䇿不下殿堂大小可汗相次束手分典禁衛執㦸行間行音杭後同其後延陀鴟張䲭惡鳥也尋就夷滅鐵勒慕義請置州縣沙漠已北萬里無塵至如髙昌叛渙於流沙吐渾首䑕於積石偏師薄伐俱從平蕩髙麗厯代逋誅莫能討撃陛下責其逆亂殺主虐人親總六軍問罪遼碣未經旬日即㧞遼東前後虜獲數十萬計分配諸州無處不滿雪徃代之宿耻隋文帝十八年髙麗冦遼西遣楊諒討之無功煬帝六年徵其王元入朝不至八年徵天下兵撃之帝親征攻諸城不下來䕶兒宇文述等大敗九年復親征不㧞十年復討之徵其王入朝竟不至掩崤陵之枯骨左傳僖公三十三年晉人及姜戎敗秦師於殽文公二年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還比功校徳萬倍前王此聖主所自知微臣安敢備説且陛下仁風被于率土孝徳彰於配天覩夷狄之將亡則指期數嵗授將帥之節度將帥之將去聲後同則決機萬里屈指而候驛視景而望書符應若神算無遺䇿擢將於行伍之中取士於凡庸之末逺夷單使去聲一見不忘小臣之名未嘗再問箭穿七札札甲也養由基射穿七札弓貫六鈞左傳定公八年魯伐齊士皆列顔髙之弓六鈞加以留情墳典屬意篇什屬音囑筆邁鍾張見師傅篇注詞窮賈馬漢賈誼司馬相如皆文人文鋒既振則宫徵自諧徵音止輕翰暫飛則花葩競發撫萬姓以慈遇羣臣以禮褒秋毫之善觧吞舟之網逆耳之諌必聽膚受之愬斯絶論語曰膚受之愬不行焉可謂明也已矣好生之徳好去聲禁障塞於江湖惡殺之仁息皷刀於屠肆鳬鶴荷稻粱之恵荷去聲犬馬䝉帷盖之恩降尊吮思摩之瘡貞觀十九年太宗征遼攻白巖城右衛大將軍李思摩為流矢所中太宗親為之吮血登堂臨魏徵之柩臨去聲十七年正月魏徵卒太宗臨哭之慟哭戰亡之卒則哀動六軍十九年太宗征髙麗至營州詔遼東戰亡士卒骸骨並集栁城東南命有司設太牢上自作文祭之臨哭盡哀負填道之薪則情感天地十九年太宗渡遼遼澤泥潦車馬不通命長孫無忌將萬人剪草填道水深處以車為梁上自繋薪於馬鞘以助役重黔黎之大命特盡心於庶獄臣心識昏憒豈足論聖功之深逺談天徳之髙大哉陛下兼衆美而有之靡不備具微臣深為陛下惜之重之愛之寶之周易曰知進而不知退知存而不知亡知得而不知䘮又曰知進退存亡而不失其正者其惟聖人乎易文言傳釋乾卦之辭由此言之進有退之義存有亡之機得有䘮之理老臣所以為陛下惜之者盖謂此也老子曰知足不辱知止不殆臣謂陛下威名功徳亦可足矣拓地開疆亦可止矣彼髙麗者邊夷賤𩔖不足待以仁義不可責以常理古來以魚鱉畜之宜從濶畧必欲絶其種𩔖深恐獸窮則搏且陛下每決死囚必令平聲三覆五奏進素食停音樂者盖以人命所重感動聖慈也況今兵士之徒無一罪戾無故驅之於戰陣之間委之於鋒刃之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望轊車而掩泣抱枯骨而摧心足變動隂陽感傷和氣實天下之寃痛也且兵凶器戰危事不得已而用之向使髙麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也乆長能為中國患而陛下除之可也有一於此雖日殺萬夫不足為媿今無此三條坐煩中國内為舊主雪怨為去聲後外為同十七年髙麗臣莫離支弑其君建武而獨専國政太宗於是有征遼之議外為新羅報讐十七年新羅遣使言百濟攻取其國四十餘城復與髙麗連兵謀絶新羅入朝之路乞兵救援上命司農丞相里𤣥奨齎璽書賜髙麗使勿攻新羅莫離支竟不從𤣥奬還具言其狀上於是欲征之豈非所存者小所損者大願陛下遵皇祖老子止足之誡以保萬代巍巍之名發霈然之恩降寛大之詔順陽春以布澤許髙麗以自新焚凌波之船罷應募之衆十八年太宗欲征遼東長安洛陽募士三千戰艦五百艘自然蕐夷慶賴逺肅邇安臣老病三公朝夕入地所恨竟無塵露微増海岳謹罄殘魂餘息豫代結草之誠左傳宣公十五年秦伐晉次於輔氏魏顆敗秦師獲杜回初魏武子有嬖妾無子武子疾命顆曰必嫁是疾甚則曰必殉及卒顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁之婦人父也爾用爾先人之治命余是以報儻䝉録此哀鳴即臣死骨不朽太宗見表歎曰此人危篤如此尚能憂我國家雖諌不從終為善策唐氏仲友曰易既濟六二與未濟九三均是伐鬼方均是三年之伐在既濟則戒之在未濟則勉之武功之未成聖人必勉之於始武功之既成聖人必戒之於終𤣥齡之書得既濟之象太宗莫之聽者無畏相之心耳朱氏黼曰𤣥齡於太宗左右未嘗有所可否毎逢帝怒惟震懼遜謝非不能諫也史稱王魏善諫諍房杜讓其直是以太宗初舉伐遼遂良再言之不聽至是再舉外庭無敢一言雖𤣥齡任用之乆相信之深亦不敢靣陳於在廷之日獨表諫於属纊僅存之際理切詞盡太宗嘉納不之從也至身沒而後罷之以此觀太宗晚節大畧可攷矣愚按𤣥齡此疏乃太宗征遼無功之後思謀再舉之時而𤣥齡行將属纊之日也此疏辭意懇切何乃不見於初親征之際耶豈太宗忿心難懲縱忠言苦口不足以尼其行耶毋乃俟其大舉無成夫然後諫耶然𤣥齡此疏切矣太宗止曰此人危篤尚能憂我國家亦未有樂從之意越明年則以疾而命皇儲聽政矣否則忿兵再舉事未可知也書曰無怠無荒四夷來王又曰明王慎徳四夷咸賔帝王保治厥有㫖哉以太宗之賢猶爾況其㳄者乎貞觀二十二年軍旅亟動宫室互興百姓頗有勞弊充容唐制女官號九嬪之一也徐氏名恵長城人生五月能言四嵗通騷經八嵗属文父孝徳嘗試使擬離為小山篇曰仰幽巖而流眄撫桂枝以凝想將千齡兮此遇荃何為兮獨徃太宗聞之召為才人手不釋卷文辭敏贍帝益禮顧永徽初卒贈賢妃上疏諌曰貞觀已來二十有餘載風調雨順年登嵗稔人無水旱之弊國無饑饉之灾昔漢武帝守文之常主猶登刻玉之符漢武帝封泰山下東方如郊祠太一之禮封廣丈二尺髙九尺其下則有玉牒書書秘禮畢禪肅然山齊桓公小國之庸君尚塗塗圖古通用泥金之望齊桓公既霸會諸侯於葵丘欲行封禪後漢制封禪用玉牒玉檢以水銀和之為泥望者望而祭也陛下推功損已讓徳不居億兆傾心猶闕告成之禮通典古者帝王之興每易姓而起以致太平必封乎泰山所以告成功也云亭佇謁未展升中之儀黄帝禪亭亭五帝禪云云皆山名禮云升中于天此之功徳足以咀嚼百王網羅千代者矣然古人有云雖休勿休良有以也守初保末聖哲罕兼是知業大者易驕易以豉切後同願陛下難之善始者難終願陛下易之竊見頃年以來力役兼總東有遼海之軍西有崑丘之役士馬疲於甲胄舟車倦於轉輸轉去聲且召募投戎去留懐死生之痛因風阻浪往來有漂溺之危一夫力耕年無數十之獲一船致損則傾覆數百之糧是猶運有盡之農功填無窮之巨浪圖未獲之他衆䘮已成之我軍雖除兇伐暴有國常規然黷武窮兵先哲所戒昔秦皇併吞六國反速危禍之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄徳輕邦圖利忘害肆情縱欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流仁此下疑闕四字減行役之煩増雨露之恵妾又聞為政之本貴在無為竊見土木之功不可兼遂北闕初建南營翠微曽未踰時玉蕐創制曽音層翠微玉蕐並宫名非惟構架之勞頗有工力之貴雖復茅􅗔示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宫菲室聖王之所安金屋瑶臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身樂音洛願陛下使之以時則力不竭矣用而息之則心斯悦矣夫珍玩技巧為䘮國之斧斤夫音扶後同珠玉錦繡實迷心之酖毒竊見服玩鮮靡如變化於自然職貢竒珍若神仙之所製雖馳蕐於季俗實敗素於淳風是知漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡紂始為象箸箕子曰彼為象箸必將為犀玉之杯方騐侈麗之源不可不遏夫作法於儉猶恐其奢作法於奢何以制後伏惟陛下明照未形智周無際窮奥祕於麟閣漢宣帝圖功臣於麒麟閣盡探賾於儒林探平聲賾土革切千王理亂之蹤百代安危之迹興亡衰亂之數得失成敗之機固亦包吞心府之中循環目圍之内乃宸衷乆察無假一二言焉惟知之非難行之不易志驕於業著體逸於時安伏願抑志摧心慎終成始削輕過以添重徳擇今是以替前非則鴻名與日月無窮盛業與乾坤永㤗太宗甚善其言特加優賜甚厚愚按人臣進諫於君古人擬之批鱗雖士夫猶以為難況婦人女子乎其見之史傳則鄧㬅論莫敖之敗成風請須句之封班姬辭共輦之載劉氏救元達之刑寥寥千載不多見也太宗納諫之徳冠絶古今外之房杜王魏内之文徳皇后亦足以交修而夹輔之矣宫妾之中復有如徐氏者焉觀其諫疏有老師宿儒不能逺過者嗚呼賢哉安邊第三十六凡二章貞觀四年李靖撃突厥頡利敗之其部落多來歸降者降下江切後同詔議安邊之䇿中書令温彦博議請於河南處之處上聲後同準漢建武時置降匈奴於五原塞下塞音賽後同五原塞今為豐州𨽻河東全其部落得為捍蔽又不離其土俗因而撫之一則實空虛之地二則示無猜之心是含育之道也太宗從之秘書監魏徵曰匈奴自古至今未有如斯之破敗此是上天勦絶宗廟神武且其世冦中國萬姓寃讐陛下以其為降不能誅滅即宜遣發河北今山東道居其舊土匈奴人靣獸心非我族𩔖强必冦盜弱則卑伏不顧恩義其天性也秦漢患之者若是故時發猛將以撃之將去聲收其河南以為郡縣陛下奈何以内地居之且今降者幾至十萬數年之後滋息過倍居我肘腋甫邇王畿心腹之疾將為後患尤不可處以河南也温彦博曰天子之於萬物也天覆地載有歸我者則必養之今突厥破除餘落歸附陛下不加憐愍棄而不納非天地之道阻四夷之意臣愚甚為不可宜處之河南所謂死而生之亡而存之懐我厚恩終無叛逆魏徵曰晉代有魏時胡部落分居近郡江統勸逐出塞外武帝不用其言數年之後遂傾瀍洛江統字應元陳留人晉武帝時為山隂令時闗隴為氐𦍑所擾統深推四夷亂蕐宜杜其萌乃作徙戎論帝不能用未及十年而夷狄亂蕐時人服其深識前代覆車殷鑒不逺陛下必用彦博言遣居河南所謂養獸自遺患也彦博又曰臣聞聖人之道無所不通突厥餘魂以命歸我收居内地教以禮法選其酋首酋慈由切後同遣居宿衛畏威懐徳何患之有且光武居河南單于於内郡單音蟬以為漢藩翰終於一代不有叛逆又曰隋文帝勞兵馬費倉庫樹立可汗令復其國令平聲後同後孤恩失信圍煬帝於鴈門隋開皇二十年文帝以突厥突利為啟民可汗妻以義成公主大業十一年煬帝廵北邊始畢可汗帥騎數十萬謀襲帝義成公主遣使告變帝馳入鴈門突厥圍鴈門急攻之帝泣目盡腫後公主以計觧圍今陛下仁厚從其所欲河南河北任情居住各有酋長音掌不相統属力散勢分安能為害給事中杜楚客如晦弟也少尚竒節初建成難作遁舍嵩山貞觀四年召為給事中太宗曰人不恤無官患才不副而兄與我共支一心者爾當如兄事我進蒲州刺史有能名遷工部尚書攝府事以威肅聞進曰北狄人靣獸心難以徳懐易以威服易以豉切今令其部落散處河南逼近中蕐久必為患至如鴈門之役雖是突厥背恩背音倍自由隋主無道中國以之喪亂豈得云興復亡國以致此禍夷不亂蕐前哲明訓存亡繼絶列聖通規臣恐事不師古難以長乆太宗嘉其言方務懐柔未之從也卒用彦博䇿卒子聿切自幽州至靈州東至幽州西至靈州也置順祐化長四州都督府以處之其人居長安者近且萬家自突厥頡利破後諸部落首領來降者皆拜將軍中郎將布列朝廷郎將之將去聲五品已上百餘人殆與朝士相半唯拓㧞不至拓他各切拔蒲末切夷複姓又遣招慰之使者相望於道使去聲涼州都督李大亮以為於事無益徒費中國上疏曰臣聞欲綏逺者必先安近中國百姓天下根本四夷之人猶於枝葉擾其根本以厚枝葉而求乂安未之有也自古明王化中國以信馭夷狄以權故春秋云戎狄豺狼不可厭也諸夏親眤不可棄也左傳閔公元年管仲告齊侯之辭自陛下君臨區宇深根固本人逸兵强九州殷富四夷自服今者招致突厥雖入提封臣愚稍覺勞費未悟其有益也然河西民庶鎮禦藩夷州縣蕭條户口鮮少鮮上聲加因隋亂減耗尤多突厥未平之前尚不安業匈奴微弱以來始就農畝若即勞役恐致妨損以臣愚惑請停招慰且謂之荒服者故臣而不納是以周室愛民攘狄竟延八百之齡秦王輕戰事胡故四十載而絶滅漢文養兵靜守天下安豐孝武揚威逺畧海内虛耗雖悔輪臺追已不及漢武帝既悔逺征伐而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東有溉田五千頃以上請置校尉分䕶嵗收其利以威西國上不從乃下詔深陳既往之悔至于隋室早得伊吾兼統鄯善伊吾鄯善並西域國名伊吾在大磧外南至玉門闗八百里漢宜禾都尉所治且既得之後勞費日甚虛内致外竟損無益逺尋秦漢近觀隋室動靜安危昭然􅊀矣伊吾雖已臣附逺在藩磧民非夏人地多沙鹵其自竪立稱藩附庸者請覊縻受之使居塞外必畏威懐徳永為藩臣盖行虛恵而收實福矣近日突厥傾國入朝既不能俘之江淮以變其俗乃置於内地去京不逺雖則寛仁之義亦非乆安之計也毎見一人初降賜物五疋袍一領酋長悉授大官禄厚位尊理多糜費以中國之租賦供積惡之㐫虜其衆益多非中國之利也太宗不納十三年太宗幸九成宫突厥可汗弟中郎將阿史那結社率隂結所部將去聲阿史那突厥姓名結社率突利可汗之弟時為中郎將并擁突利子賀羅鶻夜犯御營事敗皆捕斬之太宗自是不直突厥悔處其部衆於中國還其舊部於河北建牙於故定襄城立李思摩為乙彌泥熟俟利苾可汗以主之因謂侍臣曰中國百姓實天下之根本四夷之人乃同枝葉擾其根本以厚枝葉而求久安未之有也初不納魏徵言遂覺勞費日甚幾失久安之道幾平聲舊本李大亮疏以下至太宗不納另為一章十三年以下接前叚為一章今按其是一事因次第其辭合為一章又按通鑑載此事衆議甚詳辭多不録胡氏寅曰獻言之道惟理是憑則言必忠聽言之道勿以同於己言為是則聽必審太宗處降突厥徧詢在廷未若魏徵之言盡善也而太宗不從顧用温彦博之䇿何也彦博之策太宗之所欲為者其偶同歟未可知也其先意承志歟未可知也如所見偶同則不應言之再三如先意承志則不得為忠矣太宗用其言未幾有矢及帳殿之變如此而欲功加外荒冠帶百蠻者非聖主之盛節也又曰魏公嘗勸用侯君集為宰相君集反太宗疑徵黨之絶昏仆碑温彦博勸居突厥塞内突厥反太宗不怒彦博而追思魏徵之言事同而處之異何也以見留突厥塞内使充宿衛如一家者本太宗雄夸之心彦博探其微贊之故不以歸咎歟雖然行宫入幕之變亦巳危矣太宗慕􅃣帶百蠻之名推心不疑幾至危殆豈非後世之永戒哉唐氏仲友曰荀卿言以徳兼人者王以富兼人者貧突厥既破頡利既擒若用魏公之言使處河北於邊無擾於國無費不亦善乎乃卒用彦博之䇿若不因結社之亂悉徙故地假之數世蕃孳為唐之費不亦重乎大抵處置降人最難内之中國亂蕐俗置諸塞内生後患惟反之故地為立君長從其故俗服則為藩國去不為叛臣此長䇿也愚按昔成周盛時四夷来朝坐之國門之外葢亦如九服之制蠻夷鎮藩在所外也春秋之世秦晉遷陸渾之戎于伊川其後揚拒泉臯伊雒之戎入王城伐京師雖子帶之所召亦始遷之失也晉江統之論可以為鑑矣唐興太宗以武定天下天下既平窮荒悉服突厥之委命闕庭尤漢以下之所無者固宜置之中夏夸示逺近也當是時魏徴以忠直得上心屢有回天之力而竟莫之回温彦博以儒臣遇合處置部落之議胡為乎獨異衆正之見邪遂使蕃酋列在禁衛有因而入居長安者近萬家此與陸渾之居伊雒何以異哉彼為成周之衰時此為有唐之盛際太宗樂於從魏徵之言者胡獨於此而不從之乎他日禄山之亂宫闈豈非太宗詒謀有以啟之貞觀十四年侯君集平髙昌之後太宗欲以其地為州縣魏徵曰陛下初臨天下髙昌王先来朝謁自後數有商胡數音朔稱其遏絶貢獻加之不禮大國詔使去聲遂使王誅載加若罪止文泰髙昌王姓麴名文泰斯亦可矣未若因撫其民而立其子所謂伐罪弔民威徳被於遐外為國之善者也今若利其土壤以為州縣常須千餘人鎮守數年一易每来往交替死者十有三四遣辦衣資離别親戚十年之後隴右空虛陛下終不得髙昌撮榖尺布以助中國所謂散有用而事無用臣未見其可太宗不從竟以其地置西州仍以西州為安西都䕶府每嵗調發千餘人調去聲防遏其地黄門侍郎褚遂良亦以為不可上疏曰臣聞古者哲后臨朝明王創業必先蕐夏而後夷狄廣諸徳化不事遐荒是以周宣薄伐至境而反周宣王名靖詩曰薄伐獫狁至于太原言逐出之而不窮追也始皇逺塞中國分離秦始皇使䝉恬發兵三十萬人收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里陛下誅滅髙昌威加西域收其鯨鯢以為州縣然則王師初發之嵗河西供役之年供平聲飛芻輓粟十室九空數郡蕭然五年不復陛下每嵗遣千餘人而逺事屯戍終年離别萬里思歸去者資裝自須營辦既賣菽粟傾其機杼經途死亡復在方外兼遣罪人增其防遏所遣之内復有逃亡官司捕捉為國生事為去聲髙昌塗路沙磧千里冬風氷冽夏風如焚行人遇之多死易云安不忘危理不忘亂設令平聲張掖塵飛酒泉烽舉張掖今為甘州路酒泉今為肅州路𨽻丼肅陛下豈能得髙昌一人菽粟而及事乎終須發隴右諸州星馳電擊由斯而言此河西者方於心腹彼髙昌者他人手足豈得糜費中華以事無用陛下平頡利於沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺萌更樹君長音掌復立髙昌非無前例此所謂有罪而誅之既服而存之宜擇髙昌可立者徵給首領遣還本國負戴洪恩長為藩翰中國不擾既富且寧傳之子孫以貽後代疏奏不納至十六年西突厥遣兵寇西州太宗謂侍臣曰朕聞西州有警急雖不足為害然豈能無憂乎往者初平髙昌魏徵褚遂良勸朕立麴文泰子弟依舊為國朕竟不用其計今日方自悔責昔漢髙祖遭平城之圍而賞婁敬漢髙帝欲擊匈奴使婁敬使匈奴還報曰匈奴伏竒兵以爭利不可擊也上怒曰齊虜以口舌得官迺今妄言沮吾軍械繫敬至廣武遂至平城匈奴果出竒兵圍帝白登七日然後得解還至廣武赦敬曰吾不用公言以困平城迺封敬千户為闗内侯袁紹敗於官渡而誅田豐漢獻帝時曹操兵大破袁紹於官渡紹與八百騎渡河走至黎陽衆稍復歸或謂田豐曰君必見重豐曰公今戰敗而歸内恚將發吾不望生紹謂逢紀曰田别駕前諫止吾吾慙之紀曰豐聞將軍之退拊手大笑喜其言之中也袁紹遂殺豐朕恒以此二事為誡寧得忘所言者乎范氏祖禹曰魏徴之言其利害非不明也以太宗之智豈不足知之惟其好大而喜逺矜功而徇名不能以義制心故忠言有所不從而欲前世帝王皆莫我若也又曰有國者喪師之禍小而或以覇秦穆公勾踐是也得地之禍大而或以亡楚靈王齊湣王是也是故廣地不若廣徳彊兵不若彊民先王患徳之不足而不患地之不廣患民之不安不患兵之不彊封域之外聲教所不及者不以煩中國也太宗不從忠諫卒自咎悔况不若太宗之彊而可為乎胡氏寅曰中國禮義之地四夷所為視效而賔服者也髙昌有罪王師討之既聞其喪是罪人已死則宜按兵遣使立其嗣子懷以恩信乃不攻而自服之道也今乃伐其憂荒無禮無義夫豈天子之兵乎是故以利言之乗人之隙廹以强暴坐收數百里之地斥廣輿圖信足以夸耀一時以義言之則窮兵逺討以髙昌王一人桀驁之故而係累其孤郡縣其土仁者不為也真氏徳秀曰是時褚遂良亦諫不從十七年西突厥入寇帝悔之曰魏徴褚遂良勸我復立髙昌吾不用其言今方自咎耳初議處突厥於河南徴爭之而帝不從後以結社率之變而悔後議以髙昌為郡縣徵爭之而帝復不從又以西突厥入寇而悔使早從忠言安有是哉然知過而能悔此其所以興也愚按自夏禹西戎即敘之後成周西旅底貢之餘通西域而開玉闗極城郭諸國悉服實始於漢武然中國勞弊亦已甚矣閉玊闗謝西域此光武所以為盛徳也太宗滅髙昌置都䕶由是為開通西域之計而燕支疎勒丘兹于闐四鎮遂為遐陬重地至于開元自玊門以西烟火萬里為唐極盛曾幾何時天寶以後事勢日非前日之輿圖舉為戎馬之郊矣周公有言曰徳不加焉則君子不饗其質政不施焉則君子不臣其人況奪其土地而置以郡縣乎務廣地不如務廣徳古訓豈虚語哉貞觀政要卷九欽定四庫全書貞觀政要卷十唐吳兢撰元戈直集論行幸第三十七凡四章貞觀初太宗謂侍臣曰隋煬帝廣造宫室以肆行幸自西京至東都離宫别館相望道次乃至并州涿郡今涿州路𨽻腹裏無不悉然馳道皆廣數百步種樹以飾其傍人力不堪相聚為賊逮至末年尺土一人非復已有以此觀之廣宫室好行幸好去聲竟有何益此皆朕耳所聞目所見深以自誡故不敢輕用人力惟令平聲百姓安靜不有怨叛而已貞觀十一年太宗幸洛陽宫泛舟于積翠池顧謂侍臣曰此宫觀臺沼觀去聲並煬帝所為所謂驅役生人窮此雕麗復不能守此一都以萬人為慮好行幸不息好去聲人所不堪昔詩人云何艸不黄何日不行詩大雅何艸不黄篇之辭小東大東杼軸其空詩小雅大東篇之辭正謂此也遂使天下怨叛身死國滅今其宫苑盡為我有隋氏傾覆者豈惟其君無道亦由股肱無良如宇文述虞世基裴蘊之徒皆隋之臣居髙官食厚禄受人委任惟行謟佞蔽塞聰明欲令其國無危令平聲不可得也司空長孫無忌奏言隋氏之亡其君則杜塞忠讜之言臣則茍欲自全左右有過初不紏舉冦盜滋蔓亦不實陳㨿此即不惟天道實由君臣不相匡弼太宗曰朕與卿等承其餘弊惟須𢎞道移風使萬世永賴矣貞觀十三年太宗謂魏徵等曰隋煬帝承文帝餘業海内殷阜若能常處闗中處上聲豈有傾敗遂不顧百姓行幸無期徑往江都不納董純崔象皆隋之臣等諫諍身戮國滅為天下笑雖復帝祚長短委以𤣥天而福善禍淫亦由人事朕每思之若欲君臣長乆國無危敗君有違失臣須極言朕聞卿等規諫縱不能當時即從再三思審必擇善而用之貞觀十二年太宗東巡狩將入洛次於顯仁宫宫苑官司多被責罰侍中魏徵進言曰陛下今幸洛州為是舊征行處為去聲後為其同庶其安定故欲加恩故老城郭之民未䝉徳恵官司苑監多及罪辜或以供奉之物不精供平聲又以不為獻食此則不思止足志在奢靡既乖行幸本心何以副百姓所望隋主先命在下多作獻食獻食不多則有威罰上之所好去聲下必有甚競為無限遂至滅亡此非載籍所聞陛下目所親見為其無道故天命陛下代之當戰戰慄慄每事省約叅蹤前列昭訓子孫奈何今日欲在人之下陛下若以為足今日不啻足矣啻音翅若以為不足萬倍於此亦不足也太宗大驚曰非公朕不聞此言自今已後庶幾無如此事幾平聲按通鑑係十一年上至顯仁宫宫吏以闕儲偫有被譴責魏徵諫曰云云上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舎而宿今供頓如此豈得猶嫌不足乎范氏祖禹曰富而不忘貧則能保其富矣貴而不忘賤則能保其貴矣夫以萬乘之貴四海之富而猶以為不足何哉忘其始之賤貧而欲大無窮也是以髙宗舊勞于外爰暨小人及其即位卒為賢君文王卑服即康功田功周公作書以戒成王恐其不知稼穡之艱難而驕逸也漢文有曰朕能任衣􅃣念不至此是以恭儉愛民惟恐煩之嗚呼其可謂有徳者矣若太宗聞諫而能自省不亦賢乎又曰太宗可謂不忘戒矣覩隋之宫室而以謟諛掩蔽戒羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王之所由興也愚按有虞之制五載一巡守成周之盛六年一時巡肆覲羣后大明黜陟協時月正日同律度量衡無非事也其車從至為簡省其供給至為儉約故民以其所行為幸所不行為不幸所謂吾王不遊吾何以休是也後世楊廣朱溫巡遊不息始務豐侈其飲食美麗其行宫以供給過制為賢能以置頓不備為罷軟州縣承風競為勞費於是百姓聞車馬之音見羽旄之美舉疾首蹙額而相告矣太宗親睹煬帝之禍猶以供奉不精多所責罰况其餘者乎夫古之巡幸所以徇民後之巡幸所以徇已人君欲復虞周巡守之制茍不先省其車從之數約其供給之儀未有不蹈隋梁之失者也畋獵第三十八凡五章秘書監虞世南以太宗頗好畋獵好去聲上疏諫曰臣聞秋獮冬狩盖惟恒典獮音蘚周禮大司馬仲秋教治兵以獮田致禽以祀祊仲冬教大閱以狩田致禽以享烝射隼從禽備乎前誥射食亦切隼荀尹切禽也伏惟陛下因聽覽之餘辰順天道以殺伐將欲摧斑碎掌親御皮軒田獵之車也窮猛獸之窟穴盡逸材之林藪夷兇翦暴以衞黎元收革擢羽用充軍器舉旗効獲武遵前古然黄屋之尊金輿之貴八方之所仰徳萬國之所繫心清道而行猶戒衘橜斯盖重慎防㣲為社稷也為去聲是以馬卿直諫於前司馬相如字長卿漢武帝時為郎嘗從帝獵長楊帝好自擊熊豕馳逐野獸相如上疏諫帝從之張昭變色於後張昭字子布彭城人為吳主孫權軍師權嘗乗馬射虎昭變色而諫之臣誠細㣲敢忘斯義且天弧星罼音畢網也所殪已多殪音翳殺死也頒禽賜獲皇恩亦溥伏願時息獵車且韜長㦸不拒芻蕘之請降納㳙澮之流袒裼徒搏任之羣下則貽範百王永光萬代太宗深嘉其言愚按傳曰春蒐夏苗秋獮冬狩皆於農隙以講武也王制天子無事則嵗三田周禮大閱之制獨為詳備則畋獵固古禮也何外作禽荒見於大禹之訓而不敢盤于遊田乃為文王之徳正以畋獵雖古制有因是而勞師耀武妨農害民者矣況後世萬乗之動供給之繁徵求之夥乎太宗身親行陣尅㨗奏功其於遊獵固其好尚必有不遵制而病民者宜世南懇切之諫有以動上之聽矣谷那律魏州昌樂人貞觀中累遷國子博士後遷諫議大夫淹識羣書禇遂良稱為九經庫為諫議大夫嘗從太宗出獵在途遇雨太宗問曰油衣若為得不漏對曰能以瓦為之必不漏矣意欲太宗弗數遊獵數音朔大被嘉納賜帛五十叚加以金帶按通鑑此事係在髙宗永徽元年九月癸亥與此異而新舊唐書則同唐氏仲友曰谷那律淹識羣書禇遂良嘗稱為九經庫油衣瓦為不漏之對可見質直盖淹識之士難乎質直故三益之友得一己善而况兼之者乎愚按家語記孔子之言曰忠臣之諫君有五義焉其五曰諷諫惟度主以行之吾從其諷諫乎夫所以諷諫者假他事引援而諫者也谷那律以儒學之臣居諫議之職以瓦為衣之對雖過於質直其諷諫之謂乎太宗恱其直而賞賚之是亦從諫之美也貞觀十一年太宗謂侍臣曰朕昨往懐州今懐慶路𨽻腹裏有上封事者云何為恒差山東衆丁於苑内營造即日徭役似不下隋時懐洛以東殘人不堪其命而田獵猶數音朔驕逸之主也今者復来懐州田獵忠諫不復至洛陽矣復音缶四時蒐田蒐音捜春曰蒐夏曰苗秋曰獮冬曰狩既是帝王常禮今日懐州秋毫不干於百姓凡上書諫正自有常準臣貴有詞主貴能改如斯詆毁有似呪詛侍中魏徵奏稱國家開直言之路所以上封事者尤多陛下親自披閱或冀臣言可取所以僥倖之士得肆其醜臣諫其君甚須折𠂻從容諷諫從即容切漢元帝名奭嘗以酎祭宗廟酎音紂三重釀酒也味厚故以薦宗廟出便門御樓船御史大夫薛廣徳字長卿沛郡人當乗輿免冠曰宜從橋陛下不聽臣言臣自刎以頸血汙車輪汗去聲陛下不入廟矣元帝不悦光禄卿張猛進曰臣聞主聖臣直乗船危乘去聲後同就橋安聖主不乗危廣徳言可聽元帝曰曉人不當如是耶乃從橋以此而言張猛可謂直臣諫君也太宗大悅愚按魏徵不取廣徳之直言而取張猛之直諫不過順太宗之意而言耳盖嘗聞先儒之言曰諫者之委曲君徳未信於人也諫者之剴切君徳已信於人也其遜其忤言者之得失則二在人主為進徳之驗則一而已由此觀之諫書詆毁有似詛咒此正太宗君徳信於人之驗也若以張猛之諷諌為是則是以漢元之皆庸期太宗耳豈責難之道乎貞觀十四年太宗幸同州今仍舊𨽻陜西沙苑親格猛獸復晨出夜還音旋後同特進魏徵奏言臣聞書美文王不敢盤于遊田周書曰文王不敢盤于遊田以庶邦惟正之供傳述虞箴稱夷羿以為戒傳去聲左傳魏綘告晉侯曰昔虞人之箴曰在帝夷羿冒于原獸虞箴如是可不懲乎昔漢文臨峻坂欲馳下袁盎楚人漢文帝時為中郎將攬轡曰聖主不乗危乗平聲不徼幸今陛下騁六飛馬名馳不測之山如有馬驚車敗陛下縱欲自輕奈髙廟何文帝從覇陵上欲西馳下峻坂袁盎諫帝曰將軍怯邪盎曰臣聞千金之子不垂堂百金之子不倚衡云云帝乃止孝武好格猛獸好去聲後同相如進諫力稱烏獲秦武王力士舉龍文鼎者㨗言慶忌吳王僚之子走能㨗矢人誠有之獸亦宜然猝遇逸材之獸駭不存之地雖烏獲逄䝉之伎逄音龐逄䝉古之善射者不得用而枯木朽株盡為難矣雖萬全而無患然而本非天子所宜事見首章注孝元帝郊泰畤郊祀之壇曰畤因留射獵薛廣徳字長卿沛郡人時為長信少府御史大夫稱竊見闗東困極百姓離災今日撞亡秦之鐘歌鄭衞之樂士卒暴露從官勞倦從去聲欲安宗廟社稷何慿河暴虎未之戒也臣竊思此數帝心豈木石獨不好馳騁之樂音洛後同而割情屈己從臣下之言者志存為國為去聲後同不為身也臣伏聞車駕近出親格猛獸晨往夜還以萬乗之尊闇行荒野踐深林涉豐艸甚非萬全之計願陛下割私情之娛罷格獸之樂上為宗廟社稷下慰羣寮兆庶太宗曰昨日之事偶屬塵昏非故然也自今深用為誡愚按魏徵諫獵之辭援古監今惓惓忠篤比虞世南奏疏尤為懇至切到足以儆動其君之聽塵昏之語太宗烏得不為之感悟哉若魏徴者可謂能引君於道矣貞觀十四年冬十月太宗將幸櫟陽櫟音藥櫟陽今為咸寧縣屬奉元路遊畋縣丞劉仁軌字正則汴州人初為陳倉尉部人魯寧為折衝都尉豪縱犯法縣莫敢屈仁軌榜殺之太宗召詰責仁軌曰寧辱臣臣故殺之帝以為剛直擢咸陽丞累遷給事中武后時拜僕射以收穫未畢非人君順動之時詣行所上表切諫太宗遂罷獵擢拜仁軌新安令新安縣名今仍舊𨽻河南府路諫按史傳太宗校獵同州仁軌曰今兹澍澤霑足百榖熾茂收纔十二常日贅調己有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使場圃畢勞陛下六飛徐驅公私交泰上璽書褒納拜新安令愚按劉仁軌一縣丞耳而能效一言之忠動萬乗之聽其忠君愛民之心有侍從之臣所未能者可不謂難乎哉盖仁軌嘗為陳倉尉太宗以其剛直擢咸陽丞則其受知於太宗有由来矣然非太宗有從諌之美樂善之誠則仁軌雖有剛直之操將安所施哉適足以獲罪而已矣仁軌官由州縣而致宰相善致聲譽得吏民懽心為史傳所稱美出宰百里者可不知所效法邪災祥第三十九凡四章貞觀六年太宗謂侍臣曰朕比見衆議比音鼻以祥瑞為美事頻有表賀慶如朕本心但使天下太平家給人足雖無祥瑞亦可比徳於堯舜若百姓不足夷狄内侵縱有芝艸徧街衢鳳凰巢苑囿亦何異於桀紂嘗聞石勒時石勒上黨匈奴人晉元帝時據襄國稱帝是為後趙有郡吏燃連理木煑白雉肉喫豈得稱為明主耶又隋文帝深愛祥瑞遣秘書監王劭著衣冠在朝堂對考使去聲焚香讀皇隋感瑞經隋文帝好禨祥小數王劭言上受命符瑞甚衆又採歌謡圖䜟佛經文字曲加誣飾撰皇隋靈感志三十卷上令宣示天下劭集諸州朝集使盥手焚香閉目讀之曲折有聲如歌詠經旬朔始徧上益喜賞賜優洽舊嘗見傳說此事實以為可笑夫為人君夫音扶當須至公理天下以得萬姓之懽心若堯舜在上百姓敬之如天地愛之如父母動作興事人皆樂之樂音洛發號施令施平聲人皆恱之此是大祥瑞也自此後諸州所有祥瑞並不用申奏按通鑑係貞觀二年又曰嘗有白鵲搆巢於寢殿槐上合歡如腰鼓左右稱賀上曰我嘗笑隋煬帝好祥瑞瑞在得賢此何足賀命毁其巢於野外愚按聖人之作春秋也祥瑞不書惟災異書豈無意哉夫春秋二百四十二年之間豈無祥瑞而不書而有年大有年之書兩見於經盖聖人特筆也太宗以聰明之資克勤于政不以祥瑞為祥瑞而以堯舜之政化為大祥瑞豈無見而然哉嘗觀文公朱子通鑑綱目貞觀一代皆不見祥瑞之書惟貞觀四年以大有年書録其外户不閉家給人足斗米三錢之美斯祥瑞之大者歟然則太宗之為此言也非茍言之實允蹈之矣貞觀八年隴右山崩大蛇屢見音現後同山東及江淮多大水太宗以問侍臣秘書監虞世南對曰春秋時梁山崩梁山晉地晉侯召伯宗而問焉晉侯景公名孺伯宗晉大夫對曰國主山川故山崩川竭君為之不舉樂降服乗縵乗平聲縵音漫謂乗車之無飾文者祝幣以禮焉梁山晉所主也晉侯從之故得無害事見左傳成公五年漢文帝元年齊楚地二十九山同日崩水大出令郡國無来獻令平聲施恵於天下施平聲逺近歡洽亦不為災後漢靈帝時青蛇見御座晉恵帝時大蛇長三百步見齊地經市入朝按蛇宜在艸野而入市朝所以為恠耳今蛇見山澤盖深山大澤必有龍蛇亦不足恠又山東之雨雖則其常然陰潛過久恐有寃獄宜斷省繫囚庶或當天意且妖不勝徳修徳可以銷變太宗以為然因遣使者使去聲賑恤飢餒申理寃訟多所原宥貞觀八年有彗星見于南方彗徐醉切見音現後同彗星妖星也其狀如箒長六丈一作六尺經百餘日乃滅太宗謂侍臣曰天見彗星由朕之不徳政有虧失是何妖也虞世南對曰昔齊景公名杵臼時彗星見公問晏子晏嬰也晏子對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星為公戒耳景公懼而修徳後十六日而星没十六一作十三陛下若徳政不修雖麟鳳數見數音朔終是無益但使朝無闕政百姓安樂音洛雖有災變何損於徳願陛下勿以功髙古人而自矜大勿以太平漸久而自驕逸若能終始如一彗見未足為憂太宗曰吾之理國良無景公之過但朕年十八便為經綸王業便為之為去聲後同北剪劉武周西平薛舉東擒竇建徳王世充二十四而天下定二十九而居大位四夷降伏降音杭海内乂安自謂古来英雄撥亂之主無見及者頗有自矜之意此吾之過也上天見變良為是乎秦始皇平六國隋煬帝富有四海既驕且逸一朝而敗吾亦何得自驕也言念於此不覺惕焉震懼魏徵進曰臣聞自古帝王未有無災變者但能修徳災變自銷陛下因有天變遂能戒懼反覆思量平聲深自尅責雖有此變必不為災也唐氏仲友曰世南對山壊蛇見大水恐有寃獄枉繫亦未足以應天變矣詩曰維虺維蛇女子之祥唐之女禍其兆先見於此世南名博學非不知此顧太宗無女寵之溺無迹可言然獨不能援詩以為説取證於漢靈晉恵乎乃曰蛇見山澤適其所居以世南之忠直無以發太宗儆懼之意惜哉又曰世南論彗星戒驕矜此最中太宗之病較諸省録纍囚之論大小殊矣愚按昔劉向五行傳某事失則某咎徵應說者以為鑿春秋所書災異傳者亦推迹未来之事應之說者以為拘且妖由人興天事恒象人君惟當恐懼修省以銷其變固難盡信滛巫瞽史之所推測也夫蛇虺固女子之祥也春秋之世晉有蛇自泉宫出鄭則内蛇與外蛇鬪於門之外固不見為女禍也唐髙宗昏惑溺愛遂啟女后專政卒應大蛇之妖彗所以除舊布新也春秋之世魯有星孛齊有彗星固不見有所除布也唐武后肆其凶毒幾易唐祚卒應彗星之異兹二者皆見於貞觀之八年極盛之時也天心仁愛儆戒之意早已見矣天人之際良可畏哉貞觀十一年大雨榖水溢衝洛城門入洛陽宫平地五尺毁宫寺十九所漂七百餘家太宗謂侍臣曰朕之不徳皇天降災將由視聽弗明刑罰失度遂使陰陽舛謬雨水乖常矜物罪已載懐憂惕朕又何情獨甘滋味可令尚食令平聲尚食掌御膳之官斷肉料進蔬食文武百官各上封事極言得失中書侍郎岑文本上封事曰臣聞開撥亂之業其功既難守已成之基其道不易以豉切故居安思危所以定其業也有始有卒子聿切所以崇其基也今雖億兆乂安方隅寧謐音宻既承喪亂之後又接凋弊之餘户口減損尚多田疇墾闢猶少覆燾之恩著矣而瘡痍未復徳教之風被矣而資産屢空去聲是以古人譬之種樹年祀綿逺則枝葉扶疎若種之日淺根本未固雖壅之以黑墳上聲暖之以春日一人揺之必致枯槁今之百姓頗𩔖於此常加含養則日就滋息暫有征役則隨日凋耗凋耗既甚則人不􅂓生人不􅂓生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道人叛之故可畏孔安國釋虞書之辭仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日慎一日者良為此也為去聲伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆在念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頤神養性省遊畋之娛去奢從儉去上聲減工役之費務静方内而不求闢土載櫜弓矢而不忘武備櫜音臯藏也凡此數者雖為國之恒道陛下之所常行臣之愚昧惟願陛下思而不怠則至道之美與三五比隆三五三皇五帝也億載之祚與天地長乆雖使桑榖為妖史記商亳有祥桑榖共生於朝一暮大拱帝大戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕歟帝其修徳大戊從之祥桑枯死而去龍蛇作孽五行傳曰皇之不極是為不建厥咎眊厥極弱時則有龍蛇之孽雉雊於鼎耳史記商紀武丁祭成湯明日有飛雉登鼎耳而呴武丁懼祖已曰王勿憂先修政事武丁從之殷道復興石言於晉地左傳昭公八年春石言於晉猶當轉禍為福變災為祥況雨水之患雨水一作水旱陰陽恒理豈可謂天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輙陳狂瞽伏待斧鉞太宗深納其言養當作食出文子愚按洚水儆予帝舜所以畏天省已也六事自責成湯所以反躬致戒也太宗之言雖未能一出於誠亦庶幾乎舜湯之遺意矣惜乎岑文本之論皆非所以戒其畏天憂民之心而勉其側身修行之實也其曰陰陽恒理豈繫聖心不幾於傲忽天戒乎豈君臣相儆之道哉慎終第四十凡七章貞觀五年太宗謂侍臣曰自古帝王亦不能常化假令内安令平聲必有外擾當今逺夷率服百榖豐稔盜賊不作内外寧静此非朕一人之力實由公等共相匡輔然安不忘危理不忘亂雖知今日無事亦須思其終始常得如此始是可貴也魏徵對曰自古已来元首股肱不能備具或時君稱聖臣即不賢或遇賢臣即無聖主今陛下聖明所以致理向若直有賢臣而君不思化亦無所益天下今雖太平臣等猶未以為喜惟願陛下居安思危孜孜不怠耳愚按昔帝舜之作歌曰股肱喜哉元首起哉百工􅳹哉臯陶乃賡載歌曰元首明哉股肱良哉庶亊康哉又歌曰元首叢脞哉股肱惰哉萬事隳哉釋者謂舜之意以人臣樂於趍事赴功則人君之治為之興起而百官之功皆廣也臯陶之意以為君明則臣良而衆事皆安所以勸之也君行臣職則臣下懈怠而萬事廢所以戒之也虞廷君臣之相與責難者如此雍􅳹之治所以為不可及也太宗之告侍臣謂當今太平非朕一人之力皆由公等共輔須思終始如一斯言也其帝舜作歌之意乎魏徵之對則曰陛下聖明所以致理若有賢臣而君不思化亦為無益是猶臯陶勸舜之意也又曰今雖太平臣未以為喜惟願陛下居安思危孜孜不怠亦猶臯陶戒舜之意也太宗能責難於其臣魏徵亦能責難於其君君臣之相責難者如此有唐虞之遺風焉是故有唐之治雖未能上躋時雍之美而貞觀之盛可謂三代而下之所罕見者矣貞觀六年太宗謂侍臣曰自古人君為善者多不能堅守其事漢髙祖泗上一亭長耳長音掌初能拯危誅暴以成帝業然更延十數年縱逸之敗亦不可保何以知之孝恵為嫡嗣之重溫恭仁孝而髙帝惑於愛姬之子欲行廢立見師傅篇注蕭何韓信功業既髙蕭既妄繫蕭何沛人漢丞相封鄼侯嘗為民請曰長安地陿上林中多空地願令民得入田髙祖怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫數日因王衞尉之言赦出之韓亦濫黜黜當作誅韓信淮陰人佐漢髙祖取天下封楚王有告信欲反髙祖乃詐遊雲夢縛信至洛陽赦為淮陰侯由此怨望後復有言信反於吕后者后今蕭何紿信入后使武士縛信斬之夷信三族自餘功臣黥布之輩懼而不安至於反逆黥布姓英名布嘗坐法黥漢髙祖封淮南王及韓信彭越之誅陰聚兵候伺警急中大夫賁赫詣長安告布反髙祖自將兵擊之遂殺布滅之君臣父子之間悖謬若此豈非難保之明驗也朕所以不敢恃天下之安每思危亡以自戒懼用保其終愚按太宗言漢祖創業之君而廢嫡立庶濫誅功臣斯言誠是也太宗能保全功臣無濫誅之失過漢髙逺矣然不能正承乾之惡而於諸子之定分亦牽於愛而有不能自克者豈知人之明而自知之蔽耶貞觀九年太宗謂公卿曰朕端拱無為四夷咸服豈朕一人之所致實賴諸公之力耳當思善始令終永固鴻業子子孫孫逓相輔翼使豐功厚利施於来葉施平聲令數百年後令平聲讀我國史鴻勲茂業粲然可觀豈惟稱隆周炎漢及建武光武年號永平明帝年號故事而已哉房𤣥齡因進曰陛下撝挹之志推功羣下致理昇平本闗聖徳臣下何力之有惟願陛下有始有卒子聿切則天下永賴太宗又曰朕觀古先撥亂之主皆年踰四十惟光武年三十三但朕年十八便舉兵年二十四定天下年二十九昇為天子此則武勝於古也少從戎旅少去聲不暇讀書貞觀以来手不釋卷知風化之本見政理之源行之數年天下大理而風移俗變子孝臣忠此又文過於古也昔周秦已降戎狄内侵今戎狄稽顙皆為臣妾此又懐逺勝古也此三者朕何徳以堪之既有此功業何得不善始慎終耶愚按詩書所載聖君賢相之所以保治於雍熙泰和之時者固幸功業之克成未嘗以功業而自足也太宗謂欲使豐功厚利施於永久鴻勲盛業粲然可觀不使後世惟稱隆周炎漢志則髙矣然炎漢可企而及也隆周豈止於若是哉倬彼雲漢為章於天制之為禮樂布之為法度此文王之文也不知太宗之所謂文果能勝乎無兢維烈撫弱耆昧功成而載戢干戈載櫜弓矢此武王之武也不知太宗之所謂武果能勝乎大邦畏其力小邦懐其徳蕐夏蠻貊罔不率俾由是而恵此中國以綏四方此文武之懐逺也不知太宗之所謂懐逺又果能勝乎愚然後知太宗矜功伐善意出於中心而善始慎終之語不過虛言也𤣥齡於此能奬其所已至而不能勉其所未至惜哉若後章魏徵之對則善矣貞觀十二年太宗謂侍臣曰朕讀書見前王善事皆力行而不倦其所任用公輩數人誠以為賢然致理比於三五之代猶為不逮何也魏徵對白今四夷賔服天下無事誠曠古所未有然自古帝王初即位者皆欲勵精為政比迹於堯舜及其安樂也樂音洛則驕奢放逸莫能終其善人臣初見任用者皆欲匡主濟時追蹤於稷契音洩及其富貴也則思茍全官爵莫能盡其忠節若使君臣常無懈怠各保其終則天下無憂不理自可超邁前古也太宗曰誠如卿言愚按太宗致理不逮三五之言所以責難於其臣也魏徵之對曲盡人君放逸之端人臣懐禄之弊誠可為上下之箴盖人君固在於慎終如始而人臣尤當始終如一也嘗觀貞觀諸名臣乆於其位者雖於大節無所虧然於格非之道無聞焉毋乃以成功難居至理無盡姑保其福禄榮名歟恥君不及堯舜者何如人哉魏徵之言厥有㫖矣貞觀十三年魏徵恐太宗不能克終儉約近嵗頗好奢縱好去聲後同上疏諌曰臣觀自古帝王受圖定鼎皆欲傳之萬代貽厥孫謀故其垂拱巖廊布政天下其語道也必先淳朴而抑浮華其論人也必貴忠良而鄙邪佞言制度也則絶奢靡而崇儉約談物産也則重榖帛而賤珍竒然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乗之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於嗜欲故也語曰非知之難行之惟難非行之難終之斯難所言信矣伏惟陛下年甫弱冠去聲大拯横流横去聲削平區宇肇開帝業貞觀之初時方克壯抑損嗜欲躬行節儉内外康寧遂臻至治論功則湯武不足方語徳則堯舜未為逺臣自擢居左右十有餘年每侍帷幄屢奉明㫖常許仁義之道守之而不失儉約之志終始而不渝一言興邦斯之謂也徳音在耳敢忘之乎而頃年已来稍乖曩志敦朴之理漸不克終謹以所聞列之如左陛下貞觀之初無為無欲清靜之化逺被遐荒考之於今其風漸墜聽言則逺超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬漢文帝時有獻千里馬者詔還其馬與道里費晉武焚雉頭之裘晉武帝時太醫司馬程㨿獻雉頭裘帝以竒技異服典禮所禁焚之于殿前今則求駿馬於萬里市珍竒於域外取恠於道路見輕於戎狄此其漸不克終一也昔子貢問理人於孔子孔子曰懔乎若朽索之馭六馬子貢曰何其畏哉子曰不以道遵之則吾讐也若何其無畏家語之辭故書曰民惟邦本本固邦寧為人上者奈何不敬書五子之歌陛下貞觀之始視人如傷恤其勤勞愛民猶子每存簡約無所營為頃年已来意在奢縱忽忘卑儉輕用人力乃云百姓無事則驕逸勞役則易使易以豉切後同自古以来未有由百姓逸樂音洛後同而致傾敗者也何有逆畏其驕逸而故欲勞役者哉恐非興邦之至言豈安人之長算此其漸不克終二也陛下貞觀之初損己以利物至於今日縱欲以勞人卑儉之迹嵗改驕侈之情日異雖憂人之言不絶於口而樂身之事實切於心或時欲有所營慮人致諌乃云若不為此不便我身人臣之情何可復爭讀曰諍此直意在杜諌者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚家語之辭與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子疎斥小人今則不然輕䙝小人䙝音泄禮重君子重君子也敬而逺之逺音援後同輕小人也狎而近之近之則不見其非逺之則莫知其是莫知其是則不間而自疎間去聲後同不見其非則有時而自昵昵近小人非致理之道疎逺君子豈興邦之義此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物人乃足犬馬非其土性不畜許六切珍禽竒獸弗育於國周書旅獒之辭陛下貞觀之初動遵堯舜捐金抵璧反朴還淳頃年以来好尚竒異好去聲後同難得之貨無逺不臻珍玩之作無時能止上好奢靡而望下敦朴未之有也末作滋興而求豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渴善人所舉信而任之取其所長恒恐不及近嵗已来由心好惡烏去聲或衆善舉而用之或一人毁而棄之或積年任而用之或一朝疑而逺之夫行有素履夫音扶行去聲後同事有成跡所毁之人未必可信於所舉積年之行不應頓失於一朝應平聲朝音昭君子之懐蹈仁義而𢎞大徳小人之性好讒佞以為身謀陛下不審察其根源而輕為之臧否部鄙切是使守道者日疎干求者日進所以人思茍免莫能盡力此其漸不克終六也陛下初登大位髙居深視事惟清靜心無嗜慾内除畢弋之物畢網也弋以生絲繫矢而射也外絶畋獵之源數載之後不能固志雖無十旬之逸夏書太康盤遊無度畋于有洛之表十旬弗反或過三驅之禮遂使盤遊之娛見譏於百姓鷹犬之貢逺及於四夷或時教習之處道路遙逺侵晨而出入夜方還以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠孔子對魯定公之辭然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上達咸思竭力心無所隠頃年已来多所忽畧或外官充使去聲奏事入朝思覩闕庭將陳所見欲言則顔色不接欲請又恩禮不加間因所短詰其細過雖有聰辯之畧莫能申其忠欵而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縱長音掌後同樂不可極志不可滿禮曲禮篇之辭四者前王所以致福通賢以為深誡陛下貞觀之初孜孜不怠屈己從人恒若不足頃年已来㣲有矜放恃功業之大意蔑前王負聖智之明心輕當代此傲之長也欲有所為皆取遂意縱或抑情從諫終是不能忘懐此欲之縱也志在嬉遊情無厭倦雖未全妨政事不復專心治道此樂將極也率土乂安四夷欵服仍逺勞士馬問罪遐裔此志將滿也親狎者阿㫖而不肯言疎逺者畏威而莫敢諌積而不已將虧聖徳此其漸不克終九也昔陶唐成湯之時非無災患而稱其聖徳者以其有始有終無為無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿内户口並就闗外擕負老幼来往數千曾無一户逃亡一人怨苦此誠由識陛下矜育之懐所以至死無擕貳頃年已来疲於徭役闗中之人勞弊尤甚雜匠之徒下日悉留和雇正兵之輩上番多别驅使和市之物不絶於鄉閭逓送之夫相繼於道路既有所弊易為驚擾脫因水旱榖麥不收恐百姓之心不能如前日之寧帖此其漸不克終十也臣聞禍福無門唯人所召人無釁焉妖不妄作伏惟陛下統天御㝢十有三年道洽寰中威加海外年榖豐稔禮教聿興比屋踰於可封比音鼻菽粟同於水火暨乎今嵗天災流行炎氣致旱乃逺被於郡國㐫醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下驚懼之辰憂勤之日也若見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗徳者思而改之與物更新更平聲易人視聽則寶祚無疆普天幸甚何禍敗之有乎然則社稷安危國家理亂在於一人而已當今太平之基既崇極天之峻九仭之積猶虧一簣之功書曰為山九仭功虧一簣言中道而正則前功盡棄也千載休期時難再得明主可為而不為㣲臣所以鬱結而長歎者也臣誠愚鄙不逹事機畧舉所見十條輙以上聞聖聽伏願陛下採臣狂瞽之言叅以芻蕘之議冀千慮一得衮職有補詩大雅烝民之篇曰衮職有闕維仲山甫補之則死日生年甘從斧鉞疏奏太宗謂徵曰人臣事主順㫖甚易忤情尤難公作朕耳目股肱常論思獻納朕今聞過能改庶幾克終善事幾平聲若違此言更何顔與公相見復欲何方以理天下自得公疏反覆研尋深覺詞强理直遂列為屏障朝夕瞻仰又錄付史司冀千載之下識君臣之義乃賜徵黄金十斤廐馬二疋按史傳十二年阿史那結社率作亂雲陽石然自冬至五月不雨故徵上此疏唐氏仲友曰人君善否之分其始毫釐其未千里論太宗貞觀初之所為皆可以為三代之令主至漸不克終則凡三代之辟王其極至於亂者不過乎此可不畏哉徵有憂之極言至論數其十漸有伊傅周召戒其君大禹訓其後世之意非慮之至忠之盡安能及此使太宗聞過願改以終善道以保貞觀之隆卒髣髴乎三代之令主皆徵力也史以三代遺直許徵於十漸見之葉氏適曰太宗聞十漸之戒令録付史官使萬世知有君臣之義至徵錄前後諫爭語於史官帝都不說夫十漸之戒徵之所録多不過此而太宗不說何也盖錄在徵則天下惟知徵之能諫若録在太宗則天下將不止知太宗之能聽諌且知太宗眷眷不忘之意凡此皆太宗好名處愚按魏徵十不克終之疏正貞觀之中年其間所云貞觀之初如此其善近嵗以来如此其未善其善也可以為三代之令主其未善也無異於後世之辟王何太宗一人之身始終之相逺如此哉盖其始之善者天資之過人也終之未善者學力之不繼也昔者周之成王即位之初惑於二叔之言不能明周公之徳其天資之美有不能如太宗者矣及其終也敬近天威無敢昏逾至於死生之際烱然不亂此豈太宗之所及哉愚然後知周公輔導之功為不可及而魏徵格君之道猶有所不足也嗚呼以太宗之聰明猶不能保其終而況天資之未逮者其可不孳孳而務學也哉貞觀十四年太宗謂侍臣曰平定天下朕雖有其事守之失圖功業亦復難保秦始皇初亦平六國㨿有四海及末年不能善守實可為誡公等宜念公忘私則榮名髙位可以克終其美魏徵對曰臣聞之戰勝易以豉切守勝難陛下深思逺慮安不忘危功業既彰徳教復洽恒以此為政宗社無由傾敗矣范氏祖禹曰書曰后克艱厥后臣克艱厥臣又曰無輕民事惟難孔子曰為君難夫知所難而後可以有為也傳曰君以為易則其難也將至矣君以為難則其易也將至矣太宗知守之之難所以能有終也愚按魏徵之於太宗凡三告以守天下之難矣居安忘危之言始終弗渝其憂治危明之心為何如哉孟子曰責難於君謂之恭徵之謂也貞觀十六年太宗問魏徵曰觀近古帝王有傳位十代者有一代兩代者亦有身得身失者朕所以常懐憂懼或恐撫養生民不得其所或恐心生驕逸喜怒過度然不自知卿可為朕言之為去聲當以為楷則徵對曰嗜慾喜怒之情賢愚皆同賢者能節之不使過度愚者縱之多至失所陛下聖徳𤣥逺居安思危伏願陛下常能自制以保克終之美則萬代永賴愚按太宗問運祚長短之殊魏徵對以自制克終之美其論可謂的矣然嘗論之古昔聖賢著書立言其於始終之際皆有深意吳氏之著是編也始之以太宗問魏徵正身之道終之以魏徵對太宗克終之言其意之所存雖不可知以事實攷之則二者皆太宗之所不足也何也太宗削除禍亂身致升平屈己而納諫任賢而使能恭儉節用寛仁而愛人三代而下之君絶無而僅有者也然於君臣父子兄弟夫婦之間皆有慚徳豈非正身之道有所不足歟太宗能納諌矣而晚年有仆碑之失能慎刑矣而晚年有君羨之誅能息兵矣復有髙麗西域之師能節用矣復有飛仙翠㣲之作豈非克終之道冇所不足歟合二者而論之則太宗所以不能克終者由其不能正身也然則吳氏之書豈非始言其本而終言其效歟貞觀政要卷十
