body:
  text: 貞觀政要卷四唐吳兢撰元戈直集論太子諸王定分第九凡四章貞觀七年授吳王恪齊州都督太宗謂侍臣曰父子之情豈不欲常相見耶但家國事殊須出作藩屏且令其早有定分令平聲分去聲凡言定分並同絶覬覦之心我百年後使其兄弟無危亡之患也按史傳恪初王欝林貞觀十年始改王吳授安州都督帝賜書曰汝惟茂親勉思所以藩王室以義制事以禮制心外為之君臣内為之父子今當去膝下不遺汝珍而遺汝以言其念之哉帝後以晉王為太子又欲立恪長孫無忌固争帝曰公豈以非已甥邪且恪英果𩔖我無忌曰晉王仁厚守文之良主且舉棊不定則敗況儲位乎帝乃止愚按是時承乾方處東宮凶德未著太宗出吳王使居藩屏欲其早有定分可謂處之盡其道矣其後既立晉王又欲立恪卒陷恪於死地何始終之矛盾邪竊嘗論之漢高祖之欲易惠帝唐太宗之欲易高宗皆為宗廟社稷之逺圖初不可以尋常嫡庶之禮槩論之也合二君之事而觀之則太宗之事近正何也漢高祖之欲易太子是也其欲立趙王則出於溺愛之私矣子房之不立如意是也然遂引致四皓擁䕶太子以成呂氏之禍杜牧所謂四老安劉反為滅劉者其可不寒心哉故朱子謂高祖若能以天下大計為心則蚤與張陳陵勃謀之以恒易盈可也若吳王恪之在當時内不聞其母有戚姬嬖愛之私外不聞恪有魏王奪嫡之計太宗深知高宗之懦弱不足以承宗廟之重故以社稷大計問之無忌無忌外雖為正大之論内實懷外家之私其後卒以無辜陷恪死地無忌之罪上通於天矣失以恪之英才幸而嗣聖之際尚存庶幾匡正唐室不致牝晨之禍如此其烈也豈不悲哉然則太宗之事賢於高祖無忌之心則真子房之罪人矣貞觀十一年侍御史馬周上疏曰漢晉以來諸王皆為樹置失宜為去聲不預立定分以至於滅亡人主熟知其然但溺於私愛故前車既覆而後車不改轍也今諸王承寵遇之恩有過厚者臣之愚慮不惟慮其恃恩驕矜也昔魏武帝寵樹陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王從而畏之也魏武帝曹操也操生四子丕彰植熊丕文帝也植陳思王也植多藝能操愛之文帝既立植寵日衰後以悖慢貶安鄉侯後進王東阿此則武帝之寵陳思適所以苦之也且帝子何患不富貴身食大國封戸不少好衣美食之外更何所須而毎年别加優賜曾無紀極曾音層俚語曰俚音里俚語猶云俗諺也貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已處上聲見音現當須制長乆之法使萬代遵行疏奏太宗甚嘉之賜物百段唐氏仲友曰太宗制古之所不制臣古之所不臣而獨牽於私欲不能自克於嫡庶之際不為逺處竟使賢才宗支連頸就戮周實有先見之明惜哉言之不力愚按周官有王世子不會之文王之衆子不與焉夫先王愛子之心豈不欲其周徧哉葢所以别嫌疑明嫡庶絶覬覦息禍亂也隋文帝既立勇為太子又使晉漢秦蜀四王各據方面恩寵相埒且誇示於人曰前代兄弟相爭者由嫡庶之分也今吾五子同母何憂禍亂哉其後五子互相攘奪無一人得令終者至今為天下笑太宗目覩隋室之禍宜知所鑒矣既立承乾為太子復寵待諸王無所高下馬周窺見禍亂之端亟以為言太宗雖能嘉賞迄不能改愚觀太宗毎事以隋為鑒獨於諸王定分而忘之豈所謂溺愛者不明耶貞觀十三年諌議大夫褚遂良以毎日一作月特給魏王泰府料物有逾於皇太子上疏諫曰昔聖人制禮尊嫡卑庶謂之儲君儲音除副也太子君之副故謂之儲君道亞霄極甚為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本於人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正禮特須尊崇如不能明立定分遂使當親者疎當尊者卑則佞巧之徒乗機而動私恩害公或至亂國伏惟陛下功超萬古道冠百王冠去聲發施號令施平聲為世作法為去聲一日萬幾或未盡美臣職諫諍無容靜黙伏見儲君料物翻少魏王朝野見聞不以為是臣聞傳曰傳去聲愛子敎以義方忠孝恭儉義方之謂昔漢竇太后及景帝並不識義方之理遂驕恣梁孝王封四十餘城苑方三百里大營宫室複道彌望積財鏹巨萬計出警入蹕小不得意發病而死鏹舉兩切貫錢索也蹕音畢天子出稱警入稱蹕竇太后漢文帝之后生景帝及梁王王名武諡曰孝事見本傳宣帝亦驕恣淮陽王幾至於敗賴其輔以退讓之臣僅乃獲免幾平聲淮陽王名欽漢宣帝庶子也諡曰憲事見本傳且魏王既新出閤伏願恒存禮訓妙擇師傅示其成敗既敦之以節儉又勸之以文學惟忠惟孝因而奬之道德齊禮論語曰道之以德齊之以禮有恥且格乃為良器此所謂聖人之敎不肅而成者也太宗深納其言陳氏惇修曰甚哉太宗之不善為父也所以啟泰之邪心者太宗也非泰之罪也太宗既立承乾為太子而所以眷眷於泰而寵錫之者其禮乃過於承乾其理何邪是時雖未嘗許泰為太子而禮數優異則立泰之意固已見於不言之間矣然則寧免泰之無覬覦而不以計傾承乾者乎及其邪心既啟然後從而裁抑之既幽之復降之是何異誘其入而復閉其門不亦惑乎愚按古者不以私恩害公義故嫡長之重衆子雖愛不得而並焉所以明尊卑之等杜僭忒之源也太宗以聰明之君而於太子魏王之事獨不能定其分異其禮雖深納遂良之言而私愛之心終不能自克卒至於兩廢焉其亦可監也夫貞觀十六年太宗謂侍臣曰當今國家何事最急各為我言之為去聲後為朕同尚書右僕射高士廉名儉以字行初秦王薦為治中王為皇太子授右庶子既即位為吏部尚書封許國公後遷僕射攝太傅掌機務二十一年卒曰養百姓最急黄門侍郎劉洎曰撫四夷急中書侍郎岑文本曰傳稱道之以徳齊之以禮義為急傳去聲諌議大夫褚遂良曰即日四方仰徳不敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫遺去聲此最當今日之急太宗曰此言是也朕年將五十已覺衰怠既以長子守器東宫長音掌諸弟及庶子數將四十心常憂慮在此耳但自古嫡庶無良何嘗不傾敗家國公等為朕捜訪賢德以輔儲宫爰及諸王咸求正士且官人事王不宜歲乆歲乆則分義情深非意闚􅎿分去聲闚音窺􅎿音俞窺伺貌多由此作其王府官寮勿令過四考令平聲唐氏仲友曰太宗不知溺愛之在巳獨欲責之保傅王者又令王府官不得過四考何也彼誠賢者雖終身而未足誠不賢一日猶不可况四考乎愚按國家急務養百姓也撫四夷也道徳齊禮也若高士廉劉洎岑文本之言皆急務也而褚遂良則以太子諸王須有定分為當今之急考其時承乾之惡已著魏王泰窺伺之情頗露漢王元昌同惡之迹益彰遂良之言宜其為急務也非以養百姓撫四夷道徳齊禮為不急也太宗不思所以正定分而責備於人抑末矣且踰年而有東宫之變矣方且曰公等為朕捜訪賢徳以輔儲宫又何益之有哉尊敬師傅第十凡六章貞觀三年太子少師少去聲李綱字文紀觀州人始名瑗慕張綱為人改焉仕隋為太子洗馬擢尚書右丞隋末賊帥何潘仁刼為長史高祖平京師綱上謁既受禪拜禮部尚書太子詹事諫建成不聽遂乞骸骨貞觀初拜是職五年卒諡曰貞有脚疾不堪踐履太宗賜步輿令三衛轝入東宫令平聲唐制東宫六率府分為上中下三等掌宿衛之事是為三衛詔皇太子引上殿親拜之大見崇重綱為太子為去聲陳君臣父子之道問寢侍膳之方見封建篇註理順辭直聽者忘倦太子嘗商略古來君臣名教竭忠盡節之事綱懔然曰懍音凜嚴毅貌託六尺之孤寄百里之命論語曽子之言謂輔幼君攝國政也古人以為難綱以為易以豉切毎吐論發言皆辭色慷慨有不可奪之志太子未嘗不聳然禮敬愚按世子為王之貳天下之本也太宗即位之後蚤建太子以固天下之本而嚴太子尊敬師傅之禮稽之古典允合其宜李綱少慷慨有風節故其發言吐論辭色毅然宜皇儲之所禮敬也古人謂一心可以事百君者綱之謂歟貞觀六年詔曰朕比尋討經史比音鼻明王聖帝曷嘗無師傅哉前所進令遂不覩三師之位意將未可何以然黄帝學大顚顓頊學録圖堯學尹壽一作君疇舜學務成昭禹學西王國湯學威子伯文王學子期武王學虢叔已上出劉向新序前代聖王未遭此師則功業不著乎天下名譽不傳乎載籍况朕接百王之末智不同聖人其無師傅安可以臨兆民者哉詩不云乎不愆不忘率由舊章詩大雅嘉樂篇之辭夫不學則不明古道夫音扶而能政致太平者未之有也可即著令置三師之位按史志隋廢三師貞觀十一年復置與三公皆不設官屬愚按周書曰立太師太傅太保曰三公論道經邦燮理陰陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地豈易其人哉若論其極必臯䕫稷契伊傅周召而後可世變無窮隨世升降可也唐以太師太傅太保為三師天子所師法無所總職太尉司徒司空為三公佐天子理陰陽平邦國無所不統此則非古制也以太宗之時固皆元勲碩徳居之制雖殊古而名意則同降此則為加官視品秩崇髙耳豈皆其人哉人君欲稽古以正名茍捨周官愚未見其可也貞觀八年太宗謂侍臣曰上智之人自無所染但中智之人無恒從教而變况太子師保古難其選成王幼小周召為保傅賈誼曰成王幼在襁抱之中召公為太傅周公為太保保保其身體傳傅之徳義左右皆賢日聞雅訓足以長仁益徳長音掌使為聖君秦之胡亥用趙髙作傅教以刑法及其嗣位誅功臣殺親族酷暴不已旋踵而亡胡亥秦二世名初始皇使趙高教胡亥决獄胡亥幸之及嗣位高説曰陛下嚴法而刻刑令有罪者相坐誅滅大臣宗室盡除先帝之故臣更置陛下之所親信二世乃更為法律大臣公子有罪輙誅二世卒為髙所弑故知人之善惡誠由近習朕今為太子諸王為去聲精選師傅令其式瞻禮度令平聲有所禆益公等可訪正直忠信者各舉三兩人愚按太子國家之根本也諸王公族之枝葉也根本安固枝葉茂盛永孚于休則開導而訓告之豈不在師傅乎然三代尚矣自漢以來未嘗不切切於嚴師傅也而諸王之賢求如河間東平何不多見夫世禄之家鮮克由禮以蕩陵徳實悖天道况崇高之上者乎為君父者尚慎于兹貞觀十一年以禮部尚書王珪兼為魏王師唐因隋制皇叔昆弟皇子為親王者置師掌傳相訓導匡其過失太宗謂尚書左僕射房𤣥齡曰古來帝子生於深宫及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲皆得安全王珪我乆驅使甚知剛直志存忠孝選為子師卿宜語泰毎對王珪如見我面宜加尊敬不得懈怠珪亦以師道自處上聲時議善之也胡氏寅曰為人師者豈徒禮貌云乎哉必有道以授人而道以人倫為至魏王泰是時承寵偏厚於兄弟間漸生異慮防其㣲而革其心不於師而誰望而王珪告戒之方教訓之道未之聞也魏王卒以窺伺儲位廢斥而死夫豈獨泰之罪哉珪亦與有責矣愚按太宗以王珪為魏王師且諭𤣥齡以嚴教之意可謂得人矣然嘗觀太宗愛泰之心甚至固父子之情也乃詔即府置文館得自引博士蘇於是勗勸泰延賔客著書如古賢王奏撰括地志士有文學者多與而貴游因藉其門如市泰之月禀又過太子逺甚褚遂良亦以為言其後卒有奪嫡之罪竟罹幽貶夫傚古賢王著書必如河間東平而後可也且漢武帝為戾太子立博望苑使通賓客識者非之今泰諸王也使之置館引賓客私權勢其毋乃與所謂嚴教之意異歟貞觀十七年太宗謂司徒長孫無忌司空房𤣥齡曰三師以徳道人者也若師體卑太子無所取則於是詔令平聲撰太子接三師儀注太子出殿門迎先拜三師三師答拜毎門讓三師三師坐太子乃坐與三師書前名惶恐後名惶恐再拜愚按太宗制太子接三師儀注委曲尊隆意亦至矣師嚴然後道尊况元良而屈體盡敬於師傅其闗繫豈不尤重也然嘗觀賈誼引大戴記之言於政事書曰師道之教訓保保其身體傅傅之徳義於是為置三少皆上大夫也三公三少固明孝仁禮義以道習之入學則承師問道退習而考於太傅太傅罰其不則而匡其不及此古昔太子親師傅之實也又不止於儀注之文而已為君父者不可不考於賈誼之書貞觀十八年髙宗初立為皇太子貞觀十七年四月立晉王治為皇太子是為髙宗尚未尊賢重道太宗又嘗令太子令平聲後同居寢殿之側絶不往東宫散騎常侍劉洎上書曰臣聞郊迎四方孟侯所以成徳月令天子立春迎春於東郊立夏迎夏於南郊立秋迎秋於西郊立冬迎冬於北郊按此非王世子之事或曰周制東西南北之學在於四郊孟長也孟侯謂世子也此説於成徳為切迎字疑誤齒學三讓元良由是作貞文王世子行一物而三善皆得者其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓曰有父在則禮然然而衆知父子之道矣二曰君在則禮然而衆著於君臣之義矣三曰長長也然而衆知長幼之節矣故父子君臣長幼之道得而國治禮曰一有元良萬邦作貞斯皆屈主祀之尊主祀一作嗣主申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由兹道永固鴻基者焉至若生乎深宫之中長乎婦人之手長音掌未曾識憂懼曾音層無由曉風雅雖復神機不測天縱生知而開物成務終由外奬匪夫崇彼干籥夫音扶後同籥音約于舞者所執之楯也籥樂管以竹為之三孔長三尺以和衆聲者也聽兹謡頌何以辨章庶類甄覈彛倫甄音珍厯考聖賢咸資琢玉學記玉不琢不成器人不學不知道是故周儲上哲師望奭而加裕周儲謂成王也望太公號奭召公名成王以二公為師保漢嗣深仁引園綺而昭徳漢嗣謂惠帝盈也高祖欲廢太子盈張良教太子迎四皓髙祖置酒太子侍四皓從皆年八十餘上曰煩公幸卒調䕶太子既去上目送之曰彼四人為之輔羽翼已成難動矣卒不廢四皓東園公綺里季夏黄公甪里先生也原夫太子宗祧是繫善惡之際興亡斯在不勤于始將悔于終是以鼂錯上書令通政術鼂音潮錯音措漢文帝時鼂錯為太子舍人遷博士上書曰人主所以尊顯功名揚於萬世者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海内必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之賈誼獻䇿務知禮教賈誼雒陽人漢文帝時為梁懷王傅丄書曰古之王者太子迺生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教已行矣竊惟皇太子玉裕挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天姿非勞審諭固以華夷仰徳翔泳希風矣然則寢門視膳已表於三朝音潮事見封建篇註藝宫論道宜𢎞於四術王制樂正崇四術立四教順先王詩書禮樂以造士雖富於春秋飭躬有漸實恐歲月易往易以豉切墮業興譏取適晏安言從此始臣以愚短幸叅侍從去聲思廣儲明暫願聞徹不敢曲陳故事切請以聖徳言之伏惟陛下誕叡膺圖登庸厯試多才多藝道著於匡時允文允武功成於纂祀萬方即敘九圍清晏尚且雖休勿休日慎一日求異聞於振古勞叡思於當年思去聲後同乙夜觀書事髙漢帝漢紀光武講論經理夜分乃寐馬上披卷勤過魏王魏紀文帝雖在軍旅手不釋卷陛下自勵如此而令太子優游棄日不習圖書臣所未諭一也加以暫屏機務屏音餅棄也即寓雕蟲揚子曰或問吾子少而好賦曰童子雕蟲箓刻壯夫不為也紆寶思於天文則長河韜映摛玉華於仙札摛音癡則流霞成彩固以錙銖萬代錙音淄銖音殊十黍為絫十絫為銖十銖為錙冠冕百王屈宋不足以升堂屈原名平楚懐王時為大夫作離騷經為詞賦之祖宋玉屈原弟子楚大夫以詞賦名鍾張何階於入室鍾繇字元常魏太尉善草書張芝字伯英後漢太尉臨池學書池水盡黒時稱草聖陛下自好如此好去聲而太子悠然静處上聲不尋篇翰臣所未諭二也陛下備該衆妙獨秀寰中猶晦天聰俯詢凡識聽朝之隟與隙同引見羣官降以温顏訪以今古故得朝廷是非閭里好惡凡有巨細必闗聞聽陛下自行如此而令太子乆趨入侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥詩曰貽厥孫謀蔑而不急未見其可伏願俯推叡範訓及儲君授以良書娛之嘉客朝披經史觀成敗於前蹤晩接賔遊訪得失於當代間以書札間去聲繼以篇章則日聞所未聞日見所未見副徳愈光羣生之福也竊以良娣之選徧於中國仰惟聖㫖本求典内冀防㣲慎逺慮臣下所知暨乎徴簡人物徴平聲則與聘納相違監撫二周監平聲監撫謂監國撫軍也未近一士愚謂内既如彼外亦宜然者恐招物議謂陛下重内而輕外也古之太子問安而退所以廣敬於君父異宮而處上聲所以分别於嫌疑别彼列切今太子一侍天闈動移旬朔師傅已下無由接見假令供奉有隟供平聲暫還東朝拜謁既疎且事俯仰規諫之道固所未暇陛下不可以親教宫寀無因以進言寀音采寮屬也雖有具寮竟將何補伏願俯循前躅音燭跡也稍抑下流𢎞逺大之規展師友之義則離徽克茂帝圖斯廣凡在黎元孰不慶賴太子温良恭儉聰明叡哲含靈所悉臣豈不知而淺識勤勤思効愚忠者願滄溟益潤日月增華也太宗乃令洎與岑文本馬周遞日往東宮與皇太子談論按通鑑此疏係十七年又按髙宗諫誅穆裕太宗歸功洎等事在十八年則洎上此疏當在十七年唐氏仲友曰劉洎此疏足見其為剛直果敢之士太宗以太子諌誅穆裕歸功諌臣則洎接正人聞正論之説驗矣惜太子不足有為也又曰古之制命士以上父子異宮意甚深矣易子而教責善則離還東宮近師傳之諫當矣愚按太子承乾既廢晉王治初立之後劉洎此疏條陳詳悉誠教世子之至善也太宗以洎言令洎與岑文本馬周逓日往東宮談論可謂得人矣夫修身正家之道敬大臣體羣臣親君子逺小人之要未必不見於談論也出震繼明不旋踵而背之卒基唐家之禍於不忍言其氣化人事之相符乎抑所以輔翼之具未至耶教戒太子諸王第十一凡七章貞觀七年太宗謂太子左庶子于志寧字仲謐京兆人貞觀三年為中書侍郎遷左庶子上諫苑俄兼詹事晉王為皇太子復拜左庶子杜正倫曰卿等輔導太子常須為説為去聲後為説同百姓間利害事朕年十八猶在人間百姓艱難無不諳練及居帝位毎商量處置量平聲處上聲或時有乖疎得人諌諍方始覺悟若無忠諌者為説何由行得好事况太子生長深宮長音掌百姓艱難都不聞見乎且人主安危所繫不可輙為驕縱但出敕云有諌者即斬必知天下士庶無敢更發直言故克已勵精容納諌諍卿等常須以此意共其談説毎見有不是事宜極言切諌令有所禆益也令平聲唐氏仲友曰太宗誠有知子之明其教之亦云篤矣此數語者即周公無逸之書也至謂若詔天下敢諫者死將無復發言此則煬帝有前鑒矣奈何承乾方欲以殺止諌雖百正倫何益哉愚按太宗君臨天下方勵精之初容受直言導人使諌蚤建太子命東宮輔臣極言規正令有所禆益蓋望太子亦如已之從諌其意不亦深切哉惜乎承乾不足以副君父之意貞觀十八年太宗謂侍臣曰古有胎教世子文王之母太任為人端一誠莊惟徳之行及其娠文王目不視惡色耳不聽淫聲口不出傲言生文王而明聖太任教之以一識百卒為周宗而君子謂太任為能胎教朕則不暇但近自建立太子遇物必有誨諭見其臨食將飯謂曰汝知飯乎對曰不知曰凡稼穡艱難皆出人力不奪其時常有此飯見其乗馬乗平聲後同又謂曰汝知馬乎對曰不知曰能代人勞苦者也以時消息不盡其力則可以常有馬也見其乗舟又謂曰汝知舟乎對曰不知曰舟所以比人君水所以比黎庶水能載舟亦能覆舟爾方為人主可不畏懼見其休於曲木之下又謂曰汝知此樹乎對曰不知曰此木雖曲得繩則正為人君雖無道受諌則聖此傅説所言説音悦商書傅説告髙宗曰惟木從繩則正后從諌則聖可以自鑒愚按太宗懲承乾之失徳望儲君之近徳於是遇事必誨其愛儲君者所以愛百姓也將飯而戒則知民生之艱難矣乗馬而戒則知民力之困乏矣乗舟而戒則知民心之無恒矣休曲木而戒則知立身之必從正矣觀前代教誡太子之辭未有切於此者稽之古禮經教世子之道亦不過如是也迨夫高宗臨御其於子庶民猶知所以保養之意惟疎逺老臣失徳宫閫竟忘王業之艱難毋乃雖誨諄諄而聽藐藐乎貞觀七年太宗謂侍中魏徴曰自古侯王能自保全者甚少皆由生長富貴長音掌後同好尚驕逸好去聲多不解音懈親君子逺小人故爾逺去聲後同朕所有子弟欲使見前言往行去聲冀其以為規範因命徴錄古來帝王子弟成敗事名為自古諸侯王善惡録以賜諸王其序曰觀夫音扶後同膺期受命握圖御宇咸建懿親藩屏王室布在方䇿可得而言自軒分二十五子國語黄帝之子二十五人其同姓者二人青陽與夷鼓是也其同生而異姓者十四人别為十二姓姬酉祁已滕箴任荀僖姞儇依是也舜舉一十六族即八元八凱見擇官篇註爰厯周漢以逮陳隋分裂山河大啟磐石者衆矣或保乂王家與時升降或失其土宇不祀忽諸然考其隆替察其興滅功成名立咸資始封之君國䘮身亡多因繼體之后其故何哉始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴以求賢漢楚元王敬禮申公等穆生不嗜酒元王毎置酒嘗為穆生設醴或吐飱而接士周公戒伯禽曰我於天下亦不賤矣然我一沐三握髪一飯三吐哺猶恐失天下之賢人子之魯慎無以國驕人故甘忠言之逆耳家語曰忠言逆耳利於行得百姓之懽心孝經曰治國者不敢侮於鰥寡故得百姓之懽心樹至徳於生前流遺愛於身後暨夫子孫繼體多屬隆平生自深宫之中長居婦人之手不以高危為憂懼豈知稼穡之艱難周書曰相小人厥父母勤勞稼穡難厥子乃不知稼穡之艱昵近小人昵與暱同疎逺君子綢繆哲婦傲狠明徳犯義悖禮滛荒無度不遵典憲僭差越等恃一顧之權寵便懷匹嫡之心矜一事之微勞遂有無厭之望厭平聲棄忠貞之正路蹈姦宄之迷塗宄音鬼書曰冦賊姦宄注在外曰姦在内曰宄愎諌違卜愎音僻往而不返雖梁孝齊冏之勲庸梁孝名武漢文帝子也封梁王七國反先擊梁殺虜有功諡曰孝齊冏姓司馬名冏晉齊王攸子也為大司馬封齊王以功遷游擊將軍淮南東阿之才俊淮南名安漢武帝諸父也封淮南王好書鼓瑟招賓客喜文辭後坐反謀自殺諡曰厲東阿見定分篇注摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功齊桓公晉文公皆春秋諸侯之伯有尊王室匡天下之功就梁董之顯戮梁冀漢桓帝時為大將軍後為反謀冀與妻皆自殺董卓漢獻帝時自為太尉相國作亂被誅夷三族垂為炯戒可不惜乎皇帝以聖哲之資拯傾危之運耀七徳以清六合左傳楚子曰夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章注云此武王七徳之義總萬國而朝百靈懷柔四荒親睦九族九族高祖𤣥曾之親也念華萼於棠棣棠棣詩小雅篇名燕兄弟之樂歌也寄維城於宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑑鏡貽厥孫謀臣輙竭愚誠稽諸前訓凡為藩為翰有國有家者其興也必由於積善其亡也皆在於積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已惟人所召豈徒言哉今錄自古諸王行事得失分其善惡各為一篇名曰諸王善惡錄欲使見善思齊足以揚名不朽聞惡能改能一作知庶得免乎大過從善則有譽改過則無咎興亡是繫可不勉歟太宗覽而稱善謂諸王曰此宜置于座右用為立身之本愚按人性皆善也而惡則豈人之性哉習於善則善習於惡則惡耳况太子諸王乎嘗觀漢諸侯王恪謹以守國者何少放逸以失國者何多今太宗命集往古之事為諸侯王善惡録使知善之足以成名惡之足以滅身昭然可鑒矣然唐室興王之初其諸王如道宗道𤣥孝恭道彦皆相與艱難共成大勲賢徳著聞此善之可稱者也暨有天下之後諸王皆身享富貴福澤順境而䘮徳者何多耶蓋太宗家廷之内恩常揜義訓教之言雖切佩服之心蓋寡毋乃居移氣養移體有以汨其本然之善乎豈人性之惡哉貞觀十年太宗謂荆王元景漢王元昌吳王恪魏王泰等曰自漢已來帝弟帝子受茅土居榮貴者甚衆惟東平及河間王東平王名蒼漢光武子也好經書有智思文稱典雅明帝問處家何事最樂王曰為善最樂諡曰憲河間王名徳漢景帝子也博學有徳武帝時奏對推道術而言得事之中諡曰獻最有令名得保其祿位如楚王瑋之徒瑋音筆楚王瑋晉武帝第五子也元康中掌兵權剛狠好殺因矯詔殺太宰汝南王亮太保衛瓘賈后遂執瑋下廷尉斬之諡曰隱覆亡非一並為生長富貴為去聲後同好自驕逸所致好去聲汝等鑒誡宜熟思之揀擇賢才為汝師友須受其諫諍勿得自專我聞以徳服物信非虛説比嘗比音鼻夢中見一人云虞舜我不覺竦然敬異豈不為仰其徳也向若夢見桀紂必應斫之應平聲桀紂雖是天子今若相喚作桀紂人必大怒顔回閔子騫顔回字子淵閔損字子騫皆孔子弟子以徳行稱郭林宗黄叔度二人皆後漢時高尚之士郭林宗名泰太原人也范滂稱之曰隱不違親身不絶俗天子不得臣諸侯不得友黄叔度名憲汝南人也郭林宗稱之曰汪汪若千頃陂澄之不清淆之不濁不可量也雖是布衣今若相稱贊道類此四賢必當大喜故知人之立身所貴者惟在徳行去聲後徳行同何必要論榮貴汝等位列藩王家食實封更能克修徳行豈不具美也且君子小人本無常行善事則為君子行惡事則為小人當須自剋勵使善事日聞勿縱欲肆情自䧟刑戮貞觀十年太宗謂房𤣥齡曰朕厯觀前代撥亂創業之主生長人間長音掌皆識達情偽罕至於敗亡逮乎繼世守文之君生而富貴不知疾苦動至夷滅朕少小以來少去聲經營多難備知天下之事猶恐有所不逮至於荆王諸弟生自深宫識不及逺安能念此哉朕毎一食便念稼穡之艱難毎一衣則思紡績之辛苦諸弟何能學朕乎選良佐以為藩弼庶其習近善人得免於愆過爾貞觀十一年太宗謂吳王恪曰父之愛子人之常情非待教訓而知也子能忠孝則善矣若不遵誨誘忘棄禮法必自致刑戮父雖愛之將如之何昔漢武帝既崩昭帝嗣立燕王旦素驕縱譸張不服譸音舟譸張狂貌霍光遣一折簡誅之則身死國除漢武帝名徹既崩少子弗陵立是為昭帝燕王名旦武帝第三子也霍光為大將軍輔昭帝燕王與上官桀等濳謀不軌事敗桀等伏誅乃賜燕壐書責之因以綬自絞賜諡曰刺夫為臣子夫音扶不得不慎愚按太宗之教戒諸王也其辭㫖諄諄矣既以漢河間東平之善楚王瑋之惡以曉之復以虞舜之聖桀紂之惡與夫漢霍光誅燕王旦之事以曉之又謂𤣥齡選良佐以為藩弼使其能佩服斯訓何以尚兹然愚觀太宗教戒之辭誠諄諄毋乃以言教乎所與言者荆王元景漢王元昌吳王恪魏王泰也其後荆王與房遺愛同反漢王與承乾同反魏王以謀奪嫡而廢吳王亦以嫌疑為高宗所殺四人無得令終者豈富貴驕奢有以移其本性邪抑太宗敎敕之言雖切而表率之道未至耶貞觀中皇子年小者多授以都督刺史諌議大夫褚遂良上疏諌曰昔兩漢以郡國理人除郡以外分立諸子割土封疆雜用周制皇唐郡縣粗依秦法粗去聲皇子㓜年或授刺史陛下豈不以王之骨肉王去聲鎮扞四方聖人造制道髙前古臣愚見有小未盡何者刺史師帥人仰以安得一善人部内蘇息遇一不善人闔州勞弊是以人君愛恤百姓常為擇賢為去聲後為立同或稱河潤九里京師䝉福漢光武時潁川盗起徴拜漁陽太守郭伋為潁川太守召見帝勞曰賢能太守去帝城不逺河潤九里冀京師并䝉福也伋到郡招懷羣盗皆降或輿人興詠生為立祠漢明帝時王堂拜巴州太守時西羌為冦堂討平之巴庸清静生為立祠漢宣帝名詢武帝曾孫衛太子之孫也云與我共理者惟良二千石乎如臣愚見陛下子内年齒尚幼未堪臨人者請且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三帝後漢明帝名莊章帝名炟和帝名肇能友愛子弟自兹以降以為準的封立諸王雖各有土年尚幼小者各留京師訓以禮法垂以恩惠訖三帝世諸王數十百人惟二王稍惡二王謂楚王英廣陵思王荆也皆以謀逆自殺自餘皆沖和深粹惟陛下詳察太宗嘉納其言唐氏仲友曰遂良之諫切中太宗之病太宗十八舉義兵以已揆人不間幼小曾不知人才不同未知稼穡之艱難乃使之臨民何止未能操刀而使割也况膏粱之性難正古人病之而况於帝子乎遂良欲養成徳器審堪臨州然後除遣真良䇿也然帝子之重土地不足藩維磐石之宗使臨一州亦何益哉賢乎適足以勞之不賢適足以累之而已惜哉唐之君臣其見之未及此也愚按昔封建之世固有年幼而祚土者何則一國而有卿大夫士上焉者命於天子下焉者命於其國國君之齒少則正卿當國法制秩然成王封小弱弟於唐其後卒開大國之迹此封建之世之事也唐都督刺史古方伯諸侯之職而事體不同非如建國之有卿大夫士以相參佐也而使皇子之年小者居之非懦弱不自樹立則驕泰以取敗耳非司牧之道也遂良之疏誠為龜鑑規諌太子第十二凡四章貞觀五年李百藥為太子右庶子時太子承乾字髙明太宗長子也生承乾殿即以命之貞觀初立為皇太子甫八歲特敏惠及長過惡浸聞十七年廢為庶人十八年卒封常山王諡曰愍頗留意典墳孔安國曰伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也然閑讌之後嬉戲過度百藥作贊道賦以諷焉其詞曰下臣側聞先聖之格言嘗覽載籍之遺則伊天地之𤣥造洎皇王之建國曰人紀與人綱資立言與立徳履之則率性成道違之則㒺念作忒望興廢如從鈞視吉凶如紏纆音墨至乃受圖膺籙握鏡君臨因萬物之思化以百姓而為心體大儀之潛運閲往古於來今盡為善於乙夜惜勤勞於寸陰淮南子曰聖人不貴尺璧而重寸之陰時難得而易失也故能釋層冰於瀚海變塞谷於蹛林蹛都賴都例二切唐之思結地置蹛林州漢書注云蹛林匈奴繞林而祭也總人靈以胥悦極穹壤而懐音赫矣聖唐大哉靈命時維大始大讀曰泰運鍾上聖天縱皇儲固本居正機悟宏逺神姿凝映顧三善而必𢎞見教誡篇注祗四徳而為行去聲易文言傳曰君子行此四徳者故曰元亨利貞毎趨庭而聞禮論語伯魚曰鯉趨而過庭曰學禮乎曰未也鯉退而學禮常問寢而資敬奉聖訓以周旋誕天文之明命邁觀喬而望梓商子曰喬仰父道也梓俯子道也即元龜與明鏡自大道云革禮教斯起以正君臣以篤父子君臣之禮父子之親盡情義以兼極諒𢎞道之在人論語曰人能𢎞道豈夏啟與周誦亦丹朱與商均既雕且琢温故知新惟忠與敬曰孝與仁則可以下光四海上燭三辰日月星也昔三王之教子兼四時以齒學將交發於中外乃先之以禮樂樂以移風易俗禮以安上化人非有悦於鍾鼓將宣志以和神寧有懐於玉帛將克已而庇身生於深宫之中處於羣后之上處上聲羣后諸侯也未深思於王業不自珍於匕鬯上音比下音唱匕所以載鼎實鬯香酒灌地以求神者也謂富貴之自然恃崇髙以矜尚心恣驕狠動愆禮讓輕師傅而慢禮儀狎姦諂而縱淫放前星之耀遽隱心三星中為君前為太子後為少子少陽之道斯諒震為少陽長子之道也雖天下之為家蹈夷險之非一或以才而見升或見讒而受黜足可以自省厥休咎省悉井切觀其得失請粗略而陳之粗去聲覬披文而相質相去聲在宗周之積徳乃執契而膺期賴昌發而作貳昌文王名發武王名啟七百之鴻基逮扶蘇之副秦非有虧於聞望聞去聲以長嫡之隆重長音掌監偏師於亭障監平聲扶蘇秦始皇長子也始皇欲坑諸生扶蘇切諌始皇怒使北監䝉恬上郡始皇崩公子胡亥詐受遺詔自立賜扶蘇死始禍則金以寒離左傳閔公二年晉侯使太子申生伐東山臯落氏衣之偏衣佩之金玦狐突歎曰衣之尨服逺其躬也佩以金玦棄其􅇆也尨涼冬殺金寒玦離胡可恃也金玦金環也厥妖則火不炎上五行傳曰棄法律逐功臣殺太子以妾為妻則火不炎上言火失其性而為灾也既樹置之違道見宗祀之遄䘮伊漢氏之長世固明兩之遞作易曰明兩作離大人以繼明照于四方高惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓並見教戒篇註景有慙於鄧子成從理之淫虐終生患於强吳由發怒於争博漢景帝名啟文帝太子也鄧子名通文帝佞幸臣也强吳髙祖兄仲之子吳王濞也文帝嘗病癰鄧通常為帝吮之帝曰天下誰最愛我通曰宜莫如太子太子入問病帝使吮癰吮而色難之已而聞通嘗為帝吮心慙由此怨通及即位鄧通免太子又嘗與吳太子飲博吳太子素驕博争不恭太子引博局提吳太子殺之吳王由是怨望稍失藩臣禮徹居儲兩時猶幼沖防衰年之絶議識亞夫之矜功故能恢𢎞祖業紹三代之遺風徹漢武帝名儲兩為太子時也亞夫周勃之子仕至丞相景帝甚重之帝欲廢栗太子亞夫不可帝由是疏之帝嘗目之曰比鞅鞅非少主臣也據開博望其名未融哀時命之奇舛遇讒賊於江充雖備兵以誅亂竟背義而凶終背音倍據戻太子名漢武帝子也帝為太子立博望苑使通賔客趙人江充與太子有隙見帝年老恐他日為所誅因言帝疾祟在巫蠱帝乃使充入宫治之充云太子宫木人尤多又有帛書所言不道太子遂捕充斬之長安軍亂因言太子反上怒太子自經宣嗣好儒大猷行闡嗟被尤於徳教美發言於忠謇始聞道於匡韋終獲戾於恭顯好去聲宣嗣漢元帝也名奭好儒術文辭用韋𤣥成匡衡相繼為丞相多所嚮納復以𢎞恭石顯相繼擅權用事蕭望之京房賈捐之等皆以言顯短而死太孫雜藝雖異定陶馳道不絶抑惟小善猶見重於通人當傳芳於前典漢成帝名驁字太孫元帝太子也定陶共王元帝庶子也成帝博好經書為太子時帝急召之太子出龍樓門不敢絶馳道西至直城門得絶乃度還入作室門上遲之問其故以狀對帝悦乃詔太子得絶馳道其後帝以定陶王有材藝欲立為嗣賴侍中史丹輔助太子得無廢中興上嗣明章濟濟俱達時政咸通經禮極至情於敬愛惇友于於兄弟是以固東海之遺堂因西周之繼體光武為漢中興之君太子莊是為明帝號顯宗明帝太子炟是為章帝號肅宗東海王明帝之兄極相友愛史贊顯宗丕承業業兢兢危心恭徳政察姦勝肅宗濟濟天性豈弟於穆后徳諒惟淵體五官在魏無聞徳音或受譏於妲己且自悦於從禽雖才高而學富竟取累於荒淫累去聲魏文帝姓曹名丕初為五官中郎將見袁熈妻甄氏美而悦之太祖為之聘焉及受漢禪嘗出射雉謂羣臣曰射雉樂哉辛毗對曰於陛下甚樂於羣臣甚苦暨貽厥於明皇搆崇基於三世得秦帝之奢侈亞漢武之才藝遂驅役於羣臣亦無救於凋弊明皇名叡魏文帝太子也嗣帝位侍中劉曄稱之曰秦始皇漢孝武之儔才具㣲不及耳景初元年起土山於芳林園使公卿羣僚皆負土栽木於其上捕禽驅獸於其中羣臣皆面目垢黒由是百姓凋弊四海分崩中撫寛愛相表多奇重桃符而致惑納鉅鹿之明規竟能掃江表之氛穢舉要荒而見覊相去聲要音腰晉武帝姓司馬名炎晉王昭之子也仕魏為中撫軍桃符武帝弟齊王攸之小名也初晉王欲以攸為世子何曾裴秀曰中撫軍聰明神武人望既茂天表如此固非人臣之相也晉王由是意定立炎為世子嗣晉王位受魏禪國號晉惠處東朝察其遺跡在聖徳其如初實御床之可惜處上聲晉惠帝名衷武帝第三子東朝為太子時也是時朝野咸知太子昏愚不堪為嗣尚書令衛瓘欲陳啟而未敢發會侍宴凌雲臺瓘陽醉跪帝前欲言而止者三因以手撫床曰此座可惜悼愍懐之云廢遇烈風之吹沙盡性靈之狎藝亦自敗於凶邪安能奉其粢盛承此邦家粢音咨盛音成晉愍懐太子名遹惠帝長子也有令譽賈后忌之使閹官輩媚之為非於是慢㢮益彰賈后遂設計讒譛於帝廢為庶人惟聖上之慈愛訓義方於至道同論政於漢幄修致戒於京鄗音鎬地名鄙韓子之所賜晉元帝好任刑法以韓非子賜太子重經術以為寶咨政理之美惡亦文身之黼藻庶有擇於愚夫慙乞言於遺老致庶績於咸寧先得人而為盛帝堯以則哲垂謨虞書曰知人則哲能官人文王以多士興詠詩曰濟濟多士文王以寧取之於正人鑑之於靈鏡量其器能量平聲審其檢行去聲必宜度機而分職度待洛切不可違方以從政若其惑於聽受暗於知人則有道者咸屈無用者必伸讒䛕競進以求媚玩好不召而自臻好去聲直言正諌以忠信而獲罪賣官鬻獄以貨賄而見親鬻音育於是虧我王度斁我彛倫斁音妬亂也九鼎遇姦回而逺逝九鼎周之寶器周沈泗水中始皇求之不能出萬姓望撫我而歸仁此一節述任用之戒蓋造化之至育惟人靈之為貴獄訟不理有生死之異塗寃結不伸乖陰陽之和氣士之通塞屬之以深文命之修短懸之於酷吏是故帝堯畫像陳恤隱之言虞書曰象以典刑又曰惟刑之恤哉漢書唐虞畫像而民不犯注畫像者畫衣冠異章服象五刑也犯黥者皂其巾犯劓者丹其服犯宫者雜其屨大辟之罪誅殛之刑布其衣裾無領緣夏禹泣辜盡哀矜之志見封建篇注此一節述刑罰之戒因取象於大壯易大傳曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯乃峻宇而雕墻將瑶臺以瓊室桀作瑶臺紂作瓊室豈畫棟以虹梁或凌雲以遐觀世説魏作凌雲臺極精巧隨風摇動終無崩隕或通天而納凉漢武帝作神明通天之臺於林光宫髙五十丈極醉飽而形人力命痿蹷而受身殃痿音逶蹷音鱖是以言惜十家之産漢帝以昭儉而垂裕漢文帝欲作露臺召匠計之直百金帝曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為雖成百里之囿周文以子來而克昌孟子曰文王之囿方七十里此言百里者舉成數言也囿者蕃育鳥獸之所詩曰經始勿亟庶民子來經之營之不日成之此一節述營繕之戒彼嘉會而禮通重㫖酒之為徳儀狄作酒禹飲而甘之曰後世必有以酒亡國者遂疏儀狄而絶㫖酒出戰國䇿至忘歸而受祉在齊聖而温克若其酗醟以致昏酗音昫醟音詠酣怒也酖湎而成忒酖音眈湎音沔嗜飲也痛殷受與灌夫亦亡身而䘮國殷紂名受以酒為池竟亡其國漢灌夫醉酒罵坐遂誅其身是以伊尹以酣歌而作戒商書伊尹作訓曰敢有恒舞于宫酣歌于室時謂巫風周公以亂邦而貽則周書周公作誥曰越小大邦用䘮亦罔非酒此一節述甘酒之戒咨幽閑之令淑實好逑於君子好上聲逑匹也詩曰窈窕淑女君子好逑辭玉輦而割愛固班姬之所恥漢成帝遊於後庭嘗欲與班偼妤同輦辭曰觀古圗畫聖賢之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎帝善納其言而後止脱簮珥而思愆亦宣姜之為美宣姜周宣王后也王嘗晏起后乃脱纓珥待罪於永巷使傅毋通言於王曰王樂色而忘徳失禮而晏起亂之興自婢子始敢請罪王曰寡人不徳實自生過非夫人之罪也自是勤於政事早朝晏罷卒成中興之主乃有禍晉之驪姬晉獻公伐驪戎獲驪姬愛之生奚齊公有子八人惟太子申生重耳夷吾賢驪姬佯譽太子而陰令人譛之欲立其子太子自殺又譛二公子於是重耳走蒲夷吾走屈竟以亂晉䘮周之褒姒周幽王嬖愛褒姒生子伯服王竟廢申后及太子宜臼以褒姒為后伯服為太子後因取褒姒笑失信於諸侯西夷犬戎殺王驪山下虜褒姒盡取周賂而去盡妖妍於圖畫極凶悖於人理傾城傾國思昭示於後王麗質冶容宜永鑒於前史此一節述色荒之戒復有蒐狩之禮蒐音捜禮春曰蒐田冬曰狩田馳射之塲不節之以正義必自致於禽荒匪外形之疲極亦中心而發狂老子曰馳騁田獵令人心發狂夫髙深不懼夫音扶胥靡之徒韝緤為娱小豎之事韝音鈎鷹㡌也緤音懾所以繫犬者以宗社之崇重持先王之名器與鷹犬而並驅凌艱險而逸轡馬有衘橛之理橛音厥相如諫獵書時有衘橛之變獸駭不存之地猶有靦於獲多靦音腆慙也獨無情而内愧此一節述禽荒之戒以小臣之愚鄙忝不貲之恩榮擢無庸於草澤齒陋質於簮纓遇大道行而兩儀泰喜元良㑹而萬國貞以監府之多暇毎講論而肅成仰惟神之敏速歎將聖之聰明自禮賢於秋實足歸道於春卿芳年淑景時和氣清華殿邃兮簾幃静灌木森兮風雲輕花飄香兮動笑日嬌鸎囀兮相哀嗚以物華之繁靡尚絶思於將迎思去聲猶允蹈而不倦極躭翫以研精命庸才以載筆謝摛藻於天庭異洞簫之娛侍漢元帝為太子時好吹洞簫自度聲被歌調王褒上洞簫賦乃令後宫貴人皆誦讀之殊飛盖之緣情魏文帝為世子時曹植賦詩曰清夜遊西園飛蓋相追随闕雅言以贊徳思報恩以輕生敢下拜而稽首願永樹於風聲奉皇靈之遐壽冠振古之鴻名冠去聲太宗見而遣使去聲謂百藥曰朕於皇太子處見卿所作賦述古來儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事為去聲大稱所委稱去聲但須善始令終耳因賜廐馬一匹綵物三百叚愚按此東宫毓徳之初羣工贊善之始承乾頗留意典墳然燕間之後嬉戲無度昔賈誼言輔翼太子有曰少成若天性習慣如自然蓋愛子教之以義方亦孰不欲教之於其初其後乃爾相逺耶夫子所謂下愚不移者乎抑所以輔翼之具有未至乎然肅觀李百藥贊道賦一篇歴述秦漢魏晉以來儲貳之善惡與夫任賢去邪之道明刑愼罰之方峻宇雕墻甘酒嗜音内作色荒外作禽荒之戒莫不畢具事實切當文辭流麗光輔前星者足為典訓也貞觀中太子承乾數虧禮度數音朔侈縱日甚太子左庶子于志寜撰諫苑二十卷諷之是時太子右庶子孔穎達字仲達翼州人八歲就學日記千餘言隋世舉明經髙第貞觀初數進忠言為右庶子嘗撰五經義疏號為詳博毎犯顔進諌承乾乳母遂安夫人謂穎達曰太子長成長音掌何宜屢得面折對曰䝉國厚恩死無所恨諫諍愈切承乾令撰令平聲孝經義疏頴達又因文見意愈廣規諌之道太宗並嘉納之二人各賜帛五百匹黄金一斤以勵承乾之意按史傳各賜帛百匹黄金十斤愚按于志寧撰諫苑以形匡救之益孔頴逹疏經義以廣規諫之道太宗又賜賚二臣以寓激勵之意君父師友之責盡矣是時承乾雖虧禮侈縱而於文史規誨猶未咈拒毋亦不難於知而難於行耶貞觀十三年太子右庶子張𤣥素以承乾頗以遊畋廢學上書諫曰臣聞皇天無親惟徳是輔周書蔡仲之命之辭茍違天道人神同棄然古三驅之禮非欲教殺將為百姓除害為去聲故湯羅一面天下歸仁湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及禽獸今苑内娛獵雖名異遊畋若行之無恒終虧雅度且傅説曰學不師古匪説攸聞説音悦商書傅説告髙宗之辭然則𢎞道在於學古學古必資師訓既奉恩詔令孔頴達侍講令平聲後同望數存顧問數音朔後同以補萬一仍博選有名行學士行去聲兼朝夕侍奉覽聖人之遺敎察既往之行事日知其所不足月無忘其所能此則盡善盡美夏啟周誦焉足言哉焉於䖍切夫為人上者夫音扶未有不求其善但以性不勝情勝平聲後同耽惑成亂耽惑既甚忠言盡塞所以臣下茍順君道漸虧古人有言勿以小惡而不去上聲小善而不為故知禍福之來皆起於漸殿下地居儲貳當須廣樹嘉猷既有好畋之淫好去聲後同何以主斯匕鬯慎終如始猶恐漸衰始尚不慎終將安保承乾不納𤣥素又上書諫曰臣聞稱皇子入學而齒胄者欲令太子知君臣父子尊卑長幼之道長音掌後同見教誡篇註然君臣之義父子之親尊卑之序長幼之節用之方寸之内𢎞之四海之外者皆因行以逺聞假言以光被伏惟殿下睿質已隆尚湏學文以飾其表竊見孔頴達趙𢎞智等非惟宿徳鴻儒亦兼達政要望令數得侍講開釋物理覽古論今増輝睿徳至如騎射畋遊酣歌妓翫茍悦耳目終穢心神漸染既乆漸音尖必移情性古人有言心為萬事主動而無節即亂恐殿下敗徳之源在於此矣承乾覽書愈怒謂𤣥素曰庶子患風狂耶十四年太宗知𤣥素在東宫頻有進諫擢授銀青榮禄大夫行太子左庶子時承乾嘗於宫中擊鼓聲聞於外聞去聲𤣥素叩閤請見音現極言切諫乃出宫内鼔對𤣥素毁之遣戸奴伺𤣥素早朝音潮陰以馬檛擊之檛音查殆至於死是時承乾好營造亭觀去聲窮極奢侈費用日廣𤣥素上書諫曰臣以愚蔽竊位兩宫在臣有江海之潤於國無秋毫之益是用必竭愚誠思盡臣節者也伏惟儲君之寄荷戴殊重荷上聲如其積徳不𢎞何以嗣守成業聖上以殿下親則父子事兼家國所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下惟聚工匠望苑之内不覩賢良今言孝敬則闕侍膳問豎之禮語恭順則違君父慈訓之方求風聲則無學古好道之實觀舉措則有因緣誅戮之罪宫臣正士未嘗在側羣邪淫巧昵近深宫愛好者皆遊伎雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱宻寧可勝計哉勝平聲宣猷禁門不異闤闠上音環下音㑹朝入暮出惡聲漸逺右庶子趙𢎞智經明行修行去聲當今善士臣毎請望數召進與之談論庶廣徽猷令㫖反有猜嫌謂臣妄相推引從善如流尚恐不逮飾非拒諫必是招損古人云苦藥利病苦口利行伏願居安思危日慎一日書入承乾大怒遣刺客將加屠害俄屬宫廢按後一書通鑑係十三年詔自今皇太子出用庫物所司勿為限制於是太子發取無度故𤣥素上疏十七年承乾廢胡氏寅曰周官有王及后世子不會之文以愚度之莫尊於王次曰后次曰世子用物不㑹是尊貴之故得肆為費侈豈節以制度自家刑國之道哉正使周官饍夫酒正内府有此文然冢宰之職量入為出得以九式均節財用則雖曰不會而會在其中特不使有司以法沮止若自下而制上耳太宗之詔太子於是大失諸賢在朝不聞以為不可獨張𤣥素止於末流幾於被害豈非君臣之交失乎唐氏仲友曰太宗於𤣥素可謂不察矣𤣥素力諌太子至于一再至于三四承乾諱其切至遣户奴檛擊遣刺客伺之其脱死者幸矣乃與他宫僚同坐至除名為民起為刺史訖不復親近太宗於此刑濫害及善人矣可不悲哉事與于志寧同而賞罰異太宗何所見而然耶愚按隋太子勇唐太子承乾皆以罪廢雖二人不肖有以自取亦文帝太宗所以處之失其道也何也文帝既立勇為太子而復寵待煬帝太宗既立承乾為太子而復寵待魏王煬帝攘奪於其初魏王效尤於其後承乾目覩庶人勇之禍故為是不得已之邪謀向使太宗於太子諸王之間早有定分則承乾雖不肖不至如是之甚也今既不能消其不平之忿乃賞擢張𤣥素子志寧之流使救正於言語章疏之末果何益之有哉貞觀十四年太子詹事唐制東宫置詹事府掌統三寺十率府之政于志寧以太子承乾廣造宫室奢侈過度躭好聲樂好去聲上書諫曰臣聞克儉節用實𢎞道之源崇侈恣情乃敗徳之本是以凌雲槩日戎人於是致譏秦繆公夸示宫室之盛為西戎由余所笑詳見納諌篇註峻宇雕墻夏書以之作誡五子之歌曰甘酒嗜音峻宇雕墻有一於此未或不亡昔趙盾匡晉盾晉靈公大夫即趙宣子也呂望師周望太公也為周太師或勸之以節財或諫之以厚歛去聲莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聽咸著簡䇿用為美談且今所居東宫隋日營建覩之者尚譏甚侈見之者猶歎甚華何容於此中更有修造財帛日費土木不停窮斤斧之工極磨礱之妙且丁匠官奴入内比者比音鼻曾無復監曾音層此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿緣其身槌杵在其手監門本防非慮監平聲宿衛以備不虞直長既自不知長音掌直長官名千牛又復不見千牛官名見納諫篇註爪牙在外厮役在内所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲鄭衛二國名樂記曰鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也昔朝歌之鄉迴車者墨翟朝音昭翟音狄朝歌殷之邑名漢書鄒陽書曰邑號朝歌墨子回車夾谷之會揮劍者孔丘夾谷魯地名家語曰定公與齊侯會于夾谷孔子攝相事齊使萊人以兵刼定公孔子厯階而進以公退曰裔不謀夏夷不亂華俘不干盟兵不偪好齊侯心怍麾而避之齊奏樂俳優侏儒戲於前孔子曰匹夫熒惑侮諸侯者罪應誅於是斬侏儒齊侯懼有慙色先聖既以為非通賢將以為失頃聞宫内屢有鼓聲大樂伎兒入便不出聞之者股栗言之者心戰往年口勅伏請重尋重去聲聖㫖殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宫闕已積歲時犬馬尚解識恩解音懈木石猶能知感臣所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤㫖則臣是罪人但悦意取容臧孫方以疾疢犯顔逆耳春秋比之藥石臧孫魯大夫名紇即臧武仲也左傳襄公三十三年臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多伏願停工巧之作罷乆役之人絶鄭衛之音斥羣小之輩則三善允備萬國作貞矣承乾覽書不悅十五年承乾以務農之時召駕士等役不許分畨人懷怨苦又私引突厥羣豎入宫志寧上書諌曰臣聞上天蓋髙日月光其徳明君至聖輔佐贊其功是以周誦升儲見匡毛畢毛叔鄭畢公周之輔臣漢盈居震取資黄綺見定分篇注姬旦抗法於伯禽姬周之姓旦周公之名伯禽周公子也禮曰成王幼不能涖阼周公相踐阼而治抗世子法於伯禽成王有過則撻伯禽所以示成王世子之道也賈生陳事於文帝賈生即賈誼也見納諫篇注咸殷勤於端士皆懇切於正人厯代賢君莫不丁寧於太子者良以地膺上嗣位處儲君處上聲後同善則率土霑其恩惡則海内罹其禍近聞僕寺司馭駕士獸醫始自春初迄兹夏晚常居内役不放分畨或家有尊親闕於溫凊禮記曰子之事父母冬溫而夏凊或室有幼弱絶於撫養春既廢其耕墾夏又妨其播殖事乖存育恐致怨嗟儻聞天聽後悔何及又突厥達哥支等咸是人面獸心豈得以禮義期不可以仁信待心則未識於忠孝言則莫辯其是非近之有損於英聲昵之無益於盛徳引之入閤人皆驚駭豈臣庸識獨用不安殿下必須上副至尊聖情下允黎元本望不可輕微惡而不避無容略小善而不為理敦杜漸之方須有防萌之術屏退不肖狎近賢良如此則善道日隆徳音自逺承乾大怒遣刺客張師政紇干承基紇音鶻紇干虜複姓就舍殺之是時丁母憂起復為詹事二人潛入其第見志寧寢處苫廬禮居父母之䘮者寢苫枕塊竟不忍而止及承乾敗太宗知其事深勉勞之勞去聲按前一書通鑑係十四年舊史曰承乾敗後推鞫具得其事太宗謂志寜曰知公數有規諫事無所隱深加勉勞右庶子令狐徳棻等以無諫書皆從貶貴胡氏寅曰詹事東宫官之尊也太子於是學為父子焉學為君臣焉于志寧不當起復太宗不當奪其䘮也人臣冇奪䘮者惟金革之事耳詹事輔導儲君以忠以孝乃從金革之例冐哀居官則何以訓太子宜太子之不納諫也雖然自太子言之從欲肆情又將殺諫臣是兩刺客之不如其不能終宜哉愚按自古臣子之事君親能盡其道者可以感發人之善心也嘗觀春秋傳晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝麑退曰不忘恭敬民之主也賊民之主不忠是宣子以敬於君而免於難也今觀承乾無道于志寧上書諌之承乾怒遣刺客張師政紇干承基殺之時志寧母憂起復二人潛入其第見寢處苫廬不忍而止是志寧以孝於親而脫於禍也之二人者庶幾無愧於鉏麑矣承乾之為曾不如刺客之有人心也然亦未聞有寢苫枕塊而仕於人之國當輔翼太子之任者太宗志寧胥失之矣貞觀政要卷四
