body:
  text: 樂善右謹依定本恭錄堂全集御製讀貞觀政要薰風何習習朱明屆長候北忩髙卧起洛誦勤時懋貞觀政要編覽罷再三復文皇治世功在漢文景右斗米值三錢太倉粟腐臭闗東暨嶺南開門夜無寇論古緬遐思治功非倖覯文貞立朝端彌縫而匡救九重亦虛已勤政夜繼晝勵精圖至治俗用臻富厚二十餘年間中外稱明后徴没明鑑昏志滿漸差謬東征無成功幸能自引咎復碑念前規厚賜撫其後猶不負初心終身無罅漏信順立丕基尚賢天所祐先哲留嘉謨後人當勉就樂善右謹依定本恭録堂全集懿徳嘉言在簡編憂勤想見廿三年燭情已自同懸鏡從諫端知勝轉圜房杜有容能讓直魏王無事不繩愆髙山景仰心何限字字香生翰墨筵乾隆丙辰君子慎言行其發乃樞機出身發乎邇千里應在兹所以古聖王左右史有司匪惟記善惡亦以謹起居叶遙遙三代下不乏為君師漢文唐太宗髙山予仰跂叶漢帝質無忝唐皇文有餘叶至今政要書炳然法則垂求賢與納諫簡編多令儀獨於觀史事不能我無疑文皇信英辟易理豈不知九皋鶴聞野榮辱應不遲詎藉金匱蔵却觀知所為遂良執簡記𫝊信恒於斯秘之不與觀固也非達宜禮云記動言非禮戒宴私不觀史何據或者其未思善哉劉洎言人君日月齊設遂良不記天下皆記之復如封宇文至唐皆進規使其記隋事筆應多詭辭豈能掩煬惡煬惡誰直書叶乾隆乙丑仲夏御製右二首謹依詩初集恭録御製題金版貞觀政要好名曽昔議文皇三代下名好亦臧言不以人廢如是書原同帝範之蘉呉兢采輯質文備梁肅鋟行勸戒詳幾度披芸欽古鑒寧徒玩紙墨精良御製右一首謹依詩二集恭錄御製題貞觀政要魏徴王珪請送葬二王事上表明陳送寢園豈非不忘舊君恩舊君若問辰嬴事死後將何對九原徴珪平日皆自命敢言者也雖太宗欲立楊氏為后徴進言乃止然此事豈待立后始為失徳哉既為太宗之累亦無以對海陵則上表欲送息隠海陵之葬不過為名之舉耳故詩以刺之御製右一首謹依詩三集恭錄欽定四庫全書史部五貞觀政要雜史類提要臣等謹按貞觀政要十卷唐吳兢撰兢汴州浚儀人以魏元忠薦直史館累官太子左庶子貶荆州司馬厯洪舒二州刺史入為恒王傅天寳初年八十卒事蹟具唐書本傳宋中興書目稱兢于太宗實録外采其與羣臣問答之語作為此書用偹觀戒總四十篇新唐書著録十卷均與今本合考舊唐書曹確傳載確奏臣覽貞觀故事太宗初定官品云云其文與此書擇官篇第一條相同而唐志所録别無貞觀故事豈即此書之别名歟其書在當時嘗經表進而不著年月惟兢自序所稱侍中安陽公者乃源乾曜中書令河東公者乃張嘉貞考元宗本紀乾曜為侍中嘉貞為中書令皆在開元八年則兢成此書又在八年以後矣書中所記太宗事蹟以唐書通鑑參考亦頗見牴牾如新舊唐書載太宗作威鳯賦賜長孫無忌而此作賜房元齡通鑑載張藴古以救李好徳被誅而此謂其與囚戲博漏洩帝㫖事状迴異又通鑑載皇甫徳參上書賜絹二十四匹拜監察御史而此但作賜帛二十段又通鑑載宗室諸王降封由封徳彛之奏貞觀初放宫人由李百藥之奏而此則謂出于太宗獨斷俱小有異同史稱兢叙事簡核號良史而晚節稍疎牾此書盖出其耄年之筆故不能盡免滲漏然太宗為一代令辟其良法善政嘉言􅍇行臚具是編洵足以資法鑒前代經筵進講每多及之故中興書目稱厯代寳傳至今無闕伏讀皇上御製樂善堂集開卷首篇即邀褒詠千年舊籍榮荷表章則是書之有裨治道亦概可見矣書中之註為元至順四年臨川戈直所作又採唐栁芳晉劉昫宋宋祁孫甫歐陽脩曽鞏司馬光孫洙范祖禹馬存朱黼張九成胡寅吕祖謙唐仲友葉適林之竒真徳秀陳惇修尹起莘程竒及吕氏通鑑精義二十二家之説附之名曰集論吳澄郭思貞皆為之序直字伯敬即澄之門人也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀明憲宗貞觀政要序朕惟三代而後治功莫盛於唐而唐三百年間尤莫若貞觀之盛誠以太宗克已勵精圖治於其上而羣臣如魏徵輩感其知遇之隆相與獻可替否以輔治於下君明臣良其獨盛也宜矣厥後史臣吳兢采其故實編類為十卷名曰貞觀政要有元儒士臨川戈直復加考訂註釋附載諸儒論說以暢其義而當時大儒吳澄又為之題辭以為世不可無其信然也朕萬幾之暇銳情經史偶及是編喜其君有任賢納諫之美臣有輔君進諫之忠其論治亂興亡利害得失明白切要可為鑒戒朕甚嘉尚焉顧傳刻嵗久字多訛謬因命儒臣重訂正之刻梓以永其傳於戲太宗在唐為一代英明之君其濟世康民偉有成烈卓乎不可及已所可惜者正心修身有愧於二帝三王之道而治未純也朕將逺師往聖允廸大猷以宏至治固不專於是編然而嘉尚之者以其可為行逺登髙之助也序于篇端讀者鑒焉成化元年八月初一日夏有天下四百五十餘年商有天下六百三十餘年周有天下八百六十餘年三代以後享國之久唯漢與唐唐之可稱者三君而已太宗文皇帝身兼創業守成之事納諫求治勵精不倦其效至于米㪷三錢外户不閉故貞觀之盛有非開元元和之所可及而太宗卓然為唐三宗之冠史臣吳兢類輯朝廷之設施君臣之問對忠賢之諍議萃成十卷曰貞觀政要事覈辭質讀者易曉唐之子孫奉為祖訓聖世亦重其書澄備位經筵時嘗以是進講焉夫過唐者漢孝文之恭儉愛民可鏡也超漢者夏大禹之好善言惡㫖酒可規也繼夏者商成湯之不邇聲色不殖貨利可師法也周監二代郁郁乎文文武之徳旦奭之猷具載二南二雅周頌之詩召誥立政無逸之書義理昭融教戒深切率而由之其不上躋泰和景運之隆乎然譬之行逺必自邇譬之登髙必自卑則貞觀政要之書何可無也庶士戈直考訂音釋附以諸儒論說又足開廣將来進講此書者之視聽其所裨益豈少哉前翰林學士資善大夫知制誥同修國史吳澄題辭二帝三王之治後世莫能及者順人之道盡乎仁義也唐太宗以英武之資克敵如拉朽所向無前天下甫定魏鄭公力排封徳彛之繆以仁義進雖太宗未能允廸其實有愧於修齊然四年之間内安外服貞觀之治亦仁義之明效歟史臣吳兢類為政要凡命令政教敷奏復逆詢謀之同謇諤之異所以植國體而裕民生者赫赫若前日事江右戈直集前賢之論以釋之翰林草廬吳公叙其首以屬於余值拜奎章召命道廣陵謀於憲使日新程公將有以廣其傳也程公慨然即以學廩之羨鋟諸梓嗚呼仁義之心亘古今而無間因其所已然勉其所未至以進輔於聖朝則二帝三王之治特由此而推之耳觀是編者尚朂之哉至順四年嵗在癸酉正月辛夘前中奉大夫江南諸道行御史臺侍御史奎章閣大學士郭思貞書貞觀政要者唐太宗文皇帝之嘉言善行良法美政而史臣吳兢編類之書也自唐世子孫既已書之屏帷銘之几案祖述而憲章之矣至於後世之君亦莫不列之講讀形之論議景仰而傚法焉夫二帝三王之事尚矣兩漢之賢君六七作何貞觀之政獨赫然耳目之間哉葢兩漢之時世已逺貞觀之去今猶近遷固之文髙古爾雅而所紀之事畧吳氏之文質樸該贍而所紀之事詳是則太宗之事章章較著於天下後世者豈非此書之力哉夫太宗之於正心修身之道齊家明倫之方誠有愧於二帝三王之事矣然其屈已而納諫任賢而使能恭儉而節用寛厚而愛民亦三代而下絶無而僅有者也後之人君擇其善者而從之其不善者而改之豈不交有所益乎惜乎是書傳寫謬誤竊嘗會萃衆本參互考訂而其義之難明音之難通字為之釋句為之述章之不當分者合之不當合者分之自唐以来諸儒之論莫不采而輯之間亦斷以已意附於其後然後此書之㫖頗為明白雖於先儒窮理之學不敢妄議然於國家致治之方未必無小補云後學臨川戈直謹書貞觀政要原序有唐良相曰侍中安陽公中書令河東公以時逢聖明位居宰輔寅亮帝道弼諧王政恐一物之乖所慮四維之不張每克已勵精緬懷故實未嘗有乏太宗時政化良足可觀振古而来未之有也至於垂世立教之美典謨諫奏之詞可以𢎞闡大猷增崇至道者爰命不才備加甄録體制大畧咸發成規於是綴集所聞㕘詳舊史撮其指要舉其宏綱詞兼質文義在懲勸人倫之紀備矣軍國之政存焉凡一帙一十卷合四十篇名曰貞觀政要庶乎有國有家者克遵前軌擇善而從則可久之業益彰矣可大之功尤著矣豈必祖述堯舜憲章文武而已哉其篇目次第列之于左唐衛尉少卿兼修國史修文舘學士吳兢撰按兢汴州浚儀人少厲志貫知經史方直寡諧惟與魏元忠朱敬則游唐長安中二人者當道薦兢才堪論撰詔直史舘修國史神龍中為右補闕累遷衛尉少卿兼修文舘學士復修史於是采摭太宗朝政事之要隨事載録以備勸戒合四十篇上之名曰貞觀政要開元中為太子左庶子又嘗私撰唐書唐春秋兢居官多忠諫敘事簡核有古良史之風嘗撰則天實録直筆無諱當世謂今董狐云欽定四庫全書史部五貞觀政要目録雜史類卷一論君道第一論政體第二卷二論任賢第三論求諫第四論納諌第五卷三論君臣鑒戒第六論擇官第七論封建第八卷四論太子諸王定分第九論尊敬師傅第十論教戒太子諸王第十一論規諌太子第十二卷五論仁義第十三論忠義第十四論孝友第十五論公平第十六論誠信第十七卷六論儉約第十八論謙讓第十九論仁惻第二十慎所好第二十一慎言語第二十二杜讒邪第二十三論悔過第二十四論奢縱第二十五論貪鄙第二十六卷七崇儒學第二十七論文史第二十八論禮樂第二十九卷八論務農第三十論刑法第三十一論赦令第三十二論貢賦第三十三辨興亡第三十四卷九議征伐第三十五議安邊第三十六卷十論行幸第三十七論畋獵第三十八論災祥第三十九論慎終第四十欽定四庫全書貞觀政要卷一唐吳兢撰元戈直集論愚按貞觀者唐太宗表年之號也易大𫝊曰天地之道貞觀者也猶言天地之文理主於正以示人也政要者唐史臣吳兢類輯貞觀間君臣之嘉言善行良法美政之大要也唐史本紀曰太宗姓李氏諱世民隴西成紀人為凉武昭王八世孫髙祖次子也母曰太穆皇后竇氏生而不驚方四嵗有書生謁髙祖曰公貴人也必有貴子及見太宗曰龍鳳之姿天日之表其年㡬冠必能濟世安民書生既去乃采其語名之曰世民及長聰明英武有大志能屈節下士結納豪傑佐髙祖以定天下之亂功業日隆隋義寧元年髙祖以唐王受隋禪國號唐明年改元武徳封世民為秦王九年立秦王世民為皇太子聼政是年八月即皇帝位明年改元貞觀在位凡二十三年為一代之賢君其言行之美政治之盛與夫任賢使能之方從諫樂善之道大畧皆聚此書也後文宗讀此慨然慕之故太和初
