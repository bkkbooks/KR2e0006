front:
  text: 欽定四庫全書御製貞觀政要序夫三代以上君明臣良天下雍熙世登上理自東遷以降風俗日薄天下無復熙皥之美雖有質美之主望治甚切而所以屈已從諫力行善政者終不能有以震古而鑠今及唐貞觀太宗以英武之資能用賢良之士時若房元齡杜如晦魏徴王珪諸人布列左右相得益彰蓋自三代以下能用賢納諫而治天下者未有如此之盛焉史臣呉兢纂輯其書名之曰貞觀政要後之求治者或列之屏風或取以進講元至順間戈直又刋其書以行于世余嘗讀其書想其時未嘗不三復而歎曰貞觀之治盛矣然其所以致治則又在於用此數賢而數賢之中又推魏徴禆益為多然魏徴不能自必信用於太宗以見其功業則又知太宗所以獨信魏徴言聴計從而見效若彼者固人君所當服膺書紳而勿失也書中分目目中有條條之末引先儒之言而論斷之其有望於後王也深矣人君當上法堯舜逺接湯武固不當以三代以下自畫然觀爾曰君臣之所以持盈保泰行仁義薄法術太宗之虚已受言諸臣之論思啟沃亦庶幾乎都俞吁咈之風矣
