  text: 貞觀政要卷第十戈直集論
  hash: sha256:44274d5ec20a77ed7679dc879dfa6ba46ee56de2af8769ee3ae97ded7e307a18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_010-1a}
body:
  text: 論行幸三十七論畋獵三十八論灾祥三十九論慎終四十行幸第三十七凡四章貞觀初太宗謂侍臣曰隋煬帝廣造宫室以肆行幸自西京至東都離宫别館相望道次乃至并州涿郡今􅃰州路􅀠腹裏無不悉然馳道皆廣數百歩種􅀣以飾其傍人力不堪相聚爲賊逮至末年尺土一人非復已有以此觀之廣宫室好行幸好去聲竟有何益此皆朕耳所聞目所見深以自誡故不敢輕用人力惟令平聲百姓安静不有怨叛而已貞觀十一年太宗幸洛陽宫泛舟于積翠池顧謂侍臣曰此宫觀臺沼觀去聲並煬帝所為所謂驅役生人窮此雕麗復不能守此一都以萬人為慮好行幸不息好去聲人所不堪昔詩人云何草不黄何日不行詩大雅何草不黄篇之辭大東小東杼軸其空詩小雅大東篇之辭正謂此也遂使天下怨叛身死國滅今其宫苑盡為我有隋氏傾覆者豈惟其君無道亦由股肱無良如宇文述虞世基裴藴之徒皆隋之臣居髙官食厚禄受人委任惟行謟佞蔽塞聦明欲令其國無危令平聲不可得也司空長孫無忌奏言隋氏之亡其君則杜塞忠讜之言臣則苟欲自全左右有過初不糾舉㓂盗滋蔓亦不實陳㨿此即不惟天道實由君臣不相匡弼太宗曰朕與卿等承其餘弊惟須弘道移風使萬世永賴矣貞觀十三年太宗謂魏徵等曰隋煬帝承文帝餘業海内殷阜􅀂能常處關中處上聲豈有傾敗遂不顧百姓行幸無期徑往江都不納董純崔象皆隋之臣等諌諍身戮國滅為天下􅀏雖復帝祚長短委以玄天而福善禍􅁋亦由人事朕毎思之􅀂欲君臣長乆國無危敗君有違失臣須極言朕聞卿等規諌縱不能當時即從再三思審必擇善而用之貞觀十二年太宗東廵狩􅀅入洛次於顯仁宫宫􅁐官司多被責罰侍中魏徴進言曰陛下今幸洛州爲是舊征行處爲去聲後爲其同庶其安定故欲加恩故老城郭之民未􅂪徳恵官司􅁐監多及罪辜或以供奉之物不精供平聲又以不爲獻食此則不思止足志在奢靡旣乖行幸本心何以副百姓所望隋主先命在下多作獻食獻食不多則有威罰上之所好去聲下必有甚競爲無限遂至滅亡此非載籍所聞陛下目所親見爲其無道故天命陛下代之當戰戰慄慄每事省納叅蹤前列昭訓子孫柰何今日欲在人之下陛下若以爲足今日不啻足矣啻音翅􅀂以爲不足萬倍於此亦不足也太宗大驚曰非公朕不聞此言自今已後庻幾無如此事㡬平聲按通鑑係十一年上至􅂋仁宫宫吏以闕諸待有􅀍譴責魏徵諌曰云云上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舎而宿今供頓如此豈得猶嫌不足乎范氐祖禹曰富而不忘貧則能保其富矣貴而不忘賤則能保其貴矣夫以萬乗之貴四海之富而猶以爲不足何哉􅁯其始之賤貧而欲大無窮也是以髙宗舊勞于外爰曁小人及其即位卒爲賢君文王卑服即康功田功周公作書以戒成王􅂲其不知稼穡之艱難而驕逸也漢文有曰朕能任衣冠念不至此是以恭儉愛民惟恐煩之鳴呼其可謂有徳者矣若太宗聞諌而能自省不亦賢乎又曰太宗可謂不忘戒矣覩隋之宫室而以謟謏掩蔽戒羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王之所由興也愚按有虞之制五載一廵守成周之盛六年一時廵肆覲群后大明黜陟恊時月正日同律度量衡無非事也其車􅀙至為簡省其供給至為儉約故民以其所行為幸所不行為不幸所謂吾王不遊吾何以休是也後世楊廣朱温廵遊不息始務豊侈其飲食美麗其行宫以供給過制為賢能以置頓不􅇱為罷軟州縣承風競為勞費於是百姓聞車馬之音見羽旄之美舉疾首蹙額而相告矣太宗親睹煬帝之禍猶以供奉不精多所責罰况其餘者乎夫古之廵幸所以徇民後之廵幸所以徇己人君欲復虞周廵守之制苟不先省其車􅀙之􅁆約其供給之儀未有不蹈隋梁之失者也畋獵第三十八凡五章秘書􅁥虞世南以太宗頗好畋獵好去聲上䟽諌曰臣聞秋獮冬狩盖惟恒典獮音蘚周禮大司馬仲秋教治兵以獮田致禽以祀祊仲冬教大閲以狩田致禽以烹烝射隼從禽備乎前誥射食亦切隼荀尹切禽也伏惟陛下因聽覧之餘辰順天道以殺伐􅀅欲摧班碎掌親御皮軒田獵之車也窮猛獸之窟穴盡逸材之林藪夷兇翦􅁀以衛黎元收革擢羽用充軍器舉旗効􅀗式遵前古然黄屋之尊金輿之貴八方之所仰徳萬國之所繫心清道而行猶戒衘橜斯盖重慎防微為社稷也為去聲是以馬卿直諌於前司馬相如字長卿漢武帝時為􅀰嘗􅀙帝獵長楊帝好自擊熊豕馳逐野獸相如上䟽諌帝􅀙之張昭變色於後張昭字子布彭城人為呉主孫權軍師權嘗乗馬射虎昭變色而諌之臣誠細微敢忘斯義且天弧星罼音畢網也所殪巳多殪音翳殺死也頒禽賜􅀗皇㤙亦溥伏願時息獵車且韜長㦸不拒蒭蕘之請降納㳙澮之流袒禓徒搏任之群下則貽範百王永光萬代太宗深嘉其言愚按傳曰春蒐夏苗秋獮冬狩皆於農􅂩以講武也王制天子無事則嵗三田周禮大閱之制獨為詳備則畋獵固古禮也何外作禽荒見於大禹之訓而不敢盤于遊田乃為文王之徳正以畋獵雖古制有因是而勞師耀武妨農害民者矣况後世萬乗之動供給之繁徴求之夥乎太宗身親行陣尅捷奏功其於遊獵固其好尚必有不遵制而病民者宜世南懇切之諌有以動上之􅆹矣谷那律魏州昌樂人貞觀中累遷國子􅀶士後􅁶課議大夫淹識群書禇遂良稱為九經庫為諌議大夫嘗從太宗出獵在途遇雨太宗問曰油衣􅀂為得不漏對曰能以瓦為之必不漏矣意欲太宗弗數遊獵數音朔大被嘉納賜帛五十叚加以金帶按通鑑此事係在髙宗永徽元年九月癸􅕀與此異而新舊唐書則同唐氏仲友曰谷那律淹識羣書禇遂良嘗稱為九經庫油衣瓦為不漏之對可見質直盖淹識之士難乎質直故三益之友得一巳善而況兼之者乎愚按家語記孔子之言曰忠臣之諌君有五義焉其五曰諷諌惟度主以行之吾􅀙其諷諌乎夫所以諷諌者假他事引援而諌者也谷那律以儒學之臣居諌議之職以瓦為衣之對雖過於質直其諷諌之謂乎太宗悅其直而賞賚之是亦􅀙諫之美也貞觀十一年太宗謂侍臣曰朕昨往懐州今懐慶路􅀠腹裏有上封事者云何為恒差山東衆丁於􅁐内營造即日徭役似不下隋時懐洛以東殘人不堪其命而田獵猶􅁆音朔驕逸之主也今者復來懐州田獵忠諌不復至洛陽矣復音􅇲四時蒐田蒐音搜春曰蒐夏曰苗秋日獮冬曰狩旣是帝王常禮今日懐州秋毫不干於百姓凡上書諌正自有常準臣貴有詞主貴能改如斯詆毁有似呪詛侍中魏徴奏稱國家開直言之路所以上封事者尤多陛下親自披閱或冀臣言可取所以僥倖之士得肆其醜臣諌其君甚須折􅂨從容諷諌從即容切漢元帝名奭嘗以酎祭宗廟酎音紂三重醸酒也味厚故以薦宗廟出便門御樓船御史大夫薛廣徳字長卿沛郡人當乘輿免冠曰宜從橋陛下不聽臣言臣自刎以頸血汙車輪汙去聲陛下不入廟矣元帝不恱光禄卿張猛進曰臣聞主聖臣直乘船危乗平聲後同就橋安聖主不乘危廣徳言可聽元帝曰曉人不當如是耶乃從橋以此而言張猛可謂直臣諌君也太宗大悅愚按魏徴不􅂑廣徳之直言而取張猛之直諌不過順太宗之意而言耳盖嘗聞先儒之言曰諌者之委曲君徳未信於人也諌者之剴切君徳巳信於人也其遜其忤言者之得失則二在人主爲進徳之驗則一而已由此觀之諌書詆毁有似詛呪此正太宗君徳信於人之驗也􅀂以張猛之諷諌為是則是以漢元之昏庸期太宗耳豈責難之道乎貞觀十四年太宗幸同州今仍舊􅀠陜西沙􅁐親格猛獸復晨出夜還音旋後同特進魏徴奏言臣聞書美文王不敢盤于遊田周書曰文王不敢􅐻于遊田以庶􅀖惟正之供傳述虞箴稱夷羿以為戒傳去聲左傳魏綘告晉矦曰昔虞人之箴曰在帝夷羿冐于原獸虞箴如是可不懲乎昔漢文臨峻坂欲馳下􅀽盎楚人漢文帝時為中􅀰將􅄃㘘曰聖主不乗危乗平聲不徼幸今陛下騁六飛馬名馳不測之山如有馬驚車敗陛下縦欲自輕柰髙廟何文帝􅀙覇陵上欲西馳下峻坂􅀽盎諌帝曰􅀅軍怯邪盎曰臣聞千金之子不垂堂百金之子不􅀝衡云云帝乃止孝武好格猛獸好去聲後同相如進諌力稱烏􅀗秦武王力士舉龍文鼎者捷言慶忌吴王僚之子射能捷矢人誠有之獸亦宜然猝遇逸材之獸駭不存之地雖烏􅀗逄􅂪之伎逄音龐逄􅂪古之善射者不得用而枯木朽株盡為難矣雖萬全而無患然而本非天子所宜事見首章注孝元帝郊泰畤郊祀之壇曰畤因留射獵薛廣徳字長卿沛郡人時為長信少府御史大大稱􅀼見關東困極百姓離災今日撞亡秦之鍾歌鄭衛之樂士卒暴露從官勞倦從去聲欲安宗廟社稷何慿河􅁀虎未之戒也臣􅀼思此數帝心豈木石獨不好馳騁之樂音洛後同而割情屈巳從臣下之言者志存為國為去聲後同不為身也臣伏聞車駕近出親格猛獸晨徃夜還以萬乘之尊闇行荒野踐深林􅍱豊草甚非萬全之計願陛下割私情之娯罷格獸之樂上爲宗廟社稷下慰群寮兆庶太宗曰昨日之事偶属塵昏非故然也自今深用爲誡愚按魏徵諌獵之辭援古􅁥今惓惓忠篤比虞世南奏䟽尤爲墾至切到足以儆動其君之聽塵皆之語太宗烏得不爲之感悟哉若魏徴者可謂能引君於道矣貞觀十四年冬十月太宗􅀅幸櫟陽櫟音藥櫟陽今爲咸寧縣屬奉元路遊畋縣丞劉仁軌字正則汴州人初爲陳倉尉部人魯寜爲折衝都尉豪縦犯法縣莫敢屈仁􅁤榜殺之太宗召詰責仁軌曰寜辱臣臣故殺之帝以爲剛直擢咸陽丞累遷給事中武后時拜僕射以收穫未畢非人君順動之時詣行所上表切諫太宗遂罷獵擢拜仁􅁤新安令新安縣名今仍舊􅀠河南府路按史􅀓太宗校獵同州仁􅁤諌曰今兹澍澤霑足百穀熾茂􅀵􅂊十二常日贅調巳有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使埸圃畢勞陛下六飛徐驅公私交泰上璽書褒納拜新安令愚按劉仁􅁤一縣丞耳而能效一言之忠動萬乗之聽其忠君愛民之心有侍􅀙之臣所未能者可不謂難乎哉盖仁􅁤嘗為陳倉尉太宗以其剛直擢咸陽丞則其受知於太宗有由来矣然非太宗有􅀙諌之美樂善之誠則仁􅁤雖有剛直之操􅀅安所施哉適足以􅀗罪而已矣仁􅁤官由州縣而致宰相善致聲譽得吏民懽心為史傳所稱美出宰百里者可不知所效法邪災祥第三十九凡四章貞觀六年太宗謂侍臣曰朕比見衆議比音鼻以祥瑞為美事頻有表賀慶如朕本心但使天下太平家給人足雖無祥瑞亦可比徳於堯舜􅀂百姓不足夷狄内侵縱有芝草徧街衢鳯凰巢􅁐囿亦何異於桀紂嘗聞石勒時石勒上黨匈奴人晉元帝時據襄國稱帝是為後趙有郡吏燃連理木煑白雉肉喫豈得稱為明主耶又隋文帝深愛祥瑞遣秘書􅁥王劭著衣冠在朝堂對考使去聲焚香讀皇隋感瑞經隋文帝好機祥小􅁆王劭言上受命符瑞甚衆又採歌謡圖䜟佛經文字曲加誣餙􅁧皇隋靈感志三十卷上令宣示天下劭集諸州朝集使盥手焚香閉目讀之曲折有聲如歌詠經旬朔始徧上益喜賞賜優洽舊嘗見􅀓􅀃此事實以為可􅀏夫為人君夫音扶當須至公理天下以得萬姓之懽心􅀂堯舜在上百姓敬之如天地愛之如父母動作興事人皆樂之樂音洛發號施令施平聲人皆恱之此是大祥瑞也自此後諸州所有祥瑞並不用申奏按通鑑係貞觀二年又曰嘗有白鵲搆巢於􅃦殿槐上合歡如腰鼓左右稱賀上曰我嘗􅀏隋煬帝好祥瑞瑞在得賢此何足賀命毁其巢於野外愚按聖人之作春秋也祥瑞不書惟災異書豈無意哉夫春秋二百四十二年之間豈無祥瑞而不書而有年大有年之書兩見於經盖聖人特筆也太宗以聦明之資克勤于政不以祥瑞為祥瑞而以堯舜之政化為大祥瑞豈無見而然哉嘗觀文公朱子通鑑綱目貞觀一代皆不見祥瑞之書惟貞觀四年以大有年書錄其外户不閉家給人足斗米三錢之美斯祥瑞之大者歟然則太宗之為此言也非苟言之實􅁢蹈之矣貞觀八年隴右山崩大蛇屢見音現後同山東及江淮多大水太宗以問侍臣秘書􅁥虞世南對曰春秋時梁山崩梁山晉地晉矦召伯宗而問焉晉侯景公名孺伯宗晉大夫對曰國主山川故山崩川竭君爲之不舉樂降服乘縵乗平聲縵音漫謂乗車之無餙文者祝幣以禮焉梁山晉所主也晉侯從之故得無害事見左傳成公五年漢文帝元年齊楚地二十九山同日崩水大出令郡國無來獻令平聲施恵於天下施平聲逺近歡洽亦不爲灾後漢靈帝時青蛇見御座晉恵帝時大蛇長三百歩見齊地經市入朝按蛇宜在草野而入市朝所以爲恠耳今蛇見山澤盖深山大澤必有龍蛇亦不足恠又山東之雨雖則其常然隂潜過乆恐有􅁈獄宜㫁省繫囚庶或當天意且妖不勝徳修徳可以銷變太宗以為然因遣使者使去聲賑恤飢餒申理􅁈訟多所原宥貞觀八年有彗星見于南方彗徐醉切見音現後同彗星妖星也其状如箒長六丈一作六尺經百餘日乃滅太宗謂侍臣曰天見彗星由朕之不徳政有虧失是何妖也虞世南對曰昔齊景公名杵臼時彗星見公問晏子晏嬰也晏子對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星為公戒耳景公懼而修徳後十六日而星没十六一作十三陛下􅀂徳政不修雖麟鳯􅁆見數音朔終是無益但使朝無闕政百姓安樂音洛雖有災變何損於徳願陛下勿以功髙古人而自矜大勿以太平漸乆而自驕逸􅀂能終始如一彗見未足為憂太宗曰吾之理國良無景公之過但朕年十八便為經綸王業便為之為去聲後同北剪劉武周西平薛舉東擒竇建徳王世充二十四而天下定二十九而居大位四夷降伏降音杭海内乂安自謂古來英雄撥􅅍之主無見及者頗有自矜之意此吾之過也上天見變良為是乎秦始皇平六國隋煬帝富有四海旣驕且逸一朝而敗吾亦何得自驕也言念於此不覺􅅥焉震懼魏徴進曰臣聞自古帝王未有無災變者但能修徳災變自銷陛下因有天變遂能戒懼反覆思量平聲深自尅責雖有此變必不為災也唐氏仲友曰世南對山壊蛇見大水恐有􅁈獄枉繫亦未足以應天變矣詩曰維虺維蛇女子之祥唐之女禍其兆先見於此世南名愽學非不知此顧太宗無女寵之溺無迹可言然獨不能援詩以為􅀃􅂑證於漢靈晉恵乎乃曰蛇見山澤適其所居以世南之忠直無以發太宗儆懼之意惜哉又曰世南論彗星戒驕矜此最中太宗之病較諸省録纍囚之論大小殊矣愚按昔劉向五行傅某事失則某咎徵應􅀃者以為鑿春秋所書災異傅者亦推迹未來之事應之􅀃者以為拘且妖由人興天事恒象人君惟當恐懼修省以銷其變固難盡信滛巫瞽史之所推測也夫蛇虺固女子之祥也春秋之世晉有蛇自泉宫出鄭則内蛇與外蛇闘於門之外固不見為女禍也唐髙宗昏惑溺愛遂啓女后專政卒應大蛇之妖彗所以除舊布新也春秋之世魯有星孛齊有彗星固不見有所除布也唐武后肆其凶毒㡬易唐祚卒應彗星之異茲二者皆見於貞觀之八年極盛之時也天心仁愛儆戒之意早已見矣天人之際良可畏哉貞觀十一年大雨榖水溢衝洛城門入洛陽宫平地五尺毁宫寺十九所漂七百餘家太宗謂侍臣曰朕之不徳皇天降災􅀅由視聽弗明刑罰失度遂使隂陽舛謬雨水乖常矜物罪已載懐憂􅅥朕又何情獨甘滋味可令尚食令平聲尚食掌御膳之官㫁肉料進􅂼食文武百官各上封事極言得失中書侍郎岑文本上封事曰臣聞開撥亂之業其功旣難守已成之基其道不易以鼓切故居安思危所以定其業也有始有卒子聿勿所以崇其基也今雖億兆乂安方隅寜謐音宻旣承喪亂之後又接凋弊之餘户口减損尚多田疇墾闢猶少覆燾之恩著矣而瘡痍未復徳教之風被矣而資産屢空去聲是以古人譬之種􅀣年祀綿逺則枝葉扶踈􅀂種之日淺根本未固雖壅之以黒墳上聲暖之以春日一人摇之必致枯槁今之百姓頗􅀋於此常加含養則日就滋息暫有征役則随日凋耗凋耗旣甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道人叛之故可畏孔安國釋虞書之辭仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之􅈒王雖休勿休日慎一日者良為此也為去聲伏惟陛下覧古今之事察安危之機上以社稷為重下以億兆在念明選舉慎賞罰進賢才退不肖聞過即改從諌如流為善在於不疑出令期於必信頥神養性省遊畋之娯去奢從儉去上聲減工役之費務静方内而不求闢土載櫜􅃓矢而不忘武備櫜音臯蔵也凢此􅁆者雖為國之恒道陛下之所常行臣之愚昧惟願陛下思而不怠則至道之美與三五比􅂭三五三皇五帝也億載之祚與天地長乆雖使桑榖為妖史記商亳為祥桑榖共生於朝一暮大拱帝大戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕歟帝其修徳大戊從之祥桑枯死而去龍蛇作孽五行傳曰皇之不極是為不建厥咎眊厥極弱時則有龍蛇之孽雉雊於鼎耳史記商紀武丁􅀕成湯明日有飛雉登鼎耳而呴武丁懼祖已曰王勿憂先修政事武丁從之殷道復興石言於晉地左傳昭公八年春石言於晉猶當轉禍為福變災為祥況雨水之患雨水一作水旱隂陽恒理豈可謂天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輙陳狂􅎩伏待斧􅃏太宗深納其言養當作食出文子愚按䧏水儆予帝舜所以畏天省已也六事自責成湯所以反躬致戒也太宗之言雖未能一出於誠亦庶㡬乎舜湯之遺意矣惜乎岑文本之論皆非所以戒其畏天憂民之心而勉其側身修行之實也其曰隂陽恒理豈繫聖心不㡬於傲忽天戒乎豈君臣相儆之道哉慎終第四十凡七章貞觀五年太宗謂侍臣曰自古帝王亦不能常化假令内安令平聲必有外擾當今逺夷率服百穀豐稔盗賊不作内外寜静此非朕一人之力實由公等共相匡輔然安不忘危理不忘亂雖知今日無事亦須思其終始常得如此始是可貴也魏徴對曰自古已來元首股肱不能備具或時君稱聖臣即不賢或遇賢臣即無聖主今陛下明所以致理向􅀂直有賢臣而君不思化亦無所益天下今雖太平臣等猶未以為喜惟願陛下居安思危孜孜不怠耳愚按昔帝舜之作歌曰股肱喜哉元首起哉百工熈哉臯陶乃􅆳載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事隳哉釋者謂舜之意以人臣樂於趍事赴功則人君之治為之興起而百官之功皆廣也臯陶之意以為君明則臣良而衆事皆安所以勸之也君行臣職則臣下􅈈怠而萬事廢所以戒之也虞廷君臣之相與責難者如此雍熈之治所以為不可及也太宗之告侍臣謂當今太平非朕一人之力皆由公等共輔須思終始如一斯言也其帝舜作歌之意乎魏徵之對則曰陛下聖明所以致理􅀂有賢臣而君不思化亦為無益是猶臯陶勸舜之意也又曰今雖太平臣未以為喜惟願陛下居安思危孜孜不怠亦猶臯陶戒舜之意也太宗能責難於其臣魏徵亦能責難於其君君臣之相責難者如此有唐虞之遺風焉是故有唐之治雖未能上躋時雍之美而貞觀之盛可謂三代而下之所罕見者矣貞觀六年太宗謂侍臣曰自古人君為善者多不能堅守其事漢髙祖泗上一亭長耳長音掌初能拯危誅暴以成帝業然更延十􅁆年縦逸之敗亦不可保何以知之孝恵為嫡嗣之重温恭仁孝而髙帝惑於愛姬之子欲行廢立見師傳篇注蕭何韓信功業旣髙蕭旣妄繫蕭何沛人漢丞相封鄼侯嘗為民請曰長安地陿上林中多空地願令民得入田髙祖怒曰相國多受賈人財物為請吾􅁐乃下何廷尉械繫􅁆日因王衛尉之言赦出之韓亦濫黜黜當作誅韓信淮隂人佐漢髙祖􅂑天下封楚王有告信欲反髙祖乃詐遊雲夢縳信至洛陽赦為淮隂侯由此怨望後復有言信反於吕后者后令蕭何紿信入后使武士縳信斬之夷信三族自餘功臣黥布之輩懼而不安至於反逆黥布姓英名布嘗坐法黥漢髙祖封淮南王及韓信彭越之誅隂聚兵候伺警急中大夫賁赫詣長安告布反髙祖自􅀅兵撃之遂殺布滅之君臣父子之間悖謬􅀂此豈非難保之明驗也朕所以不敢恃天下之安每思危亡以自戒懼用保其終愚按太宗言漢祖創業之君而廢嫡立庶濫誅功臣斯言誠是也太宗能保全功臣無濫誅之失過漢髙逺矣然不能正承乾之惡而於諸子之定分亦牽於愛而有不能自克者豈知人之明而自知之蔽􅁘貞觀九年太宗謂公卿曰朕端拱無為四夷咸服豈朕一人之所致實賴諸公之力耳當思善始令終永固鴻業子子孫孫逓相輔翼使豐功厚利施於來葉施平聲令􅁆百年後令平聲讀我國史鴻勲茂業粲然可觀豈惟稱隆周炎漢及建武光武年號永乎明帝年號故事而已哉房玄齡因進曰陛下撝挹之志推功群下致理昇平本關聖徳臣下何力之有惟願陛下有始有卒子聿切則天下永賴太宗又曰朕觀古先撥亂之主皆年踰四十惟光武年三十三但朕年十八便舉兵年二十四定天下年二十九昇為天子此則武勝於古也少從戎旅少去聲不暇讀書貞觀以來手不釋卷知風化之本見政理之源行之􅁆年天下大理而風移俗變子孝臣忠此又文過於古也昔周秦已降戎狄内侵今戎狄稽顙皆爲臣妾此又懐逺勝古也此三者朕何徳以堪之旣有此功業何得不善始慎終耶愚按詩書所載聖君賢相之所以保治於雍熈泰和之時者固幸功業之克成未嘗以功業而自足也太宗謂欲使豊功厚利施於永乆鴻勲盛業粲然可觀不使後世惟稱隆周炎漢志則髙矣然炎漢可企而及也隆周豈止於􅀂是哉倬彼雲漢爲章於天制之爲禮樂布之爲法度此文王之文也不知太宗之所謂文果能勝乎無競維烈撫弱􅂄昧功成而載戢于戈載櫜弓矢此武王之武也不知太宗之所謂武果能勝乎大􅀖畏其力小􅀖懐其徳華夏蠻貊罔不率俾由是而惠此中國以綏四方此文武之懷逺也不知太宗之所謂懐逺又果能勝乎愚然後知太宗矜功伐善意出於中心而善始慎終之語不過虚言也玄齡於此能奨其所巳至而不能勉其所未至惜哉􅀂後章魏徵之對則善矣貞觀十二年太宗謂侍臣曰朕讀書見前王善事皆力行而不倦其所任用公軰􅁆人誠以為賢然致理比於三五之代猶為不逮何也魏徴對曰今四夷賔服天下無事誠曠古所未有然自古帝王初即位者皆欲勵精為政比迹於尭舜及其安樂也樂音洛則驕奢放逸莫能終其善人臣初見任用者皆欲匡主濟時追縦於稷契音􅂥及其富貴也則思苟全官爵莫能盡其忠節􅀂使君臣常無􅈈怠各保其終則天下無憂不理自可超邁前古也太宗曰誠如卿言愚按太宗致理不逮三五之言所以責難於其臣也魏徴之對曲盡人君放逸之端人臣懐禄之弊誠可為上下之箴盖人君固在於慎終如始而人臣尤當始終如一也嘗觀貞觀諸名臣乆於其位者雖於大節無所虧然於格非之道無聞焉母乃以成功難居至理無盡姑保其福禄榮名歟耻君不及堯舜者何如人哉魏徴之言厥有㫖矣貞觀十三年魏徵恐太宗不能克終儉約近嵗頗好奢縦好去聲後同上䟽諌曰臣觀自古帝王受圖定鼎皆欲傳之萬代貽厥孫謀故其垂拱巖廊布政天下其語道也必先淳朴而抑浮華其論人也必貴忠良而鄙邪佞言制度也則絶奢靡而崇儉約談物産也則重榖帛而賤珍竒然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乗之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於􅄝欲故也語曰非知之難行之惟難非行之難終之斯難所言信矣伏惟陛下年甫弱冠去聲大拯横流横去聲削平區宇肇開帝業貞觀之初時方克壮抑損嗜欲躬行節儉内外康寜遂臻至治論功則湯武不足方語徳則堯舜未為逺臣自擢居左右十有餘年每侍帷幄屢奉明㫖常許仁義之道守之而不失儉約之志終始而不渝一言興􅀖斯之謂也徳音在耳敢忘之乎而頃年已來稍乖􅇮志敦朴之理漸不克終謹以所聞列之如左陛下貞觀之初無為無欲清静之化逺被遐荒考之於今其風漸墜聽言則逺超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬漢文帝時有獻千里馬者詔還其馬與道里費晉武焚雉頭之裘晉武帝時太醫司馬程據獻雉頭裘帝以竒技異服典禮所禁焚之于殿前今則求駿馬於萬里市珍竒於域外取恠於道路見輕於戎狄此其漸不克終一也昔子貢問理人於孔子孔子曰懔乎􅀂朽索之馭六馬子貢曰何其畏哉子曰不以道遵之則吾讎也􅀂何其無畏家語之辭故書曰民惟􅀖本本固􅀖寜為人上者柰何不敬書五子之歌陛下貞觀之始視人如傷恤其勤勞愛民猶子每存簡約無所營為頃年已來意在奢縱忽忘卑儉輕用人力乃云百姓無事則驕逸勞役則易使易以豉切後同自古以來未有由百姓逸樂音洛後同而致傾敗者也何有逆畏其驕逸而故欲勞役者哉恐非興􅀖之至言豈安人之長筭此其漸不克終二也陛下貞觀之初損已以利物至於今日縦欲以勞人卑儉之迹嵗改驕侈之情日異雖憂人之言不絶於口而樂身之事實切於心或時欲有所營慮人致諌乃云􅀂不為此不便我身人臣之情何可復争讀曰諍此直意在杜諌者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚家語之辭與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子踈斥小人今則不然輕䙝小人䙝音泄禮重君子重君子也敬而逺之逺音援後同輕小人也狎而近之近之則不見其非逺之則莫知其是莫知其是則不間而自踈間去聲後同不見其非則有時而自昵昵近小人非致理之道踈逺君子豈興􅀖之義此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物人乃足犬馬非其土性不畜許六切珍禽竒獸弗育於國周書旅獒之辭陛下貞觀之初動遵尭舜􅂢金抵璧反朴還淳頃年以來好尚竒異好去聲後同難得之貨無逺不臻珍玩之作無時能止上好奢靡而望下敦朴未之有也末作滋興而求豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渇善人所舉信而任之取其所長恒恐不及近嵗已來由心好惡烏去聲或衆善舉而用之或一人毁而棄之或積年任而用之或一朝疑而逺之夫行有素􅂂夫音扶行去聲後同事有成跡所毀之人未必可信於所舉積年之行不應頓失於一朝應平聲朝音昭君子之懐蹈仁義而弘大徳小人之性好䜛佞以為身謀陛下不審察其根源而輕為之臧否部鄙切是使守道者日踈干求者日進所以人思苟免莫能盡力此其漸不克終六也陛下初登大位髙居深視事惟清静心無􅄝慾内除畢弋之物畢網也弋以生絲繫矢而射也外絶畋獵之源􅁆載之後不能固志雖無十旬之逸夏書太康盤逰無度畋于有洛之表十旬弗反或過三驅之禮遂使盤逰之娯見譏於百姓鷹犬之貢逺及於四夷或時教習之處道路遥逺侵晨而出入夜方還以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠孔子對魯定公之辭然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上逹咸思竭力心無所􅀮頃年已來多所忽略或外官充使去聲奏事入朝思覩闕庭􅀅陳所見欲言則顔色不接欲請又恩禮不加間因所短詰其細過雖有聦辯之略莫能申其忠欵而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縦長音掌後同樂不可極志不可滿禮曲禮篇之辭四者前王所以致福通賢以為深誡陛下貞觀之初孜孜不怠屈已從人恒􅀂不足頃年已來微有矜放恃功業之大意蔑前王􅀒聖智之明心輕當代此傲之長也欲有所為皆取遂意縦或抑情從諌終是不能忘懐此欲之縦也志在嬉逰情無厭倦雖未全妨政事不復專心治道此樂􅀅極也率土乂安四夷欵服仍逺勞士馬問罪遐裔此志􅀅滿也親狎者阿㫖而不肯言踈逺者畏威而莫敢諌積而不已􅀅􅃜聖徳此其漸不克終九也昔陶唐成湯之時非無災患而稱其聖徳者以其有始有終無爲無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿内户口並就􅀜外携負老㓜來徃􅁆千曽無一戸逃亡一人怨苦此誠由識陛下矝育之懐所以至死無􅂝貳頃年已來疲於徭役􅀜中之人勞弊尤甚雜匠之徒下日悉留和雇正兵之軰上畨多别驅使和市之物不絶於郷閭逓送之夫相􅁇於道路旣有所弊易為驚擾脫因水旱榖麥不􅀵恐百姓之心不能如前日之寜帖此其漸不克終十也臣聞禍福無門唯人所召人無釁焉妖不妄作伏惟陛下統天御寓十有三年道洽寰中威加海外年榖豐稔禮敎聿興比屋踰於可封比音鼻菽粟同於水火曁乎今嵗天災流行炎氣致旱乃逺被於郡國㐫醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下驚懼之辰憂勤之日也􅀂見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗徳者思而改之與物更新更平聲易人視聽則寳祚無疆普天幸甚何禍敗之有乎然則社稷安危國家理亂在於一人而已當今太平之基旣崇極天之峻九仭之積猶虧一簣之功書曰為山九仞功虧一簣言中道而止則前功盡棄也千載休期時難再得明主可為而不為微臣所以欝結而長歎者也臣誠愚鄙不逹事機略舉所見十條輙以上聞聖聽伏願陛下採臣狂瞽之言叅以蒭蕘之議兾千慮一得衮職有􅀘詩大雅烝民之篇曰衮職有闕維仲山甫􅀘之則死日生年甘從斧􅃏䟽奏太宗謂徵曰人臣事主順㫖甚易忤情尤難公作朕耳目股肱常論思獻納朕今聞過能改庶幾克終善事㡬平聲􅀂違此言更何顔與公相見復欲何方以理天下自得公䟽反覆研尋深覺詞強理直遂列為屏障朝夕瞻仰又録付史司兾千載之下識君臣之義乃賜徵黄金十斤廐馬二疋按史傳十三年阿史那結社率作亂雲陽石然自冬至五月不雨故徵上此䟽唐氏仲友曰人君善否之分其始毫􅁵其未千里論太宗貞觀初之所為皆可以為三代之令主至漸不克終則凢三代之辟王其極至於􅅍者不過乎此可不畏哉徵有憂之極言至論數其十漸有伊傅周召戒其君大禹訓其後世之意非慮之至忠之盡安能及此使太宗聞過願改以終善道以保貞觀之隆卒髣髴乎三代之令主皆徴力也史以三代遺直許徴於十漸見之葉氏適曰太宗聞十漸之戒令録付史官使萬世知有君臣之義至徴録前後諌争語於史官帝都不􅀃夫十漸之戒徵之所錄多不過此而太宗不􅀃何也盖録在徵則天下惟知徴之能諌􅀂錄在太宗則天下􅀅不止知太宗之能聴諌且知太宗眷眷不忘之意凡此皆太宗好名處愚按魏徴十不克終之䟽正貞觀之中年其間所云貞觀之􅀄如此其善近嵗以来如此其未善其善也可以為三代之令主其未善也無異於後世之辟王何太宗一人之身始終之相逺如此哉盖其始之善者天資之過人也終之未善者學力之不􅁇也昔者周之成王即位之初惑於二叔之言不能明周公之徳其天資之美有不能如太宗者矣及其終也敬迓天威無敢昏逾至於死生之際烱然不􅅍此豈太宗之所及哉愚然後知周公輔導之功為不可及而魏徵格君之道猶有所不足也嗚呼以太宗之聦明猶不能保其終而况天資之未逮者其可不孶孶而務學也哉貞觀十四年太宗謂侍臣曰平足天下朕雖有其事守之失圖功業亦復難保秦始皇初亦平六國㨿有四海及末年不能善守實可為誡公等宜念公忘􅀻則榮名髙位可以克終其美魏徴對曰臣聞之戰勝易以䜴切守勝難陛下深思逺慮安不忘危功業旣彰徳教復洽恒以此為政宗社無由傾敗矣范氏祖禹曰書曰后克艱厥后臣克艱厥臣又曰無輕民事惟難孔子曰為君難夫知所難而後可以有為也傳曰君以為易則其難也􅀅至矣君以為難則其易也􅀅至矣太宗知守之之難所以能有終也愚按魏徵之於太宗凡三告以守天下之難矣居安忘危之言始終弗渝其憂治危明之心爲何如哉孟子曰責難於君謂之恭徵之謂也貞觀十六年太宗問魏徴曰觀近古帝王有傅位十代者有一代兩代者亦有身得身失者朕所以常懐憂懼或恐撫養生民不得其所或恐心生驕逸喜怒過度然不自知卿可爲朕言之爲去聲當以爲楷則徴對曰嗜慾喜怒之情賢愚皆同賢者能節之不使過度愚者縱之多至失所陛下聖徳玄逺居安思危伏願陛下常能自制以保克終之美則萬代永賴愚按太宗問運祚長短之殊魏徴對以自制克終之美其論可謂的矣然嘗論之古昔聖賢著書立言其托始終之際皆有深意吴氏之著是編也始之以太宗問魏徴正身之道終之以魏徵對太宗克終之言其意之所存雖不可知以事實攷之則二者皆太宗之所不足也何也太宗削除禍亂身致升平屈已而納諌任賢而使能恭儉節用寛仁而愛人三代而下之君絶無而僅有者也然於君臣父子兄弟夫婦之間皆有慚徳豈非正身之道有所不足歟太宗能納諌矣而晩年有仆碑之失能慎刑矣而晚年有君羡之誅能息兵矣復有髙麗西域之師能莭用矣復有飛山翠微之作豈非克終之道有所不足歟合二者而論之則太宗所以不能克終者由其不能正身也然則呉氏之書豈非始言其本而終言其效歟貞觀政要卷第十
