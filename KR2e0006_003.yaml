front:
  text: 貞觀政要卷第三戈直集論
  hash: sha256:d0dd5b02f63173464a728f43cd77900492f8303627b4b656e1591d3ca714393b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_003-1a}
body:
  text: 論君臣鑒戒六論擇論封建八君臣鑒戒第六章凡七貞觀三年太宗謂侍臣曰君臣本同治亂共安危若主納忠諌臣進直言斯故君臣合契古來所重若君自賢臣不匡正欲不危亡不可得也君失其國臣亦不能獨全其家至如隋煬帝暴虐臣下鉗口卒令不聞其過令平聲卒子聿切遂至滅亡虞世基等尋亦誅死前事不逺朕與卿等可得不慎無為後所嗤基爲戒形之扵言者數矣夫人雖至愚未有不愚按太宗常以隋煬帝爲戒而欲其臣以虞世愛吾身而已不睱憂吾民也世基之緘黙保位愛吾身者也煬帝之縱欲肆志未必不曰吾知知江都西閣之變君臣俱不免也哉故君以煬未必不曰吾知愛吾身而已不暇憂吾君也豈以爲吾身計也臣以世基爲戒則凢吾之盡忠帝爲戒則凢吾之容受直言非以愛其臣也所爲其身計則炎涼寒燠無一時不愛吾身也寧無隱非以愛其君也所以爲吾身計也君臣各身也寧可以細㣲之不謹乎然則君臣宵旰相可以須㬰之不謹乎髪膚齒甲無一處之非吾而已太宗斯言推其意若出於一己之私盡其與嘉惠蒼生者非以利天下國家也各愛其身天下之公也義乃所以成貞觀四年太宗論隋日魏徵對曰臣徃在隋朝曾聞有盗發層曽音煬帝令於士澄捕逐字姓也士澄名爲令平聲後同於如郡降唐隋將以魏但有疑似苦加拷掠枉承賊者二千餘人並令同日斬決大理丞之貳職隋獄官張元濟恠之試尋其狀乃有六七人盗發之日先禁他所被放纔出亦遭推勘不勝苦痛聲勝平自誣行盗元濟因此更事究尋二千人内惟九人逗遛不明留遷延也逗音豆遛音官人有諳識者就九人内四人非賊有司以煬帝已令斬決遂不執奏並殺之太宗曰非是煬帝無道臣下亦不盡心須相匡諫不避誅戮豈得惟行謟佞茍求悦譽声平君臣如此何得不敗朕頼公等共相輔佐遂令囹圄空虛願公等善始克終恒如今日言君臣各盡其道也虞廷𢋫歌帝舜先言股肱愚按大學曰為人君止於仁為人臣止於敬此道所以明上下之分更相責難所以明上下之皐陶先言元首此言君臣更相責難也各盡其世基為戒此君臣各盡其道者也此章論隋世交也今觀前章太宗自以煬帝為戒欲群臣以更相責難者也二章之㫖實相為用史臣以此濫刑則魏徵歸過於君太宗歸過於臣此君臣觀致治之本歟居鑒戒之首豈非貞貞觀六年太宗謂侍臣曰朕聞周秦初得天下其事不異然周則惟善是務積功累徳所以能保八百之基秦乃恣其奢淫好行刑罰後同好去声不過二世而滅豈非為善者福祚延長為惡者降年不永朕又聞桀紂帝王也以匹夫比之則以為辱顔閔匹夫也字子顔回子弟子以徳行稱淵閔損字子騫皆孔以帝王比之則以為榮此亦帝王深耻也朕每將此事以為鑒戒常恐不逮為人所笑魏徴對曰臣聞魯哀公名蔣魯君謂孔子曰有人好忘者移宅乃忘其妻孔子曰又有好忘甚於此者丘見桀紂之君子名丘孔乃忘其身願陛下每以此為慮庶免後人笑爾焉人心之惡惡也顔閔匹夫也以帝王比之則愚按桀紂帝王也以匹夫比之則以為辱何辱之徒也以匹夫而天下後世所企敬匹夫而帝以為榮何榮焉人心之善善也孜孜為善顔閔世所羞稱帝王而匹夫矣太宗所論亦知言哉王矣孜孜為惡桀紂之徒也以帝王而天下後則曰欲知桀紂顔閔之分善與惡之間也而魏徴之對又明桀紂之所以為桀紂也愚貞觀十四年太宗以髙昌平城漢車師之地其王麴高昌西域國名都交河盛立平謂征討平定也文泰是年文泰卒子智召侍臣賜宴於兩儀殿謂房玄齡曰高昌若不失臣禮豈至滅亡朕平此一國甚懷危懼惟當戒驕逸以自防納忠謇以自正言也謇音蹇黜邪佞用賢良不以小人之言而議君子以此慎守庶幾於獲安也声幾平魏徴進曰臣觀古來帝王撥亂創業必自戒慎採芻蕘之議從忠讜之言天下既安則恣情肆欲甘樂諂䛕洛樂音惡聞正諌去聲惡烏張子房漢王計畫之臣及高祖為天子將廢嫡立庶子房曰今日之事非口舌所能争也高祖欲廢太子盈立趙張子房名良漢封留侯曰君為上謀臣今上欲易太子君安得高枕而卧良王如意或謂呂后曰留侯善畫計上信用之后刼良子雖臣䓁百人何益后强要曰為我畫計良曰此難曰始上在急困中幸用臣䇿天下已定以愛欲易太四皓為輔賴以不廢以口舌争遂為太子請終不敢復有開説缶復音况陛下功徳之盛以漢祖方之彼不足凖即位十有五年帝位至是十有五年太宗以武徳九年即聖徳光被今又平殄高昌屢以安危繫意方欲納用忠良開直言之路天下幸甚昔齊桓公小白齊君名與管仲鮑叔牙寗戚齊相三人皆四人飲桓公謂叔牙曰盍起為寡人夀乎曰寡人言寡徳之為去聲諸侯自稱也人叔牙奉觴而起曰捧奉音願公無忘出在莒時初出桓公叔為之傳奔扵莒鮑使管仲無忘束縛於魯時管仲讎也請得桓公立謂魯曰迎受之及堂阜而脱桎梏甘心醢之管仲請囚叔牙使寗戚無忘飯牛車下時鯉魚長尺半生不遭堯與舜禪短布單衣纔至骭從寗戚嘗候桓公出扣牛角歌曰南山矸白石爛中有公遂召之為相昏飯牛至夜半桓公避席而謝曰寡人與二大夫能無忘夫子之言則社稷不危矣太宗謂徵曰朕必不敢忘布衣時公不得忘叔牙之為人也年髙昌王麴按通鑑十三共擊之上徴其臣阿史那矩文泰不遣中國人在突文泰遏絶西域朝貢伊吾既内属高昌又與西突厥焉耆上遣使責之文泰語不遜扵是詔侯君集等擊厥者或奔高昌詔使歸之亦不遣又與西突厥共破抵大漠皆為州縣凢東西九千五百一十里南北一之遂降由此唐地東極于海西至焉耆南盡林邑北為唐之極盛焉萬九百一十八里賢相都俞吁咈扵一堂之上凛乎儆戒之言以愚按唐虞之世雍熈泰和帝治之極盛也聖君盛也今觀高昌既平土宇極盛太宗有兢兢保聖君賢相夫豈有是哉兹所以保雍熈泰和之太平之盛也然古帝王傳心之學其要在扵欽治之言魏徴有諄諄鍳戒之意兹所以成貞觀本原一心之妙用聖神之能事學問之極功帝而儆戒之際尤謹於欽之一辭盖敬者萬化之能無怠無荒謹終如始為上人者佩太宗君臣王授受之懿在此其發於言者皆由於心也故惟貞觀可以進扵三代之上矣鑒戒之言體帝王心學之要則豈貞觀十四年特進魏徴上䟽曰臣聞君為元首臣作股肱齊契同心合而成體體或不備未有成人然則首雖尊高必資手足以成體君雖明哲必藉股肱以致理禮云人以君為心君以人為體心莊則體舒心肅則容敬篇之辭禮緇衣書云元首明哉股肱良哉庶事康哉元首叢脞哉股肱惰哉萬事墮哉陶𢋫歌之辭墮音隳虞書臯然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇後同夫音扶自古為難以石投水千載一合以水投石無時不有其能開至公之道申天下之用内盡心膂旅音外竭股肱和若鹽梅若作和羮爾惟鹽梅商書高宗命傅説曰固同金石者非惟高位厚秩在於禮之而已昔周文王遊於鳳凰之墟韈系解顧左右莫可使者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子者哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝功於垓下若夏桀不棄於伊尹項羽垂恩於韓信寧肯敗已成之國為滅亡之虜乎姓尹字也伊尹名媵音胤垓音該伊名送女曰媵湯妃有莘氏之女也史記謂伊尹欲行摯湯三聘之遂佐湯伐桀放桀扵南巢之地有莘國道盖戰國時有為此説者韓姓信名也淮陰人數以道以致君而無由乃為有莘氏之媵臣説湯致扵王日齋戒設壇埸拜信為大將後圍羽於垓下之地䇿干項羽羽弗聽信亡歸漢高祖用蕭何言於是擇又㣲子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者子紂之庶兄諌紂不聽微箕二國名子爵也㣲不聽被囚為奴武王即位訪之箕子為陳洪範九疇遂去之武王克商封㣲子於宋箕子紂之諸父諌紂比干諫而死子曰殷有三仁焉論語曰㣲子去之箕子為之奴禮記稱魯穆公問於子思曰思孔子之孫名伋穆公魯君名顯子為舊君反服古歟聲為去子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸泉高祖諱故以泉代淵隊音墜泉禮作淵盖避毋為戎首不亦善乎又何反服之禮之有篇之辭禮檀弓齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死後同難去声出亡不送公曰裂地以封之䟽爵而待之声䟽平有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諌而見納終身不亡臣何送焉若言不見用有難而死是妄死也諫不見納出亡而送是詐忠也春秋左氏傳曰所作而左氏為傳傳去聲春秋孔子崔杼弑齊莊公武子也莊公崔杼齊臣崔光名晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之後同為去聲為社稷亡則亡之若為已死為已亡非其親暱誰敢任之門啓而入枕尸股而哭興三踊而出左傳襄公二十五年枕去聲踊音勇事見孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如糞土臣視君如㓂讎宣王之辭孟子告齊雖臣之事君無二志至於去就之節當緣恩之厚薄然則為人主者後同為如字安可以無禮於下哉竊觀在朝群臣當主樞機之寄者或地隣秦晉或業與經綸預與音並立事立功皆一時之選處之衡軸声䖏上為任重矣任之雖重信之未篤則人或自疑人或自疑則心懷茍且心懷茍且則節義不立節義不立則名敎不興名敎不興而可與固太平之基保七百之祚未之有也又聞國家重惜功臣不念舊惡方之前聖一無所間声去然但寛於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之況上啓其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一源下生百端之變無不亂者也禮記曰愛而知其惡憎而知其善禮篇辭禮曲禮若憎而不知其善則為善者必懼愛而不知其惡則為惡者寔繁詩曰君子如怒亂庶遄沮言篇之辭詩小雅巧然則古人之震怒將以懲惡當今之威罰所以長姦後同長音掌此非唐虞之心也非禹湯之事也書曰撫我則后虐我則讎誓師之辭周書武王荀卿子尊之號著書曰荀子名况趙人卿者時人相曰君舟也人水也水所以載舟亦所以覆舟而荀子述之也此本家語之辭故孔子曰魚失水則死水失魚猶為水也故唐虞戰戰慄慄日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重将求至理豈可得乎又政貴有恒不求屢易今或責小臣以大體或責大臣以小事小臣乗非所據声乗平大臣失其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其辜欲其無私求其盡力不亦難乎字難如小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟咎莫能自明則茍求免禍大臣茍免則譎詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣又委任大臣欲其盡力毎官有所避忌不言則為不盡若舉得其人何嫌於故舊若舉非其任何貴於踈逺待之不盡誠信何以責其忠恕哉臣雖或有失之君亦未為得也夫上之不信於下必以為下無可信矣若必下無可信則上亦有可疑矣禮曰上人疑則百姓惑下難知則君長勞篇之辭禮緇衣上下相疑則不可以言至理矣當今群臣之内逺在一方流言三至而不投杼者同姓名者殺人人告其母母織自秦甘茂告秦王曰魯人有與曾參曾參王之信臣不如其母疑臣者非特三人臣恐大若三人告之其母投杼下機踰墻而走臣之賢不及杼也王之投臣竊思度切待洛未見其人夫以四海之廣士庶之衆豈無一二可信之人哉蓋信之則無不可疑之則無可信者豈獨臣之過乎夫以一介庸夫結為交友以身相許死且不渝況君臣契合寄同魚水若君為堯舜臣為稷契播時百榖命契曰汝作司徒敬音泄稷農官舜命棄曰汝后稷敎敷五豈有遇小事則變志見小利則易心哉此雖下之立忠未有明著亦由上懷不信待之過薄之所致也豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四書序以伏羲神農黄帝為三皇一説謂天皇地三皇史記謂庖犧氏女媧氏神農氏也孔安國詳孰是皇人皇未五帝可俯而六矣夏殷周漢夫何足數声上太宗深嘉納之國出奔且大臣之所任者大小臣之所任者小而范氏祖禹曰昔衛獻公捨大臣而與小臣謀故失偏聽之蔽鮮有不敗事者也以小謀大以逺謀近此人君知此然後能任君子去小人納忠諫察奸言以太唐氏仲友曰此魏徵論聽納任用之要人君必先領鄭公之諫而非諫之左挈右提則移扵小人惑宗之聰明惟其道學之淺至扵聽言任用之間數於貞觀者於格非近之矣於奸言多矣此徵最有功於慎終如始之言至此䟽復以君臣同心一體愚按太宗於是臨御乆矣魏徴竭誠進諌惓惓愛君亦云至矣且終之曰三皇可追而四五帝詳譬而曲陳之甚若致戒於庸君常主之前其之徳蔑以加矣嘗觀典謨所陳都俞吁咈於一可俯而六夏殷周漢夫何足數皇道尚矣五帝領則在欽哉之一言君臣同心其在是也魏徴堂之上始而克艱之戒終之明良之歌而其要所謂責難於君者歟四三皇六五帝之說亦貞觀十六年太宗問特進魏徴曰朕克己為政仰企前烈至於積徳累仁豐功厚利四者常以為稱首朕皆庶幾自勉声幾平人苦不能自見不知朕之所行何等優劣徴對曰徳仁功利陛下兼而行之然則内平禍亂外除戎狄是陛下之功安諸黎元各有生業是陛下之利由此言之功利居多惟徳與仁願陛下自疆不息必可致也亦未得為知言也盖徳仁本也功利用也有徳愚按太宗以徳仁功利岐而言之而魏徴之對也外徳與仁而言功利則非聖賢所謂功利矣與仁則功利在其中所謂不求利而未嘗不利已矣正以仁義乃所以利之言仁義而利在其昔孟子告梁惠王曰王何必曰利亦有仁義而利莫大焉政恐未之能爾中也積徳累仁則豐功厚貞觀十七年太宗謂侍臣曰自古草創之主至于子孫多亂何也司空房玄齡曰此為㓜主声為去生長深宫掌長音少居富貴声少去未嘗識人間情偽理國安危所以為政多亂太宗曰公意推過於主朕則歸咎於臣夫功臣子弟扶夫音多無才行声去藉祖父資䕃遂處大官声䖏上徳義不修奢縱是好声去主既㓜弱臣又不才顚而不扶豈能無亂隋煬帝錄宇文述在藩之功擢化及於高位不思報效翻行弑逆述之子為右屯化及隋相字文自立稱許帝二年竇建徳破化及於聊城殺之衛將軍武徳初弑煬帝於江都立秦王浩復殺浩此非臣下之過歟朕發此言欲公等戒朂子弟使無愆過即家國之慶也太宗又曰化及與玄感即隋大臣受恩深者子孫皆反其故何也為大將大業九年起玄感隋相楊素之子宇文述等討之遂敗死兵黎陽圍東都隋主命岑文本對曰君子乃能懷徳荷恩声荷去玄感化及之徒並小人也古人所以貴君子而賤小人太宗曰然盖諸侯有大臣輔佐自非甚無道者皆足継其愚按古者諸侯有世封公卿大夫無世官何也周盛世自諸侯入為公卿必若呂伋召虎而後先世公卿大夫一非其人民有受其害者矣有帝無道事不師古玄感化及之禍自取之耳太可也自兩漢以來未聞宰相大臣有世官者煬深宫不識人間情偽所以多亂其説是矣太宗宗問守成之君何以多亂玄齡以為㓜主生長觀太宗之後近而高宗中宗之昏庸逺而穆敬迺歸咎於功臣之子弟則愚不知其何説也今自取豈功臣子弟之罪乎懿僖之謬戻馴致亂亡咸其擇官第七一章凡十貞觀元年太宗謂房玄齡等曰致理之本惟在於審量才授職後同量平声務省官員故書稱任官惟賢才又云官不必備惟其人之辭商周書若得其善者雖少亦足矣其不善者縱多亦奚為古人亦以官不得其才比於畫地作餅不可食也詩曰謀夫孔多是用不就小詩篇之辭雅小旻又孔子曰官事不攝焉得儉孔子言管仲之焉於䖍切論語辭且千羊之皮不如一狐之腋子觀我治秦也孰與史記商君問趙良曰之腋千人之諾諾不如一士之諤諤五羖大夫賢良曰千羊之皮不如一狐此皆載在經典不能具道當須更併省官貟使得各當所任之當各當声去則無為而理矣卿宜詳思此理量定庶官貟位玄齡等由是所置文武緫六百四十貟太宗從之因謂玄齡曰自此儻有樂工雜類假使術逾儕軰者只可特賜錢帛以賞其能必不可超授官爵與夫朝賢君子扶夫音比肩而立鼻比音同坐而食遣諸衣冠以為恥累進官貟不充省符下諸州差人赴選勒赴省選集良偽切按通鑑唐初士大夫以亂離之後不樂仕稱之上謂玄齡曰官在得人不在貟多命併省留文者七千餘人吏部劉林甫随林銓叙各得其所時人定制七百三十員曰吾以此待天下賢材足矣武緫六百四十三員百官志曰太宗省内外官事任人事省則職省故有有職而無官後世以人朱氏黼曰有事則有職有職則有官理也古人以非廢事也或一官而兼數職有官而無職非增事任官人増則官増故有有官而無職有職而無官周禮名存而實不備職具而官不除者尚多貞觀也或一職而任數人周官雖多非皆具員也考之一流品杜將來哉其後宰相或至數人員外官至之制非不甚美矣然員外置已見於當時將何以弊未必非太宗啓之二千餘員其末流之古之建官簡矣然九官四岳十二牧實二十五愚按唐虞稽古建官惟百夏商官倍亦克用乂者也周官三百六十緫計六萬三千六百有竒人而書稱二十二人盖亦有以一人而兼二職稱召公以太保兼冡宰畢公以太師兼司馬盖周之建官雖多然周禮者周公未行之書也書無攝事太宗深懲斯弊省内外官文武緫六百亦有以一人而兼二職者也後世建官既冗復以僕射而兼領度支魏徴以侍中而兼東宫官四十員自後世觀之可謂省之極矣然房亥齡善政當以省官為首何也易於選擇上不至於盖亦有以一人而兼二職者矣愚嘗論貞觀之事茍免之患員數不多無紛更生事之憂官冗失人俸禄易供下不憂於厚歛權任專一無避職分於三司監軍侵監司之權州將奪太守之則四者反是厥後兵部之職分於樞宻戸部之貞觀之善政隳矣夫後世之天下猶貞觀之天任員外之置多於正員墨敕斜封數逾千百而奔競二曰裁嬖幸盖奔競之風盛則員多而闕下太宗何以致是哉切謂其大要有二一曰息施官不得以不增也斯二者省官之本也有志少官不得以不增也嬖倖之門多則私恩無所亦反其本而已於貞觀之治者盍貞觀二年太宗謂房玄齡杜如晦曰公為僕射當助朕憂勞廣開耳目求訪賢哲比聞公等鼻比音聽受辭訟日有數百此則讀符牒不暇安能助朕求賢哉因敕尚書省貞觀中以太宗曾為之故缺而不置其次唐制尚書謂之都省置令一人典領百官皆會決焉凢符移闗牒必遣於都省乃下天下大事左右僕射各一人左右丞各一人其属有六部庶務上都省不决者皆細碎務皆付左右丞紀正省内劾御史舉唐制掌辨六官之儀焉兵刑工三部右丞緫焉不當者吏戸禮三部左丞緫惟冤滯大事合聞奏者闗於僕射可謂能任以其職矣書曰惟説式克欽承旁招俊范氏祖禹曰太宗責宰相以求賢而不使親細務治簿書期㑹百吏之事豈所謂相乎乂列于庶位此相之職也茍不務此而為不可雖賢如房杜亦且行之何也其説有五無胡氏寅曰宰相受詞既非古制然當之者未有以則不敢當權而以吏事自為者二也才用粗淺熟經濟之畧姑以是為勤於所職者一也人君明察治本而責成於叢脞因以奉承之者四也實侵大於有司之務躐躋其任益以勉勉者三也上不知必不肯然矣房杜之才非能賢於太宗故太宗如權故治文案以助其君者五也若誠知宰相職分高宗成王之事也是而止固不能為太甲位愈尊其事愈要其任愈逸其位愈卑其事愈詳唐氏仲友曰王省惟歲卿士惟月師尹惟日盖其矣責宰相以廣耳目訪賢才亦當矣雖然廣耳目其任愈勞太宗以細務属左右丞大事闗僕射當人而叅之以封倫楊師道之属可乎是知宰相之訪賢才坐論大事在房杜任之尚恐未能無愧古宰相之道也職而未得擇此君相之要道也受詞誠非為相之體然大臣愚按人主之職在論一相一相之職在任百官老大臣也克勤小物弼亮四世小物非細務乎慮四方豈惟高虛拱揖以自居哉畢公周之元子理隂陽下遂萬物之宜此言固大矣然錢榖昔陳平不答錢榖决獄之問而曰宰相上佐天司命二公之所當叅聽者也此皆裁成輔相以國計民命所関冢宰之所制者也獄者生民之邪太宗敕宰相勿親細務特不可下行有司之左右生民者而曰宰相不當知則所職者何事天子有古人之相業在事耳克勤小物以弼亮貞觀二年太宗謂侍臣曰朕毎夜恒思百姓間事或至夜半不寐惟恐都督督掌督諸州兵馬甲械城隍唐制武徳七年改緫管曰都緫判府事鎮戍粮廩刺史篇註見前堪養百姓以否故於屏風上録其姓名坐卧恒看在官如有善事亦具列於名下朕居深宫之中視聽不能及逺所委者惟都督刺史此軰實理亂所繫尤須得人民生至不輕也漢宣帝謂與我共理者惟良二愚按自秦罷侯置守之後郡守古諸侯其関繫者矣然宣帝以刑名繩下故當時固多循吏而千石太宗謂治民之本在刺史斯言也真知本多循吏而無酷吏此又二帝之優劣也未免有酷吏太宗英明仁恕故當時居貞觀二年太宗謂右㒒射封徳彛曰致安之本惟在得人比來鼻比音命卿舉賢未嘗有所推薦天下事重卿宜分朕憂勞卿既不言朕將安寄對曰臣愚豈敢不盡情但今未見有奇才異能太宗曰前代明王使人如器皆取士於當時不借才於異代豈得待夢傅説所見視群臣百吏皆非也乃使營求之野得説於音悦傅説商賢相也武丁夢得聖人名曰説以夢為相巖中立逢吕尚伯將出獵卜之曰所獲非龍非彲非吕周太公也本姓姜從其封姓周西陽與語大悦遂載與俱歸立為師虎非羆覇王之輔果遇太公於渭之然後為政乎且何代無賢但患遺而不知耳徳彛慙赧而退切愧態赧奴版所懸此官極須妙選公直倫未對帝曰戴胄忠直每也按史傳繫元年二月帝謂封倫曰大理之職人命又謂倫曰云云事用心即其人也大群任之衆可容一日乏才乎然人之才有能有孫氏甫曰大臣之職薦達人才固非細事天下之未推薦但言無奇才異能上欲欺主之明下欲蔽不能器而使之衆職舉矣豈有人主責其舉賢己三保位固寵常懼失之以賢者既用必建立功業天下之善此真姦人也盖姦人不樂進賢其情有能固其情一也姦人立私必人附己乃引之賢者掩己之名見己之過名滅過露則位不能保寵不不知己之恩不知恩則不為己之黨其情二也姦進退以道不肯趨附姦人以謂不附己而引之則而進之或有大過為已之累其情三也封倫之情人心既不公知人不明雖遇賢才不能深識慮引辭可謂能照姦人之情者也人主能照姦人之情正在於此太宗以前代未常乏人折之使慙懼無進矣則賢者乆無所舉人主詰之是也若出此令而委之房杜胡氏寅曰舉賢才而效之君大臣職也為大臣而封倫且取人以身不誣之理也倫非賢者安能知王魏非惟丕應徯志亦必各得其人矣乃以望於無知人之鑒而太宗於倫亦初不知其姦邪也信賢若舉其類集于朝廷豈非大憂乎是則非特倫難哉知人之其主得群臣表䟽則屛而不奏鞫獄用法則峻愚按封倫謟佞人也其在隋附麗虞世基諂順以隆而孤隋之政日以壞皆倫所為也以若所文深刻論功行賞則抑削就薄故世基之寵日異能盖未有如已者耳是猶以隋事唐也太宗為烏知所謂舉善薦賢之義哉其曰未有奇才説然之人也屛斥有餘地矣雖愧於知人之明幸不惑其貞觀三年太宗謂吏部尚書杜如晦曰比見鼻比音吏部擇人惟取其言詞刀筆不悉其景行後同去聲數年之後惡跡始彰雖加刑􅓍而百姓已受其弊如何可獲善人如晦對曰兩漢取人皆行著郷閭州郡貢之然後入用故當時號為多士今毎年選集後同選去聲向數千人厚貌飾詞不可知悉選司但配其階品而已銓簡之理實所未精所以不能得才太宗乃将依漢時法令本州辟召声令平㑹功臣等将行世封事遂止升之學大樂正升之司馬司馬辨論官材論定愚按古者取士之法郷論秀士升之司徒司徒仕之前凢經四級已仕之後又經三級其詳且然後官之任官然後爵之位定然後禄之盖未法皆茍焉而已今觀太宗問如何可獲善人大重如此故嘗謂後世取人之道不能復成周之以两漢辟召之事為對何其陋哉厥後竟以將哉問乎如晦政當告以成周取士之法可也乃辟召之法又豈足以致成周多士之隆乎行世封不及施行後世惜焉然使真能行貞觀六年太宗謂魏徵曰古人云王者須為官擇人声為去不可造次即用到切造七朕今行一事則為天下所觀出一言則為天下所聴用得正人為善者皆勸誤用惡人不善者競進賞當其勞後同當去聲無功者自退罰當其罪為惡者戒懼故知賞罰不可輕行用人彌須慎擇徴對曰知人之事自古為難故考績黜陟書虞考黜陟幽明曰三載考績三察其善惡今欲求人必須審訪其行後同去聲若知其善然後用之設令此人後同公平声不能濟事只是才力不及不為大害誤用惡人假令强幹為害極多但亂代惟求其才不顧其行太平之時必須才行俱兼始可任用人王者之言也而魏徵之所謂才行者不亦異乎范氏祖禹曰太宗以治亂在庶官欲進君子退小子之才也後世之所謂才者小人之才也周公制夫才有君子之才有小人之才古之所謂才者君言也後世之所謂才者辯給以禦人詭詐以用兵禮作樂孔子以為才此古人所謂才者兼徳行而於世也王者創業垂統敷求哲人以遺後嗣故能僻邪險詖趨利就事是以天下多亂職斯人之用夫有才無行之小人無時而可用退之猶恐其或長世也豈宜以天下未定而可專用小人之才歟之學駮而不純故所以輔導其君者卒不至於三進也豈可先用而後廢乃取才行兼全之人乎徵治也王之明允篤誠是以才兼徳而言之也司馬氏曰徳愚按春秋傳曰髙陽氏有才子八人齊聖廣淵之也學者安所折衷哉愚聞之孟子曰若夫為勝才為君子才勝徳為小人是以才對徳而言朱子曰孟子專指其發於性者言之故以為才不善非才之罪也程子曰才禀於氣氣有清濁有昏明强弱之不同矣以事理考之程子之言無不善程子兼指其禀於氣者言之則人才固馬氏之言即程子之意也然司馬氏之言宻矣為宻由此觀之春秋傳之言即孟子之意也司是也然謂才行無所分别則將如程子之言何范氏譏魏徴不當言亂代求才不顧其行其説貞觀十一年侍御史馬周上䟽曰理天下者以人為本欲令百姓安樂樂音洛令平聲惟在刺史縣令縣令既衆不能皆賢若毎州得良刺史則合境蘇息天下刺史悉稱聖意聲稱去則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢徳欲有遷擢為將相後同並去聲必先試以臨人或徔二千石曰二千石漢世郡守入為丞相及司徒太尉者朝廷必不可獨重内臣外刺史縣令遂輕其選所以百姓未安殆由於此太宗因謂侍臣曰刺史朕當自簡擇縣令詔京官五品已上各舉一人論太子諸王定分同一䟽按史傳此與諫營造奢侈及子列爵頒禄非為臣下皆以為民也故擇其人以孫氏洙曰民者國之本也守令民之本也古者天禄以寵利之上之責吏一本於民下之報上一本牧養之重其任以付責之假其權以安固之厚其家重矣輕守令是輕民也民輕則天下國家輕矣於民則民重矣民重則守令重守令重則天下國又出諌大夫補郡吏有治效者璽書勉勵増秩賜可不慎歟昔漢制郡守入為三公郎官出宰百里於是為盛知所重也魏晉以下謂居朝者為要職金而不輙遷公卿缺則選其尤異者用之故良吏也唐之失亦然故内職常遷外選常滯然守宰之治外者為左遷故吏多貪殘而風俗日壞失所重班班可言也植風迹者猶謹舉可也縣令卑而尤衆近民尤甚尤不可不擇胡氏寅曰刺史至多人君安能徧識人才委大臣之則千百賢令亦可致矣人各有才其用不同則必欲得人使為縣有政績舉其人可也若展轉求安能皆得縣令之才乎識趣各異京官五品以上民被害不如悉以才徳選則所得多矣唐氏仲友曰周之意盖謂察之於己任則戸庭也唐虞之時百揆統九官四岳統十二牧愚按聖人以天下為一家朝廷其堂奥州縣其萬邦咸寧何内外之重輕哉唐有天下於重内故曰内有百揆四岳外有州牧侯伯庶政惟和之尤者也以輕心豦之謂之何哉馬周之言其輕外之時下至縣令士多不屑為之夫令親民之言固善矣然刺史録名屏上著政績善惡可知體要者歟為天下者莫先於謹擇守令太宗重之平均朝堂擇刺史都督刺史都督舉縣令以自擇矣九重之尊豈能周知惟當使内外輕也可貞觀十一年治書侍御史劉洎以為左右丞宜特加精簡上䟽曰臣聞尚書萬機寔為政本伏尋此選授任誠難是以八座比於文昌八座漢志曰斯乃文昌左右僕射及六部是為務淵藪天府衆二丞方於管轄典曰掌管轄省事二丞左右丞也六爰至曹郎上應列宿郎官上應列宿音秀漢明帝曰茍非稱職聲稱去竊位興譏伏見比來後同比音鼻尚書省詔敕稽停朞稽音文案壅滯臣誠庸劣請述其源貞觀之初未有令僕僕射也尚書令及于時省務繁雜倍多於今而左丞戴胄右丞魏徴並曉達吏方質性平直事應彈舉平聲應彈並無所迴避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勲親在位聲為去器非其任功勢相傾凡在官寮未循公道雖欲自强先懼囂謗浮薄也囂音枵所以郎中予奪聲予上帷事諮禀尚書依違不能斷決或紏彈聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便渉年載或希㫖失情或避嫌抑理勾司以案成為了不究是非尚書用便僻為奉公莫論當否平聲當便論並聲去互相姑息惟事彌縫且選衆授能非才莫舉天工人代君代天理物官所治皆天事虞書曰天工人其代之言人焉可妄加䖍切焉於至於懿戚元勲但宜優其禮秩或年高及耄九十曰耄音冐八十或積病智昏既無益於時宜當置之以間逸乆妨賢路殊為不可將救兹弊且宜精簡尚書左右丞及左右郎中目勘稽失知省内宿直之事唐制副二丞所轄諸司事署録如並得人自然綱維備舉亦當矯正趨競豈惟息其稽滯哉䟽奏尋以洎為尚書左丞擇賢任職整綱維振稽滯此皆詳練治體深達政張氏九成曰觀洎以章䟽白尚書非人之弊務欲其身宜來者之戒也本惜乎忠誠憂國不宻書令掌典領百官其属有六左右僕射統理六愚按唐制三省尚書省居其首樞機之要也尚部右丞則緫兵部刑部工部其所闗繫豈小哉官為令之貳皆宰相也左丞則緫吏部户部禮而極言委任之弊其陳精簡之方可謂知政本劉洎以剛直果敢之才當紏彈舉劾之任於是以太宗之器使人才後之人主所宜為法也稱厥職矣太宗即以洎為左丞可謂知人也已貞觀十三年太宗謂侍臣曰朕聞太平後必有大亂大亂後必有太平大亂之後即是太平之運也能安天下者惟在用得賢才公等既不知賢朕又不可徧識日復一日無得人之理今欲令人自舉後同令平聲於事何如魏徴對曰知人者智自知者明知人既以為難自知誠亦不易切以豉且愚暗之人皆矜能伐善恐長澆競之風掌長音不可令其自舉之議魏徴以為知人既難自知不易若令自舉愚按太宗急於得天下之賢於是有令人自舉族黨州郷逓逓而考其徳行道藝賔興于王此恐長澆競之風誠為知言也夫三代盛時比閭令人自舉吾見其自鬻而已矣非善論也所謂郷舉里選也世道已降此制不復乃曰貞觀十四年特進魏徴上䟽曰臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寧一人有慶必藉忠良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功舉八元使布五教内平外成舜舉八凱使主后土百揆時序周召光煥乎之美奭為周太保二公夾輔成王周公名旦武王之弟召公名然則四岳掌四岳諸唐虞官名人而緫兼之侯之事或一九官徒臯陶作士垂為共工益掌山澤舜命禹作司空稷播百榖契為司龍作納言是為九官伯夷為秩宗夔典樂五臣下治謂禹稷契臯陶伯益論語曰舜有臣五人而天也十亂周公旦召公奭太公望畢公榮公大顚閎天周書武王曰予有亂臣十人亂治也十人謂已先儒以為子無臣母之義盖邑姜也九人治外邑散宜生南宫适其一文母論語曰有婦人焉九人而内姜治豈惟生之於曩代而獨無於當今者哉在乎求與不求好與不好耳聲後同好並去何以言之夫美玉明珠扶夫音孔翠犀象大宛之馬時李廣利破其國獲汗血宛平聲大宛西域國漢武獻馬以西旅之􅋙貢􅋙犬高八尺曰􅋙西旅西夷國武王時或無足也或無情也生於八荒之表塗遥萬里之外重譯入貢聲言重平譯而求也語不通必重道路不絶者何哉盖由乎中國之所好也况徔仕者懷君之榮食君之禄率之以義將何徃而不至哉臣以為與之為孝則可使同乎曾參子騫矣事親若曾子可也論語曰孝哉閔子騫人不間於曾參字子輿子騫姓閔名損皆孔子弟子孟子曰弟之言其父母昆與之為忠則可使同乎龍逄比干矣桀臣龍逄以忠諫見殺比干紂臣皆與之為信則可使同乎尾生展禽矣子莊柱而死展禽魯大夫展獲名禽食邑柳下謚曰惠曰尾生與女子期扵梁下女子不來水至不去抱梁與之為㢘則可使同乎伯夷叔齊矣國君之二子讓伯夷叔齊孤竹伐而餓國而逃諫然而今之群臣罕能貞白卓異者盖求之不切勵之未精故也若勗之以公忠期之以逺大各有職分聲去得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所不受賤則觀其所不為因其材以取之審其能以任之用其所長揜其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故説苑曰字子政楚元王交之前漢光禄大夫劉向著説苑三十篇後采傳記行事人臣之行聲去有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌芽未動形兆未見現音昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎顯榮之處如此者聖臣也二曰虛心盡意日進善道勉主以禮義諭主以長䇿將順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱徃古之行事朔數音以厲主意如此者忠臣也四曰明察成敗早防而救之塞其間隙也去聲絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺聲去辭禄讓賜飲食莭儉如此者貞臣也六曰家國昏亂所為不諛敢犯主之嚴顔面言主之過失如此者直臣也是謂六正何謂六邪一曰安官食禄不務公事與代浮沉左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂後同音洛不顧其後害如此者諛臣也三曰内實險詖蔽音外貌小謹巧言令色妬善嫉賢所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當聲去號令不行如此者奸臣也四曰智足以餙非辯足以行説税音内離骨肉之親外搆朝廷之亂如此者䜛臣也五曰專權擅勢以輕為重私門成黨以富其家擅矯主命以自貴顯如此者賊臣也六曰諂主以佞邪䧟主於不義朋黨比周鼻比音以蔽主明使白黑無别切彼列是非無間聲去使主惡布於境内聞於四隣如此者亡國之臣也是謂六邪賢臣處六正之道聲後處上同不行六邪之術故上安而下理生則見樂死則見思此人臣之術也禮記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐篇之辭禮經解然則臣之情偽知之不難矣又設禮以待之執法以御之為善者䝉賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉盖言之是也行之非也言之是則出乎公道行之非則涉乎邪徑是非相亂好惡相攻後所惡惡之好惡並去聲同所愛雖有罪不及於刑所惡雖無辜不免於罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有罪免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺踈逺罰不阿親貴以公平為規矩以仁義為凖繩考事以正其名循名以求其實則邪正莫隱善惡自分然後取其實不尚其華處其厚不居其薄則不言而化朞月而可知矣若徒愛美錦而不為人擇官聲為去有至公之言無至公之實愛而不知其惡憎而遂忘其善徇私情以近邪佞背公道而逺忠良逺去聲背音倍則雖夙夜不怠勞神苦思將求至理不可得也書奏甚嘉納之曰載采采言知人在於以徳而驗於行事也然愚按大禹曰知人則哲能官人臯陶為陳九徳舉劉向六正六邪之論是則然矣然知人者惟徳雖有九豈能全哉魏徴進求賢審官之説而某臣律之也果君子邪則正人也聖良忠智貞在於辨君子小人邪正之分固難一一以某臣則邪人也具諂奸䜛賊亡國六邪之惡雖未必直六正之徳雖未必備未必不兼也果小人邪君子小人邪正之異何所逃於哲之中乎備未必不兼也其曰知人則哲則明之極矣貞觀二十一年太宗在翠㣲宫置貞觀十年廢是年在長安縣武徳八年方成復脩授司農卿委積之事唐制掌倉儲李緯户部尚書房玄齡是時留守京城會有自京師來者太宗問曰玄齡聞李緯拜尚書如何對曰但云李緯大好髭鬚更無他語由是改授洛州剌史南府路洛州今河厥服矣翠㣲宴息聞老臣有大好髭鬚之語旋愚按太宗至是已倦于勤矣玄齡以耆壽俊在盖有聞諌而不䏻改者聞諌而能改者斯為善即改授亦可謂留心治道者也愚觀自古人君耳太宗聞而遽改迨近於不諌亦入者眉山蘇矣太宗之用李緯玄齡未嘗諌也特私有所議近於聖詎不信哉氏謂太宗之從諌封建第八章凡二貞觀元年封中書令房玄齡為䢴國公兵部尚書杜如晦為蔡國公吏部尚書長孫無忌為齊國公並為第一等食邑實封一千三百戸皇從父淮安王神通從高祖平京帥典兵宿衞封淮安王從去聲後同神通與高祖為從兄弟上言義旗𥘉起臣率兵先至月傳檄稱義師故曰義旗神通自長安隋大業十三年五月高祖起兵太原六原從平京師有功入鄠南山舉兵應太今玄齡等刀筆之人功居第一臣竊不服太宗曰國家大事惟賞與罰賞當其勞去當同聲後無功者自退罰當其罪為惡者咸懼則知賞罰不可輕行也今計勲行賞玄齡等有籌謀帷幄畫定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一决帝以蕭何功盛先封酇侯功臣皆曰何推他曰切漢高祖論功行封群臣爭功不夫獵追殺獸者狗也發縱指示者人也諸君徒能得無汗馬之勞徒持文墨議論顧居臣等上何也帝曰人也群臣皆莫敢言獸耳功狗也何之功叔父於國至親誠無愛惜但以不可緣私濫與勲臣同賞矣由是諸功臣自相謂曰陛下以至公賞不私其親吾属何可妄訴初高祖舉宗正籍弟姪再從三從孩童已上封王者數十人至是太宗謂群臣曰自兩漢已降惟封子及兄弟其踈逺者非有大功如漢之賈澤荆王從祖昆弟澤為燕漢高祖封從兄弟賈為軍有功王並為將並不得受封若一切封王多給力役乃至勞苦萬姓以養已之親属於是宗室先封郡王其間無功者皆降為縣公一月又按膠東郡王道彦傳云按本紀降封事係武徳九年十太宗即位舉属籍問大臣曰盡王宗子扵天下可乎唐興務廣藩鎮故從昆弟子自勝衣已上皆爵郡王不王如周郇滕漢賈澤尚不得茅土所以别親䟽也封徳彛曰漢所封惟帝子若親昆弟其属逺非大功所以示至公帝曰朕君天下以安百姓不容勞百姓先朝一切封之爵命崇而力役多以天下為私奉非降故道彦等並降封公由是言之其初所封郡王者以養已之親於是䟽属王者皆降為公惟有功者不也縣字疑衍後所降皆郡公功徳示天下以至公也豈為一家之私哉周公愚按三代有國大封同姓異姓親親賢賢褒表之嫌哉唐封功臣雖非祚土而爵號食邑禮典至親太公異姓皆祚大國以功徳也豈避至親説猶有褒表功徳之遺意至如降封宗族弟姪隆重雖以皇從父之言而亦示以賞不可私之以見至公也以明有功尤足貞觀十一年太宗以周封子弟八百餘年秦罷諸侯二世而滅呂后欲危劉氏終賴宗室獲安漢高祖后吕后名雉虗侯劉章因侍宴以軍法斬諸呂一人自是諸呂憚惠帝母也惠帝崩呂后臨朝欲王諸呂諸呂擅權朱益疆之劉氏封建親賢當是子孫長乆之道乃定制以子弟荆州都督荆王元景六子高祖第安州都督吳王恪宗太也次子等二十一人又以功臣司空趙州刺史長孫無忌尚書左㒒射宋州刺史房玄齡等一十四人並為世襲刺史禮部侍郎之貳尚書李百藥病祖母趙以百藥名字重規定州人㓜多是職復授右庶子卒謚曰康之貞觀初拜中書舍人後遷奏論駮世封事曰臣聞經國庇民王者之常制尊主安上人情之大方思聞理定之規以弘長代之業萬古不易百慮同歸然命暦有賖促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數後歴三十七主八百六十七年過昔成王定鼎卜世三十卜年七百也其數秦不及期二世被弑子嬰降漠不及期也初秦皇謂二世三世至于萬世後存亡之理在於郡國周氏以鑒夏􅎋之長乆遵皇王之並建維城磐石深根固本雖王綱㢮廢而枝幹相持故使逆節不生宗祀不絶秦氏背師古之訓商書傅背音倍師古匪説攸聞説告髙宗曰事不棄先王之道剪華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號呼而七廟隳祀河為津自以闗中之固金城千里子孫萬號平聲禮天子七廟賈誼曰斬華為城因一夫作難而七廟隳身死人手為天下笑世之業也秦皇沒山東豪傑並起而亡秦臣以為自古皇王君臨宇内莫不受命上玄冊名帝録締構遇興王之運殷憂属啓聖之期雖魏武携養之資沛人曹操末操子丕受漢禪國號魏追號操為武皇帝父嵩為漢中常侍曹騰養子不能審其生出本漢高徒役之賤長為縣送徒驪山徒多道亡自度比至必漢高祖姓劉名邦字季沛人初為泗上亭從者十餘人由是起兵皆亡乃縱所送徒徒中願非止意有覬覦推之亦不能去也囬切推他若其獄訟不歸之堯之子而之舜孟子曰獄訟者不菁華已竭雖帝堯之光被四表光顯被及于四外也虞書賛堯之辭謂徳之大舜之上齊七政齊七政謂日月五星也虞書曰在璿璣玉衡以非止情存揖讓守之亦不可焉以放勛重華之徳同重平聲放勛放上聲勛與勲之徳史記因以為堯舜之名者緫言堯之徳重華者緫言舜尚不能克昌厥後是知祚之長短必在於天時政或興衰有闗於人事隆周卜世三十卜年七百雖淪胥之道斯極而文武之器尚存斯龜鼎之祚已懸定於杳㝠也至使南征不返進王御船至中流膠液船觧王沒水中周昭王徳衰南巡濟于漢人惡之以膠舡東遷避逼邑以避戎㓂周平王東遷雒禋祀闕如郊畿不守此乃陵夷之漸有累於封建焉聲累去暴秦運距閏餘數終百六世秦陽九之阨百六之㑹謂莾為閏位百六為漢之阨數為閏餘百六為周之阨數也漢王莾傳云餘分閏位七八百六與三百七十四六乗八之數也六八四十也律暦志曰易九戹曰初入元百六注易爻有九六八十歲也八合為四百受命之主徳異禹湯繼世之君才非啓誦武王之子成王也啓夏禹之子誦周借使李斯王綰之軰咸開四履侯而有四方所履踐之界也李斯王綰皆秦丞相四履為諸將閭子嬰之徒俱啓千乗立為秦王後殺高降漢千乗諸侯之國其地可將閭秦公子為二世所殺子嬰始皇之孫趙高乗者也出兵車千豈能逆帝子之勃興抗龍顔之基命者也之䜟隆凖而龍顔漢髙祖應赤帝子然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯甸侯綏五服者服外又各五百里曰矦服矦服外又各五百里曰綏要荒也虞夏制王城之外四面各五百里曰甸服甸百里曰荒服周制乃分其五服為九見周禮服綏服外又各五百里曰要服要服外又各五王畿千里之間俱為采地曰邦畿千里是也采地者天子周制天子畿内之地方千里詩邑地也之卿大夫是則以結繩之化行虞夏之朝上古結繩易大傳曰虞夏之時已不可行上古之法也而治後世聖人易之以書契此言雖用象刑之典治劉曹之末而典者常也劉漢之姓曹魏之姓言漢魏虞書曰象以典刑象如天之垂象以示人世之法而為治也之時又豈可以帝紀綱㢮紊斷可知焉鍥船求劔未見其可中墜扵水遂刻其舟曰是吾劔所從水也舟鍥音刻吕氏春秋曰楚人有渉江其劔自舟求劔而不其惑乎已行而劔不行若此膠柱成文彌多所惑徃聖之法揚子曰以膠柱而調瑟治将来譬猶徒知問鼎請隧有懼覇王之師公三年左傳宣大小輕重對曰在德不在鼎僖公二十五年晋矦朝楚子觀兵于周疆定王使王孫滿勞之楚子問鼎之代徳而有二王亦叔父之所惡也王王享之請隧弗許曰王章也未有白馬素車無復藩維之援頸以組白馬素車奉天子璽符降軹道旁漢高祖初至覇上使人約降秦王子嬰繫降而不悟望夷之釁二世望夷宫秦相趙高弑未堪羿浞之災刈浞羿音畋獵信用寒浞浞後殺羿自立爲帝因羿之室生子夏帝相既立后羿有窮氏篡位帝相徙商丘羿躭于後滅奡立帝相子是爲少康奡奡弑帝相夏之貴臣殺浞既罹髙貴之殃魏髙貴罹音離昭擅政遂勒兵誅昭而敗爲昭黨所弑郷公名髦文帝之孫嗣明帝位六年司馬寧異申繒之酷而黜太子申矦怒與繒及犬戎殺王驪山下周幽王嬖褒姒而廢申后立褒姒之子伯服此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸㣲始自藩屏維藩大邦維屏音餅詩曰价人化為仇敵家殊俗國異政强陵弱衆暴寡疆埸彼此干戈侵伐狐駘之役女子盡髽傳襄公四年邾人莒人伐莊華切髽麻髪合結也左皆髽魯於是乎髽禮記曰魯婦人髽而弔鄫臧紇救鄫侵邾敗于狐駘國人逆喪者崤陵之師隻輪不反戎敗秦師于殽匹馬隻輪無反者公羊傳僖公二十二年晉人及姜斯盖略舉一隅其餘不可勝數下上聲上平聲陸士衡人以聖王經名機晉吳郡五等諸侯論國義在封建著方規規然云嗣王委其九鼎凶族據其天邑棄囯出奔也凶族謂王子頽王子帶王子朝嗣王謂周惠王襄王悼王也委九鼎謂三王宰則殊其憂樂何斯言之妄也封君列國藉其門資忘其先業之艱難輕其自然之崇貴莫不世增淫虐代益驕侈離宫别舘切漢淩雲或刑人力而將盡或召諸侯而共落陳靈則君臣悖禮共侮徴舒左傳宣徴平聲二人飲酒于夏氏公謂行父曰徴舒似汝對曰亦似公九年陳靈公與孔寍儀行父通于夏姬十年公與之二子奔楚徴舒夏姬之子也君徴舒病之公出自其廐而殺衛宣則父子聚麀終誅壽朔伋之妻是為宣姜生壽及朔朔與宣姜愬伋麀音幽牝鹿也聚麀謂無禮也衛宣公納子告伋伋曰君命也不可逃壽竊其節先徃賊殺之伋於公公令伋之齊使賊先待於隘而殺之壽知之以哀之作二子乘舟之詩壽朔當作伋壽至曰君命殺我壽何罪賊又殺之國人乃云為已思治豈若是乎後同為去聲内外群官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸禄不入私門豫章太守清後漢楊秉爲俸不入私門儉計日受禄餘妻子不之官舍守何並爲頴川太守後漢爲鉅鹿太不入官舍每之官妻子班條之貴食不舉火刺史在任不舉煙後漢左雄爲冀州乾飯火常食剖符之重居惟飲水未居官惟飲吳水而已晉鄧攸爲吳郡太守載南陽太守弊布褁身薄食妻子資藏布衾敝袛裯而後漢羊續爲南陽太守常敝衣已萊蕪縣長凝塵生甑令家貧里歌曰甑中生塵范長音掌後漢范丹爲萊蕪縣魚范萊蕪史雲釡中生專云爲利圖物何其爽歟緫而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚知所辨安可惑哉至如滅國弑君亂常干紀春秋二百年間略無寧歲十四年凢二百四十二年言春秋始魯隱公元年終哀公大數也二百者舉次睢咸秩遂用玉帛之君公十九年宋公睢音綏左傳僖泗有妖神東夷祀之鄫子小國之君乃殺而祭之非使邾文公用鄫子於次睢之社睢水名此水受汴入也禮魯道有蕩毎等衣裳之㑹辭按春秋魯荘公夫人魯道有蕩詩載驅篇之是詩以刺文姜來會齊襄公也姜氏會齊侯者凢六故齊人作縱使西漢哀平之際之子平帝名衎山中孝王之子皆元帝之庶孫前漢都長安故曰西漢哀帝名欣定陶恭王東洛桓靈之時章帝曾孫靈帝名宏章帝玄孫後漢都洛陽故曰東洛桓帝名志下吏淫暴必不至此為政之理後同為如字可以一言蔽焉伏惟陛下握紀御天膺期啓聖救億兆之焚溺掃氛祲於寰區創業垂統配二儀以立徳發號施令声施平妙萬物而為言獨照神衷永懷前古將復五等而修舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既徃至公之道斯乖況晉氏失馭㝢縣崩離氏初受晉司馬遜于宋魏禪後後魏乗時華夷雜處本北狄種改姓元氏乗平聲後魏拓拔氏重以闗河分阻吳楚懸隔聲重平習文者學長短從横之術蹤從音習武者盡干戈戰争之心畢為狙詐之階彌長澆浮之俗掌長音開皇在運帝年號開皇隋文因藉外家驅御群英任雄猜之數坐移明運非克定之功年踰二紀人不見徳二十四年文帝在位及大業嗣立帝年號大業煬世道交喪一人一物掃地將盡雖天縱神武削平㓂虐兵威不息勞止未康自陛下仰順聖慈嗣膺寳暦情深致理綜覈前王雖至道無名言象所紀略陳梗槩實所庶㡬聲平愛敬烝烝勞而不倦大舜之孝也曰克諧以虞書稱舜不格姦孝烝烝乂訪安内竪親嘗御膳文王之徳也文王之禮記曰内竪之御者曰今日安否何如曰安文王乃喜日中為世子朝於王季日三鷄𥘉鳴而衣服至寢門外問上必在視寒煖之節食下問所饍又至亦如之及莫又至亦如之食毎憲司讞罪尚書奏獄大小必察枉直咸舉以㫁趾之法易大辟之刑仁心隱惻貫徹幽顯大禹之泣辜也苑曰禹出見罪讞音碾議也說曰堯舜之民皆以堯舜之心為心寡人之民各自以人下車問而泣之左右曰罪人不順道何為痛之禹是以痛之其心為心正色直言虚心受納不簡鄙訥無棄芻蕘帝堯之求諫也稽于衆舍己從人訥當作陋虞書曰弘獎名教勸勵學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也子循循然善誘人相去聲論語曰夫群臣以宫中暑濕寝饍或乖請移御高明營一小閣遂惜十家之産竟抑子來之願不吝隂陽之感以安卑陋之居頃歲霜儉普天饑饉喪亂甫爾倉廩空虛聖情矜愍勤加賑恤竟無一人流離道路猶且食惟藜藿樂徹簨簴縣鐘皷之拊也上音筍下音巨曰簨縱曰簴皆以木為之横言必悽動貌成癯瘦公旦喜於重譯居攝六年制禮作樂天下和平越裳以三象重譯而重平聲旦周公名史記曰交趾之南有越裳國周公深音使不通故重譯而朝獻白雉曰道路悠逺山川阻文命矜其即叙記以為文命史就也言雍州水土既平而餘功及扵西戎也禹名夏書曰織皮崑崙析支渠捜西戎即叙即陛下每見四夷𣢾附萬里歸仁必退思進省切悉升凝神動慮恐妄勞中國以求逺方不藉萬古之英聲以存一時之茂實心切憂勞志絶遊幸毎旦視朝潮音聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非聲論平備盡肝膈惟及政事更無異辭纔日昃必命才學之士賜以清間高談典籍雜以文詠間以玄言聲間去乙夜忘疲乙夜讀書何以為人君太宗嘗曰若不甲夜視事中宵不寐此之四道獨邁徃初斯實生民以來一人而已弘兹風化昭示四方信可以朞月之間彌綸天壤而淳粹尚阻浮詭未移此由習之乆難以卒變猝卒音請待斵雕成器以質代文刑措之敎一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虛與時消息況於人乎傳之辭易豐卦彖美哉斯言也中書舍人馬周又上䟽曰伏見詔書令宗室勲賢平令聲作鎮藩部貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重之欲其緒裔承守與國無疆可使世官也何則以堯舜之父猶有朱均之子子曰啇均皆不肖堯之子曰丹朱舜之況下此以還而欲以父取兒恐失之逺矣儻有孩童嗣職萬一驕逸則兆庶被其殃而國家受其敗政欲絶之也則子文之理猶在自拘於司㓂王思子文之治曰子文無後何以勸子文楚令尹姓鬭名榖扵菟其孫克黄使齊復命其官善使復政欲留之也而欒黶之惡已彰黶名晉大夫黶音黯欒姓在盈乎黶死武子所施沒矣而黶之怨實章後盈見武子之子也晉士鞅曰欒黶汰虐已甚猶可以免其之子也逐盈黶與其毒害於見存之百姓現見音則寧使割恩於已亡之一臣明矣然則嚮之所謂愛之者乃適所以傷之也臣謂宜賦以茅土壇封諸侯取其方面苴古者天子以五色土為立社扵其國以白茅授之使疇其户邑必有材行聲去隨器方授則翰翮非强亦可以獲免尤累切良偽昔漢光武不任功臣以吏事所以終全其世者良由得其術也願陛下深思其宜使夫扶音得奉大恩而子孫終其福禄也太宗並嘉納其言於是竟罷子弟及功臣世襲刺史通按卿大夫咸資俸禄必致厚歛又京畿賦税不多所資鑑貞觀五年上令群臣議封建魏徴以爲若封建則若有警急追兵内地難以奔赴李百藥云云顔師古畿外若盡封國邑經費頓闕又燕秦趙代俱帶外夷互相維持各守其境協力同心足扶京室爲置官寮以爲不若分王宗子勿令過大閒以州縣雜錯而居爲條式一定此制萬代無虞十一月詔宗室勲賢作皆省司選用法令之外不得擅作威福朝貢禮儀具非乆安之道上䟽争之馬周亦上䟽云云會長孫無鎮藩部云云十三年二月于志寧以爲古今事殊恐春冰宗室憂虞如寘湯火緬惟三代封建盖由力不忌䓁皆不願上表固讓稱承恩以來形影相弔若履曩弊深協事宜今因臣䓁復有變更恐紊聖朝綱紀能制因而利之禮樂節文多非已出兩漢罷矦蠲除延世之賞致成勦絶之禍良可哀愍願停渙汗之㫖且後世愚㓜不肖之嗣或抵冐邦憲自取誅夷更因臣䓁披荆棘事陛下今海内寧一柰何棄之外州與賜其性命之恩又因子婦長樂公主固請扵上且言後嗣輔朕子孫共傳永乆而公䓁乃復發言怨望朕遷徙何異上曰割地以封功臣古今通義意欲公之歲不同今備録于此亦以見唐世議封建之始末云豈强公䓁以茅土耶詔停世封刺史與此章所紀年也盖自古以來有之聖人不得而廢也周室既衰范氏祖禹曰柳宗元有言曰封建非聖人意也勢以為郡縣三代之制不可復矣必欲法上古而封併為十二列為六七而封建之禮已亡秦滅六國國之弊也况諸侯之後嗣或賢或不肖而必使之之弱則不足以藩屏疆則必至扵僭亂此後世封時為大順次之三代封國後世郡縣時也因時制繼世是以一人而害一國也然則如之何記曰禮不可用於古也後世如有王者親親而尊賢務徳宜以便其民順也古之法不可用於今猶今之法平而興禮樂矣何必如古封建乃為盛哉而愛民慎擇守令以治郡縣亦足以致太設官分職以為民極之言慨然嘆曰不井田不封胡氏寅曰太宗嘗讀周官書辨方正位體國經野乎夫封建與天下共其利天道之公也郡縣以天建不足以法三代之治詔群臣議封建其本於此莾甚矣而近世蘇范二公亦謂封建不可行始皇下奉一人人欲之私也魏徴盖未嘗詳考古制鹵宗元之言曰封建非聖人意也勢也誠使上古諸李斯柳宗元之論聖人不能易也嗚呼豈其然乎水懐襄民無所定武王周公誅紂伐奄滅國五十侯已為民害聖人不得已而存之則唐虞之際洪制度以為郡縣乃畫壤列土脩明矦甸之法何哉皆天下之大變也此數聖人不能因時之變更立意也勢也夫為其徳之不可忘是以憫其絶此仁宗元又曰徳在人者死必奉其嗣故封建非聖人私意而歸之勢可乎宗元又曰諸侯國亂天子不之至義之盡而出扵人心之固然者固非聖人之皆先王之制也烏在其不改變乎漢不能制矦王得變其君夫孟子所言貶國削地六師移之之法故事自漢之失爰盎固言之矣豈可舉此以例禹未萌之惡及大逆不道然後勒兵夷之此非三代三公王室有難諸侯或釋位以間王政至其衰也湯文武所為哉方三代盛時諸侯或自其國入為若此類宗元皆略而不稱乃摘取衰微禍亂之一五伯雖彊大猶且攘夷狄以尊戴天下之共主凢屨也宗元又曰湯資三千諸侯以黜夏武資八百二欲舉封建而廢之是猶見刖者而欲廢天下之前要結衆力及成功之後姑息茍安此六國五代諸侯以翦商故不敢變易也是聖人於未舉兵之公之大者公天下自秦始夫謂三代聖王無公心庸主之所行而謂湯武為之乎宗元又曰封建非意以郡縣公天下是飛亷而有比干之忠也一何以封建自私是伯夷而為盗跖之事也謂秦無私夫食禄采地以盡其封域雖聖賢生于其時無以不類之甚歟宗元又曰諸侯繼世而立又有世大亂法度世固多賢也而又有郷舉里選之法有明立于天下天子聖明公卿必得其人諸侯不敢越無賢臣如周之衰秦之季漢魏隋唐之時在位者明側陋之揚何患乎材之不用也若上無明君下雖守宰徧宇内將何救扵此故凢宗元封建論皆無非小人而興邦之良佐悉沈于民伍不見庸也王之治至扵唐虞三代亦無以加矣井天下之田無稽而不可信也夫為君如堯舜禹湯亦足矣帝施其用人主自治不過千里大小相維輕重相制使民各有以養其生經天下之國使賢才皆得以泰恣肆之失是以義䖏利均天下之施故曰封建外無彊暴侵陵㣲弱不立之患内無廣土衆民奢并筦天下之私以自奉故曰郡縣之制人欲之私之法天下之公也若秦則妬民之兼并而自為兼三王之法孰不可行者在人而已矣然欲行封建也或曰然則封建今可行乎曰何獨封建也二帝用扵古猶古之法不可用扵今夫後世之私意妄先自井田始范子亦惑扵宗元謂今日之法不可三王善政良法為則則又何貴扵稽古哉為固不可行扵古而為天下者不以二帝世言治者何敢妄議哉自秦罷矦置守之後田愚按封建古先哲王公天下之良法美意也後漢七國晉八王挻禍尤甚其間悖逆自恣負强制學制皆非古矣由漢以下封建郡縣參錯若終不若郡縣臂指運掉之為得扵是封建是非梗化者不可勝數而維垣維翰者亦復不少然可行周官之法度後世無古先哲王治天下之之論興焉河南程子曰有闗雎麟趾之意然後建之失㢤愚不揆竊謂栁宗元之論固難盡非本而用古先哲王治天下之具宜致然也豈封過不以盛時封建之美䖏為言而以季世之弊而謂封建非聖人意謂公天下自秦始此誠為後世則亦未敢以為知言也封建井田兆於黄䖏為說此誠為偏若胡氏以井田封建可行扵故㢤居今之世出宗室而分王之取民田而井帝畫壄分州綿歴㡬代大備扵周豈一朝夕之於古之實也以封建為是者泥於古之名也盍疆之紛紜轇轕何能有定故以封建為非者昧古既逺權時施宜郡縣不可易也惟當精擇守曰彼三代而上之事勢此三代而下之事勢去激勸之體古先哲王之美意而行後世之良法令㧞其有治平之績者加秩而乆任之登進而不封建不足以為治可也毋庸曰不井田貞觀政要卷第三
