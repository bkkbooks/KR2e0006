front:
  text: 御製貞觀政要序
  hash: sha256:68aa92d66060d4939ad022de57e198e8d6645fe2119e82da945cae81232ea6d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_000-1a}
body:
  text: 朕惟三代而後治功莫盛於唐而唐三百年間尢莫若貞觀之盛誠以太宗克已勵精圗治于其上而群臣如魏徴輩感其知遇之隆相與獻可替否以輔治于下君明臣良其獨盛也宜矣厥後史臣吳兢釆其故實編類為十卷名曰貞觀政要有元儒士臨川戈直復加考訂注釋附載諸儒論說以暢其義而當時大儒吳澄又為之題辭以為世不可無其信然也朕萬幾之暇鋭情經史偶及是編喜其君有任賢納諌之美臣有輔君進諌之忠其論治亂興亡利害得失明白切要可為鑒戒朕甚嘉尚焉顧傳刻歲久字多訛謬因命儒臣重訂正之刻梓以永其傳于戲太宗在唐為一代英明之君其濟世康民偉有成烈卓乎不可及已所可惜者正心修身有愧于二帝三王之道而治未純也朕將逺師往聖允迪大猷以宏至治固不專于是編然而嘉尚之者以其可為行逺登髙之助也序于篇端讀者鑒焉成化元年八月初一日貞觀政要集論題辭夏有天下四百五十餘年商有天下六百三十餘年周有天下八百六十餘年三代以後享國之久唯漢與唐唐之可稱者三君而已太宗文皇帝身兼創業守成之事納諌求治勵精不倦其效至于米㪷三錢外户不閉故貞觀之盛有非開元元和之所可及而太宗卓然為唐三宗之冠史臣吳兢類輯朝廷之設施君臣之問對忠賢之諍議萃成十卷曰貞觀政要事核辭質讀者易曉唐之子孫奉為祖訓聖世亦重其書澄備位經筵時嘗以是進講焉夫過唐者漢孝文之恭儉愛民可鏡也超漢者夏大禹之好善言惡旨酒可規也繼夏者商成湯之不邇聲色不殖貨利可師法也周監二代郁郁乎文文武之德旦奭之猷具載二南二雅周頌之詩召誥立政無逸之書義理昭融教戒深切率而由之其不上躋泰和景運之隆乎然譬之行逺必自邇譬之登髙必自卑則貞觀政要之書何可無也庶士戈直考訂音釋附以諸儒論說又足開廣將來進講此書者之視聽其所禆益豈少哉前翰林學士資善大夫知制誥同修國史吳澄題辭二帝三王之治後世莫能及者順人之道盡乎仁義也唐太宗以英武之資克敵如拉朽所向無前天下甫㝎魏鄭公力排封德彛之􅓎以仁義進雖太宗未能允迪其實有愧于修齊然四年之間內安外服貞觀之治亦仁義之明效歟史臣吳兢類為政要凡命令政教敷奏復逆詢謀之同謇諤之異所以植國體而𥙿民生者赫赫若前日事江右戈直集前賢之論以釋之翰林草廬吳公叙其首以屬于余值拜奎章召命道廣陵謀于憲使日新程公將有以廣其傳也程公慨然即以學廪之羡鋟諸梓嗚呼仁義之心亘古今而無間因其所巳然勉其所未至以進輔于聖朝則二帝三王之治特由此而推之耳觀是編者尚勗之哉至順四年嵗在癸酉正月辛卯前中奉大夫江南諸道行御史臺侍御史奎章閣大學士郭思貞書貞觀政要者唐太宗文皇帝之嘉言善行良法美政而史臣吳兢編類之書也自唐世子孫既巳書之屏帷銘之几案祖述而憲章之矣至于後世之君亦莫不列之講讀形之論議景仰而效法焉夫二帝三王之事尚矣兩漢之賢君六七作何貞觀之政獨赫然耳目之間哉蓋兩漢之時世已逺貞觀之去今猶近遷固之文髙古爾雅而所紀之事略吳氏之文質檏該贍而所紀之事詳是則太宗之事章章較著于天下後世者豈非此書之力哉夫太宗之于正心修身之道齊家明倫之方誠有愧于二帝三王之事矣然其屈已而納諌任賢而使能恭儉而節用寬厚而愛民亦三代而下絶無而僅有者也後之人君擇其善者而從之其不善者而改之豈不交有所益乎惜乎是書傳寫謬誤竊嘗㑹萃衆本參互考訂而其義之難明音之難通字為之釋句為之述章之不當分者合之不當合者分之自唐以來諸儒之論莫不釆而輯之間亦斷以已意附于其後然後此書之旨頗為明白雖于先儒窮理之學不敢妄議然于國家致治之方未必無小𥙷云後學臨川戈直謹書貞觀政要序唐衛尉少卿兼修國史修文館學士吳兢撰惟與魏元忠朱敬則游唐長安中二人者當道按兢汴州浚儀人少厲志貫知經史方直寡諧𥙷闕纍遷衛尉少卿兼修文館學士復修史于薦兢才堪論撰詔直史館修國史神龍中為右合四十篇上之名曰貞觀政要開元中為太子是來撫太宗朝政事之要隨事載録以傋勸戒叙事簡核有古良史之風嘗撰則天實録直筆左庶子又嘗私撰唐書唐春秋兢居官多忠諌今董狐云無諱當世謂有唐良相曰侍中安陽公中書令河東公以時逢聖明位居宰輔寅亮帝道弼諧王政恐一物之乖所慮四維之不張每克已勵精緬懷故實未嘗有乏太宗時政化良足可觀振古而來未之有也至于垂世立教之美典謨諌奏之詞可以弘闡大猷增崇至道者爰命不才備加甄録體制大略咸發成規于是綴集所聞參詳舊史撮其指要舉其宏綱詞兼質文義在懲勸人倫之紀備矣軍國之政存焉凡一帙一十卷合四十篇名曰貞觀政要庶乎有國有家者克遵前軌擇善而從則可久之業益彰矣可大之功尤著矣豈必祖述堯舜憲章文武而已哉其篇目次第列之于左第一卷論君道第一論政體第二第二卷論任賢第三論求諌第四論納諌第五第三卷論君臣鑒戒第六論擇官第七論封建第八第四卷論太子諸王定分第九論尊敬師傅第十論教戒太子諸王第十一論規諌太子第十二第五卷論仁義第十三論忠義第十四論孝友第十五論公平第十六論誠信第十七第六卷論儉約第十八論謙讓第十九論仁惻第二十慎所好第二十一慎言語第二十二杜讒邪第二十三論悔過第二十四論奢縱第二十五論貪鄙第二十六第七卷崇儒學第二十七論文史第二十八論禮樂第二十九第八卷論務農第三十論刑法第三十一論赦令第三十二辨興亡第三十三論貢賦第三十四第九卷議征伐第三十五議安邊第三十六第十卷論行幸第三十七論畋獵第三十八論災祥第三十九論慎終第四十集論諸儒姓氏柳氏芳進士肅宗時綴緝國史字仲敷蒲州人唐玄宗時劉氏煦晉時丞相撰舊唐書字耀逺范陽人五代宋氏祁為翰林學士撰新唐書列傳字子京安陸人宋仁宗時進士孫氏甫為諌官撰唐史記及唐史論斷字之翰許昌人宋仁宗時進士歐陽氏修至參知政事太子少師撰新唐書字永叔廬陵人宋仁宗時進土仕文集紀志有曽氏鞏時擢中書舍人有文集字子固南豐人宋神宗司馬氏光左僕射贈太師撰資治通鑑字君實湅水人宋哲宗時拜孫氏洙時進士為諌官有文集字巨源廣陵人宋神宗范氏祖禹時為翰林學士撰唐鑑字淳父成都人宋哲宗馬氏存時進士有文集字子才宋哲宗朱氏黼張氏九成時狀元為待制撰史論字子韶開封人宋髙宗胡氏寅進士為諌官撰讀史管見字明仲建安人宋髙宗時吕氏祖謙字伯恭東萊人唐氏仲友字金華人葉氏適字正則永嘉人林氏之竒字少頴三山人真氏德秀字希元建安人陳氏惇修字伯厚三山人撰史斷尹氏起莘括蒼人撰通鑑綱目發明程氏祁吕氏未詳名字撰通鑑精義貞觀政要戈直集論地之道貞觀者也猶言天地之文理主于正以愚按貞觀者唐太宗表年之號也易大傳曰天之嘉言善行良法美政之大要也唐史本紀曰示人也政要者唐史臣吳兢類輯貞觀間君臣八世孫髙祖次子也母曰太穆皇后竇氏生而太宗姓李氏諱世民隴西成紀人為凉武昭王貴子及見太宗曰龍鳳之姿天日之表其年幾不驚方四嵗有書生謁髙祖曰公貴人也必有世民及長聰明英武有大志能屈節下士結納冠必能濟世安民書生既去乃采其語名之曰元年髙祖以唐王受隋禪國號唐明年改元武豪傑佐髙祖以定天下之亂功業日隆隋義寧聽政是年八月即皇帝位明年攺元貞觀在位德封世民為秦王九年立秦王世民為皇太子之盛與夫任賢使能之方從諌樂善之道大略凡二十三年為一代之賢君其言行之美政治初政號為清明則是書也不無𥙷于治云皆聚此書也後文宗讀此慨然慕之故太和
