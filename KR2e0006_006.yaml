body:
  text: 孝友第十五凡五章司空房玄齡事繼母能以色養聲去恭謹過人其母病請醫人至門必迎拜垂泣及居喪聲平尤甚柴毁瘠如言毁也柴太宗命散騎常侍劉洎就加寛譬遺寢床粥食塩菜聲遺去根扵人心其發見扵事親者此理也發見扵事愚按孝經傳曰事親孝故忠可移扵君盖天理之門未有事親孝而事君不忠者思脩身不可君者此理也忠孝豈二道哉故求忠臣扵孝子房玄齡唐之名相而孝之至固宜忠之盡也且以不事親未有身不脩而可以治國平天下者繼母也夫是之謂孝玄齡其知此矣昔之以孝聞者如閔損王祥之類皆虞世南初仕隋歴起居舍人作之事以為國志隋制掌書王言動宇文化及殺逆之際曰弑殺讀其兄世基時為内史侍郎中書隋改史為内将被誅世南抱持號泣聲號平請以身代死化及竟不納世南自此哀毁骨立者數載時人稱重焉時文學才譽人比之晉二陸入隋而俱登班列愚按虞世基兄弟出扵吳中嘗從顧野王學一兄其孝友可尚已世南歸唐為唐名卿盖其温世基與宇文化及之難世南不愛其身求代其扵天性云恭豈弟出韓王元嘉卷皆以古文參定同異當世稱之高祖第十一子也少好學蔵書至萬貞觀初六年史作為潞州剌史舊􅊢河東潞州今仍時年十五在州聞太妃有疾昭儀有寵高祖即位欲立為后固辭不受韓太妃韓王之母隋大将軍宇文述之女也為而為帝所愛王以母有寵便涕泣不食及至京師發喪聲平哀毁過禮太宗嘉其至性屢慰勉之元嘉閨門修整有類寒素士大夫與其弟魯哀王靈䕫同母弟也好學善音髙祖第十九子韓王貞父子事洩自縊謚曰哀律後以謀欲起兵應接越王甚相友愛兄弟集見如布衣之禮其修身潔已内外如一當代諸王莫能及者霍王元軌閉閤讀書與處士劉玄平為布衣交或問髙祖第十四子也多才藝出為刺史所至不偹吾何以稱之王所長玄平曰王無武徳中初封為吳王封蜀王八武徳六年吳王年徙封貞觀七年為夀州刺史豐路隷淮西夀州今為安屬髙祖崩去職毁瘠過禮自後常衣布服聲衣去示有終身之戚太宗嘗問侍臣曰朕子弟孰賢侍中魏徵對曰臣愚暗不盡知其能惟吳王數與臣言朔數音臣未嘗不自失太宗曰卿以為前代誰比徵曰經學文雅亦漢之間平東平獻王蒼也漢河間獻王徳至如孝行聲去乃古之曾閔也損也曾參閔由是寵遇彌厚因令妻徴女焉妻去聲令平聲子之貴其性豈與人異哉孟子所謂其居使之愚按孟子言性善堯舜至扵塗人一也王孫公之孝友居䖏之儉約操履之修潔有一介之士然也觀太宗諸弟若韓王元嘉霍王元軌天性無爾殊也彼昏不知者乃自絶其天理耳所難能者可謂賢也已矣是尤見人性之初貞觀中有突厥史行昌史為姓行昌其名也突厥阿史那氏此因以直玄武門取以名門也玄武北方宿名食而捨肉人問其故曰歸以奉母太宗聞而歎曰仁孝之性豈隔華夷賜尚乗馬一疋主車乗之官乗去聲尚乗詔令給其母肉料聲令平之心事聞扵萬乗獲仁孝之褒優賜之厚則有愚按一直門之士夷貊之人也而有孝扵其母感發扵孝乎人心者孰不公平第十六凡八章太宗初即位中書令房玄齡奏言秦府舊左右未得官者並怨前宫及齊府左右䖏分之先已先並去聲䖏上聲分太宗曰古稱至公者盖謂平恕無私丹朱商均子也而堯舜廢之舜舜之子商均亦不肖乃以天下授禹堯知子丹朱之不肖不足授天下卒授管叔蔡叔兄弟也而周公誅之皆文王之子也武王管叔名鮮蔡叔名度遺民武王崩成王少周公旦專王室叔疑之乃挾武既克殷封鮮扵管封度扵蔡相紂子武庚祿父治殷誅武庚殺管叔流蔡叔庚作亂周公承王命遂故知君人者以天下為公無私於物昔諸葛孔明小國之相明名亮琅琊人為蜀去聲諸葛複姓字孔相丞猶曰吾心如稱同與秤不能為人作輕重後同為去聲況我今理大國乎朕與公等衣食出扵百姓此則人力己奉扵上而上恩未被扵下今所以擇賢才者盖為求安百姓也用人但問堪否豈以新故異情凡一面尚且相親況舊人而頓忘也才若不堪亦豈以舊人而先用今不論其能不能而直言其嗟怨豈是至公之道耶貞觀元年有上封事者請秦府舊兵並授以武職追入宿衛太宗謂曰朕以天下為家不能私扵一物惟有才行是任聲行去豈以新舊為差況古人云兵猶火也弗戢將自焚汝之此意非益政理視聴以民為視聼一至公而已太宗踐作之初愚按書曰天視自我民視天聴自我民聴天無也房玄齡言秦府未得官者共怨前宫齊府左首發至公無私之論古帝王憲天聦明用是道私故府之士矣有請秦府舊兵授以武職追入右之先已則曰用人惟才不論舊故不如是則是則私故府之兵矣君天下者毎以至公存心宿衛則曰惟以才行是任豈以新舊為差不如扵人心乎何徃而不當貞觀元年吏部尚書長孫無忌嘗被召不解佩刀入東上閣門出閣門後臨門校尉始覺尚書右僕射封徳彛議以監門校尉不覺罪當死無忌誤帶刀入徒二年罰銅二十斤太宗徔之大理少卿之貳也少去聲卿戴胄駁曰校尉不覺無忌帶刀入内同為誤耳夫臣子之於尊極扶夫音不得稱誤准律云供御湯藥飲食舟船誤不如法者皆死陛下若錄其功非憲司所决若當㩀法罸銅未為得理太宗曰法者非朕一人之法乃天下之法何得以無忌國之親戚便欲撓法耶更令定議後同令平聲徳彛執議如初太宗將從其議胄又駮奏曰校尉緣無忌以致罪於法當輕若論其過誤則為情一也如字為情而生死頓殊敢以固請太宗乃免校尉之死是時朝廷大開選舉或有詐偽階資者太宗令其自首後同首去聲不首罪至于死俄有詐偽者事洩胄㩀法斷流以奏之太宗曰朕初下敕不首者死今斷徔法是示天下以不信矣胄曰陛下當即殺之非臣所及既付所司臣不敢虧法太宗曰卿自守法而令朕失信耶胄曰法者國家所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿昭朝音而許殺之既知不可而寘之以法此乃忍小忿而存大信臣竊為陛下惜之聲為去太宗曰朕法有所失卿能正之朕復何憂也重胄為大理之議可謂用法平允矣守所司之法張氏九成曰法者天下公共雖天子喜怒不得輕取信民不冤濫為吏若此國家何所患哉不顧天子之詔救上之失逹君之聽使四海情必虐㷀獨而畏高明君子反是向無胄之言則唐氏仲友曰書曰無虐㷀獨而畏高明盖小人之訓矣其為利害豈淺哉太宗為失刑皆皇極之見用遂移其所以事隋者事唐勸用法律之說愚按封德彛隋之佞人也及唐之興以秘䇿而觀德彝與戴胄論無忌校尉之罪用捨之間其若行則仁義之効民生不覩扵貞觀之世矣今用人用人豈容輕哉非戴胄執法之公太宗從得失視仁義法律之說未相輕重也為國在扵人者㡬希矣善之速其不冤貞觀二年太宗謂房玄齡等曰朕比見鼻比音隋代遺老咸稱高熲善為相者之賢相煬帝以其忠諫為謗相去聲後同高熲字昭玄隋之訕誅遂觀其本傳聲去可謂公平正直尤識治體隋室安危繫其存沒煬帝無道枉見誅夷何嘗不想見此人廢書欽歎又漢魏已來諸葛亮為丞相亦甚平直嘗表廢廖立蜀為長水使者字公淵武陵人仕李嚴仕蜀為中都説字正方南陽人於南中立聞亮卒泣曰吾其左袵矣嚴聞亮卒發病而死故陳夀三國志晉人撰稱亮之為政開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者若如是則榮名髙位可以長守玄齡對曰臣聞理國要道在於公平正直故尚書云字尚如無偏無黨王道蕩蕩無黨無偏王道平平篇之辭周書洪範又孔子稱舉直錯諸枉則民服對魯哀公之辭錯讀曰措孔子今聖慮所尚誠足以極政教之源盡至公之要囊括區宇化成天下太宗曰此直朕之所懷豈有與卿等言之而不行也説攸聞太宗謂朕每慕前代帝王之善者卿等愚按昔傅説告啇宗曰事不師古以克永世匪王之善者若堯舜禹湯文武成康降是則漢七可慕宰相之賢者其有合扵師古者乎前代帝傅周召降是則蕭曹丙魏是已髙熲之公平正制之主是已前代宰相之賢者若臯夔稷契伊亮王佐才也誠有古良相之遺風三代而下所直亦可謂賢相矣惜昧扵不可則止之義諸葛帝三王之相不得而見之矣得見如武侯者斯不常見太宗令相臣企慕之亦知人哉嗚呼二矣可長樂公主封長樂郡下嫁長孫沖樂音洛公主太宗第五女文徳皇后所生也貞觀六年將出降嫁也謂下敕所司資送倍於長公主長公主乃髙祖之女也長音掌後同通鑑作永嘉魏徴奏言昔漢明帝欲封其子帝曰朕子豈得同於先帝子乎可半楚淮陽王昞皆光武子楚王英淮陽王前史以為美談天子姊妹為長公主天子之女為公主既加長字良以尊於公主也情雖有殊義無等别切彼列若令公主之禮聲令平有過長公主理恐不可實願陛下思之太宗稱善乃以其言告后后歎曰嘗聞陛下敬重魏徴殊未知其故而今聞其諫乃能以義制人主之情真社稷臣矣妾與陛下結髪為夫妻曲䝉禮敬情義深重每將有言必俟顔色尚不敢輕犯威嚴況在臣下情踈禮隔故韓非謂之說難刑名之學者韓非戰國時東方朔稱其不易朔字曼倩平以䜴切東方時為大夫原人漢武帝良有以也忠言逆耳而利於行有國有家者深所要急納之則世治杜之則政亂誠願陛下詳之則天下幸甚因請遣中使聲去賫帛五百匹詣徴宅以賜之娣之袂良盖謂王姬下嫁位雖至貴不事容餙愚按易之歸妺曰帝乙歸妺其君之袂不如其尚禮而不尚餙故其袂不及其娣之袂良以儉也娣媵以容餙為事而衣袂所以為容餙者也雖以后之所生毋乃牽扵愛而不節以制度乎徳也太宗扵公主之降敕所司賫送倍長公主聴從而文徳皇后又從而褒賞之也若后之徳是道之以諭禮越法矣幸魏徴之忠諫太宗之姒邑姜者矣正家而天下定后之謂歟雖漢之隂馬亦不能及可謂無愧周之任刑部尚書張亮坐謀反下獄孫節以䜟有弓長之主亮為相州刺史假子公徳告發其謀并言亮養假子五百太宗曰正欲反耳當别都亮自以相舊都弓長其姓隂有怪謀陜人常不自脩乃至此將奈何扵是斬之籍其家遣房玄齡謂曰法者天下平與公共為之公詔令百官議之後同令平聲多言亮當誅惟殿中少監制殿中監少去聲唐事少監其貳也掌天下服御之李道裕奏亮反形未具明其無罪太宗既盛怒竟殺之俄而刑部侍郎有闕書之貳侍郎尚令宰相妙擇其人聲相去累奏不可太宗曰吾己得其人矣徃者李道裕議張亮云反形未具可謂公平矣當時雖不用其言至今追悔遂授道裕刑部侍郎嵗餘乃以刑部命道裕太宗可謂能改過道裕可唐氏仲友曰道裕議張亮反形未具太宗不暇省刑矣謂善議除不惟見太宗悔過之心亦足見太宗擇人之愚按因李道裕議張亮之獄遂有刑部侍郎之有過必諫之路也唐之刑部周官司寇掌邦禁術又所以示天下以月慎用刑之意開人臣以陶曰此其選也太宗是舉衆善集焉之職妙擇其人而不輕授帝舜之命臯貞觀初太宗謂侍臣曰朕今孜孜求士欲專心政道聞有好人則抽擢驅使而議者多稱彼者皆宰臣親故但公等至公行事勿避此言便為形迹古人内舉不避親外舉不避讎而為舉得其真賢故也但能舉用得才雖是子弟及有讎嫌不得不舉大臣之用人唯其公而已矣茍得其人雖子弟愚按祁奚舉賢不避祁午謝安舉將不避謝玄避形迹斯言當矣異時或告魏徴阿黨親戚太可也况親戚乎太宗謂侍臣但雖舉用得才勿又與斯言相戾矣使非鄭公直言不撓果得以宗命案驗無狀乃使謂徴曰自今宜存形迹則否乎踐斯言貞觀十一年時屡有閹宦充外使去聲後同閹音淹使妄有奏事發太宗怒魏徴進曰閹竪雖㣲狎近左右時有言語輕而易信䜴切易以浸潤之譛為患特深今日之明必無此慮為子孫教不可不杜絶其源太宗曰非卿朕安得聞此語自今已後充使宜停魏徴因上䟽曰臣聞為人君者在乎善善而惡惡如字後同上烏去聲下近君子而逺小人後同逺去聲善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政逺小人則聴不私邪小人非無小善君子非無小過君子小過盖白玉之㣲瑕小人小善乃鈆刀之一割鈆刀一割良工之所不重小善不足以掩衆惡也白玉㣲瑕善賈之所不棄古賈音小疵不足以妨大美也善小人之小善謂之善善惡君子之小過去聲惡為謂之惡惡此則蒿蘭同嗅玊石不分屈原所以沉江䜛而不見用乃自沉汨羅江屈原名平楚懐王大夫王信死而卞和所以泣血者也以為偽刖其足和抱璞而泣卞和楚人得玉璞獻厲王王以血繼之既識玉石之分又辨蒿蘭之臭善善而不能進惡惡而不能去聲上此郭氏所以為墟諌篇事見納史魚所以遺恨也蘧伯玉退彌子瑕是吾為臣不能正其君家語曰史魚病将卒命其子曰吾不能進其子從之靈公弔其子以告公公曰寡人之過也命也生不能正其君則死無以成禮我死汝置屍牖下古之諌者死則已矣未有如史魚死而屍諌忠感其殯之客位進蘧伯玉而用退彌子瑕而逺之孔子曰不謂直乎君者也可陛下聦明神武天姿英叡志存泛愛引納多塗好善而不甚擇人後同好去聲疾惡而未能逺佞又出言無隱疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之明猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣後同長音掌聞善或疑則君子之道消矣為國家者急於進君子而退小人乃使君子道消小人道長則君臣失序上下否隔粃否音亂亡不䘏將何以理乎且世俗常人心無逺慮情在告訐好言朋黨夫以善相成後同夫音扶謂之同徳以惡相濟謂之朋黨今則清濁共流善惡無别切彼列以告訐為誠直以同徳為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不結於下臣忠所以不達於上大臣不能辯正小臣莫之敢論逺近承風混然成俗非國家之福非為理之道適足以長姦邪亂視聼使人君不知所信臣下不得相安若不逺慮深絶其源則後患未之息也今之幸而未敗者由乎君有逺慮雖失之於始必得之於終故也若時逢少隳徃而不返雖欲悔之必無所及既不可以傳諸後嗣復何以垂法將来且夫進善黜惡施於人者也後同施平聲以古作鑒施於己者也鑒貌在乎止水鑒已在乎哲人能以古之哲王鑒於己之行事則貌之妍醜宛然在目事之善惡自得於心無勞司過之史不假芻蕘之議巍巍之功日著赫赫之名彌逺為人君者可不務乎臣聞道徳之厚莫尚於軒唐仁義之隆莫彰於舜禹欲繼軒唐之風將追舜禹之跡必鎮之以道徳弘之以仁義舉善而任之擇善而徔之不擇善任能而委之俗吏既無逺度必失大體惟奉三尺之律以繩四海之人欲求垂拱無為不可得也故聖哲君臨移風易俗不資嚴刑峻法在仁義而已故非仁無以廣施字如非義無以正身恵下以仁正身以義則其政不嚴而理其教不肅而成矣然則仁義理之本也刑罰理之末也為理之有刑罰猶執御之有鞭䇿也人皆徔化而刑罰無所施馬盡其力則有鞭䇿無所用由此言之刑罰不可致理亦已明矣故潛夫論節信著書號潛夫論夫如字後漢王符字曰人君之理莫大於道徳教化也民有性有情有化有俗情性者心也本也俗化者行也末也後同行去聲是以上君撫世先其本而後其末順其心而履其行心情苟正則姦慝無所生邪意無所載矣是故上聖無不務理民心故曰聴訟吾猶人也必也使無訟乎之辭孔子道之以禮務厚其性而明其情民相愛則無相傷害之意動思義則無畜姦邪之心若此非律令之所理也此乃教化之所致也聖人甚尊徳禮而卑刑罰故舜先敕契以敬敷五教有義夫婦有别長㓜有序朋友有信契音泄舜臣名五教謂父子有親君臣而後任咎繇以五刑也謂墨劓剕宫大辟也咎繇與臯陶同五刑凡立法者非以司民短而誅過誤也乃以防姦惡而救禍患檢淫邪而内正道曰納内讀民䝉善化則人有士君子之心被惡政則人有懐姦亂之慮故善化之養民猶工之為麯豉也六合之民猶一廕也黔首之属曰黔首秦稱民猶荳麥也變化云為在將者耳遭良吏則懐忠信而履仁厚遇惡吏則懐姦邪而行淺薄忠厚積則致太平淺薄積則致危亡是以聖帝明王皆敦徳化而薄威刑也徳者所以循已也威者所以理人也民之生也猶鑠金在爐方圎薄厚隨鎔制耳是故世之善惡俗之薄厚皆在於君世之主誠能使六合之内舉世之人感忠厚之情而無淺薄之惡各奉公正之心而無姦險之慮則醇釅之俗俗如酒味之和也醇音淳釅音驗言復見於兹矣後王雖未能遵專尚仁義當慎刑䘏典哀敬無私故管子曰聖君任法不任智任公不任私故王天下聲王去理國家貞觀之初志存公道人有所犯一一於法縱臨時䖏斷下去聲上上聲或有輕重但見臣下執論無不忻然受納民知罪之無私故甘心而不怨臣下見言無忤故盡力以効忠頃年以来意漸深刻雖開三面之網篇注見規諫而察見川中之魚取捨在於愛憎輕重由乎喜怒愛之者罪雖重而強為之辭聲强上惡之者過雖小而深探其意同探平聲惡烏去聲後法無定科任情以輕重人有執論疑之以阿偽故受罰者無所控告當官者莫敢正言不服其心但窮其口欲加之罪其無辭乎又五品已上有犯悉令聲平曹司聞奏本欲察其情狀有所哀矜今乃曲求小節或重其罪使人攻擊惟恨不深事無重條求之法外所加十有六七故頃年犯者懼上聞得付法司以為多幸告訐無已窮理不息君私於上吏姦於下求細過而忘大體行一罰而起衆姦此乃背公平之道倍背音乖泣辜之意篇注見封建欲其人和訟息不可得也故體論云夫淫泆盜竊百姓之所惡也我從而刑罰之雖過乎當聲去百姓不以我為暴者公也怨曠飢寒亦百姓之所惡也遁而䧟之法我徔而寛宥之百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞輕而勸善刑省而禁姦由此言之公之於法無不可也過輕亦可私之於法無可也過輕則縱姦過重則傷善聖人之於法也公矣然猶懼其未也而救之以化此上古所務也後之理獄者則不然未訊罪人則先為之意及其訊之則驅而致之意謂之能不探獄之所由聲探平生為之分而上求人主之㣲旨以為制謂之忠其當官也能其事上也忠則名利随而與之驅而䧟之欲望道化之隆亦難矣凢聴訟吏獄必原父子之親立君臣之義權輕重之序測淺深之量悉其聦明致其忠愛疑則與衆共之疑則徔輕者所以重之也故舜命咎繇曰汝作士惟刑之恤書出虞又復加之以三訊中一曰訊群臣二曰訊群吏周禮以三刺斷庻民獄訟之萬民三曰訊衆所善然後㫁之是以為法叅之人情故傳曰聲傳去小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨者也立愛憎者也右親戚者也䧟怨讎者也聲怨平何世俗小吏之情與夫古人之懸逺乎有司以此情疑之羣吏人主以此情疑之有司是君臣上下通相疑也欲其盡忠立節難矣凢理獄之情必本所犯之事以主不敢訊不旁求不貴多端以見聦明故律正其舉劾之法參伍其辭所以求實也非所以飾實也但當參伍明聴之耳不使獄吏鍜鍊飾理成辭於手孔子曰古之聴獄求所以生之也今之聴獄求所以殺之也故析言以破律任案以成法執左道以必加也又淮南子書曰淮南子漢淮南王安著曰豐水之深十仞金鐵在焉則形見扵外現見音非不深且清而魚鱉莫之歸也故為者以苛為察以功為明以刻下為忠以訐多為功譬猶廣革大則大矣裂之道也夫賞宜徔重罰宜徔輕君居其厚百王通制刑之輕重恩之厚薄見思與見疾其可同日言哉且法國之權衡也時之凖繩也權衡所以定輕重凖繩所以正曲直今作法貴其寛平罪人欲其嚴酷喜怒肆志髙下在心是則捨凖繩以正曲直棄權衡而定輕重者也不亦惑哉諸葛孔明小國之相聲去猶曰吾心如秤不能為人作輕重聲為去況萬乗之主内之地天子畿故曰萬乗之主方千里出車萬乗當可封之日比屋可封唐虞之世而任心棄法取怨於人乎又時有小事不欲人聞則暴作威怒以弭謗議若所為是也聞於外其何傷若所為非也雖掩之何益故諺曰欲人不知莫若不為欲人不聞莫若勿言為之而欲人不知言之而欲人不聞此猶捕雀而掩目盗鐘而掩耳者秪以取誚將何益乎臣又聞之無常亂之國無不可理之民者夫君之善惡由乎化之薄厚故禹湯以之理桀紂以之亂文武以之安幽厲以之危是以古之哲王盡已而不以尤人求身而不以責下故曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉告魯君之辭左傳臧文仲為之無已深乖惻隱之情實啓姦邪之路温舒恨於曩日上書言獄吏之温舒前漢人嘗害臣亦欲惜不用非所不聞也臣聞堯有敢諫之鼓四岳置諫鼓通暦曰堯定舜有誹謗之木立誹謗之木淮南子曰舜湯有司過之史有司直之人淮南子曰湯武有戒慎之銘曰敬勝怠者吉怠太公述丹書之言退而爲戒乃書於几鑑盂槃爲銘出大戴禮勝敬者滅義勝欲者從欲勝義者凶武王聞之此則聴之於無形求之於未有虚心以待下庻下情之逹上上下無私君臣合徳者也魏武帝云有徳之君樂聞逆耳之言犯顔之諍洛樂音親忠臣厚諫士斥䜛慝逺佞人者後同逺去聲誠欲全身保國逺避滅亡者也凢百君子膺期綂運縱未能上下無私君臣合徳可不全身保國逺避滅亡乎然自古聖哲之君功成事立未有不資同心予違汝弼者也昔在貞觀之初側身勵行謙以受物盖聞善必改時有小過引納忠規每聴直言喜形顔色故凢在忠烈咸竭其辭自頃年海内無虞逺夷懾服志意盈滿事異厥初髙談疾邪而喜聞順㫖之説空論忠讜而不悦逆耳之言私嬖之徑漸開至公之道日塞徃来行路咸知之矣邦之興衰實由斯道為人上者可不勉乎臣數年以来每奉明㫖深懼群臣莫肯盡言臣切思之自比来鼻比音人或上書事有得失惟見述其所短未有稱其所長又天居自髙龍鱗難犯在於造次到切造七不敢盡言時有所陳不能盡意更思重竭聲重平其道無因且所言當理聲當去未必加於寵秩意或乖忤將有恥辱随之莫能盡節實由於此雖左右近侍朝夕堦墀事或犯顔咸懐顧望況踈逺不接將何以極其忠欵哉又時或宣言云臣下見事秪可来道何因所言即望我用此乃拒諫之辭誠非納忠之意何以言之犯主嚴顔獻可替否所以成主之美匡主之過若主聴則惑事有不行使其盡忠讜之言竭股肱之力猶恐臨時恐懼莫肯效其誠欵若如明詔所道便是許其面徔而又責其盡言進退将何所㩀欲必使乎致諌在乎好之而已後同好去聲故齊桓好服紫而合境無異色楚王好細腰而後宫多餓死必有甚之意言上有好者下夫以耳目之玩人猶死而不違況聖明之君求忠正之士千里斯應信不為難若徒有其言而内無其實欲其必至不可得也太宗手詔曰省前後諷諭井切省悉皆切至之意固所望於卿也朕昔在衡門尚惟童㓜未漸師保之訓尖漸音罕聞先逹之言值隋主分崩萬邦塗炭惵惵黔黎蝶惵音庇身無所朕自二九之年有懐拯溺發憤投袂便提干戈蒙犯霜露東西征伐日不暇給居無寜嵗降蒼昊之靈禀廟堂之略義旗所指觸向平夷弱水流沙甘肅今属並通輶軒之使輕車也去聲輶被髪左袵之人四夷也皆爲衣冠之域正朔所班無逺不届及恭承寶暦寅奉帝圖垂拱無爲氛埃靖息於兹十有餘年斯盖股肱罄帷幄之謀瓜牙竭熊羆之力恊徳同心以致於此自惟寡薄厚享斯休毎以撫大神器憂深責重常懼萬機多曠四聦不達戰戰兢兢坐以待旦詢于公卿以至隷皂推以赤心庻幾明頼一動以鍾石淳風至徳永傳於竹帛克播鴻名常爲稱首朕以虚薄多慙徃代若不任舟楫豈得濟彼巨川不藉鹽梅安得調夫五味作舟楫又曰若作和羹爾惟鹽梅啇書髙宗命傳説曰若濟巨川用汝賜絹三百匹强也周公知其後多簒弑夫所貴乎聖賢者以愚按春秋之世衛至弱也季子知其後亡齊至之言曰閹宦雖㣲為患特深今日之明必無此其見禮知政而前知扵未然之先也善乎魏徴竟以宦者而亂及其末世遂以宦者而亡徴之慮為子孫計不可不杜絶其源厥後唐之中葉著之為令俾後之子孫世世無得使宦者與政明見雖周公季子何逺之有哉太宗斯時正當厥孫謀者邪徴既言閹宦之禍復上䟽數千言可也乃不過停其充使是特一時之計耳豈貽世者則此其最詳者也太宗答詔丁寧寵賜優極陳當時之失史稱徴諫䟽二百餘篇其見扵際何其盛哉渥君臣相與之誠信第十七凡四章貞觀初有上書請去佞臣者聲去上太宗謂曰朕之所任皆以為賢卿知佞者誰耶對曰臣居草澤不的知佞者請陛下佯怒以試群臣若能不畏雷霆直言進諫則是正人順情阿㫖則是佞人太宗謂封徳彛曰流水清濁在其源也君者政源人庶猶水君自為詐欲臣下行直是猶源濁而望水清理不可得朕常以魏武帝多詭詐深鄙其為人如此豈可堪為教令謂上書人曰朕欲使大信行於天下不欲以詐道訓俗卿言雖善朕所不取也身而四海之廣應萬務之衆苟不以至誠與賢而范氏祖禹曰太宗可謂知君道矣夫君以一人之㡬何是故人君必清心以涖之虛已以待之如鑑役其獨智以先天下則耳目心智之所及者其能不可欺以輕重者唯其平也繩墨設而不可欺以之明如水之止則物至而不能罔矣夫權衡設而彼以其偽何患乎邪之不察佞之不辦而必行詐曲直者唯其正也我以其正彼以其頗我以其真是故鑑垢則物不能察也水動則形不能見也已以試之哉一為不誠則心且蔽矣邪正何能辦乎能動物乎夫為君而使左右前後之人皆莫測其不明故也且待物以誠猶恐其不動也况不誠而誠則忠直者進而憸邪者無自入矣所為雖欲不欺不可得也唯能御以至佞人殆甚矣佞人之足以喪家國也禹之荅臯愚按昔夫子荅顔淵為邦之問終之曰逺佞人一心攻之者衆一有所偏則䜛邪靣䛕之人乗陶曰知人則哲何畏乎巧言令色孔壬盖人主迯吾水鑑矣太宗謂君自為詐欲臣下直是猶隙而進儻君心虛明旁燭無疆則正邪自不能扵天下不欲以詐真王言哉源濁而望水清欲使大信行貞觀十年魏徴上䟽曰臣聞為國之基必資於徳禮君之所保惟在於誠信誠信立則下無二心徳禮形則逺人斯格然則徳禮誠信國之大綱在於君臣父子不可斯須而廢也故孔子曰君使臣以禮臣事君以忠定公之辭孔子對魯又曰自古皆有死民無信不立答子孔子辭貢之文子子著書十二篇名之曰通玄真經姓辛名鈃一名計然濮上人師事老曰同言而信信在言前同令而行誠在令外然則言而不行言無信也令而不徔令無誠也不信之言無誠之令為上則敗徳為下則危身雖在顛沛之中君子之所不為也自王道休明十有餘載威加海外萬國來庭倉廪日積土地日廣然而道徳未益厚仁義未益博者何哉由乎待下之情未盡扵誠信雖有善始之勤未覩克終之羙故也昔貞觀之始乃聞善驚歎暨八九年間猶悦以從諫自兹厥後漸惡直言聲後惡惡烏去同利雖或勉强有所容聲強上非復曩時之豁如謇諤之軰稍避龍鱗便佞之徒肆其巧辯聲便平謂同心者為擅權謂忠讜者為誹謗謂之為朋黨雖忠信而可疑謂之為至公雖矯偽而無咎彊直者畏擅權之議忠讜者慮誹謗之尤正臣不得盡其言大臣莫能與之爭諍讀曰熒惑視聴於大道妨政損徳其在此乎故孔子曰惡利口之覆邦家者盖為此也聲為去且君子小人貌同心異君子掩人之惡揚人之善臨難無茍免聲難去殺身以成仁小人不恥不仁不畏不義唯利之所在危人自安夫茍在危人則何所不至後同夫音扶今欲將求致理必委之於君子事有得失或訪之於小人其待君子也則敬而踈遇小人也必輕而狎狎則言無不盡踈則情不上通是則毁譽在於小人聲譽平刑罰加於君子實興喪之所在可不慎哉此乃孫卿所謂使智者謀之與愚者論之使脩潔之士行之與汙鄙之人疑之欲其成功可得乎哉夫中智之人豈無小恵然才非經國慮不及逺雖竭力盡誠猶未免於傾敗况内懐奸利承顔順㫖其為禍患不亦深乎夫立直木而疑影之不直雖竭精神勞思慮其不得亦已明矣夫君能盡禮臣得竭忠必在扵内外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣昔齊桓公問於管仲曰吾欲使酒腐於爵肉腐於爼得無害覇乎管仲曰此極非其善者然亦無害於覇也桓公曰如何而害覇乎管仲曰不能知人害覇也知而不能任害覇也任而不能信害覇也既信而又使小人參之害覇也晉中行穆伯伯晉卿也中行氏穆攻鼓名城經年而弗能下餽間倫後同間去聲曰鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一㦸舌折音不傷一卒而鼓可得君奚爲不取穆伯曰間倫之爲人也佞而不仁若使間倫下之吾可以不賞之乎若賞之是賞佞人也佞人得志是使晉國之士捨仁而爲佞雖得鼔將何用之夫穆伯列國之大夫管仲覇者之良佐猶能慎於信任逺避佞人也如此聲逺去況乎爲四海之大君應千齡之上聖而可使巍巍至徳之盛將有所間乎若欲令聲平君子小人是非不雜必懐之以徳待之以信厲之以義節之以禮然後善善而惡惡如字後同上烏去聲下審罰而明賞則小人絶其私佞君子自強不息無為之治何逺之有善善而不能進惡惡而不能去聲上罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚胤将何望哉太宗覽䟽歎曰若不遇公何由得聞此語史按六百家故徴上䟽陳事帝手詔嘉答扵是廢眀徳宫傳係十一年是歲大雨穀洛溢毁官寺十九漂居人䟽文比此章尤多玄圃院賜遭水者未益厚仁義未益慱由待下之情未盡誠信最中唐氏仲友曰徴論基扵德禮保扵誠信然而道徳惟一時乃日新豈至有善始之勤無克終之美哉太宗之病道徳仁義禮儻皆以誠信行之則終始者履此理者也而誠信者實此理者也魏徴之愚按天下之理一而巳矣徳者得此理者也禮間如文子管仲中行穆伯之言皆出於誠信而諫䟽並舉徳禮誠信而言之其要主於誠信其行之則固善始而善終矣何憂於危亡哉徴之言之也夫誠信者實心也有徳有禮而以實心知本矣言於是乎太宗嘗謂長孫無忌等曰朕即位之初有上書者非一或言人主必須威權獨任不得委任羣下或欲耀兵振武懾服四夷惟有魏徴勸朕偃革興文布徳施恵聲施平中國既安逺人自服朕從此語天下大寧絶域君長皆來朝貢掌長音九夷重譯相望於道聲重平凢此等事皆魏徴之力也朕任用豈不得人徴拜謝曰陛下聖徳自天留心政術實以庸短承受不暇豈有益於聖明性偏難克為始夫豈徒學者之事為然哉大臣愚按先儒論學問以變化氣質為先論克己以明敏不患其不能為而患其過於為不患其不正君之道亦如是而已矣愚觀太宗天資英武獨運威權或勸其懾服四夷此皆太宗之所已能斷但患其過於斷當貞觀即位之初或勸其偃武興文布徳施惠損其有餘益其不及兹非能所謂以水濟水以火濟火者也魏徴獨勸以也不然貞觀之治太宗何以獨歸功於徴哉變其氣質而克其偏者歟甚矣徴之能正君貞觀十七年太宗謂侍臣曰傳稱去食存信去上聲傳去聲孔子曰人無信不立子貢之辭並孔子荅昔項羽既入咸陽已制天下向能力行仁信誰奪耶秦降王子嬰燒秦宫項羽引兵屠咸陽殺而東秦民大失望室收其貨寳婦女房玄齡對曰仁義禮智信謂之五常廢一不可能勤行之甚有禆益殷紂狎侮五常武王奪之今商王受狎侮五常周書武王誓師之言曰項氏以無信為漢髙祖所奪誠如聖㫖修餙也先儒謂此因武帝何修何餙之問而言愚按蕫子曰仁義禮智信五常之道王者所宜為仁若何而為義其修飾之方又孰先孰後也其意雖甚正惜其剖析未明使武帝知若何而臣而玄齡之對謂五常廢一不可誠是已儻能可為仲舒惜今觀太宗猶能以去食存信語群本然全具而各有條理必當反求黙識而擴充一一而明辨之使太宗知人之性情心之體用是復為玄齡惜之不亦善乎愚於貞觀政要卷第五貞觀政要卷之六戈直集論論儉約十八論謙讓十九論仁惻二十慎所好二十一慎言語二十二杜䜛邪二十三論悔過二十四論奢縦二十五論貪鄙二十六儉約第十八章凡八貞觀元年太宗謂侍臣曰自古帝王凢有興造必須貴順物情昔大禹鑿九山九州之山也如冀州則梁禹貢曰九山刋旅蔡氏注類岐之通九江也今沅水漸水元水辰水敘水酉水澧禹貢曰九江孔殷蔡氏注即今之洞庭曰九江漢志所謂九江非是水資水湘水皆合於洞庭故用人力極廣而無怨讟者物情所欲而衆所共有故也秦始皇營建宫室而人多謗議者為徇其私欲聲為去不與衆共故也朕今欲造一殿材木已具逺想秦皇之事遂不復作也音復缶古人云不作無益害有益獒之辭周書旅不見可欲使民心不亂之辭老子固知見可欲其心必亂矣至如雕鏤器物陋鏤音珠玉服玩若恣其驕奢則危亡之期可立待也自王公己下第宅車服婚嫁喪葬聲䘮平準品秩不合服用者宜一切禁㫁由是二十年間風俗簡樸衣無錦繡財帛富饒無飢寒之弊貞觀二年公卿奏曰依禮季夏之月可以居臺榭記禮以逺眺望可以升山陵可以䖏臺榭仲夏之月毋用火南方可以居髙明可今夏暑未退秋霖方始宫中卑濕請營一閣以居之太宗曰朕有氣疾豈宜下濕若遂来請糜費良多昔漢文将起露臺而惜十家之産篇注見教戒朕徳不逮千漢帝而所費過之豈為人父母之道也固請至于再三竟不許人主以儉約為先則公卿大夫不敢踰制朝廷以朱氏黼曰財用之贏縮關於侈儉風俗好尚本之物皆尚質崇朴自然家給人足貨財不可勝用矣儉約為先則士庻人不敢越分尊卑上下事事物倣傚天地之生物有限上下之財力有涯烏能周茍或反是則朝廷百官夸多闘靡四方士民歆羨臺不築於是成富庻之功唐太宗監秦人之敝材贍而普足哉漢文帝惜十家之産基址既成而一身者甚㣲而功利之及一世者甚大窒遏一時之用既具而一殿不為於是成貞觀之治撙節於一本者甚著人主其可不察哉欲者甚㣲而培養數百年之基巳具監秦皇之侈而亟巳之一閣之營公卿所愚按太宗可謂知化民之本矣一殿之建材木所以致貞觀之富庻也宜哉請慕漢帝之儉而竟不許其貞觀四年太宗謂侍臣曰崇飾宫宇遊賞池㙜帝王之所欲百姓之所不欲帝王所欲者放逸百姓所不欲者勞弊孔子云有一言可以終身行之者其恕乎已所不欲勿施於人論語之辭施平聲後同勞弊之事誠不可施於百姓朕尊為帝王富有四海每事由已誠䏻自節若百姓不欲必能順其情也魏徴曰陛下本憐百姓每節已以順人臣聞以欲從人者昌以人樂已者亡洛樂音隋煬帝志在無厭聲平惟好奢侈後同好去聲所司每有供奉營造聲供平小不稱意聲稱去則有峻罰嚴刑上之所好下必有甚競為無限遂至滅亡此非書藉所傳亦陛下目所親見為其無道聲為去故天命陛下代之陛下若以為足今日不啻足矣翅啻音若以為不足更萬倍過此亦不足太宗曰公所奏對甚善非公朕安得聞此言貞觀十六年太宗謂侍臣曰朕近讀劉聦傅聦字玄去聲劉冐頓故子孫冐劉姓元海於晉永興中立國是為前明元海第四子本新興匈奴以漢髙祖嘗以宗女妻兄自立趙聦殺聦将為劉后女為左貴嬪後立為后為去聲后太保劉殷之起䳨儀殿廷尉陳元達人本姓髙以生月妨父改姓陳廷尉獄官也元達字長宏後部切諫聦大怒命斬之劉后手䟽啓請辭情甚切聦怒乃解而甚愧之聦大怒曰吾為萬機主豈問汝鼠子乎将晉載記劉聦将起殿扵後庭陳元達切諫手䟽曰今宫室已備宜愛民力廷尉之言四海之福出斬之時在逍遥園李中堂劉后聞之密敕停刑上下今興工費廣為妾營殿而殺諫臣使天下罪妾妾也陛下宜加封賞而更誅之四海謂陛下如何哉陛謝之曰外輔如公内輔如后朕復何憂更命園曰納何以當之願賜死以塞陛下之過聦覧之命引元達愧賢堂賢園堂曰人之讀書欲廣聞見以自益耳朕見此事可以為深誡比者鼻比音欲造一殿仍構重閣聲重平今於藍田属奉元路縣名今仍舊採木並已備具逺想聦事斯作遂止扵紂之傾宫鹿臺卒致家國不保然亦隋文帝愚按隋煬帝窮土木之工極宫室之麗迨有甚夀之役民不勝困是以後嗣傚之殆有甚焉太有以啓之也文帝興王之君也天下既平而仁事或納人言而止或監前古而止其過隋文逺宗取孤隋殘弊之天下所宜休息幸而營造之勞弊以聖人之所謂恕而推已所不欲勿施扵矣觀其言曰帝王所欲者放逸百姓所不欲者臺為然哉樂聲色也求神仙也關土地也事畋人之心君人者而味斯言也豈惟崇飾宫宇池一言行之祈天永命之道也魏徴之復其君曰獵也肆遊觀也凡非百姓之所欲者一以恕之萬倍過此亦不足此言尤為君人之格言也或陛下若以為足今日不啻足矣若以為不足更盖飛山之作既有魏徴之諫而翠微玉華以有曰太宗之言固善矣飛山翠微玉華之作何居未可以是而求其偹也疾避暑而即其舊以修之貞觀十一年詔曰朕聞死者終也欲物之反真也葬者蔵也欲令人之不得見也聲令平上古垂風未聞於封樹後世貽則乃備於棺槨衣之以薪葬之中野不易大傳曰古之葬者厚世聖人易之以棺椁封不樹䘮期無數後譏僭侈者非愛其厚費美儉薄者實貴其無危是以唐堯聖帝也穀林有通樹之説穀林通樹之吕氏春秋堯葬秦穆明君也槖泉無丘隴之䖏穆秦雍州槖泉宫祈年觀下公名任好史記注穆公葬仲尼孝子也防墓不墳子孔聞古也墓而不墳合葬親於防曰吾延陵慈父也嬴博可隱子名扎適吳延陵季嬴博之間不歸鄉里齊而返其子死葬於斯皆懐無窮之慮成獨決之明乃便體於九泉非徇名於百代也洎乎闔閭違禮珠玉為鳬鴈葬穿土為川積壤為丘銅棺三重澒池六闔閭吳王名葬虎丘山下發士十萬人治玉為鳬鴈尺以黄金珠始皇無度水銀為江海山吏徒數十萬秦始皇葬於驪玉水銀為江海人膏為燈燭曠日十年合采金石被以珠季孫擅魯歛以璵璠去歛五年季平子行東野還未至卒于房陽虎将以璵璠聲璵音與璠音煩季孫魯大夫季平子也左傳定公吉公山不狃不狃曰彼為君也子何怨焉歛仲梁懐弗與曰改步改玉陽虎欲逐之桓魋專宋葬以石槨㳺曰昔者夫子居於宋見桓司馬自造石魋音頽桓魋宋向戌之孫為司馬禮記子其靡也死不如速朽之愈也槨三年而不成夫子曰若是莫不因多蔵以速禍由有利而招辱玄廬既發致焚如於夜臺之别名也玄廬夜臺墓黄腸再開同㬥骸於中野之器銀鏤黄腸注云器棺漢梁商薨賜以東園朱夀栢木黄心為槨曰黄腸也也以朱飾之以銀鏤之以詳思曩事豈不悲哉由此觀之奢侈者可以為戒節儉者可以為師矣朕居四海之尊承百王之弊未明思化中宵戰惕雖送徃之典詳諸儀制失禮之禁著在刑書而勲戚之家多流通於習俗閭閻之内或侈靡而傷風以厚葬為奉終以髙墳為行孝遂使衣衾棺槨極雕刻之華靈輀冥器窮金玉之飾富者越法度以相尚貧者破資産而不逮徒傷教義無益泉壤為害既深宜為懲革之為宜為聲去其王公已下爰及黎庻自今已後送葬之具有不依令式者仰州府縣官明加檢察隨狀科罪在京五品已上及勲戚家仍録奏聞終篇今附入此舊本此章在慎其間豈可動哉張釋之對曰使其中有可欲者愚按漢文帝嘗曰以比山為槨用紵絮斮陳漆以破業吾甚不取覇陵山川因其故毋有所改雖錮南山猶有隙也異時文帝之遺詔曰厚葬陵務存隆厚猶文帝初年之意也虞世南諫而斯言也其有感於釋之之言乎唐太宗初作獻嘗合二君之詔觀之則文帝之詔專為己之一不能止十一年之詔豈非世南之言啓之歟愚之歸以免於暴骸之禍此又文帝之所未及也身而已太宗之意則欲使天下之人同為儉約岑文本為中書令宅卑濕無帷帳之飾有勸其營産業者文本歎曰吾本漢南一布衣耳竟無汗馬之勞徒以文墨致位中書令斯亦極矣荷俸禄之重聲荷去為懼已多更得言産業乎言者歎息而退下四章並舊本自此附入于此在貪鄙篇今食萬錢謝安之相業而不忘聲色儉約豈可易愚按儉約者人之所難能也何曽之先見而日勇士不忘喪其元士之仕於人之國者唯不忘能哉雖然有其道矣孟子曰志士不忘在溝壑中書令而能不忘其為漢南布衣時兹所以䏻其貧賤之時則自無侈靡之失矣岑文本身為為唐名相歟不營産業而户部尚書戴胄卒反子書太宗以其居宅弊陋祭享無所令有司特為之造廟為去聲令平聲温彦博為尚書右僕射家貧無正寝及薨曰薨公侯死殯於旁室太宗聞而嗟嘆遽命所司為造聲為去當厚加􅉠贈魏徴宅内先無正堂及遇疾太宗時欲造小殿而輟其材為徴營構五日而就遣中使聲去齎素褥布被而賜之以遂其所尚任賢篇此章重出不堪自非為人君者於奢儉之際有以抑此揚愚按奢侈者常情之所同樂儉約者中人之所堪乎戴胄居宅弊濕太宗為之造廟温彦博死彼則為人臣者何憚而去其所同樂趍其所不輟其材而營之三臣之儉徳行於下太宗之褒殯旁室太宗為之造正寢魏徴宅無正堂太宗有不聞風興起者哉賞加於上天下之士其謙讓第十九凡三章貞觀二年太宗謂侍臣曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懐畏懼昔舜誠禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功謨之辭虞書大禹又易曰人道惡盈而好謙好惡謙卦彖辭並去聲易凡為天子若惟自尊崇不守謙恭者在身儻有不是之事誰肯犯顔諫奏朕每思出一言行一事必上畏皇天下懼群臣天髙聴卑何得不畏群公卿士皆見瞻仰何得不懼以此思之但知常謙常懼猶恐不稱天心及百姓意也聲稱去魏徴曰古人云靡不有初鮮克有終雅蕩篇之辭鮮上聲詩大願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣唐虞所以太平實用此法蔽之以一言曰畏而已盖惟天子之尊茍以無所吕氏祖謙曰無逸之書稱商三宗之享國而周公自知矣惟能以有畏為心則上焉天心享之下焉畏之心而自恃則治易忘亂安易忘危危亂而不治所以致之者固有其道而大要莫先扵此臣民歸之如是而不安者未之有也太宗貞觀之曰濬哲文明温恭允塞夫堯舜五帝之盛帝也愚按昔史臣賛堯曰允恭克讓光被四表賛舜光明天道而非下濟則亢矣何自而見其光明聖徳輝光在謙讓而已易之謙曰天道下濟而之盛徳也魏徴於此時不将順其美而舉詩之哉太宗謂天子不當自尊崇正合謙恭此帝王一日唐虞所以太平寔用此法是固有以知太靡不有初鮮克有終望其君謂常謙常懼日慎一時之言也後之人君志於帝王之道者勉之宗之心矣盖以堯舜之所以謙讓終始如一非哉貞觀三年太宗問給事中孔頴達曰論語云以能問於不能以多問於寡有若無實若虚何謂也子之言論語曾頴達對曰聖人設教欲人謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶病以為少仍就寡少之人更求所益已之雖有其狀若無已之雖實其容若虚非惟匹庶帝王之徳亦當如此夫扶音帝王内藴神明外須玄黙使深不可知故易稱以䝉養正曰䝉以養正易䝉卦彖辭以明夷莅衆明入地中明夷君莅音隷易象傳曰用晦而明子以莅衆若其位居尊極炫耀聦明以才陵人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗曰易云勞謙君子有終吉三爻辭易謙卦九誠如卿言詔賜物二百叚有善惟恐人之不知故於不矜不伐未能有行焉胡氏寅曰太宗之問疑其不必如是盖其為人已之意則未易曉也夫既能矣不自以為能可也而孔頴達所對亦足以箴之矣雖然吾友從事於斯少彼不能與少者将何益我不幾於偽以下人者又問於不曉既多矣不自以為多可也而又問於一義之不知歉然如飲食之不飽也此何所為而乎是不然惟善學者志不倦心不盈一善之不聞古敏以求之我學不厭誠以道無量理無極而事然哉故曰學然後知不足夫聖如孔子猶曰我好庻乎少進矣無方太宗知之膏肓太宗儻得此道雖帝王可及也惜其資矯拂唐氏仲友曰太宗之夫正在矜伐頴達之對箴其之益亦蹈飾非拒諫之悔也勉强之力故時有用賢納諫問於寡有若無實若虚盖惟知義理之無窮不愚按論語載曾子之言曰以能問於不能以多以為吾友謂顔淵也太宗以天下之君舉此為見物我之有間學者之所難能也故朱子集註進於帝王之徳盖以太宗英明之資雄傑之才問而孔頴達因而發明之以聖門為學之方勉謙有終之語頴達其善於格君心歟易致炫耀凌慢之失聞頴達之言有勞河間王孝恭面功寛恕退讓太宗親重之宗室莫比太祖之子也佐髙祖多進圖策獨存方武徳初封為趙郡王累授東南道行臺尚書左僕射孝恭既討平蕭銑輔公祏遂領江淮及嶺南北皆綂攝之專制一方威名甚著累遷禮部尚書孝恭性惟退讓無驕矜自伐之色時有特進江夏王道宗尤以将略馳名兼好學去聲将好並敬慕賢士動修禮讓太宗並加親待諸宗室中惟孝恭道宗莫與為比一代宗英云才於其子弟族属之間所以昌大其門户而光愚按自古國家之将興也天必生英傑竒偉之有朱虚東牟降及魏晉六朝盖莫不然唐起晉啓其運祚也周之興也有周公康叔漢之興也将畧與李勣齊肩又能好學習禮退讓不伐求陽本支尤盛孝恭之威名與李靖相亞道宗之之才之美其亦康叔朱虚之流軰歟嗚呼盛哉之布素之士有不可多得者雖未可方之周公仁惻第二十凡四章貞觀初太宗謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求採無已至於離宫别舘非幸御之所多聚宫人此皆竭人財力朕所不取且灑掃之餘更何所用今将出之任求伉儷下音麗耦也上音抗敵也非獨以省費兼以息人亦各得遂其情性於是後宫及掖庭前後所出三千餘人人李百藥上言徃年雖出宫人竊聞太按通鑑貞觀二年九月天少雨中書舍隂氣鬱積亦足致旱上曰云云於是遣尚書左丞戴上皇宫及掖庭宫人無用者尚多豈惟虚費衣食且簡出之前後所出三千餘人胄給事中杜正倫於掖庭西門宫者固無其數髙祖初入關放離宫之人還親属孫氏甫曰隋煬荒虐自古無比强取良家女置後恣得乎頼聖子承之立矯其過計出三千之衆使此得美事之一節及受禪安然有其後宫欲不荒唐之盛徳也天下聳動歌詠嬪二十七世婦八十一御妻矣然未聞千百其數尹氏起莘曰按禮天子立后固有六宫三夫人九亡其國今太宗即位首放宫女三千餘人可謂盛也昔晉武平吳之後掖庭殆将萬人遂殞其軀而之歌詠不一而足也徳之事遂使後人流而見於貞觀之初論者謂聖子承統行父之所愚按仁哉太宗之心也兹事不見於武徳之初於宫闈此謀臣因以迫之以興師也有天下之未能行誠可謂仁已然司晉陽之管鑰遂犯分能無所幸識者知其智不在小奄奠區宇規摹後安其後宫猶晉陽之心也昔漢祖入秦宫室也太宗其殆庻㡬乎宏逺矣非唐祖所及貞觀二年關中旱大饑太宗謂侍臣曰水旱不調皆為人君失徳聲為去朕徳之不修天當責朕百姓何罪而多遭困窮聞有鬻男女者賣也鬻音育朕甚愍焉乃遣御史大夫杜淹為文學舘學士及即位召為御史大字執禮如晦叔也材辯多聞秦王引引贏四十人後皆知名夫俄檢校吏部尚書所薦廵檢出御府金寳贖之還其父母心足以王矣然惜其愛物之心重愛民之心輕愚按齊宣不忍牛之觳觫而就死地孟子曰是四海之廣大而能軫念飢人之子女出御府金欲其舉斯心加諸彼也太宗䖏九重之崇髙撫施濟衆聖人猶病飢人子女豈能人人獲所哉寶以贖之其愛民之心重矣夫萬姓至繁也博之盛孰謂非此心所致乎然是心也足以王矣貞觀貞觀七年襄州都督陽隷河南襄州今為襄張公謹卒太宗聞而嗟悼出次發哀有司奏言準隂陽書云日在辰不可哭泣此亦流俗所忌太宗曰君臣之義同於父子情發於中安避辰日遂哭之辛卯襄州都督鄒襄公按通鑑係六年夏四月出次發哀云云張公謹卒明日上臣猶父子義感人心駕馭之畧髙矣唐氏仲友曰太宗辰日哭張公謹謂君非私恩也盖公義也是故衛之栁莊既死而獻愚按君於卿大夫比葬不食肉比卒哭不舉樂膳宰譏之太宗於張公謹之卒雖辰日不為之公祭弔論者是之晉之荀盈未葬而晉侯飲樂謂賢君乎輟哭可不貞觀十九年太宗征髙麗次定州隷腹裏今中山府有兵士到者帝御州城北門樓撫慰之有從卒一人後同從去聲病不能進詔至床前問其所苦仍敕州縣醫療之是以将士後同将去聲莫不欣然願徔及大軍囬次柳城營属廢州今詔集前後戰亡人骸骨設太牢致祭曰太牢牛羊豕親臨哭之盡哀聲臨去軍人無不灑泣兵士觀祭者歸家以言其父母曰吾兒之喪天子哭之死無所恨太宗征遼東攻白巖城州今廢唐置巖右衛大将軍李思摩族人頡利兄弟賜姓李為化州都督統頡利故部為可汗思摩諸部納欵思摩獨留髙祖封和順郡王與秦王結為逼願八保長城太宗詔許之居三年不得其衆入朝遣使謝曰望世世為國一犬守天子北門如延陀侵遼從伐為流矢所中聲去帝親為吮血粗兖切為去聲吮将士莫不感勵仁恕也已然逺國强臣雖不義而未至於䖍劉愚按太宗親征葬戰亡之骨吮思摩之瘡可謂之制在何至躬率六師乎思遼水之無極慮扈邊鄙也若以偏方不霑王化自有太司馬九伐以已矣惻隱之心何待形於遂事之後乎從之匪輕仁恕一念油然發生於中則可慎所好第二十一凡四章貞觀二年太宗謂侍臣曰古人云君猶器也人猶水也方圓在於器不在於水故堯舜率天下以仁而人徔之桀紂率天下以暴而人徔之下之所行皆徔上之所好後同去聲至如梁武帝父子志尚浮華惟好釋氏老氏之教武帝末年頻幸同泰寺親講佛經百寮皆大冠髙履乗車扈徔終日同從去聲乗平聲後談論苦空也佛教未嘗以軍國典章為意及侯景率兵向闕道篇見君尚書郎已下多不解乗馬懈解音狼狽步走頰髙前廣後狽狼似犬鋭首白而行離則蹭故猝遽謂之狼狽狼属生子或欠一足二足相附死者相繼於道路武帝及簡文三子矦景廢之簡文名綱武帝第卒被矦景幽逼而死被卒切聿孝元帝兵討矦景即帝位名繹武帝第七子起在于江陵興路隷荆郡名今中湖為萬紐于謹所圍謹将兵五萬入冦攻江陵梁承聖三年元魏遣萬紐于帝猶講老子不輟聞魏師至停講聞報帖然復開講元帝好玄談嘗於龍光殿講老子百寮皆戎服以聴俄而城陷君臣俱被囚縶贄音庾信梁為於西魏将軍留亦歎其如此及作哀江南賦乃云宰衡以干戈為兒戲縉紳以清談為廟略此事亦足為鑒戒朕今所好者惟在堯舜之道周孔之教以為如鳥有翼如魚依水失之必死不可暫無耳謂知所去取矣而以為如魚有水鳥有翼失之必胡氏寅曰太宗不好釋氏而好堯舜周孔之道可爾也夫允執厥中者堯舜之盛也而始於道心欲死不可暫無者則未知其誠能然乎抑徒意之云記誦之謂道心之㣲又與老釋玄妙之言何以别不踰矩者孔子之盛也而始於志學志者非讀書好之者知之如是則能好之矣未嘗知之而以為乎自此而入庻乎其知道矣孔子曰知之者不如把玩而好之也百姓日用而不能離亦猶鳥之有我好堯舜周孔之道云者妄也夫道非有一物可顧不自知耳翼魚之依水行未能無愧者以其嗜學雖篤所講者不過前代真氏徳秀曰太宗之言可謂知所擇矣然終身所未之有聞其所親者雖或一時名儒而姦諛小人之得失而於三聖授受之㣲㫖六經致治之成法慕前聖而於道實無得焉其亦可憾也夫亦厠其列安得有佛時仔肩之益故名為希舜之道周孔之教不可暫無斯言也三代而下愚按太宗知老釋之虚無空寂不適於用知堯謂教道者率性而已聖人以此道垂訓於天下君人者所罕聞也中庸曰率性之謂道脩道之教以堯舜之道為教也又曰道也者不可須臾後世則謂之教堯舜之道此道也周公孔子之離者乎太宗未足以進此也而言則然也離也可離非道也不可暫無其不可須臾貞觀二年太宗謂侍臣曰神仙事本是虚妄空有其名秦始皇非分愛好去聲分好並為方士所詐乃遣童男童女數千人随其入海求神仙方士避秦苛虐因留不歸始皇猶海側踟蹰以待之厨遲囬貌踟音遲蹰音還至沙丘而死男女入海求三神山不死藥始皇從之明年始皇東逰海上方士徐市䓁上書請得與童五年復至海上冀遇仙藥不得還到沙丘崩沙丘在復逰海上後三年逰碣石考入海方士從上郡歸後鉅鹿縣今順徳路漢武帝為求神仙聲為去乃将女嫁道術之人事既無驗便行誅戮薦方士欒大上見之大恱大漢武帝元鼎四年樂成侯登時上方憂河决而黄金不就廼拜大為五利将軍賜言曰黄金可成河决可塞不死之藥可得神仙可致主妻之後竟坐誣㒺遂腰斬列矦甲第童千人又以衛長公㩀此二事神仙不煩妄求也怪通扵萬物之情者不可罔以非類太宗深懲愚按漢儒有言明於天地之性者不可惑以神惑扵神怪不罔扵非類者矣然晚年深信婆羅秦皇漢武之失謂神仙虚妄空有其名可謂不之藥則又何所見而然耶門姿婆寐之説使之合長生貞觀四年太宗曰隋煬帝性好猜防聲好去專信邪道大忌胡人乃至謂胡牀為交牀胡瓜為黄瓜築長城以避胡終被宇文化及使令狐行達殺之狐虜複姓令去聲令時為校尉行達其名又誅戮李金才圗䜟謂帝曰當有李氏為名渾為将軍有方士言曉因誣搆之扵是盡誅渾族天子渾與宇文述有隙述及諸李殆盡卒何所益子卒切聿且君天下者惟須正身修徳而已此外虚事不足在懐殷道復盛䜟緯之書雖有定數然人君能至誠愚按桑穀生扵朝而大戊以興雉升鼎而雊而君天下者惟須正身修徳譏煬帝枉殺李金才修徳未有不轉禍為福改妖為祥者也太宗謂王之䜟淫刑及扵功臣則又何邪等其説是也然晩年竟以女主武貞觀七年工部尚書工匠之事尚書其長也唐制工部掌山澤屯田叚綸姓叚名綸奏進巧人楊思齊至太宗令試聲令平綸遣造傀儡戯具漢祖平城之圍其城一面即冐頓妻閼氏兵强傀古委切儡魯猥切木偶戯也世傳運機子起間閼氏望見謂是生人慮下城冐頓必納遂退軍後扵三面陳平訪之閼氏妬忌造木偶人運機關舞埤戯具翻為太宗謂綸曰所進巧匠将供國事聲供平卿令先造此物是豈百工相戒無作奇巧之意耶乃詔削綸階級並禁斷此戯約篇今附于此舊本此章在儉也朱子釋之曰日省月試以程其能既廩称事愚按中庸曰日省月試既廩称事所以勸百工奏進工人首令試造傀儡非所謂作奇技淫巧以饋其勞則不信度作淫巧者無所容矣叚綸禁斷此戯可謂知所先矣者乎太宗既削綸階級且令慎言語第二十二凡三章貞觀二年太宗謂侍臣曰朕每日坐朝欲出一言即思此一言於百姓有利益否所以不敢多言給事中兼知起居事貞觀初以給事中諫議大夫兼之執事唐制起居郎及舍人掌天子起居法度録記杜正倫進曰君舉必書言存左史氏傳也春秋左臣職當兼修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖徳類累音非止當今損於百姓願陛下慎之太宗大悦賜綵百叚一言兩得将順正救之美宜乎太宗悦而賜之也唐氏仲友曰太宗言不敢多言意在史筆正倫之之外應之出其言不善則千里之外違之况其愚按易大傳曰君子居其室出其言善則千里善行之當世不惟天下䝉其利後世亦以為訓邇者乎甚矣人君之言尤不可不慎也一言之亦以為戒人君之言可不慎哉太宗之言雖意一言之不善行之當世不惟天下受其害後世君道則甚重也在史筆其關扵貞觀八年太宗謂侍臣曰言語者君子之樞機談何容易切以豉凡在衆庶一言不善則人記之成其耻累類音況是萬乗之主不可出言有所乖失其所虧損至大豈同匹夫我常以此為戒隋煬帝初幸甘泉宫泉石稱意聲稱去而恠無螢火敕云捉取多少於宫中照夜所司遽遣數千人採拾送五百轝於宫側小事尚爾況其大乎魏徴對曰人君居四海之尊若有虧失古人以為如日月之蝕人皆見之實如陛下所戒慎乎逺言行君子之樞機樞機之發榮辱之主也愚按易大傳曰言出乎身加乎民行發乎邇見行之不慎尚何望其慎言太宗謂言語者君子可不慎乎盖能知所以慎言則知所以慎行矣魏徴謂人君有失如日月之蝕人皆見之實如之樞機衆庶猶爾況於萬乗可謂知所慎言矣兼慎言慎行之意也陛下所戒慎則足以貞觀十六年太宗每與公卿言及古道必詰難徃復聲難去散騎常侍劉洎上書諫曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聴其言虛襟以納其説猶恐群下未敢對揚况動神機縱天辯飾辭以折其理援古以排其議欲令凡蔽聲令平何階應荅臣聞皇天以無言為貴聖人以不言為徳老子稱大辯若訥莊子稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊議公桓所讀者古人之糟魄已夫以臣之事觀之斵輪徐則讀書於堂上輪扁斵輪於堂下釋椎鑿而上曰君之於心口不能言有數存焉古之人與不可傳也出莊甘而不固疾則苦而不入不徐不疾得之於手應之子漢皇慕古張孺陳譏之以書曰孺子可教故稱良漢張良嘗匿下邳見老父授其曰昔湯武伐桀紂皆封其後請立六國後王曰善曰張孺項羽圍漢王於滎陽王與􅐱食其謀撓椘食陛下事去矣為陳八不可之説見史具以告張良良曰誰為陛下畫此計此亦不欲勞也且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必為累後同音類須為社稷自愛後同為去聲豈為性好自傷乎聲好去竊以今日升平皆陛下力行所至欲其長久匪由辯博但當忘彼愛憎慎兹取捨每事敦朴無非至公若貞觀之初則可矣至如秦政强辯失人心於自矜魏文宏材虧衆望於虛説此才辯之累皎然可知類累音伏願略兹雄辯浩然養氣我善養孟子曰之氣吾浩然簡彼緗圖圖書也緗淺黄色澹焉怡悦固萬夀於南岳如南山之夀詩曰不騫不崩齊百姓於東户則天下幸甚皇㤙斯畢太宗手詔荅曰非慮無以臨下非言無以述慮比有談論鼻比音遂至煩多䡖物驕人恐由兹道形神心氣非此為勞今聞讜言虚懐以改年上好文學而按通鑑係十八多不能對㳙上書云云上飛白荅之辯敏群臣言事者多引古今以折之䖏重之地可不戒哉洎每剛直敢言始以受知終張氏九成曰君子以謹宻成徳而踈直致患而況雖議論及於群臣而是正之語或不容下或徃復以速禍盖太宗英明剛武以取天下挾振矜之態之威生殺在手非剛直之徒孰與抗哉而洎逺引詰難或面折其短才辯自逞氣驕於人夫以咫尺奨進言之路觀其所陳若有優柔樂易之性矣及聖人不言大辯若訥深為勸戒所以恢寛厚之徳何知之不審始卒有異乎抑疑似之詰有以啓之其發言䖏身或不自慮夫以太宗之明竟不深察也以鯀之不才堯獨知之然徔試可乃已之論則人唐氏仲友曰上執其謙下輸其直此議論之體也最足以害徔諫之美洎兩言之切中其病孟子所君之言豈務求勝太宗以智辯自居往復窮詰此則太宗自聖之病頗亦難瘳賴洎言之不已使太謂拒人於千里外者也荅詔猶有反覆是非之言一鑑既徃獨洎能出此言不亦賢乎宗許以能改不然其去徳豈逺乎哉縱天辯未免有輕物驕人之失儻非能尅已自愚按劉洎諫䟽想見太宗以英雄之姿逞神機由此乎生矣今聞讜言虚懐以改其得為賢君勵勉强徔諫則所謂智足以拒諫辯足以飾非哉也宜杜䜛邪第二十三章凡七貞觀初太宗謂侍臣曰朕觀前代䜛佞之徒皆國之帝所殺刑政由是衰壊又隋太子勇後廢為庶人文帝太子名勇撫軍監國聲監卑凡二十年間固亦早有定分聲去楊素為隋相玄感之父欺主罔上賊害良善使父子之道一朝滅於天性文帝於是禁太子勇部分收其黨與楊素舞朝音昭楊素揣知獨孤后意盛言太子不才王廣為皇大子是為煬帝文巧詆以成其獄廢勇立晉逆亂之源自此開矣隋文既混淆嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則䜛勝誠非妄言朕每防微杜漸用絶䜛搆之端猶恐心力所不至或不能覺悟前史云猛獸處山林聲處上藜藿為之不採直臣立朝廷姦邪為之寢謀此實朕所望於群公也魏徴曰禮云戒慎乎其所不睹恐懼乎其所不聞章之辭中庸首詩云愷悌君子無信䜛言䜛言罔極交亂四國蠅篇之辭詩小雅青又孔子曰惡利口之覆邦家去聲惡烏盖為此也臣嘗觀自古有國有家者若曲受䜛譛妄害忠良必宗廟丘墟市朝霜露矣願陛下深慎之能辨也太宗援㩀古今以責望於其臣魏徴敷愚按自古䜛邪之為惑人主非有知人之明不無得而間矣厥後有毁徴阿黨者使温彦博按述經訓以致戒於其君可謂極君臣之契䜛邪顯正其罪固非止䜛之道及徴之卒乃因杜正之雖足以直徴之枉而左右之為䜛者竟不聞徴録諫辭示史官有賣已直彰君過之意者遂倫之黜復以阿黨疑之疑情一萌䜛言遽入謂無征遼東之悔尚得為明主乎信夫知人之難有停婚仆碑之令何不察之甚邪使太宗它日也貞觀七年太宗幸蒲州刺史趙元楷課父老服黄紗單衣迎謁路左盛飾廨宇修營樓雉以求媚又潜飼羊百餘口魚數千頭将饋貴戚太宗知召而數之曰聲數上朕廵省河洛聲省上經歷數州凡有所須皆資官物卿為飼羊飬魚聲為去雕飾院宇此乃亡隋弊俗今不可復行缶復音當識朕心改舊態也以元楷在隋邪佞故太宗發此言以戒之元楷慙懼數日不食而卒貪鄙篇今附入此子聿反舊本此章在都郡丞迹其邪佞盖與髙徳儒之指野鳥為鸞愚按元楷仕隋為歷陽郡丞以獻異味超遷江乎異時潜飼羊魚盛飾𪠘宇盖猶以事隋者而無異太宗縱不能誅之豈可復使為民之父母致其罪布告天下咸以為戒豈不尤偉矣乎事唐也太宗數而責之是矣然使能黜其官貞觀十年太宗謂侍臣曰太子保傅古難其選成王㓜小以周召為保傅左右皆賢足以長仁掌長音致理太平稱為聖主及秦之胡亥始皇所愛趙髙作傅教以刑法及其簒也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠聲去交遊惟柴紹武徳初拜左翊衛大將軍累從戰伐而有功字嗣昌臨汾人以任俠聞髙祖妻以平陽公主竇誕䓁語昏謬失對以光禄大夫罷外戚也貞觀為宗正卿太宗與為人既非三益友直友諒友多聞論語曰益者三友及朕居兹寳位經理天下雖不及堯舜之明庶免乎孫皓髙緯之暴是為烏程侯降孫皓三國吳主後主為周所虜于晉髙緯北齊以此而言復不由染何也魏徴曰中人可與為善可與為惡然上智之人自無所染陛下受命自天平定冦亂救萬民之命理致升平豈紹誕之徒能累聖徳類累音但經云放鄭聲逺佞人論語孔逺去聲為邦之辭子荅顔淵問近習之間尤宜深慎太宗曰善由近習按自誠章在直諫篇今附入于此已上文重出師傅篇舊本此公與管蔡同處而不為管蔡之所化夫上智不愚按帝堯與共驩同處而不為共驩之所化周懼流言豈恃其資質之美而謂惡人不能染哉移唯堯與周公為能耳然堯猶畏孔壬周公猶俱化者也唐太宗少與柴竇為友而不能昏太下此則善人之芝蘭惡人之鮑魚未有不與之太宗以其資質之過人也其不能進於三代之宗之徳世莫不疑焉以愚觀之太宗之所以為尔及其君臨天下雖房杜王魏並居輔相而封君者以柴竇輩為之累也雖然太宗少年之事止於如是也然則太宗所謂不由漸染者其然權宇文之流亦得厠乎其間此貞觀之治所以然乎豈其尚書左僕射杜如晦奏言監察御史陳師合傳史無上㧞士論兼人之思慮有限一人不可總知數職以論臣䓁太宗謂戴冑曰朕以至公理天下今任玄齡如晦非為勲舊以其有才行也去聲為行並此人妄事毁謗止欲離間我君臣聲間去昔蜀後主昏弱主之子名禪先齊文宣狂悖然國稱理者以任諸葛亮楊遵彦前注並見不猜之故也朕今任如晦䓁亦復如法於是流陳師合于嶺外在貪鄙篇今附入此舊本自此已下三章深知其人可付國事不專任之何以責成功盖專孫氏甫曰人主之任大臣不可不專亦不可專若而專任之茍無成功則有敗事又或竊擅威福有任則責重責重則人必盡其才力也若知人未至機難追矣大宗可謂能審知人之術者也知房杜難制之患二者惟在人主審之不可一失失則事師合以平常之見欲移主意如晦奏其事意似不之賢而付以國事房杜方盡心職事已著功効陳師合之言房杜荷信任如是敢不盡其才力乎此廣然慮小臣間言漸害於事公言之爾太宗不惑可專任而不容人言人主知人未至當審其付任所以成太平之治也然有太宗之明房杜之賢則此為法不可執説見後章貞觀中太宗謂房玄齡杜如晦曰朕聞自古帝王上合天心以致太平者皆股肱之力朕比開直言之路者鼻比音庶知寃屈欲聞諫諍所有上封事人多告訐百官結訐音細無可採朕歴選前王但有君疑於臣則下不能上達欲求盡忠極慮何可得哉而無識之人務行䜛毁交亂君臣殊非益國自今已後有上書訐人小惡者當以䜛人之罪罪之魏徴為秘書監有告徴謀反者太宗曰魏徴昔吾之讎秪以忠於所事吾遂㧞而用之何乃妄生䜛構竟不問徴遽斬所告者䜛而又罪之可謂至明且逺矣此為君為長之道范氏祖禹曰太宗欲聞百言而惡告訐不惟聖譖魏徴謀反而太宗誅之此可謂明也已陳師合愚按上封事者訐人小惡而太宗罪之䜛人告確論也如晦遽以為譏論臣䓁太宗遽以為毁上㧞士論謂一人不可總知數職斯乃天下之合三事而觀之太宗得其二而失其一乎謗離間至流師合於嶺外亦可謂冤也已然則貞觀十六年太宗謂諫議大夫禇遂良曰卿知起居比來鼻比音記我行事善惡遂良曰史官之設君舉必書善既必書過亦無隱太宗曰朕今勤行三事亦望史官不書吾惡一則鑒前代成敗事以為元龜二則進用善人共成政道三則斥棄群小不聴䜛言吾能守之終不轉也望史官不書吾惡則有䕶過之意矣伐遼之監不唐氏仲友曰太宗所言皆君道然謂守而不失亦及佞而㳺言自解謂守而不失未免自矜也逺而窮兵用魏徴而仆碑扵身後知宇文士不善而著其善此人情之常也為人上者其於愚按善惡直書而義自見此史臣之職也揜其而已史臣直筆吾不知也太宗嘗欲觀史矣而言行之際知善而力行之知惡而力改之在我善而有不善者則削而不書也所行果出於善復問起居所記之行事是欲史臣每有以彰其言雖為君道之善而表襮於起居注之臣則似始終如一史臣豈得而揜其善乎勤行三事之之意矣有矜善悔過第二十四章凡四貞觀二年太宗謂房玄齡曰為人大須學問朕徃為聲去群兇未定東西征討躬親戎事不暇讀書比來音比鼻四海安静身處殿堂聲處上不能自執書卷使人讀而聴之君臣父子政教之道共在書内古人云不學墻面莅事惟煩官之辭周書周不徒言也却思少小時行事聲少去大覺非也則改釋者謂見善能遷則可以盡天下之善有愚按夫子於易之益曰君子以見善則遷有過改過學者之所難而太宗定天下之亂處帝王過能改則無過矣益於人者無大於是夫遷善而能改之可謂知為益之道矣充是心也為益之尊乃能知讀書之善而能遷之知少時之過窮際乎之道豈有貞觀中太子承乾多不修法度魏王泰尤以才能為太宗所重特詔泰移居武徳殿魏徴上䟽諫曰魏王既是陛下愛子須使知定分聲去常保安全每事抑其驕奢不處嫌疑之地也今移居此殿使在東宫之西海陵昔居時人以為不可雖時移事異猶恐人之多言又王之本心亦不寧息既能以寵為懼伏願成人之美太宗曰我幾不思量甚大錯誤平聲幾量並遂遣泰歸於本第於周官之衣服膳羞之不會者必曰惟王及后愚按古者世嫡之位既定而衆子各有定分觀絶覬覦也太宗之時既知承乾不修法度矣乃世子王及后固也而世子與焉者所以示尊隆殿他日兩廢之事寧非太宗有以啓之也雖以重魏王泰之才固以踰分越制矣又使居武徳為矣重天下之本者慎之哉魏徴之言覺大錯誤終非宜貞觀十七年太宗謂侍臣曰人情之至痛者莫過乎喪親也故孔子云三年之喪後同平聲天下之通喪荅宰孔子辭我之自天子逹於庶人也又曰何必高宗丁也商君武古之人皆然張之辭孔子荅子近代帝王遂行不逮漢文以日易月之制喪以日易月漢文帝行短甚乖於禮典朕昨見徐幹中論中論二十篇後漢徐幹撰復三年喪篇義理甚深恨不早見此書所行大䟽略聲䟽平但知自咎自責追悔何及因悲泣乆之天子逹於庻人三代共之夫三年之喪者子生愚按孟子曰三年之喪齊䟽之服飦粥之食自年古今貴賤通行之禮也然自漢文短喪以日三年然後免於父母之懐故父母之喪必以三人紀廢壊綱常不明莫甚於此太宗雖不能蚤易月歴代因之恬不知改天子遂無三年之喪亦可以為孝矣後之人君所宜遵復古制以詔遵經訓躬行其禮而能引咎自責追悔悲泣抑文之失貽太宗之悔豈不卓冠千古哉後世俾子孫守之永永無斁罔使蹈漢貞觀十八年太宗謂侍臣曰夫扶音人臣之對帝王多承意順㫖甘言取容朕今欲聞已過卿䓁皆可直言散騎常侍劉洎對曰陛下每與公卿論事及有上書者以其不稱㫖聲稱去或面加詰難聲去無不慙退恐非誘進直言之道太宗曰朕亦悔有此問難當即改之直諫類比此為詳此章重出納諫篇奢縱第二十五章凡二貞觀十一年侍御史馬周上疏陳時政曰臣歷覩前代自夏殷周及漢氏之有天下傳祚相繼多者八百餘年主八百六十七年史記注周凡三十七少者猶四五百年從禹至史記注殷凡三十一世六百二十九年東西兩漢共二十四桀十七君十四世有王與無王用嵗四百七十一年四年見漢書帝凡四百二十皆為後同去聲積徳累業恩結於人心豈無僻王頼前哲以免尔自魏晉已還降及周隋多者不過五六十年少者纔二三十年而亡四十五年魏三國蜀二主年南齊七主二十二年蕭梁四主五十六年陳五主五主四十五年吳四主五十九年西晉四主五十三元魏十二主一百一十九年東魏一主十七年西魏二十三年東晉十一主一百三年劉宋八王六十年周五主二十五年隋三主三十七年三主二十二年北齊五主二十八年後良由創業之君不務廣恩化當時僅能自守後無遺徳可思故傳嗣之主政教少衰一夫大呼聲去而天下土崩矣今陛下雖以大功定天下而積徳日淺固當崇禹湯文武之道廣施徳化聲施平使㤙有餘地爲子孫立萬代之基豈欲但令政教無失後同令平聲以持當年而已且自古明王聖主雖因人設教寛猛隨時而大要以節儉於身恩加於人二者是務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶逺者往來五六千里春秋冬夏略無休時陛下雖每有㤙詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有怨嗟之言以陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不復可行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸夫人人也慎夫衣不曵地至景帝以錦繡綦組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈而承文景遺徳故人心不動向使髙祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處舊隷四川益州今仍營造供奉器物聲供平并諸王妃主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法扵理其弊猶亂陛下少處人間處上聲少去聲知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宫不更外事更平聲長音掌即萬嵗之後固聖慮所當憂也臣竊尋徃代以來成敗之事但有黎庶怨叛聚為盜賊其國無不即滅人主雖欲改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之有失是以殷紂笑夏桀之亡而幽厲亦笑殷紂之滅名胡皆無道之主周幽王名宫湼厲王隋帝大業之初又笑周齊之失國然今之視煬帝亦猶煬帝之視周齊也故京房漢東郡人治易京姓房名字君明謂漢元帝云臣恐後之視今亦猶今之視古此言不可不戒也徃者貞觀之初率土霜儉一匹絹纔得粟一斗而天下怡然百姓知陛下甚憂憐之故人人自安曾無謗讟自五六年來頻歳豐稔一匹絹得十餘石粟而百姓皆以陛下不憂憐之咸有怨言以今所營為者頗多不急之務故也自古以来國之興亡不由蓄積多少唯在百姓苦樂洛音且以近事驗之隋家貯洛口倉而李宻因之東京積布帛王世充㨿之西京府庫亦爲國家之用至今未盡向使洛口東都無粟帛即世充李宻未必能聚大衆但貯積者固是國之常事要當人有餘力而後收之若人勞而彊斂之聲斂去竟以資冦積之無益也然儉以息人貞觀之初陛下已躬爲之故今行之不難也爲之一日則天下知之式歌且舞矣若人既勞矣而用之不息儻中國被水旱之灾邊方有風塵之警狂狡因之竊發則有不可測之事非徒聖躬旰食晏寢而已日晚也旰居案切若以陛下之聖明誠欲勵精爲政不煩逺求上古之術但及貞觀之初則天下幸甚太宗曰近令造小隨身器物不意百姓遂有嗟怨此則朕之過誤乃命停之此與論諸王按史傳通鑑令同一䟽定分刺史縣徳而務聚斂者民散而國亡太宗在位寖乆将外范氏祖禹曰紂積鉅橋之粟武王發之人主不務而諫欲如初年之節儉可謂順其羙而救其惡矣事四夷内治宫室聚財積穀欲以有為馬周先事要曰陛下當隆禹湯文武之業豈得但持當年而胡氏寅曰馬周所言四五事太宗從其一而已其下者皆然皆不知治蠱先甲後申之義前弊未盡已此最太宗之病也豈特太宗凡三代已後得天義太宗嬪御不為稀營造不為少窮兵黷武以牧革而後患已生矣汲黯謂武帝内多欲而外施仁言之帝未改也豈非經濟之術已殫無所可為乎遼畧在位十餘年矣年豐食足而百姓怨咨馬周道望之太宗可謂能責難於其君矣夫禹湯文愚按馬周此䟽以三代帝王取天下保天下之政治澤潤生民非可以勉强而為之也太宗為武之道修之於身推之於家國天下而後道洽禹湯文武之道則未之盡也孟子曰王者之民唐賢君謂其行事有合於禹湯文武則可槩以象有間矣幸而因周之言即命停罷其足以保皞皞如也營造器物而百姓怨嗟與皞皞之氣代之基此王者必世後仁之事未能進扵是矣貞觀之盛也以此若夫廣施徳化為子孫立萬安者其必有道也夫三代之所以長治久貪鄙第二十六章凡六貞觀初太宗謂侍臣曰人有明珠莫不貴重若以彈雀豈非可惜況人之性命甚於明珠見金錢財帛不懼刑網徑即受納乃是不惜性命明珠是身外之物尚不可彈雀何況性命之重乃以博財物耶群臣若能備盡忠直益國利人則官爵立至皆不能以此道求榮遂妄受財物贓賄既露其身亦殞實可為笑帝王亦然恣情放逸勞役無度信任羣小踈逺忠正去逺聲有一扵此豈不滅亡隋煬帝奢侈自賢身死匹夫之手亦為可笑必察之以廉甚矣貪之足以禍其身也夫利所愚按周禮天官以聽官府之六計弊群吏之治戒哉然自昔戒貪之言多矣善乎太宗之言曰以資身利積而身敗則利乃所以殞身也可不乃以博財物此可為有官君子之箴終之曰帝明珠身外之物尚不可以彈雀何況性命之重亦以自戒也可不謂賢君乎王亦然是不惟有以戒其臣而貞觀二年太宗謂侍臣曰朕嘗謂貪人不解愛財也後同觧音懈至如内外官五品以上禄秩優厚一年所得其數自多若受人財賄不過數萬一朝彰露禄秩削奪此豈是觧愛財物規小得而大失者也昔公儀休名魯相也公儀複姓休性嗜魚而不受人魚其魚長存且為主貪必喪其國為臣貪必亡其身詩云大風有隧貪人敗類柔篇之辭詩大雅桑固非謬言也昔秦惠王稱王是為惠即秦惠公僣王文欲伐蜀不知其逕乃刻五石牛置金其後蜀人見之以為牛能便金聲便平蜀王使五丁力士拖牛入蜀道成秦師隨而伐之蜀國遂亡蜀記事見漢大司農掌諸漢制貨幣之職錢穀金帛田延年漢昭帝時為大司農字子賔齊諸田之後贓賄三千萬事覺自死葦諸葬物昭帝大行用度未辦延年奏言時茂陵富人焦氏賈氏以數千萬積貯炭官奏可富人皆怨出錢求延年罪初大司農取民牛豫收不祥物兾疾用以求利非臣民所當為請沒入盜取其半焦賈告其事時議以延年廢昌邑王時嘗車三萬兩為僦車直千錢延年詐增二千凡六千萬議過延年曰我何面目入牢獄遂刎死發大議當以功覆過霍光曰往就獄公如此之流何可勝記聲勝平朕今以蜀王為元龜卿等亦須以延年為覆轍也禄所以勸士盖分田制禄所以養其愧耻之心愚按書曰凡厥正人既富方穀中庸曰忠信重秩自厚若受財不過數萬其知所以勸矣自以而厲其忠㢘之莭也太宗謂當時五品已上禄監以贓賄而殞身非特以此戒臣下且以此律蜀王為監以牛金而亡國欲臣下以田延年為者寧不知所懲哉其身則列于庶位貞觀四年太宗謂公卿曰朕終日孜孜非但憂憐百姓亦欲使卿䓁長守富貴天非不髙地非不厚朕常兢兢業業以畏天地卿䓁若能小心奉法常如朕畏天地非但百姓安寧自身常得驩樂洛音古人云賢者多財損其志愚者多財生其過此言可為深誡若徇私貪濁非止壊公法損百姓縱事未發間中心豈不常懼恐懼既多亦有因而致死大丈夫豈得茍貪財物以害及身命使子孫每懐愧耻耶卿䓁宜深思此言於畏天者豈謂人君尊無與敵借天以壓之哉愚按詩云上帝臨女毋貳爾心自古聖人拳拳傳之大原也太宗自謂常兢兢業業以畏天地盖兢業祗懼是乃天心之所存而堯舜禹湯所天之學矣然太宗之所謂天者蒼蒼之天耳昊又使群臣當如朕畏天地是真能合乎聖人畏非天哉一息之間斷非畏天也一事之作輟非天曰明及爾出王昊天曰旦及爾㳺衍何徃而者純而已矣愚觀太宗之行事知謹刑矣而復畏天也詩曰文王之徳之純聖人之所以事天知斷恩矣而復牽愛甚矣其雜而不純也此豈濫殺知尚文矣而復慕武知任賢矣而復聴䜛之實哉足為畏天貞觀六年右衛将軍陳萬福自九成宫赴京違法取驛家麩數石太宗賜其麩令自負出以耻之聲令平寧有盜臣盖君子寧亡己之財而不忍傷民之愚按大學引孟獻子之言曰與其有聚斂之臣其盜臣之謂乎太宗賜其麩令自負出以愧其力故也陳萬福違法取驛家麩非有取於民者謂寛仁也已心而不加罪可貞觀十年治書侍御史權萬紀上言宣饒二州今爲宣州仍舊並隷江東寜國路饒州今諸山大有銀坑採之極是利益每嵗可得錢數百萬貫太宗曰朕貴爲天子是事無所少之惟須納嘉言進善事有益於百姓者且國家賸得數百萬貫錢何如得一有才行人聲行去不見卿推賢進善之事又不能按舉不法震肅權豪惟道税鬻銀坑以爲利益昔堯舜抵璧於山林投珠於淵谷由是崇名美號見稱千載後漢桓靈二帝志靈帝名宏後漢桓帝名好利賤義賁羽林入錢各有差私令左右賣公卿公千好去聲漢靈帝時開西邸賣官自關内侯虎金印紫綬傳世入五百萬萬卿五百萬又賣關内侯假為近代庸暗之主卿遂欲将我比桓靈耶是日勑放令萬紀還第聲令平節用外謹制度絶權倖抑恩寵無妄費耳官中欲孫氏甫曰太宗所以能斥言利之臣者無它内能之儉将修洛陽殿則聴張玄素之言而遂止嫁送修一殿則想秦皇之過公卿請營一閣則念文帝千此其謹身節用天下已隂受其賜矣而文武官長樂則納魏徴之諫而從薄宫人罷遣而出者三以自給天子惟務徳義以致治平薄賦斂以厚風止六百四十三員府兵止六十萬又皆散之農𤱔臣所以不能合也俗而已此言利之小人矣與其有聚斂之臣寜有盜臣故治國不以胡氏寅曰大學之教曰長國家而務財用者必自萬緡非因頭會箕斂而取之山澤似亦未有害者利為利而以義為利也自事言之國家嵗得數百為急以桓靈私藏為戒審所取舍明示好惡可為太宗不惟置其利又且黜其人而專以進賢利民法矣人君也觀太宗郤權萬紀銀坑之奏真能不以利為愚按大學曰治國家不以利為利而以義為利諄諄訓下無愧辭也夫表正而景隨源清則流利者盖當是時官室服用毎能慎乃儉徳是宜是理也是故欲臣下厲㢘名當自人君之崇儉清表未正而求正於景源未清而求清於流無始徳貞觀十六年太宗謂侍臣曰古人云鳥棲於林猶恐其不髙復巢於木末魚蔵於水猶恐其不深復宂於窟下然而為人所獲者皆由貪餌故也今人臣受任居髙位食厚禄當湏履忠正蹈公清則無災害長守富貴矣古人云禍福無門惟人所召然陷其身者皆為聲去貪冐財利與夫扶音魚鳥何以異哉卿䓁宜思此語為鑒誡此章喻貪為切故去彼存此舊本此章重岀鑒戒篇今按數矣魚鳥之喻尤其明白痛切令人讀之竦然愚按太宗訓臣下㢘潔之為美貪利之為害者志也可不戒哉誠足懲創人之逸貞觀政要卷第六
