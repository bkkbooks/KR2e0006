front:
  text: 之降乃引弓射殺之嘗曰大義不得不死後為左右東通敗通誘之降君素責通不義卒無降心其妻誘害所徃在大業受任河東固守忠義克終臣節雖桀犬吠堯不仁特吠非其主耳漢書曰桀犬吠堯堯非有乖倒戈之志前徒倒周書曰心前徒倒戈自攻于後也戈言衆服周仁政無有戰疾風勁草實表嵗寒之心爰踐兹境追懐徃事宜錫寵命以申勸奬可追贈蒲州刺史仍訪其子孫以聞盛徳事也然合二子而論之則君素為賢何也愚按漢髙祖赦季布唐太宗褒堯君素皆帝王不能死而逃何足深取哉唐室方興兵精將勇季布身為楚將數窘沛公此人臣之常事國亡無疆援徒以忠義激勵士卒自義寧元年至武戰無不勝攻無不破君素以區區一城之衆外不惟忠義可嘉其知勇才能亦古今所罕有也徳三年始終四載唐朝凡易數將僅能克之此子孫忠義之士其有不興起者乎嗚呼難哉太宗不惟褒贈又訪錄其貞觀十二年太宗謂中書侍郎岑文本曰梁陳蕭氏梁姓陳氏受梁禪受齊禪陳姓名臣有誰可稱復有子弟堪招引否文本奏言隋師入陳百司奔散莫有留者惟尚書僕射袁憲獨在其主之傍王世充將受隋禪群僚表請勸進憲子國子司業承家託疾獨不署名此之父子足稱忠烈承家弟承序今為建昌令属南康路隷江西建昌縣名今陞州清貞雅操實繼先風由是召拜晉王友兼令侍讀平令規諷道義侍讀掌講道經學聲唐制諸王友掌陪侍逰居尋授弘文舘學士弟之謂歟忠謹風操不忍負主誰不欲之為人臣唐氏仲友曰古人云一心可以事百君其袁氏子勉之而已乎為之者之言太宗之意深逺矣岑文本謂隋師入陳袁愚按梁陳扵唐相距頗逺猶有招引名臣子孫署名其弟又清貞雅操一門父子兄弟忠義傳憲有獨侍其主之忠王世充受禪憲之子獨不及此非文本之公忠不揜人善如此則袁氏之家而不著聞向非太宗心存忠義之臣而興言著聞哉忠節何由貞觀十五年詔曰朕聽朝之暇觀前史每覽前賢佐時忠臣狥國何嘗不想見其人廢書欽歎至於近代以来年嵗非逺然其胤緒或當見存現見音縱未能顯加旌表無容棄之遐裔其周隋二代名臣及忠節子孫有貞觀已來犯罪配流者宜令聲平所司具錄奏聞於是多徔矜宥篇今附入于此舊本此章在刑法又能上及扵前朝焉不唯登崇其一身又能下愚按太宗好賢可以為至矣不唯尊榮其朝臣贈君素之官爵錄用諸儒之子孫今也又詔周及扵後裔焉是故祭比干之靈封楊震之墓褒者孰不知所勸乎宜其忠良之士彬彬軰出有隋名臣之後配流者悉從矜宥則凡列在庻位運也嗚呼盛哉以開三百年之休貞觀十九年太宗攻遼東安市城州隷鎮東今為安市髙麗人衆皆死戰詔令耨薩延夀惠真等降夀北部耨薩髙音杭耨薩髙延南部惠真衆止其城下以招之城中堅守不動每見帝幡旗必乗城皷譟聲乗平帝怒甚詔江夏王道宗兄弟字髙祖從江夏郡道宗好學接士不倨于貴為宗室最賢承範年十七從秦王討賊有功初封任城後封築土山以攻其城竟不能剋太宗將旋師嘉安市城主堅守臣節賜絹三百匹以勸勵事君者十二章合為一舊本此章與第東令李勣攻安市安市人望見旗盖輒乗城鼓譟上章今按通鑑標年附入于此又按通鑑太宗親征遼久不下江夏王道宗築土山扵城東浸逼其城城中怒勣請克城之日男子皆阬之安市人聞之益堅守立木栅以塞之築山晝夜不息凡六旬用功五十萬亦增髙其城以拒之又衝車礮石壊其城堞城中隨諸將攻二曰不克上以天寒糧盡先㧞遼盖二州户山頽壓城崩城中數百人出戰遂奪據土山而守之出城主登城拜辭上嘉其固守賜縑百匹口渡遼乃耀兵城下而旋城中皆屏跡不之英武戡定禍亂扵群雄競起之日天戈所指愚按遼東之役與前日義師有間矣夫以太宗一逺國何哉退而嘉安市城主堅守之節賞賜夷貊不能嬰其鋒而晚年悉乃心力不能制服矣然不若不黷武之尤全美也以旌之以勵事君者斯意固美
