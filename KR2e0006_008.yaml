  text: 貞觀政要卷第八戈直集論
  hash: sha256:c80fc558c3ad5cf2cd90453489f818fbc97dfb815c4ab5236597df00be29ca67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0006_SBCK_008-1a}
body:
  text: 論務農三十論刑法三十一論赦令三十二論貢賦三十三辯興亡三十四務農第三十凡四章貞觀二年太宗謂侍臣曰凡事皆湏務本國以人為本人以衣食為本凡營衣食以不失時為本夫不失時者夫音扶後同在人君簡静乃可致耳若兵戈屢動土木不息而欲不奪農時其可得乎王珪曰昔秦皇漢武外則窮極兵戈内則崇侈宫室人力既竭禍難遂興難去聲彼豈不欲安人乎失所以安人之道也亡隋之轍殷鑒不逺陛下親承其弊知所以易之易如字然在初則易以豉切終之實難伏願慎終如始方盡其羙太宗曰公言是也夫安人寜國惟在於君君無為則人樂音洛君多欲則人苦朕所以抑情損欲剋已自勵耳愚按太宗之言曰國以人為本人以衣食為本營衣食以不失時為本人不失時以人君簡静為本竊甞因其言而推之舜之罔逰于逸萬邦咸寧之本也禹之克儉于家朔南暨聲教之本也湯之不邇聲色表正萬邦之本也文王之不敢盤于逰田懐保小民之本也自古興王之君未有不簡静寡欲者也自古亡國之君未有不淫侈多欲者也至㢤太宗之言乎其可謂知本者矣雖然言之非艱行之為難太宗既以隋之崇侈宫室為鑒矣而復有飛山翠微之作既以隋之窮兵黷武為鍳矣而復有髙麗西域之師魏徴曰善始者實䌓克終者盖寡王珪曰在𥘉則易終之實難然則向非二臣之言又豈能始終踐言也㢤貞觀二年京師旱蝗蟲大起太宗入苑視禾見蝗蟲掇數枚而呪曰人以榖為命而汝食之是害于百姓百姓有過在予一人爾其有靈但當蝕我心無害百姓将吞之左右遽諌曰恐成疾不可太宗曰所冀移灾朕躬何疾之避遂吞之自是蝗不復為灾林氏之竒曰夫天灾可以至誠感不可以人力勝太宗掇蝗而吞之不忍民受其灾其害自息明皇遣使捕之欲以人力勝天而其灾愈甚天人之際豈不甚明矣㦲愚按昔成湯禱旱於桑林以六事自責身代犠牲是不自有其身矣夫千金之子猶知愛其身人君以一身履九五之尊位崇髙莫大焉此身為何如也惟能知吾之一身億萬蒼生之身也則凡吾赤子之痒痾疾痛舉切其身矣太宗念蝗之為民害取而吞之曰寧食吾肺腸與湯之身代犠牲皆不自有其身者也其感天心也宜㦲漢王嘉曰應天以實不以文此之謂也貞觀五年有司上書言皇太子将行冠禮冠去聲宜用二月為吉請追兵以備儀注太宗曰今東作方興恐妨農事令改用十月令平聲太子少保蕭瑀奏言準隂陽家用二月為勝太宗曰隂陽拘忌朕所不行若動静必依隂陽不顧理義欲求福祐其可得乎若所行皆遵正道自然常與吉㑹且吉凶在人豈假隂陽拘忌農時甚要不可蹔失愚按夫子曰使民以時釋者曰時謂農隙無事之時使之不以其時則力本者不獲自盡雖有愛民之心而民不𬒳其澤矣夫朝廷之上宮廷之間行儲君首服之禮固未至於使民而奪其時也而以追兵備儀妨農而止此太宗之心一念在民而不敢少㢮也推是心於天下天下其有不務本者乎貞觀十六年太宗以天下粟價率計斗直五錢其尤賤䖏計斗直三錢因謂侍臣曰國以民為本人以食為命若禾黍不登則兆庶非國家所有既屬豐稔若斯朕為億兆人父母唯欲躬務儉約必不輙為奢侈朕常欲賜天下之人皆使富貴今省徭賦不奪其時使比屋之人比音鼻恣其耕稼此則富矣敦行禮譲使郷閭之間少敬長少去聲長音掌妻敬夫此則貴矣但令天下皆然令平聲朕不聴管絃不從畋獵樂在其中矣樂音洛愚按論語曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之釋者曰庶而不富則民生不遂故制田里薄賦歛以富之富而不教則近於禽獸故必立學校明禮義以教之而孟子之告梁惠王亦曰王如施仁政於民省刑罰薄税歛深耕易耨壮者以暇日修其孝悌忠信此皆三代盛時所以王天下之要道也太宗謂朕欲賜天下人皆富貴省徭薄賦不奪其時恣其耕稼此則富矣敦行禮譲使郷閭之間咸知敬順此則貴矣斯言也與孔孟之言同一揆也雖三代之治何以越此然貞觀之時亦云庶且富矣固甞大召名儒増廣生員教亦云至矣朱子則謂其未知所以教也三代之教天子公卿躬行於上言行政事皆可師法太宗其䏻然乎愚謂太宗之言仁言也貞觀之政善政也孟子曰仁言不如仁聲之入人深善政不如善教之得民使太宗知此而力行之則所謂樂在其中者又當何如㢤刑法第三十一凡九章貞觀元年太宗謂侍臣曰死者不可再生用法務在寛簡古人云鬻棺者欲歲之疫非疾於人利於棺售故耳售音受賣也今法司覈理一獄必求深刻欲成其考課今作何法得使平允諌議大夫王珪進曰但選公直良善人㫁獄允當者當去聲増秩賜金即姦偽自息詔從之太宗又曰古者㫁獄必訊於三槐九棘之官周禮秋官左九棘孤卿大夫位焉群士在其後右九棘公矦伯子男位焉群吏在其後面三槐三公位焉州長衆庻在其後今三公九卿三公見任賢篇註唐制九卿太常寺卿掌禮樂郊廟社稷之事光禄寺卿掌酒醴膳羞之政衛尉寺卿掌噐械文物宗正寺卿掌天子族親属籍以别昭穆太僕寺卿掌廐牧輦輿之政大理寺卿掌折獄詳刑鴻臚寺卿掌賔客凶儀之事司農寺卿掌倉儲委積之事太府寺卿掌財貨廩蔵貿易皆有少卿以爲之貳即其職也自今以後大辟罪辟音闢死刑也皆令平聲中書門下四品已上及尚書九卿議之如此庻免冤濫由是至四年㫁死刑天下二十九人幾致刑措㡬平聲舊本自太宗又曰以下另爲一章今合爲一章愚按昔舜命曰汝作士明于五刑以弼五教又曰刑期于無刑盖帝王之治以教爲先刑者不得已而用之以弼教而其心則期於無刑也然明刑之要則曰惟明克允盖明者所以得其情天下使無叛上之事矣貞觀五年張藴古為大理丞相州人李好徳相好並去聲後同素有風疾言渉妖妄詔令鞠其獄令平聲藴古言好徳癲病有徴法不當坐太宗許将寛宥藴古宻報其㫖仍引與愽戯持書侍御史權萬紀劾奏之太宗大怒令斬於東市既而悔之謂房玄齡曰公等食人之禄湏憂人之憂事無巨細咸當留意今不問則不言見事都不諌諍何所輔弼如藴古身為法官與囚愽戯漏洩朕言此亦罪状甚重若據常律未至極刑朕當時盛怒即令䖏置䖏上聲後同公等竟無一言所司又不覆奏遂即决之豈是道理因詔曰凡有死刑雖令即决皆湏五覆奏五覆奏自藴古始也又曰守文定罪或恐有冤自今以後門下省覆有據法令合死而情可矜者宜錄奏聞藴古初以貞觀二年自幽州今大興路緫管府記室兼直中書省表上大寳箴易大傳曰聖人之大寳曰位盖取此義箴誡也文義甚羙可為規誡其詞曰今来古徃俯察仰觀惟辟作福辟音璧君也周書箕子陳洪範之辭為君實難孔子告魯定公曰為君難宅普天之下䖏王公之上任土貢其所有禹貢曰任土作貢具僚和其所唱和去聲是故恐懼之心日㢮邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯拯音軫屯諸倫切歸罪於已因心於人大明無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事見文史篇論出警而入蹕天子出稱警入稱蹕警者戒肅蹕者止行也四時調其慘舒三光同其得失故身為之度而身為之律史記禹聲為律身為度注禹聲音應鍾律以身為法度勿謂無知居髙聴卑勿謂何害積小成大樂不可極樂音洛後同極樂成哀欲不可縱縱欲成災曲禮曰欲不可從樂不可極壮九重於内重平聲楚辭曰君門九重所居不過容膝彼昏不知瑶其臺而瓊其室桀作瑶臺紂作瓊室羅八珍於前周禮善夫珍用八物謂淳熬淳母炮豚炮䍧擣珍漬熬肝膋所食不過適口惟狂罔念周書曰惟聖罔念作狂丘其糟而池其酒桀紂酒池可以運船糟隄可以望十里勿内荒於色勿外荒於禽夏書五子之歌其二曰訓有之内作色荒外作禽荒有一于此未或不亡色荒寵嬖女也禽荒耽遊畋也荒者迷荒之謂勿貴難得之貨老子曰不貴難得之貨使民不爲盗勿聴亡國之音詩序曰亡國之音哀以思其民困内荒代人性外荒蕩人心難得之物侈亡國之聲滛勿謂我尊而傲賢侮士勿謂我智而拒諌矜已聞之夏后據饋頻起史記夏禹一饋而十起以勞天下之民亦有魏帝牽裾不止魏文帝欲徙兾州十萬戸實河南辛毗諌帝不荅起入内毗随而引其𥚑帝怒良乆曰卿持我何太急耶於是從其半安彼反側如春陽秋露巍巍蕩蕩推漢髙大度漢紀髙祖寛仁有大度撫兹庶事如履薄臨深戰戰慄慄用周文小心詩小旻篇曰戰戰兢兢如臨深淵如履薄氷大明篇曰維此文王小心翼翼詩云不識不知詩皇矣篇曰不識不知順帝之則書曰無偏無黨周書曰無偏無黨王道蕩蕩一彼此於胸臆捐好惡於心想好惡並去聲衆棄而後加刑衆恱而後命賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自見音現如水如鏡不示物以形物之鑒者妍蚩自露勿渾渾而濁渾音溷勿皎皎而清勿汶汶而闇勿察察而明雖冕旒蔽目而視於未形冕十有二旒天子冠用五采藻為旒以藻貫五采玉垂於延之前後各十二取目不湏視惡色之義雖黈纊塞耳而聴於無聲黈他口切纊音曠黈纊黄色綿也以黄綿為圓用組垂之於冕當兩耳旁示不聼䜛邪也縱心乎湛然之域遊神於至道之精扣之者應洪纎而効響酌之者随淺深而皆盈故曰天之清地之寧王之貞老子曰天得一以清地得一以寧王矦得一以為天下正四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力戡音堪勝也人懼其威未懐其徳我皇撫運扇以淳風民懐其始未保其終爰述金鏡窮神盡性使人以心應言以行去聲苞括理體抑揚辭令如字天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之争臣司直争讀曰諍敢告前疑太宗嘉之賜帛三百叚仍授以大理寺丞按通鑑無與囚博戯之說唐史張藴古無傳事見刑法志唐氏仲友曰張藴古文章鯁直之士太宗以一時誤見濫誅最為可惜大寳箴諷帝以民畏而未懐切中帝之病藴古敏書傅曉世務文擅當時加以切直太宗濫殺而悔則何益矣朱子黼曰詩三百五十篇而疾䜛者六君子有七惡而以訐為直居其一自昔賢智之棄逐政治之墮圯國家之昏亂未有不自䜛訐也太宗方蒐積群才共興治功乃復容萬紀軰玷汚朝列何㢤房玄齡一代名相而萬紀以考選不公誣之張藴古平反妖言而萬紀以按事不實劾之玄齡以魏徴免按而藴古竟罹非命挾恩依勢逞其姦謀其為太宗盛徳累豈少乎詩曰䜛人罔極交亂四國其萬紀也夫愚按自古王覇之辨治亂之分曰徳刑曰義利而已太宗知尚徳而不尚刑故能拒絶封徳彛法律之言知尚義而不知尚利故能斥權萬紀採銀之奏此其天資聦明最為合於帝王之道首也夫既知其言之非矣則廢逐其人可也然徳彛則任股肱之寄萬紀則居耳目之官徳彛論無忌佩刀之罪置校尉於死地萬紀論好徳妖言之罪䧟藴古於非辜小人深文如出一律可太宗明於先而暗於後得於彼而失於此乎校尉以戴胄而免藴古則遂罹極刑愚觀藴古之箴曰衆棄而後加刑嗚呼藴古之罪豈所謂衆棄者邪亦可哀也已貞觀五年詔曰在京諸司比来比音鼻後同奏决死囚雖云五覆一日即了都未暇審思五奏何益縱有追悔又無所及自今後在京諸司奏决死囚宜三日中五覆奏天下諸州三覆奏又手詔敕曰比来有司㫁獄多據律文雖情在可矜而不敢違法守文定罪或恐有冤自今門下省復有據法合死而情在可矜者宜錄状奏聞范氏祖禹曰易中孚之象曰君子以議獄緩死中孚者信發於中也議獄緩死者出於至誠也古者大司㓂以獄之成告于王王命三公參聴之三公以獄之成告于王王三宥然後制刑先王重慎如此故刑清而民服若太宗之恤刑也可謂至誠而近於古矣㡬致刑措宜㢤愚按易之象言刑獄者五而議獄緩死必見於中孚者盖以君子者毎於事於物無不用其中於人命所繫尤見中孚之至也獄者不得已而設議謂必䆒其情也死者不可以復生緩謂求所以生之也吕刑曰罔非在中又曰獄成而孚則中孚者誠議獄緩死之本也太宗恤刑之詔其出於中心之誠者歟亦近乎周官五聽三訊之遺意矣貞觀九年鹽澤道行軍緫管岷州岷州今爲西和州隷陜西都督髙甑生史無傳坐違李靖節度又誣告靖謀逆減死徙邊時有上言者曰甑生舊秦府功臣請寛其過太宗曰雖是藩邸舊勞誠不可忘然理國守法事湏畫一今若赦之使開僥倖之路且國家建義太原元從及征戰有功者甚衆從去聲若甑生獲免誰不覬覦有功之人皆湏犯法我所以必不赦者正爲此也愚按諸葛武矦之治蜀也開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰堂堂三代之佐此後世之所不能也太宗以王魏爲相以薛萬徹爲将非所謂雖讎必賞歟至若髙甑生以秦府舊臣身從百戰一旦犯法黜之不疑非所謂雖親必罰歟嗚呼太宗之布公道其庶幾武矦之治者乎貞觀十一年特進魏徴上䟽曰臣聞書曰明徳慎罰周書康誥之辭惟刑恤㦲虞書舜典之辭禮云為上易事易以豉切後同為下易知則刑不煩矣上人疑則百姓惑下難知則君長勞矣長音掌後同禮緇衣篇之辭夫音扶後同上易事則下易知君長不勞百姓不惑故君有一徳臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康㦲之詠斯起虞書臯陶𢋫歌曰庶事康㢤當今道𬒳華戎功髙宇宙無思不服無逺不臻然言尚於簡文志在於明察刑賞之用有所未盡夫刑賞之本在乎勸善而懲惡帝王之所以與天下為畫一不以貴賤親踈而輕重者也䟽與踈同今之刑賞未必盡然或屈伸在乎好惡並去聲後同或輕重由乎喜怒遇喜則矜其情於法中逄怒則求其罪於事外所好則鑚皮出其毛羽所惡則洗垢求其瘢㾗瘢音盤瘢㾗可求則刑斯濫矣毛羽可出則賞因謬矣刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老孔子老聃也威怒所至則取法於申韓申不害韓非皆戰國刑名之學直道而行非無三黜三去聲論語曰柳下恵直道而事人焉徃而不三黜危人自安盖亦多矣故道徳之㫖未弘刻薄之風已扇夫刻薄既扇則下生百端人競趍時則憲章不一稽之王度稽音覊實虧君道昔州犂上下其手楚國之法遂差左傳襄公二十六年楚與秦侵鄭楚穿封戍囚鄭皇頡公子圍與之争正於伯州犂州犂乃立囚曰所争君子也其何不知上其手曰夫子爲王子圍寡君之貴介弟也下其手曰此子爲穿卦戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍抽戈逐王子圍弗及楚人以皇頡歸張湯輕重其心漢朝之刑以弊漢張湯爲廷尉郷上意所便曰所治即上意所欲􅓧予監史深刻者即上意所欲釋予監史輕平者所治即豪必舞文巧詆即下户羸弱時口言雖文致法上裁察帝於是徃徃釋湯所言出本傳以人臣之頗僻頗平聲猶莫䏻申其欺罔况人君之髙下将何以措其手足乎以睿聖之聦明無幽㣲而不燭豈神有所不達智有所不通㢤安其所安下以恤刑爲念樂其所樂音洛上同遂忘先笑之變禍福相倚吉㐫同域惟人所召安可不思頃者責罰稍多威怒微厲或以供帳不贍或以營作差違或以物不稱心稱去聲或以人不從命皆非致治之所急實恐驕奢之攸漸是知貴不與驕期而驕自至富不與侈期而侈自来非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府蔵去聲譬今日之資儲以隋氏之甲兵况當今之士馬以隋氏之户口校今時之百姓度長比大度待洛切曽何等級曽音層然隋氏以富强而喪敗動之也我以貧窮而安寧静之也静之則安動之則亂人皆知之非隱而難見也非㣲而難察也然鮮蹈平易之塗鮮上聲易以豉切後同多遵覆車之轍何㢤在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至於将受戮辱竟未悟其滅亡之所由也可不哀㢤夫鑒形之羙惡必就於止水鑒國之安危必取於亡國故詩曰殷鑒不逺在夏后之世詩大雅蕩篇之辭又曰伐柯伐柯其則不逺詩豳風伐柯篇之辭臣願當今之動静必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜欲以從人省遊畋之娯息靡麗之作罷不急之務慎偏聽之怒近忠厚逺便侫逺去聲便平聲杜恱耳之邪說甘苦口之忠言去易進之人賤難得之貨採尭舜之誹謗尭舜設誹謗之本於五逹之衢以書政治之愆失追禹湯之罪已左傳禹湯罪已其興也勃焉惜十家之産見納諌篇注順百姓之心近取諸身恕以待物思勞謙以受益易謙卦九三勞謙君子有終吉不自滿以招損虞書曰滿招損謙受益有動則庶類以和出言而千里斯應易大傳曰君子居其室出其言善則千里之外應之超上徳於前載樹風聲於後昆此聖哲之宏規而帝王之大業能事斯畢在乎慎守而已夫守之則易取之實難既能得其所以難豈不䏻保其所以易其或保之不固則驕奢淫泆動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保也易文言傳釋否九五爻義誠㢤斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若以當今之無事行疇昔之恭儉則盡善盡羙矣固無得而稱焉太宗深嘉而納用按史傳上幸洛陽次昭仁官多所譴責徴諌曰隋惟責不獻食或供奉不精為此無限而至於亡故天命陛下代之正當兢懼戒約柰何令人悔為不奢若以為足今不啻足矣以為不足萬此寧有足邪上驚曰非公不聞此言退又上䟽云云唐氏仲友曰徴言刑賞之本在乎勸善而懲惡今之刑賞或由喜怒此即皇極所謂王道書曰無有作好無有作惡惟辟作福惟辟作威二説並行而不相悖無作好惡道也惟作威福權也徳大而常禮不足以賞於是乎有作福罪大而常法不足以誅於是乎有作威此非有司之法守而出乎人君之權者雖作福而徳稱乎賞豈作好㦲雖作威而罪宜乎誅豈作惡㦲然則賞刑非不由喜怒也不由乎一人之私喜怒也愚按漢世賢良之䇿曰上古堯舜之時不責爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵賞而民不勸重刑罰而姦不止其上不正遇民不信也夫子曰其身正不令而行其身不正雖令不從又曰人而無信不知其可也其是之謂歟夫以太宗之世嘉善賞功之制明罰恤民之詔屢形於言亦可謂兢兢於君道者然而刑賞之失猶有如魏徴之言者豈正身之道未有以盡於巳乎抑信未足以孚於民乎觀徴所謂欲善之志不減而改過之心少虧其未䏻正於已而信於民者可想見已雖然徴之䟽必諄諄以隋為戒若致儆於庸君常主之前者亦猶賈山於漢而借秦為喻之意憂治危明之心也若徴者可謂忠愛其君者矣貞觀十四年戴州濟北地今廢刺史賈崇以所部有犯十惡者𬒳刺史劾奏太宗謂侍臣曰昔陶唐大聖柳下惠大賢其子丹朱甚不肖其弟盜跖為巨惡盜跖荘子雜篇以為柳下惠之弟名跖而為大盗夫以夫音扶聖賢之訓父子兄弟之親尚不䏻使陶染變革去惡從善去上聲今遣刺史化𬒳下人咸歸善道豈可得也若令平聲後同縁此皆被貶降或恐逓相掩蔽罪人斯失諸州有犯十惡者刺史不湏從坐但令明加糾訪科罪庶可肅清姦惡愚按夫子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格謂政刑之不如徳禮也盖政者為治之具刑者輔治之法徳禮者出治之本而徳又禮之本也後世之為治者徳禮有愧教化不先非惟徳禮不䏻使民有耻且格而政刑亦不䏻使民免而無耻矣甚而至於罪麗于十惡尚忍言之㦲然完厥本原則承流宣化坐罪宜也而遂至於逓相掩蔽罪人斯失反以長姦容慝遂使麗于十惡者乃得全身於覆載之間而可乎㢤太宗不坐刺史但令明加糾察以正其罪盖深有以知其弊而不得不然也司牧民者其亦於徳禮政刑而知本末先後㦲貞觀十六年太宗謂大理卿孫伏伽貝州人武徳初上言三事帝曰可謂誼臣矣貞觀中拜御史累遷大理卿曰夫作甲者夫音扶欲其堅恐人之傷作箭者欲其銳恐人不傷何則各有司存利在稱職故也稱去聲朕常問法官刑罰輕重毎稱法網寛於徃代仍恐主獄之司利在殺人危人自逹以釣聲價今之所憂正在此耳深宜禁止務在寛平唐氏仲友曰太宗留心聴㫁天下刑㡬措固甞拒封徳彛刑法伯道之說從魏公仁義之言雖道徳齊禮未純三代而欽恤之意形矣惜㦲後世之不能守也愚按漢景帝之詔有曰欲令理獄者務先寛又曰獄者人之大命死者不可復生吏或不奉法以貨賂為市朋黨比周以苛為察以刻為明罪者不服姦法為暴甚無謂也諸獄雖疑若文致於法而罪人心不厭者則讞之誠後王之所當知也太宗謂恐主獄之司利在殺人危人自逹深宜禁止務在寛平斯言也與景帝之詔同一仁心也史臣俱以刑措羙之宜㦲盖寛則矜恕可得其情急則殘忍有失其情者矣然寛非縱弛之謂也寛而流於縱弛則幸免者有焉今曰務在寛平則平若持衡輕重不失矣罪在於輕而從輕罪在於重而從重此平也實寛之所致也則寛平者實明刑之典要歟赦令第三十二凡四章貞觀七年太宗謂侍臣曰天下愚人者多智人者少智者不肯為惡愚人好犯憲章好去聲凡赦宥之恩惟及不軌之輩古語云小人之幸君子之不幸一歲再赦善人喑啞凡養稂莠者傷禾稼稂莠音郎酉草之害稼者惠姦宄者賊良人宄音詭昔文王作罰刑兹無赦周書康誥武王之辭又蜀先主姓劉名備字玄徳漢中山靖王之後三國時繼漢統都蜀甞謂諸葛亮曰吾周旋陳元方鄭康成之間元方名紀康成名玄並後漢人毎見啓告理亂之道備矣曽不語赦曾音層故諸葛亮理蜀十年不赦而蜀大化梁武帝毎年數赦數音朔後同卒至傾敗卒子聿切夫謀小仁者夫音扶大仁之賊故我有天下已来絶不放赦今四海安寧禮義興行非常之恩彌不可數将恐愚人常冀僥倖惟欲犯法不䏻改過范氏祖禹曰數赦之害前世論之詳矣夫良民不𬒳澤而罪人獲宥政之偏黨莫甚於此欲以致和而措刑不亦踈乎而人君毎以赦爲推恩或祈隂徳之報太宗懲之可謂善治矣馬氏存曰先王以教而化民以刑而禁民不幸或䧟於憲綱者聖人則原其情而省其過之大小而肆赦之盖赦者聖人以之宥過也可以行而不行則傷乎仁不可以行而行之則失乎義故世之議者或以宜踈而不宜數或以宜數而不宜踈是踈者太簡數者大繁盖惟當語其當否而不論其踈數也故周官三宥三赦之法曰不識曰過失曰遺忘以爲宥之可用止於如此曰㓜弱曰老耄曰惷愚則以為赦之可行止扵如此由是觀之赦宥之法當其時而用之則為天下之利不當其時而用之則為天下之害故魯肆大青春秋譏之管仲亦曰赦者小利而大害乆而不勝其禍無赦宥者小害而大利乆而不勝其福以為天下之民知赦之福而不知無赦之為福是亦議其赦之大者乎愚按書曰青災肆赦怙終賊刑青過誤也災不幸也故肆赦之怙有恃也終再犯也故賊刑之此聖人用法之權衡而忠厚之意寓扵其間未聞不擇罪之輕重而悉赦之也易曰雷雨作解君子以赦過宥罪雷動而雨作天澤所施溥矣而曰赦過宥罪過之小者赦釋之罪之大者寛宥之而已亦非謂不擇罪之大小而悉赦之也故春秋荘公之世肆大青聖人以為非常之事書之扵經正以其非古也自是而赦令數矣然或者因天下有非常之事與夫㐫荒流離之後盗賊垢汙之餘於是有以沛然洗濯於天下不得已而用之猶云可也否則雖足以見仁惠而未免所謂小人之幸而君子之不幸矣為人上者操刑賞之柄以勸善懲惡酌古之道揆今之宜必赦過宥罪而不可數要為得中也太宗謂絶不放赦而四海安寧非常之恩彌不可數其深有見於治道者㢤貞觀十年太宗謂侍臣曰國家法令惟湏簡約不可一罪作數種條格式既多官人不䏻盡記更生姦詐若欲出罪即引輕條若欲入罪即引重條數變法者數音朔實不益道理宜令審細令平聲毋使互文毋無通貞觀十一年太宗謂侍臣曰詔令格式若不常定則人心多惑姦詐益生周易稱渙汗其大號易渙卦九五爻辭言發號施令施平聲若汗出於體一出而不復也書曰慎乃出令令出惟行弗為反周書周官之辭且漢祖日不暇給蕭何起於小吏制法之後猶稱畫一今宜詳思此義不可輕出詔令必湏審定以為永式愚按唐之刑書有四曰律令格式令者尊卑貴賤之等殺國家之制度也格者有官有司之所常行之事也式者其所常守之法也凢邦國之政必從事於三者其有所違及人之為惡而入于罪戾者一㫁之以律律之書凢十二篇所以使民遷善逺罪而無犯也皆太宗詔房玄齡等與法司因隋之舊而更定増損多降重為輕迄貞觀用之無所變改夫律令格式皆所以用法也太宗謂貴簡約貴常定此最為知法意者夫不簡約則出入輕重吏因之而作弊不常定則朝行夕改民莫知所信從太宗取則於蕭何畫一之法而不輕於數變法必湏審定以為永式能致刑措實由此也長孫皇后遇疾漸危篤皇太子承乾也啓后曰醫藥備愚按三代興王之主無不内有賢助以恊成至治任姒邑姜其表表於經傳者為天下母儀之所取則焉若長孫皇后之賢自三代而下之絶無僅有者也馬鄧不足以儕之矣遇危疾而不以肆赦徼福非卓然有見何以能兹不幸而弗登耆艾宜太宗有失内良佐之嘆也天假之年使之擁佑於髙宗之世則庶㡬其遏禍亂之萌手此可為深悲也貢賦第三十三凡五章貞觀二年太宗謂朝集使曰使去聲唐制諸州奉貢物入京者謂之朝集使任土作貢布在前典當州所産則充庭實當去聲比聞都督刺史比音鼻邀射聲名厥土所賦或嫌其不善踰意外求更相倣効更平聲遂以成俗極為勞擾宜改此弊不得更然愚按夏書載禹平水土之績而以貢名篇貢者下獻上之名水土未平何由定貢書以貢名見地平天成之功也然曰任土作貢者亦非以其土之所有而悉貢也禹貢一書其所貢者皆服食器用之常宗廟朝廷之不可闕者非徒奉一人耳目心志之所欲也而唐之刺史至於越境求物更相倣傚亦由國無定制使踰越於常度之外太宗深懲而力革其弊誠王者之先務也貞觀中林邑國貢白鸚鵡性辯慧尤善應答屢有苦寒之言太宗愍之付其使令還出於林藪使去聲令平聲按通鑑貞觀五年十一月林邑獻五色鸚鵡魏徴以為不宜受上喜而歸之愚按周書載召公戒武王之言曰犬馬非其土性不畜珍禽異獸不育于國其後穆王得白狼白鹿而荒服因以不至其得失可睹也太宗郤林邑白鸚鵡之獻可謂䏻遵古先哲之訓而鑒後世之失矣貞觀十二年踈勒朱俱波甘棠皆西域國名踈勒距長安九千里餘王姓裴氏朱俱波在葱嶺之西甘棠在大海南遣使貢方物使去聲後同太宗謂群臣曰向使中國不安日南南蠻國在安南之外西域朝貢使亦何縁而至朕何徳以堪之覩此翻懐危懼近代平一天下拓定邉方者拓音托惟秦皇漢武始皇暴虐至子而亡漢武驕奢國祚㡬絶㡬平聲朕提三尺劒以定四海逺夷率服億兆乂安自謂不減二主也然二主末途皆不䏻自保由是毎自懼危亡必不敢懈怠惟籍公等直言正諌以相匡弼若惟揚羙隱惡共進䛕言則國之危亡可立而待也按通鑑係貞觀九年十二月唐氏仲友曰太宗因四夷之賔而以秦皇漢武自儆求輔弼之言此忠言可進之機惜㢤玄齡無杜漸之言俾進乎帝王保治之道也愚按昔武王克商西旅底貢厥􅋙太保作旅􅋙用訓于王而致慎徳之戒夫以武王之聖而召公所以警戒之者如此後之人主可不深思而加念之㢤太宗因四夷之賔以秦皇漢㢤自儆以求言而當時大臣雖不聞有如太保作書之訓然自懐危亡不敢懈怠有合於夙夜罔或不勤之言庶㡬乎帝王保治之道矣貞觀十八年太宗将伐髙麗其莫離支髙麗官名其職如中國吏部兼兵部尚書也貞觀十六年髙麗東部大人泉盖蘇文弑其王武立王弟子藏為王自為莫離支官遣使去聲貢白金黄門侍郎禇遂良諌曰莫離支虐殺其主九夷所不容東方之夷有九種曰畎夷于夷方夷黄夷白夷赤夷玄夷風夷陽夷又一曰玄菟二曰樂浪三曰髙儷四曰滿飾五曰鳬臾六曰索家七曰東屠八曰倭人九曰天都陛下以之興兵将事弔伐為遼東之人為去聲報主辱之恥古者討弑君之賊不受其賂昔宋督宋春秋時國名字華父宋戴公孫也遺魯君以郜鼎遺去聲魯君桓公名軌郜鼎郜國所造器故繫名於郜桓公受之於大廟大音泰後同大廟周公之廟也臧哀伯魯大夫臧孫逹也諌曰君人者将昭徳塞違今滅徳立違而寘其賂器於大廟百官象之又何誅焉武王克商遷九鼎于雒邑九鼎殷所受夏鼎也武王克商乃營雒邑而後去之又遷九鼎焉義士猶或非之盖伯夷之屬而況将昭違亂之賂器寘諸大廟其若之何事見左傳桓公二年宋督弑其君殤公與夷以郜鼎賂公故遂相宋公四月取郜鼎于宋納于大廟臧哀伯諫曰去云公不聴夫音扶春秋之書百王取則若受不臣之筐篚納弑逆之朝貢不以為愆将何致伐臣謂莫離支所獻自不合受太宗從之按通鑑太宗又謂髙麗使者曰汝曹皆事髙武有官爵莫離支弑逆汝曹不䏻復讎今更為之逰說以欺大國罪孰大焉悉以屬大理唐氏仲友曰名其為賊乃可服之此兵法也太宗固深忿莫離支必欲討之其貢使之来欲治之而未有辭遂良之諌與太宗意㑹宜其從之之速也愚按禇遂良援古證今諌太宗卻莫離支之獻則善矣而不能因以消其忿兵黷武之心而其諌辭與太宗意㑹卒成遼水之征惜㢤貞觀十九年髙麗王髙藏藏去聲髙麗王名及莫離支盖蘇文盖音盍髙麗臣名金盖蘇文既弑其王武扵是專擅國事其狀貌雄偉意氣豪逸身佩五刀左右莫敢仰視常令貴人武将伏地而履之上馬出行必整隊伍導者長呼則人皆奔迸不避坑谷路絶行者國人甚苦之遣使去聲獻二羙女太宗謂其使曰朕憫此女離其父母兄弟扵本國若愛其色而傷其心我不取也並却還之本國按通鑑係貞觀二十年愚按周書曰明王慎徳四夷咸賔無有逺邇畢獻方物帷服食器用未聞以羙女為貢者也適足以亂人之國而已矣昔紂受閎天羙女之獻而西伯興魯受齊人女樂之歸而孔子行盖自古臣下之詭計列國之隂謀未有不以女子為間使之先有以惑其耳目移其心志或乗隙以沮敗其所為或遂中以不測之禍可不慎㢤髙麗羙女之貢夫豈不為是邪况當興師致討之時乎太宗還之謂不欲傷其心固仁惻之意亦豈非有見扵此邪若太宗其可謂賢君也已辯興亡第三十四凡四章貞觀初太宗從容從即容切謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右㒒射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而㑹武王伐紂諸侯㑹孟津者八百餘國周室微六國無罪秦氏專任智力蚕食諸侯平定雖同人情則異太宗曰不然周既克殷務弘仁義秦既得志專行詐力非但取之有異抑亦守之不同祚之脩短意在兹乎愚按太宗君臣甞論創業守成孰難玄齡以創業為難魏徴以守成為難夫創業者既徃之事守成者方来之事也與其追論扵既徃曷若致力扵方来者為有益乎他日與群臣論周秦運祚長短之由蕭瑀之言即創業之事太宗之言即守成之事也夫所貴乎君臣之間講論古今者欲其反之扵己而推之扵治也取天下之事太宗既已身親之矣方當即位之初所宜監秦之所以失効周之所以得庶乎如周祚之長不至如秦祚之短也嗚呼太宗之言可謂䏻切已近思者矣貞觀二年太宗謂黄門侍郎王珪曰隋開皇十四年大旱人多飢乏是時倉庫盈溢竟不許賑給乃令平聲百姓逐粮隋文不憐百姓而惜倉庫比至末年比音鼻計天下儲積得供五六十年供平聲煬帝恃此富饒所以奢華無道遂致滅亡煬帝失國亦此之由凢理國者務積於人不在盈其倉庫古人云百姓不足君孰與足論語有若對魯哀公之辭但使倉庫可備凶年此外何煩儲蓄後嗣若賢自䏻保其天下如其不肖多積倉庫徒益其奢侈危亡之本也舊本此章重出奢縱篇今去彼存此愚按古者三年耕必有一年之食以三十年之通制國用雖有凶旱水溢民無菜色此蓄積者所以為民非為君也百姓足孰與不足聖經所以垂訓而公私之積猶可哀痛賈誼所以言扵漢文帝之時也盖蓄積固有國之先務也至扵蓄積豊富侈心一生貫朽粟陳不足以供排山倒海之欲非惟無可以養民且至扵厲民矣太宗謂但使倉廩可備凶年此外何煩儲蓄此得古人制國用之意良足取也貞觀五年太宗謂侍臣曰天道福善禍淫事猶影響昔啓人本突厥啓民可汗避太宗諱改曰人亡國来奔隋文帝不恡粟帛大興士衆營衛安置乃得存立既而彊富子孫不思念報徳纔至失脫即起兵圍煬帝於鴈門郡名今為代州隷腹裏及隋國亂又恃彊深入遂使昔安立其國家者身及子孫並為頡利破亡豈非背恩忘義所至也群臣咸曰誠如聖㫖愚按三代之待夷狄也来者不拒去者不追盖不以中國之治治之也文王之伐玁狁止扵城彼朔方而已宣王之伐淮夷止於徐方来庭而已曷甞盡欲郡縣其地而臣妾其人㢤後世不明華夷之辨務為懐逺之圖適以自遺患而已矣故漢宣扶立呼韓而建武多北邉之擾隋文撫存啓民而煬帝有鴈門之圍由不能以三代為法故也可不戒㦲貞觀九年北蕃北突厥之國歸朝人奏突厥内大雪人饑羊馬並死中國人在彼者皆入山作賊人情大惡太宗謂侍臣曰觀古人君行仁義任賢良則理行暴亂任小人則敗突厥所信任者並共公等見之略無忠正可取者頡利復不憂百姓恣情所爲朕以人事觀之亦何可乆矣魏徴進曰昔魏文矦名斯晋卿桓子之子爲諸侯問李克戰國時人諸侯誰先亡克曰呉先亡文矦曰何故克曰數戰數勝數並音朔後同數勝則主驕數戰則民疲不亡何待頡利逢隋末中國喪亂遂恃衆内侵今尚不息此其必亡之道太宗深然之愚按太雪人飢羊馬並死突厥将亡之徴也太宗不以此論其必亡而以不任忠良不憂百姓知其必亡可謂善觀人之國矣然魏徴論呉亡之事則又有深意焉盖頡利固數戦數勝者也太宗自起兵已来亦豈非數戰數勝者乎觀頡利之亡亦可惕然而懼矣厥後太宗既老而復興髙麗之師殆近扵李克之所論者太宗固曰魏徴若在不使我有是行豈不信㢤貞觀九年太宗謂魏徴曰頃讀周齊史末代亡國之主為惡多相類也齊主齊後主也名緯世祖之子深好奢侈好去聲所有府庫用之略盡乃至關市無不稅歛去聲朕常謂此猶如饞人自食其肉肉盡必死人君賦歛不已百姓既弊其君亦亡齊主即是也然天元後周宣帝名贇自稱天元皇帝齊主若為優劣徴對曰二主亡國雖同其行則别行去聲齊主愞弱愞與懦同政出多門國無綱紀遂至亡滅天元性兇而強威福在已亡國之事皆在其身以此論之齊主為劣舊本此章重出奢縱篇今去彼存此愚按詩曰殷鑒不逺在夏后之世又曰宜鑒于殷峻命不易夫殷之鑒以夏周之鑒以殷太宗以開基之明君而能以亡國之庸君為鑒可謂知所鑒矣其得為寡過也宜㢤至論周齊之君孰優魏徴以齊主為劣愚觀周子之書有剛惡柔惡之說然則天元其剛惡齊主其柔惡歟剛柔雖異亡國則一政未易以優劣論也貞觀政要卷第八
